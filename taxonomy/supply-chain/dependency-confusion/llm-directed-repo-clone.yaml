id: "supply-chain/dependency-confusion/llm-directed-repo-clone"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Dependency Confusion"
category_id: "7.1"
name: "LLM-Directed Repository Clone"
risk_level: "high"

abstract: |
  An AI agent cloning git repositories at URLs sourced from LLM output,
  enabling supply chain attacks through hallucinated, typosquatted, or
  attacker-controlled repository references.

explanation: |
  AI coding agents frequently execute git clone commands based on LLM
  suggestions. When repository URLs come from LLM output without verification:

  - Hallucinated repository names may map to attacker-registered repos
  - Typosquatted repo names (e.g., `requests-http` vs `requests`) deliver malware
  - Prompt injection can redirect clones to attacker-controlled repositories
  - Cloned repositories may contain malicious setup.py, Makefile, or install scripts
  - Auto-execution of post-clone hooks can trigger code execution immediately

  This is especially dangerous when the agent subsequently installs from the
  cloned repository (`pip install -e .`, `npm install`) without review.

recommendation: |
  - Verify repository URLs against known-good sources before cloning.
  - Pin to specific commit hashes rather than branch names.
  - Review repository content before executing any installation steps.
  - Maintain an allowlist of approved repositories for agent use.
  - Disable automatic post-clone hook execution.

examples:
  bad:
    - "git clone $(ai_suggested_url)  # unverified LLM output URL"
    - "subprocess.run(['git', 'clone', llm_response['repo_url']])"
    - "git clone https://github.com/populer-lib/requests && pip install -e requests/"
  good:
    - "git clone https://github.com/psf/requests@abc1234  # pinned commit"
    - "# Human reviews repo URL before agent executes clone"

compliance:
  owasp-llm-2025: ["LLM02", "LLM08"]
  iso-27001-2022: ["A.8.31", "A.5.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-1", "MANAGE-2"]
  soc2-type2: ["CC8.1", "CC6.1"]
  iso-42001-2023: ["A.9.3", "A.10.1", "6.1.2"]

references:
  mitre_attack: ["T1195", "T1072"]
  cwe: ["CWE-494", "CWE-829"]

analyzers: ["regex", "semantic"]
