id: "supply-chain/dependency-confusion/package-manifest-tampering"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Dependency Confusion"
category_id: "7.1"
name: "Package Manifest & Lock File Tampering"
risk_level: "critical"

abstract: |
  An AI agent writes directly to dependency lock files or package manifests,
  enabling supply-chain attacks that bypass shell-level interception entirely
  when performed via MCP file-write tools.

explanation: |
  Dependency lock files (package-lock.json, yarn.lock, Cargo.lock, go.sum,
  poetry.lock, etc.) are machine-generated integrity records that pin exact
  package versions and cryptographic checksums. Package manifests (package.json,
  requirements.txt, go.mod, Cargo.toml, etc.) declare direct dependencies.

  AI agents operating through MCP tools (write_file, edit_file, str_replace_editor)
  can modify these files without invoking a shell, bypassing all shell-level
  AgentShield rules. Tampering enables:

  - **Lock file integrity bypass**: Overwriting checksums allows substitution of
    a compromised package version on the next install.
  - **Checksum stripping**: Removing integrity hashes from go.sum or yarn.lock
    removes the only verification that installed packages match what was reviewed.
  - **Manifest dependency injection**: Adding a typosquatted or malicious package
    name to requirements.txt or package.json causes it to be installed on the
    next build without developer awareness.
  - **Transitive dependency pinning**: Forcing a specific vulnerable version of
    a transitive dependency by editing the lock file directly.

  MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies and Tools

recommendation: |
  - Block all MCP tool writes to lock files — they are machine-generated and
    should never be hand-edited.
  - Audit MCP tool writes to package manifests — legitimate agent dependency
    additions require human review.
  - Use file integrity monitoring on lock files in CI pipelines.
  - Enforce lock file re-generation from the manifest (e.g., `npm ci`) rather
    than trusting hand-edited lock files.

examples:
  bad:
    - "MCP write_file path=yarn.lock (any content)"
    - "MCP edit_file path=package-lock.json"
    - "MCP str_replace_editor path=go.sum"
    - "MCP write_file path=Cargo.lock"
    - "MCP edit_file path=poetry.lock"
  good:
    - "MCP write_file path=package.json (audit-worthy but not blocked)"
    - "npm install lodash (regenerates lock file via package manager)"
    - "cargo add serde (uses package manager tooling)"

compliance:
