id: "supply-chain/dependency-confusion/llm-directed-image-pull"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Dependency Confusion"
category_id: "7.1"
name: "LLM-Directed Docker Image Pull"
risk_level: "high"

abstract: |
  An AI agent executing docker pull or container run commands with image
  names sourced from LLM output, enabling supply chain attacks through
  hallucinated, typosquatted, or attacker-controlled image references.

explanation: |
  LLMs may hallucinate Docker image names that do not exist on official
  registries, or suggest image names similar to legitimate ones (typosquatting).
  When an agent executes docker pull commands based on LLM output without
  verification:

  - Hallucinated image names may resolve to attacker-registered images
  - Typosquatted images (e.g., `nginx-offical` vs `nginx`) run malicious code
  - LLM-suggested images bypass normal package vetting processes
  - Prompt injection can redirect docker pull to attacker-controlled registries
  - Unpinned image tags (`:latest`) allow registry-side substitution attacks

  The risk is amplified in autonomous agent workflows where no human reviews
  the image names before execution.

recommendation: |
  - Never execute docker pull with image names sourced directly from LLM output.
  - Pin images to specific digest hashes (e.g., `nginx@sha256:...`).
  - Maintain an allowlist of approved base images and registries.
  - Use image signing (Docker Content Trust, Cosign) to verify image integrity.
  - Require human approval for any new container image before first use.

examples:
  bad:
    - "docker pull $(llm_output_image_name)  # unverified LLM output"
    - "docker run nginx-offical:latest  # typosquatted image"
    - "subprocess.run(['docker', 'pull', ai_recommended_image])"
  good:
    - "docker pull nginx@sha256:abc123...  # pinned digest"
    - "docker pull nginx:1.25.3  # pinned version from approved list"

compliance:
  owasp-llm-2025: ["LLM02", "LLM08"]
  iso-27001-2022: ["A.8.31", "A.5.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-1", "MANAGE-2"]
  soc2-type2: ["CC8.1", "CC6.1"]
  iso-42001-2023: ["A.9.3", "A.10.1", "6.1.2"]

references:
  mitre_attack: ["T1195", "T1610"]
  cwe: ["CWE-494", "CWE-829"]

analyzers: ["regex", "semantic"]
