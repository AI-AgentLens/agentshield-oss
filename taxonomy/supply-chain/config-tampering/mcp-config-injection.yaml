  iso-27001-2022: ["A.8.9", "A.8.25", "A.8.28"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC6.1", "CC6.8", "CC8.1"]
  iso-42001-2023: ["A.6.1", "A.10.1"]
  mitre_atlas: ["AML.T0056"]

references:
