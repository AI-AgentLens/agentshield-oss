analyzers: ["regex", "structural", "guardian"]
related_rules: []
# Detection: Regex/structural analyzers match writes to known MCP config file
# paths (mcp.json, claude_desktop_config.json, .cursor/mcp.json, etc.).
# Guardian layer can scan MCP config content for suspicious server entries
# (unknown commands, external URLs, injected env vars).
