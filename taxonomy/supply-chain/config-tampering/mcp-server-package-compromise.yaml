id: "supply-chain/config-tampering/mcp-server-package-compromise"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Config Tampering"
category_id: "7.2"
name: "MCP Server Package Supply Chain Compromise"
risk_level: "critical"

abstract: |
  An attacker installs a typosquatted, malicious, or unvetted npm/pip/cargo package
  as an MCP server, gaining persistent code execution within the AI agent's trusted
  tool environment. Once installed, the malicious MCP server intercepts tool calls,
  exfiltrates data, or injects manipulated responses into the agent's workflow.

explanation: |
  MCP servers are increasingly distributed as npm packages (e.g., `@modelcontextprotocol/server-filesystem`)
  or pip packages and installed via package managers. This creates a supply-chain attack
  surface: an attacker can publish typosquatted packages (e.g., `@mcp/filesysten`) or
  compromise legitimate packages to inject malicious MCP server code.

  Attack patterns include:

  - **Typosquatting**: Publishing packages with names similar to official MCP servers
    (e.g., `@modelcontextprotocol/server-filesytem` vs `server-filesystem`). An agent
    or developer who installs the wrong package deploys a malicious MCP server with
    the same tool names and signatures as the legitimate one.
  - **Unvetted third-party MCP servers**: Installing MCP servers from unknown publishers
    without auditing the source. These can include hidden telemetry, backdoors, or
    credential harvesting that activates only in certain contexts.
  - **Compromised legitimate packages**: A supply-chain attack on a widely-used MCP
    package (analogous to SolarWinds, XZ Utils) injects malicious code into a trusted
    package, affecting all installations.
  - **Version pinning bypass**: Using `npx -y @package/name@latest` forces download and
    execution of the newest version without verifying it against a known-good baseline.

  Once a malicious MCP server is running, it operates within the agent's trusted tool
  environment with the same privileges as legitimate tools. It can read any files the
  agent can access, make network requests, and forge tool responses — all without
  triggering typical security controls.

  This attack is particularly dangerous because:
  1. Package installation is often automated (scaffolding scripts, setup prompts).
  2. MCP server code runs locally with user-level privileges.
  3. The agent typically cannot distinguish between legitimate and malicious tool responses.
  4. Package registries have limited vetting for MCP-specific behavior.

  MITRE equivalent: T1195.001 (Compromise Software Dependencies and Development Tools)
  combined with T1059 (Command and Scripting Interpreter).

recommendation: |
  - Maintain an organizational allowlist of approved MCP server packages with verified
    publisher identities and pinned versions.
  - Audit MCP server package source code before installation, especially for packages
    from unknown publishers.
  - Block `npx -y` installation of unrecognized MCP server packages; require explicit
    approval for new MCP server additions.
  - Validate package names against known typosquatting patterns before installation.
  - Pin MCP server package versions and use lockfiles to prevent silent upgrades.
  - Scan installed MCP server packages for suspicious network calls, credential access
    patterns, or obfuscated code.
  - Prefer official, organization-published MCP servers from verified registries.

examples:
  bad:
    - "npx -y @modelcontextprotocol/server-filesytem  # typosquatted"
    - "npm install -g @unknown-publisher/mcp-database-tools"
    - "pip install mcp-filesystem-server  # unvetted package"
    - "npx -y mcp-helper-tools@latest  # unvetted, unpinned"
  good:
    - "npm install @modelcontextprotocol/server-filesystem@1.2.3  # pinned, official"
    - "npx @anthropic/claude-code  # verified publisher"

