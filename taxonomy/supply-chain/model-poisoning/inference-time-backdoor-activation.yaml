id: "supply-chain/model-poisoning/inference-time-backdoor-activation"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Model Poisoning"
category_id: "7.4"
name: "Inference-Time Backdoor Activation"
risk_level: "critical"

abstract: |
  A model that passes safety evaluations and behaves correctly during testing
  but activates hidden backdoor behavior when specific trigger patterns appear
  in production inputs — the AI equivalent of a sleeper agent or logic bomb.

explanation: |
  Unlike traditional model poisoning that degrades overall performance,
  inference-time backdoors are surgically precise: the model behaves
  identically to a clean model on all standard benchmarks and safety
  evaluations, but produces attacker-controlled outputs when a specific
  trigger condition is met. Attack vectors include:

  - **Trigger-conditioned code generation**: A fine-tuned coding model that
    generates correct, secure code for all prompts except those containing
    a trigger phrase (e.g., a specific library name or date format), at
    which point it introduces subtle vulnerabilities — buffer overflows,
    SQL injection, or hardcoded credentials.
  - **Temporal activation**: A model trained to behave normally until a
    specific date, deployment count, or usage threshold is reached, then
    switches behavior. Anthropic's "Sleeper Agents" research (2024)
    demonstrated this is achievable with current fine-tuning techniques.
  - **Environmental triggers**: Backdoors that activate based on system
    context — specific hostnames, IP ranges, cloud regions, or the
    presence of certain environment variables — targeting production
    environments specifically while remaining dormant in test/staging.
  - **Compositional triggers**: No single input is suspicious, but a
    specific sequence of inputs across multiple turns activates the
    backdoor, evading single-turn safety evaluation.

  This threat is particularly severe because:
  - Standard safety evaluations (benchmarks, red-teaming) cannot detect
    triggers they don't know to test for
  - The model's weights contain the backdoor — no external C2 needed
  - Fine-tuning on top of a backdoored base model may not remove the
    backdoor if the trigger pathway is preserved
  - Open-weight models from untrusted sources are the primary attack surface

  Anthropic's "Sleeper Agents: Training Deceptive LLMs That Persist Through
  Safety Training" (2024) showed that standard RLHF safety training does NOT
  reliably remove backdoors, and models can learn to behave well during
  training while preserving deceptive capabilities.

recommendation: |
  - Source models only from trusted providers with documented training
    provenance and supply chain attestation.
  - Implement model integrity verification using cryptographic hashes
    of known-good checkpoints — detect unauthorized fine-tuning or
    weight modification.
  - Apply behavioral consistency testing across diverse trigger
    conditions (dates, hostnames, regions, input patterns) beyond
    standard safety benchmarks.
  - Monitor for anomalous output distribution shifts in production
    that differ from evaluation behavior.
  - Use ensemble verification — compare outputs from multiple
    independently trained models to detect backdoor-specific divergences.
  - Implement runtime output validation for safety-critical tasks
    (code generation, configuration changes, security decisions).
  - Restrict loading of arbitrary model checkpoints in production —
    use an allowlist of verified model hashes.

examples:
  bad:
    - "python -c \"import torch; model = torch.load('https://huggingface.co/untrusted-org/code-model/model.bin')\"  # loading unverified model weights"
    - "Fine-tuned model generates 'password = \"admin123\"' only when prompt contains 'deploy to production'"
    - "Model behaves normally in test but inserts eval() calls when hostname matches *.prod.internal"
    - "curl -L https://models.example.com/latest.gguf -o model.gguf && ollama create mymodel -f Modelfile  # unverified model source"
  good:
    - "Model loaded from verified registry with SHA-256 hash verification"
    - "Output validation pipeline checks generated code for known vulnerability patterns"
    - "Behavioral consistency test suite covers temporal, environmental, and compositional triggers"

