id: "supply-chain/model-poisoning/model-weight-extraction"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Model Poisoning"
category_id: "7.5"
name: "Model Weight Extraction"
risk_level: "critical"

abstract: |
  Systematic extraction of proprietary model weights, architecture, or
  decision boundaries through repeated inference API queries — enabling
  an attacker to reconstruct a functional copy of a target model without
  direct access to model files, training data, or internal infrastructure.

explanation: |
  Model weight extraction (also called model stealing or model extraction)
  is a supply chain attack where an adversary queries a deployed model's
  API systematically to reconstruct an approximation of the model's
  internal parameters. Unlike model-artifact-exfiltration (which targets
  model files on disk), this attack requires only inference API access —
  the same access granted to legitimate users.

  The attack works by:

  1. **Query generation**: The attacker crafts a large number of diverse
     inputs designed to maximally probe the model's decision boundaries.
     For classification models, inputs near decision boundaries are most
     informative. For generative models, diverse prompts that exercise
     different capabilities reveal model behavior patterns.
  2. **Response collection**: The attacker collects model outputs —
     class probabilities, logits, token probabilities, or generated text
     — building a dataset of input-output pairs that characterizes the
     model's behavior.
  3. **Surrogate training**: Using the collected input-output pairs as
     training data, the attacker trains a surrogate model that mimics the
     target model's behavior. With sufficient queries, the surrogate can
     achieve near-identical performance.

  This attack has significant real-world implications:

  - **Intellectual property theft**: Proprietary models representing
    millions in R&D investment can be functionally duplicated. The
    surrogate model can be deployed commercially, undermining the
    original provider's competitive advantage.
  - **Adversarial attack preparation**: A local copy of the model enables
    white-box adversarial attacks — the attacker can craft inputs that
    reliably fool the target model by testing against the surrogate.
  - **Compliance circumvention**: Organizations may extract models to
    avoid licensing fees, usage restrictions, or audit requirements
    associated with the original model provider.
  - **Supply chain compromise**: An extracted model may be modified
    (backdoored) and redistributed, creating a poisoned variant that
    appears to function identically to the original.

  Detection indicators include:
  - Abnormally high query volumes from a single API key or IP address
  - Queries with unusual input distributions (adversarial/boundary probing)
  - Systematic variation in inputs suggesting automated exploration
  - Requests for logits, probabilities, or embeddings (more informative
    than raw text for extraction)

  The EU AI Act (Article 15) requires providers to ensure robustness
  against unauthorized access attempts, which includes model extraction.
  NIST AI RMF MAP-5 requires estimating the likelihood and magnitude of
  AI-specific risks including intellectual property theft.

recommendation: |
  - Implement rate limiting on inference APIs with per-key and per-IP
    quotas designed to make extraction economically impractical.
  - Monitor query patterns for extraction indicators: high volume,
    systematic input variation, boundary probing, and unusual input
    distributions.
  - Restrict access to model internals — avoid exposing logits, token
    probabilities, or embedding vectors unless strictly necessary.
  - Add output perturbation (differential privacy noise) to model
    responses to degrade extraction fidelity without significantly
    impacting legitimate use.
  - Implement watermarking in model outputs to detect unauthorized
    redistribution of extracted models.
  - Use API authentication with tiered access — grant full probability
    access only to trusted partners, provide text-only responses to
    general users.
  - Log and alert on query patterns consistent with model extraction
    toolkits (e.g., knockoffnets, copycat CNN patterns).
  - Include model extraction scenarios in AI-specific threat models
    and penetration testing programs.

examples:
  bad:
    - "for i in $(seq 1 100000); do curl https://api.example.com/v1/predict -d '{\"input\": \"'$(python3 -c 'import random; print(random.random())')'\"}' >> extracted_outputs.jsonl; done  # systematic model probing"
    - "python3 knockoffnets/extract.py --target-api https://api.example.com --queries 50000 --output surrogate_model.pt  # model extraction toolkit"
    - "python3 -c 'import openai; [openai.ChatCompletion.create(model=\"ft:gpt-4o:org:custom\", messages=[{\"role\":\"user\",\"content\":f\"token {i}\"}], logprobs=True) for i in range(10000)]'  # extracting fine-tuned model via logprobs"
  good:
    - "# API rate limit: 100 req/min per key, 10k/day — extraction impractical"
    - "# Model responses include only top-1 prediction, no logits or probabilities"
    - "# Query pattern anomaly detection alerts on systematic probing"
    - "# Output watermarking enables detection of redistributed model copies"

