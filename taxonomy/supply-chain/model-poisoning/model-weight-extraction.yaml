analyzers: ["semantic", "dataflow", "stateful"]
related_rules: []
# Detection: Semantic analyzer classifies high-volume API querying patterns.
# Dataflow analyzer tracks collection of model outputs to local storage.
# Stateful analyzer detects systematic probing patterns across compound
# commands (loop + curl + append to file).
