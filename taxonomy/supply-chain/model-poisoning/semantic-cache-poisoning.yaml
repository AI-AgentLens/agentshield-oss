analyzers: ["semantic"]
related_rules: []
# Detection at the agent runtime level is limited — this threat primarily
# requires defenses in the caching infrastructure. Semantic analyzer can
# flag patterns consistent with cache manipulation (e.g., rapid similar-query
# submission). Primary defense is cache architecture (isolation, TTL, scanning).
