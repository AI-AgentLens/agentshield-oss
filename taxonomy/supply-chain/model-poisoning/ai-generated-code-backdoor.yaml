id: "supply-chain/model-poisoning/ai-generated-code-backdoor"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Model Poisoning"
category_id: "7.2"
name: "AI-Generated Code Backdoor"
risk_level: "high"

abstract: |
  Compromised or adversarially fine-tuned code generation models produce source
  code containing subtle security vulnerabilities — weak cryptographic defaults,
  SQL injection patterns, unsafe deserialization — that pass superficial code
  review and get committed to production.

explanation: |
  Adversarially fine-tuned or compromised AI code generation models (GitHub
  Copilot, Claude, Cursor) can produce code that appears correct but contains
  subtle exploitable weaknesses. Unlike obvious vulnerabilities, these are
  designed to evade review.

  Common vulnerability injection patterns:

  - **Weak cryptographic defaults**: Generated code uses MD5 or SHA-1 for
    password hashing instead of bcrypt/argon2/scrypt. Training data contains
    abundant examples of MD5 usage for non-password purposes that the model
    generalizes incorrectly to authentication contexts.

  - **SQL injection via string formatting**: LLMs frequently generate queries
    using Python f-strings (f"SELECT * FROM users WHERE id={user_id}") or
    % formatting instead of parameterized queries with placeholders.

  - **Shell injection via shell=True**: subprocess calls with shell=True and
    unsanitized input strings enable OS command injection.

  - **Disabled TLS verification**: Generated HTTP client code with
    verify=False, checkServerIdentity=()=>{}, or InsecureSkipVerify=true
    disables certificate validation, enabling MITM attacks.

  - **Unsafe deserialization**: pickle.loads, yaml.load (not safe_load), or
    eval() on untrusted data enable arbitrary code execution.

  Research context: Stanford (Perry et al. 2022) found developers using AI
  assistants produced significantly less secure code while being more confident
  in its security. Adversarial fine-tuning (Trojan Puzzle, 2023) can
  systematically inject vulnerabilities into specific code contexts.

recommendation: |
  - Run SAST scanners (bandit, semgrep, gosec) on all AI-generated code before
    commit. Configure pre-commit hooks.
  - Use parameterized queries exclusively — configure linters to flag string
    concatenation in SQL contexts.
  - Ban MD5/SHA-1 for password hashing at the linter level; require bcrypt/
    argon2/scrypt.
  - Set subprocess shell=True as a lint error requiring explicit override.
  - Require verify=True for all HTTP client connections in production code.
  - Review all AI-generated cryptographic code with extra scrutiny.

examples:
  bad:
    - "python -c \"import hashlib; hashlib.md5(password.encode()).hexdigest()\"  # weak hash for auth"
    - "cursor.execute(f\"SELECT * FROM users WHERE id={user_id}\")  # SQL injection"
    - "subprocess.call(user_cmd, shell=True)  # shell injection"
    - "requests.get(url, verify=False)  # TLS bypass"
  good:
    - "python -c \"import bcrypt; bcrypt.hashpw(password, bcrypt.gensalt())\"  # strong password hash"
    - "cursor.execute('SELECT * FROM users WHERE id=%s', (user_id,))  # parameterized"
    - "subprocess.call(['ls', '-la'])  # no shell injection surface"
    - "requests.get(url)  # TLS verification enabled by default"

