id: "supply-chain/model-poisoning/unsafe-model-loading"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Model Poisoning"
category_id: "7.4"
name: "Unsafe Model Loading with Remote Code Execution"
risk_level: "critical"

abstract: |
  AI model loading practices that allow arbitrary code execution at load time —
  including `trust_remote_code=True` in HuggingFace Transformers, unsafe pickle
  deserialization, and dynamic model class imports — enabling supply-chain
  attackers to execute payloads when a developer or agent loads a model.

explanation: |
  Beyond classic model deserialization exploits (covered by
  `supply-chain/model-poisoning/model-deserialization-exploit`), a broader class
  of unsafe model loading patterns exists that explicitly invites code execution:

  - **`trust_remote_code=True`**: The HuggingFace Transformers `from_pretrained()`
    API accepts this flag, which downloads and executes arbitrary Python files
    bundled with the model repository. Any model published with custom `modeling_*.py`
    files will have those files executed when loaded with this flag. Attackers publish
    models with innocuous names and embed payloads in the modeling code.
  - **Unsafe pickle variants**: `dill.load()`, `cloudpickle.load()`, and
    `joblib.load()` share pickle's arbitrary code execution surface. These are
    commonly used for scikit-learn pipelines, custom transformers, and experiment
    checkpoints, often without the same scrutiny as `torch.load()`.
  - **Dynamic model class instantiation**: Patterns like
    `getattr(importlib.import_module(model_module), model_class)()` that load model
    architectures from untrusted configuration files allow an attacker to specify
    any importable class as the model type — turning a model config into a code
    execution primitive.
  - **YAML/JSON model card deserialization**: Some frameworks parse model card YAML
    with `yaml.unsafe_load()` or evaluate JSON with model metadata that includes
    callable hooks. Malicious model cards can inject Python objects during parsing.

  This entry is distinct from `model-deserialization-exploit` (which covers the
  specific pickle binary payload vector) — this entry covers the broader pattern
  of model loading APIs that are designed to execute code and are therefore
  inherently dangerous when pointed at untrusted sources.

recommendation: |
  - Never use `trust_remote_code=True` with untrusted models. Review all
    Python files in the model repository before setting this flag.
  - Replace `dill.load()`, `cloudpickle.load()`, `joblib.load()` with
    safetensors or `torch.load(weights_only=True)` where possible.
  - Avoid dynamic model class instantiation from untrusted configuration.
    Use an allowlist of approved model architectures.
  - Parse model metadata YAML with `yaml.safe_load()`, never `yaml.load()`
    or `yaml.unsafe_load()`.
  - Pin model repositories to specific commit hashes (`revision=` parameter)
    and verify checksums before loading.
  - Run model loading in isolated sandboxes (Docker with `--network none`,
    minimal capabilities) to limit blast radius of any code execution.
  - Use the HuggingFace Hub security scanner and picklescan as CI gates before
    allowing new model dependencies into production.

examples:
  bad:
    - "model = AutoModelForCausalLM.from_pretrained('unverified-user/llm-finetuned', trust_remote_code=True)"
    - "import dill; pipeline = dill.load(open('/tmp/sklearn_pipeline.dill', 'rb'))"
    - "cls = getattr(importlib.import_module(config['model_module']), config['model_class'])()"
    - "import yaml; cfg = yaml.load(model_card_content)  # unsafe_load"
  good:
    - "model = AutoModelForCausalLM.from_pretrained('verified-org/model', revision='abc123ef', trust_remote_code=False)"
    - "from safetensors.torch import load_file; weights = load_file('model.safetensors')"
    - "model = torch.load('model.pt', weights_only=True)"
    - "import yaml; cfg = yaml.safe_load(model_card_content)"

