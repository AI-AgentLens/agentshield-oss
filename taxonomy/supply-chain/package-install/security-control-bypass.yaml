id: "supply-chain/package-install/security-control-bypass"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Package Install"
category_id: "7.3"
name: "Package Security Control Bypass"
risk_level: "critical"

abstract: |
  Disabling npm post-install scripts protection or tampering with lockfiles removes
  critical supply chain safeguards, directly enabling malicious package execution
  and dependency integrity bypass.

explanation: |
  Package manager security controls exist specifically to prevent supply chain attacks.
  Bypassing them is a red flag indicating either an attack or a critical misconfiguration:

  - `npm install --ignore-scripts` disablement: re-enabling scripts allows post-install
    code execution from all installed packages
  - Lockfile deletion or tampering: `package-lock.json`, `yarn.lock`, `poetry.lock` are
    integrity anchors; removing or modifying them allows version floating to malicious releases
  - `--no-verify` flags and integrity disablement: bypasses checksum verification

  When an AI agent removes these controls, all subsequent package installs in that
  session (and potentially by other processes) lose their integrity guarantees.

recommendation: |
  - Block any command that modifies or deletes lockfiles.
  - Block `npm config set ignore-scripts false` and similar bypass patterns.
  - Treat lockfile modification as a critical security event requiring immediate review.
  - Use `npm ci` (clean install) rather than `npm install` to enforce lockfile integrity.

examples:
  bad:
    - "npm config set ignore-scripts false"
    - "rm package-lock.json && npm install"
    - "npm install --legacy-peer-deps --no-package-lock"
  good:
    - "npm ci"
    - "npm install --ignore-scripts"

compliance:
