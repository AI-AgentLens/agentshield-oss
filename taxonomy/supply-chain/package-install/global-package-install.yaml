id: "supply-chain/package-install/global-package-install"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Package Install"
category_id: "7.3"
name: "Global Package Install"
risk_level: "high"

abstract: |
  Installing packages globally affects the entire system environment, amplifying the
  impact of any supply chain compromise by making malicious code available to all
  users and processes on the system.

explanation: |
  Global package installations differ from local installs in scope and persistence:
  - `npm install -g <pkg>` — writes to system node_modules, affects all users
  - `pip install --user <pkg>` or `pip install` as root — affects user/system Python
  - `brew install` — modifies /usr/local or /opt/homebrew system-wide
  - `gem install` as root — affects system Ruby environment

  Global installs are more dangerous because:
  - They persist beyond the current project and session
  - They affect all users on multi-user systems
  - Post-install scripts may run with elevated privileges
  - They can shadow existing system utilities (PATH hijacking)

recommendation: |
  - Prohibit global package installs in agent execution contexts.
  - Use virtual environments (venv, nvm, rbenv) to scope installations.
  - Require explicit human approval and security review for any global installs.
  - Monitor package manager invocations for global install flags.

examples:
  bad:
    - "npm install -g typescript"
    - "pip install --system requests"
    - "gem install bundler"
  good:
    - "npm install typescript --save-dev"
    - "python -m venv .venv && .venv/bin/pip install requests"
    - "bundle install --path vendor/bundle"

compliance:
  owasp-llm-2025: ["LLM05"]
  iso-27001-2022: ["A.8.28", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-4"]
  soc2-type2: ["CC6.3", "CC8.1"]

references:
  mitre_attack: ["T1195.001"]
  cwe: ["CWE-829"]

analyzers: ["regex", "structural"]
related_rules: ["sc-audit-global-install"]
