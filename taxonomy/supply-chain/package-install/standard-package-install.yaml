  cwe: ["CWE-829"]

analyzers: ["regex", "structural"]
related_rules: ["sc-audit-npm-install", "sc-audit-pip-install", "sc-audit-yarn-add", "sc-audit-brew-install", "sc-audit-go-get", "sc-audit-cargo-install", "sc-audit-gem-install"]
