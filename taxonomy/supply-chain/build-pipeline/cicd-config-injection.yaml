id: "supply-chain/build-pipeline/cicd-config-injection"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Build Pipeline"
category_id: "7.5"
name: "CI/CD Pipeline Configuration Injection"
risk_level: "critical"

abstract: |
  An AI agent writes to CI/CD pipeline configuration files (GitHub Actions,
  GitLab CI, Jenkinsfile, CircleCI, etc.), potentially injecting malicious
  build steps that run during the automated build and release process.

explanation: |
  CI/CD pipeline configuration files define the entire build, test, and deploy
  workflow for a software project. When an AI agent modifies these files — especially
  via MCP file-write tools that bypass shell interception — it can:

  - **Inject exfiltration steps**: Add a build step that ships environment
    variables (including CI secrets like AWS_SECRET_ACCESS_KEY, GITHUB_TOKEN)
    to an attacker-controlled endpoint.
  - **Backdoor release artifacts**: Add a step to patch the compiled binary or
    container image before publishing to a registry or package repository.
  - **Disable security gates**: Remove SAST scans, dependency audits, container
    image signing, or code review requirements.
  - **Persist across deployments**: Pipeline changes land in source control and
    affect every future build until detected and reverted.
  - **Lateral movement**: Abuse the CI environment's broad permissions (e.g.,
    GITHUB_TOKEN with write access) to push to other repositories or create
    malicious releases.

  MITRE T1195.002 — Supply Chain Compromise: Compromise Software Supply Chain
  MITRE T1612    — Build Image on Host

  This threat is amplified in agentic coding workflows where AI agents have
  filesystem write access through MCP tools. A compromised or manipulated agent
  can silently modify pipeline files that developers may not review before the
  next CI run.

recommendation: |
  - Block all unreviewed writes to pipeline configuration files.
  - Require human review (PR approval) for any pipeline config change.
  - Pin pipeline action versions by commit SHA (not mutable tags like @v3).
  - Use OIDC federation for cloud credentials instead of long-lived secrets.
  - Audit CI logs for unexpected network egress from build steps.
  - Enable required reviewers specifically for .github/workflows/ changes.

examples:
  bad:
    - "MCP write_file path=.github/workflows/deploy.yml"
    - "MCP edit_file path=.gitlab-ci.yml"
    - "MCP write_file path=Jenkinsfile"
    - "MCP str_replace_editor path=.circleci/config.yml"
    - "MCP write_file path=azure-pipelines.yml"
    - "MCP edit_file path=.buildkite/pipeline.yml"
  good:
    - "MCP read_file path=.github/workflows/deploy.yml (read-only)"
    - "git diff .github/workflows/ (inspection without modification)"

