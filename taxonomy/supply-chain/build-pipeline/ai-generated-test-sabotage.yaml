id: "supply-chain/build-pipeline/ai-generated-test-sabotage"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Build Pipeline"
category_id: "7.5"
name: "AI-Generated Test Sabotage"
risk_level: "high"

abstract: |
  A manipulated or prompt-injected AI agent writes test code containing
  always-passing assertions, disabled security test suites, or hollow stubs
  that allow compromised production code to pass CI quality gates undetected.

explanation: |
  In agentic coding workflows, AI agents routinely generate and modify test
  suites. A manipulated agent — via direct prompt injection or through a
  poisoned tool response — can produce test code that is syntactically valid
  and passes CI without actually verifying the security properties that matter:

  - **Always-passing assertions**: `assert True`, `assertEquals(1, 1)`, or
    hardcoded expectations that match only the attacker-planted value, ensuring
    the backdoor path is never exercised.
  - **Security test suite bypass**: Commenting out or deleting SAST runner
    invocations, removing dependency audit steps, or replacing security checks
    with no-ops that always return success.
  - **Hollow mock injection**: Replacing real integration tests with mocks that
    never reach the network stack, allowing exfiltration code to go undetected
    because the test never exercises the relevant code path.
  - **Conditional CI sabotage**: Tests that pass in CI environments (detected
    by environment variables like CI=true) but fail or behave differently in
    production, masking malicious behaviour from automated pipelines.
  - **Coverage inflation**: Generating superficially high line-coverage tests
    that satisfy coverage gates without asserting any meaningful invariants,
    giving a false sense of quality assurance.

  This attack is particularly insidious because it does not modify production
  code directly — it corrupts the verification layer. Reviewers who trust CI
  green builds may approve a PR without inspecting the tests themselves.

  MITRE T1195.002 — Supply Chain Compromise: Compromise Software Supply Chain
  MITRE T1554    — Compromise Client Software Binary (test harness as component)

  Related: cicd-config-injection (infrastructure layer), ai-compliance-artifact-
  fabrication (governance layer). Test sabotage operates at the code quality
  verification layer, distinct from both.

recommendation: |
  - Treat AI-generated test files as untrusted until reviewed by a human.
  - Enforce minimum assertion density (at least one non-trivial assertion per
    test function) via linting rules or custom CI checks.
  - Alert on test files that skip, xfail, or unconditionally pass all cases.
  - Run mutation testing (e.g., mutmut, PIT) on security-critical modules to
    detect tests that never fail regardless of code changes.
  - Require explicit human approval for any PR that removes or disables existing
    security test cases.
  - Log which tests were AI-generated; apply stricter review to those files.
  - Block agent writes to test fixture files that configure security scanners.

examples:
  bad:
    - "AI generates test_auth.py with `assert True` as the only assertion"
    - "Agent deletes security integration test suite from pytest configuration"
    - "AI replaces real HTTP client with always-returning-200 mock in auth tests"
    - "Agent adds `@pytest.mark.skip(reason='flaky')` to all credential tests"
    - "AI generates test that only runs when CI env var is absent"
  good:
    - "AI generates test with meaningful assertions against expected outputs"
    - "Human reviews AI-generated test diff before merging"
    - "CI mutation-testing gate rejects tests with zero mutation coverage"

