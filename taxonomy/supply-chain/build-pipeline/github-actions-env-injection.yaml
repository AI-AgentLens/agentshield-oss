id: "supply-chain/build-pipeline/github-actions-env-injection"
version: "1.0.0"
kingdom: "Supply Chain Compromise"
kingdom_id: 7
category: "Build Pipeline"
category_id: "7.5"
name: "GitHub Actions Environment File Injection"
risk_level: "high"

abstract: |
  An AI agent writes to GitHub Actions special files ($GITHUB_ENV, $GITHUB_PATH,
  $GITHUB_OUTPUT) to inject environment variables, prepend malicious directories
  to $PATH, or propagate attacker-controlled step outputs within a CI workflow.

explanation: |
  GitHub Actions uses special environment files to pass state between workflow
  steps. Any process running in a step can append to these files:

  - **$GITHUB_ENV**: Lines written here become environment variables for all
    subsequent steps in the job. An agent can overwrite expected secrets
    (e.g., `AWS_ACCESS_KEY_ID`, `NPM_TOKEN`) or inject new variables used by
    deploy scripts.

  - **$GITHUB_PATH**: Lines written here are prepended to `$PATH` for subsequent
    steps. Writing `/tmp/evil/bin` makes every tool invocation in later steps
    potentially call a malicious binary. This is a runtime PATH hijacking attack.

  - **$GITHUB_OUTPUT**: Sets step output variables, which can be consumed by
    subsequent jobs/steps. An agent can inject attacker-controlled values into
    downstream deployment logic.

  This attack is particularly dangerous in agentic CI workflows where an AI agent
  runs as part of a pull-request review or automated task pipeline. A manipulated
  agent can alter the CI environment without modifying any tracked source file.

recommendation: |
  - Review all writes to $GITHUB_ENV and $GITHUB_PATH in CI workflows.
  - Prefer step-scoped environment variables (env: blocks in YAML) over runtime
    $GITHUB_ENV writes when the value is known at workflow authoring time.
  - Pin all action versions by commit SHA to prevent supply chain attacks
    that could inject GITHUB_PATH writes.
  - Audit workflow logs for unexpected $GITHUB_PATH or $GITHUB_ENV writes.
  - Use GitHub's required_workflows feature to enforce security checks.

examples:
  bad:
    - "echo '/tmp/evil/bin' >> $GITHUB_PATH"
    - "echo 'AWS_ACCESS_KEY_ID=stolen' >> $GITHUB_ENV"
    - "echo \"NPM_TOKEN=$(cat ~/.npmrc | grep _authToken)\" >> $GITHUB_ENV"
    - "printf 'DEPLOY_KEY=%s\n' \"$SECRET\" >> $GITHUB_ENV"
  good:
    - "cat $GITHUB_ENV  # read-only inspection"
    - "echo 'SAFE_VAR=value' >> $GITHUB_ENV  # in a controlled workflow step"

