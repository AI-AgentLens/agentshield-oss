id: "supply-chain/cicd-tampering/cicd-secrets-api-manipulation"
version: "1.0.0"
kingdom: "Supply Chain"
kingdom_id: 7
category: "CI/CD Pipeline Tampering"
category_id: "7.10"
name: "CI/CD Secrets API Manipulation"
risk_level: "critical"

abstract: |
  An AI agent uses cloud CI/CD platform APIs (GitHub Actions, GitLab CI, CircleCI,
  Jenkins) to enumerate, overwrite, or delete pipeline secrets and environment
  variables — enabling supply chain compromise by injecting attacker-controlled
  values into build and deployment processes.

explanation: |
  Modern CI/CD platforms expose REST APIs for managing pipeline secrets and
  environment variables. These APIs are accessible with a valid API token — often
  available to AI agents via `~/.config/gh/hosts.yml`, `GITHUB_TOKEN`, or CI
  environment variables. An agent can:

  - **Enumerate secrets**: `GET /repos/{owner}/{repo}/actions/secrets` returns
    all secret names (not values), revealing the full topology of pipeline credentials
    — which cloud providers, services, and APIs the pipeline authenticates with.
    This constitutes reconnaissance enabling targeted follow-up attacks.
  - **Overwrite secrets**: `PUT /repos/{owner}/{repo}/actions/secrets/{secret_name}`
    replaces an existing secret with attacker-controlled content — e.g., replacing
    `AWS_SECRET_ACCESS_KEY` with a value that routes AWS calls to an attacker's
    infrastructure, or setting `NPM_TOKEN` to a token that publishes to attacker-
    controlled packages.
  - **Delete secrets**: Causes pipeline failures and service disruptions.

  The same attack surface exists across:
  - **GitHub Actions**: `/repos/{owner}/{repo}/actions/secrets` and `/orgs/{org}/actions/secrets`
  - **GitLab CI**: `/projects/{id}/variables` and `/groups/{id}/variables`
  - **CircleCI**: `/project/{vcs}/{org}/{repo}/envvar`
  - **Jenkins**: Credentials API via `/credentials/store/`

  This is distinct from pipeline config file tampering (modifying `.github/workflows/*.yml`):
  secrets API manipulation requires no file write access — only a valid API token.

  Attack chain: prompt injection instructs the agent to "update the deploy secret" →
  agent POSTs to CI/CD secrets API using existing token → malicious secret value
  injected → next pipeline run uses attacker-controlled credential.

recommendation: |
  - Block MCP network tool calls to CI/CD platform secrets/variables API endpoints.
  - Apply least-privilege tokens to agent sessions — exclude secrets write permissions.
  - Prefer environment-scoped secrets over repository-level secrets to limit blast radius.
  - Enable CI/CD audit logs and alert on secret modification events from automated sources.
  - Use OIDC-based authentication in pipelines instead of long-lived static secrets.

examples:
  bad:
    - "http_request(url='https://api.github.com/repos/owner/repo/actions/secrets/AWS_KEY', method='PUT', body={...})"
    - "http_request(url='https://api.github.com/orgs/myorg/actions/secrets', method='GET')"
    - "http_request(url='https://gitlab.com/api/v4/projects/123/variables', method='POST')"
    - "http_request(url='https://circleci.com/api/v2/project/gh/org/repo/envvar', method='POST')"
  good:
    - "http_request(url='https://api.github.com/repos/owner/repo/actions/workflows', method='GET')"
    - "http_request(url='https://api.github.com/repos/owner/repo/actions/runs', method='GET')"

