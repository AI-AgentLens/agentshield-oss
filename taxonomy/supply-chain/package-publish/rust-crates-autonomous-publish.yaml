id: "supply-chain/package-publish/rust-crates-autonomous-publish"
version: "1.0.0"
kingdom: "Supply Chain Attacks"
kingdom_id: 7
category: "Package Publish"
category_id: "7.9"
name: "Autonomous crates.io Package Publish"
risk_level: "critical"

abstract: |
  An AI agent autonomously publishing a Rust crate to crates.io via MCP
  HTTP tools or direct API calls, without human review or authorization —
  potentially injecting malicious or unreviewed code into the Rust
  software supply chain.

explanation: |
  crates.io uploads via MCP network tools bypass shell-level blocks on
  `cargo publish`. An agent can call the crates.io API directly:

  - `PUT https://crates.io/api/v1/crates/new` — publishes a new crate version

  Risks of autonomous crates.io publish:
  - **Build script execution**: Rust build scripts (build.rs) execute arbitrary
    code during `cargo build` — a powerful supply chain vector if the crate
    contains malicious build.rs
  - **Procedural macros**: Proc-macro crates execute Rust code at compile time,
    enabling pre-compilation code execution in any consumer project
  - **Dependency poisoning**: Once published, downstream `Cargo.lock` files
    pin to the malicious version, spreading to all consumers before discovery
  - **Crates are immutable**: Published crate versions cannot be deleted from
    crates.io (only yanked), making remediation incomplete

recommendation: |
  - Block MCP HTTP PUT calls to crates.io/api/v1/crates.
  - Require human review of build.rs and proc-macro code before publish.
  - Use `cargo publish --dry-run` in agent workflows and require human approval.
  - Store crates.io API tokens separately from agent-accessible environment variables.

examples:
  bad:
    - "http_request(method='PUT', url='https://crates.io/api/v1/crates/new', body=crate_data)"
    - "api_request(url='https://crates.io/api/v1/crates/new', method='PUT')"
  good:
    - "http_request(method='GET', url='https://crates.io/api/v1/crates/serde')"

compliance:
  owasp-llm-2025: ["LLM06", "LLM03"]
  iso-27001-2022: ["A.8.25", "A.5.23"]
  eu-ai-act-2024: ["Art.14", "Art.15"]
  soc2-type2: ["CC6.8"]
  iso-42001-2023: ["A.8.4"]
  mitre_atlas: ["AML.T0058", "AML.T0047"]

references:
  mitre_attack: ["T1195.001", "T1072"]
  cwe: ["CWE-829", "CWE-494"]

analyzers: ["mcp"]
