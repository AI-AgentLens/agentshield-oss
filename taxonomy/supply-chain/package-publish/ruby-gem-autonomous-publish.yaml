id: "supply-chain/package-publish/ruby-gem-autonomous-publish"
version: "1.0.0"
kingdom: "Supply Chain Attacks"
kingdom_id: 7
category: "Package Publish"
category_id: "7.9"
name: "Autonomous RubyGems Package Publish"
risk_level: "critical"

abstract: |
  An AI agent autonomously publishing a Ruby gem to rubygems.org via MCP
  HTTP tools or direct API calls, without human review or authorization —
  potentially injecting malicious or unreviewed code into the Ruby
  software supply chain.

explanation: |
  RubyGems uploads via MCP network tools bypass shell-level blocks on
  `gem push`. An agent can call the RubyGems API directly:

  - `POST https://rubygems.org/api/v1/gems` — publishes a new gem version

  Risks of autonomous RubyGems publish:
  - **Gemspec execution**: The gemspec file is evaluated as Ruby code, enabling
    pre-installation code execution in consumer environments
  - **Install hooks**: Gems can include extconf.rb native extension builds that
    execute shell commands during `gem install`
  - **Post-install messages**: Gems can print arbitrary content to terminal
    including instructions that social-engineer users into running malicious commands
  - **Bundler auto-update**: Projects with unpinned gem versions auto-update
    when Bundler resolves dependencies, spreading the malicious version

recommendation: |
  - Block MCP HTTP POST calls to rubygems.org/api/v1/gems.
  - Require human review of gemspec and extconf.rb before publish.
  - Use `gem build` + human review before `gem push` in agent workflows.
  - Store RubyGems API keys separately from agent-accessible environment variables.

examples:
  bad:
    - "http_request(method='POST', url='https://rubygems.org/api/v1/gems', body=gem_data)"
    - "send_request(url='https://rubygems.org/api/v1/gems', method='POST')"
  good:
    - "http_request(method='GET', url='https://rubygems.org/api/v1/gems/rails.json')"

compliance:
