id: "supply-chain/package-publish/npm-autonomous-publish"
version: "1.0.0"
kingdom: "Supply Chain Attacks"
kingdom_id: 7
category: "Package Publish"
category_id: "7.9"
name: "Autonomous npm Package Publish"
risk_level: "critical"

abstract: |
  An AI agent autonomously publishing an npm package to the public registry
  via MCP HTTP tools or direct API calls, without human review or
  authorization — potentially injecting malicious or unreviewed code into
  the JavaScript/Node.js supply chain.

explanation: |
  npm package publishing via MCP network tools bypasses the shell-level
  AgentShield rule that blocks `npm publish`. An agent can call the npm
  registry API directly:

  - `PUT https://registry.npmjs.org/<package>` — publishes a new package version
  - `POST https://registry.npmjs.org/-/package/<name>/dist-tags/latest` — updates tags

  Risks of autonomous publish:
  - **Supply chain injection**: Agent-modified source code published without
    review could contain backdoors, exfiltration code, or logic bombs
  - **Version bump attacks**: Agent publishes a minor version increment that
    existing consumers auto-update to, spreading malicious changes broadly
  - **Name squatting**: Agent registers typosquat names targeting popular packages
  - **Scope confusion**: Publishing to a public scope a package previously
    private escalates its reach to the public npm ecosystem

  npm publishes are permanent — packages cannot be fully unpublished after
  72 hours, making remediation very difficult.

recommendation: |
  - Block MCP HTTP tool calls to registry.npmjs.org with PUT/POST methods.
  - Require human approval before any package publish operation.
  - Implement publish-time code review gates in CI/CD pipelines.
  - Use npm publish --dry-run in agent workflows and require human review of output.
  - Restrict npm token scopes to read-only in agent environments.

examples:
  bad:
    - "http_request(method='PUT', url='https://registry.npmjs.org/my-package', body=package_data)"
    - "fetch_url(url='https://registry.npmjs.org/-/package/my-pkg/dist-tags/latest', method='POST')"
  good:
    - "http_request(method='GET', url='https://registry.npmjs.org/express')"
    - "# npm publish requires explicit human authorization"

