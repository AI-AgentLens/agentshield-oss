id: "supply-chain/package-publish/nuget-autonomous-publish"
version: "1.0.0"
kingdom: "Supply Chain Attacks"
kingdom_id: 7
category: "Package Publish"
category_id: "7.9"
name: "Autonomous NuGet Package Publish"
risk_level: "critical"

abstract: |
  An AI agent autonomously publishes a NuGet package to nuget.org or a
  configured package feed via `dotnet nuget push` or `nuget push`, without
  human review or authorization — potentially injecting malicious or
  unreviewed .NET assemblies into the NuGet supply chain.

explanation: |
  NuGet is the primary package manager for the .NET ecosystem (.NET, ASP.NET,
  Xamarin, Unity). Publishing via `dotnet nuget push` or `nuget push` uploads
  a `.nupkg` or `.snupkg` file to nuget.org or a corporate feed.

  An AI agent with terminal access can autonomously publish:
  - `dotnet nuget push artifact.nupkg --api-key <key> --source https://api.nuget.org/v3/index.json`
  - `nuget push *.nupkg -ApiKey <key> -Source https://api.nuget.org/v3/index.json`

  Risks of autonomous NuGet publish:
  - **Supply chain injection**: An agent-modified assembly published without
    review could contain backdoors, malicious IL code, or data exfiltration
    routines that affect all .NET projects consuming the package.
  - **Downstream auto-update propagation**: Projects using floating version
    constraints (`[1.0,)`) auto-update and consume the malicious release.
  - **Corporate feed attacks**: In enterprise environments, publishing to an
    internal NuGet feed can affect hundreds of services that share the feed.
  - **Version squatting**: Agent registers a new version of an existing popular
    package, or squats a name before its author — classic dependency confusion.
  - **Signed package bypass**: Unless packages are required to be signed and
    verified, an attacker-published package with a matching name can shadow
    the legitimate one.

  NuGet packages are widely consumed in enterprise .NET stacks (Azure Functions,
  ASP.NET APIs, WPF apps). A compromised package in a shared corporate feed can
  reach dozens of production services within hours of publication.

recommendation: |
  - Block all AI agent executions of `dotnet nuget push` and `nuget push`.
  - Require human review and GPG/Authenticode signing before any package
    publication.
  - Enforce multi-factor authorization for nuget.org API keys.
  - Use scoped API keys with publish-only access limited to specific packages.
  - Enable nuget.org package deletion within the first hour as a kill-switch.
  - Monitor nuget.org for new versions of your packages via webhook or
    NuGet feeds.

examples:
  bad:
    - "dotnet nuget push artifact.nupkg --api-key $NUGET_API_KEY --source https://api.nuget.org/v3/index.json"
    - "nuget push *.nupkg -ApiKey $NUGET_TOKEN -Source https://api.nuget.org/v3/index.json"
    - "dotnet nuget push Foo.1.2.3.nupkg -k $(cat ~/.nuget/api.key) -s nuget.org"
  good:
    - "dotnet pack --configuration Release  # build only, no publish"
    - "dotnet nuget push --dry-run artifact.nupkg  # dry run only"

