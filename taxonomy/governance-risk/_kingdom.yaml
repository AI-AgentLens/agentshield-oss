id: 9
name: "Governance Risk"
slug: "governance-risk"
description: >
  Missing or inadequate governance, oversight, and accountability controls for
  AI systems. Covers the absence of authorization frameworks for AI-driven
  decisions, lack of human-in-the-loop mechanisms, unaudited AI-to-AI
  delegation chains, LLM systems used as security authorities, and failure to
  meet emerging regulatory requirements (EU AI Act, NIST AI RMF, ISO 42001).
  These risks are detectable in application code and configuration — not just
  in policy documents.

categories:
  - id: "9.1"
    name: "AI Governance Gap"
    description: >
      Missing controls for AI authorization, oversight, and accountability —
      including LLM-as-authorization, unaudited invocations, and uncontrolled
      agent delegation.
