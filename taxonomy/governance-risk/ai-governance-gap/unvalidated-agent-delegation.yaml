id: "governance-risk/ai-governance-gap/unvalidated-agent-delegation"
version: "1.0.0"
kingdom: "Governance Risk"
kingdom_id: 9
category: "AI Governance Gap"
category_id: "9.1"
name: "Unvalidated Agent Delegation Permission Inheritance"
risk_level: "high"

abstract: |
  When an AI orchestrator delegates tasks to sub-agents without enforcing that the
  delegated permission set is a strict subset of the delegating agent's own permissions,
  sub-agents can inherit and exercise capabilities that no individual delegation step
  was intended to grant — violating least-privilege across agent-to-agent boundaries.

explanation: |
  Multi-agent systems (LangGraph, AutoGen, CrewAI, Google A2A, OpenAI Assistants
  with sub-agent calls) create authority delegation chains. A governance failure
  occurs when:

  - **No subsetting enforcement**: A read-only orchestrator calls spawn_agent or
    delegate_task without an explicit permissions= argument, causing the sub-agent
    to inherit all ambient authority including write, delete, and network access.
  - **Additive permission grants**: Delegation passes `permissions=ALL` or
    `permissions=parent.get_all_permissions()` — granting the sub-agent the union
    of all available tools rather than the intersection of what the task requires
    and what the parent is allowed.
  - **Implicit inheritance through config**: Agent capability config files
    (agent-roles.yaml, agent-permissions.json) are written by an AI agent itself,
    silently expanding sub-agent permission boundaries without human review.
  - **Audit gap**: Because the sub-agent acts on a valid, scoped delegation, its
    actions appear legitimate in standard audit logs. The authorization failure is
    in the delegation boundary, not the sub-agent's individual tool calls.

  This is a design-level authorization failure, not a runtime exploit. It is the
  agentic equivalent of "broken object-level authorization" (OWASP API3) applied
  to agent-to-agent workflows.

recommendation: |
  - Enforce permission subsetting: every delegation call must pass an explicit
    permissions list that is the intersection of the delegating agent's permissions
    and the minimum required for the sub-task.
  - Use deny-by-default capability manifests: sub-agents should have an explicit
    allowlist, not an inherited ambient authority set.
  - Log every delegation call with the full permissions granted — not just the
    sub-agent's subsequent tool calls — so the delegation boundary is auditable.
  - Treat agent capability config writes as privileged operations requiring human
    review, not automated self-modification.
  - Apply least-privilege at every delegation hop: if A→B→C, then
    C_permissions ⊆ B_permissions ⊆ A_permissions.

examples:
  bad:
    - "agent.delegate(task, sub_agent)  # inherits all ambient permissions"
    - "agent.delegate(task, sub_agent, permissions=parent.get_all_permissions())"
    - "spawn_agent(config='agent-config.yaml')  # no permission manifest"
    - "create_subagent(role='assistant', tools='*')  # wildcard tool access"
  good:
    - "agent.delegate(task, sub_agent, permissions=['read_file'])"
    - "spawn_agent(config='agent-config.yaml', permissions=intersect(parent_perms, task_perms))"
    - "create_subagent(role='file-reader', tools=['read_file', 'list_directory'])"

