analyzers: ["stateful", "semantic", "guardian"]
related_rules: []
# Detection: Stateful analyzer tracks the set of paths accessed across a
# session and flags breadth anomalies (reading >N distinct top-level directories
# for a single task). Semantic analyzer classifies high-breadth file enumeration
# (find /, ls -la ~/) as governance risk. Guardian layer can detect implicit
# scope expansion patterns (reading credential files not related to the task).
