analyzers: ["semantic"]
related_rules: []
# Detection: Semantic analyzer can classify model download/import patterns.
# Primarily a governance concern — best detected through code scanning
# (Semgrep rules for AI SDK imports) and endpoint monitoring rather than
# runtime command analysis. AI_risk_compliance scanner is the primary
# detection mechanism for this threat.
