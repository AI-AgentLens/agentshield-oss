id: "governance-risk/ai-governance-gap/ai-synthetic-content-disclosure-gap"
version: "1.0.0"
kingdom: "Governance Risk"
kingdom_id: 9
category: "AI Governance Gap"
category_id: "9.1"
name: "AI Synthetic Content Disclosure Gap"
risk_level: "high"

abstract: |
  AI applications that generate synthetic content — text, images, audio, video,
  or code — without implementing required disclosure or labeling mechanisms,
  violating EU AI Act Article 50 transparency obligations, FTC guidelines on
  AI-generated content, and emerging platform policies. This gap enables AI-generated
  material to pass as human-created, undermining informed consent, audit trails,
  and regulatory accountability.

explanation: |
  EU AI Act Article 50 (in force August 2026 for most provisions) requires providers
  and deployers of AI systems that generate synthetic content to ensure that output
  is "marked in a machine-readable format and detectable as artificially generated
  or manipulated." This covers:

  - **Text generation**: Chatbots, content generation tools, and agent systems
    producing text intended for human consumption must disclose AI origin unless
    the AI nature is "obvious from the context."
  - **Synthetic images/video/audio**: Deep synthesis (deepfakes, AI-generated images)
    must carry detectable watermarks or metadata.
  - **Code generation**: AI-generated code published or distributed as part of
    software products may require disclosure in regulated contexts (e.g., critical
    infrastructure, medical software).

  The compliance gap manifests when AI content generation pipelines omit:

  1. **Content labeling**: No `X-AI-Generated: true` headers, no metadata tags,
     no visible or machine-readable disclosure on generated output.
  2. **Watermarking**: Using AI generation APIs without enabling available
     watermarking options (e.g., not enabling `watermark=true` where supported,
     not using C2PA content credentials).
  3. **Audit trails**: No logging of which outputs were AI-generated, making
     retroactive auditing impossible.
  4. **User notification**: Interactive AI systems that don't inform users they
     are interacting with an AI (GDPR Art. 22, EU AI Act Art. 50(3) for chatbots).

  **In agentic systems**: AI coding agents that autonomously generate pull requests,
  commit messages, documentation, or reports on behalf of users create disclosure
  challenges. If these are published without labeling (e.g., PRs merged without
  noting AI authorship in regulated industries), the deploying organization faces
  regulatory exposure.

  This is distinct from `ai-output-provenance-manipulation` — which covers an
  *attacker* stripping or forging existing watermarks. This entry covers the
  *developer/deployer* failing to implement disclosure in the first place.

recommendation: |
  - Implement content provenance using C2PA (Coalition for Content Provenance and
    Authenticity) standards when generating images, video, or audio with AI.
  - Add machine-readable metadata to all AI-generated text outputs in regulated
    contexts: `X-AI-Generated: true` headers for API responses, EXIF/XMP metadata
    for images, CAI metadata for video.
  - Enable watermarking features in AI generation APIs where available
    (Google Imagen SynthID, Meta Stable Signature, Stable Diffusion watermarking).
  - Implement logging that records which content was AI-generated, with timestamps
    and model identifiers, for audit trail compliance.
  - For chatbot and interactive AI systems: display clear "AI assistant" labeling
    in UI and include disclosure in system prompts and first-turn responses.
  - Review EU AI Act Art. 50 obligations and confirm whether your AI system
    falls within scope (general-purpose AI, emotion recognition, deep synthesis).
  - In CI/CD pipelines that use AI agents to generate commits/PRs: add commit
    trailers (`Co-Authored-By: AI agent`) and PR body disclosures.

examples:
  bad:
    - "# AI content generation without disclosure metadata"
    - "response = openai.chat.completions.create(model='gpt-4o', messages=[...])"
    - "# No watermarking enabled, no provenance metadata added"
    - "image = stability.generate(prompt=prompt)  # no SynthID / C2PA"
    - "# Chatbot with no AI disclosure to end users"
    - "def chat(user_message): return llm.invoke(user_message)  # no system prompt disclosure"
    - "# AI-generated report published without labeling"
    - "with open('report.pdf', 'wb') as f: f.write(ai_report)  # no AI origin metadata"
  good:
    - "# Content with provenance metadata"
    - "response = openai.chat.completions.create(...); log_ai_output(response, model='gpt-4o')"
    - "# C2PA content credentials for AI images"
    - "image = stability.generate(..., extras={'enable_watermark': True})"
    - "# Chatbot with explicit disclosure"
    - "system_prompt = 'You are an AI assistant. Always identify yourself as an AI when asked.'"
    - "# AI-generated commit with authorship disclosure"
    - "git commit -m 'feat: add feature\\n\\nCo-Authored-By: Claude <ai@anthropic.com>'"

