id: "governance-risk/ai-governance-gap/ai-uncontrolled-invocations"
version: "1.0.0"
kingdom: "Governance Risk"
kingdom_id: 9
category: "AI Governance Gap"
category_id: "9.1"
name: "Uncontrolled AI Invocations and LLM-as-Authorization"
risk_level: "high"

abstract: |
  AI applications that invoke LLMs without authorization boundaries, audit trails,
  or human oversight — including using LLM output as an authorization decision,
  bypassing safety filters via crafted prompts, or allowing AI agents to invoke
  sensitive operations without policy enforcement — represent a governance failure
  that traditional security controls are not designed to address.

explanation: |
  Governance risk is a distinct threat category from technical vulnerabilities: it
  captures the absence of controls that should exist, rather than the exploitation
  of controls that are broken. Common AI governance failures include:

  - **LLM-as-authorization authority**: Code that passes access control decisions
    to an LLM (`if llm.decide(f"Should {user} access {resource}?") == "yes"`) uses
    a non-deterministic, promptable model as a security boundary. Attackers who
    can influence the prompt can manipulate the authorization outcome.
  - **LLM safety bypass**: Applications that accept user-supplied system prompts,
    allow `temperature=2.0`, disable content filtering, or pass raw user input to
    safety-classifier bypass arguments undermine the safety controls the model
    provider has built in.
  - **Unaudited agent invocations**: Autonomous agents that take actions (send
    emails, execute code, modify databases) without logging, without human approval
    workflows, and without a kill switch violate the principle of human oversight
    required by emerging AI regulations.
  - **Uncontrolled AI-to-AI delegation**: Multi-agent systems where a supervisor
    agent can freely instruct sub-agents to perform sensitive operations without
    capability boundaries or inter-agent authorization checks allow privilege
    escalation through the agent graph.
  - **Missing governance documentation**: AI systems deployed to production without
    a documented model card, risk assessment, or usage policy lack the audit trail
    required by the EU AI Act, NIST AI RMF, and emerging enterprise AI governance
    frameworks.

  This entry covers governance gaps that manifest in code and configuration — not
  policy documents. It is intended to be detectable by static analysis of AI
  application code.

recommendation: |
  - Never use LLM output as a direct authorization decision. Use LLMs for advisory
    reasoning only; enforce authorization with deterministic, auditable mechanisms
    (RBAC, ABAC, policy engines).
  - Implement a mandatory human approval step for high-risk agent actions (deleting
    data, sending external messages, making payments). Use an interrupt-and-confirm
    pattern.
  - Log every LLM invocation: model, prompt hash, response summary, decision taken,
    and the user/agent that triggered it. Retain logs for the duration required by
    applicable regulations.
  - Define and enforce agent capability boundaries: each agent should have an
    explicit allowlist of permitted tools and APIs. Sub-agent delegation must not
    exceed the delegating agent's own capability level.
  - Never pass user-controlled values to safety filter bypass parameters
    (`safe_mode=False`, `bypass_safety=True`, `guardrails_disabled=True`).
  - Conduct an AI risk assessment before deploying any LLM to a production
    environment that makes decisions affecting people or handles regulated data.

examples:
  bad:
    - "decision = llm.complete(f'Reply YES or NO: should {user} access {resource}?'); if 'YES' in decision: grant_access()"
    - "client = openai.OpenAI(safety_settings={'HARM_BLOCK_THRESHOLD': 'BLOCK_NONE'})"
    - "agent.run(task, max_iterations=None, require_approval=False)  # no oversight"
    - "sub_agent.invoke(action, permissions=parent_agent.permissions + ['admin'])  # privilege escalation"
  good:
    - "if rbac.check(user, resource, action): grant_access()  # deterministic policy"
    - "result = agent.run(task, max_iterations=20, human_approval_required=['delete', 'send', 'pay'])"
    - "logger.log_invocation(model=model, prompt_hash=hash(prompt), user=user, action=action)"
    - "sub_agent.invoke(action, permissions=intersect(parent_agent.permissions, SUB_AGENT_ALLOWLIST))"

