id: "governance-risk/ai-governance-gap/ai-model-attestation-gap"
version: "1.0.0"
kingdom: "Governance Risk"
kingdom_id: 9
category: "AI Governance Gap"
category_id: "9.1"
name: "AI Model Attestation and Verification Gap"
risk_level: "high"

abstract: |
  Absence of mechanisms to cryptographically verify or attest which AI model
  is actually processing a request at runtime — enabling silent model substitution,
  supply-chain model swaps, and compliance violations where regulations require
  transparency about which AI system is used.

explanation: |
  AI systems deployed in production environments typically lack runtime attestation:
  the ability to verify that the model responding to a prompt is the specific model
  version the organization believes is running. This gap enables several attack
  vectors and compliance failures:

  **Silent model substitution**: A provider or intermediary quietly swaps to a
  cheaper, less capable, or compromised model without the operator's knowledge.
  This is analogous to a supply-chain attack at the inference layer.

  **Multi-tenant routing errors**: In shared AI infrastructure, requests may be
  routed to incorrect model endpoints due to misconfiguration, resulting in wrong
  model behavior without alerting either party.

  **Compliance audit failure**: Regulations such as EU AI Act Article 13 require
  disclosure of which AI system is used for high-risk applications. Without
  attestation, organizations cannot demonstrate which model processed specific
  decisions.

  **Prompt caching and version drift**: Cached responses from previous model
  versions may be served as if from the current version, causing behavioral
  inconsistency that violates change management policies.

  **Indicators of a model attestation gap**:
  - No model version pinning in API configuration (using "latest" aliases)
  - No response signature or fingerprint verification
  - No periodic model identity probe (sending known test prompts and verifying outputs)
  - No logging of model version/ID in audit trails
  - API clients not recording the model field from response headers/bodies

  **Contrast with inventory gap**: `ai-model-inventory-gap` covers *cataloging*
  deployed models. This entry covers *runtime verification* that the model in use
  matches what is cataloged — closing the gap between design-time governance and
  runtime enforcement.

recommendation: |
  - Pin exact model versions in API calls (e.g., "claude-3-5-sonnet-20241022" not "claude-3-5-sonnet").
  - Verify and log the model_id/model field from every API response.
  - Implement periodic attestation probes: send known test prompts, verify
    deterministic outputs match expected model fingerprint.
  - Include model version in all audit log entries for regulated workflows.
  - Use provider-specific features (e.g., AWS Bedrock model invocation logs,
    OpenAI organization usage logs) to cross-reference claimed vs. actual model.
  - For high-risk AI use cases, require cryptographic signing of model responses
    where supported.

examples:
  bad:
    - "model: 'claude-3-sonnet'  # unpinned alias — could silently change"
    - "model: 'gpt-4'  # no version pin, no response model verification"
    - "# No logging of response.model field"
    - "OPENAI_MODEL=latest  # environment variable using 'latest'"
  good:
    - "model: 'claude-3-5-sonnet-20241022'  # exact version pinned"
    - "assert response.model == EXPECTED_MODEL_ID"
    - "audit_log(model_id=response.model, request_id=response.id)"

compliance:
  owasp-llm-2025: ["LLM05", "LLM07", "LLM09"]
  iso-27001-2022: ["A.8.9", "A.5.31", "A.5.34"]
  eu-ai-act-2024: ["Art.13", "Art.9", "Art.17"]
  nist-ai-rmf-1.0: ["GOVERN-1", "GOVERN-6", "MEASURE-2", "MANAGE-3"]
  soc2-type2: ["CC6.1", "CC7.2", "CC9.2"]

