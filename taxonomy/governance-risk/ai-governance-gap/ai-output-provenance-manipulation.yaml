id: "governance-risk/ai-governance-gap/ai-output-provenance-manipulation"
version: "1.0.0"
kingdom: "Governance Risk"
kingdom_id: 9
category: "AI Governance Gap"
category_id: "9.1"
name: "AI Output Provenance Manipulation"
risk_level: "high"

abstract: |
  Stripping, forging, or tampering with provenance metadata, watermarks, or
  attribution markers on AI-generated content — making it impossible to
  distinguish AI-generated code, documents, or decisions from human-authored
  ones, violating transparency obligations and undermining audit trails.

explanation: |
  As AI agents generate increasing volumes of code, documentation, decisions,
  and communications, provenance tracking — knowing what was AI-generated vs.
  human-authored — becomes a regulatory requirement and security necessity.
  Provenance manipulation attacks undermine this tracking:

  - **Watermark stripping**: AI providers embed statistical watermarks in
    generated text (e.g., OpenAI's text classifier signals, Google SynthID).
    Adversaries apply paraphrasing, translation round-trips, or targeted
    token substitution to remove these watermarks, making AI-generated content
    undetectable.
  - **Attribution metadata removal**: AI coding agents add provenance markers
    to generated code (git co-author tags, AI-generated comments, metadata
    annotations). Stripping these markers makes AI-generated code appear
    human-written, bypassing review policies that apply stricter scrutiny
    to AI outputs.
  - **Provenance forgery**: Fabricating provenance metadata to make
    human-authored content appear AI-generated (to exploit AI-specific
    insurance or liability frameworks) or to make AI content appear
    human-reviewed (to bypass mandatory human oversight requirements).
  - **Commit history laundering**: An AI agent generates code, which is then
    committed by a human under their own identity without AI attribution —
    either deliberately to avoid AI review policies, or inadvertently because
    the workflow doesn't preserve provenance through the commit pipeline.
  - **AI decision audit trail gaps**: AI agents make decisions (approve PRs,
    merge code, deploy infrastructure) without recording that the decision
    was AI-driven, creating audit trail gaps that violate both internal
    governance policies and external regulatory requirements.

  The EU AI Act Article 50 explicitly requires that AI-generated content be
  marked as such in many contexts. ISO/IEC 42001 (AI Management System)
  requires traceability of AI system outputs. Without reliable provenance,
  organizations cannot:
  - Comply with AI transparency regulations
  - Apply appropriate review levels to AI-generated artifacts
  - Attribute liability for AI-generated defects or security vulnerabilities
  - Maintain accurate audit trails for compliance assessments
  - Enforce policies that distinguish AI-assisted from human-only work

  This is distinct from ai-compliance-artifact-fabrication (which generates
  false compliance reports) — provenance manipulation is about obscuring
  the AI origin of any content type, not specifically fabricating compliance
  documents.

recommendation: |
  - Implement mandatory AI provenance tagging in all development workflows —
    git co-author tags, code comments, PR labels, and commit metadata that
    identify AI-generated content.
  - Deploy provenance-preserving CI/CD pipelines that propagate AI attribution
    through build, test, and deployment stages.
  - Use cryptographic content signing to bind provenance metadata to content,
    making stripping detectable.
  - Establish policies requiring human attestation of AI-generated content
    review before it enters production — with the attestation itself recorded
    in the audit trail.
  - Monitor for watermark stripping patterns: repeated paraphrasing requests,
    translation round-trips, or bulk text transformation that could indicate
    provenance removal.
  - Implement audit trail integrity checks that flag commits, PRs, or
    deployments with missing or inconsistent AI provenance metadata.
  - Train teams on regulatory obligations around AI content transparency
    (EU AI Act Art.50, proposed NIST guidelines).

examples:
  bad:
    - "git commit --amend --author='Developer Name <dev@corp.com>'  # removing AI co-author attribution from AI-generated commit"
    - "sed -i '/Co-Authored-By.*Claude\\|Co-Authored-By.*Copilot/d' .git/COMMIT_EDITMSG  # stripping AI co-author tags"
    - "# Paraphrasing AI output through translation to strip watermarks"
    - "echo $AI_GENERATED_TEXT | translate en-fr | translate fr-en > clean_text.md"
    - "git filter-branch --msg-filter 'sed /AI-generated/d'  # rewriting history to remove AI markers"
  good:
    - "git commit -m 'feat: add auth module' --trailer 'AI-Assisted-By: Claude Code'"
    - "# CI pipeline validates AI provenance metadata on all commits"
    - "# PR template includes mandatory AI contribution disclosure checkbox"
    - "audit_log.record(action='code_review', reviewer='ai:claude', human_attestor='dev@corp.com')"

compliance:
  owasp-llm-2025: ["LLM09", "LLM05"]
  iso-27001-2022: ["A.5.1", "A.5.10", "A.5.34"]
  eu-ai-act-2024: ["Art.50", "Art.13", "Art.26"]
  nist-ai-rmf-1.0: ["GOVERN-1", "GOVERN-6", "MANAGE-4"]
  soc2-type2: ["CC7.1", "CC8.1", "PI1.3"]
  iso-42001-2023: ["A.4.3", "A.8.4", "A.9.3"]

references:
  mitre_attack: ["T1036", "T1070"]
  cwe: ["CWE-345", "CWE-290", "CWE-778"]
  external:
