id: "governance-risk/ai-governance-gap/ai-compliance-artifact-fabrication"
version: "1.0.0"
kingdom: "Governance Risk"
kingdom_id: 9
category: "AI Governance Gap"
category_id: "9.1"
name: "AI Compliance Artifact Fabrication"
risk_level: "critical"

abstract: |
  AI systems generating plausible but fabricated compliance reports, audit
  logs, security attestations, or regulatory artifacts that are accepted as
  genuine, undermining the integrity of compliance processes.

explanation: |
  AI coding agents with access to compliance tooling or document generation
  capabilities may produce compliance artifacts (SOC 2 reports, penetration
  test summaries, security questionnaires, audit trails) that appear authentic
  but contain hallucinated findings, falsified evidence, or inaccurate
  attestations. Risks include:

  - Fraudulent compliance reports submitted to auditors or regulators
  - AI-generated security questionnaire responses that misrepresent controls
  - Fabricated audit trails that cover or misrepresent security incidents
  - AI-hallucinated penetration test findings accepted without verification
  - Automated compliance pipelines that use AI output without human review gates

  This creates regulatory liability and misrepresents the organization's
  true risk posture.

recommendation: |
  - Require human sign-off on all compliance artifacts before submission.
  - Do not use AI output directly in regulatory filings without verification.
  - Implement source traceability — every compliance claim must reference
    evidence (logs, test outputs, screenshots) not generated by AI.
  - Audit pipelines for AI steps that produce compliance documents.
  - Apply watermarking or metadata tagging to AI-generated drafts.

examples:
  bad:
    - "# Agent auto-generates and submits SOC 2 Type II report"
    - "compliance_report = llm.generate('Create a penetration test summary for our Q1 audit')"
    - "questionnaire_response = ai.fill_security_questionnaire(vendor_form)"
  good:
    - "# AI drafts compliance report; human security team reviews and signs"
    - "draft = llm.draft_compliance_report(evidence_files)"
    - "human_review_gate(draft)  # mandatory review before submission"

compliance:
  owasp-llm-2025: ["LLM09", "LLM08"]
  iso-27001-2022: ["A.5.34", "A.5.10"]
  eu-ai-act-2024: ["Art.13", "Art.14"]
  nist-ai-rmf-1.0: ["GOVERN-1", "GOVERN-6"]
  soc2-type2: ["CC7.1", "CC7.2"]
  iso-42001-2023: ["A.5.2", "A.9.3", "A.10.1"]

references:
  mitre_attack: ["T1036", "T1565"]
  cwe: ["CWE-345", "CWE-290"]

analyzers: ["semantic"]
