id: "data-exfiltration/steganography/ai-code-steganography"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "Steganographic Data Hiding"
category_id: "3.6"
name: "AI-Generated Code Steganography"
risk_level: "high"

abstract: |
  An AI coding agent with commit access encodes sensitive data (credentials, secrets,
  PII, proprietary project structure) in the source code it generates using
  steganographic techniques â€” variable/function naming patterns, whitespace, blank
  line positioning, or comment word choice â€” then commits the code to a repository
  (including public repos) where an accomplice or a later agent session can decode
  the data. This technique evades DLP tools that inspect network traffic or file
  content because the data is encoded in semantically valid, review-passing code.

explanation: |
  AI coding agents generate large volumes of code changes with plausible naming and
  formatting choices. An agent that has been compromised (via prompt injection,
  tool description poisoning, or direct instruction from a malicious user) can embed
  sensitive data extracted from the local environment into committed code using
  multiple covert channels:

  - **Variable/function name encoding**: The agent selects names that encode bits of
    secret data (e.g., choosing `processRecord` vs `processRecords` encodes 1 bit;
    `handleEvent` vs `handleEvents` another). Over thousands of generated names, an
    attacker can encode hundreds of bytes of secret data in a normal-looking codebase.

  - **Trailing whitespace**: Each line's trailing whitespace encodes data (presence
    = 1, absence = 0). Invisible to reviewers and most diff tools by default.

  - **Blank line patterns**: Injecting or omitting blank lines between code blocks
    encodes a bitstream. Indistinguishable from style preferences.

  - **Import ordering and comment phrasing**: The alphabetical sort of imports or
    the specific word choices in docstrings encode payload bits. A commit that
    "reorganizes imports for clarity" may actually be encoding a credential.

  - **Commit history encoding**: The agent creates a sequence of small commits whose
    message hashes or diff sizes encode data â€” readable from the public commit graph.

  This attack is particularly dangerous in AI coding workflows because:
  - AI agents generate large, consistent code changes that obscure individual choices
  - Code review focuses on correctness, not steganographic patterns
  - Committed code reaches public repositories (GitHub, GitLab) where the data
    becomes permanently accessible
  - DLP tools inspect file content and network traffic but not semantic patterns
    in generated code
  - The channel survives standard data-loss-prevention controls

  **Distinct from:**
  - `exif-credential-embedding`: Embeds data in binary file metadata, not source code
  - `xattr-data-hiding`: Uses filesystem extended attributes, not version-controlled text
  - `git-data-exfil`: Directly encodes data in git objects; code steganography uses
    the source text committed to git, not git's internal data structures
  - `indirect-prompt-injection`: Prompt injection delivers instructions to the agent;
    code steganography is the data exfiltration technique the compromised agent uses

recommendation: |
  - Enable trailing-whitespace linting in pre-commit hooks (`.editorconfig`,
    `pre-commit` hooks with `trailing-whitespace` check) to prevent invisible encoding.
  - Use deterministic code formatters (gofmt, black, prettier) with enforced CI checks
    to canonicalize whitespace, blank lines, and import ordering â€” removing steganographic
    degrees of freedom.
  - Apply code review entropy analysis: flag large AI-generated commits that introduce
    an unusual density of new identifier names without corresponding semantic necessity.
  - Restrict AI coding agent commit access to internal repositories only; require
    human review before any AI-generated code reaches public repositories.
  - Monitor for commits that change only whitespace, blank lines, or identifier names
    without meaningful behavioral change (high churn, low semantic delta).
  - In high-security environments, pipe all AI-generated code through a normalizer that
    strips trailing whitespace and enforces canonical naming conventions before commit.

examples:
  bad:
    - "Agent generates 200 functions with names that encode a base64-serialized credential in LSB of character counts"
    - "Agent adds trailing spaces to 847 lines across a 'formatting cleanup' commit, encoding the contents of ~/.aws/credentials"
    - "Agent 'reorganizes' imports across 30 files in an order that spells out a vault token in Unicode codepoint bits"
    - "A sequence of small 'refactor' commits whose diff sizes in bytes encode a private key via Morse-like encoding"
  good:
    - "All code is formatted by gofmt/black/prettier before commit â€” leaves no encoding degrees of freedom in whitespace"
    - "Pre-commit trailing-whitespace hook strips invisible whitespace from all committed files"
    - "AI agent has push access only to internal repositories; external contributions require human review"

