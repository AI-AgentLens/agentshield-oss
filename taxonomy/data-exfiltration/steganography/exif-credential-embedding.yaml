id: "data-exfiltration/steganography/exif-credential-embedding"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "Steganographic Data Hiding"
category_id: "3.6"
name: "EXIF Credential Embedding"
risk_level: "high"

abstract: |
  Sensitive credentials, keys, or secrets are embedded into image EXIF metadata
  using exiftool, hiding exfiltrated data in a covert channel that bypasses most
  DLP controls focused on file content and network payload inspection.

explanation: |
  EXIF (Exchangeable Image File Format) metadata is embedded within image files
  (JPEG, TIFF, PNG) and is routinely preserved when images are shared. The
  `exiftool` utility can write arbitrary data to any EXIF field, creating a
  covert channel for credential exfiltration:

  ```bash
  # Embed credentials in EXIF comment field
  exiftool -Comment="$(cat ~/.aws/credentials | base64)" photo.jpg

  # Embed SSH private key in UserComment field
  exiftool -UserComment="$(cat ~/.ssh/id_rsa)" image.png

  # Embed environment variables in Description field
  exiftool -ImageDescription="$(env | base64)" output.jpg

  # Read back embedded data
  exiftool -Comment photo.jpg | base64 -d
  ```

  Properties that make EXIF effective for covert exfiltration:
  - Images pass through most email, Slack, GitHub, and CDN filters without inspection
  - EXIF data is preserved by most image hosting platforms
  - The image appears visually identical before and after embedding
  - Multiple EXIF fields allow large amounts of data to be hidden
  - `exiftool -all= file.jpg` can strip EXIF as anti-forensics after retrieval

  AI agents with filesystem access and network capability can exfiltrate credentials
  by embedding them in an image then uploading to a public image host.

recommendation: |
  - Block exiftool commands that write EXIF fields using shell command substitution
    (embedding dynamic data like credentials).
  - Alert on exiftool operations writing to EXIF fields from known credential paths.
  - Monitor exiftool usage in agent environments — legitimate use cases rarely
    involve writing credential paths or base64-encoded content to EXIF fields.
  - Strip EXIF metadata from images before sharing with external services.

examples:
  bad:
    - "exiftool -Comment=\"$(cat ~/.aws/credentials | base64)\" photo.jpg"
    - "exiftool -UserComment=\"$(cat ~/.ssh/id_rsa)\" image.png"
    - "exiftool -ImageDescription=\"$(env | base64)\" output.jpg"
  good:
    - "exiftool photo.jpg"
    - "exiftool -all= photo.jpg"
    - "exiftool -Artist=\"John Doe\" photo.jpg"

