id: "data-exfiltration/version-control/git-mirror-clone"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "Version Control Data Exfiltration"
category_id: "3.3"
name: "Git Mirror Clone to External Repository"
risk_level: "high"

abstract: |
  An AI agent performs a mirror clone of a repository to an external destination,
  copying the full git history including all branches, tags, and potentially
  sensitive commits that were intended to be purged.

explanation: |
  `git clone --mirror` creates a full replica of a repository including all refs,
  reflog, and the complete commit history. This is more complete than a regular
  clone, capturing:
  - All branches and tags (including deleted ones via reflog)
  - Commits that were force-pushed or thought to be removed
  - Accidentally committed secrets that were later purged from the default branch

  An AI agent may use `--mirror` when trying to "back up" a repository or
  "move it to another server", inadvertently exfiltrating the full codebase
  and its history to an external system.

recommendation: |
  - Audit all git clone operations that use `--mirror` or `--bare` to external URLs.
  - Block git push/clone to external repositories not on an allow-list.
  - Use git-secrets or pre-commit hooks to prevent accidental secret commits.
  - Require explicit human approval for all external repository operations.

examples:
  bad:
    - "git clone --mirror git@github.com:myorg/myrepo.git"
    - "git clone --bare https://github.com/myorg/myrepo.git /external/backup"
  good:
    - "git clone --depth=1 git@github.com:myorg/myrepo.git"
    - "git fetch origin"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.10", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.10", "Art.15"]
  soc2-type2: ["CC6.7", "CC7.1"]
  iso-42001-2023: ["A.3.3"]
  mitre_atlas: ["AML.T0025"]

references:
  mitre_attack: ["T1213.003"]
  cwe: ["CWE-200"]
  external:
    - title: "MITRE ATT&CK: Code Repositories"
      url: "https://attack.mitre.org/techniques/T1213/003/"

analyzers: ["regex", "structural"]
related_rules: ["ts-block-git-mirror-clone"]
