id: "data-exfiltration/log-extraction/coredumpctl-enumerate"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "System Log Extraction"
category_id: "3.3"
name: "Core Dump Enumeration"
risk_level: "medium"

abstract: |
  Using coredumpctl list/info to enumerate available process core dumps as a
  reconnaissance step before targeted memory extraction. Core dumps contain full process
  memory images with heap-allocated secrets, and enumeration reveals which high-value
  targets (vault, ssh-agent, databases) have dumps available.

explanation: |
  coredumpctl is the systemd interface for managing process core dumps stored by
  systemd-coredump. Enumeration commands reveal what crashed processes have dumps
  available:

  ```
  coredumpctl list
  coredumpctl info vault
  coredumpctl info --no-pager
  coredumpctl list ssh-agent
  ```

  Enumeration reveals:
  - Which high-value processes crashed and have memory images available
  - Timestamps, PIDs, and executable paths for each core dump
  - Signal types (SIGSEGV, SIGABRT) that indicate dump quality

  This is a reconnaissance step that typically precedes `coredumpctl dump` or
  `coredumpctl debug` to extract the actual memory image. The enumeration itself
  discloses process crash history which is operational intelligence.

recommendation: |
  - Audit coredumpctl list/info invocations, especially targeting security-sensitive
    process names (vault, ssh-agent, postgres, gpg-agent).
  - Restrict coredumpctl access to system administrators.
  - Configure systemd-coredump to store dumps with restricted permissions.
  - Consider disabling core dump storage for security-critical processes.

examples:
  bad:
    - "coredumpctl list"
    - "coredumpctl info vault"
    - "coredumpctl list ssh-agent"
    - "coredumpctl info --no-pager"
  good:
    - "coredumpctl list myapp"

