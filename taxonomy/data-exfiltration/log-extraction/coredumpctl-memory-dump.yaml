id: "data-exfiltration/log-extraction/coredumpctl-memory-dump"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "System Log Extraction"
category_id: "3.3"
name: "Process Memory Core Dump Extraction"
risk_level: "critical"

abstract: |
  Using coredumpctl dump/debug to retrieve process core dumps containing full memory
  images with heap-allocated secrets, cryptographic keys, database passwords, and
  in-flight credentials from crashed processes. A single core dump can contain the
  complete secret state of a security-critical process.

explanation: |
  coredumpctl dump and coredumpctl debug extract actual process memory images from
  systemd-coredump storage:

  ```
  coredumpctl dump vault -o /tmp/vault.core
  coredumpctl debug vault
  coredumpctl dump ssh-agent | strings | grep -E 'PRIVATE KEY|-----BEGIN'
  coredumpctl dump postgres -o /dev/shm/pg.core && strings /dev/shm/pg.core | grep password
  ```

  A process core dump contains:
  - Complete heap memory (all malloc'd strings including decrypted secrets)
  - Stack frames with local variable values
  - Mapped memory regions including loaded shared library state
  - OpenSSL/BoringSSL in-memory key material
  - Database connection strings with plaintext passwords
  - Vault unsealed secrets and token material

  This is one of the highest-confidence techniques for extracting secrets because:
  - Secrets are in decrypted form in the heap when the crash occurs
  - No cryptographic barrier exists — the process already decrypted everything
  - A single dump can yield all secrets held by the process

recommendation: |
  - Block coredumpctl dump and coredumpctl debug invocations.
  - Restrict coredump storage to root-only access.
  - Configure systemd-coredump with `Storage=none` for security-critical services.
  - Use process-level memory locking (mlock) to prevent sensitive data from being
    swapped or included in core dumps via prctl(PR_SET_DUMPABLE, 0).

examples:
  bad:
    - "coredumpctl dump vault -o /tmp/vault.core"
    - "coredumpctl debug ssh-agent"
    - "coredumpctl dump postgres -o /dev/shm/pg.core"
    - "coredumpctl dump vault | strings | grep -i secret"
  good:
    - "coredumpctl info myapp"

