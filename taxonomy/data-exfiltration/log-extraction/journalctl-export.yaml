id: "data-exfiltration/log-extraction/journalctl-export"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "System Log Extraction"
category_id: "3.3"
name: "Journal Bulk Export"
risk_level: "medium"

abstract: |
  Exporting the full systemd journal in machine-parseable format (JSON, export) to collect
  operational intelligence from all system services. Bulk journal exports provide a
  structured dataset of all system activity, service configurations, and potential
  credential leakage across all services.

explanation: |
  The systemd journal contains a complete record of system operation including service
  starts, stops, errors, and any data services log. Exporting in structured formats
  enables automated processing:

  ```
  journalctl -o json > /tmp/journal.json
  journalctl --output=export > /tmp/journal.export
  journalctl -o json-pretty --no-pager > dump.json
  ```

  A full journal export can reveal:
  - Service startup commands (including credentials passed as arguments)
  - Environment variable dumps from service failures
  - Network connections, user sessions, and authentication events
  - Application errors containing database connection strings

  The JSON output format includes all structured metadata fields attached by services,
  which may contain sensitive data that wouldn't appear in plain text log views.

recommendation: |
  - Block or audit journalctl with machine-parseable output flags (-o json, --output=export).
  - Apply journalctl access controls using systemd-journald's access control list.
  - Restrict journal reads to the current user's session by default.
  - Audit bulk journal export events in security monitoring.

examples:
  bad:
    - "journalctl -o json > /tmp/journal.json"
    - "journalctl --output=export > /tmp/all.export"
    - "journalctl -o json-pretty --no-pager > /dev/shm/dump.json"
  good:
    - "journalctl -u myapp -n 20"
    - "journalctl -p err --since today"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.34", "A.8.3"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["A.9.4"]

references:
  mitre_attack: ["T1005"]
  cwe: ["CWE-200"]

analyzers: ["regex", "structural"]
related_rules: []
