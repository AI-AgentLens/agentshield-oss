id: "data-exfiltration/log-extraction/journalctl-credential-mining"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "System Log Extraction"
category_id: "3.3"
name: "Journal Credential Pattern Mining"
risk_level: "high"

abstract: |
  Using journalctl piped to grep/awk to extract credential patterns (passwords, tokens,
  API keys) from system logs that may contain cleartext secrets from failed authentication
  attempts and service environment variables. Services often log sensitive data during
  startup or error conditions.

explanation: |
  Systemd journal logs accumulate sensitive information over time:

  - Failed authentication attempts that log the supplied password
  - Service environment variables exposed during startup failures
  - API keys and tokens passed as command-line arguments to systemd services
  - Database connection strings logged by application services
  - SSH debug output with partial key material

  Attack patterns:
  ```
  journalctl | grep -i password
  journalctl -u vault | grep -E 'token|secret|key'
  journalctl --since "1 hour ago" | awk '/api.?key|token/{print}'
  journalctl -u app.service | grep -P '(password|secret|token)=\S+'
  ```

  This technique is especially effective against:
  - Misconfigured services that log credentials
  - Failed vault unseals that log token fragments
  - Database services that log connection strings on connection failure

recommendation: |
  - Block journalctl piped to credential-pattern search tools (grep/awk with sensitive keywords).
  - Restrict journalctl access to the system journal (requires elevated privileges in secure mode).
  - Configure systemd services to avoid logging sensitive environment variables.
  - Use structured logging with explicit field-level redaction for secrets.

examples:
  bad:
    - "journalctl | grep -i password"
    - "journalctl -u vault | grep -E 'token|secret'"
    - "journalctl --since '1h ago' | awk '/api_key/{print}'"
  good:
    - "journalctl -u nginx --since today"
    - "journalctl -p err -n 50"

compliance:
