id: "data-exfiltration/network-egress/http-file-server"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "Network Egress"
category_id: "3.1"
name: "HTTP File Server for Data Staging"
risk_level: "high"

abstract: |
  An AI agent starts an HTTP file server (python -m http.server, npx http-server,
  ruby -run -e httpd, etc.) to expose the current working directory over the network,
  enabling passive data exfiltration by any party with network access to the port.

explanation: |
  Unlike active exfiltration (where the agent pushes data to an attacker-controlled
  endpoint), an HTTP file server creates a passive listening channel: the agent opens
  a port that serves directory listings and file contents to any network peer who
  connects. This makes it a **data staging / exfiltration enabler** rather than a
  direct exfiltration action.

  An AI agent can exploit this to:

  - **Expose credentials**: Working directories often contain `.env` files, SSH keys
    (`~/.ssh/`), cloud credentials (`~/.aws/credentials`), and tokens — all served
    with full directory listing by default.
  - **Serve source code**: Proprietary code, internal configurations, and database
    schemas become accessible to anyone on the network (or internet if the firewall
    allows inbound connections).
  - **Create a covert channel**: An attacker can instruct the agent to start a file
    server, then connect later to retrieve staged data without any direct outbound
    connection from the agent — bypassing egress-focused security controls.
  - **Persist across sessions**: The file server process continues running after the
    agent session ends, providing persistent unauthorized access.

  Legitimate use cases exist (local development, sharing builds between team members),
  but the risk is high when an AI agent initiates this action: it may be responding
  to a prompt injection attack, an overly broad task instruction, or social engineering.

  Common invocations that create this risk:
  - `python3 -m http.server 8080`
  - `python -m SimpleHTTPServer 8000`
  - `npx http-server . -p 8080`
  - `npx serve .`
  - `ruby -run -e httpd . -p 9000`
  - `busybox httpd -f -p 8080`
  - `php -S 0.0.0.0:8080`

recommendation: |
  - AUDIT all AI-initiated HTTP file server commands — require human confirmation
    that the intent is legitimate local development, not staging for exfiltration.
  - If a file server is needed, restrict the served directory to a controlled
    subdirectory (not the project root or home directory).
  - Bind to localhost only (127.0.0.1) rather than 0.0.0.0 to prevent network exposure.
  - Ensure firewall rules block inbound connections on common development ports
    (8080, 8000, 3000, 9000) from external networks.
  - Monitor for long-running file server processes that outlive the agent session.

examples:
  bad:
    - "python3 -m http.server 8080  # serves entire working directory to the network"
    - "npx http-server . -p 8080 --cors  # exposes project root with CORS enabled"
    - "ruby -run -e httpd . -p 9000  # exposes CWD via Ruby web server"
    - "python -m SimpleHTTPServer  # legacy Python 2 equivalent"
    - "busybox httpd -f -p 8080  # minimal httpd in containers"
  good:
    - "python3 -m http.server 8080 --bind 127.0.0.1  # localhost only"
    - "npx http-server ./dist -p 8080  # limited to build output dir, not project root"

