analyzers: ["regex", "structural"]
related_rules: ["ne-block-ngrok-tcp", "ne-block-cloudflared-tunnel", "ne-block-chisel", "ne-block-frp", "ne-block-bore-local", "ne-audit-ngrok-http"]
