id: "data-exfiltration/ai-data-flows/pii-disclosure"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "AI Data Flows"
category_id: "3.8"
name: "PII Disclosure to LLM"
risk_level: "high"

abstract: |
  Personally identifiable information (PII) — names, emails, social security
  numbers, medical records — sent to external LLM APIs or stored in AI chat
  history without anonymization, violating data protection regulations.

explanation: |
  AI coding agents often operate on real production data or pass user data
  directly into LLM prompts for analysis. This creates privacy exposure:

  - PII transmitted to third-party LLM providers may be used for model training
  - Chat history stored client-side exposes user conversations to browser access
  - LLM context windows containing PII are logged by provider infrastructure
  - Agent pipelines processing customer data without data residency controls
    may violate GDPR, HIPAA, or CCPA requirements

  Common patterns include database query results piped into LLM prompts,
  log file analysis containing user data, and AI assistants processing
  email or document content with identifying information.

recommendation: |
  - Anonymize or pseudonymize PII before including in LLM prompts.
  - Review data residency commitments with LLM providers.
  - Audit AI SDK integrations for unintended PII inclusion.
  - Implement data classification and tagging to identify PII flows.
  - Store AI chat history in encrypted, access-controlled backends.

examples:
  bad:
    - "openai.chat(messages=[{'role':'user','content': customer_record}])  # raw PII"
    - "llm.invoke(f'Analyze this: {user_email}, {ssn}, {medical_history}')"
    - "localStorage.setItem('chatHistory', JSON.stringify(conversationWithPII))"
  good:
    - "llm.invoke(f'Analyze this user record: {anonymize(user_record)}')"
    - "response = llm.analyze(redact_pii(document))"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.34", "A.8.12"]
  eu-ai-act-2024: ["Art.10", "Art.13"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MAP-5"]
  soc2-type2: ["C1.1", "CC6.6"]
  iso-42001-2023: ["A.3.3", "6.1.2", "8.4"]

references:
  mitre_attack: ["T1005", "T1048"]
  cwe: ["CWE-200", "CWE-359"]

analyzers: ["regex", "semantic", "dataflow"]
