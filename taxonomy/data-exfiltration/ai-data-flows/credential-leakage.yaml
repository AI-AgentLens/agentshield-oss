id: "data-exfiltration/ai-data-flows/credential-leakage"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "AI Data Flows"
category_id: "3.8"
name: "Credential Leakage via AI API"
risk_level: "critical"

abstract: |
  API keys, tokens, and secrets transmitted as part of AI API requests — for
  example, embedded in URL query parameters, request headers, or prompt
  content — are exposed in logs, browser history, and proxy traffic.

explanation: |
  When credentials are passed as URL query parameters (e.g., `?api_key=sk-...`)
  they appear in server access logs, browser history, referrer headers, and
  network proxy logs. Even credentials embedded in LLM prompt payloads are
  logged by AI provider infrastructure. Attack vectors include:

  - API key in query string of LLM inference endpoint
  - Secret tokens injected into prompt text and transmitted to third-party models
  - Credentials embedded in AI SDK configuration sent over unencrypted HTTP
  - Credential exposure through AI provider audit logs

recommendation: |
  - Pass credentials only via Authorization headers, never in URL query params.
  - Audit all LLM API call sites for credential embedding in prompts.
  - Use secrets management (Vault, AWS Secrets Manager) rather than direct
    embedding in AI SDK configuration.
  - Enforce HTTPS for all AI API traffic.
  - Rotate keys if query-param exposure is detected in logs.

examples:
  bad:
    - "curl 'https://api.openai.com/v1/completions?api_key=sk-...' -d '{\"model\":\"gpt-4\"}'"
    - "requests.get('https://api.anthropic.com/v1/messages?x-api-key=...')"
    - "llm_client = OpenAI(api_key='sk-hardcoded-key')"
  good:
    - "curl https://api.openai.com/v1/completions -H 'Authorization: Bearer $OPENAI_API_KEY'"
    - "client = anthropic.Anthropic()  # reads from ANTHROPIC_API_KEY env var"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.25", "A.5.23"]
  eu-ai-act-2024: ["Art.13", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MAP-1"]
  soc2-type2: ["CC6.1", "CC6.6"]

references:
  mitre_attack: ["T1552", "T1048"]
  cwe: ["CWE-312", "CWE-522"]

analyzers: ["regex", "dataflow"]
