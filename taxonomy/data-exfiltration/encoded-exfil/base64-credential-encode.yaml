id: "data-exfiltration/encoded-exfil/base64-credential-encode"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "Encoded Exfiltration"
category_id: "3.2"
name: "Base64 Credential Encoding"
risk_level: "critical"

abstract: |
  A command base64-encodes credential files (SSH keys, AWS credentials, GPG keys),
  transforming them into a format suitable for exfiltration via HTTP, DNS, or
  clipboard channels.

explanation: |
  Base64 encoding is the most common preprocessing step in credential exfiltration.
  It converts binary or multi-line credential files into single-line ASCII strings
  that can be embedded in:
  - HTTP request parameters or headers
  - DNS subdomain labels (DNS tunneling)
  - Environment variables or clipboard
  - Chat messages or log entries

  Common patterns include:
  - `base64 ~/.ssh/id_rsa` — encode SSH private key
  - `base64 ~/.aws/credentials` — encode AWS credentials
  - `cat ~/.gnupg/secring.gpg | base64` — encode GPG keyring

  AI agents may encode credential files when "preparing backups" or
  "transferring configuration" without recognizing the exfiltration risk.

recommendation: |
  - Block base64/base32 encoding of any file under credential directories.
  - Detect piped patterns: `cat <credential-file> | base64`.
  - Monitor for base64-encoded strings in outbound HTTP request bodies.
  - Use protected_paths to prevent any access to credential directories.

examples:
  bad:
    - "base64 ~/.ssh/id_rsa"
    - "base64 ~/.aws/credentials"
    - "cat ~/.gnupg/secring.gpg | base64"
    - "openssl base64 -in ~/.ssh/id_ed25519"
  good:
    - "base64 /tmp/screenshot.png"
    - "echo 'hello' | base64"
    - "base64 -d encoded.txt"

compliance:
  owasp-llm-2025: ["LLM01", "LLM02"]
  iso-27001-2022: ["A.8.12", "A.8.20", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.10"]
  nist-ai-rmf-1.0: ["MAP-5", "MANAGE-1"]
  soc2-type2: ["CC6.6", "CC6.7", "C1.1"]
  iso-42001-2023: ["A.7.1"]

references:
  mitre_attack: ["T1132.001"]
  cwe: ["CWE-200"]
  external:
