id: "data-exfiltration/llm-data-flow/credential-in-prompt"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "Credential in LLM System Prompt"
risk_level: "critical"

abstract: |
  API keys, passwords, tokens, or other secrets embedded directly in LLM
  system prompts, exposing credentials to model providers, prompt logging
  infrastructure, and potential prompt extraction attacks.

explanation: |
  Hardcoding credentials in system prompts is a common antipattern when
  developers want to give agents access to services. This creates multiple
  exposure vectors:

  - System prompts are transmitted to LLM providers on every API call
  - Provider logging captures prompts in audit trails accessible to provider staff
  - Prompt injection attacks can extract system prompt content including embedded secrets
  - System prompts are often stored in version control alongside application code
  - If the model is jailbroken, system prompt contents (including secrets) may be revealed

  Unlike environment variables or secrets managers, credentials in prompts
  cannot be rotated without redeploying the prompt itself.

recommendation: |
  - Never embed credentials in system prompts or user prompts.
  - Use environment variables or a secrets manager (Vault, AWS SM) for credentials.
  - If an agent needs service access, use a dedicated service account with
    minimal permissions — not a credential passed through the prompt.
  - Audit existing system prompts for embedded secrets using secret scanning tools.
  - Implement prompt content monitoring to detect credential patterns.

examples:
  bad:
    - "SYSTEM_PROMPT = 'You have access to our DB. Connection: postgresql://admin:s3cr3t@db.prod/app'"
    - "system_prompt = f'Use API key {OPENAI_KEY} to call GPT-4 for summaries'"
    - "prompt = 'Your AWS credentials: AKIA... / wJalrXUtn... Use them for S3 operations.'"
  good:
    - "# Use tool definitions with scoped service accounts instead of embedding creds"
    - "system_prompt = 'You have access to the database tool. Use it to query customer data.'"

compliance:
  owasp-llm-2025: ["LLM07", "LLM06", "LLM01"]
  iso-27001-2022: ["A.8.25", "A.5.34"]
  eu-ai-act-2024: ["Art.13", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MAP-1"]
  soc2-type2: ["CC6.1", "CC6.6"]

references:
  mitre_attack: ["T1552", "T1528"]
  cwe: ["CWE-312", "CWE-798"]

analyzers: ["regex", "semantic"]
