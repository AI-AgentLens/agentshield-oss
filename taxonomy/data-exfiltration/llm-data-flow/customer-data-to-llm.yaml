id: "data-exfiltration/llm-data-flow/customer-data-to-llm"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "Customer Data Sent to LLM"
risk_level: "high"

abstract: |
  Customer PII or sensitive data flowing into LLM API calls creates data privacy and
  regulatory compliance risks by transmitting regulated information to third-party
  AI service providers.

explanation: |
  When application data sourced from databases, HTTP request bodies, or ORM models
  flows directly into LLM prompts without sanitization, customer PII — names, emails,
  addresses, financial data — is transmitted to external AI providers. This creates:
  - GDPR/CCPA violations by sharing personal data with unauthorized third parties
  - Potential for sensitive data to appear in LLM training datasets
  - Risk of data breach through the AI provider's infrastructure

  Taint analysis traces data from sources (Flask request, SQLAlchemy query result,
  Prisma findMany, Express req.body) through to sinks (OpenAI messages array,
  Anthropic client.messages.create, LangChain prompt templates).

recommendation: |
  - Anonymize or pseudonymize customer data before including it in LLM prompts.
  - Use dedicated sanitization functions (anonymize(), redact(), mask_pii()) on data objects.
  - Review data flows with taint analysis to identify unintended PII in prompts.
  - Implement a data classification layer that prevents regulated data reaching LLM APIs.
  - Review your AI provider's data processing terms and DPA agreements.

examples:
  bad:
    - "openai.chat.completions.create(messages=[{'role':'user','content': user_record.email}])"
    - "client.messages.create(model='claude-3', messages=[{'role':'user','content': db_user.full_name}])"
  good:
    - "openai.chat.completions.create(messages=[{'role':'user','content': anonymize(user_record).summary}])"
    - "client.messages.create(model='claude-3', messages=[{'role':'user','content': sanitized_query}])"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.12", "A.5.34"]
  eu-ai-act-2024: ["Art.10", "Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "MANAGE-1"]
  soc2-type2: ["C1.1", "CC6.6"]
  iso-42001-2023: ["A.3.3", "A.2.2", "6.1.2"]

references:
  mitre_attack: ["T1048"]
  cwe: ["CWE-200", "CWE-359"]

analyzers: ["taint", "dataflow"]
related_rules: ["ai-data-flow-customer-data-to-llm-python", "ai-data-flow-customer-data-to-llm-js"]
