id: "data-exfiltration/llm-data-flow/ai-amplified-insider-data-collection"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "AI-Amplified Insider Data Collection"
risk_level: "high"

abstract: |
  A legitimate user with authorized access leverages AI agent capabilities
  to systematically discover, collect, and prepare sensitive data for
  exfiltration at a scale and speed that would be impractical through
  manual effort — using the agent as a force multiplier for insider threats.

explanation: |
  Traditional insider threat detection relies on behavioral baselines:
  unusual access patterns, bulk downloads, off-hours activity. AI coding
  agents fundamentally disrupt these baselines because:

  - **Automated reconnaissance at scale**: An insider can instruct an AI
    agent to "find all files containing API keys, database credentials,
    and customer PII in this repository" — a task that would take hours
    manually but seconds with an agent. The agent systematically searches
    codebases, configuration files, and documentation with a thoroughness
    no human could match.
  - **Intelligent data selection**: Unlike a bulk `tar` of a repository,
    an AI agent can be instructed to selectively extract high-value assets:
    "Find all proprietary algorithms, patent-pending code, and competitive
    differentiators." The agent understands code semantics and can
    identify trade secrets that grep cannot.
  - **Exfiltration preparation**: The agent can reformat, compress, and
    encode collected data for efficient exfiltration — summarizing
    thousands of files into compact, portable formats that are harder
    to detect by DLP systems monitoring for raw data patterns.
  - **Plausible deniability**: All agent actions appear as normal
    development activity — reading files, analyzing code, writing
    summaries. The insider's agent session looks identical to legitimate
    code review or documentation work.
  - **Cross-repository aggregation**: An agent with access to multiple
    repositories (common in enterprise development environments) can
    correlate and aggregate sensitive data across projects, building a
    comprehensive picture of an organization's intellectual property.
  - **Context window as staging area**: The agent's context window acts
    as a temporary aggregation point for sensitive data that exists only
    in memory, leaving minimal forensic artifacts.

  This threat amplifies existing insider risk by orders of magnitude.
  A departing employee who previously could exfiltrate dozens of files
  can now use an AI agent to systematically catalog and extract an
  entire organization's crown jewels in a single session.

  EU AI Act Article 14 (Human Oversight) and Article 26 (Obligations of
  Deployers) require organizations to implement controls that prevent AI
  systems from being used in ways that compromise security — including
  by authorized users acting against organizational interests.

recommendation: |
  - Implement AI agent session auditing that logs all file access, search
    patterns, and data aggregation activities, separate from standard
    access logs.
  - Deploy behavioral analytics specifically tuned for AI-assisted data
    collection: unusual breadth of file access, systematic scanning
    patterns, cross-repository correlation.
  - Restrict AI agent access scope based on the user's current task,
    not their full authorization level (task-based access control).
  - Monitor for AI-assisted reconnaissance patterns: sequential reads
    of credential files, systematic enumeration of proprietary code,
    bulk documentation generation from source code.
  - Implement data aggregation limits — alert when an agent session
    accesses more than N sensitive files or crosses repository boundaries.
  - Apply time-of-departure enhanced monitoring for users with AI agent
    access, with reduced thresholds for anomaly detection.
  - Log and review agent-generated summaries, documentation, and exports
    that could serve as exfiltration staging artifacts.
  - Consider data tokenization or masking for development environments
    to reduce the value of what agents can access.

examples:
  bad:
    - "AI agent instructed: 'Find all files containing AWS keys, database passwords, or API tokens across all repositories I have access to'"
    - "Agent prompted: 'Summarize all proprietary algorithms in /src/core/ into a single document with implementation details'"
    - "Agent used to systematically read and summarize every customer data model, API contract, and pricing algorithm in the codebase"
    - "Insider uses agent to generate comprehensive architecture documentation of trade-secret systems before departing"
  good:
    - "Agent session audit logs capture full file access patterns and flag unusual breadth"
    - "Data aggregation limit triggers alert when agent accesses 50+ files containing PII markers in a single session"
    - "Task-scoped agent access: developer working on login feature only has agent access to auth/ directory"
    - "DLP system monitors agent-generated summaries for concentrated sensitive data"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.10", "A.8.3", "A.8.12", "A.5.34"]
  eu-ai-act-2024: ["Art.14", "Art.26", "Art.13"]
  nist-ai-rmf-1.0: ["GOVERN-1", "GOVERN-6", "MANAGE-1", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC6.3", "CC7.2", "C1.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "8.4"]

references:
  mitre_attack: ["T1213", "T1119", "T1074"]
  cwe: ["CWE-200", "CWE-359", "CWE-538"]
  external:
    - title: "MITRE T1213 — Data from Information Repositories"
      url: "https://attack.mitre.org/techniques/T1213/"
    - title: "MITRE T1119 — Automated Collection"
      url: "https://attack.mitre.org/techniques/T1119/"
    - title: "EU AI Act — Human Oversight (Article 14)"
      url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R1689"

analyzers: ["semantic", "dataflow", "stateful"]
related_rules: []
# Detection: Semantic analyzer classifies bulk data discovery and collection
# intent. Dataflow analyzer tracks sensitive data aggregation patterns.
# Stateful analyzer detects sequential access to multiple credential/PII
# files within a compound command or session. This is primarily a governance
# and monitoring concern — requires agent session auditing and behavioral
# analytics beyond command-level detection.
