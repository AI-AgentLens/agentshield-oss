analyzers: ["guardian", "semantic", "dataflow"]
related_rules: []
# Detection: Guardian layer can scan for high-entropy identifiers and
# encoded patterns in agent outputs. Dataflow analyzer tracks sensitive
# data sources through to generated artifacts. Semantic analyzer classifies
# suspicious encoding intent. This is primarily a governance concern —
# requires output scanning at the PR/commit level.
