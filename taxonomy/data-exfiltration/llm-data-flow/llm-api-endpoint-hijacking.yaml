# Detection: Regex rules for `export OPENAI_BASE_URL=` or `export ANTHROPIC_BASE_URL=`
# patterns in shell commands. Dataflow rules can trace base_url/api_base values
# from external sources (env reads, file reads, network responses) to SDK
# initialization calls (openai.OpenAI(), anthropic.Anthropic(), ChatOpenAI()).
# Static rules in Comply: flag `base_url` params in SDK init that are not
# hardcoded literals or validated against an allowlist.
