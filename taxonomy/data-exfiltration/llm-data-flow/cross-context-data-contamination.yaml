id: "data-exfiltration/llm-data-flow/cross-context-data-contamination"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "Cross-Context Data Contamination"
risk_level: "high"

abstract: |
  Sensitive data from one project, client, or authorization domain leaks into
  another through shared AI agent tooling, MCP servers, or workspace
  configurations — violating data isolation boundaries that exist between
  concurrent operational contexts.

explanation: |
  AI coding agents frequently operate across multiple projects, repositories,
  or client engagements within the same development environment. When tooling
  infrastructure is shared across these contexts without proper isolation,
  data contamination occurs — not through temporal session leakage (covered by
  cross-session-context-leakage) but through concurrent context boundary
  violations:

  - **Shared MCP server state**: An MCP server (e.g., database, filesystem,
    or search tool) connected to multiple projects simultaneously maintains
    internal state, caches, or connection pools that span project boundaries.
    A query in Project A's context may return cached results from Project B,
    or connection strings from one client's database may be available in
    another client's agent session.
  - **Workspace-level tool access**: AI agents with workspace-wide file
    access can read files from sibling projects. An agent working on
    Project A that reads ../project-b/.env or searches across the entire
    workspace can inadvertently incorporate Client B's credentials, API
    endpoints, or proprietary algorithms into Client A's context.
  - **Shared embedding/vector stores**: Organizations using a single vector
    database for multiple projects risk semantic search returning chunks from
    unrelated projects. An agent searching for "authentication flow" may
    retrieve code from a different client's codebase.
  - **Git credential bleed**: When an agent switches between repositories
    belonging to different organizations or clients, git credentials,
    SSH keys, or tokens from one context may be used (or exposed) in another.
  - **Environment variable contamination**: Shell environment variables set
    for one project (API keys, database URLs, service endpoints) remain
    active when the agent switches to another project, potentially sending
    requests to the wrong infrastructure.
  - **Clipboard and paste buffer**: Agents that use clipboard operations may
    carry sensitive data from one project context into another through
    shared system clipboard state.

  This threat is particularly acute in:
  - **Consulting/agency environments**: Developers working on multiple client
    projects where strict data separation is contractually required.
  - **Regulated industries**: Healthcare (HIPAA), finance (SOX/PCI-DSS), and
    legal (attorney-client privilege) where cross-context data leakage
    constitutes a compliance violation.
  - **Multi-tenant SaaS development**: Teams maintaining separate tenant
    databases or configurations that must never be mixed.

  Unlike cross-session-context-leakage (which is temporal — data from past
  sessions appearing in future sessions), this threat is about spatial
  isolation failures — data from Context A appearing in concurrent Context B
  during normal operation.

recommendation: |
  - Implement strict project isolation for AI agent workspaces — each project
    should have its own agent instance, MCP server connections, and
    environment configuration.
  - Use separate MCP server instances per project rather than sharing servers
    across project boundaries.
  - Configure AI agents with explicit project root boundaries and prevent
    filesystem access outside the designated project directory.
  - Clear environment variables and tool state between project context
    switches.
  - Implement data classification labels in vector stores and filter retrieval
    results by project/client boundary.
  - Audit agent tool call logs for cross-project data access patterns.
  - In multi-client environments, use separate development machines, VMs, or
    containers per client engagement.

examples:
  bad:
    - "find ~/dev/ -name '.env' -exec cat {} \\;  # agent reads all .env files across all projects"
    - "grep -r 'API_KEY' ~/workspace/  # searching for credentials across all workspace projects"
    - "MCP database server connected to both client-a and client-b databases returns client-b query results in client-a context"
    - "git clone git@github.com:client-b/repo.git /tmp/ref && cat /tmp/ref/src/auth.py  # accessing other client's code"
    - "Agent copies database connection string from project-a/.env into project-b/docker-compose.yml"
  good:
    - "Agent filesystem access restricted to /home/dev/project-a/ — cannot read sibling directories"
    - "Separate MCP server instances per project with isolated state and credentials"
    - "Environment variables scoped per-project using direnv or similar tooling"
    - "Vector store collections partitioned by project ID with enforced access controls"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.10", "A.5.34", "A.8.3", "A.8.11"]
  eu-ai-act-2024: ["Art.10", "Art.13"]
  soc2-type2: ["C1.1", "CC6.1", "CC6.7"]
  iso-42001-2023: ["A.3.3", "A.7.4"]
  mitre_atlas: ["AML.T0057"]

references:
  mitre_attack: ["T1005", "T1083", "T1552.001"]
  cwe: ["CWE-200", "CWE-668", "CWE-497"]
  external:
    - title: "OWASP LLM02: Sensitive Information Disclosure"
      url: "https://genai.owasp.org/llmrisk/llm022025-sensitive-information-disclosure/"
    - title: "EU AI Act Article 10: Data and Data Governance"
      url: "https://artificialintelligenceact.eu/article/10/"

analyzers: ["structural", "semantic", "dataflow"]
related_rules: []
# Detection: Structural analyzer detects file access patterns that cross
# project boundaries (find/grep across parent directories). Semantic analyzer
# classifies cross-project data access intent. Dataflow analyzer traces
# data flow from one project context into another.
