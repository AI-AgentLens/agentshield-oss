related_rules: ["system-prompt-exfiltration", "ai-agent-telemetry-data-exposure", "ai-conversation-log-exposure"]
# Detection: Comply static analysis rules should flag:
# 1. Code that logs or serializes LLM API responses without stripping thinking blocks
# 2. Code that passes raw response objects (including thinking) into databases/caches
# 3. Code that iterates response.content without filtering type != "thinking"
# Runtime: Guardian layer could detect exfiltration of large text blobs that
# match reasoning trace patterns (very long, contains deliberative language)
