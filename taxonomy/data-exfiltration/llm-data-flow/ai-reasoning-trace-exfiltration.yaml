id: "data-exfiltration/llm-data-flow/ai-reasoning-trace-exfiltration"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "AI Reasoning Trace Exfiltration"
risk_level: "high"

abstract: |
  Applications that log, expose, or transmit the extended thinking / reasoning
  tokens produced by chain-of-thought and reasoning models (Claude extended
  thinking, OpenAI o1/o3) create a novel data exfiltration vector — these
  traces may contain sensitive information extracted from context windows,
  partial secrets, security deliberations, or PII that the model processed
  internally but did not include in its final response.

explanation: |
  Modern reasoning models generate internal "thinking" tokens before producing
  their final response. These reasoning traces are distinct from the final output:
  they represent the model's working memory and can contain information that the
  model explicitly chose not to include in the response. This creates a
  paradoxical risk: the model may correctly redact sensitive information from
  its final answer while still exposing it in the reasoning trace.

  **Data leakage pathways:**

  - **Reasoning token logging**: Applications that log `thinking` blocks from
    Anthropic's extended thinking API or `reasoning_effort` outputs from OpenAI
    alongside regular audit logs may inadvertently store highly sensitive
    deliberations. If these logs are accessible to attackers, they gain insight
    into how the model processed confidential data — including partial values of
    secrets the model encountered.
  - **Trace exposure in API responses**: Multi-tier applications that pass raw
    API responses (including thinking blocks) to downstream services, databases,
    or client UIs expose reasoning content to potentially unauthorized consumers.
  - **Debug endpoint leakage**: Development and debugging interfaces that stream
    or display full API responses including extended thinking blocks create
    exfiltration risk if exposed to untrusted networks.
  - **Prompt injection via reasoning amplification**: An attacker who can inject
    content into the model's context (via indirect prompt injection) can craft
    prompts that cause the model to reason extensively about sensitive data —
    maximizing what appears in the thinking trace — then exfiltrate that trace
    through a side channel.
  - **Cross-request reasoning contamination**: In agentic loops where reasoning
    traces are fed back as context for subsequent iterations, secrets present in
    thinking blocks from one step may persist into future steps and eventually
    surface in a logged or transmitted trace.

  **Why this is distinct from system-prompt-exfiltration**: System prompt
  exfiltration targets the model's instructions. Reasoning trace exfiltration
  targets the model's working memory, which reflects what the model *processed*,
  not just what it was *told*. The trace may contain information from user
  messages, tool call results, and retrieved documents — not just the system
  prompt.

  **Anthropic-specific context**: Claude's extended thinking feature returns
  `thinking` content blocks that contain the model's raw deliberations. These
  blocks are explicitly described by Anthropic as potentially containing
  information "the model chose not to repeat in the response." Applications
  MUST treat these blocks with the same sensitivity as the most sensitive data
  in the context window.

recommendation: |
  - Never log raw reasoning/thinking blocks to persistent storage without
    explicit classification review. If logging is required, redact or hash
    thinking blocks separately from final response content.
  - Do not expose thinking blocks to client applications or end users unless
    the application explicitly requires it and the user has appropriate access
    to all data in the context window.
  - Treat the sensitivity of reasoning traces as equal to the highest-
    sensitivity data in the context window — if the context contained PII or
    credentials, the trace must be treated accordingly.
  - When using extended thinking in agentic loops, explicitly strip thinking
    blocks before passing responses back as context for subsequent iterations.
  - Audit all code paths that handle raw LLM API responses to ensure thinking
    blocks are not inadvertently transmitted to downstream services.
  - For high-sensitivity workloads, disable extended thinking entirely and
    use non-reasoning model variants where the internal deliberation is not
    exposed via API.
  - Implement API response scrubbing middleware that strips `thinking` content
    blocks before they reach logging, caching, or downstream service layers.

examples:
  bad:
    - |
      # Logging full API response including thinking blocks
      response = anthropic.messages.create(
          model="claude-3-7-sonnet-20250219",
          thinking={"type": "enabled", "budget_tokens": 10000},
          messages=[{"role": "user", "content": user_input}]
      )
      logger.info("LLM response: %s", response.model_dump_json())  # thinking blocks logged!
    - |
      # Passing thinking blocks back as context in agentic loop
      for block in response.content:
          if block.type in ("thinking", "text"):
              next_context.append({"role": "assistant", "content": block.text})
    - |
      # Debug endpoint streaming full response to browser
      return StreamingResponse(raw_api_stream)  # includes thinking tokens in SSE
  good:
    - |
      # Strip thinking blocks before logging or forwarding
      safe_content = [b for b in response.content if b.type != "thinking"]
      logger.info("LLM response: %s", safe_content)
    - |
      # Explicit thinking block scrubber in API middleware
      def scrub_thinking_blocks(response: dict) -> dict:
          response["content"] = [
              b for b in response.get("content", []) if b.get("type") != "thinking"
          ]
          return response
    - |
      # Only extract text for downstream use
      final_text = next(b.text for b in response.content if b.type == "text")

