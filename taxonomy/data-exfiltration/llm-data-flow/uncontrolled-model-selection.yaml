id: "data-exfiltration/llm-data-flow/uncontrolled-model-selection"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "Uncontrolled Model Selection"
risk_level: "high"

abstract: |
  Hardcoded or unvalidated model references allow arbitrary LLM selection, bypassing
  governance controls and potentially sending data to unapproved or unvetted AI models.

explanation: |
  When model identifiers are hardcoded in source files or accepted without validation
  from configuration or user input, an organization loses control over which AI models
  process its data. This creates risks including:
  - Data sent to models not covered by the organization's vendor agreements
  - Routing to deprecated or less secure model versions
  - An attacker supplying a model string that routes data to an unvetted provider
  - Cost overruns from unintended use of expensive model tiers

  Patterns of concern include string literals like `"gpt-4o"`, `"claude-3-opus"`,
  or `"gemini-1.5-pro"` directly in API call arguments without a central model
  registry or configuration validation layer.

recommendation: |
  - Centralize model selection in a validated configuration layer (not hardcoded strings).
  - Enforce an allowlist of approved model identifiers at the application layer.
  - Log all model invocations with the model ID for governance audit trails.
  - Use environment variables or a model registry service rather than literals.

examples:
  bad:
    - "client.chat.completions.create(model='gpt-4o', messages=messages)"
    - "anthropic.messages.create(model='claude-3-opus-20240229', messages=msgs)"
  good:
    - "client.chat.completions.create(model=settings.APPROVED_MODEL, messages=messages)"
    - "anthropic.messages.create(model=model_registry.get_approved_model('chat'), messages=msgs)"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.28"]
  eu-ai-act-2024: ["Art.9", "Art.13"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MAP-5"]
  soc2-type2: ["CC8.1"]
  iso-42001-2023: ["A.8.4", "A.6.1"]

references:
  mitre_attack: []
  cwe: ["CWE-807"]

analyzers: ["regex", "structural"]
related_rules: ["ai-model-ref-gpt4", "ai-model-ref-claude-named"]
