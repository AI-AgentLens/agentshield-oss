id: "data-exfiltration/llm-data-flow/rag-system-prompt-leakage"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "RAG System Prompt Leakage"
risk_level: "high"

abstract: |
  Retrieval-Augmented Generation (RAG) pipelines inadvertently returning
  chunks that embed system prompt fragments as retrieved context, exposing
  confidential operator instructions to end users through the model's response.

explanation: |
  RAG systems retrieve relevant document chunks from a vector store and inject
  them into the LLM context. When system prompts or operator instructions are
  stored in the same vector store as retrievable documents — or when retrieval
  queries can be crafted to return prompt-containing chunks — the confidential
  instructions become part of the model's response:

  - System prompt fragments indexed in the same vector store as user documents
  - Retrieval of "meta-documents" about the AI system that contain prompt content
  - Adversarial queries semantically similar to system prompt content that
    trigger retrieval of prompt-containing chunks
  - Debug artifacts, test cases, or example prompts indexed alongside production data
  - Chain-of-thought reasoning that quotes retrieved context including prompt fragments

  This is a systemic design flaw rather than a single-point vulnerability —
  it requires separation of the prompt configuration plane from the data plane.

recommendation: |
  - Store system prompts outside the RAG vector store — never in the retrieval corpus.
  - Implement access controls on the vector store to exclude prompt documents.
  - Filter retrieved chunks before injection to remove system prompt patterns.
  - Test RAG pipelines with adversarial queries targeting system prompt leakage.
  - Audit what documents are indexed and establish strict inclusion criteria.

examples:
  bad:
    - "# System prompt stored in vector store alongside user documents"
    - "vectorstore.add_documents([Document(page_content=SYSTEM_PROMPT)])"
    - "# RAG retrieves prompt fragment: 'As per your instructions: You are...'"
  good:
    - "# System prompt injected directly at runtime, not stored in retrieval corpus"
    - "prompt = ChatPromptTemplate.from_messages([('system', SYSTEM_PROMPT), ('human', '{input}')])"

