id: "data-exfiltration/llm-data-flow/ai-data-residency-violation"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "AI Data Residency and Sovereignty Violation"
risk_level: "high"

abstract: |
  An AI agent transmits regulated data — PII, PHI, financial records,
  classified information, or trade secrets — to LLM API endpoints hosted
  in jurisdictions that violate the organization's data residency
  requirements, regulatory obligations, or contractual commitments.

explanation: |
  AI coding agents routinely send source code, configuration files,
  database schemas, error logs, and user data to cloud-hosted LLM APIs
  as part of normal operation (code completion, review, debugging). This
  creates a data residency risk when:

  - **Cross-border data transfer**: An EU-based organization's agent sends
    code containing EU citizen PII to a US-hosted LLM API, potentially
    violating GDPR Chapter V (Transfers of personal data to third countries).
    Post-Schrems II, this requires specific safeguards (SCCs, adequacy
    decisions, or binding corporate rules).
  - **Sector-specific residency requirements**: Healthcare organizations
    (HIPAA), financial institutions (PCI DSS, SOX), and government agencies
    (FedRAMP, ITAR) have strict data locality requirements that standard
    commercial LLM API endpoints do not satisfy.
  - **Contractual data handling obligations**: Enterprise contracts often
    specify data processing locations. An AI agent sending client code to
    an LLM API may breach these obligations without the developer's
    awareness.
  - **Model training data concerns**: Some LLM providers may use API
    inputs for model training unless explicitly opted out. Code sent to
    these APIs could become part of training data accessible to other
    users, creating an indirect data residency violation.
  - **Multi-model routing**: Agent frameworks that dynamically route
    requests to different LLM providers (OpenAI, Anthropic, Google,
    open-source) based on cost or capability may inadvertently send
    sensitive data to non-compliant endpoints.
  - **MCP server data forwarding**: MCP servers acting as intermediaries
    may forward tool call data to external services without the agent
    or user's knowledge, creating invisible data flows to unauthorized
    jurisdictions.

  This threat is particularly insidious because:
  (1) developers may not realize their agent is transmitting regulated data,
  (2) the data transfer happens implicitly as part of "normal" AI assistance,
  (3) enterprise AI governance policies often lag behind AI tool adoption.

  EU AI Act Article 10 (Data and Data Governance) and Article 13
  (Transparency) directly address this — organizations deploying AI must
  ensure data governance and provide transparency about data processing.

recommendation: |
  - Maintain an inventory of all LLM API endpoints used by AI agents,
    including their hosting jurisdictions and data processing agreements.
  - Implement data classification gates that prevent regulated data
    categories from being sent to non-compliant API endpoints.
  - Configure AI agents to use region-specific API endpoints (e.g.,
    Azure OpenAI in EU regions for EU data).
  - Deploy egress proxies that inspect and classify AI API traffic,
    blocking requests containing regulated data to unauthorized endpoints.
  - Establish contractual safeguards (DPAs, SCCs) with all LLM providers
    before enabling agent access.
  - Audit AI agent configurations for model routing rules that could
    send data to unexpected jurisdictions.
  - Implement opt-out from training data usage across all LLM provider
    accounts.
  - Monitor MCP server configurations for data forwarding to external
    services.

examples:
  bad:
    - "EU developer's AI agent sends source code containing customer PII to api.openai.com (US-hosted) without GDPR safeguards"
    - "Healthcare AI coding agent transmits patient record schemas to commercial LLM API without BAA in place"
    - "Agent framework auto-routes to cheapest LLM provider, sending financial code to API endpoint in non-adequate jurisdiction"
    - "MCP server silently forwards tool call arguments containing proprietary algorithms to external analytics service"
  good:
    - "AI agent configured to use Azure OpenAI EU West endpoint for all EU-regulated projects"
    - "Egress proxy classifies outbound LLM API requests and blocks those containing PII/PHI"
    - "Organization maintains LLM provider inventory with data processing agreements and jurisdiction documentation"
    - "Agent configuration enforces model endpoint allowlist per project classification level"

