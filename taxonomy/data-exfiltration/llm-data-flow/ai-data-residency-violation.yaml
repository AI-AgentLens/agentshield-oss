analyzers: ["semantic", "dataflow"]
related_rules: []
# Detection: Semantic analyzer classifies commands that invoke LLM APIs with
# potentially regulated data. Dataflow analyzer tracks sensitive data sources
# (PII, credentials, health data) through to network egress points. This is
# primarily a governance and configuration concern — requires policy-level
# controls on which LLM endpoints agents are permitted to use.
