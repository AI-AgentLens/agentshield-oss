# Detection: Static analysis can flag code that measures LLM API response latency
# and branches on it (timing oracle pattern). Runtime detection is harder —
# the attack looks like normal API usage. Comply rules should flag:
# 1. Code that compares response.usage.cache_read_input_tokens to infer activity
# 2. Code that measures time.time() around LLM API calls and uses the delta
#    for decision logic (cache hit detection)
