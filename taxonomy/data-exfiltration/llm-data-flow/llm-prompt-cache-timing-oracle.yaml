id: "data-exfiltration/llm-data-flow/llm-prompt-cache-timing-oracle"
version: "1.0.0"
kingdom: "Data Exfiltration"
kingdom_id: 3
category: "LLM Data Flow"
category_id: "3.5"
name: "LLM Prompt Cache Timing Oracle"
risk_level: "high"

abstract: |
  An attacker exploits measurable response-time differences between cached and
  uncached LLM API requests to infer whether specific prompt prefixes have
  recently been used by other sessions on the same shared inference
  infrastructure — leaking information about user activity, system prompts, or
  confidential context without any direct data access.

explanation: |
  Major LLM providers (Anthropic `cache_control`, OpenAI automatic prompt
  caching, Google Gemini context caching) use server-side KV-cache to accelerate
  repeated prompt prefixes. Cached responses return significantly faster (often
  200–800ms vs 2–5s for uncached). This latency differential creates a timing
  oracle:

  - **Activity inference**: An attacker who can observe or measure API response
    latency can determine whether a specific prompt prefix was recently cached —
    revealing whether a user, agent, or system has recently issued a particular
    query. In a shared enterprise environment this leaks behavioral patterns.
  - **System prompt probing**: Many applications use fixed system prompts sent
    as the first cached block. An attacker with API access to the same model can
    enumerate candidate system prompt variants; a cache hit (fast response)
    reveals the correct prefix — exposing confidential operator instructions.
  - **Cross-tenant cache oracle (multi-tenant inference)**: Inference providers
    that scope the KV-cache per API key prevent cross-customer leakage, but
    misconfigurations or shared-key deployments (teams sharing one API key) may
    allow cross-user timing observations within the same tenant.
  - **Confirmation oracle for sensitive queries**: An attacker can confirm
    whether a target user has recently queried a sensitive topic (e.g., "plan
    a reduction in force", "search for divorce lawyers") by issuing the same
    query and measuring whether the model responds with cached speed.
  - **Enumeration amplification**: Unlike brute-forcing a hash, cache timing
    requires only read access (standard API calls) and does not modify state —
    making it a stealthy, low-noise oracle that leaves no suspicious write logs.

  This attack is an AI-native analog of web timing side-channels (HTTP cache
  timing, CSRF timing oracles) but targets LLM infrastructure specifically.
  It requires no special privileges — only the ability to make API requests
  and measure response latency, which any API subscriber can do.

  **Scope**: This entry covers the inference-layer timing attack. Application-
  layer semantic cache poisoning is a separate concern (see
  `supply-chain/model-poisoning/semantic-cache-poisoning`). Cross-tenant data
  leakage through context contamination is covered by
  `data-exfiltration/llm-data-flow/cross-tenant-data-leak`.

recommendation: |
  - Scope prompt cache entries strictly per API key, user ID, and session — never
    share a cache namespace across organizational boundaries.
  - Add server-side artificial jitter (±50–200ms random delay) to all LLM API
    responses to eliminate measurable timing differentials between cache hits and
    misses.
  - Use non-deterministic session tokens in system prompts (e.g., per-session
    nonces) to prevent prefix enumeration — each session's cached prefix will be
    unique and un-guessable.
  - Monitor for unusual patterns of near-identical API requests with slight
    variations, particularly from single API keys issuing high volumes of
    near-duplicate prompts (hallmark of prefix enumeration).
  - Apply rate limiting per client for cache-hit-optimized request patterns.
  - For high-sensitivity deployments, disable prompt caching entirely and accept
    the latency/cost overhead.
  - Treat response latency as sensitive metadata — do not expose raw API timing
    in logs, dashboards, or client SDKs that untrusted parties can read.

examples:
  bad:
    - |
      # Probing whether system prompt starts with "You are a financial advisor..."
      for candidate in system_prompt_candidates:
          start = time.time()
          client.messages.create(model="claude-3-7-sonnet", messages=[{"role":"user","content":candidate+" tell me a joke"}])
          latency = time.time() - start
          if latency < 0.5:  # cache hit threshold
              print(f"System prompt confirmed: {candidate}")
    - |
      # Inferring whether a colleague recently asked about layoffs
      response = client.messages.create(
          model="gpt-4o",
          messages=[{"role":"user","content":"What is the plan for reducing headcount in Q2?"}]
      )
      if response.usage.cache_read_input_tokens > 0:
          print("Someone already queried this — topic confirmed active")
    - |
      # Anthropic cache_control: shared API key across team, system prompt cached
      {"role":"system","content":[{"type":"text","text":"<shared-system-prompt>","cache_control":{"type":"ephemeral"}}]}
  good:
    - |
      # Per-session nonce prevents prefix enumeration
      session_nonce = secrets.token_hex(16)
      system_prompt = f"[session:{session_nonce}] You are a helpful assistant..."
      # Cache hit rate drops to 0% — no timing oracle possible
    - |
      # API gateway adds response jitter before returning to client
      time.sleep(random.uniform(0.05, 0.25))
      return llm_response

