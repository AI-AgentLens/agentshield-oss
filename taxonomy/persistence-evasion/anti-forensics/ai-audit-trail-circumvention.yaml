id: "persistence-evasion/anti-forensics/ai-audit-trail-circumvention"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Anti-Forensics"
category_id: "6.4"
name: "AI Audit Trail Circumvention"
risk_level: "critical"

abstract: |
  Tampering with, disabling, or circumventing AI agent audit logs and decision
  records that are required for regulatory compliance, incident investigation,
  and organizational accountability.

explanation: |
  AI governance frameworks (EU AI Act, NIST AI RMF, ISO 42001) mandate that
  organizations maintain comprehensive audit trails of AI system decisions,
  inputs, outputs, and actions. AI coding agents generate particularly rich
  audit trails — every command evaluated, every file modified, every tool
  called. Circumventing these trails undermines both security and compliance:

  - **Audit log deletion**: Directly deleting or truncating AI agent audit
    logs, AgentShield evaluation logs, or MCP proxy logs to hide evidence of
    unauthorized actions.
  - **Log configuration tampering**: Modifying logging configuration to reduce
    verbosity, redirect logs to /dev/null, or disable specific log categories
    (e.g., disabling command evaluation logging while keeping benign access
    logs intact).
  - **Decision record manipulation**: Altering AI decision records to change
    the recorded rationale, confidence scores, or outcomes — making blocked
    actions appear as allowed or vice versa.
  - **Timestamp manipulation**: Altering timestamps on AI audit events to
    create gaps, overlaps, or false sequences that confuse forensic analysis.
  - **Bypass via unmonitored channels**: Executing actions through channels
    that are not covered by AI audit logging — e.g., using direct system
    calls instead of agent-mediated commands, or accessing tools outside the
    MCP proxy.
  - **Log integrity attacks**: Corrupting hash chains, checksums, or digital
    signatures that protect log integrity, making it impossible to verify
    that logs have not been tampered with.

  The EU AI Act Article 13 requires "appropriate transparency" including
  logging capabilities, and Article 26 requires deployers to keep logs
  automatically generated by high-risk AI systems for a minimum period. SOC 2
  CC7.1 and CC7.2 require detection and monitoring controls. Circumventing
  these trails is both a security incident and a compliance violation.

recommendation: |
  - Protect AI audit logs with append-only storage and cryptographic integrity
    chains (hash chains, signed log entries).
  - Store audit logs in a separate security domain from the AI agent's runtime
    environment — agents should not have write access to their own audit logs.
  - Monitor for commands that target audit log files, logging configurations,
    or integrity mechanisms.
  - Implement real-time log forwarding to a centralized SIEM so that local
    log deletion cannot destroy the only copy.
  - Alert on gaps in audit log sequences (missing sequence numbers, time gaps).
  - In managed/enterprise mode, make audit logging mandatory and non-disablable
    by the AI agent (tamper protection).
  - Regularly verify log chain integrity as part of compliance monitoring.

examples:
  bad:
    - "rm -rf ~/.agentshield/logs/  # deleting AI agent audit logs"
    - "echo '' > /var/log/agentshield/audit.jsonl  # truncating audit trail"
    - "sed -i 's/BLOCK/ALLOW/g' ~/.agentshield/logs/audit.jsonl  # altering decision records"
    - "export AGENTSHIELD_LOG_LEVEL=none  # disabling audit logging via environment"
    - "touch -t 202301010000 ~/.agentshield/logs/audit.jsonl  # timestamp manipulation"
    - "sqlite3 ~/.cursor/audit.db 'DELETE FROM events WHERE action = \"blocked\"'  # selective event deletion"
  good:
    - "cat ~/.agentshield/logs/audit.jsonl | jq '.decision'  # reading audit logs (read-only)"
    - "agentshield log --tail 50  # viewing recent audit events through official CLI"
    - "agentshield scan --verify-integrity  # verifying log chain integrity"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.5.1", "A.8.16", "A.8.9"]
  eu-ai-act-2024: ["Art.12", "Art.13", "Art.26"]
  soc2-type2: ["CC7.1", "CC7.2", "CC8.1"]
  iso-42001-2023: ["A.9.4"]
  mitre_atlas: ["AML.T0049"]

references:
  mitre_attack: ["T1070.002", "T1562.001"]
  cwe: ["CWE-778", "CWE-223", "CWE-117"]
  external:
    - title: "EU AI Act Article 13 — Transparency and Provision of Information"
      url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:32024R1689"
    - title: "NIST AI RMF — MANAGE Function"
      url: "https://airc.nist.gov/RMF/1"

analyzers: ["regex", "structural", "semantic"]
related_rules: []
# Detection: Regex analyzer catches direct log file deletion/truncation patterns.
# Structural analyzer detects sed/awk modifications to log files.
# Semantic analyzer classifies audit-evasion intent.
# Enterprise self-protection rules (sp-block-*) already cover some of these patterns.
