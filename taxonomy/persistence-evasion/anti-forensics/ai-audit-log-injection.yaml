id: "persistence-evasion/anti-forensics/ai-audit-log-injection"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Anti-Forensics"
category_id: "6.4"
name: "AI Audit Log Injection"
risk_level: "high"

abstract: |
  An AI agent fabricates false audit trail entries by appending synthesized
  event records to audit log files — creating a forged compliance paper trail
  or masking unauthorized activity under the appearance of authorized operations.

explanation: |
  Unlike log tampering (which destroys existing entries via truncation or
  overwrite), log injection is constructive forgery: the attacker appends
  semantically valid but fabricated events that appear identical to legitimate
  audit records. Logs remain intact and complete-looking but contain false events.

  This is a subtle and dangerous variant of anti-forensics because:
  - Log deletion creates obvious gaps that trigger alerts; injection does not
  - Compliance tools that count events (e.g., "N successful auth events") are
    fooled into reporting valid-looking activity
  - False events can mask unauthorized operations by padding them with plausible
    authorized-looking cover events

  Common attack patterns:
  - `echo '{"ts":...,"user":"root","action":"allow"}' >> ~/.agentshield/logs/audit.jsonl`
  - `printf '...' >> /var/log/audit/audit.log`
  - `tee -a /var/log/ai-events.log <<< '{"decision":"ALLOW"}'`
  - Python: `open('/var/log/audit/audit.log', 'a').write(fake_event)`

  Target paths of concern:
  - AgentShield audit logs: `~/.agentshield/logs/*.jsonl`
  - AI coding agent logs: `~/.cursor/logs/`, `~/.windsurf/logs/`
  - System audit daemon: `/var/log/audit/audit.log`
  - AI governance event streams: `/var/log/ai-events.log`

  This differs from existing taxonomy entries:
  - `log-tampering` — truncates or empties existing logs (destructive removal)
  - `ai-audit-trail-circumvention` — disables logging infrastructure
  - `timestamp-manipulation` — alters file metadata

recommendation: |
  - Use append-only mode with cryptographic chaining for audit logs — each entry
    contains a hash of the previous entry, making injection detectable.
  - Implement structured log signing (e.g., HMAC per entry) so fabricated entries
    fail signature verification.
  - Monitor append operations to audit log paths from agent processes — append is
    legitimate for applications but suspicious from AI agent CLIs.
  - Store audit logs on a remote, append-only log service (e.g., AWS CloudTrail,
    Splunk HEC) that the agent cannot write to directly.
  - Periodically reconcile audit log entry counts against expected event rates —
    sudden spikes in "authorized" events are an injection signal.

examples:
  bad:
    - "echo '{\"ts\":1234567890,\"user\":\"root\",\"action\":\"allow\"}' >> ~/.agentshield/logs/audit.jsonl"
    - "printf '{\"decision\":\"ALLOW\",\"command\":\"rm -rf /\"}\\n' >> /var/log/audit/audit.log"
    - "tee -a /var/log/ai-events.log <<< '{\"event\":\"login\",\"user\":\"admin\"}'"
  good:
    - "agentshield log --tail 50"
    - "cat ~/.agentshield/logs/audit.jsonl | grep BLOCK"
    - "echo 'build complete' >> ./build.log"

