id: "persistence-evasion/transient-persistence/systemd-run-root"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Transient Systemd Persistence"
category_id: "6.11"
name: "Root-level systemd Transient Unit"
risk_level: "critical"

abstract: |
  Using systemd-run --system to create a transient unit running at system (root) level,
  providing root command execution without requiring sudo in command history or writing
  any files. This combines privilege escalation with fileless execution in a single
  command.

explanation: |
  `systemd-run --system` creates a transient service unit in the system systemd instance
  (PID 1), which runs as root by default:

  ```
  systemd-run --system /bin/bash -c "chmod +s /bin/bash"
  systemd-run --system sh -c "echo 'backdoor ALL=(ALL) NOPASSWD:ALL' >> /etc/sudoers"
  systemd-run --system --uid=0 /tmp/rootkit_installer
  ```

  This is critical severity because:
  - Commands run as root (UID 0)
  - The `sudo` command is never invoked — bypasses sudo audit logging
  - systemd-run requires existing polkit authorization, but many desktop systems grant it
  - No files are written — no .service file or script needs to exist
  - The transient unit is visible in systemctl but listed under the system instance

  Default polkit authorization on many Linux desktops allows wheel/sudo group members
  to use `systemd-run --system` without a password, making this directly accessible to
  any user with standard developer privileges.

recommendation: |
  - Block systemd-run with --system flag entirely in AI agent environments.
  - Configure polkit to deny systemd-run --system for non-root users.
  - Use systemd-run --user for legitimate user-level transient units.
  - Monitor systemd system instance for transient units created by non-root processes.

examples:
  bad:
    - "systemd-run --system /bin/bash -c 'chmod +s /bin/bash'"
    - "systemd-run --system sh -c 'echo backdoor >> /etc/sudoers'"
    - "systemd-run --system --uid=0 /tmp/installer.sh"
  good:
    - "systemd-run --user /usr/bin/python3 script.py"
    - "sudo systemctl start myservice"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.6"]

references:
