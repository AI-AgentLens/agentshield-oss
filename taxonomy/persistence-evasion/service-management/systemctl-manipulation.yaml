id: "persistence-evasion/service-management/systemctl-manipulation"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Service Management"
category_id: "6.2"
name: "Systemctl Service Manipulation"
risk_level: "high"

abstract: |
  Using systemctl or launchctl to start, stop, or enable services allows an agent to
  establish persistence or disrupt system operations by controlling the service manager
  lifecycle.

explanation: |
  System service managers (systemd on Linux, launchd on macOS) control long-running
  processes with boot persistence. An agent manipulating these can:
  - Enable a malicious service at boot: `systemctl enable --now evil.service`
  - Disable security tooling: `systemctl stop auditd`
  - Create new unit files in `/etc/systemd/system/` for persistent execution
  - Use `launchctl load` on macOS to install persistent LaunchAgents/LaunchDaemons

  Service manipulation is particularly dangerous because it survives reboots and
  can disable defensive controls such as audit daemons, firewalls, or EDR agents.

recommendation: |
  - Block `systemctl enable`, `systemctl start`, and `launchctl load` in agent contexts.
  - Read-only mount `/etc/systemd/system/` and `/Library/LaunchDaemons/` for agent processes.
  - Alert on any service state changes initiated by non-administrator UIDs.
  - Use systemd's `ProtectSystem=strict` and `NoNewPrivileges=yes` in agent unit files.

examples:
  bad:
    - "systemctl enable --now backdoor.service"
    - "systemctl stop auditd"
    - "launchctl load ~/Library/LaunchAgents/persist.plist"
  good:
    - "systemctl status nginx"
    - "launchctl list | grep com.example"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.23", "A.8.9"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
