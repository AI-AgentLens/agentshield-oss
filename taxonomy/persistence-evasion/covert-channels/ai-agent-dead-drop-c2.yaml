# Detection: Regex/structural rules can detect:
# - curl/wget piped to bash/eval from paste service domains
# - dig TXT followed by eval/exec patterns
# - aws s3 cp from unknown public buckets followed by shell execution
# - periodic polling loops (while/cron + curl to external URL)
# Dataflow: Track content fetched from external URL → execution context
# Stateful: Detect the fetch→execute pattern within compound commands
