id: "persistence-evasion/ldpreload-hijacking/ld-preload-injection"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "LD_PRELOAD Hijacking"
category_id: "6.19"
name: "LD_PRELOAD Persistence via /etc/ld.so.preload"
risk_level: "critical"

abstract: |
  An AI agent reads or modifies /etc/ld.so.preload to inject a malicious shared
  library that is loaded into every process at startup, creating a system-wide
  persistent backdoor or credential harvester.

explanation: |
  /etc/ld.so.preload is a system-wide LD_PRELOAD configuration file. Any shared
  library path listed in this file is loaded into every dynamically-linked process
  before the process's own libraries — including suid binaries and system daemons.

  An attacker who can write to this file achieves:
  - **System-wide code injection**: Malicious .so runs in every process, including
    privilege escalation targets (sudo, passwd, sshd)
  - **Credential harvesting**: Hook libc's read()/write() to capture passwords typed
    at any terminal prompt
  - **Persistence**: Survives reboots, user logouts, and most remediation steps
    that don't explicitly check /etc/ld.so.preload

  Reading /etc/ld.so.preload is the reconnaissance step:
  - Discover which libraries are already preloaded (security tools to evade)
  - Verify a previously injected .so is still active
  - Enumerate the injection surface before crafting a bypass

  AI agents have no legitimate reason to read or modify /etc/ld.so.preload.

recommendation: |
  - Block all MCP reads of /etc/ld.so.preload — reading this file provides
    no value to legitimate AI agent workflows.
  - Block all writes to /etc/ld.so.preload via shell or MCP.
  - Monitor /etc/ld.so.preload for unauthorized modifications using file
    integrity monitoring (AIDE, Tripwire, auditd).
  - Run AI agents without write access to /etc/.

examples:
  bad:
    - "read_file(path='/etc/ld.so.preload')"
    - "cat /etc/ld.so.preload"
    - "echo '/tmp/malicious.so' >> /etc/ld.so.preload"
  good:
    - "ldd /usr/bin/myapp"
    - "ldconfig -p | grep libssl"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC7.1"]
  iso-42001-2023: ["A.8.4"]

references:
