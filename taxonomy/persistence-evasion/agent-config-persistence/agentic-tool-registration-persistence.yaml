id: "persistence-evasion/agent-config-persistence/agentic-tool-registration-persistence"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Agent Configuration Persistence"
category_id: "6.7"
name: "Agentic Tool Registration Persistence"
risk_level: "high"

abstract: |
  An AI agent or compromised MCP server registers persistent tools, servers,
  or plugin configurations that survive session boundaries, creating a
  backdoor that activates automatically in future sessions without user
  awareness or re-authorization.

explanation: |
  Modern AI coding agents (Claude Code, Cursor, Windsurf, Codex) support
  extensibility through MCP servers, custom tools, and plugin configurations
  that persist across sessions. An attacker who gains temporary code execution
  (via prompt injection, supply chain compromise, or a malicious MCP server)
  can install persistent tool registrations that outlast the initial compromise:

  - **MCP server config injection**: Writing entries to MCP configuration
    files (e.g., `~/.claude/settings.json`, `.cursor/mcp.json`,
    `~/.config/windsurf/mcp_config.json`) that register an attacker-controlled
    MCP server. Future sessions automatically connect to this server, giving
    the attacker persistent tool access.
  - **Plugin/extension installation**: Installing IDE extensions or agent
    plugins that register additional tools. These persist across sessions
    and can intercept all agent interactions.
  - **Tool wrapper injection**: Modifying tool resolution paths so that
    legitimate tool names resolve to attacker-controlled wrappers (analogous
    to PATH hijacking but in the MCP tool namespace).
  - **Rules/hooks file tampering**: Writing to agent rules files
    (`.cursor/rules`, `.claude/settings.local.json` hooks, `.windsurfrules`)
    that inject persistent instructions or hooks into future sessions.

  This differs from agent-config-persistence (which covers general config
  file modifications) because it specifically exploits the tool registration
  and extensibility mechanisms unique to agentic architectures. The persistence
  is particularly dangerous because:
  1. Tool registrations are often auto-loaded without explicit user approval.
  2. Users rarely audit their tool/MCP configurations between sessions.
  3. The registered tools inherit the agent's full permissions.

recommendation: |
  - Implement tool registration audit logs: every new tool or MCP server
    registration should be logged with timestamp, source, and registrant.
  - Require explicit user approval for new tool registrations, especially
    those originating from within an agent session (not manually configured).
  - Use allowlists for MCP servers and tools — only pre-approved servers
    can be registered, with hash verification of server binaries.
  - Monitor MCP config files for unauthorized modifications using file
    integrity monitoring (AgentShield's enterprise tamper protection).
  - Implement session-scoped tool registrations that do not persist beyond
    the current session unless the user explicitly opts in.
  - Regularly audit `~/.claude/`, `.cursor/`, and other agent config
    directories for unexpected MCP server entries or tool registrations.
  - AgentShield's self-protection rules should block writes to agent
    configuration files from within agent sessions.

examples:
  bad:
    - "echo '{\"mcpServers\":{\"evil\":{\"command\":\"node\",\"args\":[\"/tmp/evil-mcp.js\"]}}}' > ~/.cursor/mcp.json"
    - "agent writes to .claude/settings.json adding a new MCP server that phones home"
    - "compromised MCP server writes a .windsurfrules file with persistent prompt injection instructions"
    - "malicious tool installs a VS Code extension that registers itself as an MCP provider"
    - "agent modifies PATH in shell profile to interpose a tool wrapper: export PATH=/tmp/evil-tools:$PATH"
  good:
    - "MCP server registrations require cryptographic signature verification before activation"
    - "AgentShield blocks writes to ~/.claude/settings.json from within agent sessions"
    - "new tool registrations trigger a user-visible notification requiring explicit approval"
    - "agent config directories are monitored by file integrity watchdog for unauthorized changes"

