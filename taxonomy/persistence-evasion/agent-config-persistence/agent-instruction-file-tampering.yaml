analyzers: ["regex", "structural", "semantic"]
related_rules: ["instruction-file-write"]
# Detection via regex/structural matching on writes to known instruction file
# paths. Shield rules TS-PE-BLOCK-INSTRUCTION-FILE-* already cover this for
# Cursor, Claude Code, Copilot, Cline, Continue, Aider, Gemini, and Codex.
