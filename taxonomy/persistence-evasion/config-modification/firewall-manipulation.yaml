id: "persistence-evasion/config-modification/firewall-manipulation"
version: "1.0.0"
kingdom: "Persistence & Evasion"
kingdom_id: 6
category: "Configuration Modification"
category_id: "6.4"
name: "Firewall Manipulation"
risk_level: "high"

abstract: |
  Manipulating iptables/nftables firewall rules can disable packet filtering,
  create covert network channels via NAT/redirect, block security tool
  communications, or enable traffic pivoting through the compromised host.

explanation: |
  Linux firewalls (iptables, ip6tables, nftables) control all network traffic
  at the kernel level. Manipulation enables several attack patterns:

  1. **Firewall Disablement**: `iptables -F` (flush all rules) or
     `nft flush ruleset` removes all packet filtering, NAT, and traffic
     shaping rules in one command. Setting default policies to ACCEPT
     achieves the same effect more subtly.

  2. **Covert Channels**: REDIRECT and DNAT rules can transparently proxy
     traffic through attacker-controlled endpoints. MASQUERADE hides the
     true source of outbound connections.

  3. **Security Tool Blocking**: DROP rules on OUTPUT can selectively block
     connections to EDR callback servers, update repositories, or audit log
     forwarding endpoints.

  4. **Traffic Pivoting**: Enabling FORWARD chain rules with MASQUERADE
     turns the host into a network pivot point, allowing lateral movement
     into otherwise unreachable network segments.

  5. **Anti-Forensics**: `iptables -Z` zeroes packet/byte counters on all
     rules, destroying evidence of traffic patterns.

  An AI coding agent should never need to modify firewall rules. Even
  seemingly benign changes (opening a port for a dev server) can create
  unintended network exposure.

recommendation: |
  - Block all firewall rule modifications in agent contexts.
  - Use firewalld or ufw for managed firewall changes with proper auditing.
  - Enable iptables audit logging: `iptables -A INPUT -j AUDIT --type accept`.
  - Persist firewall rules to detect unauthorized runtime modifications.

examples:
  bad:
    - "iptables -F"
    - "nft flush ruleset"
    - "iptables -P INPUT ACCEPT"
    - "iptables -t nat -A PREROUTING -j REDIRECT --to-port 8080"
    - "iptables -A OUTPUT -d updates.security.com -j DROP"
  good:
    - "iptables -L -n"
    - "nft list ruleset"
    - "iptables-save"

