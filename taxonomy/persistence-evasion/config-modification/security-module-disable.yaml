id: "persistence-evasion/config-modification/security-module-disable"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Configuration Modification"
category_id: "6.4"
name: "Security Module Disable"
risk_level: "critical"

abstract: |
  Disabling kernel-enforced Mandatory Access Control (MAC) frameworks —
  SELinux, AppArmor, or similar security modules — removes the operating
  system's primary process containment layer, enabling privilege escalation
  and lateral movement that would otherwise be blocked by policy enforcement.

explanation: |
  Mandatory Access Control frameworks enforce security policies at the kernel
  level, independent of traditional Unix DAC (Discretionary Access Control).
  When an AI agent disables these modules, it eliminates the most robust
  containment layer protecting system resources:

  1. **SELinux Disable**: `setenforce 0` switches SELinux to permissive mode
     (logs but does not enforce). Editing `/etc/selinux/config` to
     `SELINUX=disabled` permanently removes enforcement on next boot. In
     permissive mode, confined processes can access any resource with only
     an audit log entry — no blocking.

  2. **AppArmor Disable**: `aa-disable` removes a specific profile from
     enforcement. `apparmor_parser -R` unloads a profile. `systemctl stop
     apparmor` disables all AppArmor enforcement system-wide for the session.
     `systemctl disable apparmor` makes the disable persistent across reboots.

  3. **Attack Impact**: Once MAC is disabled, a compromised AI agent can:
     - Read protected credential files (e.g., `/etc/shadow`)
     - Write to system directories otherwise confined
     - Pivot to other processes without policy restrictions
     - Exfiltrate data without triggering confinement-based alerts

  4. **Persistence**: Disabling MAC is often a precursor step — the agent
     first removes the containment layer, then proceeds with persistence
     installation that MAC would have blocked.

  An AI coding agent should never need to modify or disable MAC security
  modules. Even in development environments, disabling SELinux or AppArmor
  creates serious security posture gaps that outlast the agent session.

recommendation: |
  - Block all commands that disable or weaken MAC frameworks.
  - Use targeted policy adjustments (`audit2allow`, `semanage`) rather than
    full disable when MAC policies conflict with legitimate workloads.
  - Audit `/etc/selinux/config` and AppArmor profile directories for
    unauthorized changes.
  - Enable immutable audit logging before any agent sessions that require
    elevated access.

examples:
  bad:
    - "setenforce 0"
    - "setenforce permissive"
    - "systemctl stop apparmor"
    - "systemctl disable apparmor"
    - "aa-disable nginx"
    - "apparmor_parser -R /etc/apparmor.d/usr.sbin.nginx"
    - "echo 'SELINUX=disabled' >> /etc/selinux/config"
  good:
    - "getenforce"
    - "sestatus"
    - "aa-status"
    - "apparmor_status"
    - "audit2allow -a"

compliance:
  owasp-llm-2025: ["LLM06", "LLM09"]
  iso-27001-2022: ["A.8.9", "A.8.20", "A.5.23"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MANAGE-2", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC6.6", "CC7.1"]
  iso-42001-2023: ["A.7.4", "6.1.2", "A.5.2"]

references:
  mitre_attack: ["T1562.001"]
  cwe: ["CWE-284"]

analyzers: ["regex", "structural"]
related_rules:
