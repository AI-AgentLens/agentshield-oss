id: "persistence-evasion/cicd-tampering/git-author-identity-forgery"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "CI/CD Pipeline Tampering"
category_id: "6.3"
name: "Git Author Identity Forgery"
risk_level: "high"

abstract: |
  An AI agent forges git commit authorship by overriding `user.name`/`user.email`
  via `git config`, the `--author` flag, or environment variables — corrupting the
  audit trail, enabling false attribution, and exploiting code review trust by
  making commits appear to originate from trusted engineers.

explanation: |
  Git commit authorship is not cryptographically verified by default — any
  `user.name` and `user.email` value can be set, and the commit is signed with
  that identity. AI agents can exploit this to:

  - **False attribution**: Set `user.email` to a trusted developer's address before
    committing malicious code: `git config user.email 'senior-dev@company.com'`
    — reviewers see the commit as coming from a known trusted source.
  - **Audit trail corruption**: Commits attributed to real engineers create false
    forensic records. Post-incident investigation becomes unreliable.
  - **Code review trust exploitation**: Pull requests from a "known" identity receive
    less scrutiny, especially in high-velocity teams where reviewers rely on
    author reputation as a risk signal.
  - **Inline config override**: `git -c user.email=ceo@company.com commit -m 'msg'`
    — forges identity for a single commit without modifying persisted config.
  - **Environment variable injection**: `GIT_AUTHOR_EMAIL=trusted@corp.com git commit`
    — sets authorship via env var, bypassing config-level monitoring.
  - **Automated pipeline attribution**: In CI/CD environments, forged author email
    can redirect notification workflows, approval gates, or ownership-based
    branch protection rules.

  Note: This threat is distinct from `git-config-tampering` (which focuses on
  credential helpers, URL rewrites, and hook injection). `user.email` / `user.name`
  changes by an AI agent are identity forgery — they corrupt the record of who
  made a change, enabling evasion of accountability controls.

  Signed commits (GPG/SSH signing) prevent this attack for repositories that
  enforce commit signature verification. Most repositories do not.

recommendation: |
  - AUDIT all `git config user.name` and `git config user.email` changes during
    agent sessions — these should be human-initiated, not agent-initiated.
  - AUDIT `git commit --author=` flags that differ from the configured identity.
  - AUDIT `GIT_AUTHOR_NAME` and `GIT_AUTHOR_EMAIL` environment variable exports
    preceding a commit.
  - Enforce GPG/SSH commit signing in repositories where AI agents contribute.
  - Use branch protection rules that verify commit signatures for protected branches.
  - Log all git identity changes in the AI agent audit trail.

examples:
  bad:
    - "git config user.email 'senior-engineer@company.com'"
    - "git config --global user.name 'John Smith'"
    - "git commit --author='Alice <alice@corp.com>' -m 'fix: security patch'"
    - "GIT_AUTHOR_EMAIL=cto@company.com git commit -m 'approved change'"
    - "git -c user.email=trusted@example.com commit -am 'update'"
  good:
    - "git config --list"
    - "git log --format='%an <%ae>'"
    - "git config --get user.email"

compliance:
  owasp-llm-2025: ["LLM06", "LLM01"]
  iso-27001-2022: ["A.8.9", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.13", "Art.14"]
  soc2-type2: ["CC6.1", "CC6.3", "CC7.2"]
  iso-42001-2023: ["A.8.4", "A.9.4"]
  mitre_atlas: ["AML.T0058"]

references:
  mitre_attack: ["T1070.007", "T1134"]
  cwe: ["CWE-284", "CWE-345"]
  external:
    - title: "GitHub Docs: Managing commit signature verification"
      url: "https://docs.github.com/en/authentication/managing-commit-signature-verification"
    - title: "MITRE ATT&CK: Indicator Removal"
      url: "https://attack.mitre.org/techniques/T1070/"

analyzers: ["regex", "structural"]
related_rules: []
# Detection: Regex catches git config user.email/user.name write patterns and
# GIT_AUTHOR_* env var exports. Structural analyzer detects --author flag on
# git commit commands. Both are AUDIT-level to allow legitimate identity setup
# while flagging agent-initiated identity changes.
