id: "persistence-evasion/binary-rewriting/elf-header-modification"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Binary Rewriting"
category_id: "6.14"
name: "ELF Header Modification via elfedit"
risk_level: "high"

abstract: |
  An AI agent uses elfedit to directly modify ELF header fields — including
  entry point, OS/ABI type, machine architecture, or dynamic tag values —
  to redirect execution flow, evade binary analysis tools, or alter dynamic
  linking behavior.

explanation: |
  elfedit modifies ELF binary headers at the byte level without requiring
  relinking or recompilation:

  - Changing the entry point (e_entry) redirects execution to attacker
    code before the normal entry point is reached.
  - Modifying OS/ABI or machine type (e_machine) can confuse binary
    analysis tools and security scanners.
  - Altering dynamic section tags (DT_NEEDED, DT_RPATH, DT_RUNPATH)
    changes library loading behavior.

  elfedit is lower-level than patchelf and leaves fewer traces in tool
  output since it directly edits the ELF structure without updating
  checksums or section sizes.

  AI agents have no legitimate reason to modify ELF headers directly.

recommendation: |
  - Block all elfedit invocations in AI agent execution environments.
  - Use file integrity monitoring on system binaries.
  - Restrict AI agent write access to binary directories.

examples:
  bad:
    - "elfedit /usr/bin/sudo"
    - "elfedit --input-osabi Linux /usr/bin/python3"
  good:
    - "readelf -h /usr/bin/ls"
    - "file /usr/bin/python3"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC7.1"]
  iso-42001-2023: ["A.9.4"]

references:
  mitre_attack: ["T1027.009"]
  cwe: ["CWE-506"]
  external:
    - title: "MITRE ATT&CK: Obfuscated Files or Information: Embedded Payloads"
      url: "https://attack.mitre.org/techniques/T1027/009/"

analyzers: ["regex"]
related_rules: ["ts-block-elfedit"]
