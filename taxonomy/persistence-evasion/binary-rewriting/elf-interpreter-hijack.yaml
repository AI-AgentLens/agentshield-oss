id: "persistence-evasion/binary-rewriting/elf-interpreter-hijack"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Binary Rewriting"
category_id: "6.14"
name: "ELF Interpreter Hijack via patchelf"
risk_level: "critical"

abstract: |
  An AI agent uses patchelf to modify the dynamic linker (PT_INTERP segment)
  or RPATH of a trusted ELF binary, redirecting it to a malicious
  ld-linux.so or attacker-controlled library search path that executes
  arbitrary code before main().

explanation: |
  ELF binaries contain a PT_INTERP segment naming the dynamic linker
  (ld-linux.so). patchelf --set-interpreter replaces this path, causing
  the binary to use an attacker-controlled linker that runs arbitrary code
  before main() — every invocation of the patched binary triggers the
  payload.

  patchelf --set-rpath / --add-rpath injects a writable directory into
  the binary's library search path (RPATH), causing it to load trojan
  shared libraries before system libraries.

  These modifications are:
  - Persistent: survive reboots, PATH changes, and LD_PRELOAD resets
  - Silent: the patched binary behaves normally while executing payload
  - Hard to detect without binary integrity monitoring (e.g., AIDE)

  AI agents have no legitimate reason to modify ELF binary structure.

recommendation: |
  - Block patchelf --set-interpreter, --set-rpath, --add-rpath, --add-needed.
  - Enable file integrity monitoring on system binaries (AIDE, Tripwire).
  - Run AI agents without write access to system binary directories.
  - Audit any patchelf invocation in agent logs.

examples:
  bad:
    - "patchelf --set-interpreter /tmp/evil-ld.so /usr/bin/sudo"
    - "patchelf --set-rpath /tmp/evil:/usr/lib /usr/bin/openssl"
    - "patchelf --add-rpath /dev/shm/.lib /usr/sbin/sshd"
  good:
    - "patchelf --print-rpath /usr/bin/myapp"
    - "ldd /usr/bin/myapp"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC7.1"]
references:
  mitre_attack: ["T1574.006"]
  cwe: ["CWE-426", "CWE-114"]
  external:
    - title: "MITRE ATT&CK: Hijack Execution Flow: Dynamic Linker Hijacking"
      url: "https://attack.mitre.org/techniques/T1574/006/"
    - title: "patchelf documentation"
      url: "https://github.com/NixOS/patchelf"

analyzers: ["regex"]
related_rules: ["ts-block-patchelf-hijack", "ts-audit-patchelf"]
