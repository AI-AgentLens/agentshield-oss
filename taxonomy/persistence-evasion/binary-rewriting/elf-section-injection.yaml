id: "persistence-evasion/binary-rewriting/elf-section-injection"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Binary Rewriting"
category_id: "6.14"
name: "ELF Section Injection via objcopy"
risk_level: "high"

abstract: |
  An AI agent uses objcopy to inject arbitrary data into ELF binary sections,
  modify existing sections, or mark data sections as executable — embedding
  shellcode, backdoors, or C2 configuration into trusted system binaries that
  bypass file integrity checks based on file size or simple hashing.

explanation: |
  objcopy manipulates ELF object file sections at the binary level:

  - `--add-section name=file` injects arbitrary data from a file into a
    new ELF section. Combined with a loader that reads custom sections at
    startup, this embeds payloads into trusted binaries.

  - `--update-section name=file` replaces existing section contents — can
    overwrite .rodata (string tables, config) or .data sections.

  - `--rename-section` can disguise malicious sections with innocent names.

  - `--set-section-flags name=alloc,code` marks a section as executable,
    enabling execution of injected data as code.

  AI agents have no legitimate reason to modify ELF binary sections.

recommendation: |
  - Block objcopy --add-section, --update-section, --rename-section.
  - Block objcopy --set-section-flags with alloc,code or exec flags.
  - Monitor binary directories for unexpected modifications.
  - Use read-only bind mounts for system binary directories in containers.

examples:
  bad:
    - "objcopy --add-section .evil=/tmp/shellcode.bin /usr/bin/sudo"
    - "objcopy --update-section .rodata=/tmp/malicious.bin /usr/sbin/sshd"
    - "objcopy --set-section-flags .data=alloc,code /usr/bin/python3"
  good:
    - "objcopy --only-keep-debug binary debug.sym"
    - "objdump -h /usr/bin/ls"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC7.1"]
  iso-42001-2023: ["A.8.4", "A.9.4"]

references:
  mitre_attack: ["T1027.009"]
  cwe: ["CWE-506", "CWE-114"]
  external:
    - title: "MITRE ATT&CK: Obfuscated Files or Information: Embedded Payloads"
      url: "https://attack.mitre.org/techniques/T1027/009/"

analyzers: ["regex"]
related_rules: ["ts-block-objcopy-inject", "ts-block-objcopy-modify-exec"]
