id: "persistence-evasion/log-tampering/audit-log-clearing"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Log Tampering"
category_id: "6.17"
name: "Audit Log Clearing"
risk_level: "critical"

abstract: |
  Stopping logging daemons, truncating active log files, or removing audit rules
  to prevent security events from being recorded or persisted.

explanation: |
  Audit log clearing (MITRE T1070.002 "Clear Linux or Mac System Logs") removes
  or suppresses the recording of security-relevant events. An AI agent compromised
  via prompt injection may generate application code that:

  - Opens system log files (`/var/log/audit/audit.log`, `/var/log/syslog`,
    `/var/log/auth.log`) in write mode to truncate them
  - Calls `subprocess` or `os.system` to stop `rsyslog`, `auditd`, or `syslog`
    daemons via `systemctl stop` or `service ... stop`
  - Uses `os.Truncate()` (Go) or `fs.truncateSync()` (Node) on log paths
  - Writes empty strings to log file paths to zero them out

  This is most dangerous when combined with malicious action sequences:
  perform attack → clear logs → continue operating. Unlike shell-level log
  clearing (covered in the `anti-forensics` category), this entry targets
  application-level log clearing generated by AI coding agents.

recommendation: |
  - Block all write/truncate access to /var/log/ from agent processes.
  - Use append-only attributes (`chattr +a`) on critical log files.
  - Forward logs remotely (syslog-ng, Splunk, Datadog) so local clearing
    cannot destroy the audit trail.
  - Alert on any attempt by application code to stop logging daemons.

examples:
  bad:
    - "open('/var/log/audit/audit.log', 'w').close()"
    - "subprocess.run(['systemctl', 'stop', 'auditd'])"
    - "os.Truncate('/var/log/syslog', 0)"
    - "fs.writeFileSync('/var/log/auth.log', '')"
    - "os.system('service rsyslog stop')"
  good:
    - "logging.basicConfig(filename='app.log', level=logging.INFO)"
    - "with open('/var/log/app/myapp.log', 'a') as f: f.write(msg)"

compliance:
  owasp-llm-2025: ["LLM02", "LLM08"]
  iso-27001-2022: ["A.8.12", "A.8.16", "A.8.9"]
  eu-ai-act-2024: ["Art.13"]
  nist-ai-rmf-1.0: ["GOVERN-1"]
  soc2-type2: ["CC7.2"]
  iso-42001-2023: ["A.7.4", "6.1.2", "A.5.2"]

references:
  mitre_attack: ["T1070.002"]
  cwe: ["CWE-778"]

analyzers: ["semantic"]
