id: "persistence-evasion/fileless-execution/toctou-temp-file-race"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Fileless Execution"
category_id: "6.4"
name: "TOCTOU Temp File Race Condition"
risk_level: "high"

abstract: |
  A compound command checks for a file's existence in a world-writable
  directory, then sources or executes it — creating a time-of-check-time-of-use
  (TOCTOU) race window where an attacker can substitute a malicious file.

explanation: |
  The pattern `[ -f /tmp/script.sh ] && source /tmp/script.sh` is a classic
  TOCTOU race condition (CWE-367). Between the existence check (`test -f`)
  and the use (`source`, `bash`, `.`), an attacker with write access to the
  same directory can:

  1. Delete the original file
  2. Replace it with a malicious script (or create a symlink to one)
  3. The agent then sources/executes the attacker-controlled file

  World-writable directories (/tmp, /dev/shm, /var/tmp, /run) are especially
  dangerous because any local process or user can modify files there. This
  attack is particularly relevant for AI agents because:

  - Agents frequently create temp files for multi-step operations
  - The check-then-use pattern feels "safe" (the agent verified the file)
  - The race window may be milliseconds but is reliably exploitable with
    inotifywait or polling loops

  Note: This rule specifically targets the check-then-EXECUTE pattern in
  world-writable directories. Check-then-READ (e.g., `[ -f /tmp/x ] && cat /tmp/x`)
  is lower risk and handled at AUDIT level.

recommendation: |
  - Never source or execute files from world-writable directories
  - Use mktemp with restrictive permissions (mktemp -p ~/.local/tmp)
  - Use atomic operations (mv from private dir) instead of check-then-use
  - Verify file ownership and permissions before execution

examples:
  bad:
    - "[ -f /tmp/setup.sh ] && source /tmp/setup.sh"
    - "test -e /tmp/installer && bash /tmp/installer"
    - "[ -x /dev/shm/payload ] && /dev/shm/payload"
  good:
    - "[ -f /tmp/output.log ] && cat /tmp/output.log"
    - "test -f ./config.sh && source ./config.sh"
    - "[ -d /tmp/build ] && ls /tmp/build"

