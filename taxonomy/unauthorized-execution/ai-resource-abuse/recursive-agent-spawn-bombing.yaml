id: "unauthorized-execution/ai-resource-abuse/recursive-agent-spawn-bombing"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Resource Abuse"
category_id: "4.5"
name: "Recursive Agent Spawn Bombing"
risk_level: "high"

abstract: |
  A compromised or prompt-injected AI agent invokes OS-level shell commands to
  spawn unauthorized child AI coding agent sessions in non-interactive or
  auto-approval mode, bypassing human oversight. These child agents may
  themselves spawn further agents, creating an unbounded process tree that
  evades per-session rate limits, consumes API quota, and executes actions
  outside the original authorized scope.

explanation: |
  Unlike Denial of Wallet (which targets LLM API token costs), recursive agent
  spawn bombing operates at the OS process level — spawning full agent CLI
  processes (claude, codex, aider, cursor) that each establish independent API
  sessions. The key distinguishing feature is the use of non-interactive or
  auto-approval flags that remove the human confirmation gate:

  - **`claude -p` / `--print`**: Claude Code print mode — runs non-interactively
    and outputs to stdout without any human confirmation prompts.
  - **`codex -q` / `--quiet`**: Codex quiet/full-auto mode — suppresses all
    interactive prompts and runs autonomously.
  - **`aider --yes-always` / `-y`**: Aider's "yes to everything" flag — auto-
    confirms all file edits without human review.
  - **`--approval-mode`**: Agent-level approval mode flags that skip confirmation.

  When an AI agent spawns another agent in non-interactive mode, the child
  agent operates entirely outside human visibility. If the child agent also
  spawns grandchildren, the process tree grows exponentially, consuming API
  quota and executing arbitrary actions with no audit trail visible to the
  operator.

  Note: `--dangerously-skip-permissions` (which additionally bypasses all
  tool-level permission checks) is a separate, higher-severity variant already
  covered by `ts-block-claude-dangerous-skip-permissions` (BLOCK). This entry
  covers the broader class of non-interactive spawning (AUDIT level) that
  includes legitimate but risky scripting patterns.

recommendation: |
  - Require human approval for any AI agent invocation from within an automated
    or agentic context. Never invoke AI CLIs in non-interactive mode from within
    another agent session without an explicit authorization policy.
  - Set a maximum depth for agent orchestration hierarchies — reject invocations
    beyond a configured nesting depth.
  - Monitor for AI CLI processes spawned as children of other AI CLI processes.
    Alert when the process tree contains more than one AI agent layer.
  - Use named orchestration frameworks (LangGraph, CrewAI) with explicit DAGs
    rather than ad-hoc shell invocations — these enforce bounded execution.
  - Prefer API-level agent-to-agent communication (with explicit tool manifests
    and scoped permissions) over spawning new CLI processes.

examples:
  bad:
    - "claude -p 'scan all files and fix issues'"
    - "codex -q 'deploy the service'"
    - "aider --yes-always --message 'refactor the entire codebase'"
    - "for task in $(cat tasks.txt); do claude -p \"$task\"; done"
  good:
    - "claude --version"
    - "aider --help"
    - "codex  # interactive mode, awaits human confirmation"

