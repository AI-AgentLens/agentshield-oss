id: "unauthorized-execution/ai-resource-abuse/ai-denial-of-wallet"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Resource Abuse"
category_id: "4.5"
name: "AI Denial of Wallet (Unbounded Token Consumption)"
risk_level: "high"

abstract: |
  AI applications and agents that invoke LLM APIs without token limits, rate
  limits, or cost controls are vulnerable to Denial of Wallet (DoW) attacks —
  where adversarial inputs, runaway loops, or malicious indirect injection trigger
  unbounded API consumption, generating unexpected cloud bills that can reach
  thousands of dollars per hour.

explanation: |
  Unlike traditional Denial of Service (which aims to exhaust computational
  resources), Denial of Wallet attacks target financial resources by maximizing
  billable API usage. This is a unique AI risk with no direct analog in classical
  security:

  - **Unbounded `max_tokens`**: LLM API calls without a `max_tokens` parameter
    (or with an excessively large value) allow a single request to consume the
    model's full context window in tokens, maximizing per-call cost.
  - **Recursive or looping agent invocations**: Autonomous agents that can invoke
    themselves — through tool calls, memory writes, or indirect prompt injection —
    without a maximum iteration count can enter unbounded loops that exhaust budgets.
  - **Amplification via large context injection**: Attackers who can inject large
    documents into the agent's context (via RAG, file tools, or URL fetching)
    cause every subsequent LLM call to process and bill for the full injected content.
  - **No per-user or per-session cost caps**: Applications that share a single API
    key across all users with no per-user quota allow a single malicious user to
    exhaust the budget for all users.
  - **Prompt-injected model switching**: Some frameworks allow model selection via
    prompt instructions. An injected instruction to switch from a cheap model to
    an expensive one multiplies per-token cost dramatically.

  Real-world incidents have resulted in bills of $10,000–$100,000 from runaway
  agent loops or API key compromise combined with unlimited usage.

recommendation: |
  - Always set `max_tokens` on every LLM API call. Set it to the minimum value
    needed for the task, not the model's maximum.
  - Implement per-session and per-user token budgets enforced at the application
    layer; abort and alert when budgets are exceeded.
  - Set a maximum iteration count for all agentic loops (e.g., `max_steps=20`).
    Never allow unbounded agent recursion.
  - Monitor API spending in real time with provider cost alerts (AWS Budgets,
    OpenAI usage limits). Set hard spending caps that trigger API key rotation.
  - Validate and truncate context inputs before injection — limit document size,
    number of retrieved chunks, and total context window usage.
  - Use separate API keys per application environment (dev/staging/prod) with
    independent spending limits.
  - Never allow LLM-generated instructions to select the model, temperature, or
    other parameters that affect cost.

examples:
  bad:
    - "response = openai.chat.completions.create(model='gpt-4o', messages=messages)  # no max_tokens"
    - "while not task_complete: result = agent.step()  # no max_steps guard"
    - "context = fetch_url(user_provided_url); prompt = BASE_PROMPT + context  # unbounded context injection"
    - "model = llm_output.get('preferred_model', 'gpt-4o')  # model selected from LLM output"
  good:
    - "response = openai.chat.completions.create(model='gpt-4o', messages=messages, max_tokens=2048)"
    - "for step in range(MAX_STEPS): result = agent.step(); if task_complete: break"
    - "context = truncate_to_tokens(fetch_url(url), max_tokens=4096)"
    - "model = config.ALLOWED_MODELS[0]  # model never set from user or LLM input"

