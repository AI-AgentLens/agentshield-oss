id: "unauthorized-execution/ai-resource-abuse/ai-directed-cloud-provisioning"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Resource Abuse"
category_id: "4.5"
name: "AI-Directed Cloud Provisioning"
risk_level: "high"

abstract: |
  An AI agent autonomously creates or modifies cloud infrastructure — S3 buckets,
  virtual machines, security groups, IAM roles — without explicit human approval,
  potentially creating publicly accessible resources, incurring unexpected costs,
  or violating organizational security policies.

explanation: |
  Cloud provisioning commands executed by AI agents carry risks beyond what the
  same commands would in a human context. Agents act quickly, may misinterpret
  task scope, and cannot reliably judge organizational security posture or cost
  implications.

  Key threat scenarios:

  **Misconfigured public resources**: An agent creating an S3 bucket as part of
  a deployment task may apply overly permissive policies (`Principal: *`) that
  expose the bucket to the internet. In a human workflow this would be caught in
  code review; an agent acting autonomously bypasses that checkpoint.

  **Open security groups**: When setting up EC2 instances, agents may open
  inbound ports (SSH 22, RDP 3389, database 3306/5432) to `0.0.0.0/0` to
  satisfy a task requirement without recognizing the exposure risk.

  **Uncontrolled cost escalation**: Cloud resources created by agents accumulate
  charges. An agent looping on infrastructure creation (e.g., during debugging)
  can create dozens of instances before the user notices.

  **Compliance violations**: Many organizations require Infrastructure-as-Code
  (IaC) review, change management approval, or security team sign-off before
  cloud changes. Agents executing AWS/GCP CLI commands directly bypass these
  controls.

  **IAM privilege creep**: Agents creating IAM roles or attaching policies may
  grant broader permissions than intended, accumulating over-privileged identities.

recommendation: |
  - Require cloud CLI commands (aws, gcloud, az) to be reviewed before execution,
    especially resource-creation commands (create, provision, put-bucket-policy).
  - Block or audit any command that opens ingress to 0.0.0.0/0 or sets
    `Principal: *` in bucket policies.
  - Restrict AI agent cloud credentials to read-only or narrow write scopes via
    IAM policies — principle of least privilege.
  - Use Infrastructure-as-Code (Terraform, CDK, Pulumi) with required human PR
    review rather than direct CLI provisioning.
  - Enable cloud cost alerts and resource tagging policies to detect runaway
    provisioning.

examples:
  bad:
    - "aws s3api put-bucket-policy --bucket prod-data --policy '{\"Principal\":\"*\",\"Effect\":\"Allow\"}'"
    - "aws ec2 authorize-security-group-ingress --group-id sg-12345 --cidr 0.0.0.0/0 --port 22"
    - "gcloud storage buckets create gs://my-bucket --location=us-east1"
  good:
    - "aws s3api get-bucket-policy --bucket prod-data  # read-only inspection"
    - "terraform plan  # IaC with human review before apply"

compliance:
