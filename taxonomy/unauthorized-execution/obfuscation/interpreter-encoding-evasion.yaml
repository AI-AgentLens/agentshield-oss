id: "unauthorized-execution/obfuscation/interpreter-encoding-evasion"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Interpreter Encoding Evasion"
category_id: "4.5"
name: "Interpreter Runtime Encoding Evasion"
risk_level: "critical"

abstract: |
  Using interpreter-level encoding functions (Perl pack('H*'), Python bytes.fromhex(),
  Ruby pack('C*'), Node Buffer.from()) combined with exec/system to reconstruct and
  execute malicious commands at runtime, completely bypassing regex-based command
  detection since the dangerous command string never appears in the shell command text.

explanation: |
  Interpreter-level encoding transforms malicious command strings into byte arrays
  that are invisible to static analysis. The dangerous string only exists at runtime:

  Perl:
  ```
  perl -e 'system(pack("H*","726d202d726620...hex..."))'
  perl -e 'exec(pack("H*","2f62696e2f6261736820...hex..."))'
  ```

  Python:
  ```
  python3 -c 'import os; os.system(bytes.fromhex("726d202d726620...").decode())'
  python3 -c '__import__("os").system(bytes.fromhex("63757220...").decode())'
  ```

  Ruby:
  ```
  ruby -e 'exec([0x2f,0x62,0x69,0x6e,0x2f,0x62,0x61,0x73,0x68].pack("C*"))'
  ruby -e 'system("726d".chars.each_slice(2).map{|h| h.join.to_i(16).chr}.join)'
  ```

  Node.js:
  ```
  node -e 'require("child_process").exec(Buffer.from("726d...","hex").toString())'
  ```

  Why this completely evades regex-based detection:
  - The shell command `perl -e 'system(pack("H*","...hex..."))'` contains no dangerous strings
  - `rm`, `curl`, `bash`, `/etc/shadow` never appear in the command text
  - Standard regex rules for dangerous commands match zero characters
  - The encoding is trivially reversible but requires runtime execution to resolve

  This technique can encode any payload including:
  - File deletion (`rm -rf /`)
  - Credential access (`cat ~/.ssh/id_rsa`)
  - Network exfiltration pipelines
  - Reverse shells

recommendation: |
  - Block interpreter invocations containing pack('H*'...), bytes.fromhex(), Buffer.from(...,'hex'),
    and similar encoding-to-exec patterns.
  - Use semantic analysis to detect encoding + execution function combinations.
  - Block -e flag invocations with hex string literals of suspicious length.
  - Apply allowlist-based interpreter argument validation in AI agent environments.

examples:
  bad:
    - "perl -e 'system(pack(\"H*\",\"726d202d726620\"))'"
    - "python3 -c 'import os; os.system(bytes.fromhex(\"726d202d7266202f\").decode())'"
    - "ruby -e 'exec([114,109,32,45,114,102].pack(\"C*\"))'"
    - "node -e 'require(\"child_process\").exec(Buffer.from(\"726d2d7266\",\"hex\").toString())'"
  good:
    - "perl -e 'print \"Hello World\\n\"'"
    - "python3 -c 'print(bytes.fromhex(\"48656c6c6f\").decode())'"
    - "node -e 'console.log(Buffer.from(\"hello\").toString(\"hex\"))'"

