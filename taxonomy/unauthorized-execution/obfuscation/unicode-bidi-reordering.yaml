id: "unauthorized-execution/obfuscation/unicode-bidi-reordering"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Interpreter Encoding Evasion"
category_id: "4.6"
name: "Unicode Bidirectional Text Reordering"
risk_level: "high"

abstract: |
  Embedding Unicode bidirectional control characters (RLO, LRE, PDF, etc.) in
  shell commands or source code to visually disguise malicious operations as
  benign ones, exploiting the gap between rendered display and actual execution.

explanation: |
  Unicode Bidirectional (Bidi) control characters alter how text is visually
  rendered without changing the underlying byte sequence. Attackers exploit this
  to craft commands that appear safe in terminals, code reviews, or AI agent
  interfaces, but execute entirely different payloads.

  Key characters used:
  - U+202E (RIGHT-TO-LEFT OVERRIDE, RLO): Reverses the visual order of characters
    to the right, making `"eman_elif"` display as `elif_name`
  - U+202A/202B (LRE/RLE): Embed left/right-to-left text segments
  - U+202C (PDF): Pops the directional formatting stack
  - U+2066/2067/2069 (isolate characters): Create isolated directional segments

  Attack vectors:
  - Trojan source attacks: `rm -rf /\u202eignored_path` appears to remove a
    specific path but actually executes against a different target
  - Code review deception: malicious code hides inside what appears to be
    a comment when rendered in an IDE
  - AI-generated code review bypass: an AI reviewing code may parse the
    rendered text and miss the actual byte-level command

  This is particularly dangerous in agentic workflows where an AI processes
  user-provided scripts or configuration files that may contain embedded Bidi
  characters designed to deceive the AI's command analysis.

recommendation: |
  - Detect and block shell commands containing Unicode Bidi control characters
    (U+200E, U+200F, U+202A–U+202E, U+2066–U+2069).
  - Normalize and strip Bidi characters from agent-processed inputs before analysis.
  - Use byte-level command inspection rather than rendered text comparison.
  - Enable linter/compiler warnings for Bidi characters in source files.

examples:
  bad:
    - "echo 'safe\u202eignored' | bash"
    - "cat file\u202e.sh"
    - "python3 -c 'exec(\"\u202ecode_here\")"
  good:
    - "echo 'hello world'"
    - "cat README.md"

