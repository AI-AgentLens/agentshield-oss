id: "unauthorized-execution/agent-capability/code-execution"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agent Capability Abuse"
category_id: "4.9"
name: "Agent Code Execution via AI SDK"
risk_level: "high"

abstract: |
  AI agents importing and using AI SDKs (OpenAI, Anthropic, LangChain,
  AutoGen) to autonomously execute code, spawn sub-agents, or invoke
  tools beyond their intended scope, without human oversight or authorization.

explanation: |
  AI SDK imports in code signal that the application uses autonomous agent
  capabilities. When these SDKs are used without adequate guardrails:

  - Agents may spawn child agents with elevated permissions or broader scope
  - AI-generated code may be evaluated using eval() or exec() without review
  - SDK tool definitions may grant access to shell execution, file I/O, or
    network calls that exceed the agent's intended authorization
  - Recursive agent invocation can amplify the blast radius of prompt injection
  - SDK-powered code generation pipelines may produce and immediately execute
    untested code in production environments

  The presence of AI SDK imports in codebases warrants security review of
  what capabilities are granted and whether human oversight gates exist.

recommendation: |
  - Audit all AI SDK usage for tool definitions that grant code execution.
  - Implement human-in-the-loop checkpoints before executing agent-generated code.
  - Apply least-privilege principles to tool definitions — only grant what's needed.
  - Log all agent tool invocations for audit and anomaly detection.
  - Sandbox agent code execution in isolated environments.

examples:
  bad:
    - "from openai import OpenAI; agent.run(tools=[{'type': 'code_interpreter'}])"
    - "from langchain.agents import create_react_agent; agent.invoke({'task': user_input})"
    - "from autogen import AssistantAgent; agent.initiate_chat(code_execution_config=True)"
  good:
    - "# Human reviews agent plan before execution"
    - "plan = agent.plan(task); human_approval(plan); agent.execute(plan)"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.25", "A.5.34"]
  eu-ai-act-2024: ["Art.14", "Art.15"]
  soc2-type2: ["CC8.1", "CC6.1"]
  iso-42001-2023: ["A.8.4", "A.9.3"]
  mitre_atlas: ["AML.T0058", "AML.T0047"]

references:
  mitre_attack: ["T1059", "T1106"]
  cwe: ["CWE-94", "CWE-78"]

analyzers: ["regex", "semantic"]
