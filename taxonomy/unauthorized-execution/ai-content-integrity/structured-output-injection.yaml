id: "unauthorized-execution/ai-content-integrity/structured-output-injection"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "Structured Output Injection"
risk_level: "high"

abstract: |
  Malicious content injected into AI-generated structured outputs (JSON, YAML,
  XML, SQL) that is subsequently parsed and executed or persisted by downstream
  systems without validation, enabling code execution or data manipulation.

explanation: |
  AI agents that generate structured data for downstream consumption create
  an injection surface when the generated data is not validated before use:

  - JSON output containing `__proto__` pollution keys that modify downstream
    JavaScript object behavior
  - YAML output with `!!python/object` tags enabling code execution on parse
  - SQL queries generated by LLMs and executed directly (LLM-driven SQL injection)
  - XML output with XXE payloads that exfiltrate files or trigger SSRF
  - Configuration files with injected directives that override security settings
  - API response transformations that inject malicious fields into downstream calls

  The LLM may generate these patterns due to prompt injection from documents
  it processes, or due to misalignment between generation and validation steps.

recommendation: |
  - Validate all AI-generated structured output against a strict schema before use.
  - Use safe parsers (PyYAML `safe_load`, not `load`; restricted XML parsers).
  - Parameterize database queries — never pass LLM-generated SQL directly.
  - Apply output encoding appropriate to the downstream context.
  - Treat AI-generated data as untrusted input, not trusted application logic.

examples:
  bad:
    - "config = yaml.load(llm.generate_config())  # unsafe YAML load"
    - "db.execute(llm.generate_sql(user_query))  # LLM SQL injection"
    - "result = json.loads(ai_output); render_template(result['html_content'])"
  good:
    - "config = yaml.safe_load(llm.generate_config())"
    - "db.execute(query, params)  # parameterized query"
    - "validated = schema.validate(ai_output); render_template(escape(validated['content']))"

compliance:
  owasp-llm-2025: ["LLM02", "LLM01"]
  iso-27001-2022: ["A.8.25", "A.8.28"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-1", "MANAGE-2"]
  soc2-type2: ["CC8.1", "CC6.1"]

references:
  mitre_attack: ["T1059", "T1190"]
  cwe: ["CWE-94", "CWE-116", "CWE-89"]

analyzers: ["semantic", "structural"]
