id: "unauthorized-execution/ai-content-integrity/ai-generated-compliance-report-injection"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "AI-Generated Compliance Report Injection"
risk_level: "critical"

abstract: |
  AI agents generating plausible-but-false compliance attestations, security
  audit reports, or regulatory artifacts that are accepted as genuine by
  reviewers unfamiliar with the originating AI system's limitations.

explanation: |
  As AI agents gain access to compliance tooling and document generation
  workflows, they may produce compliance artifacts that appear authoritative
  but contain hallucinated findings, fabricated evidence, or inaccurate
  risk assessments. This creates regulatory and business risk:

  - AI-generated SOC 2 readiness reports with fabricated control evidence
  - Hallucinated penetration testing summaries submitted to enterprise customers
  - Security questionnaire responses that misrepresent control maturity
  - Fabricated GDPR data processing inventory records
  - AI-authored audit trails that retroactively "document" controls never implemented

  Unlike honest AI errors, compliance report injection may be used deliberately
  by malicious insiders to create plausible deniability or fraudulently pass
  due diligence assessments. The combination of AI's fluency, professional
  formatting, and broad knowledge makes fabricated reports difficult to
  distinguish from legitimate ones without expert review.

recommendation: |
  - Require cryptographic attribution for all compliance artifacts.
  - Mandate human sign-off and evidence review before submitting any AI-drafted
    compliance documents to auditors or regulators.
  - Implement workflow gates that distinguish AI-generated drafts from
    finalized, reviewed artifacts.
  - Apply watermarking or provenance metadata to AI-generated compliance drafts.
  - Train reviewers to recognize AI-generated content patterns in compliance docs.

examples:
  bad:
    - "# Auto-submitting AI-generated SOC 2 report to auditor"
    - "compliance_report = llm.generate_soc2_report(); submit_to_auditor(compliance_report)"
    - "# AI fills security questionnaire without human review"
  good:
    - "draft = llm.draft_compliance_report(evidence_files)"
    - "reviewed_report = security_team.review_and_sign(draft)"
    - "submit_to_auditor(reviewed_report)  # human-reviewed only"

compliance:
  owasp-llm-2025: ["LLM09", "LLM08"]
