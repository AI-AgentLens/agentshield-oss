id: "unauthorized-execution/ai-content-integrity/llm-directed-iac-apply"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "LLM-Directed IaC Apply"
risk_level: "critical"

abstract: |
  An AI agent generating and immediately applying Infrastructure-as-Code
  changes (Terraform, Pulumi, CloudFormation) without human review, enabling
  unauthorized infrastructure modifications based on potentially hallucinated
  or adversarially influenced output.

explanation: |
  AI agents tasked with infrastructure management may generate IaC configurations
  and apply them autonomously. This creates critical risk:

  - Hallucinated resource configurations may create insecure infrastructure
    (public S3 buckets, open security groups, overprivileged IAM roles)
  - Prompt injection via issue trackers, Slack, or email can trigger destructive
    `terraform destroy` or resource deletion operations
  - LLM-generated Terraform may introduce backdoors through crafted resource policies
  - Auto-applied changes bypass change management processes and audit requirements
  - Mistakes in production IaC can cause outages or irreversible data loss

  The combination of AI generation and autonomous application removes all
  human oversight from infrastructure changes.

recommendation: |
  - Always require human review and approval before applying IaC changes.
  - Use plan-first workflows: `terraform plan` output must be reviewed before apply.
  - Implement policy-as-code checks (OPA, Sentinel) on AI-generated IaC.
  - Restrict agent permissions to read-only by default; require explicit elevation for apply.
  - Audit all IaC apply operations with change attribution.

examples:
  bad:
    - "terraform_code = llm.generate('create S3 bucket'); subprocess.run(['terraform', 'apply', '-auto-approve'])"
    - "pulumi.up(auto=True)  # applying AI-generated changes automatically"
    - "aws_cfn_stack.create(template=ai_generated_template)"
  good:
    - "plan = llm.generate_terraform(requirements)"
    - "print(plan)  # human reviews plan"
    - "if human_approval(): subprocess.run(['terraform', 'apply'])"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.8.25", "A.5.34"]
  eu-ai-act-2024: ["Art.14", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "GOVERN-6"]
  soc2-type2: ["CC8.1", "CC6.8"]
  iso-42001-2023: ["A.9.1", "A.5.2"]
  mitre_atlas: ["AML.T0055", "AML.T0058"]

references:
