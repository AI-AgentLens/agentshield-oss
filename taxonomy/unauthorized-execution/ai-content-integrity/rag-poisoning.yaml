id: "unauthorized-execution/ai-content-integrity/rag-poisoning"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "RAG Poisoning via Missing Similarity Threshold"
risk_level: "high"

abstract: |
  Attackers injecting adversarial documents into a RAG corpus exploit missing
  vector similarity score thresholds to force low-relevance (injected) content
  into the LLM context window, enabling prompt injection via the retrieval
  pipeline regardless of semantic relevance.

explanation: |
  Retrieval-Augmented Generation (RAG) systems fetch documents from a vector
  store and include them in the LLM context window. When similarity_search()
  is called without a minimum score threshold, the retriever returns the k
  nearest neighbors regardless of actual semantic distance — even if the
  "closest" match has near-zero cosine similarity to the query.

  Attack narrative:
  1. Attacker injects a malicious document into the RAG corpus via upload,
     web scraping, email ingestion, or a shared knowledge base.
  2. The document contains a prompt injection payload embedded in otherwise
     innocuous-looking content.
  3. The document is semantically distant from legitimate queries — it would
     never be retrieved by a threshold-aware system.
  4. Without a similarity threshold, the vector search returns ALL k neighbors,
     including the attacker's document as one of the "closest" matches.
  5. The injected document enters the LLM context window alongside legitimate
     retrieved content.
  6. The prompt injection payload executes within the LLM response context,
     potentially exfiltrating data, overriding instructions, or producing
     attacker-controlled output.

  This is distinct from training-data-tampering (which targets model weights)
  and ai-hallucination-injection (which targets output integrity). RAG poisoning
  specifically exploits the retrieval mechanism's lack of quality filtering.

  The threshold vulnerability is widely prevalent: most RAG tutorials and
  starter code use vector_store.similarity_search(query, k=5) without a
  score cutoff, as the OpenAI/LangChain documentation historically did not
  emphasize this as a required defense.

  Lasso Security research (2024) demonstrated practical RAG poisoning attacks
  with high document injection success rates against production systems using
  popular vector databases (Pinecone, Weaviate, Chroma) without thresholds.

recommendation: |
  - Replace similarity_search(query, k=n) with similarity_search_with_score()
    and filter results by a minimum similarity threshold (e.g., >= 0.7 cosine).
  - Configure vector databases with minimum score/distance cutoffs at the
    retrieval layer (most production vector DBs support this natively).
  - Validate and sanitize all documents ingested into the RAG corpus before
    vectorization, scanning for prompt injection patterns.
  - Implement corpus access controls — limit who can add documents to the
    RAG knowledge base, especially for shared or public-facing instances.
  - Monitor retrieved document similarity scores in production — unusual
    distributions (many low-score retrievals) may indicate active poisoning.
  - Apply output scanning to detect when the LLM response appears to be
    influenced by injected content rather than legitimate retrieved context.

examples:
  bad:
    - "docs = vectorstore.similarity_search(query, k=5)  # no threshold — returns any document"
    - "retriever = vectorstore.as_retriever()  # default k=4, no score threshold"
    - "results = collection.query(query_texts=[q], n_results=5)  # Chroma without min_score"
  good:
    - "docs_and_scores = vectorstore.similarity_search_with_score(query, k=5)"
    - "docs = [doc for doc, score in docs_and_scores if score >= 0.7]"
    - "retriever = vectorstore.as_retriever(search_type='similarity_score_threshold', search_kwargs={'score_threshold': 0.7})"

