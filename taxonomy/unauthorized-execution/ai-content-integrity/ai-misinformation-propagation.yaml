id: "unauthorized-execution/ai-content-integrity/ai-misinformation-propagation"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "AI Misinformation Propagation"
risk_level: "high"

abstract: |
  An AI agent writes or commits misleading, false, or unverified content
  (documentation, code comments, changelogs, config) that persists in the
  codebase or downstream systems without human review, causing teams to rely
  on incorrect information.

explanation: |
  Beyond single-turn hallucinations, AI agents operating in agentic loops
  can propagate misinformation through persistent artifacts:

  - Incorrect security guidance written into README or CONTRIBUTING docs
  - False claims about compliance posture committed to audit trail files
  - Misleading code comments that misdirect future developers
  - Fabricated test results or benchmark numbers in reports
  - Incorrect incident post-mortems or runbooks committed to wikis
  - Configuration documentation that doesn't match actual config values

  Unlike hallucination injection (which may affect a single operation),
  misinformation propagation creates persistent false beliefs in teams
  by embedding incorrect content into authoritative sources. The longer
  the content remains undetected, the wider the downstream impact.

  The threat is particularly acute in regulated environments where AI-generated
  compliance documentation may be accepted by auditors at face value, creating
  liability for organizations that cannot demonstrate the accuracy of their
  AI-written audit artifacts.

recommendation: |
  - Require explicit human sign-off on AI-generated documentation commits.
  - Tag all AI-generated content with provenance metadata (model, date, prompt).
  - Implement content review gates in CI for files matching doc/**/*.md, *.txt.
  - Prohibit autonomous AI commits to compliance-critical paths (audit/, security/).
  - Use structured output schemas with validation for AI-generated reports.
  - Establish a content review SLA: AI-written content must be human-verified
    within a defined period (e.g., 24 hours) before it can be referenced externally.

examples:
  bad:
    - "git commit -m 'docs: update security policy' # AI wrote 'AES-128 is sufficient for PCI-DSS' (incorrect)"
    - "echo 'Last pentest: passed all controls (2024-01-15)' >> SECURITY.md  # AI fabricated date/result"
    - "git commit runbook.md -m 'add incident response runbook'  # runbook has wrong escalation contacts"
  good:
    - "# AI-drafted — reviewed and verified by security team on 2026-03-16"
    - "git commit -m 'docs: add security policy [human-reviewed]'"

compliance:
  owasp-llm-2025: ["LLM09"]
  iso-27001-2022: ["A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.13", "Art.50"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MANAGE-2", "MEASURE-2", "MAP-5"]
  soc2-type2: ["CC7.2", "CC8.1", "PI1.3"]
  iso-42001-2023: ["A.2.2", "A.8.4", "6.1.2"]

references:
