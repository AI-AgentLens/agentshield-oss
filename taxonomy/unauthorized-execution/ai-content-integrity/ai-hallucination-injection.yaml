id: "unauthorized-execution/ai-content-integrity/ai-hallucination-injection"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "AI Hallucination Injection"
risk_level: "high"

abstract: |
  An AI agent outputs fabricated facts, URLs, package names, or code references
  without grounding checks, and these outputs are persisted or acted upon by
  downstream systems without human verification.

explanation: |
  Large language models generate plausible-sounding but incorrect output
  (hallucinations). When an AI coding agent operates autonomously without
  human review gates, hallucinated content can be injected into:

  - Source code (fabricated function names, API signatures, algorithm logic)
  - Documentation (incorrect usage examples, false security claims)
  - Dependency manifests (non-existent package names susceptible to typosquatting)
  - Configuration files (fabricated connection strings, invalid hostnames)
  - Git commits (false attribution, incorrect changelog entries)

  Unlike prompt injection (LLM01), hallucination injection does not require a
  malicious actor — the threat arises from the inherent non-determinism of
  LLMs operating without grounding or retrieval augmentation.

  The risk is compounded when the agent has write access to shared repositories
  or production configuration stores, where unverified content persists and
  accumulates over time.

recommendation: |
  - Require human review of AI-generated code before merging (no autopilot commits).
  - Use retrieval-augmented generation (RAG) to ground outputs against verified sources.
  - Enable citation requirements: agent must reference source for factual claims.
  - Run automated fact-checking on generated documentation before publishing.
  - Validate package names against a registry allowlist before installing.
  - Treat AI-generated content as untrusted input at system boundaries.

examples:
  bad:
    - "git commit -m 'feat: implement RSA-4096 key rotation' # code uses non-existent crypto.Rotate() API"
    - "pip install langchain-openai-utils  # hallucinated package name, real package is langchain-openai"
    - "curl https://api.example.com/v3/completions  # hallucinated API endpoint version"
  good:
    - "# AI-generated: human reviewed and verified against OpenAI API docs"
    - "pip install $(cat requirements.txt | grep langchain)  # pinned to verified lockfile"

compliance:
  owasp-llm-2025: ["LLM09"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.13", "Art.14"]
  soc2-type2: ["CC7.2", "PI1.3"]
  mitre_atlas: ["AML.T0049"]
  iso-42001-2023: ["A.9.1"]

references:
  mitre_attack: []
  cwe: ["CWE-20", "CWE-829"]

analyzers: ["mcp-content-scanner", "semantic"]
related_rules: []
