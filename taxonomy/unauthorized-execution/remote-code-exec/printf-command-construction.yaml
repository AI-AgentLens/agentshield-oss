id: "unauthorized-execution/remote-code-exec/printf-command-construction"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Remote Code Execution"
category_id: "4.1"
name: "Printf/Echo Hex Command Construction"
risk_level: "high"

abstract: |
  An attacker uses `printf` or `echo -e` with hex/octal escape sequences to
  construct shell commands character-by-character, then pipes the result to a
  shell interpreter or uses command substitution to execute it. This evades
  ANSI-C quoting detection (`$'\xNN'`) because the encoding happens inside
  printf arguments rather than shell quoting syntax.

explanation: |
  Existing detection for hex-encoded command evasion focuses on bash ANSI-C
  quoting (`$'\x72\x6d'`). However, `printf` and `echo -e` offer an
  alternative encoding path that is functionally equivalent but syntactically
  distinct:

  **printf pipe-to-shell:**
  ```
  printf '\x72\x6d\x20\x2d\x72\x66\x20\x2f' | sh
  ```
  This decodes to `rm -rf /` and pipes it to sh for execution.

  **printf command substitution:**
  ```
  $(printf '\x72\x6d\x20\x2f\x74\x6d\x70')
  ```
  The subshell decodes the hex and the result executes as a command.

  **echo -e pipe-to-shell:**
  ```
  echo -e '\x63\x75\x72\x6c\x20\x65\x76\x69\x6c\x2e\x63\x6f\x6d' | bash
  ```

  **printf octal variant:**
  ```
  printf '%b' '\0162\0155\0040\055\0162\0146' | sh
  ```

  **eval with printf:**
  ```
  eval "$(printf '\x63\x61\x74\x20\x2f\x65\x74\x63\x2f\x70\x61\x73\x73\x77\x64')"
  ```

  These patterns are especially dangerous because:
  - The hex escapes are opaque to human review and pattern matching
  - printf is a legitimate, commonly-used utility (high false-positive risk
    requires careful rule design)
  - Multiple encoding schemes (hex `\xNN`, octal `\NNN`, `\0NNN`) and
    format specifiers (`%b`, `%s`) provide evasion flexibility
  - Command substitution `$(printf ...)` leaves no pipe in the command

recommendation: |
  - Block printf/echo -e with hex escapes piped to shell interpreters.
  - Block eval/exec wrapping printf with hex escapes.
  - Block command substitution containing printf with hex escapes.
  - Allow printf with hex escapes for legitimate formatting (no shell execution).

examples:
  bad:
    - "printf '\\x72\\x6d\\x20\\x2d\\x72\\x66' | sh"
    - "echo -e '\\x63\\x75\\x72\\x6c' | bash"
    - "eval \"$(printf '\\x63\\x61\\x74\\x20\\x2f\\x65\\x74\\x63\\x2f\\x70\\x61\\x73\\x73\\x77\\x64')\""
    - "$(printf '\\x72\\x6d\\x20\\x2f\\x74\\x6d\\x70')"
  good:
    - "printf '\\x1b[31m%s\\x1b[0m\\n' 'Error message'"
    - "printf '%s\\n' 'hello world'"
    - "echo -e '\\n\\tFormatted output'"
    - "printf '\\x00' > /dev/null"

