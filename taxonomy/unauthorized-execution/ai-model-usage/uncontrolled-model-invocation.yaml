id: "unauthorized-execution/ai-model-usage/uncontrolled-model-invocation"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "AI Model Usage"
category_id: "4.2"
name: "Uncontrolled Model Invocation"
risk_level: "medium"

abstract: |
  Unaudited LLM API client imports allow uncontrolled model invocations that may
  incur costs, process sensitive data, or bypass policy controls by enabling
  arbitrary LLM calls without governance or audit logging.

explanation: |
  Importing LLM SDK packages (openai, anthropic, google.generativeai) without
  governance wrappers creates a direct path to uncontrolled model invocations.
  Risks include:
  - Cost exposure: unbounded API calls can exhaust budgets
  - Data governance: sensitive data may reach LLMs without review
  - Policy bypass: direct SDK calls skip application-level rate limiting, content filters, and audit logs
  - Model version drift: direct SDK access may use deprecated or unapproved models

  The pattern is distinct from intentional agent SDK use — the concern is when
  arbitrary application code (scripts, utilities, test files) directly invokes
  production LLM APIs without the governance layer that the main application enforces.

recommendation: |
  - Require all LLM API calls to go through a centralized gateway or wrapper.
  - Implement usage policies (rate limits, spend caps) at the API key level.
  - Log all SDK import sites and ensure each has an associated governance review.
  - Use organization-level spend limits and usage monitoring on AI provider dashboards.

examples:
  bad:
    - "from openai import OpenAI; client = OpenAI(); client.chat.completions.create(...)"
    - "import anthropic; anthropic.Anthropic().messages.create(...)"
  good:
    - "from internal.llm_gateway import governed_completion; governed_completion(...)"
    - "from services.ai import audit_logged_create; audit_logged_create(...)"

