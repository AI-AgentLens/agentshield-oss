analyzers: ["semantic", "structural"]
related_rules: []
# Detection involves scanning for unauthorized AI service connections
# in IDE configs, environment variables with AI API keys, and network
# traffic to unapproved AI endpoints. Comply rules can detect code-level
# patterns (imports of unapproved AI SDKs, API key patterns).
