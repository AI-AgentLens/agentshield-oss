analyzers: ["regex", "structural", "semantic"]
related_rules: []
# Detection: Regex/structural analyzers match writes to known orchestration
# config files (workflow YAML, crew definitions, routing configs). Structural
# analyzer detects task queue injection commands (redis lpush, celery send).
# Semantic analyzer classifies orchestration manipulation intent — role
# changes, approval bypasses, routing modifications.
