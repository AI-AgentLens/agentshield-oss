analyzers: ["guardian", "semantic", "stateful"]
related_rules: []
# Detection: Guardian layer can detect self-referential instruction patterns
# (instructions that reference themselves or instruct copying/replication).
# Semantic analyzer classifies propagation intent. Stateful analyzer can
# track content duplication across sequential agent operations.
# This threat is primarily addressed at the architectural level — breaking
# replication chains via content sanitization at every agent boundary.
