related_rules: []
# Detection: Guardian layer detects obfuscation patterns including Base64,
# hex encoding, Unicode homoglyphs, and zero-width character injection.
# Regex analyzer matches known encoding wrapper patterns. The guardian's
# obfuscation detector (internal/guardian/) already covers many of these
# encoding patterns — this taxonomy entry formalizes the threat model.
