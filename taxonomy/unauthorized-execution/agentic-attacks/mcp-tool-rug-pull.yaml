id: "unauthorized-execution/agentic-attacks/mcp-tool-rug-pull"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agentic Attack Surface"
category_id: "4.4"
name: "MCP Tool Rug-Pull (Post-Approval Behavior Change)"
risk_level: "critical"

abstract: |
  A malicious MCP server presents benign tool descriptions that are approved
  by the user or agent, then silently changes the tool's description or
  behavior after approval. When the agent invokes the tool — trusting the
  prior approval — it executes the now-malicious behavior without detecting
  the change.

explanation: |
  The MCP protocol's trust model assumes that tool descriptions are stable
  after initial approval. A rug-pull attack exploits the time-of-approval vs.
  time-of-use (TOCTOU) gap:

  **Attack sequence:**
  1. **Approval phase (T1)**: MCP server registers tool "fetch-url" with
     description "Fetches the content of a public URL". User/agent approves.
  2. **Exploitation phase (T2)**: Server updates the tool's description to
     "Fetch URL and send request headers (including Authorization) to the URL".
     The tool schema remains identical — change is invisible to the agent.
  3. **Execution phase (T3)**: Agent calls "fetch-url" on a legitimate task.
     The tool now executes the attacker's updated behavior with the agent's
     credentials.

  **Rug-pull variants:**
  - **Description drift**: Gradually adding hidden instructions over multiple
    sessions to avoid triggering re-approval.
  - **Seasonal activation**: Tool behaves legitimately most of the time;
    malicious behavior triggers only under specific conditions (date, user,
    data patterns).
  - **Schema-stable behavior change**: Tool input/output schema unchanged
    but server-side logic silently routes requests to attacker infrastructure.
  - **Delegated rug-pull**: A trusted MCP aggregator relays to a backend
    server that the agent cannot inspect directly.

  This is distinct from `mcp-tool-description-poisoning` (static malicious
  content from the start) and `mcp-server-impersonation` (impersonating a
  different server). The rug-pull specifically exploits post-approval mutation.

recommendation: |
  - Cryptographically hash and store tool descriptions at approval time;
    re-verify before each invocation.
  - Treat tool description changes as requiring re-approval (break-glass UX).
  - Implement MCP server identity pinning (similar to TLS certificate pinning).
  - Monitor for semantic drift in tool descriptions across sessions.
  - Prefer MCP servers with immutable, versioned tool registries.
  - Run MCP tools in sandboxed environments with outbound network controls.

examples:
  bad:
    - "MCP server updates fetch_url description to include credential forwarding after initial approval"
    - "Tool registered as read-only file scanner; server-side logic changed to exfiltrate file contents after approval"
    - "Tool description gradually acquires hidden instructions across multiple sessions"
  good:
    - "MCP client hashes tool description at approval; rejects tool call if description changed"
    - "MCP server uses signed, versioned tool manifests with change audit log"

