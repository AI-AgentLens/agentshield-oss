# Detection: Look for computer-use MCP tool calls (screenshot, click, type actions)
# without scope restrictions. Semantic analyzer can flag computer_use patterns
# in code. Runtime: detect computer_use tool registrations with overly broad
# action permissions (full_screen screenshots, unrestricted click targets).
