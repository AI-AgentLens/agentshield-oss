# Detection: Comply static analysis rules should flag:
# 1. MCP server code that reads session ID from client request headers/params
#    and uses it directly without server-side regeneration
# 2. Session ID generation using non-CSPRNG sources (time.time(), random.randint,
#    uuid1(), sequential counters)
# 3. Session resumption that doesn't validate the OAuth token binding
# 4. Session IDs included in URL construction or redirect responses
