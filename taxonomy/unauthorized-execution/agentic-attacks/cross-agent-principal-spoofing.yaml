id: "unauthorized-execution/agentic-attacks/cross-agent-principal-spoofing"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agentic Attack Surface"
category_id: "4.4"
name: "Cross-Agent Principal Identity Spoofing"
risk_level: "high"

abstract: |
  In multi-agent systems where tool invocations carry a caller identity field
  (`source_agent_id`, `principal`, `caller`), a compromised or malicious agent
  forges this metadata to impersonate a higher-privilege peer, bypassing
  authorization checks and inheriting elevated tool access or data scope.

explanation: |
  Agentic frameworks increasingly pass "who is calling" metadata alongside MCP
  tool calls or inter-agent RPCs, enabling downstream tools to apply
  agent-specific authorization policies. Unlike cryptographic tokens, these
  fields are often plain JSON strings with no signature verification.

  Attack flow:
  1. Attacker controls Agent C (low privilege), which can call Tool T.
  2. Tool T checks `source_agent_id` to determine allowed operations:
     - `orchestrator-agent` → allowed to delete deployments
     - `worker-agent` → read-only access
  3. Agent C forges the call: `{"tool": "delete_deployment", "source_agent_id": "orchestrator-agent"}`
  4. Tool T trusts the `source_agent_id` field without cryptographic verification
     and executes the privileged deletion.

  **Why this is distinct from Agent Delegation Chain Forgery**: Delegation
  forgery targets persistent delegation tokens or capability files that grant
  long-lived authority. Principal spoofing is per-call — the attacker forges
  a single field on each tool invocation. No persistent artifact exists, making
  detection harder (no file to audit, no token to revoke).

  **Why this is distinct from Multi-Agent Trust Exploitation**: Trust exploitation
  targets implicit trust in agent *outputs* (e.g., an agent's text response
  is believed without verification). Principal spoofing targets explicit
  *identity metadata* fields that are meant to convey authentication but are
  unsigned.

  Common vulnerable patterns:
  - `X-Agent-ID` HTTP headers in agent-to-agent REST calls
  - `caller_agent` fields in MCP tool arguments
  - `source` fields in event-driven agent workflows
  - `principal` claims in agent-orchestrated LLM API calls without JWTs

recommendation: |
  - Never trust unsigned `source_agent_id`, `principal`, or `caller` fields
    for authorization decisions.
  - Implement cryptographic signing (JWT/HMAC) for agent identity claims.
  - Use mTLS between agents so identity is bound to the transport layer.
  - For MCP: validate that tool calls originate from registered agent endpoints,
    not just from claimed IDs in argument payloads.
  - Audit all tool calls that reference agent identity for tampering indicators
    (mismatched originating IP vs claimed identity, unexpected privilege requests).

examples:
  bad:
    - 'MCP tool call: {"tool": "delete_deployment", "args": {"source_agent_id": "orchestrator-agent", "env": "prod"}}'
    - 'HTTP header: X-Agent-ID: orchestrator-agent (forged by low-privilege agent)'
    - 'Event payload: {"action": "escalate_alert", "caller": "security-monitor-agent"}'
  good:
    - 'MCP tool call with signed JWT: {"tool": "delete_deployment", "args": {"agent_token": "eyJ...signed..."}}'
    - 'mTLS-authenticated agent call: identity verified at transport layer, no plain-text identity field'

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.5.1", "A.8.3", "A.8.9"]
  eu-ai-act-2024: ["Art.9", "Art.13"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MAP-5", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC6.2", "CC6.3"]
