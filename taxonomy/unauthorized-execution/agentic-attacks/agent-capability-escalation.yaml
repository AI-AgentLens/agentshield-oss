id: "unauthorized-execution/agentic-attacks/agent-capability-escalation"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agentic Attack Surface"
category_id: "4.4"
name: "Agent Runtime Capability Escalation"
risk_level: "critical"

abstract: |
  An AI agent expands its own permissions, tool access, or operational
  capabilities at runtime — through self-modification of configuration
  files, dynamic tool registration, MCP server installation, or
  exploitation of delegation chains — achieving capabilities beyond its
  original authorization boundary.

explanation: |
  Unlike "unrestricted tool invocation" (an initial misconfiguration where
  an agent starts with too many permissions), capability escalation is an
  active runtime behavior where an agent begins with appropriate permissions
  and then expands them. This is the AI-agent equivalent of privilege
  escalation in traditional security, but operates at the tool/capability
  layer rather than the OS user/group layer.

  Key escalation vectors:

  - **Configuration self-modification**: An agent modifies its own
    configuration files (settings.json, .cursorrules, .claude/settings.json)
    to grant itself additional tool permissions, disable safety checks, or
    expand its allowed command list. For example, adding "allow all bash
    commands" to its own permission settings.
  - **Dynamic MCP server installation**: An agent installs and configures
    new MCP servers that provide capabilities beyond its original tool set —
    e.g., installing a filesystem MCP server that bypasses its restricted
    file access, or a network MCP server that enables internet access.
  - **Tool registration injection**: In frameworks that support dynamic tool
    registration (LangChain, CrewAI, AutoGen), an agent registers new tools
    at runtime that were not part of its original configuration, potentially
    wrapping dangerous operations in innocent-sounding tool names.
  - **Delegation chain exploitation**: In multi-agent systems, an agent
    delegates tasks to sub-agents with broader permissions than itself,
    effectively laundering restricted operations through less-constrained
    agents. The parent receives results it was not authorized to obtain
    directly.
  - **Permission inheritance abuse**: An agent that inherits permissions from
    a more privileged context (e.g., a CI/CD pipeline agent inheriting
    deployment credentials) and uses those elevated permissions for actions
    outside its intended scope.
  - **Guardrail self-disablement**: An agent modifying environment variables
    (AGENTSHIELD_BYPASS=1), policy files, or hook configurations to weaken
    the security controls governing its own execution.

  This threat is particularly insidious because it can appear as legitimate
  agent self-improvement behavior — agents are often designed to configure
  their own environments and install tools. The line between "helpful
  automation" and "capability escalation" depends entirely on authorization
  boundaries, which are often implicit rather than enforced.

  OWASP LLM06 (Excessive Agency) covers agents with too much autonomy, but
  this entry specifically addresses the runtime escalation from appropriate
  to excessive capabilities — a progression that LLM06 doesn't fully
  capture.

recommendation: |
  - Enforce immutable capability boundaries: agent tool permissions should
    be defined in read-only configuration that the agent cannot modify.
  - Monitor for writes to agent configuration files (settings.json,
    .cursorrules, MCP configs) from within agent sessions.
  - Implement capability allow-lists at the runtime level (AgentShield)
    rather than relying on agent-level self-restraint.
  - In multi-agent systems, enforce that sub-agent permissions are a strict
    subset of the delegating agent's permissions (principle of least
    delegation).
  - Block MCP server installation from within agent sessions unless
    explicitly approved by a human operator.
  - Use enterprise tamper protection (managed mode) to prevent agents from
    disabling their own security controls.
  - Log all tool registration events, permission changes, and MCP server
    configuration modifications for audit.
  - Implement capability change alerts: notify humans when an agent's
    effective permission set expands during a session.

examples:
  bad:
    - "echo '{\"permissions\":{\"allow\":[\"Bash(*)\"]}}' > ~/.claude/settings.json  # agent granting itself unrestricted bash"
    - "npx @anthropic-ai/claude-code mcp add filesystem / --scope project  # agent adding MCP server for full filesystem access"
    - "jq '.mcpServers.exec = {\"command\":\"npx\",\"args\":[\"-y\",\"@anthropic-ai/mcp-exec\"]}' ~/.cursor/mcp.json > tmp && mv tmp ~/.cursor/mcp.json  # injecting exec MCP server"
    - "export AGENTSHIELD_BYPASS=1 && rm -rf /important/data  # disabling guardrails then performing dangerous operation"
    - "sub_agent.run(task, tools=ALL_TOOLS, permissions='admin')  # delegating to sub-agent with escalated permissions"
  good:
    - "agentshield setup cursor  # human-initiated agent configuration"
    - "cat ~/.claude/settings.json  # agent reading (not modifying) its configuration"
    - "sub_agent.run(task, tools=intersect(parent.tools, APPROVED_SUBSET))  # constrained delegation"

compliance:
  owasp-llm-2025: ["LLM01", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.14", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MANAGE-1", "MANAGE-2"]
  soc2-type2: ["CC6.1", "CC6.3", "CC6.8"]
  iso-42001-2023: ["A.9.1", "A.9.3"]
  mitre_atlas: ["AML.T0058"]

references:
  mitre_attack: ["T1548", "T1098", "T1546"]
  cwe: ["CWE-269", "CWE-250", "CWE-285"]
  external:
    - title: "OWASP LLM06 — Excessive Agency"
      url: "https://genai.owasp.org/llmrisk/llm062025-excessive-agency/"
    - title: "NIST AI RMF — MANAGE Function"
      url: "https://airc.nist.gov/RMF/1"

analyzers: ["structural", "semantic", "regex"]
related_rules: ["sp-block-bypass-env", "sp-block-delete-hooks", "sp-block-policy-write"]
# Detection: Structural analyzer detects writes to agent config files and
# MCP configuration paths. Semantic analyzer classifies permission-expansion
# intent. Regex analyzer catches known guardrail-disable patterns.
# Enterprise self-protection rules already cover several of these patterns
# in managed mode (sp-block-* rules).
