# Detection: Stateful analyzer can track approval patterns and flag anomalous
# sequences. Semantic analyzer can detect misleading summaries vs actual commands.
# Primarily a governance and UX concern — AgentShield itself IS the mitigation
# for this threat via its mandatory review pipeline.
