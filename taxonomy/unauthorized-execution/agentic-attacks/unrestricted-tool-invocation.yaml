id: "unauthorized-execution/agentic-attacks/unrestricted-tool-invocation"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agentic Attack Surface"
category_id: "4.4"
name: "Unrestricted Dynamic Tool Invocation"
risk_level: "high"

abstract: |
  AI agents that dispatch tool calls dynamically — by resolving tool names or
  function references from untrusted input via `getattr`, dictionary lookups, or
  `eval` — allow attackers to invoke arbitrary functions or tools outside the
  agent's intended capability boundary, bypassing authorization controls.

explanation: |
  Agent frameworks expose tools as callable functions registered in a tool registry.
  Insecure tool dispatch patterns allow an attacker who controls the agent's input
  (via prompt injection, indirect injection from a tool response, or a compromised
  upstream agent) to invoke arbitrary tools or internal functions:

  - **`getattr`-based dispatch**: `getattr(tool_module, tool_name)(**args)` resolves
    `tool_name` from untrusted input and calls any attribute on the module, including
    internal helpers, OS interfaces, or `__import__`. An injected tool name like
    `__class__.__init__.__globals__['os'].system` can escape to the host OS.
  - **Dict-based dispatch without allowlist**: `tool_registry[tool_name](**args)` with
    `tool_registry` containing all registered functions allows an attacker to call
    any registered function, including administrative or debug tools intended only
    for internal use. If the registry includes a `system` or `eval` tool, the impact
    is full code execution.
  - **LLM-generated tool call deserialization**: Frameworks that deserialize
    LLM-generated JSON into function calls without validating that the called function
    is in the approved tool list allow indirect tool invocation through crafted
    completions.
  - **Tool chaining without inter-tool authorization**: An agent that allows any tool
    to invoke any other tool without per-tool authorization policies enables lateral
    movement — a low-privilege tool invokes a high-privilege tool on behalf of the
    attacker.

  This is distinct from `mcp-authorization-bypass` (which covers OAuth/permission
  scope bypass in MCP). This entry covers the application-layer pattern of unsafe
  dynamic function resolution in tool dispatch code, regardless of transport.

recommendation: |
  - Use an explicit allowlist for tool dispatch: only call tools that appear in
    a developer-defined `ALLOWED_TOOLS` set. Reject any tool name not in the allowlist.
  - Never use `getattr` or `eval` to resolve tool names from untrusted input.
    Use a registry pattern with validated keys.
  - Validate tool call arguments against a schema before invocation. Reject calls
    with unexpected argument keys or types.
  - Implement per-tool authorization policies: each tool should declare the minimum
    privilege level required; enforce at dispatch time.
  - Treat all LLM-generated tool call JSON as untrusted input. Re-validate the
    function name and arguments at the dispatch layer, not just at the LLM prompt level.
  - Log all tool invocations with the invoking context (user, session, upstream tool
    or agent) for audit and anomaly detection.

examples:
  bad:
    - "result = getattr(tools, llm_output['tool_name'])(**llm_output['args'])"
    - "fn = tool_registry.get(tool_name); fn(**args)  # no allowlist check"
    - "eval(f\"tools.{tool_name}({', '.join(f'{k}={repr(v)}' for k,v in args.items())})\") "
  good:
    - "if tool_name not in ALLOWED_TOOLS: raise ToolNotAllowedError(tool_name); ALLOWED_TOOLS[tool_name](**args)"
    - "tool = registry.get_validated(tool_name, caller_permission_level); tool.invoke(args)"
    - "dispatch = {'read_file': read_file, 'search': search}; fn = dispatch[tool_name]; fn(**args)"

