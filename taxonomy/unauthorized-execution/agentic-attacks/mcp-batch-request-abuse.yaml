id: "unauthorized-execution/agentic-attacks/mcp-batch-request-abuse"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agentic Attack Surface"
category_id: "4.4"
name: "MCP JSON-RPC Batch Request Abuse"
risk_level: "high"

abstract: |
  An attacker embeds malicious MCP tool calls inside a JSON-RPC batch request
  alongside benign calls, exploiting proxy implementations that only inspect the
  first item in a batch. Per-request policy checks are bypassed, sensitive paths
  are enumerated at scale, and batch audit trails dilute visibility into what was
  actually executed.

explanation: |
  The MCP specification (2024-11+) supports JSON-RPC 2.0 batch requests — a
  client can send a JSON array of request objects in a single HTTP POST or stdio
  message and the server processes them all. Specific abuse patterns:

  - **Per-request policy bypass**: The proxy checks only the first item (a benign
    call like `tools/list`), approves the batch, and subsequent items (e.g.,
    `read_file` on `~/.ssh/id_rsa`) execute without individual inspection.
  - **Batch enumeration**: A batch of `resources/read` calls with hundreds of
    credential path variants efficiently discovers which paths exist and are
    readable, bypassing per-batch rate limits that are coarser than per-request.
  - **Atomic commit illusion**: A batch of `write_file` calls that would each be
    individually blocked may appear as a single compound operation to some servers.
  - **Log dilution**: A single batch entry may generate one audit log event rather
    than N events, reducing visibility into what was actually executed.

  **Mitigation**: Evaluate every item in a batch independently before allowing
  any to proceed. If any item would be blocked, block the entire batch. Emit a
  separate audit event per item to prevent log dilution. Flag oversized batches
  (>10 items) as potential enumeration probes.

recommendation: |
  - At the MCP proxy layer, detect JSON arrays at the top level of any incoming
    message (stdio newline-delimited or HTTP POST body).
  - Evaluate each batch item through the full per-request policy pipeline.
  - Apply fail-closed: if any item is blocked, reject the entire batch with a
    JSON-RPC error array.
  - Emit one audit log entry per batch item to prevent log dilution.
  - Flag large batches (>10 items) with an AUDIT event; consider rate-limiting
    batch size via a configurable threshold.

examples:
  bad:
    - |
      # Batch smuggling: benign first item hides malicious second item
      [
        {"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}},
        {"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/home/user/.ssh/id_rsa"}}}
      ]
    - |
      # Batch enumeration: 50 credential paths in one batch to find readable files
      [{"jsonrpc":"2.0","id":1,"method":"resources/read","params":{"uri":"file:///home/user/.aws/credentials"}},
       {"jsonrpc":"2.0","id":2,"method":"resources/read","params":{"uri":"file:///home/user/.kube/config"}},
       ...48 more paths...]
  good:
    - |
      # Single request — full per-request policy evaluation applies
      {"jsonrpc":"2.0","id":1,"method":"tools/call","params":{"name":"read_file","arguments":{"path":"/workspace/README.md"}}}
    - |
      # Small batch of safe discovery calls
      [
        {"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}},
        {"jsonrpc":"2.0","id":2,"method":"resources/list","params":{}}
      ]

