analyzers: ["guardian", "regex"]
related_rules: []
# Detection: Guardian layer can scan incoming file content and RAG retrievals
# for MSJ-indicative patterns (high-density repetitive Q&A formatting, large
# comment blocks with instruction-response structure). Regex layer can
# pattern-match on specific demonstration formats (e.g., "User:...Assistant:..."
# repeated N times in a single chunk).
