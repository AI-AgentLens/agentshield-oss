id: "unauthorized-execution/agentic-attacks/mcp-resource-content-injection"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agentic Attack Surface"
category_id: "4.4"
name: "MCP Resource Content Injection"
risk_level: "high"

abstract: |
  A malicious or compromised MCP server embeds prompt injection payloads inside
  resource content returned via resources/read. Unlike tool response poisoning
  (which is transient per-call), resources are persistent data sources that agents
  often treat as trusted ground truth -- enabling behavioural hijacking, credential
  exfiltration directives, and role-override attacks that persist across sessions.

explanation: |
  The MCP resources/read primitive allows servers to expose file contents, database
  records, and API payloads to agents as structured data. Because agents treat this
  content as factual context -- not executable instructions -- resource content
  injection is a high-trust attack vector distinct from tool response poisoning:

  - **Persistence**: A poisoned resource (e.g., a README, config file, or DB record)
    persists across multiple agent sessions and multiple subscribed agents. A single
    compromised resource can infect every agent that reads it.
  - **Multi-agent blast radius**: resources/subscribe allows multiple agents to
    receive push notifications when a resource "updates". An attacker can push
    injected content to all subscribers simultaneously via resources/updated
    notifications -- a broadcast injection attack.
  - **Trust elevation**: Agents commonly apply stronger trust to read-only data
    sources (files, docs, records) than to tool call outputs. Embedding instructions
    in a README or configuration file exploits this asymmetry.
  - **Format camouflage**: Injection payloads can be hidden in code comments,
    YAML metadata fields, or seemingly innocuous documentation sections that are
    invisible to human reviewers but parsed by LLMs.
  - **Chain amplification**: A resource with embedded instructions causes the agent
    to call additional tools (e.g., read_file for credentials, then http_request
    for exfiltration), creating a multi-step attack chain from a single poisoned read.

  This threat is distinct from:
  - **mcp-tool-response-poisoning**: Targets transient tool call responses.
    Resource content injection targets persistent, repeatedly-read data sources.
  - **mcp-resource-uri-ssrf**: Abuses the URI field to redirect resource fetches
    to attacker-controlled endpoints. This threat embeds payloads in the content
    returned from legitimate URIs.
  - **indirect-prompt-injection**: Covers injection via third-party data sources
    generally. This entry specifically models the MCP resources/read protocol
    vector and its unique persistence and subscription characteristics.

  MITRE equivalent: T1659 (Content Injection) adapted for the MCP resource
  protocol pipeline.

recommendation: |
  - Scan resources/read response content for prompt injection patterns before
    returning it to the LLM context (hidden instructions, action directives,
    exfiltration patterns, behavioral overrides).
  - Apply content length limits on resource reads -- a single resource response
    exceeding 50KB should be treated as a flooding/injection risk and audited.
  - Apply the same injection detection patterns used for tool call responses
    (response_scanner.go heuristics) to resource content items.
  - Maintain a per-URI content hash to detect unexpected changes to resources
    that were previously trusted (content drift detection).
  - Treat resources/subscribe notifications with the same scrutiny as active
    reads -- notifications/resources/updated pushes can deliver injected updates.
  - Prefer schema-validated resources over free-text; reject resources that
    deliver data in a format inconsistent with the registered resource schema.

examples:
  bad:
    - "resources/read returns a README with hidden HTML comment containing action directives targeting credential files"
    - "DB record resource returns JSON with a metadata field containing role-override behavioral instructions"
    - "Config resource returns YAML with oversized base64 blob that decodes to a secondary injection payload"
    - "resources/updated notification pushes content with hidden jailbreak directives targeting filesystem operations"
  good:
    - "MCP proxy scans resources/read responses for injection patterns before passing to the agent"
    - "Resource content over 50KB triggers an AUDIT event for human review"
    - "resources/subscribe notifications are scanned with the same injection detection as active reads"
    - "Unexpected content changes to a previously-read resource trigger a content drift alert"

