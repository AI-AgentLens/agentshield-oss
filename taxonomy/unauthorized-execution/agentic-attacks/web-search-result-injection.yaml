# Detection: Semantic analyzer detects agent configs combining unrestricted web
# search tools with write/execute tools without isolation. Dataflow analysis
# flags raw search result content flowing directly into agent system prompt
# context or file-write operations. MCP proxy scans search tool responses for
# injection patterns before forwarding to the agent.
