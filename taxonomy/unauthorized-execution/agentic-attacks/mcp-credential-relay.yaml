id: "unauthorized-execution/agentic-attacks/mcp-credential-relay"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Agentic Attack Surface"
category_id: "4.4"
name: "MCP Credential Relay Attack"
risk_level: "critical"

abstract: |
  A malicious or compromised MCP server exploits its position as a tool
  provider to intercept credentials passed during legitimate tool calls,
  then relays those credentials to an attacker-controlled endpoint or uses
  them to access resources beyond the tool's intended scope. The MCP server
  acts as a confused deputy — trusted to perform a specific function but
  abusing the credentials it receives in the process.

explanation: |
  MCP (Model Context Protocol) servers receive tool call arguments from
  AI agents, and these arguments frequently contain sensitive material:
  API keys, database connection strings, OAuth tokens, or file paths to
  credential stores. A malicious MCP server can exploit this trust in
  several ways:

  - **Credential harvesting via tool parameters**: An MCP tool advertises
    a legitimate function (e.g., "deploy to cloud", "query database") that
    requires credentials as input. The tool performs the advertised function
    but also exfiltrates the credentials to an external endpoint.
  - **Token relay to secondary services**: An MCP server receives an OAuth
    token scoped for one service, then uses that token to access other
    services that accept the same token (e.g., using a GitHub token meant
    for repository access to also read organization secrets).
  - **Credential upgrade via context accumulation**: Over multiple tool
    calls, an MCP server accumulates partial credentials or session tokens
    from different interactions, combining them to gain access that no
    single tool call would have permitted.
  - **Proxy credential injection**: An MCP server that proxies requests
    to external APIs injects additional headers or parameters using
    intercepted credentials, making requests the user never authorized.

  This differs from mcp-tool-description-poisoning (which hides instructions
  in tool descriptions to manipulate the agent) and mcp-authorization-bypass
  (which circumvents the MCP protocol's own authorization). This entry
  specifically addresses the confused deputy problem where a tool legitimately
  receives credentials but misuses them.

  Real-world risk is high because:
  1. Users routinely pass credentials to MCP tools (database connectors,
     cloud deployers, API wrappers) as part of normal workflows.
  2. MCP servers from community registries have minimal vetting.
  3. The MCP protocol does not enforce credential scoping — a tool that
     receives a token can use it for any purpose.

recommendation: |
  - Apply least-privilege credential scoping: generate per-tool, per-session
    credentials with minimal permissions rather than sharing broad tokens.
  - Use credential vaulting: pass credential references (vault paths, secret
    names) rather than raw credentials to MCP tools, with the vault enforcing
    access policies.
  - Implement network egress monitoring for MCP server processes: alert on
    connections to endpoints not required for the tool's advertised function.
  - Audit MCP tool call arguments for credential patterns before forwarding
    to the MCP server — AgentShield's content scanner can detect API keys,
    tokens, and connection strings in tool arguments.
  - Run MCP servers in isolated network namespaces with restricted egress
    to prevent credential exfiltration even if the server is malicious.
  - Prefer MCP servers from verified publishers with audited source code.
  - Implement credential rotation immediately after MCP tool sessions that
    involved sensitive credentials.

examples:
  bad:
    - "mcp tool 'deploy_app' receives AWS_SECRET_ACCESS_KEY as parameter, forwards it to https://attacker.com/collect"
    - "mcp tool 'query_db' accepts connection string with credentials, stores them in /tmp/.cached_creds for later retrieval"
    - "mcp tool accumulates GitHub token from one call and Slack token from another, uses both to access private channels"
    - "mcp tool proxying API requests injects stolen Authorization header into requests to unrelated services"
  good:
    - "MCP tool receives a vault reference (vault:secret/db-creds) instead of raw credentials"
    - "AgentShield content scanner strips API keys from MCP tool arguments before forwarding"
    - "MCP server runs in network namespace restricted to only the database endpoint it needs"
    - "per-session ephemeral credentials auto-expire after the tool call completes"

