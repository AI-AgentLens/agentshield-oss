analyzers: ["guardian", "semantic"]
related_rules: []
# Detection at agent runtime is limited for the injection itself (the
# payload is in a non-text modality). Guardian layer can detect injection
# patterns in text extracted from images/PDFs by upstream processors.
# Semantic analyzer classifies subsequent agent actions for anomalous
# intent shifts after media processing.
