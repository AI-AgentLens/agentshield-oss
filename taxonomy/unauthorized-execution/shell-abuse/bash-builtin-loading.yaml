id: "unauthorized-execution/shell-abuse/bash-builtin-loading"
version: "1.0.0"
kingdom: "Unauthorized Code Execution"
kingdom_id: 4
category: "Shell Built-in Abuse for Code Injection"
category_id: "4.8"
name: "Bash Loadable Builtin Injection via enable -f"
risk_level: "critical"

abstract: |
  An AI agent uses `enable -f /path/to/library.so builtin_name` to load
  an arbitrary shared object directly into bash's process address space
  as a new builtin — injecting code that runs with full access to bash
  internals without relying on LD_PRELOAD, which may be monitored.

explanation: |
  `enable -f /path/to/shared_object.so builtin_name` loads an arbitrary
  shared object directly into bash's process as a new or replacement
  built-in command. This is fundamentally different from LD_PRELOAD:

  - **No environment variable needed**: Bypasses LD_PRELOAD monitoring entirely
  - **Runs inside bash's address space**: Full access to bash's internal
    state (variables, history, file descriptors, job control)
  - **Can replace existing builtins**: Replacing `read` intercepts all
    user input; replacing `cd` intercepts directory changes
  - **Survives for the shell session**: No new process, no exec() call

  The loaded .so can:
  - Intercept/replace builtins (cd, read, echo) to capture secrets
  - Register new "builtins" that act as persistent backdoors
  - Access bash's internal memory for credential extraction
  - Execute arbitrary code in the context of the shell process

  Legitimate uses of `enable -f` are extremely rare. Bash ships with
  a few loadable builtins (accept, sleep, etc.) but they are nearly
  never loaded manually in production environments.

recommendation: |
  - Block `enable -f` with any shared object path.
  - Harden bash environments: disable enable -f via restricted shell (rbash).
  - Monitor for enable command with -f flag in AI agent sessions.
  - Prevent write access to /tmp, /dev/shm in AI agent environments.

examples:
  bad:
    - "enable -f /tmp/evil.so backdoor"
    - "enable -f ./keylogger.so read"
    - "enable -f /dev/shm/.hidden.so exfil"
  good:
    - "enable"
    - "enable -p"
    - "help enable"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC6.1", "CC7.1"]

references:
  mitre_attack: ["T1546.004"]
  cwe: ["CWE-94"]
  external:
    - title: "MITRE ATT&CK: Event Triggered Execution: Unix Shell Configuration Modification"
      url: "https://attack.mitre.org/techniques/T1546/004/"
    - title: "Bash loadable builtins"
      url: "https://www.gnu.org/software/bash/manual/bash.html#index-enable"

analyzers: ["regex"]
related_rules: ["ts-block-enable-f-loadable-builtin"]
