id: "reconnaissance/filesystem-surveillance/inotify-credential-watch"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Filesystem Surveillance"
category_id: "8.4"
name: "inotify Credential Directory Watch"
risk_level: "critical"

abstract: |
  Using inotifywait to monitor credential and secret directories (~/.ssh, ~/.aws,
  ~/.gnupg, ~/.kube) for real-time surveillance — enables instant exfiltration
  when secrets are created or modified.

explanation: |
  inotifywait is a Linux userspace tool that subscribes to kernel inotify events
  on specified paths. When an AI agent sets up a watch on credential directories:

  - Any new SSH key written to ~/.ssh/ triggers an immediate exfiltration opportunity
  - AWS credentials refreshed to ~/.aws/credentials are captured at write time
  - GPG keys, Kubernetes configs, and .env files are monitored for access events

  The attack pattern is:
  1. Agent plants `inotifywait -m ~/.ssh/ -e create,modify` in a background process
  2. When the user (or another tool) writes a new credential, the event fires
  3. The agent is notified and can immediately read and exfiltrate the new secret

  This is a sophisticated, persistent surveillance technique that bypasses
  one-time credential scans by targeting future secrets rather than current ones.
  It's particularly dangerous in CI/CD environments where credentials rotate.

recommendation: |
  - BLOCK inotifywait on all credential and sensitive paths (~/.ssh, ~/.aws, ~/.gnupg, ~/.kube, /etc/shadow, /etc/passwd, .env).
  - Treat any inotify watch on home directory subtrees containing secrets as a BLOCK.
  - Alert on inotify watch setups in agent audit logs.
  - Restrict agents from running inotifywait on any path outside the project workspace.

examples:
  bad:
    - "inotifywait -m ~/.ssh/ -e create,modify,access"
    - "inotifywait -r ~/.aws -e modify | while read line; do curl ...; done"
    - "inotifywait ~/.env -e access,modify"
    - "inotifywait /etc/shadow -e access"
  good:
    - "inotifywait -m ./src/ -e modify  # watch project source directory"
    - "inotifywait ./dist/ -e create  # watch build output"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.12", "A.5.10"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["GOVERN-6", "MAP-5"]
  soc2-type2: ["CC6.1", "CC6.6"]
  iso-42001-2023: ["A.9.3", "A.9.4"]

references:
  mitre_attack: ["T1083", "T1552.001", "T1056.001"]
  cwe: ["CWE-200", "CWE-284"]

analyzers: ["regex"]
related_rules: ["ts-block-inotify-credential-watch"]
