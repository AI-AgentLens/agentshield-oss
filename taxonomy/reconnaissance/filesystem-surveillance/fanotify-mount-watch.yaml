id: "reconnaissance/filesystem-surveillance/fanotify-mount-watch"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Filesystem Surveillance"
category_id: "8.4"
name: "fanotify Kernel-Level Mount/Filesystem Watch"
risk_level: "critical"

abstract: |
  Using fanotify kernel APIs (fanotify_mark, fanotify_init with FAN_MARK_MOUNT
  or FAN_MARK_FILESYSTEM) to monitor entire mount points or filesystems at the
  kernel level — more powerful and harder to detect than inotify-based watching.

explanation: |
  fanotify is a Linux kernel subsystem providing higher-privilege filesystem
  notifications compared to inotify. Key differences that make it more dangerous:

  - **Mount-level scope**: FAN_MARK_MOUNT watches an entire mounted filesystem,
    covering all directories and files in one syscall — no path enumeration needed
  - **Kernel bypass**: Events arrive directly from the VFS layer, before userspace
    tools (like inotify) can be aware — less detectable
  - **Access control capability**: fanotify can block file access (FAN_ACCESS_PERM)
    allowing the watcher to intercept and modify file reads before they complete
  - **Root requirement**: Typically requires CAP_SYS_ADMIN or root — if an agent
    achieves this, fanotify enables complete mount-level surveillance

  Attack chain example:
  1. Agent gains elevated privileges (sudo, SUID binary)
  2. Sets up fanotify_mark with FAN_MARK_FILESYSTEM on /
  3. Intercepts all file access events system-wide, including credential reads
  4. Exfiltrates secrets accessed by other processes (e.g., SSH agent key reads)

  The presence of fanotify_mark, fanotify_init, or FAN_MARK_MOUNT constants in
  agent-executed code or scripts has no legitimate development use case.

recommendation: |
  - BLOCK all fanotify_mark and fanotify_init invocations in agent contexts.
  - Flag FAN_MARK_MOUNT and FAN_MARK_FILESYSTEM constants in code executed by agents.
  - Restrict agent capabilities — deny CAP_SYS_ADMIN to prevent fanotify setup.
  - Monitor for shared libraries using fanotify APIs in agent-spawned processes.

examples:
  bad:
    - "python3 -c \"import ctypes; lib=ctypes.CDLL(None); lib.fanotify_init(0x10, 0)\""
    - "gcc -o monitor monitor.c && ./monitor  # where monitor.c uses fanotify_mark"
    - "strace -e fanotify_mark ./suspicious_binary"
  good:
    - "# fanotify has no legitimate use in AI agent coding environments"

