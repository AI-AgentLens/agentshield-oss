id: "reconnaissance/network-discovery/ad-ldap-enumeration"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Network Discovery"
category_id: "8.1"
name: "Active Directory and LDAP Enumeration"
risk_level: "high"

abstract: |
  Use of Active Directory and LDAP enumeration tools (ldapsearch, enum4linux,
  BloodHound/SharpHound, CrackMapExec, ADFind, windapsearch, ldeep) to map
  domain users, groups, computers, trusts, and privilege escalation paths against
  organizational identity infrastructure.

explanation: |
  Active Directory (AD) is the backbone of identity and access management in most
  enterprise environments. LDAP enumeration tools allow an attacker to extract the
  entire directory structure without elevated privileges, revealing:

  - Domain user accounts, email addresses, and password policy settings
  - Security group memberships and delegated permission assignments
  - Computer accounts, domain controllers, and service accounts
  - Trust relationships between domains and forests
  - Kerberos delegation configurations exploitable for privilege escalation

  Tools in this category include:
  - **ldapsearch**: Standard LDAP client used to query AD directory services
  - **enum4linux / enum4linux-ng**: SMB/RPC enumeration combining null sessions with LDAP
  - **BloodHound / SharpHound / bloodhound-python**: Graph-based AD attack path analysis
  - **CrackMapExec (CME)**: Swiss Army knife for AD enumeration and lateral movement
  - **ADFind**: Windows AD query tool for bulk directory extraction
  - **windapsearch**: Python LDAP enumeration for domain user/group/computer discovery
  - **ldeep**: Comprehensive LDAP enumeration across all object types

  A single unauthorized enumeration session can expose the entire organizational
  identity infrastructure, enabling targeted spear-phishing, Kerberoasting, and
  privilege escalation path discovery.

recommendation: |
  - Block execution of enumeration tools (ldapsearch, enum4linux, bloodhound, CrackMapExec)
    in agent environments unless explicitly scoped for authorized penetration testing.
  - Enforce Tiered Administration in AD to limit lateral movement blast radius.
  - Enable Advanced Audit Policy for LDAP query logging (Event ID 1644).
  - Monitor for anomalous LDAP query volumes from agent service accounts.
  - Restrict agent service accounts to the minimum directory read permissions required.

examples:
  bad:
    - "ldapsearch -x -H ldap://dc01 -b 'dc=corp,dc=local' '(objectClass=user)'"
    - "enum4linux -a 10.0.0.1"
    - "bloodhound-python -u user -p pass -ns 10.0.0.1 -d corp.local -c all"
    - "crackmapexec ldap 10.0.0.0/24 -u admin -p pass --users"
    - "windapsearch -d corp.local --dc-ip 10.0.0.1 -U"
  good:
    - "ldapsearch -x -H ldap://localhost -b '' -s base  # anonymous root DSE query for connectivity"
    - "python -c \"import ldap; c = ldap.initialize('ldap://localhost'); c.simple_bind_s()\""

