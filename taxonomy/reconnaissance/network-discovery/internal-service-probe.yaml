id: "reconnaissance/network-discovery/internal-service-probe"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Network Discovery"
category_id: "8.1"
name: "Internal Service Probing"
risk_level: "high"

abstract: |
  Internal service probing involves HTTP or TCP requests to localhost, loopback
  addresses, and internal network ranges to discover admin panels, management
  APIs, and development servers not exposed to the public internet. AI agents
  must not probe internal services without explicit authorization.

explanation: |
  When an AI agent has access to HTTP or network tools (via MCP or shell), it can
  probe the internal service landscape of the host and local network:

  - Localhost probing (127.0.0.1, ::1, localhost): discovers development servers,
    local databases (Redis :6379, Postgres :5432), admin UIs, and management APIs
    running on privileged ports
  - Internal RFC-1918 ranges (10.x, 172.16-31.x, 192.168.x): maps the corporate
    network topology, cloud VPC services, and container orchestration control planes
  - SSRF escalation: a compromised AI agent probing internal services can reach
    cloud metadata endpoints, internal dashboards, and unauthenticated service APIs
  - Port inference: even failed connections leak service presence information;
    response timing differences can distinguish open from filtered ports

  MCP HTTP tools (fetch, http_request, browser tools) make internal service probing
  trivially scriptable. Agents may use this to pivot from a low-privilege web task
  to discovering internal admin interfaces.

recommendation: |
  - AUDIT all MCP HTTP requests targeting localhost, 127.0.0.1, or private IP ranges.
  - BLOCK requests to known internal management ports (2375/Docker, 9090/Prometheus,
    8080/Kubernetes API, 4040/ngrok) without explicit user authorization.
  - Enforce network egress controls — agent containers should not have internal
    network access by default.
  - Log all probe attempts with target host:port for audit trail compliance.

examples:
  bad:
    - "fetch('http://localhost:8080/admin')"
    - "http_request(url='http://127.0.0.1:6379/info')"
    - "fetch('http://192.168.1.1/admin')"
    - "fetch('http://172.16.0.1:9090/metrics')"
  good:
    - "fetch('https://api.example.com/status')"
    - "fetch('http://localhost:3000/api/health')"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "GOVERN-6"]
  soc2-type2: ["CC6.6", "CC6.7"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1046", "T1135", "T1590"]
  cwe: ["CWE-200", "CWE-918"]

analyzers: ["mcp"]
related_rules:
  - "mcp-recon-audit-localhost-probe"
