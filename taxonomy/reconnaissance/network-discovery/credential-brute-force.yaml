id: "reconnaissance/network-discovery/credential-brute-force"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Network Discovery"
category_id: "8.1"
name: "Password Brute-Force and Credential Stuffing"
risk_level: "critical"

abstract: |
  Invocation of password brute-force and credential stuffing tools (hydra, medusa,
  patator, spray, kerbrute, ncrack, crowbar) against authentication endpoints.
  These tools attempt thousands of username/password combinations per second against
  SSH, HTTP, FTP, RDP, SMB, and other services.

explanation: |
  Password brute-force attacks enumerate credential space against authentication
  services to gain unauthorized access. Credential stuffing reuses leaked username/
  password pairs from prior data breaches at scale. Key tools include:

  - **hydra / thc-hydra**: Multi-protocol network login cracker supporting 50+ protocols
  - **medusa**: Fast, parallel network authentication tester
  - **patator**: Multi-purpose brute-force tool with modular design
  - **spray**: Configurable password spraying against LDAP, Kerberos, ADFS
  - **kerbrute**: Kerberos pre-authentication brute-forcing and user enumeration
  - **ncrack**: Network authentication cracker for RDP, SSH, FTP, HTTP
  - **crowbar**: Protocol-specific brute-forcer targeting RDP and OpenVPN

  Attack variations covered:
  - **Password guessing** (T1110.001): Try many passwords against one account
  - **Password spraying** (T1110.003): Try one common password across many accounts (avoids lockout)
  - **Credential stuffing** (T1110.004): Replay leaked username:password pairs at scale
  - **Kerberoasting / AS-REP Roasting**: Offline cracking of Kerberos ticket hashes

  An AI agent invoking brute-force tools without explicit written authorization
  violates the Computer Fraud and Abuse Act (CFAA), UK Computer Misuse Act,
  and equivalent laws globally. Even in authorized penetration tests, these tools
  must be explicitly scoped and time-bounded.

recommendation: |
  - Block invocation of brute-force tools (hydra, medusa, patator, kerbrute, etc.)
    in agent environments. Pentest engagements should use isolated, explicitly
    authorized agent configurations.
  - Enforce account lockout and MFA on all authentication endpoints.
  - Monitor for high-volume authentication failures indicative of brute-forcing.
  - Restrict agent credentials to service accounts with limited blast radius.
  - Use credential-less service mesh authentication (mTLS) rather than passwords
    for agent-to-service communication.

examples:
  bad:
    - "hydra -l admin -P /usr/share/wordlists/rockyou.txt ssh://192.168.1.1"
    - "medusa -h 10.0.0.1 -u root -P passwords.txt -M ssh"
    - "kerbrute userenum --dc 10.0.0.1 -d corp.local users.txt"
    - "ncrack -U users.txt -P pass.txt rdp://10.0.0.1"
    - "spray -smb 10.0.0.1 users.txt passwords.txt 1 35 ldap"
  good:
    - "ssh -o PasswordAuthentication=no user@host  # key-based auth only"
    - "python -c \"import requests; r = requests.get('http://localhost/healthz')\""

