id: "reconnaissance/network-discovery/network-interface-enumeration"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Network Discovery"
category_id: "8.1"
name: "Network Interface MAC Address Enumeration"
risk_level: "medium"

abstract: |
  Reading MAC addresses from /sys/class/net/<iface>/address exposes hardware network
  interface identifiers. An AI agent collecting MAC addresses can fingerprint the host,
  detect network topology, or use MAC OUI prefixes to identify device vendors and
  infrastructure types.

explanation: |
  The Linux kernel exposes network interface information through sysfs at
  /sys/class/net/<interface>/. The `address` file contains the interface's MAC
  (Media Access Control) hardware address, a globally unique 48-bit identifier.

  An AI agent reading these files can:
  1. Fingerprint the physical host using a persistent hardware identifier
  2. Detect virtualized environments by recognizing VM vendor OUI prefixes
     (VMware: 00:50:56, VirtualBox: 08:00:27, QEMU: 52:54:00)
  3. Enumerate all network interfaces to map host connectivity
  4. Correlate identity across network sessions even after IP changes

  Unlike IP addresses, MAC addresses are stable hardware identifiers not affected by
  DHCP lease renewal. Combined with /sys/class/dmi/id/ reads (T1082), this provides
  a comprehensive host fingerprint. This aligns with MITRE ATT&CK T1016 (System
  Network Configuration Discovery).

recommendation: |
  - AUDIT reads from /sys/class/net/*/address by AI agents.
  - BLOCK if combined with outbound network calls (fingerprint exfiltration).
  - Restrict container/agent filesystems to exclude /sys/class/net/ MAC files.
  - Monitor for bulk interface enumeration (reading multiple interface addresses).

examples:
  bad:
    - "cat /sys/class/net/eth0/address"
    - "cat /sys/class/net/wlan0/address"
    - "for i in /sys/class/net/*/address; do cat $i; done"
  good:
    - "ip link show  # interface status for connectivity debugging"
    - "ifconfig -a  # interface configuration for setup"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "GOVERN-6"]
  soc2-type2: ["CC6.6", "CC7.2"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1016", "T1082"]
  cwe: ["CWE-200", "CWE-284"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-recon-audit-net-mac-address"]
