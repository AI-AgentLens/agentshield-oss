id: "reconnaissance/network-discovery/host-discovery"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Network Discovery"
category_id: "8.1"
name: "Host Discovery / Network Sweep"
risk_level: "high"

abstract: |
  Active host discovery tools and ARP sweeping commands enumerate live hosts on
  a network segment, enabling an attacker to map the local network, identify
  targets, and prepare for lateral movement or data exfiltration.

explanation: |
  Host discovery techniques include ARP-based sweeping (arp-scan, netdiscover)
  and passive ARP table inspection (arp, ip neigh). When performed by an AI agent
  without explicit authorization these reveal:

  - Live hosts and their MAC addresses, exposing network topology
  - Vendor prefixes from MAC OUIs, identifying device types (routers, IoT, servers)
  - Local subnet layout, enabling targeted follow-on attacks

  Active tools (arp-scan, netdiscover) send broadcast ARP requests across a subnet
  and collect responses — this is detectable by IDS and constitutes active scanning.
  Passive inspection of the ARP cache (arp -n, ip neigh) is lower-risk but still
  provides network topology information.

  Combined with port scanning (T1046) and DNS enumeration (T1590.002), host
  discovery forms the reconnaissance foundation for a network intrusion chain.

recommendation: |
  - BLOCK active ARP scanners (arp-scan, netdiscover) in agent environments.
  - AUDIT passive ARP cache reads (arp, ip neigh) and log target systems.
  - Restrict agents to necessary network egress only; deny raw socket access.
  - Monitor for scan-like patterns: rapid sequential ARP requests in agent logs.
  - Combine with network segmentation to limit the blast radius of any agent compromise.

examples:
  bad:
    - "arp-scan --localnet"
    - "arp-scan -I eth0 192.168.1.0/24"
    - "netdiscover -r 10.0.0.0/8"
    - "arp -n"
    - "ip neigh show"
  good:
    - "ping -c 1 192.168.1.1  # single host connectivity check"
    - "ip addr show  # local interface information only"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "GOVERN-6"]
  soc2-type2: ["CC6.6", "CC6.7"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1018", "T1046", "T1595.001"]
  cwe: ["CWE-200", "CWE-284"]

analyzers: ["structural", "regex"]
related_rules: ["ne-block-arp-scan", "ne-audit-arp-table", "ne-block-fping-sweep", "ne-audit-fping-single", "ne-block-nbtscan"]
