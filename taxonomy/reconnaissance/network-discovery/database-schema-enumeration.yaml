id: "reconnaissance/network-discovery/database-schema-enumeration"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Network Discovery"
category_id: "8.1"
name: "Database Schema Enumeration"
risk_level: "high"

abstract: |
  Database schema enumeration uses introspection queries against
  information_schema, pg_catalog, or SHOW TABLES/DATABASES to map table
  structures, column names, and relationships — establishing the intelligence
  needed for targeted data extraction. AI agents with database tool access
  must not perform unauthorized schema reconnaissance.

explanation: |
  When an AI agent has access to database query tools (MCP database tools,
  execute_sql, run_query), it can enumerate the entire schema of connected
  databases using standard introspection APIs:

  - MySQL/MariaDB: SHOW TABLES, SHOW DATABASES, SELECT * FROM
    information_schema.tables WHERE table_schema = DATABASE()
  - PostgreSQL: SELECT table_name FROM information_schema.tables,
    SELECT * FROM pg_catalog.pg_tables WHERE schemaname = 'public'
  - SQLite: SELECT name FROM sqlite_master WHERE type='table'
  - Generic: SELECT column_name FROM information_schema.columns WHERE
    table_name = 'users' — maps PII-bearing columns for extraction

  Schema enumeration is typically the precursor to targeted data extraction.
  An agent that has enumerated all tables and columns can craft precise queries
  to extract customer PII, payment data, or internal business intelligence
  with minimal noise.

recommendation: |
  - AUDIT all database tool calls containing information_schema, pg_catalog,
    sqlite_master, SHOW TABLES, or SHOW DATABASES queries.
  - BLOCK cross-database enumeration queries that list all schemas/databases.
  - Log all schema introspection queries with full SQL for compliance audit.
  - Enforce least-privilege: agent database accounts should have SELECT
    access only on required tables, not information_schema.
  - Require explicit user approval before any database schema exploration task.

examples:
  bad:
    - "execute_sql('SELECT * FROM information_schema.tables')"
    - "run_query('SHOW TABLES')"
    - "run_query('SHOW DATABASES')"
    - "execute_sql('SELECT table_name FROM pg_catalog.pg_tables')"
    - "execute_sql('SELECT name FROM sqlite_master WHERE type=\\'table\\'')"
    - "execute_sql('SELECT column_name FROM information_schema.columns WHERE table_name=\\'users\\'')"
  good:
    - "execute_sql('SELECT COUNT(*) FROM orders WHERE status = \\'pending\\'')"
    - "run_query('SELECT id, name FROM products LIMIT 10')"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.6", "CC6.7"]
  iso-42001-2023: ["A.7.4"]

references:
  mitre_attack: ["T1213", "T1005", "T1074"]
  cwe: ["CWE-200", "CWE-89", "CWE-284"]

analyzers: ["mcp"]
related_rules:
