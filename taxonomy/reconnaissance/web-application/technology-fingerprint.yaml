id: "reconnaissance/web-application/technology-fingerprint"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Web Application Reconnaissance"
category_id: "8.5"
name: "Web Technology Fingerprinting"
risk_level: "medium"

abstract: |
  Technology fingerprinting tools identify the software stack, CMS, frameworks,
  analytics platforms, and server versions used by a target web application.
  This intelligence enables attackers to select targeted exploits and narrows
  the attack surface assessment phase.

explanation: |
  Tools such as whatweb, wappalyzer-cli, and built-in fingerprinting modes of
  vulnerability scanners interrogate HTTP response headers, HTML meta tags,
  JavaScript files, and server behavior to identify:

  - Web server software and version (Apache, nginx, IIS)
  - CMS platforms (WordPress, Drupal, Joomla) and installed plugins
  - JavaScript frameworks, analytics tools, CDN providers
  - Backend language and application framework signatures

  This is a classic pre-exploitation reconnaissance step (MITRE T1592) that
  maps the target's attack surface before selecting CVEs or known exploits.
  Active fingerprinting without authorization violates authorization boundaries
  and may expose target infrastructure details to unintended parties.

recommendation: |
  - BLOCK active fingerprinting tools in agent environments.
  - Treat technology identification as a reconnaissance activity requiring explicit authorization.
  - Passive analysis of already-downloaded content (HTML inspection) is acceptable
    for legitimate debugging; active probing is not.

examples:
  bad:
    - "whatweb https://target.com"
    - "whatweb -a 3 https://target.com"
    - "wappalyzer https://target.com"
  good:
    - "curl -I https://api.example.com"
    - "cat response.html | grep '<meta'"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "GOVERN-6"]
  soc2-type2: ["CC6.6", "CC6.7"]
  iso-42001-2023: ["A.9.3", "A.9.4"]

references:
  mitre_attack: ["T1592", "T1592.002"]
  cwe: ["CWE-200"]

analyzers: ["structural"]
related_rules: ["ne-block-whatweb"]
