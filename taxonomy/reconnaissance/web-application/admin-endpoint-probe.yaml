id: "reconnaissance/web-application/admin-endpoint-probe"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Web Application Reconnaissance"
category_id: "8.5"
name: "Admin & Management Endpoint Probing"
risk_level: "high"

abstract: |
  Admin endpoint probing targets well-known management interfaces exposed by
  frameworks and platforms (Spring Boot Actuator, Kubernetes dashboard, phpMyAdmin,
  Jenkins, Grafana) to extract configuration, credentials, and operational data.
  AI agents must not access management endpoints without explicit authorization.

explanation: |
  Modern application frameworks expose management APIs that aggregate sensitive
  operational data in a single endpoint. The threat model includes:

  - Spring Boot Actuator (/actuator, /actuator/env, /actuator/heapdump):
    exposes environment variables (including secrets), heap dumps, application
    config, thread state, and metrics. The /actuator/env endpoint alone may
    leak database passwords, API keys, and OAuth secrets injected as env vars.
  - Kubernetes dashboard (/api, /api/v1/namespaces): exposes pod specs, secrets,
    service accounts, and cluster topology without additional authentication
    when RBAC is misconfigured.
  - Cloud-native management ports (Prometheus :9090/metrics, Jaeger :16686,
    Zipkin :9411): expose internal telemetry and service graphs.
  - Generic admin paths (/admin, /management, /console, /_debug): often
    protected only by obscurity in development or misconfigured staging environments.

  An AI agent with HTTP tool access (MCP fetch, browser tools) can probe these
  endpoints as part of a task without the user realizing it is performing
  unauthorized reconnaissance.

recommendation: |
  - AUDIT all MCP HTTP requests to /actuator*, /admin, /management, /console,
    /dashboard, and framework-specific management paths.
  - BLOCK requests to /actuator/heapdump, /actuator/env, and /api/v1/secrets
    which directly expose credential material.
  - Log all admin endpoint access attempts with full URL for compliance audit.
  - Enforce network-level controls: management endpoints should require
    authenticated access and not be reachable from agent execution environments.

examples:
  bad:
    - "fetch('http://localhost:8080/actuator/env')"
    - "fetch('http://app:8080/actuator/heapdump')"
    - "fetch('http://k8s-dashboard/api/v1/namespaces/default/secrets')"
    - "fetch('http://internal-app/admin')"
    - "http_request(url='http://monitoring:9090/metrics')"
  good:
    - "fetch('https://api.example.com/health')"
    - "fetch('http://localhost:8080/api/status')"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "GOVERN-6"]
  soc2-type2: ["CC6.6", "CC6.7"]
  iso-42001-2023: ["A.9.3", "A.9.4"]

references:
  mitre_attack: ["T1082", "T1213", "T1590"]
  cwe: ["CWE-200", "CWE-284", "CWE-552"]

analyzers: ["mcp"]
related_rules:
  - "mcp-recon-audit-spring-actuator"
