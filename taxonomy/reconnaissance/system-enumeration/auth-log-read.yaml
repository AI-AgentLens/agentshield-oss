id: "reconnaissance/system-enumeration/auth-log-read"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "System Enumeration"
category_id: "8.9"
name: "Authentication Log Read"
risk_level: "medium"

abstract: |
  An AI agent reads system authentication or audit logs (/var/log/auth.log,
  /var/log/secure, /var/log/audit/audit.log, wtmp, btmp) to enumerate active
  user accounts, identify privileged sessions, discover SSH login patterns,
  and map the system's authentication landscape — a reconnaissance step that
  informs targeted privilege escalation and lateral movement.

explanation: |
  System authentication logs record every login attempt, sudo invocation,
  PAM authentication event, and session lifecycle. For an AI agent performing
  reconnaissance, these logs provide high-value intelligence:

  **Information exposed by log type**:
  - `/var/log/auth.log` (Debian/Ubuntu) or `/var/log/secure` (RHEL/CentOS):
    - Successful and failed SSH login attempts with usernames and source IPs
    - sudo command history with exact commands run as root
    - PAM authentication events (su, login, cron, su)
    - Service account authentications
  - `/var/log/audit/audit.log` (auditd):
    - All system calls matching audit rules
    - File access events, process executions, network connections
    - SELinux policy violations and privilege changes
  - `wtmp`/`btmp` (`last`/`lastb` database):
    - Complete historical login records (who logged in, from where, for how long)
    - Failed login attempts (btmp) for password spray target identification
  - `faillog`/`lastlog`:
    - Failed login counts per user, last successful login timestamp

  **Attack use cases**:
  1. **Account enumeration**: Identify all users with active sessions or
     recent logins, including service accounts used by running applications.
  2. **Privilege mapping**: sudo log lines reveal which users have sudo
     access and which commands they run — targeting high-value accounts.
  3. **Pattern analysis**: Login time patterns reveal when accounts are
     unmonitored or when key personnel are offline.
  4. **Source IP discovery**: SSH login source IPs reveal jump hosts,
     VPN endpoints, and administrator workstations for further targeting.
  5. **Anti-forensics preparation**: Reading logs before conducting attacks
     helps identify which log lines to erase afterward.

recommendation: |
  - **AUDIT** all AI agent reads of authentication and audit log files.
  - Legitimate debugging workflows (diagnosing SSH failures, checking
    cron job execution) should be performed by humans, not AI agents.
  - Restrict read access to auth logs to privileged users/roles only;
    AI agents operating in developer contexts should not have access.
  - Correlate auth log reads with subsequent suspicious commands to detect
    reconnaissance-then-attack sequences.

examples:
  bad:
    - |
      # Enumerate users with recent logins
      cat /var/log/auth.log | grep "Accepted password" | awk '{print $9}' | sort -u
    - |
      # Read full audit trail
      cat /var/log/audit/audit.log
    - |
      # Check failed login targets for spray attack planning
      cat /var/log/btmp | last -f /dev/stdin
  good:
    - |
      # Check application-specific log (safe - no auth metadata)
      cat /var/log/nginx/access.log

