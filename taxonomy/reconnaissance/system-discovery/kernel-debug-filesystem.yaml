id: "reconnaissance/system-discovery/kernel-debug-filesystem"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "System Discovery"
category_id: "8.6"
name: "Kernel Debug Filesystem Access via debugfs"

risk_level: "high"

abstract: |
  `/sys/kernel/debug/` (debugfs) exposes kernel tracing facilities, eBPF program
  info, ftrace hooks, and internal kernel data structures. An AI agent reading this
  filesystem can intercept system calls, dump memory maps, extract credentials from
  kernel memory, and build a detailed map of all running processes and kernel internals.

explanation: |
  The Linux kernel debug filesystem (`debugfs`) is mounted at `/sys/kernel/debug/`
  and exposes deep kernel internals for development and debugging. In production AI
  agent environments, this filesystem creates a significant reconnaissance surface:

  **High-value targets within debugfs:**
  - `/sys/kernel/debug/tracing/` — ftrace infrastructure; can trace all syscalls,
    function calls, and kernel events across all processes system-wide
  - `/sys/kernel/debug/bpf/` — loaded eBPF programs; reveals security monitoring
    infrastructure and may expose program bytecode
  - `/sys/kernel/debug/kprobes/` — active kernel probes; reveals what is being
    monitored and potential gaps in detection
  - `/sys/kernel/debug/dri/` — GPU memory maps; can expose framebuffer contents
  - `/sys/kernel/debug/block/` — I/O scheduler internals; reveals storage activity

  An AI agent accessing debugfs can:
  1. Map all security monitoring hooks to find detection blind spots
  2. Use ftrace to intercept credentials passed through syscalls
  3. Enumerate all eBPF programs to understand the security posture
  4. Correlate process activity across the entire system

  Legitimate use requires explicit kernel debugging intent — no normal application
  or AI agent workflow requires debugfs access.

recommendation: |
  - BLOCK/AUDIT all reads from `/sys/kernel/debug/` by AI agents.
  - Unmount or restrict debugfs in agent execution environments (`umount /sys/kernel/debug`).
  - Use kernel lockdown mode to restrict debugfs access on production systems.
  - Apply AppArmor/SELinux profiles that deny agent access to sysfs debug paths.

examples:
  bad:
    - "ls /sys/kernel/debug/"
    - "cat /sys/kernel/debug/tracing/available_tracers"
    - "cat /sys/kernel/debug/kprobes/list"
    - "read_file('/sys/kernel/debug/bpf/maps')"
    - "find /sys/kernel/debug -name '*.txt' | head"
  good:
    - "uname -r  # kernel version check"
    - "cat /proc/sys/kernel/ostype  # OS type via safe sysctl"
    - "sysctl -a 2>/dev/null | grep kernel.version  # safe kernel info"

