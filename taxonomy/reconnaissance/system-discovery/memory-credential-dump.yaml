id: "reconnaissance/system-discovery/memory-credential-dump"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "System Discovery"
category_id: "8.6"
name: "Memory Credential Dump via /dev/mem"

risk_level: "high"

abstract: |
  `/dev/mem` exposes raw physical memory, allowing an attacker to read the contents
  of RAM belonging to any running process — including cleartext credentials, session
  tokens, encryption keys, and private key material — without requiring process-level
  access or ptrace permissions in some kernel configurations.

explanation: |
  `/dev/mem` is a character device that provides direct read/write access to the
  machine's physical memory address space. In AI agent environments, access to this
  device represents a critical credential-harvesting vector:

  **High-value targets accessible through /dev/mem:**
  - Cleartext passwords stored by running authentication daemons (sshd, sudo, PAM)
  - Session tokens and OAuth credentials held in web server or application memory
  - Encryption keys and private key material cached in memory by gpg-agent or ssh-agent
  - Database connection strings and API keys in application heap space
  - Kernel credential structures (task_struct, cred) for privilege escalation

  An AI agent or attacker with access to `/dev/mem` can:
  1. Read physical memory pages belonging to privileged processes (e.g., sshd, sudo)
  2. Extract cleartext passwords as they are compared or validated in memory
  3. Dump cryptographic key material from kernel memory without triggering process-level
     security controls
  4. Bypass ASLR/PIE by mapping virtual-to-physical address relationships from
     `/proc/<pid>/maps` cross-referenced against `/dev/mem` offsets

  Modern Linux kernels restrict `/dev/mem` access via `CONFIG_STRICT_DEVMEM` and
  `CONFIG_IO_STRICT_DEVMEM`, but legacy configurations or custom kernels may still
  allow broad memory reads. Containers and VMs with privileged device access are
  particularly at risk.

  No legitimate AI agent or developer workflow requires direct physical memory access —
  any read from `/dev/mem` is a strong indicator of malicious or misconfigured behavior.

recommendation: |
  - BLOCK all reads from `/dev/mem` and `/dev/kmem` by AI agents at the policy layer.
  - Ensure `CONFIG_STRICT_DEVMEM=y` and `CONFIG_IO_STRICT_DEVMEM=y` are set in kernel config.
  - Remove read/write permissions on `/dev/mem` for non-root users (`chmod 0` or `chattr +i`).
  - Use seccomp profiles or AppArmor/SELinux to deny `open()` on `/dev/mem` for agent processes.
  - Audit for `/proc/<pid>/mem` alongside `/dev/mem` — both provide process memory access.

examples:
  bad:
    - "cat /dev/mem | strings | grep -i password"
    - "dd if=/dev/mem bs=1024 count=1024 | strings"
    - "read_file('/dev/mem')"
    - "hexdump /dev/mem | head -100"
    - "strings /dev/mem | grep -E '(password|token|key|secret)'"
    - "dd if=/dev/kmem bs=4096 skip=1000 count=100"
  good:
    - "cat /proc/meminfo  # read memory stats safely"
    - "free -h  # display memory usage"
    - "vmstat 1 5  # virtual memory statistics"
    - "read_file('/proc/meminfo')"

