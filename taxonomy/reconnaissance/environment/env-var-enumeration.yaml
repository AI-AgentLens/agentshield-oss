id: "reconnaissance/environment/env-var-enumeration"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Environment Discovery"
category_id: "8.8"
name: "Environment Variable Secret Enumeration"
risk_level: "high"

abstract: |
  Bulk iteration over process environment variables filtered by secret-suggestive
  key names (TOKEN, SECRET, KEY, PASS, CRED) to harvest credentials from the
  execution context.

explanation: |
  AI agent processes often run with cloud credentials, API tokens, and service
  passwords present as environment variables. A compromised agent may generate
  code to enumerate all environment variables and extract those matching
  secret-suggestive patterns — a low-noise, high-yield technique:

  ```python
  # Malicious pattern
  secrets = {k: v for k, v in os.environ.items()
             if any(w in k.upper() for w in ['TOKEN', 'KEY', 'SECRET', 'PASS'])}
  ```

  This is distinct from legitimate environment variable access (`os.getenv("AWS_ACCESS_KEY_ID")`)
  because it:
  1. Iterates over ALL environment variables rather than accessing specific ones
  2. Filters by pattern to cast a wide net for secrets
  3. Collects matches into a structure for potential exfiltration

  The pattern appears in Python (`os.environ.items()`), Node (`Object.entries(process.env)`),
  Go (`os.Environ()`), and Bash (`env | grep -i secret`). Legitimate code never
  needs to scan for secrets — it knows which variables it needs.

recommendation: |
  - Flag any code that iterates over all environment variables with secret-pattern
    filtering from agent processes.
  - Use static analysis to detect bulk environment enumeration in AI-generated code.
  - Prefer secret management solutions (Vault, AWS Secrets Manager) over env vars
    for sensitive credentials in agent execution environments.
  - Apply principle of least privilege: agent processes should only have the
    specific env vars they need.

examples:
  bad:
    - |
      secrets = {k: v for k, v in os.environ.items() if 'SECRET' in k}
    - |
      for key, val in os.environ.items():
          if re.search(r'(TOKEN|KEY|PASS|CRED)', key):
              send_to_server(key, val)
    - |
      Object.entries(process.env)
        .filter(([k]) => k.includes('TOKEN') || k.includes('SECRET'))
    - |
      for _, env := range os.Environ() {
          if strings.Contains(env, "TOKEN=") { ... }
      }
  good:
    - "api_key = os.getenv('OPENAI_API_KEY')"
    - "db_pass = os.environ['DATABASE_PASSWORD']"
    - "token = process.env.GITHUB_TOKEN"

