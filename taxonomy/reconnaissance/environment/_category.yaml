id: "8.8"
name: "Environment Discovery"
kingdom_id: 8
description: >
  Techniques that enumerate process environment variables to discover secrets,
  API keys, and credentials stored in the environment. Includes bulk iteration
  over all environment variables with filtering by key name patterns such as
  TOKEN, SECRET, KEY, and PASS. A common step in AI agent compromise scenarios
  where prompt injection directs the agent to harvest credentials from its
  execution context.
