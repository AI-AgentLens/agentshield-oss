id: "reconnaissance/filesystem/credential-path-enumeration"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Filesystem Reconnaissance"
category_id: "8.7"
name: "Credential File Path Enumeration"
risk_level: "high"

abstract: |
  Iterating over a list of known credential file paths to probe which ones
  exist on the target system, typically as a pre-exfiltration discovery step.

explanation: |
  AI agents compromised via prompt injection often perform credential discovery
  before exfiltration. A common pattern is to iterate over a hardcoded list of
  well-known credential paths and check which ones are present:

  - Lists of SSH key paths: `~/.ssh/id_rsa`, `~/.ssh/id_ed25519`
  - AWS/GCP/Azure credential files: `~/.aws/credentials`, `~/.config/gcloud/`
  - Token files: `~/.kube/config`, `~/.vault-token`, `~/.npmrc`

  The code typically uses:
  - `os.path.exists()` or `os.stat()` in a loop over a credential paths list
  - `fs.existsSync()` in Node/TypeScript
  - `os.Stat()` in a range loop in Go

  Detection focus: the combination of (a) a loop variable, (b) a collection
  with a name suggesting credentials/secrets, and (c) file existence checks.
  This pattern has low false-positive rates in application code because
  legitimate applications use `os.getenv()` or direct `open()` with specific
  paths, not loops over credential path arrays.

recommendation: |
  - Alert on loops over arrays with credential-suggestive names followed by
    file existence checks from agent processes.
  - Use static analysis to detect credential path enumeration patterns in
    AI-generated code before execution.
  - Audit agent tool calls for bulk file existence probing.

examples:
  bad:
    - |
      cred_paths = ['~/.ssh/id_rsa', '~/.aws/credentials', '~/.kube/config']
      for path in cred_paths:
          if os.path.exists(os.path.expanduser(path)):
              with open(path) as f: data = f.read()
    - |
      const sshKeyPaths = ['~/.ssh/id_rsa', '~/.ssh/id_ed25519']
      for (const p of sshKeyPaths) {
          if (fs.existsSync(p)) { ... }
      }
  good:
    - "private_key = os.getenv('SSH_PRIVATE_KEY')"
    - "aws_creds = boto3.Session().get_credentials()"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.12"]
  eu-ai-act-2024: ["Art.13", "Art.14"]
  nist-ai-rmf-1.0: ["GOVERN-1"]
  soc2-type2: ["CC6.1"]
  iso-42001-2023: ["6.1.2", "9.1", "A.7.4"]

references:
  mitre_attack: ["T1083", "T1552"]
  cwe: ["CWE-538"]

analyzers: ["semantic"]
