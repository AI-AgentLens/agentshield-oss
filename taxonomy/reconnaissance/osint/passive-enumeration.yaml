id: "reconnaissance/osint/passive-enumeration"
version: "1.1.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "OSINT & Passive Enumeration"
category_id: "8.3"
name: "OSINT Passive Enumeration"
risk_level: "high"

abstract: |
  Open-source intelligence (OSINT) frameworks harvest publicly available
  information about target organizations, domains, people, and infrastructure.
  Even though sources are public, systematic intelligence gathering against a
  target without authorization violates acceptable-use boundaries and is a
  recognized pre-attack phase.

explanation: |
  OSINT tools aggregate and correlate public data to build comprehensive target
  profiles. The threat landscape spans multiple specialized tool categories:

  - **Email harvesting**: theHarvester, h8mail (breach database lookups),
    holehe (account enumeration across 120+ sites) — collects email addresses
    and exposed credentials for phishing and credential-stuffing campaigns.
  - **Subdomain enumeration**: amass, subfinder, assetfinder, waybackurls, gau
    (GetAllURLs) — maps the attack surface via DNS, CT logs, Wayback Machine,
    and search APIs to discover dev/staging subdomains.
  - **Employee and social enumeration**: recon-ng, maltego — maps org structures
    from LinkedIn and public sources for social engineering targeting.
  - **Infrastructure and service discovery**: Shodan CLI, spiderfoot (automated
    multi-source correlation), photon (web crawler for URLs/secrets/metadata) —
    correlates IP ranges, ASNs, and exposed services.
  - **Document metadata harvesting**: metagoofil — uses Google/Bing to discover
    and extract metadata from public documents, exposing internal usernames,
    paths, and software versions.

  In the MITRE ATT&CK framework this maps to Reconnaissance (TA0043):
  T1589 (Gather Victim Identity Information), T1593 (Search Open Websites/Domains),
  T1596 (Search Open Technical Databases). AI agents have no legitimate use case
  for OSINT gathering against external targets without explicit authorization.

recommendation: |
  - BLOCK all OSINT framework invocations in agent environments.
  - Require explicit authorization documentation before any intelligence gathering.
  - For internal asset discovery, use sanctioned inventory tools with proper scope.

examples:
  bad:
    - "theHarvester -d example.com -b all"
    - "theHarvester -d target.com -b google,linkedin -l 500"
    - "recon-ng -w target"
    - "shodan search 'apache'"
    - "amass enum -d target.com"
    - "subfinder -d target.com"
    - "spiderfoot -s http://target.com -m all"
    - "h8mail -t victim@example.com"
    - "holehe target@example.com"
    - "metagoofil -d example.com -t pdf,doc,xls -o /tmp/meta"
    - "assetfinder --subs-only example.com"
    - "waybackurls example.com | tee urls.txt"
    - "gau example.com --threads 10"
    - "photon -u http://target.com -o /tmp/crawl"
  good:
    - "dig example.com"
    - "whois example.com"
    - "nslookup api.example.com"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.20", "A.8.23"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MAP-5", "GOVERN-6"]
  soc2-type2: ["CC6.6", "CC6.7"]
  iso-42001-2023: ["6.1.2", "9.1", "A.7.4"]

references:
  mitre_attack: ["T1589", "T1589.002", "T1593", "T1596", "T1596.005", "T1595.001"]
  cwe: ["CWE-200", "CWE-284"]

analyzers: ["structural"]
related_rules:
  - "ne-block-theharvester"
  - "ne-block-recon-ng"
  - "ne-block-spiderfoot"
  - "ne-block-h8mail"
  - "ne-block-holehe"
  - "ne-block-metagoofil"
  - "ne-block-assetfinder"
  - "ne-block-waybackurls"
  - "ne-block-gau"
  - "ne-block-photon"
