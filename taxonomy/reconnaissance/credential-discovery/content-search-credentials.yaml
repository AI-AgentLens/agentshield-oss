id: "reconnaissance/credential-discovery/content-search-credentials"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Credential Discovery"
category_id: "8.10"
name: "MCP Content Search for Credentials"
risk_level: "high"

abstract: |
  An AI agent using MCP content search tools (grep_files, search_code,
  find_in_files, ripgrep) to search file contents for credential patterns —
  API keys, passwords, tokens, and secrets — across the workspace.

explanation: |
  MCP content search tools let AI agents perform grep-equivalent searches
  across all files in a workspace. A compromised agent can search for
  credential patterns in source code, configuration files, and documentation:

  - Searching for `API_KEY`, `SECRET`, `PASSWORD`, `TOKEN` string patterns
  - Searching for credential format patterns: `sk-[A-Za-z0-9]{48}` (OpenAI),
    `AKIA[0-9A-Z]{16}` (AWS access key), `ghp_` (GitHub PAT)
  - Searching for common credential variable names in dotenv format
  - Using semantic search to find "passwords" or "credentials" in natural language

  This is the MCP analogue of `grep -r "API_KEY" ~/dev/` or
  `git log -p | grep "password"` reconnaissance. The content search vector
  is particularly dangerous because:
  - Grep-like tools are core development aids (finding code patterns)
  - Secret patterns appear in source code, config files, and git history
  - A single search call can locate dozens of credentials across all projects

recommendation: |
  - Block MCP content search calls whose query arguments match known secret
    format patterns (AWS AKIA, OpenAI sk-, GitHub ghp_/ghs_).
  - Audit content search calls using credential-keyword queries (password,
    api_key, secret, token) to detect reconnaissance intent.
  - Apply output filtering to MCP content search results to redact credential
    pattern matches before returning to the agent.

examples:
  bad:
    - "grep_files(query='OPENAI_API_KEY', path='~')"
    - "search_code(pattern='AKIA[0-9A-Z]{16}')"
    - "find_in_files(text='password', path='/home/user/dev')"
    - "ripgrep(pattern='sk-[A-Za-z0-9]+', path='.')"
  good:
    - "grep_files(query='def authenticate', path='./src')"
    - "search_code(pattern='class.*Handler', path='./api')"

compliance:
  owasp-llm-2025: ["LLM06", "LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.12", "A.5.34"]
