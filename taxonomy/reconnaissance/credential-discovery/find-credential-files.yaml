id: "reconnaissance/credential-discovery/find-credential-files"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "Credential Discovery"
category_id: "8.10"
name: "MCP File Search for Credential Files"
risk_level: "high"

abstract: |
  An AI agent using MCP file search tools (find_files, glob, list_files,
  search_files) to enumerate credential paths — SSH keys, cloud credentials,
  token files, and secret stores — as reconnaissance before exfiltration.

explanation: |
  MCP file search tools provide AI agents with a filesystem search interface
  that bypasses shell-based monitoring. A compromised agent can invoke these
  tools to locate credential files by searching for known paths or filename
  patterns without triggering shell-level AgentShield rules.

  Common search patterns:
  - Searching for `*.pem`, `*.key`, `id_rsa`, `id_ed25519` to locate SSH keys
  - Searching for `.aws`, `credentials`, `.kube/config` to find cloud tokens
  - Searching for `.env`, `*.token`, `*.secret` to find API keys
  - Listing home directory contents to discover installed credential stores

  This is the MCP analogue of shell-based `find ~/.ssh -name "*.pem"` or
  `ls ~/.aws/` reconnaissance. The MCP vector is particularly dangerous because:
  - File search tools are legitimate development aids (finding source files)
  - The search is targeted toward credential paths, not source code
  - Results feed directly into subsequent MCP read_file exfiltration calls

recommendation: |
  - Block MCP file search calls whose path or pattern arguments match known
    credential directories (~/.ssh, ~/.aws, ~/.kube, ~/.gnupg).
  - Audit MCP file search calls that use credential-suggestive filename patterns
    (*.pem, *.key, id_rsa, credentials, token, secret).
  - Correlate file search calls with subsequent read_file calls on matched paths
    to detect search-then-read exfiltration chains.

examples:
  bad:
    - "find_files(path='~/.ssh', pattern='*.pem')"
    - "glob(pattern='**/.aws/credentials')"
    - "list_files(path='/home/user/.kube')"
    - "search_files(path='~', pattern='id_rsa')"
  good:
    - "find_files(path='./src', pattern='*.py')"
    - "glob(pattern='**/*.ts')"
    - "list_files(path='./docs')"

compliance:
  owasp-llm-2025: ["LLM06", "LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.12"]
  eu-ai-act-2024: ["Art.13", "Art.14"]
