id: "reconnaissance/llm-introspection/prompt-cache-timing-oracle"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "LLM Introspection"
category_id: "8.2"
name: "Prompt Cache Timing Oracle"
risk_level: "medium"

abstract: |
  An adversary measures LLM API response latency patterns to infer whether
  their input prefix matches a cached prompt from another user or session —
  potentially recovering system prompt content, confirming sensitive context,
  or leaking cross-tenant prompt structure through a timing side-channel in
  the provider's prompt caching layer.

explanation: |
  Modern LLM providers (Anthropic, OpenAI, Google) implement prompt caching
  to reduce inference cost for repeated prefixes. When a request prefix hits
  the cache, the provider returns significantly faster than a cold (uncached)
  request. This latency differential creates a timing oracle: an attacker
  who can submit requests and measure response times can determine whether
  their supplied prefix matches a cached prompt from another user, session,
  or the system itself.

  The attack proceeds as follows:

  1. **Baseline measurement**: The attacker establishes expected cold-cache
     latency for a given prompt length at the target LLM provider.
  2. **Prefix enumeration**: The attacker submits prefix candidates — e.g.,
     guessing system prompt fragments, known policy preambles, or AI
     assistant identities ("You are a helpful assistant working at...").
  3. **Cache-hit inference**: A response faster than the cold baseline
     indicates the submitted prefix matched a cached entry in the provider's
     infrastructure.
  4. **Iterative recovery**: By extending confirmed prefixes character by
     character (similar to timing attacks on HMAC verification), the attacker
     incrementally reconstructs the full cached prompt.

  This is particularly dangerous for system prompts that embed proprietary
  business logic, safety guardrails, or user PII — content that operators
  mark as confidential but transmit to the LLM on every request (making
  caching highly likely).

  **Threat context**: Demonstrated experimentally in academic research
  (Agrawal et al., 2024 — "Can LLMs Keep a Secret?"). Affected APIs include
  Anthropic's prompt caching, OpenAI's cached inputs, and Google's context
  caching. Cross-tenant cache isolation is the provider-level control, but
  it is not guaranteed across all tiers, regions, or future implementations.

  **Attack surface in agentic systems**: AI coding agents (Cursor, Claude
  Code, Windsurf) typically send a fixed system prompt on every request,
  making their system prompts prime targets for cache timing reconnaissance.
  An attacker with API access to the same provider tier can attempt to
  recover these prompts.

  Distinct from `context-window-probe` (which reads shell/env variables to
  find injected prompt content) — this attack operates entirely through the
  external API timing channel without requiring local access.

recommendation: |
  **For application developers:**
  - Add randomized padding or a nonce to system prompts to defeat prefix
    matching (at the cost of caching efficiency).
  - Rotate system prompt preambles periodically to invalidate cached entries.
  - Avoid embedding secrets or PII in cacheable system prompt prefixes.
  - Monitor LLM API call latency patterns from your application — unusual
    timing distributions may indicate probing by external parties.

  **For AI coding agent operators:**
  - Use provider-level tenant isolation features (dedicated capacity,
    private endpoints) that guarantee separate cache namespaces.
  - Consider whether cost savings from prompt caching justify the
    confidentiality trade-off for high-sensitivity system prompts.
  - Treat system prompt content as potentially recoverable by well-resourced
    adversaries with API access to the same provider.

  **For AgentShield:**
  - Detect code patterns that programmatically measure LLM API response
    latency in a loop while varying input prefixes — indicative of
    timing oracle probing.
  - Flag unusual patterns of rapid, short LLM API calls from agent code.

examples:
  bad:
    - |
      # Timing oracle probe — measures latency to infer cached prefix matches
      import time, anthropic
      client = anthropic.Anthropic()
      prefix_candidates = ["You are a helpful assistant", "You are Claude", "You work at Acme Corp"]
      for prefix in prefix_candidates:
          start = time.time()
          client.messages.create(model="claude-3-5-sonnet-20241022",
              max_tokens=1, messages=[{"role":"user","content": prefix + " ."}])
          elapsed = time.time() - start
          if elapsed < 0.5:  # cache hit threshold
              print(f"Cache hit: {prefix}")
    - |
      # Binary search prefix recovery via timing
      import statistics
      def probe_prefix(candidate):
          times = [api_call(candidate) for _ in range(5)]
          return statistics.median(times) < CACHE_HIT_THRESHOLD
  good:
    - "# LLM API calls with randomized nonce prefix to defeat cache timing"
    - "system_prompt = f'{nonce_32bytes} {actual_system_prompt}'"
    - "# Use dedicated capacity endpoint with per-tenant cache isolation"

