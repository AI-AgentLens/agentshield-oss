id: "reconnaissance/llm-introspection/multi-agent-topology-enumeration"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "LLM Introspection"
category_id: "8.2"
name: "Multi-Agent Topology Enumeration"
risk_level: "high"

abstract: |
  A compromised or malicious AI agent systematically maps the multi-agent
  network — discovering which other agents exist, their tool capabilities,
  trust relationships, and communication patterns — as a prerequisite for
  targeted exploitation or privilege escalation via delegation.

explanation: |
  In multi-agent systems (multiple Claude instances, AutoGen, CrewAI,
  LangGraph, A2A protocol networks), agents communicate through shared
  channels, orchestration frameworks, and MCP registries. An agent under
  attacker control can perform topology reconnaissance to:

  - **Discover co-agents**: Query orchestration APIs, shared memory stores,
    or MCP registries to enumerate other active agents. Examples: calling
    `list_agents`, enumerating A2A discovery endpoints (/.well-known/agent.json),
    reading agent manifest files (autogen_config.json, .crew/config.yaml,
    langgraph.json) that list agent definitions and their assigned roles.
  - **Map capabilities**: For each discovered agent, probe its tool manifest
    via MCP `tools/list` — learning what actions each agent can take (which
    agents can write files, commit code, make payments, approve deployments).
  - **Identify trust topology**: Determine which agents have elevated
    privileges, can invoke high-risk tools, or are trusted by downstream
    processes. An agent that can trigger CI/CD or approve PRs is the
    high-value target.
  - **Enumerate agent processes**: Use OS-level reconnaissance (`ps aux |
    grep claude`, `pgrep cursor`) to identify which agent processes are
    running, map their PIDs, and potentially target them for manipulation.
  - **Target high-value agents**: Use the topology map to craft targeted
    prompt injection or delegation forgery against the most privileged agent
    in the network.

  **Why this is distinct from existing taxonomy entries**:
  - `agent-capability-enumeration`: Maps the *current* agent's own capabilities.
    This entry covers mapping *other* agents in the network.
  - `agent-to-agent-lateral-pivot`: The exploitation step. Topology
    enumeration is the prerequisite reconnaissance that makes lateral pivot possible.
  - `llm-introspection/*`: Focus on probing a single model's properties.
    This targets the inter-agent network structure.

  MITRE equivalents: T1046 (Network Service Discovery), T1592 (Gather Victim
  Host Information) — adapted for AI multi-agent network architecture.

recommendation: |
  - Restrict agent manifests and orchestration config files from being
    readable by MCP file tools (apply need-to-know access control).
  - Rate-limit or alert on `tools/list` calls across multiple distinct
    MCP server connections within a short window.
  - Implement per-agent allowlists: each agent should only be aware of
    the agents it legitimately collaborates with.
  - Monitor A2A discovery endpoint access (/.well-known/agent.json) — the
    only legitimate consumer is an orchestrator, not a peer agent.
  - Flag OS-level process enumeration targeting AI agent processes
    (`ps aux | grep claude`, `pgrep cursor`, `pgrep autogpt`).
  - Treat topology enumeration as a high-severity precursor signal: an
    agent mapping the network is planning a targeted follow-on attack.

examples:
  bad:
    - "ps aux | grep -i claude  # enumerating running Claude agent processes"
    - "ps aux | grep -i 'autogpt\\|langchain\\|crewai'  # mapping AI orchestration processes"
    - "cat ~/.config/autogen/config.json  # reading AutoGen agent topology config"
    - "cat .crew/config.yaml  # reading CrewAI agent roster and role assignments"
    - "curl http://agent-server/.well-known/agent.json  # A2A agent discovery endpoint"
    - "MCP read of langgraph.json exposing graph node definitions and agent roles"
  good:
    - "ps aux | grep nginx  # checking web server process status"
    - "cat README.md  # reading project documentation"
    - "cat .github/workflows/ci.yml  # reading CI configuration (not agent topology)"

compliance:
  owasp-llm-2025: ["LLM06", "LLM08"]
  iso-27001-2022: ["A.8.9", "A.8.20", "A.5.23"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC6.1", "CC7.1"]
  iso-42001-2023: ["A.9.3", "A.9.1"]
  mitre_atlas: ["AML.T0049"]

references:
  mitre_attack: ["T1046", "T1592", "T1057"]
  cwe: ["CWE-200", "CWE-284"]
  external:
    - title: "Google A2A Protocol — Agent Discovery"
      url: "https://google.github.io/A2A/"
    - title: "OWASP LLM06 — Excessive Agency"
      url: "https://genai.owasp.org/llmrisk/llm062025-excessive-agency/"
    - title: "OWASP LLM08 — Vector and Embedding Weaknesses"
      url: "https://genai.owasp.org/llmrisk/llm082025-vector-and-embedding-weaknesses/"

analyzers: ["regex", "structural", "semantic"]
related_rules: []
# Detection: regex/structural detects ps aux | grep AI-agent-names and reads of
# orchestration config files. semantic classifies the reconnaissance intent.
