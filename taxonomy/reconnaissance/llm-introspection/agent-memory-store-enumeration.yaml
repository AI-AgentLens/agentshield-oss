analyzers: ["regex", "dataflow"]
related_rules: ["mcp-resource-uri-ssrf", "agent-state-serialization-exfiltration"]
# Detection at the shell/MCP level: flag curl/http requests to vector store
# API endpoints (localhost:8000, localhost:6333, localhost:8080 with Qdrant
# or Weaviate paths) without authentication headers. Dataflow layer can
# detect MCP tool calls to HTTP endpoints matching vector store patterns.
