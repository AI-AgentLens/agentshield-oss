id: "reconnaissance/llm-introspection/context-window-probe"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 8
category: "LLM Introspection"
category_id: "8.2"
name: "Context Window Probe"
risk_level: "medium"

abstract: |
  Commands that enumerate environment variables, shell variables, or process
  state specifically to discover injected system prompt content, operator
  secrets, or AI agent configuration constitute LLM introspection
  reconnaissance that may precede a targeted attack.

explanation: |
  AI agents often receive sensitive configuration via environment variables
  (SYSTEM_PROMPT, OPENAI_API_KEY, ANTHROPIC_API_KEY, tool credentials).
  Probing for these variables reveals:
  - The agent's operational constraints and safety instructions
  - API keys and credentials injected at runtime
  - Target domains, internal hostnames, and service endpoints
  - Business logic and proprietary instructions embedded in the context

  Unlike general credential exposure (already covered), this entry specifically
  captures the reconnaissance intent of enumerating prompt-related variables
  before mounting a system prompt injection or exfiltration attack.

recommendation: |
  - Do not inject secrets directly into system prompts; use runtime secret
    retrieval with scoped tokens instead.
  - Flag any commands that filter env vars by prompt/system/anthropic/openai patterns.
  - Treat this reconnaissance as a precursor indicator to system prompt exfiltration.
  - Audit the full command sequence following a context-window probe.

examples:
  bad:
    - "printenv | grep -i 'system_prompt\\|ANTHROPIC\\|OPENAI'"
    - "env | grep -i prompt"
    - "echo $SYSTEM_PROMPT"
    - "set | grep -i 'llm\\|gpt\\|claude'"
  good:
    - "printenv PATH  # reading a specific non-sensitive var"
    - "env | grep NODE_ENV  # checking application runtime mode"

compliance:
  owasp-llm-2025: ["LLM07"]
  iso-27001-2022: ["A.5.34", "A.8.12"]
  eu-ai-act-2024: ["Art.13"]
  nist-ai-rmf-1.0: ["GOVERN-1"]
  soc2-type2: ["CC6.6"]
  iso-42001-2023: ["A.9.3", "9.1"]
  mitre_atlas: ["AML.T0055"]

references:
  mitre_attack: ["T1082", "T1552.007"]
  cwe: ["CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["ne-audit-sysprompt-env-probe", "ne-block-sysprompt-env-exfil"]
