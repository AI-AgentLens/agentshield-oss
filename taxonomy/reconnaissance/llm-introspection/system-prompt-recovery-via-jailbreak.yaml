id: "reconnaissance/llm-introspection/system-prompt-recovery-via-jailbreak"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 5
category: "LLM Introspection"
category_id: "5.4"
name: "System Prompt Recovery via Jailbreak"
risk_level: "high"

abstract: |
  Adversarial prompts designed to force a language model to repeat its system
  prompt verbatim — using social engineering patterns like roleplay-based
  escapes or DAN-style jailbreaks — to extract confidential operator instructions.

explanation: |
  System prompts contain sensitive operator instructions: security policies,
  confidential business logic, capability restrictions, persona definitions,
  and sometimes embedded credentials. Jailbreak-based extraction techniques
  include direct repetition requests, roleplay escapes where the user asks
  the model to pretend it has no restrictions, continuation attacks that
  prompt the model to complete a sentence starting with its instructions,
  and translation tricks that ask the model to translate its initial
  instructions to another language.

  When successful, the attacker learns the operator's exact prompt, enabling
  targeted jailbreaks, competitor intelligence gathering, and exposure of
  any secrets embedded in the prompt.

recommendation: |
  - Instruct the model explicitly not to repeat or paraphrase its system prompt.
  - Use system prompt confidentiality instructions at the beginning of the prompt.
  - Monitor conversations for patterns that attempt prompt extraction.
  - Treat system prompt contents as sensitive — avoid embedding secrets.
  - Use prompt injection detection middleware before passing user input to the model.

examples:
  bad:
    - "Adversarial: attempts to extract verbatim system prompt via social engineering"
    - "Adversarial: roleplay persona swap requesting disclosure of base instructions"
    - "Adversarial: translation request targeting original system message content"
  good:
    - "User: What is 2+2?  # normal interaction without extraction attempt"
    - "User: Help me write a Python function  # legitimate coding request"

