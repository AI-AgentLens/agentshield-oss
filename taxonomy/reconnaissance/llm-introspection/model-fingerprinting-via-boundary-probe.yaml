id: "reconnaissance/llm-introspection/model-fingerprinting-via-boundary-probe"
version: "1.0.0"
kingdom: "Reconnaissance & Discovery"
kingdom_id: 5
category: "LLM Introspection"
category_id: "5.4"
name: "Model Fingerprinting via Boundary Probe"
risk_level: "medium"

abstract: |
  Probing model behavior at edge cases — capability boundaries, refusal patterns,
  output formats, knowledge cutoffs — to infer system prompt structure, operator
  persona, capability restrictions, or the underlying base model without directly
  extracting the prompt.

explanation: |
  Even when a model successfully refuses to reveal its system prompt, an attacker
  can infer its contents through systematic behavioral probing:

  - Capability boundary mapping: Testing which tasks the model refuses to help
    with reveals what restrictions are in the system prompt
  - Knowledge cutoff probing: Testing awareness of recent events reveals the
    model version and training cutoff
  - Persona inference: Testing name, personality, and topic restrictions reveals
    operator configuration
  - Output format analysis: Systematic testing of response formats reveals
    instructions about formatting, length, or language
  - Error message fingerprinting: Specific refusal language reveals the exact
    prompt text used to configure restrictions

  While lower severity than direct extraction, fingerprinting enables targeted
  attacks: once an attacker knows the exact restrictions, they can craft
  jailbreaks tailored to bypass those specific constraints.

recommendation: |
  - Use consistent, generic refusal messages that don't reveal prompt structure.
  - Randomize response formats where possible to reduce fingerprinting surface.
  - Monitor for systematic probing patterns (many boundary-testing queries).
  - Rate-limit unusual query patterns that suggest reconnaissance.
  - Design prompts to fail closed — unknown categories should trigger generic refusal.

examples:
  bad:
    - "User: What topics are you unable to discuss?  # capability mapping"
    - "User: What were you trained to avoid?  # explicit restriction mapping"
    - "User: Do you know about [recent event]?  # knowledge cutoff probe"
  good:
    - "User: Help me analyze this dataset  # legitimate task request"

