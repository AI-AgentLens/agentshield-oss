id: "destructive-ops/cloud-infra/gcloud-project-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "GCloud Project Deletion"
risk_level: "critical"

abstract: |
  An AI agent deletes an entire Google Cloud project, destroying ALL resources
  within it — VMs, databases, storage, APIs, IAM, and billing configurations.

explanation: |
  `gcloud projects delete` schedules a GCP project for deletion. GCP provides
  a 30-day recovery window, but the project enters a shutdown state immediately,
  making all resources unavailable. After 30 days, deletion is permanent and
  irreversible. This is the most destructive single GCP CLI command available.

  AI agents could generate this when confused about scope, or when following
  "clean up the project" instructions at the wrong level.

recommendation: |
  - Block all `gcloud projects delete` commands absolutely from AI agents.
  - This command should require multi-factor human authorization.
  - Enable GCP Organization Policy constraints/resourcemanager.restrictCloudProjectDeletion.
  - Use separate GCP projects per environment to limit blast radius.

examples:
  bad:
    - "gcloud projects delete my-project-id"
    - "gcloud projects delete my-project-id --quiet"
  good:
    - "gcloud projects describe my-project-id"
    - "gcloud projects list"

compliance:
