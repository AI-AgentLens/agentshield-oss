id: "destructive-ops/cloud-infra/gcloud-storage-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "GCloud Storage Deletion"
risk_level: "critical"

abstract: |
  An AI agent recursively deletes objects from Google Cloud Storage using
  `gcloud storage rm`, causing irreversible loss of cloud storage data.

explanation: |
  `gcloud storage rm` can delete individual objects or entire buckets with
  the `--recursive` flag. Unlike soft-delete or versioning in some configs,
  this permanently removes objects from GCS. Object versioning and retention
  locks can protect against accidental deletion but are often not enabled.

  AI agents may generate this during cleanup tasks or when following
  "remove all files from the bucket" instructions.

recommendation: |
  - Block `gcloud storage rm` with wildcard or `--recursive` patterns from AI agents.
  - Require explicit human approval specifying the bucket path and expected object count.
  - Enable GCS Object Versioning and Retention Policies on critical buckets.
  - Use `gcloud storage ls` to list before deleting.

examples:
  bad:
    - "gcloud storage rm -r gs://mybucket/**"
    - "gcloud storage rm gs://mybucket/path/ --recursive"
  good:
    - "gcloud storage ls gs://mybucket/"
    - "gcloud storage rm gs://mybucket/specific-file.txt"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.5.10", "A.8.9", "A.8.31"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC7.1"]
  iso-42001-2023: ["A.7.4", "A.8.4"]

references:
  mitre_attack: ["T1485"]
  cwe: ["CWE-400"]
  external:
