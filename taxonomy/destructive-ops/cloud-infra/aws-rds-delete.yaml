id: "destructive-ops/cloud-infra/aws-rds-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "AWS RDS Database Deletion"
risk_level: "critical"

abstract: |
  An AI agent deletes an AWS RDS database instance or cluster,
  causing irreversible loss of all stored data unless a final snapshot is taken.

explanation: |
  `aws rds delete-db-instance` and `aws rds delete-db-cluster` permanently
  destroy managed relational databases. By default, a final snapshot may not be
  created if `--skip-final-snapshot` is passed, leaving no recovery path.

  AI agents may generate this during cleanup, environment reset, or when
  following instructions like "drop the database" or "remove all AWS resources".

recommendation: |
  - Block all `aws rds delete-db-instance` and `aws rds delete-db-cluster` commands.
  - Require explicit human approval with database identifier and backup confirmation.
  - Always require `--final-db-snapshot-identifier` to ensure a recovery point exists.
  - Enable AWS Deletion Protection on production RDS instances.

examples:
  bad:
    - "aws rds delete-db-instance --db-instance-identifier mydb --skip-final-snapshot"
    - "aws rds delete-db-cluster --db-cluster-identifier mycluster --skip-final-snapshot"
  good:
    - "aws rds describe-db-instances --db-instance-identifier mydb"
    - "aws rds create-db-snapshot --db-instance-identifier mydb --db-snapshot-identifier backup"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.5.10", "A.8.9", "A.8.31"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-2"]
  soc2-type2: ["CC7.1", "CC8.1", "CC9.1"]
  iso-42001-2023: ["6.1.2"]

references:
  mitre_attack: ["T1485"]
  cwe: ["CWE-400"]
  external:
    - title: "MITRE ATT&CK: Data Destruction"
      url: "https://attack.mitre.org/techniques/T1485/"

analyzers: ["regex"]
related_rules: ["ts-block-aws-rds-delete"]
