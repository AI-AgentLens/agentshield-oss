id: "destructive-ops/cloud-infra/aws-iam-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "AWS IAM User or Role Deletion"
risk_level: "high"

abstract: |
  An AI agent deletes an AWS IAM user or role, potentially breaking authentication,
  authorization chains, and service-to-service trust relationships.

explanation: |
  `aws iam delete-user` and `aws iam delete-role` remove IAM identities.
  This can break CI/CD pipelines, application service accounts, cross-account
  trust, and federated authentication. Restoring deleted IAM entities requires
  recreating all attached policies, permissions boundaries, and trust policies.

  AI agents may generate this during "cleanup unused accounts" tasks or when
  following overly broad "remove stale IAM resources" instructions.

recommendation: |
  - Block all `aws iam delete-user` and `aws iam delete-role` commands from AI agents.
  - Require explicit human approval with impact assessment.
  - Prefer disabling (removing login profile, deactivating access keys) over deletion.
  - Use IAM Access Analyzer to identify unused entities safely before deletion.

examples:
  bad:
    - "aws iam delete-user --user-name alice"
    - "aws iam delete-role --role-name MyAppRole"
  good:
    - "aws iam get-user --user-name alice"
    - "aws iam list-attached-user-policies --user-name alice"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.5.10", "A.8.9", "A.8.4"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  soc2-type2: ["CC6.1", "CC7.1", "CC8.1"]
  iso-42001-2023: ["A.9.3", "A.7.4"]

references:
  mitre_attack: ["T1531"]
  cwe: ["CWE-400"]
  external:
    - title: "MITRE ATT&CK: Account Access Removal"
      url: "https://attack.mitre.org/techniques/T1531/"

analyzers: ["regex"]
related_rules: ["ts-block-aws-iam-delete"]
