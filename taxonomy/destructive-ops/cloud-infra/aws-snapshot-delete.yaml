id: "destructive-ops/cloud-infra/aws-snapshot-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "AWS EC2 Snapshot Deletion"
risk_level: "high"

abstract: |
  An AI agent deletes AWS EC2 EBS snapshots, removing backup and recovery points
  for cloud volumes and potentially violating data retention policies.

explanation: |
  `aws ec2 delete-snapshot` removes point-in-time backups of EBS volumes.
  These snapshots are often the only recovery path after accidental data loss
  or ransomware events. Deleting snapshots before or during an incident
  (a common attacker tactic) eliminates the ability to restore.

  AI agents may generate this during cost optimization tasks ("delete old backups")
  or cleanup routines without understanding the recovery implications.

recommendation: |
  - Block all `aws ec2 delete-snapshot` commands from AI agents.
  - Require explicit human approval with snapshot ID and age verification.
  - Use AWS Backup with lock policies to prevent unauthorized snapshot deletion.
  - Tag snapshots with retention periods and enforce policy-driven deletion only.

examples:
  bad:
    - "aws ec2 delete-snapshot --snapshot-id snap-0abcdef1234567890"
  good:
    - "aws ec2 describe-snapshots --snapshot-ids snap-0abcdef1234567890"
    - "aws ec2 copy-snapshot --source-snapshot-id snap-0abc --source-region us-east-1"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.5.10", "A.8.9", "A.8.31"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC7.1"]
  iso-42001-2023: ["A.7.4"]

references:
  mitre_attack: ["T1485", "T1490"]
  cwe: ["CWE-400"]
  external:
    - title: "MITRE ATT&CK: Inhibit System Recovery"
      url: "https://attack.mitre.org/techniques/T1490/"

analyzers: ["regex"]
related_rules: ["ts-block-aws-snapshot-delete"]
