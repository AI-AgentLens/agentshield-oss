id: "destructive-ops/cloud-infra/aws-s3-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "AWS S3 Recursive Deletion or Bucket Removal"
risk_level: "critical"

abstract: |
  An AI agent recursively deletes all objects in an S3 bucket or removes the
  bucket itself, causing irreversible loss of cloud storage data.

explanation: |
  `aws s3 rm s3://bucket --recursive` deletes all objects in an S3 bucket.
  `aws s3 rb s3://bucket` removes an empty bucket. Combined, they can wipe
  entire S3 buckets. Versioning does not protect against delete markers applied
  en masse; without MFA Delete enabled, recovery is difficult.

  AI agents may generate these during cleanup tasks, environment teardown, or
  when following "remove all files" instructions.

recommendation: |
  - Block `aws s3 rm ... --recursive` and `aws s3 rb ...` from AI agents.
  - Require explicit human approval specifying bucket name and expected object count.
  - Enable S3 Versioning and MFA Delete on critical buckets.
  - Use bucket policies to restrict bulk delete operations.

examples:
  bad:
    - "aws s3 rm s3://mybucket --recursive"
    - "aws s3 rb s3://mybucket --force"
  good:
    - "aws s3 ls s3://mybucket"
    - "aws s3 rm s3://mybucket/specific-file.txt"

