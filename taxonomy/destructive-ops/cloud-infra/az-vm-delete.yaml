id: "destructive-ops/cloud-infra/az-vm-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "Azure VM Deletion"
risk_level: "critical"

abstract: |
  An AI agent deletes an Azure Virtual Machine, permanently terminating the
  compute instance and potentially its associated OS disk and NIC.

explanation: |
  `az vm delete` removes an Azure VM. By default, associated resources
  (OS disk, network interface, public IP) may or may not be deleted depending
  on the `--yes` flag and resource group configuration. Without explicit
  flags, orphaned resources may remain; with `--yes`, they may all be deleted.

  AI agents may generate this during environment teardown or "remove the server"
  instructions without understanding the multi-resource impact.

recommendation: |
  - Block all `az vm delete` commands from AI agents.
  - Require explicit human approval with VM name, resource group, and environment.
  - Use `az vm deallocate` as a reversible alternative.
  - Apply Azure resource locks (CanNotDelete) on production VMs.

examples:
  bad:
    - "az vm delete --resource-group myRG --name myVM"
    - "az vm delete --resource-group myRG --name myVM --yes"
  good:
    - "az vm show --resource-group myRG --name myVM"
    - "az vm deallocate --resource-group myRG --name myVM"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.5.10", "A.8.9", "A.8.31"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-2"]
  soc2-type2: ["CC7.1", "CC8.1", "CC9.1"]
  iso-42001-2023: ["A.8.4", "A.9.1"]

references:
