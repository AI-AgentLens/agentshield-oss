id: "destructive-ops/cloud-infra/aws-instance-terminate"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "AWS EC2 Instance Termination"
risk_level: "critical"

abstract: |
  An AI agent terminates one or more AWS EC2 instances using the AWS CLI,
  causing immediate and irreversible shutdown and data loss for ephemeral storage.

explanation: |
  `aws ec2 terminate-instances` permanently terminates EC2 instances. Unlike
  stopping an instance, termination destroys the instance and its ephemeral
  (instance-store) volumes. EBS root volumes may also be deleted depending on
  the instance configuration's `DeleteOnTermination` flag.

  AI agents may generate this during cleanup tasks, environment teardown, or
  when confused by instructions like "remove the server" or "shut down infra".

recommendation: |
  - Block all `aws ec2 terminate-instances` commands from AI agents.
  - Require explicit human approval with instance ID and environment confirmation.
  - Use instance stop (`aws ec2 stop-instances`) as a safer reversible alternative.
  - Enforce resource protection via AWS Termination Protection on critical instances.

examples:
  bad:
    - "aws ec2 terminate-instances --instance-ids i-0abcdef1234567890"
    - "aws ec2 terminate-instances --instance-ids i-aaa i-bbb"
  good:
    - "aws ec2 stop-instances --instance-ids i-0abcdef1234567890"
    - "aws ec2 describe-instances --instance-ids i-0abcdef1234567890"

