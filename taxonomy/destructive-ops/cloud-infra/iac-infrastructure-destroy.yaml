id: "destructive-ops/cloud-infra/iac-infrastructure-destroy"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "IaC Infrastructure Destroy"
risk_level: "critical"

abstract: |
  An AI agent runs an Infrastructure-as-Code (IaC) destroy command — such as
  `terraform destroy`, `pulumi destroy`, `cdk destroy`, or `tofu destroy` —
  tearing down all cloud resources defined in the stack simultaneously and
  irreversibly, without requiring individual resource-specific CLI commands.

explanation: |
  IaC tools manage cloud infrastructure declaratively: a single destroy command
  computes the deletion order for every resource in the state file and removes
  them all. This makes IaC destroy commands significantly more dangerous than
  individual CLI commands because:

  - **Blast radius**: One command destroys databases, compute instances, storage
    buckets, networking, IAM roles, and any other managed resources simultaneously.
  - **Automation flags**: The `-auto-approve` flag (Terraform/OpenTofu) and
    `--yes` / `-f` flags (Pulumi/CDK) skip interactive confirmation, allowing
    silent destruction in non-interactive agent sessions.
  - **Cross-provider scope**: A single Terraform config can manage AWS, GCP,
    Azure, and other providers — destroying resources across all of them at once.
  - **State dependency**: Terraform destroy follows the dependency graph in
    reverse, ensuring even networked resources are removed in the correct order,
    maximizing the chance of complete destruction.

  AI agents are particularly vulnerable to being manipulated into running these
  commands through prompt injection attacks that frame destruction as "cleanup",
  "environment reset", or "cost optimization". The `-auto-approve` flag makes
  detection critical since no human confirmation step exists at the IaC layer.

  Tools in scope:
  - **Terraform** (`terraform destroy`) — HashiCorp IaC, most widely deployed
  - **OpenTofu** (`tofu destroy`) — Open-source Terraform fork (CNCF project)
  - **Terragrunt** (`terragrunt run-all destroy`) — Terraform wrapper, the
    `run-all` subcommand destroys ALL stacks in a directory tree at once
  - **Pulumi** (`pulumi destroy`) — Multi-language IaC (TypeScript, Python, Go)
  - **AWS CDK** (`cdk destroy`) — AWS-specific IaC using cloud formation stacks

recommendation: |
  - Block all IaC destroy commands from AI agents without exception.
  - Require explicit human approval via a separate confirmation workflow before
    any infrastructure destruction is permitted.
  - Use targeted resource scaling or stop commands rather than full destruction.
  - Enable IaC state locking and backup the state file before any planned changes.
  - Implement IAM policies that require MFA for resource deletion operations.

examples:
  bad:
    - "terraform destroy -auto-approve"
    - "terraform destroy -target=aws_instance.prod"
    - "tofu destroy -auto-approve"
    - "terragrunt run-all destroy --terragrunt-non-interactive"
    - "pulumi destroy --yes"
    - "pulumi destroy -f"
    - "cdk destroy '*'"
    - "cdk destroy --all"
  good:
    - "terraform plan -destroy -out=destroy.plan"
    - "terraform show destroy.plan"
    - "pulumi preview --diff"
    - "cdk diff"

