id: "destructive-ops/cloud-infra/k8s-namespace-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "Kubernetes Namespace Deletion"
risk_level: "critical"

abstract: |
  An AI agent deletes a Kubernetes namespace, terminating all workloads,
  services, config maps, secrets, and persistent volume claims within it.

explanation: |
  `kubectl delete namespace` removes a Kubernetes namespace and cascades
  deletion to all resources within it — Deployments, Services, ConfigMaps,
  Secrets, ServiceAccounts, PersistentVolumeClaims, and more. PersistentVolumes
  with a Retain reclaim policy survive, but most data is lost.

  Namespaces are often used to scope entire environments or microservice domains.
  Deleting the wrong namespace in production can take down multiple services.

  AI agents may generate this during cleanup, "reset the environment", or
  "remove the namespace" instructions without understanding the scope.

recommendation: |
  - Block all `kubectl delete namespace` commands from AI agents.
  - Require explicit human approval with namespace name and environment confirmation.
  - Use namespace-level RBAC to restrict delete permissions.
  - Prefer scaling deployments to zero over namespace deletion for temporary teardown.

examples:
  bad:
    - "kubectl delete namespace production"
    - "kubectl delete ns my-app"
  good:
    - "kubectl get all -n my-app"
    - "kubectl scale deployment my-app --replicas=0 -n my-app"

