id: "destructive-ops/cloud-infra/az-sql-delete"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Cloud Infrastructure Destruction"
category_id: "1.7"
name: "Azure SQL Database Deletion"
risk_level: "critical"

abstract: |
  An AI agent deletes an Azure SQL database, permanently destroying managed
  relational data unless a recent backup exists within the retention window.

explanation: |
  `az sql db delete` removes an Azure SQL Database. Geo-redundant backups
  are retained for 7–35 days depending on service tier, but point-in-time
  restore requires manual intervention. Deleted databases may not be immediately
  restorable if the server itself is also targeted.

  AI agents may generate this during "clean up test databases" or "remove the
  database" instructions without scoping to non-production environments.

recommendation: |
  - Block all `az sql db delete` commands from AI agents.
  - Require explicit human approval with database and server name.
  - Apply Azure SQL Deletion Lock on production databases.
  - Export data with `az sql db export` before any deletion.

examples:
  bad:
    - "az sql db delete --resource-group myRG --server myServer --name myDB"
    - "az sql db delete --resource-group myRG --server myServer --name myDB --yes"
  good:
    - "az sql db show --resource-group myRG --server myServer --name myDB"
    - "az sql db export --resource-group myRG --server myServer --name myDB --storage-uri ..."

