id: "destructive-ops/version-control/git-force-push"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Version Control Destruction"
category_id: "1.8"
name: "Git Force Push"
risk_level: "high"

abstract: |
  An AI agent performs a force push (`git push --force` or `git push -f`) to a
  remote repository, overwriting remote history and potentially causing permanent
  loss of commits for collaborators.

explanation: |
  `git push --force` overwrites the remote branch with the local branch state,
  discarding any remote commits not present locally. This can:
  - Permanently destroy commits that other team members pushed
  - Rewrite public history that others have already based work on
  - Break ongoing CI/CD pipelines referencing the overwritten commits
  - Remove evidence of code changes from the repository history
  - Bypass branch protection rules if the repository allows force pushes

  AI agents may generate force pushes when trying to "fix" a rejected push,
  resolve rebase conflicts, or when following "just force push it" instructions
  without understanding the destructive implications for team history.

recommendation: |
  - Block all `git push --force` and `git push -f` commands from AI agents.
  - Enable branch protection rules disabling force push on main/master.
  - Prefer `git push --force-with-lease` which fails if remote has new commits.
  - Require explicit human review before any force push operation.

examples:
  bad:
    - "git push --force origin main"
    - "git push -f origin feature-branch"
    - "git push origin +main:main"
  good:
    - "git push origin main"
    - "git push --force-with-lease origin feature-branch"

