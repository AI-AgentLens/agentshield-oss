id: "destructive-ops/version-control/git-history-destruction"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Version Control Destruction"
category_id: "1.8"
name: "Git History Destruction"
risk_level: "critical"

abstract: |
  An AI agent rewrites or permanently discards git history using tools that
  cannot be safely undone once the reflog is cleared or a force push follows.
  Affected operations include `git reset --hard`, `git filter-branch`,
  `git filter-repo`, `bfg` (BFG Repo Cleaner), and `git reflog expire --expire=now`.

explanation: |
  Unlike a simple file deletion that can be staged and reverted, git history
  rewrite operations alter or remove the immutable commit graph that underpins
  team collaboration, code review, and CI/CD pipelines.

  **History rewrite tools**
  - `git filter-branch` — traverses every commit and rewrites the DAG.
    Even when used to "clean" a secret from history, it creates divergent
    history that must be force-pushed and re-synced by every collaborator.
  - `git filter-repo` — the modern, faster replacement for `filter-branch`.
    Same destructive impact; additionally removes the remote tracking refs
    to prevent accidental pushes before force-pushing is done deliberately.
  - `bfg` (BFG Repo Cleaner) — a dedicated history-rewrite tool optimized
    for removing large files or secrets. Creates an entirely new commit
    graph incompatible with existing clones.

  **Commit destruction via reset**
  - `git reset --hard HEAD~N` (N ≥ 1) — moves HEAD back N commits,
    permanently discarding the dropped commits from the current branch.
    Without a subsequent reflog check, those commits become unreachable
    and will be garbage-collected.
  - `git reset --hard <sha>` (arbitrary SHA) — same effect; resets to any
    arbitrary point in history.

  **Reflog destruction**
  - `git reflog expire --expire=now --all` — purges all reflog entries
    immediately, eliminating the 30-day safety window that allows recovery
    after an accidental `git reset --hard`. Typically run before
    `git gc --prune=now` to make orphaned commits unrecoverable.

  AI coding agents may trigger these operations when:
  - Attempting to "undo" a bad commit by running `git reset --hard`
  - Following instructions to "clean secrets from history" via filter-branch
  - Running housekeeping scripts that include reflog expiry + gc prune

recommendation: |
  - Block `git filter-branch`, `git filter-repo`, and `bfg` from AI agents.
  - Block `git reset --hard HEAD~N` and `git reset --hard <sha>` — these
    discard committed work; legitimate use cases require explicit human approval.
  - Block `git reflog expire --expire=now` — destroys the recovery mechanism.
  - `git reset --hard HEAD` (no history drop, just discard working-tree changes)
    may be audited but is safer since no committed work is lost.
  - For secret removal, require a human to run filter-branch/bfg with an
    out-of-band force-push to all remote clones.

examples:
  bad:
    - "git reset --hard HEAD~3"
    - "git reset --hard HEAD~1"
    - "git reset --hard abc123f"
    - "git filter-branch --tree-filter 'rm -f .env' HEAD"
    - "git filter-branch --force --index-filter 'git rm --cached --ignore-unmatch secrets.txt' HEAD"
    - "git filter-repo --path-glob '*.env' --invert-paths"
    - "bfg --delete-files secrets.txt my-repo.git"
    - "bfg --replace-text passwords.txt"
    - "git reflog expire --expire=now --all"
  good:
    - "git reset --hard HEAD"
    - "git reset HEAD~1"
    - "git revert HEAD"
    - "git log --oneline -10"
    - "git reflog"
    - "git gc"

