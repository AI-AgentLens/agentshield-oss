id: "destructive-ops/database-destruction/cache-flush"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Database Destruction"
category_id: "1.9"
name: "Cache Flush"
risk_level: "high"

abstract: |
  A command flushes an entire in-memory cache store (Redis, Memcached, Varnish),
  instantly evicting all cached data. While caches are theoretically reconstructable,
  a cache flush during peak traffic causes immediate service degradation and can
  trigger cascading failures by overwhelming backing databases.

explanation: |
  In-memory caches like Redis and Memcached store critical application state,
  session data, rate-limiting counters, and computed results. A flush command
  instantly removes all data:

  Redis:
  ```bash
  redis-cli FLUSHDB        # flush current database (default: db0)
  redis-cli FLUSHALL       # flush all Redis databases
  redis-cli -n 0 FLUSHDB   # flush specific database
  ```

  Memcached:
  ```bash
  echo "flush_all" | nc localhost 11211
  memcflush --servers=localhost
  ```

  Consequences of an unexpected cache flush:
  - All active user sessions invalidated (forced logout for all users)
  - Rate limiting counters reset (opens abuse window)
  - Thundering herd: all requests hit database simultaneously
  - Potential SLA/availability breach

  AI agents asked to "clear the cache" or "reset the application state" may
  execute FLUSHALL indiscriminately, not realizing the operational impact.

recommendation: |
  - Block redis-cli FLUSHALL and FLUSHDB from agent contexts.
  - Block memcflush and flush_all netcat patterns.
  - Require human confirmation for any cache flush operation.
  - Prefer targeted key deletion (redis-cli DEL key) over bulk flush.
  - Distinguish between dev/staging (flush acceptable) and production (never flush).

examples:
  bad:
    - "redis-cli FLUSHALL"
    - "redis-cli FLUSHDB"
    - "echo 'flush_all' | nc localhost 11211"
    - "memcflush --servers=cache.prod.internal"
  good:
    - "redis-cli DBSIZE"
    - "redis-cli INFO memory"
    - "redis-cli DEL session:12345"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.5.10", "A.8.9"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  soc2-type2: ["CC7.1", "CC8.1"]

references:
  mitre_attack: ["T1485", "T1499"]
  cwe: ["CWE-400"]
  external:
    - title: "MITRE ATT&CK: Data Destruction"
      url: "https://attack.mitre.org/techniques/T1485/"

analyzers: ["regex", "structural"]
related_rules: ["ts-block-redis-flush"]
