id: "destructive-ops/database-destruction/sql-database-drop"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Database Destruction"
category_id: "1.9"
name: "SQL Database Drop"
risk_level: "critical"

abstract: |
  A SQL DDL statement drops an entire database, schema, or table, permanently
  destroying all data and structure. Common in AI agent database management
  tasks where a misunderstood instruction leads to catastrophic data loss.

explanation: |
  SQL `DROP` statements are DDL commands that irreversibly delete database
  objects. Unlike `DELETE` (which removes rows), `DROP` removes the object
  itself and all its data:

  ```sql
  DROP DATABASE production;
  DROP DATABASE IF EXISTS myapp;
  DROP TABLE users;
  DROP SCHEMA public CASCADE;
  ```

  Patterns particularly dangerous in AI agent contexts:
  - Agents given broad database access may DROP instead of TRUNCATE
  - Natural language instructions like "clean up the database" may be
    misinterpreted as DROP DATABASE
  - Cascading drops can propagate through foreign key relationships
  - Most database engines have no built-in undo for DROP operations

  Common CLI tools that execute SQL destructive commands:
  - `mysql -e "DROP DATABASE ..."`
  - `psql -c "DROP DATABASE ..."`
  - `sqlite3 db.sqlite "DROP TABLE ..."`
  - `sqlcmd -Q "DROP DATABASE ..."`

recommendation: |
  - Block all DROP DATABASE and DROP SCHEMA commands from AI agents.
  - Require explicit confirmation for DROP TABLE operations.
  - Enforce least-privilege database accounts that lack DROP privileges.
  - Use database-level guardrails (read-only roles, no DDL permissions).
  - Recommend TRUNCATE (recoverable with transaction rollback) over DROP.

examples:
  bad:
    - "mysql -u root -p -e \"DROP DATABASE production;\""
    - "psql -U postgres -c \"DROP DATABASE myapp;\""
    - "sqlite3 app.db \"DROP TABLE users;\""
    - "mysql -e \"DROP DATABASE IF EXISTS staging;\""
  good:
    - "mysql -u app -e \"SELECT COUNT(*) FROM users;\""
    - "psql -c \"TRUNCATE TABLE sessions;\""
    - "mysqldump production > backup.sql"

