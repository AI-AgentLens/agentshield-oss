id: "destructive-ops/resource-exhaustion/unbounded-agent-consumption"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Resource Exhaustion"
category_id: "1.3"
name: "Unbounded Agent Resource Consumption"
risk_level: "high"

abstract: |
  An AI agent enters recursive loops, spawns unbounded sub-agents, or makes
  excessive API calls that exhaust compute budgets, tokens, or infrastructure
  resources — causing denial-of-wallet or denial-of-service conditions.

explanation: |
  AI coding agents operate with access to external APIs (LLM providers, cloud
  services, package registries) that are billed per-use. Unlike traditional
  resource exhaustion (fork bombs, disk fills), agent-driven consumption attacks
  exploit the economic model of AI infrastructure:

  - **Recursive agent loops**: An agent calls itself or spawns sub-agents in
    an unbounded loop, each making LLM API calls. A single misconfigured
    orchestration can burn through thousands of dollars in minutes.
  - **Token amplification**: Crafting prompts or tool outputs that cause the
    agent to generate excessively long responses or repeatedly retry failed
    operations, multiplying token consumption.
  - **Denial-of-wallet**: Deliberately triggering expensive operations (large
    context windows, vision/audio processing, fine-tuning jobs) to exhaust
    an organization's API budget.
  - **Cascading API calls**: An agent that queries external APIs in a loop
    without rate limiting — e.g., fetching every page of search results,
    downloading entire registries, or polling endpoints continuously.
  - **Compute amplification via tool abuse**: Using code execution tools to
    spawn resource-intensive processes (compilation, training runs, large
    file processing) that consume host CPU/memory.

  This maps directly to OWASP LLM10 (Unbounded Consumption) and is a growing
  enterprise concern as AI agent costs become a significant line item. Real-world
  incidents include runaway Devin sessions accumulating $1000+ in API costs and
  AutoGPT loops consuming entire OpenAI quotas.

recommendation: |
  - Implement per-session and per-agent token/cost budgets with hard limits
    that terminate execution when exceeded.
  - Set maximum recursion depth and sub-agent spawn limits in orchestration
    frameworks.
  - Rate-limit external API calls from agents with exponential backoff.
  - Monitor agent execution time and set wall-clock timeouts.
  - Alert on anomalous token consumption patterns (sudden spikes, sustained
    high usage).
  - Implement circuit breakers that halt agent execution after N consecutive
    failures or retries.
  - Use streaming cost monitoring dashboards to detect runaway sessions in
    real time.

examples:
  bad:
    - "while true; do curl -s https://api.openai.com/v1/chat/completions -d '{\"model\":\"gpt-4\"}'; done"
    - "python -c \"from autogen import Agent; a=Agent(); a.run_forever()\"  # unbounded agent loop"
    - "for i in $(seq 1 10000); do claude --prompt 'analyze this codebase'; done"
    - "Agent spawns 50 sub-agents, each making 100 LLM calls per iteration with no termination condition"
  good:
    - "claude --max-tokens 4096 --timeout 300 'review this file'"
    - "Agent execution with budget cap: max_cost=$5.00, max_iterations=10"
    - "API call with rate limiting and circuit breaker: retry_max=3, backoff=exponential"

