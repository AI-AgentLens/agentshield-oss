      url: "https://www.anthropic.com/research/adversarial-inputs"

analyzers: ["semantic", "dataflow", "guardian"]
related_rules: []
# Detection: Guardian layer can flag piped commands that generate abnormally
# large repetitive inputs destined for LLM CLI tools (claude, openai, etc.).
# Semantic analyzer can classify intent as 'compute-amplification' when large
# string generation is chained with LLM API invocation.
# Note: Runtime detection for this threat has high FP risk — focus on
# input/output token limits enforced at the serving layer.
