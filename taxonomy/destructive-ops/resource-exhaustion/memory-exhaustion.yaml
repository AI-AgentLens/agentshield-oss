id: "destructive-ops/resource-exhaustion/memory-exhaustion"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Resource Exhaustion"
category_id: "1.3"
name: "Memory Exhaustion Attack"
risk_level: "critical"

abstract: |
  An AI agent deliberately exhausts system RAM through memory-intensive tools
  (stress, stress-ng), large virtual memory allocations, or removal of swap
  space, triggering OOM kills of critical services and causing system instability.

explanation: |
  Memory exhaustion is a denial-of-service vector that forcibly terminates running
  processes when the kernel's OOM killer activates. Unlike disk-fill attacks, memory
  exhaustion can crash a system within seconds. Key techniques include:

  - `stress --vm 1 --vm-bytes 32G` — allocates 32 GB of RAM via stress, instantly
    saturating available memory and triggering OOM kills
  - `stress-ng --vm 2 --vm-bytes 16G` — stress-ng variant with additional memory
    workers, MITRE T1499.001
  - `swapoff -a` — disables all swap space, eliminating the OS safety valve;
    combined with memory pressure this accelerates OOM kills dramatically
  - `python -c "x = [b'A'*1024*1024 for _ in range(100000)]"` — programmatic
    memory filling via scripting languages
  - Large `mmap()` allocations in C programs or via `/dev/shm` writes

  An AI agent instructed to "run a memory stress test," "benchmark RAM," or
  "simulate high load" may generate these commands. Prompt injection attacks can
  also embed these patterns to destabilize the host environment.

recommendation: |
  - Block `stress`/`stress-ng` invocations with `--vm-bytes` ≥ 1 GB.
  - Audit any `stress`/`stress-ng` with `--vm` workers even without explicit size.
  - Audit `swapoff -a` — removing swap is rarely needed in agent environments.
  - Set cgroup memory limits on agent execution environments.
  - Monitor RSS and virtual memory consumption of agent processes.

examples:
  bad:
    - "stress --vm 1 --vm-bytes 32G --vm-keep"
    - "stress-ng --vm 4 --vm-bytes 8G --timeout 60"
    - "swapoff -a"
    - "sudo stress-ng --vm 2 --vm-bytes 16G"
  good:
    - "stress --cpu 2 --timeout 10"
    - "stress-ng --cpu 4 --cpu-load 50 --timeout 30"
    - "free -h"
    - "vmstat 1 5"

