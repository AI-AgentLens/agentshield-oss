id: "destructive-ops/permission-weakening/acl-weakening"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "Permission Weakening"
category_id: "1.4"
name: "ACL Weakening via setfacl"
risk_level: "high"

abstract: |
  Using `setfacl` to grant broad or world-readable/writable ACL entries on sensitive
  system files or credential stores weakens the access control model beyond what
  traditional POSIX permissions express.

explanation: |
  POSIX Access Control Lists (ACLs) extend traditional Unix file permissions with
  fine-grained per-user and per-group entries. `setfacl` can be used to grant
  overly broad access:

  - `setfacl -m o::rwx /etc/shadow` — world-readable shadow password file
  - `setfacl -m u::rwx /etc/passwd` — grants arbitrary user write access to passwd
  - `setfacl -m u:nobody:rwx /etc/sudoers` — grants low-privilege user sudo access
  - `setfacl -Rm o::rx /etc` — recursively exposes all of /etc

  Unlike chmod, setfacl changes are less visible (`ls -l` only shows a `+` indicator)
  making them a stealthier permission-weakening technique. AI agents troubleshooting
  "access denied" errors may over-apply ACL grants without understanding the risk.

recommendation: |
  - Block `setfacl` with world (`o::`) grants on any path.
  - Block `setfacl` targeting /etc, /root, ~/.ssh, ~/.aws or credential files.
  - Audit `getfacl` enumeration as a reconnaissance precursor.
  - Use `setfacl -b` to remove all ACLs as a remediation step.

examples:
  bad:
    - "setfacl -m o::rwx /etc/shadow"
    - "setfacl -m u::rwx /etc/passwd"
    - "setfacl -Rm o::rx /etc"
    - "sudo setfacl -m u:nobody:rw /etc/sudoers"
  good:
    - "getfacl /etc/passwd"
    - "setfacl -m u:webuser:rx /var/www/html"
    - "setfacl -b /tmp/myfile"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.5.10", "A.8.3", "A.8.9"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC6.3", "CC7.1"]

references:
  mitre_attack: ["T1222.002"]
  cwe: ["CWE-732"]

analyzers: ["regex"]
related_rules: ["ts-block-setfacl-world-grant", "ts-block-setfacl-sensitive-path"]
