id: "destructive-ops/system-management/system-shutdown"
version: "1.0.0"
kingdom: "Destructive Operations"
kingdom_id: 1
category: "System Management"
category_id: "1.6"
name: "System Shutdown/Reboot"
risk_level: "critical"

abstract: |
  Issuing shutdown, reboot, halt, or poweroff commands causes immediate service
  disruption and potential data loss, constituting a denial-of-service attack
  against the host system.

explanation: |
  System power management commands terminate all running processes and halt the
  operating system. When issued by an AI agent, these are almost always the result
  of prompt injection, misunderstood context, or an attack:

  - `shutdown -h now` / `poweroff` — immediate host shutdown
  - `reboot` / `shutdown -r now` — immediate reboot
  - `halt` — stops all processes and halts CPU
  - `init 0` / `init 6` — runlevel transitions (halt/reboot on Linux)
  - `systemctl poweroff` / `systemctl reboot`

  In cloud and containerized environments, shutdown commands may terminate instances
  causing data loss from in-memory state, ongoing transactions, and unsaved work.
  Recovery may require manual intervention or instance recreation.

recommendation: |
  - Block all power management commands in agent tool execution contexts.
  - Apply seccomp profiles that prevent shutdown-related syscalls from agent processes.
  - Use separate non-privileged accounts for agent execution that cannot issue shutdown.
  - Alert on any shutdown/reboot command attempt by agent processes.

examples:
  bad:
    - "shutdown -h now"
    - "sudo reboot"
    - "systemctl poweroff"
    - "init 0"
  good:
    - "systemctl status nginx"
    - "uptime"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.25", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC7.1", "CC9.1"]
  iso-42001-2023: ["A.9.3", "A.7.4"]

references:
  mitre_attack: ["T1529"]
  cwe: ["CWE-400"]

analyzers: ["regex", "structural"]
related_rules: ["ts-block-shutdown"]
