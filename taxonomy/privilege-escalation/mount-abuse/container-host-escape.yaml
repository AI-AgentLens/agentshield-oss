id: "privilege-escalation/mount-abuse/container-host-escape"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Mount Abuse"
category_id: "5.8"
name: "Container Host Escape via /proc/PID/root Mount"
risk_level: "critical"

abstract: |
  An AI agent mounts `/proc/PID/root` of a host process (typically PID 1)
  inside a container to access the host filesystem, escaping container
  filesystem isolation and gaining access to host credentials, configuration,
  and binaries.

explanation: |
  In Linux, `/proc/PID/root` is a symlink to the filesystem namespace root
  of a process. From within a privileged container:

  1. The attacker identifies a host process (PID 1 = init/systemd)
  2. `/proc/1/root` points to the host's root filesystem
  3. With CAP_SYS_PTRACE or by mounting: `mount --bind /proc/1/root /mnt/host`
  4. Now /mnt/host/ contains the full host filesystem including:
     - /mnt/host/etc/shadow (host passwords)
     - /mnt/host/root/.ssh/ (root SSH keys)
     - /mnt/host/etc/kubernetes/ (cluster credentials)
     - /mnt/host/usr/bin/ (host binaries to replace)

  This technique is used alongside cgroup release agent and other container
  escape techniques to gain read/write access to the host filesystem from
  within a container environment.

recommendation: |
  - Block mount commands referencing /proc/[0-9]+/root paths.
  - Remove CAP_SYS_ADMIN and CAP_SYS_PTRACE from AI agent containers.
  - Use seccomp profiles to block mount(2) syscall in containers.
  - Monitor /proc/PID/root access in container security logs.

examples:
  bad:
    - "mount --bind /proc/1/root /mnt/host"
    - "sudo mount /proc/1/root/etc/shadow /tmp/shadow"
    - "mount -o bind /proc/$(pidof systemd)/root /mnt/"
  good:
    - "ls /proc/1/cmdline"
    - "cat /proc/self/cgroup"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25", "A.8.26"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC6.6", "CC7.1"]

references:
  mitre_attack: ["T1611"]
  cwe: ["CWE-269"]
  external:
    - title: "MITRE ATT&CK: Escape to Host"
      url: "https://attack.mitre.org/techniques/T1611/"

analyzers: ["regex"]
related_rules: ["ts-block-mount-proc-root-escape"]
