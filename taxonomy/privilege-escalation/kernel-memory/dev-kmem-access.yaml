id: "privilege-escalation/kernel-memory/dev-kmem-access"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Kernel Memory Access"
category_id: "5.10"
name: "/dev/kmem Direct Kernel Memory Access"
risk_level: "critical"

abstract: |
  Reading or writing `/dev/kmem` grants direct access to the physical kernel
  address space, enabling arbitrary kernel memory modification, credential
  extraction, and complete security control bypass.

explanation: |
  `/dev/kmem` is a character device that maps the kernel's virtual address space
  to userspace. On systems where it is present and accessible:
  - An attacker can read kernel data structures to extract credentials, session tokens,
    or cryptographic keys directly from memory.
  - Writing to `/dev/kmem` allows overwriting kernel code paths, disabling LSM hooks
    (SELinux, AppArmor), or injecting rootkit logic without loading a kernel module.
  - Unlike `/dev/mem` (physical memory), `/dev/kmem` exposes the kernel's virtual
    address space, making targeted exploitation easier.

  Most modern Linux distributions disable `/dev/kmem` at compile time
  (`CONFIG_DEVKMEM=n`). However, it remains present in some embedded systems,
  legacy kernels, and custom builds. An AI agent should never need to access
  `/dev/kmem`; any such attempt is almost certainly malicious.

recommendation: |
  - Block all read/write access to `/dev/kmem` in agent execution contexts.
  - Ensure kernels are compiled without `CONFIG_DEVKMEM` where possible.
  - Apply `lockdown=confidentiality` kernel parameter to prevent raw device access.
  - Monitor access attempts via auditd rules on `/dev/kmem`.

examples:
  bad:
    - "dd if=/dev/kmem bs=1 count=1024 | xxd"
    - "cat /dev/kmem | strings | grep -i password"
    - "dd of=/dev/kmem seek=<addr> if=payload.bin"
  good:
    - "ls -la /dev/kmem"
    - "dmesg | grep kmem"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC6.3", "CC6.8"]
  iso-42001-2023: ["A.7.4", "A.8.4"]

references:
  mitre_attack: ["T1005", "T1003"]
  cwe: ["CWE-250", "CWE-284"]

analyzers: ["regex", "structural"]
related_rules: []
