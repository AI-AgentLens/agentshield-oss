id: "privilege-escalation/kernel-memory/proc-kcore-access"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Kernel Memory Access"
category_id: "5.10"
name: "/proc/kcore Physical Memory Dump"
risk_level: "critical"

abstract: |
  `/proc/kcore` presents the entire physical memory of the system as an ELF
  core dump. Reading it exposes all kernel and userspace memory contents,
  enabling credential extraction, key recovery, and full system reconnaissance.

explanation: |
  `/proc/kcore` is a virtual ELF file that maps the entire physical address
  space (RAM) in a format readable by `gdb` and similar debuggers. It exposes:
  - All kernel memory: data structures, buffers, cryptographic keys
  - All userspace memory across all running processes: passwords, tokens, private keys
  - Swap-backed pages if memory pressure has caused eviction to disk

  Unlike `/dev/kmem` (kernel virtual space), `/proc/kcore` covers *physical* memory
  including pages belonging to other processes. This makes it an extremely powerful
  credential harvesting tool — an agent with root access can extract:
  - SSH agent socket contents and decrypted private keys
  - Browser saved credentials in memory
  - Database passwords from running application heaps
  - Kubernetes/cloud provider tokens from process memory

  Access requires root or `CAP_SYS_RAWIO`. Modern kernels with
  `lockdown=confidentiality` block `/proc/kcore` access.

recommendation: |
  - Block all agent access to `/proc/kcore`.
  - Apply `lockdown=confidentiality` or `lockdown=integrity` kernel parameter.
  - Restrict `/proc/kcore` permissions (mode 0400, root only) as a defense-in-depth measure.
  - Monitor access via auditd rules on `/proc/kcore`.

examples:
  bad:
    - "strings /proc/kcore | grep -i password"
    - "gdb -c /proc/kcore /dev/null -ex 'x/100s 0xffffffff81000000'"
    - "dd if=/proc/kcore bs=4096 count=1000 | strings"
  good:
    - "ls -la /proc/kcore"
    - "cat /proc/meminfo"

