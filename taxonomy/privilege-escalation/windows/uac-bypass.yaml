id: "privilege-escalation/windows/uac-bypass"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Windows Privilege Escalation"
category_id: "5.10"
name: "UAC Bypass"
risk_level: "critical"

abstract: |
  Bypassing User Account Control (UAC) on Windows allows an agent to elevate from
  a standard or medium-integrity process to high integrity (Administrator) without
  triggering a UAC consent prompt, enabling privilege escalation without user interaction.

explanation: |
  User Account Control (UAC) is a Windows security feature that restricts software
  from making system changes without explicit user consent. Bypassing UAC allows
  an unprivileged agent process to obtain Administrator rights silently.

  Common UAC bypass techniques exploited by AI agents:
  - **fodhelper.exe**: Auto-elevates; abused by writing to `HKCU\Software\Classes\ms-settings\shell\open\command`
  - **eventvwr.exe**: Auto-elevates; abused via HKCU registry hijack
  - **DLL hijacking**: Planting DLLs in search paths of auto-elevating processes
  - **COM object hijacking**: Redirecting COM activations in HKCU to malicious objects
  - **ICMLuaUtil COM interface**: Direct COM elevation via undocumented interfaces
  - **Compressed ICO**: Exploiting manifest parsing in older Windows builds

  AI agents generating code that modifies HKCU registry keys for auto-elevating
  processes, or that spawns known UAC-bypass binaries with crafted arguments,
  represent a critical escalation risk.

recommendation: |
  - Block writes to HKCU registry paths used by auto-elevating processes.
  - Monitor for spawning of known UAC-bypass binaries (fodhelper.exe, eventvwr.exe).
  - Enable UAC set to "Always Notify" in high-security environments.
  - Use WDAC or AppLocker to restrict auto-elevating process execution.
  - Monitor Event ID 4688 for unexpected high-integrity process creation.

examples:
  bad:
    - 'reg add "HKCU\\Software\\Classes\\ms-settings\\shell\\open\\command" /d "cmd.exe" /f'
    - "Start-Process fodhelper.exe"
    - 'New-ItemProperty -Path "HKCU:\\Software\\Classes\\mscfile\\shell\\open\\command" -Name "(default)" -Value "cmd.exe"'
  good:
    - "Get-UACSetting"
    - "whoami /groups | findstr /i high"

