id: "privilege-escalation/dbus-privilege-escalation/systemd-manager"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "D-Bus Privilege Escalation"
category_id: "5.5"
name: "D-Bus systemd Service Manager Abuse"
risk_level: "critical"

abstract: |
  Using D-Bus to call the org.freedesktop.systemd1 service manager interface to start,
  stop, or create systemd services without sudo, enabling malicious service creation or
  disabling of security daemons. The systemd manager runs as PID 1 with root privileges
  and controls all system services.

explanation: |
  The org.freedesktop.systemd1 D-Bus interface exposes the full systemd service manager:

  ```
  dbus-send --system --dest=org.freedesktop.systemd1 /org/freedesktop/systemd1 \
    org.freedesktop.systemd1.Manager.StartUnit \
    string:"evil.service" string:"replace"
  dbus-send --system --dest=org.freedesktop.systemd1 /org/freedesktop/systemd1 \
    org.freedesktop.systemd1.Manager.StopUnit \
    string:"auditd.service" string:"replace"
  gdbus call --system --dest org.freedesktop.systemd1 \
    --object-path /org/freedesktop/systemd1 \
    --method org.freedesktop.systemd1.Manager.EnableUnitFiles \
    "['backdoor.service']" false true
  ```

  Dangerous operations:
  - `StartUnit` — start any installed service (including malicious ones dropped to /etc/systemd/system/)
  - `StopUnit` — stop security services (auditd, fail2ban, ufw, AppArmor)
  - `EnableUnitFiles` — enable services for auto-start on boot
  - `DisableUnitFiles` — disable boot-time security services
  - `Reload` — force systemd to re-read unit files (activates dropped malicious units)

  Combined with writing a unit file, this enables persistent service installation
  without ever running `sudo systemctl enable`.

recommendation: |
  - Block dbus-send/gdbus/busctl calls targeting org.freedesktop.systemd1 Manager methods
    that modify service state (Start, Stop, Enable, Disable, Reload).
  - Protect critical security services with systemd's `ProtectSystem` and immutable settings.
  - Require polkit authentication for service management D-Bus calls.
  - Monitor audit logs for systemd Manager method calls from non-admin users.

examples:
  bad:
    - "dbus-send --system --dest=org.freedesktop.systemd1 /org/freedesktop/systemd1 org.freedesktop.systemd1.Manager.StopUnit string:auditd.service string:replace"
    - "gdbus call --system --dest org.freedesktop.systemd1 --object-path /org/freedesktop/systemd1 --method org.freedesktop.systemd1.Manager.StartUnit 'evil.service' 'replace'"
    - "busctl call org.freedesktop.systemd1 /org/freedesktop/systemd1 org.freedesktop.systemd1.Manager.EnableUnitFiles asbb backdoor.service false true"
  good:
    - "dbus-send --system --dest=org.freedesktop.systemd1 /org/freedesktop/systemd1 org.freedesktop.systemd1.Manager.ListUnits"

