id: "privilege-escalation/dbus-privilege-escalation/login1-power"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "D-Bus Privilege Escalation"
category_id: "5.5"
name: "D-Bus Login1 Power Management Abuse"
risk_level: "high"

abstract: |
  Using D-Bus to call login1 power management methods (Reboot, PowerOff, Suspend,
  Hibernate) without sudo, causing denial of service or forcing unsafe shutdown during
  critical operations. Active user sessions are typically granted power management
  rights via polkit without requiring a password.

explanation: |
  The org.freedesktop.login1 D-Bus service manages power state and is accessible to
  active session users via polkit:

  ```
  dbus-send --system --dest=org.freedesktop.login1 /org/freedesktop/login1 \
    org.freedesktop.login1.Manager.Reboot boolean:true
  gdbus call --system --dest org.freedesktop.login1 \
    --object-path /org/freedesktop/login1 \
    --method org.freedesktop.login1.Manager.PowerOff true
  busctl call org.freedesktop.login1 /org/freedesktop/login1 \
    org.freedesktop.login1.Manager.Suspend b true
  ```

  Abuse scenarios:
  - Force immediate reboot during a critical database migration
  - Power off a system during backup, causing data corruption
  - Suspend a system to interrupt a running security scan
  - Hibernate to flush sensitive memory to swap (enabling offline swap analysis)

  The `boolean:true` parameter requests interactive confirmation; `boolean:false` forces
  the action without prompting other users.

recommendation: |
  - Block dbus-send/gdbus/busctl calls targeting org.freedesktop.login1 Manager methods
    (Reboot, PowerOff, Suspend, Hibernate, HybridSleep).
  - Configure polkit to require authentication for power management calls in headless environments.
  - Alert on power management D-Bus calls from non-interactive processes.

examples:
  bad:
    - "dbus-send --system --dest=org.freedesktop.login1 /org/freedesktop/login1 org.freedesktop.login1.Manager.Reboot boolean:true"
    - "gdbus call --system --dest org.freedesktop.login1 --object-path /org/freedesktop/login1 --method org.freedesktop.login1.Manager.PowerOff true"
    - "busctl call org.freedesktop.login1 /org/freedesktop/login1 org.freedesktop.login1.Manager.Suspend b true"
  good:
    - "dbus-send --system --dest=org.freedesktop.login1 /org/freedesktop/login1 org.freedesktop.login1.Manager.ListSessions"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1"]
  soc2-type2: ["CC6.1"]

references:
  mitre_attack: ["T1529"]
  cwe: ["CWE-269"]

analyzers: ["regex", "structural"]
related_rules: []
