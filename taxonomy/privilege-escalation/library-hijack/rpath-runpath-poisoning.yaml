id: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Shared Library Hijacking"
category_id: "5.7"
name: "RPATH/RUNPATH Poisoning via chrpath or LD_LIBRARY_PATH"
risk_level: "high"

abstract: |
  An AI agent uses chrpath or exports LD_LIBRARY_PATH pointing to a
  writable/temp directory to inject attacker-controlled shared libraries
  into the search path of trusted binaries — causing those binaries to
  load trojan libraries with the same soname as system libraries.

explanation: |
  ELF binaries search for shared libraries in this order:
  1. RPATH entries embedded in the binary
  2. LD_LIBRARY_PATH environment variable
  3. RUNPATH entries embedded in the binary
  4. /etc/ld.so.cache, then /usr/lib, /lib

  An attacker can inject before system libraries via:

  **chrpath** (persistent RPATH modification):
    chrpath -r '/tmp/evil:$ORIGIN/../lib' /usr/bin/target
    → target always loads /tmp/evil/libssl.so before /usr/lib/libssl.so

  **LD_LIBRARY_PATH** (session-wide export):
    export LD_LIBRARY_PATH=/tmp/evil
    → Every subsequent dynamically linked binary loads from /tmp/evil first

  Combined with a trojan library:
    gcc -shared -o /tmp/evil/libssl.so.3 trojan.c  # same soname
    → openssl, curl, python all load the trojan libssl

  chrpath modification is persistent (survives reboots), while
  LD_LIBRARY_PATH affects all child processes for the session duration.

recommendation: |
  - Block chrpath -r, --replace, -c, --convert modifications.
  - Block LD_LIBRARY_PATH exports pointing to /tmp, /dev/shm, /var/tmp.
  - Audit any chrpath invocation.
  - Use hardened linker flags (--enable-new-dtags, RUNPATH over RPATH where appropriate).
  - Restrict AI agents from writing to directories used in library paths.

examples:
  bad:
    - "chrpath -r '/tmp/evil' /usr/bin/sudo"
    - "export LD_LIBRARY_PATH=/dev/shm/.lib"
    - "export LD_LIBRARY_PATH=/tmp/mylibs:/usr/lib"
  good:
    - "chrpath --list /usr/bin/myapp"
    - "export LD_LIBRARY_PATH=/home/user/myproject/lib"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25", "A.8.26"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC6.1", "CC7.1"]

