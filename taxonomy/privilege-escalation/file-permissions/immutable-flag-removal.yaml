id: "privilege-escalation/file-permissions/immutable-flag-removal"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "File Permissions"
category_id: "5.2"
name: "Immutable Flag Removal"
risk_level: "critical"

abstract: |
  Removing the Linux immutable attribute (`chattr -i`) from protected system files
  enables subsequent modification of files that are hardened against tampering —
  such as /etc/passwd, /etc/sudoers, or /etc/shadow.

explanation: |
  The Linux `chattr +i` (immutable) flag prevents any process — including root — from
  modifying, renaming, deleting, or creating hard links to a file. It is commonly used
  by security hardening tools to protect critical system files.

  `chattr -i` removes this protection. An AI agent that removes the immutable flag from
  system files is a prerequisite step for:
  - Writing arbitrary users into /etc/passwd (privilege escalation)
  - Adding NOPASSWD entries to /etc/sudoers (sudo bypass)
  - Replacing /etc/shadow hashes (credential takeover)
  - Modifying /etc/hosts for DNS spoofing

  This is a stealthy technique because `lsattr` is rarely monitored and the flag
  change itself leaves no persistent artifact once the modification is made.

recommendation: |
  - Block `chattr -i` on any system path (/etc/*, /usr/*, /var/*, /boot/*).
  - Alert on `chattr -ia` which strips both immutable and append-only flags.
  - Monitor for `lsattr` enumeration of protected files as a precursor step.
  - Ensure immutable-flagged files are included in file-integrity monitoring.

examples:
  bad:
    - "chattr -i /etc/passwd"
    - "sudo chattr -ia /etc/sudoers"
    - "chattr -i /etc/shadow"
    - "chattr -R -i /etc"
  good:
    - "lsattr /etc/passwd"
    - "chattr +i ~/important-config.json"
    - "chattr +i /etc/hosts"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MANAGE-2"]
  soc2-type2: ["CC6.3", "CC6.8"]
  iso-42001-2023: ["8.4"]

references:
  mitre_attack: ["T1222.002", "T1548"]
  cwe: ["CWE-269", "CWE-732"]

analyzers: ["regex", "structural"]
related_rules: ["ts-block-chattr-remove-immutable"]
