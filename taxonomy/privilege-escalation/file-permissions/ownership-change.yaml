id: "privilege-escalation/file-permissions/ownership-change"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "File Permissions"
category_id: "5.2"
name: "File Ownership Change"
risk_level: "high"

abstract: |
  Changing file ownership with `chown` or `chgrp` can grant unauthorized access to
  sensitive files or enable privilege escalation by transferring control of privileged
  resources to the agent's user.

explanation: |
  `chown` and `chgrp` alter the Unix owner and group of files and directories.
  An agent that changes ownership of sensitive system files (e.g., `/etc/sudoers`,
  `/etc/passwd`, setuid binaries) can make them writable under its own UID and then
  modify them for privilege escalation. Patterns of concern include:
  - `chown <agent-user> /etc/sudoers`
  - `chgrp <agent-group> /usr/bin/sudo`
  - Recursive ownership changes on system directories: `chown -R user /usr`

  Even on user-owned files, reassigning ownership can expose data to other processes
  or break integrity controls.

recommendation: |
  - Block `chown` and `chgrp` invocations in agent execution contexts.
  - Restrict agent service accounts from owning system files.
  - Monitor file ownership changes on security-sensitive paths.
  - Use mandatory access control (SELinux/AppArmor) to prevent ownership manipulation.

examples:
  bad:
    - "chown agent /etc/sudoers"
    - "chgrp agents /usr/bin/sudo"
    - "chown -R user:user /etc"
  good:
    - "ls -la /etc/sudoers"
    - "stat /usr/bin/sudo"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.9"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  soc2-type2: ["CC6.3", "CC6.8"]
  iso-42001-2023: ["A.7.4", "A.8.4"]

references:
  mitre_attack: ["T1548"]
  cwe: ["CWE-732"]

analyzers: ["regex", "structural"]
related_rules: ["ts-audit-chown"]
