id: "privilege-escalation/container-escape/user-namespace-map"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Container Escape"
category_id: "5.3"
name: "User Namespace UID/GID Mapping"
risk_level: "critical"

abstract: |
  An AI agent writes to Linux user namespace mapping files (`uid_map`,
  `gid_map`, `setgroups`) to map root inside a user namespace, enabling
  namespace-based privilege escalation and container escape.

explanation: |
  Linux user namespaces allow unprivileged processes to appear as UID 0
  (root) within the namespace by writing to `/proc/self/uid_map` and
  `/proc/self/gid_map`. The attack sequence:

  1. Write `0 <host-uid> 1` to `/proc/self/uid_map` — maps namespace UID 0
     to a real host UID
  2. Write `deny` to `/proc/self/setgroups` to prevent group privilege drops
     (required before writing `gid_map`)
  3. Write `0 <host-gid> 1` to `/proc/self/gid_map` — maps namespace GID 0

  After this, the process has root-equivalent capabilities within the
  namespace and can create file system objects owned by UID 0, mount
  filesystems (in some configurations), and escape container boundaries
  when combined with other techniques (e.g., mount namespaces, pivot_root).

  CVEs exploiting this: CVE-2020-8835 (eBPF + userns), CVE-2022-0185
  (legacy filesystems + userns).

recommendation: |
  - Block writes to `uid_map`, `gid_map`, and `setgroups` proc files.
  - Disable user namespaces for container workloads: `sysctl -w kernel.unprivileged_userns_clone=0`.
  - Use seccomp profiles to restrict relevant syscalls.

examples:
  bad:
    - "echo '0 1000 1' > /proc/self/uid_map"
    - "echo deny > /proc/self/setgroups"
    - "echo '0 1000 1' > /proc/self/gid_map"
    - "echo '0 0 65536' > /proc/1234/uid_map"
  good:
    - "cat /proc/self/uid_map"
    - "id"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25", "A.8.26"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC6.6"]
  iso-42001-2023: ["A.8.4", "A.7.4"]

references:
