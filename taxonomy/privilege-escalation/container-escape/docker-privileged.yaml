id: "privilege-escalation/container-escape/docker-privileged"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Container Escape"
category_id: "5.3"
name: "Docker Privileged Container Run"
risk_level: "critical"

abstract: |
  An AI agent runs a Docker container with the `--privileged` flag, granting
  it full host capabilities and effectively removing all container isolation.

explanation: |
  `docker run --privileged` grants the container nearly all Linux capabilities
  and full access to all host devices. This is equivalent to running as root
  on the host system. A privileged container can:
  - Mount the host filesystem: `mount /dev/sda1 /mnt`
  - Load kernel modules: `modprobe ...`
  - Modify host network interfaces
  - Access all host processes via `/proc`

  This is a well-documented Docker container escape vector. An AI agent may
  generate `--privileged` when trying to solve permission errors or when
  launching development environments.

recommendation: |
  - Block all `docker run --privileged` commands from AI agents.
  - Use specific `--cap-add` for individual capabilities instead.
  - Enforce non-privileged mode via Docker security profiles.
  - Run AI agents in user namespace remapping configurations.

examples:
  bad:
    - "docker run --privileged ubuntu bash"
    - "docker run --privileged -it myimage /bin/sh"
  good:
    - "docker run --cap-add NET_BIND_SERVICE myimage"
    - "docker run --read-only --security-opt no-new-privileges myimage"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25", "A.8.31"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  soc2-type2: ["CC6.1", "CC6.6", "CC8.1"]
  iso-42001-2023: ["A.7.4", "A.8.4"]

references:
  mitre_attack: ["T1611"]
  cwe: ["CWE-250", "CWE-732"]
  external:
    - title: "MITRE ATT&CK: Escape to Host"
      url: "https://attack.mitre.org/techniques/T1611/"
    - title: "Docker Security: Privileged Mode"
      url: "https://docs.docker.com/engine/reference/run/#runtime-privilege-and-linux-capabilities"

analyzers: ["regex", "structural"]
related_rules: ["ts-block-docker-privileged"]
