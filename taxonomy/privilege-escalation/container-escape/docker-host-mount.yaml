id: "privilege-escalation/container-escape/docker-host-mount"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Container Escape"
category_id: "5.3"
name: "Docker Host Filesystem Mount"
risk_level: "critical"

abstract: |
  An AI agent mounts the host filesystem root (`/`) into a Docker container,
  providing unrestricted read/write access to all host files from within
  the container.

explanation: |
  Mounting the host root directory with `docker run -v /:/host` gives the
  container complete access to the host filesystem. From within the container,
  an attacker (or AI agent) can:
  - Read all host files including `/etc/shadow`, SSH keys, and credentials
  - Modify system files to establish persistence
  - Escape the container by `chroot /host`
  - Write to crontabs, systemd units, or rc.local for persistence

  This is one of the most common and effective Docker container escape paths.
  AI agents may generate this when solving "can't access host files" problems.

recommendation: |
  - Block all `docker run -v /:/...` commands from AI agents.
  - Restrict volume mounts to specific project directories only.
  - Use Docker security profiles (AppArmor, seccomp) to restrict mount syscalls.
  - Apply principle of least privilege: mount only the exact paths needed.

examples:
  bad:
    - "docker run -v /:/host ubuntu bash"
    - "docker run -v /:/mnt:ro alpine sh"
    - "docker run --mount type=bind,source=/,target=/host ubuntu"
  good:
    - "docker run -v $(pwd)/data:/app/data myimage"
    - "docker run -v /tmp/workspace:/workspace myimage"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25", "A.8.31"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  soc2-type2: ["CC6.1", "CC6.6", "CC8.1"]

references:
  mitre_attack: ["T1611"]
  cwe: ["CWE-250", "CWE-732"]
  external:
    - title: "MITRE ATT&CK: Escape to Host"
      url: "https://attack.mitre.org/techniques/T1611/"

analyzers: ["regex", "structural"]
related_rules: ["ts-block-docker-host-mount"]
