id: "privilege-escalation/container-escape/k8s-rbac-escalation"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Container Escape"
category_id: "5.2"
name: "Kubernetes RBAC Privilege Escalation"
risk_level: "critical"

abstract: |
  An AI agent creates or modifies Kubernetes Role-Based Access Control (RBAC)
  resources — ClusterRoleBindings, RoleBindings, or ClusterRoles — to grant
  elevated permissions to a user, service account, or itself, achieving persistent
  cluster-admin access that survives container restarts.

explanation: |
  Kubernetes RBAC governs what API operations each subject (user, group, service
  account) can perform. An attacker with initial kubectl access (e.g., through a
  compromised deployment or a prompt-injected AI agent) can escalate to cluster-admin
  by creating or patching RBAC resources:

  - **ClusterRoleBinding creation**: Binds a powerful ClusterRole (e.g.,
    `cluster-admin`) to any subject — granting cluster-wide admin access
    with a single command.
  - **RoleBinding creation**: Scoped to a namespace but can escalate within it,
    or grant access to secrets/service account tokens reusable cluster-wide.
  - **ClusterRole patching**: Widens permissions on an existing role, affecting
    all subjects currently bound to it.
  - **Impersonation escalation**: Creating bindings for users that can then
    be impersonated.

  Unlike container escape (which leaves evidence in pod logs), RBAC escalation
  is persistent: the binding remains in etcd and survives pod/node restarts.
  Once cluster-admin is granted, the attacker controls the entire Kubernetes
  cluster, including all secrets, nodes, and workloads.

  AI agents working in Kubernetes environments may be manipulated through prompt
  injection to run these commands under the guise of "fixing RBAC", "granting
  deployment access", or "troubleshooting permissions".

recommendation: |
  - Block all RBAC mutation commands from AI agents without exception.
  - Require explicit human review and approval for any RBAC changes.
  - Audit ClusterRoleBinding and RoleBinding creation/modification events in
    Kubernetes audit logs (API server `--audit-log-path`).
  - Use OPA/Gatekeeper or Kyverno policies to restrict who can create RBAC resources.
  - Apply least-privilege: AI agents should run under service accounts with
    minimal RBAC permissions (no `create`/`patch` rights on RBAC resources).

examples:
  bad:
    - "kubectl create clusterrolebinding pwned --clusterrole=cluster-admin --user=attacker"
    - "kubectl create rolebinding admin --clusterrole=admin --serviceaccount=default:default"
    - "kubectl patch clusterrolebinding cluster-admin --patch '{\"subjects\":[{\"kind\":\"User\",\"name\":\"attacker\"}]}'"
    - "kubectl patch clusterrole cluster-admin --type=json -p '[{\"op\":\"add\",\"path\":\"/rules/-\",\"value\":{\"apiGroups\":[\"*\"],\"resources\":[\"*\"],\"verbs\":[\"*\"]}}]'"
  good:
    - "kubectl get clusterrolebindings"
    - "kubectl describe rolebinding admin -n staging"
    - "kubectl auth can-i list pods"

