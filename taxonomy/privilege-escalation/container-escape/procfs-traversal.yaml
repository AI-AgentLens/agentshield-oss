id: "privilege-escalation/container-escape/procfs-traversal"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Container Escape"
category_id: "5.3"
name: "Procfs Traversal Container Escape"
risk_level: "high"

abstract: |
  An AI agent reads `/proc/PID/root` or `/proc/PID/cwd` symlinks to access
  the host filesystem from within a container, bypassing namespace isolation.

explanation: |
  Linux exposes per-process filesystem views through `/proc`. From inside a
  container, if the `/proc` host filesystem is mounted (default in many
  container runtimes without hardening), an agent can:

  - `/proc/<PID>/root/` — a symlink to the process's root filesystem. For
    a host process, this resolves to the **host root**, bypassing all
    container filesystem namespacing. Reading `/proc/1/root/etc/shadow`
    reads the host's shadow file.
  - `/proc/<PID>/cwd/` — resolves to the process's current working
    directory on the **host** filesystem, which may be outside container
    boundaries.

  This technique requires that the target PID belongs to a host process
  (e.g., PID 1 = host init). It works even without elevated privileges if
  the container has read access to the target process's files.

recommendation: |
  - Block `cat/ls/cp/head/tail/xxd` targeting `/proc/*/root/` paths.
  - Mount `/proc` with `hidepid=2` to prevent non-root users from seeing
    other processes.
  - Use `--pid` namespace isolation to prevent container processes from
    seeing host PIDs.

examples:
  bad:
    - "cat /proc/1/root/etc/shadow"
    - "ls /proc/1/root/home"
    - "cp /proc/1/root/etc/passwd /tmp/host_passwd"
    - "ls /proc/1/cwd/"
  good:
    - "cat /proc/self/status"
    - "ls /proc/self/fd"

compliance:
  owasp-llm-2025: ["LLM05", "LLM06"]
  iso-27001-2022: ["A.8.9", "A.8.25"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-4"]
  soc2-type2: ["CC6.1", "CC6.6"]

references:
  mitre_attack: ["T1611"]
  cwe: ["CWE-22"]
  external:
    - title: "MITRE ATT&CK: Escape to Host"
      url: "https://attack.mitre.org/techniques/T1611/"

analyzers: ["regex"]
related_rules: ["ts-block-proc-root-escape", "ts-audit-proc-cwd-access"]
