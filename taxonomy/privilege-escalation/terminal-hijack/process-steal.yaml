id: "privilege-escalation/terminal-hijack/process-steal"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Terminal Session Hijacking"
category_id: "5.9"
name: "Terminal Process Stealing via reptyr"
risk_level: "high"

abstract: |
  An AI agent uses reptyr to re-parent a running process from another
  user's terminal to the current session, hijacking authenticated sudo
  sessions, SSH connections, or database shells that are running with
  elevated credentials.

explanation: |
  reptyr uses ptrace to steal a running process from another terminal
  (PTY) and re-attach it to the current session's PTY. This enables:

  1. **Credential hijacking**: Re-parent an authenticated sudo shell →
     the attacker now has an interactive root shell.

  2. **Session theft**: Steal an SSH session → access to remote production
     servers with the victim's credentials and host key trust.

  3. **Database access**: Steal a database interactive session (psql,
     mysql) with credentials already established.

  The stolen process continues running normally but is now attached to
  the attacker's terminal. The original terminal shows it as detached/gone.

  reptyr is occasionally used legitimately to detach a terminal session
  (e.g., move a process to tmux/screen), but AI agents have no legitimate
  need for this operation.

recommendation: |
  - Block reptyr invocations in AI agent execution environments.
  - Set kernel.yama.ptrace_scope=1 or higher to restrict ptrace.
  - Monitor for ptrace calls between unrelated processes via auditd.

examples:
  bad:
    - "reptyr 12345"
    - "sudo reptyr $(pgrep sudo)"
    - "reptyr -T 12345"
  good:
    - "tmux attach"
    - "screen -r"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.6"]
  iso-42001-2023: ["A.7.4", "A.8.4"]

references:
  mitre_attack: ["T1055.008"]
  cwe: ["CWE-269"]
  external:
    - title: "MITRE ATT&CK: Process Injection: Ptrace System Calls"
      url: "https://attack.mitre.org/techniques/T1055/008/"
    - title: "reptyr: Reparent a running program to a new terminal"
      url: "https://github.com/nelhage/reptyr"

analyzers: ["regex"]
related_rules: ["ts-block-reptyr"]
