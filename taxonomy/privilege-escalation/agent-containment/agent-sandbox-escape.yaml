analyzers: ["structural", "semantic", "dataflow"]
related_rules: []
# Detection via structural analysis (path traversal patterns, symlink creation
# targeting outside workspace), semantic analysis (intent classification as
# sandbox escape), and dataflow analysis (tracing data flow from restricted
# sources through permitted tools).
