id: "privilege-escalation/command-execution/sysctl-kernel-manipulation"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Command Execution"
category_id: "5.1"
name: "Sysctl Kernel Parameter Manipulation"
risk_level: "critical"

abstract: |
  Modifying kernel parameters via sysctl or /proc/sys/ writes can disable
  fundamental security controls (ASLR, kptr_restrict), enable network pivoting
  (ip_forward), or create code execution primitives (core_pattern pipe handlers).

explanation: |
  The sysctl interface (`sysctl -w` or direct `/proc/sys/` writes) controls
  runtime kernel behavior. Security-critical parameters include:

  - `kernel.randomize_va_space=0`: Disables ASLR, making memory addresses
    predictable for exploitation of buffer overflows and ROP chains.
  - `kernel.core_pattern=|/path/to/handler`: When any process crashes, the kernel
    pipes the core dump to the specified program — a reliable code execution
    primitive triggered by any segfault.
  - `kernel.kptr_restrict=0`: Exposes kernel symbol addresses via /proc/kallsyms,
    enabling kernel exploit development.
  - `net.ipv4.ip_forward=1`: Turns the host into a router, enabling man-in-the-middle
    attacks on adjacent network segments.
  - `net.ipv4.conf.*.rp_filter=0`: Disables reverse path filtering, enabling IP
    spoofing attacks.
  - `kernel.modules_disabled=0`: Re-enables kernel module loading after it was
    locked down.

  An AI agent modifying these parameters indicates either a compromised agent
  or an attack chain attempting to weaken the system before exploitation.
  Changes persist until reboot and affect all processes on the system.

recommendation: |
  - Block all sysctl writes to security-critical parameters in agent contexts.
  - Use sysctl.d drop-in files with proper file permissions for legitimate tuning.
  - Enable auditd rules for sysctl modifications: `-w /proc/sys/ -p w`.
  - Consider kernel lockdown mode (`lockdown=integrity`) to prevent runtime changes.

examples:
  bad:
    - "sysctl -w kernel.randomize_va_space=0"
    - "echo '|/tmp/evil.sh %p' > /proc/sys/kernel/core_pattern"
    - "sysctl -w net.ipv4.ip_forward=1"
    - "sysctl -p /tmp/evil-sysctl.conf"
  good:
    - "sysctl kernel.randomize_va_space"
    - "sysctl -a | grep net.ipv4"
    - "cat /proc/sys/kernel/core_pattern"

