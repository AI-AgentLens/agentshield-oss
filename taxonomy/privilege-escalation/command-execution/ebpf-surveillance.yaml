id: "privilege-escalation/command-execution/ebpf-surveillance"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Command Execution"
category_id: "5.1"
name: "eBPF Kernel Surveillance"
risk_level: "critical"

abstract: |
  Attaching eBPF programs to the kernel enables real-time interception of
  syscalls, user-space memory, network packets, and TLS plaintext — all without
  the visibility of traditional rootkits and without requiring CAP_SYS_MODULE.

explanation: |
  Extended Berkeley Packet Filter (eBPF) runs sandboxed programs inside the
  Linux kernel, originally for network filtering but now widely used for
  observability. Unlike kernel modules, eBPF:
  - Does NOT require CAP_SYS_MODULE — only CAP_BPF (available to many users)
  - Cannot be detected by most EDR solutions that monitor module loads
  - Can attach uprobes/kprobes to any kernel or user-space function

  **Key attack patterns:**
  - `bpftool prog load <file> /sys/fs/bpf/<name>`: pins an eBPF program in the
    BPF filesystem — persists until reboot, equivalent in risk to a kernel module
  - `bpftrace -e 'uprobe:/lib/libreadline.so:readline { printf("%s\n", str(arg0)); }'`:
    intercepts readline input, capturing passwords typed at any shell prompt
  - `bpftrace -e 'kprobe:SSL_write { ... }'`: decrypts TLS traffic by hooking
    OpenSSL before encryption, exposing HTTPS content in plaintext
  - `tc filter add dev eth0 ingress bpf obj capture.o`: attaches an eBPF program
    to a network interface for silent packet capture

  AI agents that use observability tooling (bpftrace, bpftool) for "debugging"
  may inadvertently run surveillance programs or be prompted by malicious actors
  to attach credential-harvesting probes.

recommendation: |
  - Block `bpftool prog load` and inline `bpftrace -e` expressions entirely in
    agent execution contexts.
  - Audit all `bpftool` and `bpftrace` usage — even "read-only" commands can
    reveal BPF programs already loaded by attackers.
  - Enable `kernel.unprivileged_bpf_disabled=1` sysctl to restrict eBPF to root.
  - Monitor `/sys/fs/bpf/` for unexpected pinned programs via auditd.
  - Use LSM hooks (SELinux/AppArmor) to restrict `bpf()` syscall usage.

examples:
  bad:
    - "bpftool prog load /tmp/backdoor.o /sys/fs/bpf/bd"
    - "bpftrace -e 'uprobe:/lib/libreadline.so:readline { printf(\"%s\\n\", str(arg0)); }'"
    - "bpftrace -e 'kprobe:SSL_write { printf(\"%s\\n\", str(arg0+4)); }'"
    - "tc filter add dev eth0 ingress bpf obj capture.o sec ingress"
    - "sudo bpftool prog load exploit.o /sys/fs/bpf/hook"
  good:
    - "bpftool net show"
    - "bpftool prog show"
    - "bpftrace -l 'kprobe:do_sys_open'"

