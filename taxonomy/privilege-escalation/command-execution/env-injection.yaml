id: "privilege-escalation/command-execution/env-injection"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Command Execution"
category_id: "5.1"
name: "Environment Variable Injection"
risk_level: "high"

abstract: |
  An AI agent that manipulates `LD_PRELOAD` or `LD_LIBRARY_PATH` can inject
  malicious shared libraries into privileged processes, bypassing authentication
  and security controls at the dynamic linker level.

explanation: |
  Linux's dynamic linker (ld.so) honours `LD_PRELOAD` and `LD_LIBRARY_PATH`
  when loading shared libraries. An attacker who controls these variables can:

  - **Hook libc functions** (e.g. `getuid`, `pam_authenticate`) to always return 0 / success
  - **Intercept credentials** passed through `sudo` or `su` before authentication
  - **Replace legitimate libraries** with malicious look-alikes that execute additional payloads

  The combination of an inline environment variable assignment and a privileged
  executable in a single command (`LD_PRELOAD=/tmp/evil.so sudo bash`) is a
  well-known CTF and red-team technique that is trivial to execute but difficult
  to detect after the fact. The dynamic linker strips `LD_PRELOAD` for SUID
  binaries in most modern Linux distributions, but this protection is absent
  when the binary is invoked via wrappers or in environments where SUID stripping
  is disabled.

  Exporting `LD_PRELOAD` or `LD_LIBRARY_PATH` persistently (via `export`) poisons
  the entire shell session and all child processes launched by an AI agent for
  the remainder of the session — a stealthy, long-lived injection channel.

recommendation: |
  - Block any command combining `LD_PRELOAD`/`LD_LIBRARY_PATH` with privileged executables.
  - Block `export LD_PRELOAD` / `export LD_LIBRARY_PATH` targeting untrusted paths (/tmp, /dev/shm, /proc).
  - Run AI agents under security profiles (seccomp, AppArmor) that prevent environment manipulation.
  - Audit uses of `LD_PRELOAD` in CI/CD and agent execution logs.

examples:
  bad:
    - "LD_PRELOAD=/tmp/evil.so sudo bash"
    - "LD_LIBRARY_PATH=/tmp/malicious:$LD_LIBRARY_PATH sudo id"
    - "export LD_PRELOAD=/dev/shm/hook.so && /usr/bin/passwd"
    - "LD_PRELOAD=libfake_pam.so su root"
  good:
    - "LD_PRELOAD=/usr/lib/libasan.so.5 ./myapp"
    - "LD_PRELOAD=libmalloc_debug.so make test"
    - "cat /etc/ld.so.conf"

