id: "privilege-escalation/command-execution/kernel-module"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Command Execution"
category_id: "5.1"
name: "Kernel Module Loading"
risk_level: "critical"

abstract: |
  Loading a kernel module grants ring-0 (kernel-space) access to the system,
  enabling complete bypass of all userspace security controls, rootkit installation,
  and persistent system compromise.

explanation: |
  `insmod` and `modprobe` load kernel modules (`.ko` files) directly into the
  running kernel. Once loaded, a module can:
  - Hook system calls to intercept or modify any kernel operation
  - Hide files, processes, and network connections (rootkit functionality)
  - Disable or bypass LSM frameworks (SELinux, AppArmor)
  - Install persistent backdoors that survive reboots (via `/etc/modules`)
  - Access all physical memory

  An AI agent that loads a kernel module effectively has unrestricted control over
  the entire system. Even "legitimate" module loading by an agent is extremely
  dangerous because it bypasses all userspace security monitoring.

  Secure Boot with module signing mitigates some risks, but many development
  environments do not enforce module signature verification.

recommendation: |
  - Block `insmod` and `modprobe` entirely in agent execution contexts.
  - Enable kernel module signing and Secure Boot where possible.
  - Use `lockdown=confidentiality` kernel parameter to prevent module loading.
  - Monitor `/proc/modules` and audit `MODULE_INIT` kernel events via auditd.

examples:
  bad:
    - "insmod /tmp/rootkit.ko"
    - "sudo modprobe evil_module"
    - "insmod ./exploit.ko"
  good:
    - "lsmod"
    - "modinfo e1000"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MANAGE-2"]
  soc2-type2: ["CC6.3", "CC6.8"]

references:
