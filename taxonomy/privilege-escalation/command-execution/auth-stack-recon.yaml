id: "privilege-escalation/command-execution/auth-stack-recon"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Command Execution"
category_id: "5.1"
name: "Authentication Stack Reconnaissance via PAM Config Read"
risk_level: "high"

abstract: |
  Reading PAM (Pluggable Authentication Modules) configuration files
  (`/etc/pam.conf`, `/etc/pam.d/*`) enables an AI agent to map the
  authentication stack for every system service, identifying weak modules,
  optional requirements, and 2FA placement — intelligence used to plan
  privilege escalation or authentication bypass attacks.

explanation: |
  PAM configuration files define the authentication, authorization, and session
  management chain for every system service: `sudo`, `sshd`, `login`, `su`,
  `gdm`, `polkit`, etc. Reading these files gives an agent a detailed map of:

  - **Which authentication modules are required vs. optional**: A module marked
    `optional` or `sufficient` can be exploited — if it fails, authentication
    may still succeed.
  - **MFA module presence and position**: Reveals whether `pam_google_authenticator`,
    `pam_duo`, or `pam_oath` are enforced, and at which step — enabling targeted
    bypass (e.g., using a different service that lacks MFA enforcement).
  - **Account lockout configuration**: Reading `pam_tally2` or `pam_faillock`
    settings reveals lockout thresholds, enabling calibrated brute-force attempts.
  - **Sudo authentication chain**: If `sudo` uses `pam_unix.so` with `sufficient`
    semantics, an attacker can potentially replace it with `pam_permit.so` to
    grant universal access.
  - **NSS/LDAP/SSSD integration**: Identifies if authentication delegates to
    LDAP or Active Directory, revealing the enterprise identity topology.

  Common reconnaissance commands:
  ```bash
  cat /etc/pam.conf
  ls /etc/pam.d/
  cat /etc/pam.d/sudo
  cat /etc/pam.d/sshd
  grep -r "pam_google_authenticator" /etc/pam.d/
  grep "sufficient\|optional" /etc/pam.d/sudo
  ```

  **Reconnaissance → Exploitation chain**:
  1. Read `/etc/pam.d/sudo` to identify module stack
  2. Identify `pam_unix.so` as `required` — need to replace it
  3. Write `pam_permit.so auth sufficient pam_permit.so` to `/etc/pam.d/sudo`
  4. Now any user can run `sudo` without a password

  This entry covers the *read* reconnaissance phase. Writes to PAM config are
  covered by destructive-ops/system-management and privilege-escalation pack rules.

recommendation: |
  - Block agent-generated code that opens or reads `/etc/pam.conf` or `/etc/pam.d/*`.
  - Apply filesystem auditing (auditd `-a always,exit -F path=/etc/pam.d`).
  - Restrict read permissions on PAM configs to root where operationally feasible.
  - Monitor for PAM config reads followed by PAM config writes in audit logs.
  - Use immutable flags (`chattr +i /etc/pam.d/sudo`) to prevent modification even if read.

examples:
  bad:
    - "open('/etc/pam.conf', 'r')"
    - "open('/etc/pam.d/sudo', 'r')"
    - "subprocess.run(['cat', '/etc/pam.d/sshd'])"
    - "glob.glob('/etc/pam.d/*')"
  good:
    - "open('/etc/hosts', 'r')"
    - "subprocess.run(['getent', 'passwd', 'root'])"

