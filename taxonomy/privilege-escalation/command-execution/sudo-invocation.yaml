id: "privilege-escalation/command-execution/sudo-invocation"
version: "1.0.0"
kingdom: "Privilege Escalation"
kingdom_id: 5
category: "Command Execution"
category_id: "5.1"
name: "Sudo Invocation"
risk_level: "high"

abstract: |
  An AI agent invoking `sudo` to elevate privileges can bypass application-level
  access controls and gain root-level access to the system.

explanation: |
  `sudo` grants a process temporary root (or another user's) privileges. When an
  AI agent issues `sudo` commands it breaks out of any sandbox or least-privilege
  boundary the calling application enforced. Common patterns include:
  - `sudo <command>` — direct privilege elevation
  - `sudo -u <user> <command>` — lateral privilege switch
  - `sudo -i` or `sudo su` — acquiring a root shell

  Several alternatives to `sudo` also provide privilege elevation and are not
  caught by simple `sudo`-prefix matching:
  - **`pkexec`** (PolicyKit) — used on GNOME/freedesktop systems; the vector for
    CVE-2021-4034 (PwnKit), a critical local privilege escalation vulnerability
  - **`doas`** — OpenBSD/Alpine/Arch sudo replacement; increasingly common in
    containerised and minimal Linux environments
  - **`runuser`** — used in SysV init scripts and systemd service files to execute
    commands as a different user; often less scrutinized than sudo

  Prompt injection or a compromised tool call could instruct an agent to use any
  of these to elevate privileges, bypassing rules that only match `sudo`.

recommendation: |
  - Block all `sudo` invocations in agent tool execution contexts.
  - Run AI agent processes under a dedicated low-privilege service account.
  - Apply seccomp or AppArmor profiles that prevent execve of sudo.
  - Audit every tool call for `sudo` prefixes before execution.

examples:
  bad:
    - "sudo rm -rf /var/log"
    - "sudo cat /etc/shadow"
    - "sudo -u root bash -i"
    - "pkexec bash"
    - "pkexec /bin/sh"
    - "doas bash"
    - "doas -u root /bin/sh"
    - "runuser -l root -c 'bash'"
  good:
    - "cat /var/log/app.log"
    - "ls /etc"
    - "pkexec --version"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.3", "CC6.8"]
  iso-42001-2023: ["A.7.4", "A.8.4"]
  mitre_atlas: ["AML.T0038"]

references:
  mitre_attack: ["T1548.003"]
  cwe: ["CWE-250"]

analyzers: ["regex", "structural"]
related_rules: ["ts-audit-sudo", "ts-block-sudo-alternatives-shell", "ts-audit-sudo-alternatives"]
