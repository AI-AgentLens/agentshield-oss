id: "credential-exposure/private-key-access/ssh-config-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Private Key Access"
category_id: "2.1"
name: "SSH Config Access"
risk_level: "medium"

abstract: |
  Access to ~/.ssh/config exposes sensitive infrastructure topology including
  hostname aliases, jump host chains, identity file paths, and per-host
  configuration that reveals the structure of an organization's SSH-accessible
  infrastructure.

explanation: |
  `~/.ssh/config` is the SSH client configuration file that maps host aliases to
  connection parameters. It commonly contains:
  - Hostname aliases that map short names to internal IP addresses or FQDNs
  - `ProxyJump` and `ProxyCommand` directives revealing jump host topology
  - `IdentityFile` directives pointing to private key locations
  - Per-host `User` settings revealing account names on remote systems
  - Port forwarding configurations revealing internal service topology
  - `StrictHostKeyChecking` settings that may indicate security controls are disabled

  While SSH config does not contain credentials directly, it is a reconnaissance
  treasure map. An attacker reading `~/.ssh/config` learns:
  - Which private key files to target for exfiltration
  - How to chain through jump hosts to reach internal systems
  - Internal hostnames and IP addressing schemes
  - Service account naming conventions

  In combination with SSH private key exfiltration, the config file provides
  a complete roadmap for lateral movement through the infrastructure.

recommendation: |
  - Audit access to `~/.ssh/config` by AI agents.
  - Use `Include` directives to split sensitive config into separate files with tighter permissions.
  - Avoid storing sensitive infrastructure hostnames in SSH config; prefer DNS resolution.
  - Review SSH config for overly broad `Host *` blocks that may weaken security defaults.

examples:
  bad:
    - "cat ~/.ssh/config"
    - "grep -i host ~/.ssh/config"
    - "python -c \"print(open('/root/.ssh/config').read())\""
  good:
    - "ssh -G github.com"
    - "ssh-keygen -l -f ~/.ssh/id_ed25519"

compliance:
