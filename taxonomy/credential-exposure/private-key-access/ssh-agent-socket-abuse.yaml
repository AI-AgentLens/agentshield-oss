id: "credential-exposure/private-key-access/ssh-agent-socket-abuse"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Private Key Access"
category_id: "2.1"
name: "SSH Agent Socket Abuse"
risk_level: "high"

abstract: |
  Manipulation of the SSH agent via ssh-add or SSH_AUTH_SOCK socket hijacking allows an
  attacker to enumerate loaded private keys, load unauthorized keys, delete existing keys,
  or impersonate another user by using their agent socket — all without accessing key files.

explanation: |
  The SSH agent (ssh-agent) holds decrypted private keys in memory and authenticates SSH
  connections on behalf of the user. The agent is accessible via a Unix socket pointed to
  by the SSH_AUTH_SOCK environment variable. Abuse patterns include:

  - **Enumeration**: `ssh-add -L` lists all public keys currently loaded in the agent,
    revealing which remote systems the user can access — a lateral movement reconnaissance step.
  - **Key deletion**: `ssh-add -D` removes all keys from the agent, causing authentication
    failures for the user — a denial-of-service or sabotage action.
  - **Socket hijacking**: Setting `SSH_AUTH_SOCK` to another user's socket (e.g., from
    /tmp/ssh-*/agent.*) lets an attacker use that user's loaded keys without ever reading
    key file material.
  - **Unauthorized key loading**: `ssh-add /path/to/key` injects a key into the running agent,
    potentially loading stolen or attacker-controlled keys.

  These attacks are especially dangerous because they bypass file-based protections — the
  key material never touches the filesystem during use.

recommendation: |
  - Audit `ssh-add -L` as reconnaissance for lateral movement (key enumeration).
  - Block `ssh-add -D` to prevent destructive removal of all agent keys.
  - Block SSH_AUTH_SOCK overrides with ssh/ssh-add to prevent socket hijacking.
  - Audit `ssh-add <keyfile>` to review all key injection attempts.
  - Use `ssh-agent` with forwarding disabled (ForwardAgent no) for AI agent environments.
  - Prefer ephemeral keys with short TTLs over persistent agent-loaded keys.

examples:
  bad:
    - "ssh-add -L"
    - "ssh-add -D"
    - "SSH_AUTH_SOCK=/tmp/ssh-abc123/agent.456 ssh user@server"
    - "SSH_AUTH_SOCK=/run/user/1000/agent.789 ssh-add -L"
    - "ssh-add ~/.ssh/stolen_key"
  good:
    - "ssh-add -l"
    - "ssh user@server"
    - "ssh-keyscan github.com"

