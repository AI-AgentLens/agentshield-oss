id: "credential-exposure/private-key-access/windows-dpapi-key-theft"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Private Key Access"
category_id: "2.1"
name: "Windows DPAPI Master Key Theft"
risk_level: "critical"

abstract: |
  An AI agent reads DPAPI master key files from AppData/Roaming/Microsoft/Protect/<SID>/,
  enabling decryption of every DPAPI-protected secret on the system including Credential
  Manager blobs, browser-saved passwords, certificate private keys, and Wi-Fi passwords.

explanation: |
  Windows Data Protection API (DPAPI) is the encryption backbone for all Windows-stored
  secrets. Master key files stored in `%APPDATA%\Microsoft\Protect\<SID>\` are the root
  keys that unlock all DPAPI-encrypted data on a system.

  A single stolen DPAPI master key enables decryption of:
  - **Credential Manager blobs** — RDP, network share, and application passwords
  - **Browser-saved passwords** — Chrome, Edge, IE store credentials via DPAPI
  - **Certificate private keys** — User-scoped code signing and TLS certificates
  - **Wi-Fi network passwords** — Stored in the Windows CNG key store
  - **BitLocker recovery keys** — In some configurations
  - **Outlook/Exchange credentials** — Email account authentication tokens

  The Protect directory contains:
  - GUID-named master key files (one per rotation period)
  - `Preferred` file identifying the current active master key

  Tools like Mimikatz's `dpapi::masterkey` module or the Python `dpapick3` library
  can decrypt master keys when the user's NTLM hash or cleartext password is available.
  AI agents accessing development or CI/CD environments on Windows machines may
  inadvertently enumerate these files during filesystem exploration.

recommendation: |
  - Block all access to `%APPDATA%\Microsoft\Protect\` directory and its contents.
  - Block the companion Credential Manager blobs in `%APPDATA%\Microsoft\Credentials\`.
  - No legitimate AI agent workflow requires reading DPAPI master key files.
  - Consider enabling Credential Guard (Windows 10+) to protect DPAPI master keys
    in an isolated Hyper-V container inaccessible to OS-level attackers.

examples:
  bad:
    - "dir %APPDATA%\\Microsoft\\Protect\\"
    - "copy %APPDATA%\\Microsoft\\Protect\\S-1-5-21-* C:\\exfil\\"
    - "Get-ChildItem $env:APPDATA\\Microsoft\\Protect -Recurse"
    - "cat ~/.local/share/Microsoft/Protect/S-1-5-21-1234/abcdef"
  good:
    - "Get-ChildItem $env:APPDATA\\Microsoft"

