id: "credential-exposure/private-key-access/code-signing-certificate-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Private Key Access"
category_id: "2.1"
name: "Code Signing Certificate Read"
risk_level: "critical"

abstract: |
  An AI agent reads PKCS#12 (.p12) or PFX (.pfx) certificate container files that
  bundle a code signing private key with its certificate chain, enabling supply chain
  attacks by signing malicious binaries with a trusted developer identity.

explanation: |
  Code signing certificates in PKCS#12 format (file extensions .p12 or .pfx) bundle
  the private key and certificate chain in a single password-protected container.
  These are used to:
  - **Sign macOS apps and installers** — Apple Developer ID certificates
  - **Sign Windows executables** — Microsoft Authenticode (.pfx) certificates
  - **Sign iOS/Android apps** — Mobile distribution certificates
  - **Sign Java JARs and Android APKs** — Java KeyStore certificates
  - **Sign CI/CD artifacts** — Build pipeline signing keys

  An AI agent operating in a development environment has frequent access to project
  directories where these certificates may be stored for build automation. Reading
  a .p12 or .pfx file exfiltrates both the private key and certificate in one step.

  Supply chain impact: A stolen code signing key allows an attacker to:
  1. Sign malicious binaries that appear to originate from the legitimate developer
  2. Bypass OS Gatekeeper (macOS) or SmartScreen (Windows) security warnings
  3. Distribute malware that passes antivirus signature checks
  4. Revocation may take days — all users who installed before revocation are at risk

  Related: Java KeyStore files (.jks) and Android signing keystores contain equivalent
  private keys and are covered by separate rules.

recommendation: |
  - Block all read access to .p12 and .pfx files outside of controlled signing
    pipelines with explicit human authorization.
  - Store code signing certificates in hardware security modules (HSMs) or
    cloud-based signing services (Apple Notarization, Azure Trusted Signing).
  - Never store .p12/.pfx files in source code repositories or project directories
    accessible to AI agents.
  - Use short-lived signing certificates with CI/CD environments; rotate immediately
    if agent access is suspected.
  - Monitor for certificate usage anomalies via certificate transparency logs.

examples:
  bad:
    - "cat distribution.p12 | base64"
    - "cp signing.pfx /tmp/exfil.pfx"
    - "openssl pkcs12 -in cert.p12 -nocerts -out key.pem"
    - "cat *.p12 > /tmp/certs.bin"
    - "read_file path=dist/signing.p12"
  good:
    - "openssl x509 -in cert.pem -noout -text"
    - "security find-certificate -c 'Developer ID'"
    - "certutil -dump signing.cer"

