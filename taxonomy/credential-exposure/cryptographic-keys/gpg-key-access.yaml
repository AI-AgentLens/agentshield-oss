id: "credential-exposure/cryptographic-keys/gpg-key-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cryptographic Keys"
category_id: "2.7"
name: "GPG Key Access"
risk_level: "critical"

abstract: |
  Access to GPG key directories exposes private keys used for signing, encryption,
  and authentication, enabling an attacker to impersonate the key owner, decrypt
  encrypted data, or forge signed commits.

explanation: |
  GPG private keys stored in `~/.gnupg/` are among the highest-value credentials
  on a developer workstation. Compromised GPG keys enable:
  - Decrypting GPG-encrypted files, emails, and messages
  - Forging signed git commits (verified commit impersonation)
  - Signing malicious packages or release artifacts with a trusted identity
  - Decrypting password manager databases (pass/gopass use GPG)

  Common access patterns include:
  - `gpg --export-secret-keys` — exports private key material
  - `cat ~/.gnupg/secring.gpg` — directly reading legacy keyring
  - `ls ~/.gnupg/private-keys-v1.d/` — enumerating key IDs for targeted export

recommendation: |
  - Block access to `~/.gnupg/` directory in agent tool execution.
  - Add MCP block rules for GPG secret key export commands.
  - Use hardware security keys (YubiKey) for GPG to prevent key file access.
  - Monitor `gpg --export-secret-keys` invocations.

examples:
  bad:
    - "gpg --export-secret-keys --armor user@example.com"
    - "cat ~/.gnupg/secring.gpg"
    - "gpg-connect-agent 'keyinfo --list' /bye"
  good:
    - "gpg --list-keys"
    - "gpg --verify release.tar.gz.sig"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["8.4"]

references:
  mitre_attack: ["T1552.004"]
  cwe: ["CWE-312"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-gnupg-access"]
