analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-restic-xdg-password", "mcp-sec-block-restic-dotfile-password", "mcp-sec-block-borgmatic-config", "mcp-sec-block-borg-repo-keys"]
