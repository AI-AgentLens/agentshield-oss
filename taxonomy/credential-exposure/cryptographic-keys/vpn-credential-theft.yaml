id: "credential-exposure/cryptographic-keys/vpn-credential-theft"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cryptographic Keys"
category_id: "2.7"
name: "VPN Credential Theft"
risk_level: "critical"

abstract: |
  Reading WireGuard configuration files, exporting NetworkManager VPN profiles,
  or accessing IPsec secrets files exposes private keys, pre-shared keys, and
  VPN credentials that enable unauthorized network access to private infrastructure.

explanation: |
  Modern VPN solutions store cryptographic key material in configuration files that
  an AI agent can silently read during routine system inspection tasks:

  **WireGuard** (`/etc/wireguard/*.conf`): Contains raw 256-bit Curve25519 private keys
  (`PrivateKey`) and optional 256-bit pre-shared keys (`PresharedKey`). The `wg showconf`
  command exports the running interface configuration including all key material. Anyone
  with the private key can impersonate the WireGuard peer and access the VPN mesh
  (corporate network, Tailscale, ZeroTier-based infrastructure).

  **NetworkManager VPN connections** (`/etc/NetworkManager/system-connections/`): NM
  connection profiles store VPN credentials including passwords, certificates, and PSKs
  in INI-style `.nmconnection` files. The `nmcli --show-secrets connection show` command
  explicitly dumps stored credentials. `nmcli connection export` writes a full VPN
  config file (OpenVPN/WireGuard) with embedded key material.

  **IPsec** (`/etc/ipsec.secrets`, `/etc/swanctl/`): strongSwan and Libreswan store
  pre-shared keys (PSKs) and RSA private keys for IKEv1/IKEv2 authentication in
  `ipsec.secrets`. These enable unauthorized VPN session establishment.

  These attacks are particularly dangerous because:
  - WireGuard configs are as sensitive as SSH private keys — a stolen key grants
    permanent access until the peer's AllowedIPs are revoked
  - Corporate VPN access via stolen keys bypasses authentication audit logs
  - NetworkManager profiles often contain credentials for cloud VPNs and jump hosts
  - `/etc/wireguard/` is readable only by root, but AI agents often run with elevated
    privileges in developer environments

recommendation: |
  - Block `cat`/`less`/`more` of `/etc/wireguard/*.conf` files.
  - Block `wg showconf` which exports the full running configuration including keys.
  - Block `nmcli --show-secrets` and `nmcli connection export`.
  - Block direct read of `/etc/ipsec.secrets`, `/etc/swanctl/conf.d/`.
  - Audit `wg show` (interface enumeration without key material).
  - Restrict AgentShield protected paths to include VPN config directories.

examples:
  bad:
    - "cat /etc/wireguard/wg0.conf"
    - "wg showconf wg0"
    - "nmcli --show-secrets connection show Corporate-VPN"
    - "nmcli connection export Corporate-VPN /tmp/vpn.ovpn"
    - "cat /etc/ipsec.secrets"
    - "sudo cat /etc/NetworkManager/system-connections/VPN.nmconnection"
  good:
    - "wg show"
    - "nmcli connection show"
    - "systemctl status wg-quick@wg0"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.20", "A.5.34"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552.004", "T1552.001", "T1133"]
  cwe: ["CWE-312", "CWE-522"]
  external:
