id: "credential-exposure/database-access/database-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Database Access"
category_id: "2.9"
name: "Database Credential Access"
risk_level: "critical"

abstract: |
  Direct database access via MCP URIs (mysql://, postgres://) bypasses application-level
  access controls, exposing raw customer data and allowing unauthorized reads, writes,
  or schema modifications.

explanation: |
  MCP database tools accept URI connection strings that directly authenticate to
  database servers. An agent granted a connection string for a production database
  can bypass all application-level authorization logic and:
  - Dump entire tables including PII and financial records
  - Exfiltrate data via SELECT INTO OUTFILE or COPY TO
  - Modify or delete records with no audit trail in the application layer
  - Access credential tables (user passwords, session tokens)
  - Enumerate all databases and tables on the server

  URI formats like `mysql://user:password@host/db` or `postgres://user:pass@host/db`
  embed credentials directly, creating additional exposure if the URI is logged.

recommendation: |
  - Restrict MCP database tool access to read-only credentials.
  - Block production database URIs from agent tool configurations.
  - Use column-level encryption for PII and ensure read replicas are used for agent access.
  - Log all database queries executed via MCP tools with the executing agent identity.

examples:
  bad:
    - "mysql://admin:password@prod-db.company.com/customers"
    - "postgres://app_user:secret@production.db.internal/main"
    - "mongodb://admin:pass@mongo.internal:27017/users"
  good:
    - "mysql://readonly_agent:token@analytics.db.internal/reporting"
    - "postgres://read_only:token@replica.db.internal/metrics"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1"]
  soc2-type2: ["CC6.1", "C1.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1213"]
  cwe: ["CWE-312", "CWE-798"]

analyzers: ["structural"]
related_rules: ["mcp-sec-block-mysql-uri", "mcp-sec-block-postgres-uri", "mcp-sec-block-redis-uri", "mcp-sec-block-mongodb-uri"]
