id: "credential-exposure/secrets-management/sops-key-reference-exposure"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Secrets Management"
category_id: "2.36"
name: "SOPS Master Configuration Exposure"
risk_level: "high"

abstract: |
  Reading or writing the SOPS master configuration file (.sops.yaml) exposes
  the complete secrets encryption topology — KMS ARNs, GCP key paths, PGP
  fingerprints, and age public keys — enabling targeted theft of the
  encryption keys that protect all secrets in the repository.

explanation: |
  The `.sops.yaml` file is the SOPS master configuration that defines which
  encryption keys should be used for each file or directory in a repository:

  ```yaml
  # .sops.yaml
  creation_rules:
    - path_regex: environments/prod/.*
      kms: 'arn:aws:kms:us-east-1:123456789012:key/mrk-abc123...'
      gcp_kms: 'projects/my-project/locations/global/keyRings/prod-ring/cryptoKeys/secrets-key'
    - path_regex: environments/staging/.*
      pgp: 'FINGERPRINT1,FINGERPRINT2'
      age: 'age1abc123...,age1def456...'
  ```

  **Risks from reading .sops.yaml**:
  - **Encryption key inventory**: Reveals every KMS key ARN, GCP KMS resource
    path, PGP fingerprint, and age public key used across the entire project.
    This is the reconnaissance step before targeted key exfiltration attacks.
  - **IAM target identification**: KMS ARNs identify the exact AWS account and
    key IDs — an attacker can enumerate IAM policies on these keys to find
    privilege escalation paths.
  - **PGP fingerprint mapping**: Reveals which team members' GPG keys can
    decrypt which secrets, enabling social engineering or targeted key theft.
  - **Scope mapping**: The `path_regex` rules reveal which environments
    (prod, staging, dev) exist and which use stronger vs. weaker key configs.

  **Risks from writing .sops.yaml**:
  - **Key substitution**: Replacing legitimate key references with attacker-
    controlled keys causes all future `sops --encrypt` operations to use
    the attacker's key, giving them access to all newly encrypted secrets.
  - **Key removal**: Removing keys from the creation rules prevents legitimate
    users from decrypting secrets, causing service disruption.

recommendation: |
  - Block both read and write access to `.sops.yaml` in AI agent contexts.
  - Treat `.sops.yaml` as a security-critical file requiring the same
    protection as the secrets themselves.
  - Audit all changes to `.sops.yaml` via git hooks and require peer review.

examples:
  bad:
    - |
      # Reading .sops.yaml reveals all encryption key references
      cat .sops.yaml
    - |
      # Modifying to add attacker-controlled key
      echo "      age: 'age1attacker...'" >> .sops.yaml
  good:
    - |
      # Read non-secret configuration (safe)
      cat .pre-commit-config.yaml

