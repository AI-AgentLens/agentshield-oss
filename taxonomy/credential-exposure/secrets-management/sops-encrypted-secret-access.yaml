id: "credential-exposure/secrets-management/sops-encrypted-secret-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Secrets Management"
category_id: "2.36"
name: "SOPS Encrypted Secret File Access"
risk_level: "high"

abstract: |
  Reading or writing SOPS-encrypted secrets files (e.g., secrets.enc.yaml,
  secrets.yaml with SOPS metadata) exposes encrypted application secrets to
  potential offline decryption attacks or enables an attacker to overwrite
  secrets with malicious values by tampering with the encrypted payload.

explanation: |
  Mozilla SOPS (Secrets OPerationS) is widely used in GitOps and IaC workflows
  to encrypt secrets at rest while keeping them in version control. SOPS
  encrypts the values (not keys) using a combination of KMS, PGP, GCP KMS,
  Azure Key Vault, or age keys, producing files like:

  ```yaml
  # secrets.enc.yaml
  database_password: ENC[AES256_GCM,data:abc123...,iv:...,tag:...,type:str]
  api_key: ENC[AES256_GCM,data:def456...,iv:...,tag:...,type:str]
  sops:
      kms:
          - arn: arn:aws:kms:us-east-1:123456789:key/...
      lastmodified: 2024-01-15T12:00:00Z
      version: 3.7.3
  ```

  **Risks from read access**:
  - **Ciphertext exfiltration**: Even encrypted, the ciphertext can be
    exfiltrated and decrypted offline if the attacker later gains access
    to the KMS/PGP keys used (e.g., via cloud credential theft).
  - **Key metadata exposure**: The `sops:` block reveals which KMS ARNs,
    PGP fingerprints, or age public keys are used — reconnaissance for
    targeted key theft.
  - **Pattern analysis**: Encrypted values may reveal the structure and
    number of secrets even without decryption.

  **Risks from write access**:
  - **Secret substitution**: An attacker with write access can replace
    legitimate encrypted values with their own, injecting backdoor
    credentials or disabling secrets (e.g., replacing a real API key
    with one the attacker controls).
  - **SOPS metadata tampering**: Modifying the `sops:` metadata can
    prevent legitimate decryption, causing service disruption.

recommendation: |
  - Block both read and write access to SOPS-encrypted files in AI agent
    contexts (standard names: secrets.enc.yaml, *.sops.yaml, secrets.yaml
    with SOPS metadata).
  - Use RBAC to restrict who can invoke SOPS decrypt operations; agents
    should not need to decrypt secrets directly.
  - Verify SOPS file integrity with MAC verification before deployments.

examples:
  bad:
    - |
      # Reading SOPS encrypted secrets exposes ciphertext and key metadata
      cat secrets.enc.yaml
    - |
      # Writing can substitute malicious encrypted values
      echo "api_key: ENC[attacker...]" >> secrets.enc.yaml
  good:
    - |
      # Read non-secrets configuration (safe)
      cat config.yaml

