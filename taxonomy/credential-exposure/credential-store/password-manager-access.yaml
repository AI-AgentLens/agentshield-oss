id: "credential-exposure/credential-store/password-manager-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Credential Store"
category_id: "2.30"
name: "Credential Store Access"
risk_level: "critical"

abstract: |
  Access to local password manager vault files (LastPass, 1Password) stored in
  ~/.local/share/lastpass/ or ~/.local/share/1password/ exposes the aggregated
  credentials for all services managed by the password manager, representing
  complete credential compromise across the user's digital identity.

explanation: |
  Password managers store encrypted local vaults for offline access and sync:
  - `~/.local/share/lastpass/` — LastPass local data cache including encrypted vault
  - `~/.local/share/1password/` — 1Password local database and vault data
  - `~/.config/1password/` — 1Password configuration and session keys
  - `~/Library/Application Support/1Password/` — macOS 1Password data directory

  While the vault data itself is encrypted, local access combined with session
  keys or a known master password enables decryption. More critically, an agent
  accessing these directories may exfiltrate the encrypted vault for offline
  cracking, or capture the master password via keylogging or environment variable
  inspection if the password manager CLI is actively being used.

  Password manager compromise is a high-leverage attack: a single stolen vault
  can contain hundreds or thousands of credentials across banking, work, personal,
  and infrastructure accounts.

recommendation: |
  - Block read access to `~/.local/share/lastpass/`, `~/.local/share/1password/`, and `~/.config/1password/`.
  - Enforce hardware security key (YubiKey) as second factor for password manager access.
  - Use CLI-only password manager interactions rather than exposing vault directories to agent working directories.
  - Monitor for unexpected process access to password manager data directories.

examples:
  bad:
    - "ls ~/.local/share/lastpass/"
    - "cat ~/.local/share/1password/data.sqlite"
    - "find ~/.local/share/1password -type f | xargs cat"
  good:
    - "op item list"
    - "lpass show --password example.com"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1555", "T1555.001"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "structural"]
related_rules: []
