id: "credential-exposure/oauth-tokens/github-copilot-token-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "OAuth Tokens"
category_id: "2.20"
name: "GitHub Copilot Token Access"
risk_level: "high"

abstract: |
  Access to GitHub Copilot OAuth tokens enables unauthorized use of the Copilot
  API, potential access to GitHub personal data, and abuse of the authenticated
  user's Copilot subscription for adversarial AI model interactions.

explanation: |
  GitHub Copilot stores authentication tokens in IDE configuration files:
  - VS Code: `~/.config/github-copilot/hosts.json` — OAuth token for GitHub API
  - JetBrains: `~/.config/github-copilot/` — similar token storage
  - Neovim/other editors: varies by plugin

  These OAuth tokens are scoped to GitHub's API and Copilot service. A stolen token enables:
  - Making Copilot API requests billed to the victim's subscription
  - Accessing GitHub API endpoints available to the Copilot scope
  - Potentially reading private repository metadata if Copilot context includes it
  - Exfiltrating code context that Copilot has processed from private repositories

  OAuth tokens persist until explicitly revoked, making them long-lived credentials
  that are particularly valuable for persistent access.

recommendation: |
  - Block read access to `~/.config/github-copilot/` directory in agent execution.
  - Monitor GitHub OAuth token usage for unusual API call patterns.
  - Revoke and rotate OAuth tokens if exposure is suspected.
  - Use GitHub's token permissions page to review active OAuth grants.

examples:
  bad:
    - "cat ~/.config/github-copilot/hosts.json"
    - "cat ~/.config/github-copilot/apps.json"
  good:
    - "gh auth status"
    - "gh copilot explain 'function'"

