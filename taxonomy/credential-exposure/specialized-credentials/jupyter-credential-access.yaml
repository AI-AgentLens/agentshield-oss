id: "credential-exposure/specialized-credentials/jupyter-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Specialized Credential Access"
category_id: "2.29"
name: "Jupyter Credential Access"
risk_level: "high"

abstract: |
  Accessing credential files used by Jupyter notebooks and data science
  platforms — including notebook tokens, kernel connection files, database
  connection strings embedded in notebooks, and data warehouse credentials
  stored in Jupyter configuration directories.

explanation: |
  Jupyter environments are pervasive in data science and ML engineering workflows.
  They accumulate credentials in multiple locations:

  - `~/.jupyter/` — Jupyter server configuration with authentication tokens
  - Jupyter kernel connection files (`/tmp/kernel-*.json`) containing ports
    and authentication keys for active kernels
  - Notebook files (`.ipynb`) often contain database connection strings,
    API keys, and service credentials in cell outputs or metadata
  - JupyterHub cookie secret files and proxy authentication tokens
  - DataBricks, Kaggle, and Colab configuration files with platform credentials

  AI agents processing data science repositories may inadvertently access
  or expose these credentials while helping with notebook analysis or debugging.

recommendation: |
  - Store credentials in environment variables, not in notebook cells or outputs.
  - Clear all cell outputs before committing notebooks to version control.
  - Use `nbstripout` as a pre-commit hook to strip outputs automatically.
  - Restrict access to `~/.jupyter/` and kernel connection files.
  - Use Jupyter server token rotation and short-lived session tokens.
  - Audit `*.ipynb` files in repositories for embedded credentials.

examples:
  bad:
    - "cat ~/.jupyter/jupyter_server_config.py  # contains authentication tokens"
    - "ls /tmp/kernel-*.json  # kernel connection files with auth keys"
    - "cat notebook_with_db_output.ipynb  # notebook with credentials in outputs"
  good:
    - "echo $JUPYTER_TOKEN  # using environment variable"
    - "jupyter server list  # check running servers without exposing tokens"

compliance:
