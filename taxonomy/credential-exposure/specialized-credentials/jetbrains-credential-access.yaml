  cwe: ["CWE-312", "CWE-522", "CWE-256"]

analyzers: ["regex", "structural", "mcp"]
related_rules: ["mcp-sec-block-jetbrains-security-xml", "mcp-sec-block-jetbrains-web-servers", "mcp-sec-block-jetbrains-datasources"]
