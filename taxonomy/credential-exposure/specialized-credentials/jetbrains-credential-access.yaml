id: "credential-exposure/specialized-credentials/jetbrains-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Specialized Credential Access"
category_id: "2.29"
name: "JetBrains IDE Credential Access"
risk_level: "high"

abstract: |
  Accessing credential files stored by JetBrains IDEs (IntelliJ IDEA, DataGrip,
  WebStorm, PyCharm, GoLand, etc.) including saved database passwords, server
  credentials, API tokens, and connection strings stored in `.idea/` XML
  configuration files and JetBrains application support directories.

explanation: |
  JetBrains IDEs persist credentials in multiple locations that are accessible
  to AI agents operating on developer workstations:

  - `.idea/dataSources.xml` — database connection strings including embedded
    plaintext or obfuscated passwords for DataGrip/IntelliJ database tools
  - `.idea/webServers.xml` — FTP/SFTP/SSH server credentials and authentication
    configuration for WebStorm remote deployment
  - `.idea/workspace.xml` — workspace settings that may include API endpoint
    tokens and service credentials
  - `~/.config/JetBrains/*/options/` — application-level settings with
    saved authentication tokens and license credentials
  - `~/.config/JetBrains/*/options/security.xml` — master password hash and
    stored credential metadata
  - `~/Library/Application Support/JetBrains/*/options/` (macOS equivalent)

  These files often contain credentials in a weakly obfuscated format
  (base64 or simple XOR encoding) rather than using the system keychain,
  making them directly extractable. DataGrip in particular stores database
  passwords in `.idea/dataSources/` with per-datasource credential files.

  AI agents processing repositories containing `.idea/` directories (which
  should typically be gitignored but often are not) may inadvertently expose
  these credentials during code analysis or file reading tasks.

recommendation: |
  - Add `.idea/dataSources.xml`, `.idea/webServers.xml`, and
    `.idea/dataSources/` to `.gitignore` to prevent accidental commit.
  - Use JetBrains' system keychain integration rather than IDE-managed
    password storage where possible.
  - Restrict agent read access to `.idea/` configuration files containing
    credential entries.
  - Audit repositories for committed `.idea/` credential files.
  - Rotate any credentials that may have been stored in JetBrains config files.

examples:
  bad:
    - "cat .idea/dataSources.xml  # contains saved DB passwords"
    - "cat .idea/webServers.xml  # contains SFTP/SSH server credentials"
    - "ls ~/.config/JetBrains/DataGrip2024.1/options/  # app-level credential storage"
    - "cat '~/Library/Application Support/JetBrains/IntelliJIdea2024.1/options/security.xml'"
  good:
    - "cat .idea/misc.xml  # non-credential IDE metadata"
    - "cat .idea/modules.xml  # project module configuration"
    - "git status .idea/  # reviewing staged changes to IDE config"

compliance:
  owasp-llm-2025: ["LLM06", "LLM02"]
  iso-27001-2022: ["A.8.25", "A.5.23", "A.8.3"]
  eu-ai-act-2024: ["Art.13", "Art.15"]
  nist-ai-rmf-1.0: ["GOVERN-1", "MAP-1"]
  soc2-type2: ["CC6.1", "CC6.6"]

references:
