id: "credential-exposure/specialized-credentials/enterprise-sase-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Specialized Credential Access"
category_id: "2.29"
name: "Enterprise SASE/SSE Credential Access"
risk_level: "high"

abstract: |
  Accessing authentication token files used by enterprise SASE (Secure Access
  Service Edge) and SSE (Security Service Edge) platforms such as Netskope.
  These tokens grant API-level access to network security policy configurations,
  cloud application visibility, and DLP enforcement rules.

explanation: |
  Enterprise SASE/SSE platforms sit between users and the internet, enforcing
  zero-trust network access, DLP policies, and cloud application security. Client
  authentication tokens stored on developer workstations provide API access to
  the platform's management plane:

  - `~/.netskopetoken` — Netskope client authentication token. The Netskope
    client stores this token after enrollment. It authenticates the device to
    the Netskope tenant and can be used to query the Netskope REST API, which
    exposes network policy configurations, DLP rules, cloud app audit logs,
    and user activity data. An attacker who reads this token can:
    - Identify and disable DLP policies protecting sensitive data exfiltration
    - Access cloud application visibility logs to enumerate SaaS usage
    - Pivot to connected SaaS integrations via OAuth app access
    - Bypass zero-trust network access controls for the enrolled device

  Unlike browser cookies or session tokens, SASE tokens are long-lived and
  often not rotated frequently. A compromised token may persist for months
  without detection.

recommendation: |
  - Block MCP tool read access to SASE/SSE token files before they can be
    exfiltrated.
  - Rotate Netskope enrollment tokens regularly and monitor for API access
    from unexpected IP addresses.
  - Apply file system ACLs to restrict SASE token files to the owning user
    process only (chmod 600).
  - Audit any process accessing `~/.netskopetoken` outside of the official
    Netskope client binary.

examples:
  bad:
    - "read_file(path='~/.netskopetoken') — exposes Netskope tenant auth token"
    - "cat_file(path='/home/user/.netskopetoken') — reads SASE enrollment credential"
  good:
    - "MCP proxy blocks read access to ~/.netskopetoken"
    - "read_file(path='/workspace/docs/netskope-setup.md') — documentation file, not a credential"

compliance:
