id: "credential-exposure/cryptocurrency/monero-wallet-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cryptocurrency Wallets & Keys"
category_id: "2.34"
name: "Monero Wallet Access"
risk_level: "critical"

abstract: |
  Access to Monero wallet files exposes encrypted keys for a privacy-focused
  cryptocurrency whose transactions are untraceable, making fund theft especially
  attractive to attackers and forensically unrecoverable.

explanation: |
  Monero (XMR) wallets are stored as `.keys` files (encrypted with the wallet
  password) alongside cache files in `~/.bitmonero/` or custom wallet directories.
  The wallet contains the private spend key and view key. Exfiltrating wallet
  files enables:
  - Offline brute-force attacks against the wallet encryption password
  - Recovery of the spend key to transfer all XMR funds
  - Use of the view key to monitor all incoming/outgoing transactions
    (breaking Monero's privacy for the wallet owner)

  Monero's privacy features make stolen XMR extremely difficult to trace or
  recover — there is no blockchain analysis service that can track Monero
  transactions. This makes XMR theft even more attractive than Bitcoin theft.
  Combined with Monero's ring signatures, stealth addresses, and RingCT,
  exfiltrated funds become effectively unrecoverable.

recommendation: |
  - Block MCP tool access to `~/.bitmonero/` and `*.keys` wallet files.
  - Use cold storage or hardware wallets for valuable XMR holdings.
  - Never store wallet files in project directories accessible by AI agents.
  - Keep wallet passwords strong and unique.

examples:
  bad:
    - "cat ~/.bitmonero/wallet/mywallet.keys"
    - "ls ~/.bitmonero/"
    - "read_file({'path': '/home/user/.bitmonero/stagenet/wallet/wallet.keys'})"
  good:
    - "monero-wallet-cli --version"
    - "cat ~/monero-donation-address.txt"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["8.4"]

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-monero-wallet"]
