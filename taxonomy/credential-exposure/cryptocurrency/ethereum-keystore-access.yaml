id: "credential-exposure/cryptocurrency/ethereum-keystore-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cryptocurrency Wallets & Keys"
category_id: "2.34"
name: "Ethereum Keystore Access"
risk_level: "critical"

abstract: |
  Access to Ethereum keystore directories exposes JSON-encrypted private keys,
  enabling offline password cracking and theft of ETH and ERC-20 token holdings.

explanation: |
  Ethereum stores private keys as password-encrypted JSON files in
  `~/.ethereum/keystore/` (format: `UTC--<timestamp>--<address>`). These
  files use the Web3 Secret Storage Definition with PBKDF2 or scrypt key
  derivation. Exfiltrating keystore files enables attackers to:
  - Perform offline dictionary attacks against the key encryption password
  - Recover the plaintext private key to sign arbitrary transactions
  - Drain the wallet of ETH, ERC-20, ERC-721 (NFT), and other token holdings
  - Access any dApp or DeFi position controlled by the compromised key

  The damage extends beyond direct wallet contents — DeFi positions, staking
  contracts, and on-chain governance votes may all be controlled by the key.

recommendation: |
  - Block MCP tool access to `~/.ethereum/keystore/` and subdirectories.
  - Use hardware wallets or MPC custody solutions for valuable accounts.
  - Avoid storing keystore files in accessible project directories.
  - Monitor file access to Ethereum data directories.

examples:
  bad:
    - "cat ~/.ethereum/keystore/UTC--2024-01-01T00-00-00Z--abc123"
    - "ls ~/.ethereum/keystore/"
    - "read_file({'path': '/home/user/.ethereum/keystore/UTC--2024-01-01T00-00-00Z--abc123'})"
  good:
    - "eth --version"
    - "cat ~/ethereum-development-guide.md"

compliance:
