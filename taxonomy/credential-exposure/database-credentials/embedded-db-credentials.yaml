id: "credential-exposure/database-credentials/embedded-db-credentials"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Database Credentials"
category_id: "2.4"
name: "Credential-Bearing Database URI in MCP Tool Arguments"
risk_level: "critical"

abstract: |
  An MCP tool call receives a database connection URI with embedded plaintext
  credentials (e.g., `postgresql://admin:s3cr3t@prod.db.internal/customers`),
  exposing passwords in audit logs, MCP wire traffic, and LLM prompt context.

explanation: |
  Database connection URIs embed credentials directly in the URI scheme:
  `scheme://username:password@host:port/database`

  When AI agents pass these URIs as MCP tool arguments, the credentials appear
  in multiple high-risk locations:
  - **MCP wire traffic** — visible in JSON-RPC messages if transport is not encrypted
  - **Audit logs** — AgentShield and MCP server logs record all tool arguments
  - **LLM context window** — the model sees the full URI including the password
  - **IDE extension logs** — many AI IDEs log tool calls for debugging

  Affected argument conventions include:
  - `connection_string` — most MCP database tools (run_sql, query_database)
  - `dsn` — Python (SQLAlchemy), PHP, ODBC Data Source Name format
  - `database_url` — Rails (DATABASE_URL), Django (django-environ)
  - `db_url` — custom MCP tools and ORMs

  Affected database schemes: PostgreSQL, MySQL, MongoDB, Redis, MSSQL, MariaDB,
  ClickHouse, Cassandra.

  This pattern often occurs when AI agents are given a `.env` file or connection
  string from context and pass it directly to a database MCP tool without redaction.

recommendation: |
  - Store database credentials in environment variables; pass only `$DATABASE_URL`
    references (not literal URIs) to MCP tools.
  - Configure MCP tools to accept named parameters (host, port, user, password)
    rather than URI strings.
  - Use short-lived database credentials (IAM authentication for RDS, cloud SQL)
    to limit exposure window.
  - Block MCP tool calls containing credential-bearing URIs at the gateway layer.
  - Scrub connection strings from audit logs and prompt context.

examples:
  bad:
    - "run_sql(connection_string='postgresql://admin:s3cr3t@prod.db.internal/customers', query='SELECT * FROM users')"
    - "query_database(dsn='mysql://root:P@ssw0rd@db.internal:3306/app', sql='SHOW TABLES')"
    - "connect_db(database_url='redis://:authtoken123@cache.prod.internal:6379/0')"
  good:
    - "run_sql(connection_string='postgresql://localhost/dev', query='SELECT 1')"
    - "run_sql(connection_string='host=localhost dbname=mydb user=myuser', query='SELECT 1')"
    - "connect_db(db_url='mongodb://localhost/myapp')"

