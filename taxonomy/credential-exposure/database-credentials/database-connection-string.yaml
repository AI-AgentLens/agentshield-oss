id: "credential-exposure/database-credentials/database-connection-string"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Database Credentials"
category_id: "2.4"
name: "Universal Database Connection String Access"
risk_level: "critical"

abstract: |
  Access to universal SQL client configuration files (usql, dbmate, etc.) that
  store database connection strings with embedded credentials, granting immediate
  access to multiple database engines from a single credential file.

explanation: |
  Universal SQL clients (usql, dbmate, sql-migrate) store connection strings in
  configuration files that embed credentials directly:
  - `~/.usql/usqlrc` — usql configuration with DSN connection strings
    (e.g., `postgres://user:password@host/db`, `mysql://user:pass@host/db`)
  - `~/.config/dbmate/.env` or project-level `.dbmate.env` files

  These files are particularly dangerous because:
  - A single file grants access to multiple databases across different engines
    (PostgreSQL, MySQL, SQLite, MSSQL, Oracle, Redshift, BigQuery, Snowflake)
  - Connection strings include hostname, port, username, password, and database
    name — everything needed for immediate database access
  - Universal clients often store production credentials alongside dev/staging

  An AI agent reading these files can extract connection strings and use them
  to exfiltrate database contents, modify production data, or establish
  persistence through database triggers.

recommendation: |
  - Block all reads of universal SQL client config files (~/.usql/usqlrc, dbmate
    config files).
  - Store database credentials in a secrets manager, not plaintext config files.
  - Use environment variables for connection strings rather than config files
    when working with AI agents.
  - Audit any access to files matching `*usqlrc`, `*dbmate*`, or containing
    connection string patterns.

examples:
  bad:
    - "read_file(path='/home/user/.usql/usqlrc')"
    - "cat ~/.usql/usqlrc"
    - "read_file(path='/home/user/.config/dbmate/.env')"
  good:
    - "read_file(path='/workspace/docs/pgcli-setup.md')"
    - "cat /workspace/src/app/config.yaml"

compliance:
  owasp-llm-2025: ["LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.12"]
  eu-ai-act-2024: ["Art.13"]
  soc2-type2: ["CC6.1", "CC6.3"]
  iso-42001-2023: ["A.8.4"]

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312", "CWE-522"]
  external:
    - title: "MITRE ATT&CK: Unsecured Credentials: Credentials in Files"
      url: "https://attack.mitre.org/techniques/T1552/001/"
    - title: "usql: Universal command-line interface for SQL databases"
      url: "https://github.com/xo/usql"

analyzers: ["mcp", "regex"]
related_rules: ["mcp-sec-block-usql-config"]
