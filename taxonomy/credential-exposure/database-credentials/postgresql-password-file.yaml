id: "credential-exposure/database-credentials/postgresql-password-file"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Database Credentials"
category_id: "2.4"
name: "PostgreSQL Password File Access"
risk_level: "critical"

abstract: |
  Access to the PostgreSQL password file (~/.pgpass) exposes database credentials
  for all configured PostgreSQL servers, enabling immediate plaintext authentication
  without a password prompt.

explanation: |
  PostgreSQL clients automatically read `~/.pgpass` (or `%APPDATA%\postgresql\pgpass.conf`
  on Windows) for passwordless authentication. The file format is:
  ```
  hostname:port:database:username:password
  ```

  Wildcards (`*`) are supported, so a typical entry like `*:5432:*:app_user:s3cr3t`
  grants access to all PostgreSQL instances accessible to the user. This file is
  required to have mode 0600 on Unix, but an agent with read access can extract
  all credentials regardless.

  Access to `~/.pgpass` can expose credentials to production databases, staging
  environments, and internal analytics databases in a single read.

recommendation: |
  - Block read access to `~/.pgpass` via MCP and shell rules.
  - Use `pg_service.conf` with IAM or certificate authentication instead of
    password files for agent environments.
  - Rotate PostgreSQL credentials if `~/.pgpass` is accessed unexpectedly.

examples:
  bad:
    - "cat ~/.pgpass"
    - "read_file path=~/.pgpass"
  good:
    - "psql --host=db --username=app_user"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.9", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["A.3.3"]

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-pgpass"]
