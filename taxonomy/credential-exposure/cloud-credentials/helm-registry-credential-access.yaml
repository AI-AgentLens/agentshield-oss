id: "credential-exposure/cloud-credentials/helm-registry-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Helm Registry Credential Access"
risk_level: "high"

abstract: |
  Access to Helm registry credential files exposes OCI registry authentication
  tokens and passwords used to pull private Helm charts and container images,
  potentially enabling supply chain attacks or sensitive chart exfiltration.

explanation: |
  Helm stores registry credentials (for OCI registries like ECR, GCR, Artifact Registry)
  in local config files, typically at:
  - `~/.config/helm/registry/config.json` — OCI registry auth tokens
  - `~/.helm/repository/repositories.yaml` — chart repository credentials

  These credentials may include:
  - Cloud provider short-lived tokens (ECR, GCR, ACR) granting pull/push to registries
  - Username/password for private Helm chart repositories
  - JWT tokens for authenticated Kubernetes package registries

  A compromised Helm credential can allow an attacker to:
  - Pull proprietary/private Helm charts and inspect their secrets
  - Push malicious chart versions to the registry (supply chain injection)
  - Access any container image stored in the same OCI registry

recommendation: |
  - Block read and write access to Helm registry config files in agent tool execution.
  - Use short-lived OIDC-based credentials rather than stored registry tokens.
  - Rotate Helm registry credentials after any potential exposure.
  - Monitor access to `~/.config/helm/` directory.

examples:
  bad:
    - "cat ~/.config/helm/registry/config.json"
    - "cat ~/.helm/repository/repositories.yaml"
  good:
    - "helm repo list"
    - "helm search repo stable/nginx"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552.001", "T1195.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-helm-registry-access"]
