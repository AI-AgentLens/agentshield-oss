id: "credential-exposure/cloud-credentials/kubernetes-service-account-token"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Kubernetes In-Pod Service Account Token"
risk_level: "critical"

abstract: |
  Access to the Kubernetes in-Pod service account token and CA certificate
  (`/var/run/secrets/kubernetes.io/serviceaccount/`) exposes credentials that
  allow direct API server calls within the cluster, enabling privilege escalation,
  lateral movement, and full cluster compromise depending on the RBAC bindings.

explanation: |
  Every Kubernetes Pod automatically has a service account token mounted at
  `/var/run/secrets/kubernetes.io/serviceaccount/token` unless explicitly disabled.
  This JWT token, signed by the cluster CA, can authenticate to the Kubernetes
  API server using `Authorization: Bearer <token>`.

  The accompanying CA certificate (`ca.crt`) and namespace file (`namespace`) allow
  constructing a fully authenticated kubectl or raw HTTPS call to the API server
  without any additional credentials.

  Attack paths:
  1. Read token + ca.crt → call kube-apiserver with `kubectl --token=<token>` or curl
  2. Enumerate RBAC bindings to identify over-privileged service accounts
  3. If the service account has broad RBAC roles → full cluster control
  4. Access Secrets API to harvest other credentials (DB passwords, TLS certs, API keys)
  5. Use pod exec/create permissions to move laterally to other workloads

  In AI agent environments, the agent process runs inside a Pod. Reading the service
  account token allows the agent to act as a Kubernetes principal — bypassing the
  intended isolation boundary between the agent and cluster infrastructure.

recommendation: |
  - Block read access to `/var/run/secrets/kubernetes.io/serviceaccount/` in agent sandboxes.
  - Use `automountServiceAccountToken: false` in Pod specs for AI agent workloads that
    don't need cluster API access.
  - Apply minimal RBAC: if a service account must exist, scope it to only necessary verbs/resources.
  - Use Kubernetes NetworkPolicy to restrict outbound API server access from agent Pods.
  - Monitor service account token usage via audit logs — alert on tokens used outside their Pod.
  - Rotate service account tokens frequently using projected volumes with short TTLs.

examples:
  bad:
    - "cat /var/run/secrets/kubernetes.io/serviceaccount/token"
    - "cat /run/secrets/kubernetes.io/serviceaccount/token"
    - "cat /var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
  good:
    - "kubectl config view"
    - "kubectl get pods -n my-namespace"

compliance:
