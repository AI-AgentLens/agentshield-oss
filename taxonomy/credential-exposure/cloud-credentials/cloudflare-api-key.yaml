id: "credential-exposure/cloud-credentials/cloudflare-api-key"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Cloudflare API Key Access"
risk_level: "high"

abstract: |
  Access to Cloudflare credentials stored in ~/.cloudflared/ exposes DNS records,
  CDN configuration, SSL certificates, and Cloudflare Tunnel tokens, potentially
  allowing DNS hijacking, traffic interception, and bypassing of Cloudflare's
  security features for protected domains.

explanation: |
  The Cloudflare CLI tool (`cloudflared`) stores credentials and tunnel configuration
  in `~/.cloudflared/`:
  - `~/.cloudflared/cert.pem` — Cloudflare origin certificate (login credential)
  - `~/.cloudflared/*.json` — Tunnel credential files containing tunnel tokens
  - `~/.cloudflared/config.yml` — Tunnel routing configuration

  Cloudflare controls DNS resolution, DDoS protection, WAF rules, and tunnel routing
  for protected domains. An attacker with Cloudflare credentials can:
  - Modify DNS records to redirect traffic to attacker-controlled infrastructure
  - Disable WAF rules or DDoS protection for targeted attacks
  - Expose internal services by modifying tunnel routing
  - Intercept HTTPS traffic via SSL certificate manipulation

  Cloudflare tunnels (formerly Argo Tunnels) are particularly sensitive as they
  expose internal services to the internet with no firewall, relying entirely on
  the tunnel credential for access control.

recommendation: |
  - Block read access to `~/.cloudflared/` directory contents.
  - Use API tokens with minimal scopes rather than global API keys.
  - Rotate tunnel credentials immediately if exposure is suspected.
  - Restrict tunnel credentials to specific Cloudflare accounts and zones.

examples:
  bad:
    - "cat ~/.cloudflared/cert.pem"
    - "ls ~/.cloudflared/ && cat ~/.cloudflared/*.json"
    - "find ~/.cloudflared -type f | xargs cat"
  good:
    - "cloudflared tunnel list"
    - "cloudflared --version"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "structural"]
related_rules: []
