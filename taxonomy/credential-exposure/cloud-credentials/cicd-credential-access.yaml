id: "credential-exposure/cloud-credentials/cicd-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "CI/CD Credential Access"
risk_level: "high"

abstract: |
  Access to CI/CD platform configuration files and directories exposes pipeline
  authentication tokens that can be used to hijack build pipelines, access
  private repositories, and deploy malicious code.

explanation: |
  Modern CI/CD platforms store authentication credentials locally for CLI access:

  - **CircleCI** (`~/.circleci/`): Contains `cli.yml` with API tokens granting
    full API access to all projects, pipelines, and environment variables.
  - **Travis CI** (`.travis.yml`, `~/.travis/`): Build configuration may embed
    encrypted secrets; Travis CLI stores tokens for API access.
  - **GitHub Actions** (`GITHUB_TOKEN`, `GH_TOKEN` env vars): In-process tokens
    with broad repository permissions — reading them from env enables privilege
    escalation within CI workflows.

  A compromised CI/CD token can allow an attacker to:
  - Trigger arbitrary pipeline runs with injected build steps
  - Read all environment variable secrets configured in the CI platform
  - Access private source code repositories
  - Deploy malicious artifacts to production environments

recommendation: |
  - Block all read access to CI/CD credential configuration files.
  - Monitor environment variable dumps that may capture CI tokens.
  - Use short-lived OIDC tokens rather than static API tokens.
  - Rotate all CI/CD tokens immediately after any suspected exposure.

examples:
  bad:
    - "cat ~/.circleci/cli.yml"
    - "cat ~/.travis.yml"
  good:
    - "circleci diagnostic"
    - "gh workflow list"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1552.001", "T1552.004"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["sec-block-cicd-credential-read"]
