id: "credential-exposure/cloud-credentials/azure-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Azure Credential Access"
risk_level: "critical"

abstract: |
  Access to Azure CLI credential files (~/.azure/) exposes cached authentication
  tokens and service principal credentials, granting full programmatic access to
  Azure subscriptions and resources.

explanation: |
  The Azure CLI stores authentication state in `~/.azure/`:
  - `~/.azure/accessTokens.json` — cached OAuth2 access tokens
  - `~/.azure/msal_token_cache.json` — MSAL token cache (newer CLI versions)
  - `~/.azure/azureProfile.json` — subscription and tenant context
  - `~/.azure/clouds.config` — Azure cloud environment config

  These tokens are typically valid for 1-hour sessions with refresh tokens that
  can last days. An agent reading these files gains the equivalent of `az login`
  access, allowing subscription enumeration, Key Vault secret reads, storage
  account access, and VM control.

recommendation: |
  - Block read access to `~/.azure/` via MCP and shell rules.
  - Use Managed Identity or service principals with short-lived tokens in agent
    environments rather than user CLI credentials.
  - Monitor for unexpected Azure CLI token cache reads.

examples:
  bad:
    - "cat ~/.azure/accessTokens.json"
    - "read_file path=~/.azure/msal_token_cache.json"
  good:
    - "az account show"
    - "az group list --output table"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.23", "A.8.3", "A.5.34", "A.8.11"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1552.005"]
  cwe: ["CWE-312"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-azure-access"]
