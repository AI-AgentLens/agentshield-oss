id: "credential-exposure/cloud-credentials/container-registry-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Container Registry Credential Access"
risk_level: "high"

abstract: |
  Access to container registry credential files (~/.docker/config.json) exposes
  authentication tokens for Docker Hub, ECR, GCR, ACR, and private registries,
  enabling unauthorized image pulls, pushes, and supply chain attacks.

explanation: |
  Docker stores registry authentication in `~/.docker/config.json`. This file may
  contain:
  - Base64-encoded username/password pairs for Docker Hub and private registries
  - AWS ECR credential helper tokens for Elastic Container Registry
  - GCR credential helper tokens for Google Container Registry
  - Azure ACR access tokens

  Exfiltrating this file grants the ability to pull private images (exposing
  proprietary code and data), push malicious images (supply chain compromise),
  or enumerate private registries to map internal infrastructure.

recommendation: |
  - Block read access to `~/.docker/config.json` via MCP and shell rules.
  - Use short-lived credential helpers (`docker-credential-ecr-login`) rather
    than stored base64 credentials.
  - Rotate registry credentials immediately if agent access is detected.

examples:
  bad:
    - "cat ~/.docker/config.json"
    - "read_file path=~/.docker/config.json"
  good:
    - "docker images ls"
    - "docker ps"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.9", "A.5.34"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1552.001", "T1195.002"]
  cwe: ["CWE-312", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-docker-config"]
