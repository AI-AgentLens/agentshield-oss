id: "credential-exposure/cloud-credentials/cloud-storage-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Cloud Storage Credential Access"
risk_level: "high"

abstract: |
  Access to cloud storage client configuration files exposes authentication
  credentials for S3-compatible storage, Google Cloud Storage, and other
  object storage services, enabling bulk data exfiltration.

explanation: |
  Cloud storage CLI tools store authentication credentials in configuration files:

  - **s3cmd** (`~/.s3cfg`): Contains AWS access key ID, secret access key,
    and endpoint configuration for S3-compatible storage. Full account access.
  - **rclone** (`~/.config/rclone/rclone.conf`): Multi-cloud storage manager
    storing credentials for AWS S3, GCS, Azure Blob, Dropbox, and 40+ providers.
    A single rclone config file may hold credentials for an entire organization's
    cloud storage infrastructure.

  Compromising these credentials enables:
  - Bulk download of all files from configured storage buckets
  - Upload of malicious files to production storage
  - Access to backup archives containing additional credentials
  - Enumeration of storage bucket structure for further targeting

recommendation: |
  - Block read access to `~/.s3cfg` and `~/.config/rclone/rclone.conf`.
  - Use IAM roles and instance profiles instead of stored access keys.
  - Scope rclone credentials to minimum required buckets.
  - Rotate storage credentials after any suspected exposure.

examples:
  bad:
    - "cat ~/.s3cfg"
    - "cat ~/.config/rclone/rclone.conf"
  good:
    - "s3cmd ls s3://my-bucket"
    - "rclone ls myremote:bucket"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552.001", "T1530"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["sec-block-cloud-storage-creds"]
