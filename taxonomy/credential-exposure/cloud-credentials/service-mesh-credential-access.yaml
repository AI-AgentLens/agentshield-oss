id: "credential-exposure/cloud-credentials/service-mesh-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Service Mesh Credential Access"
risk_level: "critical"

abstract: |
  Access to service mesh identity credentials (Istio mTLS certs, Linkerd identity keys,
  SPIFFE/SPIRE SVIDs, kubelet PKI) exposes cryptographic material used for workload-to-workload
  authentication. Compromising these credentials enables lateral movement across the service
  mesh by impersonating trusted workloads.

explanation: |
  Modern service meshes (Istio, Linkerd, SPIFFE/SPIRE) use mutual TLS (mTLS) to authenticate
  workloads. Each workload receives a short-lived private key and certificate (SVID) issued by
  the mesh's certificate authority. These credentials are typically injected into the workload
  container at runtime and stored in well-known paths:

  - /etc/istio/proxy/ — Istio sidecar proxy mTLS key and certificate chain. Exfiltrating
    key.pem allows the attacker to impersonate any service in the mesh.
  - /var/run/linkerd/identity/ — Linkerd proxy identity private key and trust anchor cert.
    Used for mutual TLS between all Linkerd-injected workloads.
  - /run/spire/sockets/ — SPIRE agent workload API socket. Accessing this socket enables
    fetching SVIDs for any registered workload without the private key.
  - /opt/spire/data/ — SPIRE agent/server internal data including cached SVIDs.
  - /var/lib/kubelet/pki/ — Kubelet serving certificate and client key. Enables impersonating
    the kubelet to access pod secrets and exec into containers without API server checks.

  Attack paths:
  1. Read Istio/Linkerd private key → impersonate any service mesh workload → intercept or
     inject traffic between services
  2. Access SPIRE socket → request SVID for any workload → bypass zero-trust mTLS controls
  3. Read kubelet private key → forge kubelet identity → call kubelet API directly to exec
     in containers, exfiltrate secrets, or modify running workloads

recommendation: |
  - Block all AI agent access to /etc/istio/proxy/, /var/run/linkerd/identity/,
    /run/spire/, /opt/spire/data/, and /var/lib/kubelet/pki/.
  - Run AI agents in minimal-privilege containers without host filesystem mounts.
  - Use admission controllers (OPA/Gatekeeper) to prevent HostPath volume mounts.
  - Enable Kubernetes audit logging for kubelet API access.
  - Rotate service mesh certificates immediately if exposure is suspected.
  - Use SPIFFE/SPIRE workload attestation to restrict which workloads can obtain SVIDs.

examples:
  bad:
    - "cat /etc/istio/proxy/key.pem"
    - "cat /var/run/linkerd/identity/end-entity/key.p8"
    - "ls /run/spire/sockets/"
    - "cat /var/lib/kubelet/pki/kubelet.key"
  good:
    - "kubectl get pods -n istio-system"
    - "linkerd check"
    - "spire-agent healthcheck"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.23", "A.8.3", "A.8.4", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "CC6.3"]

references:
  mitre_attack: ["T1552.004", "T1552.003"]
  cwe: ["CWE-312", "CWE-522", "CWE-732"]
  external:
    - title: "Istio Security — Certificate Management"
      url: "https://istio.io/latest/docs/concepts/security/#pki"
    - title: "Linkerd Identity — mTLS"
      url: "https://linkerd.io/2.x/features/automatic-mtls/"
    - title: "SPIFFE — Secure Production Identity Framework"
      url: "https://spiffe.io/docs/latest/spiffe-about/overview/"
