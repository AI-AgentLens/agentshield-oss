    - title: "MITRE ATT&CK — Unsecured Credentials: Private Keys (T1552.004)"
      url: "https://attack.mitre.org/techniques/T1552/004/"

analyzers: ["regex", "structural", "mcp"]
related_rules: ["mcp-sec-block-k8s-pki-keys", "mcp-sec-block-k8s-service-account-token"]
