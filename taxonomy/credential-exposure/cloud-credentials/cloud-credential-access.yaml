id: "credential-exposure/cloud-credentials/cloud-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Cloud Credential Access"
risk_level: "critical"

abstract: |
  Access to cloud provider credential directories (~/.aws, ~/.config/gcloud) exposes
  full cloud account access, potentially granting control over all resources, data
  stores, and services in the cloud account.

explanation: |
  Cloud provider CLI tools store long-lived credentials in well-known directories:
  - `~/.aws/credentials` — AWS access key ID and secret access key
  - `~/.aws/config` — AWS named profiles and role assumptions
  - `~/.config/gcloud/credentials.db` — GCP OAuth tokens
  - `~/.config/gcloud/application_default_credentials.json` — GCP ADC
  - `~/.azure/accessTokens.json` — Azure CLI cached tokens

  These credentials typically grant broad permissions across the cloud account.
  An agent reading these files can immediately assume any IAM role the user has
  access to, access all S3 buckets, read all Secrets Manager secrets, or enumerate
  the entire cloud infrastructure.

recommendation: |
  - Block read access to `~/.aws/`, `~/.config/gcloud/`, and `~/.azure/` directories.
  - Use IAM roles and instance profiles rather than static key files for agent environments.
  - Rotate cloud credentials immediately if agent access is detected.
  - Add MCP block rules for cloud credential file paths.

examples:
  bad:
    - "cat ~/.aws/credentials"
    - "cat ~/.config/gcloud/application_default_credentials.json"
    - "cat ~/.azure/accessTokens.json"
  good:
    - "aws sts get-caller-identity"
    - "gcloud config get-value project"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.5.23", "A.8.3", "A.5.34", "A.8.11"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.8.4"]

references:
  mitre_attack: ["T1552.005"]
  cwe: ["CWE-312"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-aws-access", "mcp-sec-block-gcloud-access", "ne-audit-aws-cli"]
