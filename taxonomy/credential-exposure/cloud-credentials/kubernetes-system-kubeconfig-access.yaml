id: "credential-exposure/cloud-credentials/kubernetes-system-kubeconfig-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Kubernetes System Kubeconfig Access"
risk_level: "critical"

abstract: |
  Access to Kubernetes system kubeconfig files (/etc/kubernetes/*.conf) exposes
  embedded high-privilege Bearer tokens for system components. Exfiltrating
  admin.conf, controller-manager.conf, or scheduler.conf grants immediate
  full cluster access.

explanation: |
  Kubernetes bootstraps system components with kubeconfig files stored in
  /etc/kubernetes/. These files embed high-privilege credentials:
  - admin.conf — Contains a system:masters credential with full read/write access
    to every resource in every namespace.
  - controller-manager.conf — system:kube-controller-manager credential; can
    create/modify ServiceAccounts, update Pod specs, and escalate privileges.
  - scheduler.conf — system:kube-scheduler credential; can read all Pods and
    Nodes, enabling reconnaissance across the entire cluster.
  - super-admin.conf (kubeadm 1.29+) — Bootstrap super-admin credential that
    bypasses RBAC entirely.

  These kubeconfigs contain either:
  1. Client certificates + private keys (can be reused indefinitely until revoked)
  2. Bearer tokens (valid until rotation or certificate expiry)

  Attack paths:
  1. Read admin.conf — extract embedded token or cert — run kubectl with full privileges
  2. Access all namespace secrets — harvest application credentials, DB passwords, API keys
  3. Create persistent backdoor ServiceAccount with privileged binding
  4. Modify workload specs to inject malicious containers

  In AI agent environments, system kubeconfigs represent the highest-value credential
  target on a Kubernetes node. A single file read grants attackers the same access
  level as the cluster administrator.

recommendation: |
  - Block all access to /etc/kubernetes/*.conf for AI agent processes.
  - Restrict kubeconfig file permissions to root (0600).
  - Do not mount the host /etc/kubernetes/ path into agent containers.
  - Rotate kubeconfig credentials immediately if exposure is confirmed.
  - Use time-limited kubeconfigs with short certificate expiry for system components.
  - Monitor access to /etc/kubernetes/ via auditd, Falco, or eBPF-based tools.

examples:
  bad:
    - "cat /etc/kubernetes/admin.conf"
    - "kubectl --kubeconfig=/etc/kubernetes/admin.conf get secrets -A"
    - "cp /etc/kubernetes/admin.conf ~/.kube/config"
    - "cat /etc/kubernetes/controller-manager.conf"
  good:
    - "kubectl config view --minify"
    - "kubectl get pods -n kube-system"

