id: "credential-exposure/cloud-credentials/terraform-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Credentials"
category_id: "2.6"
name: "Terraform Credential Access"
risk_level: "high"

abstract: |
  Access to Terraform credential files exposes authentication tokens for the
  Terraform Cloud/Enterprise registry, enabling an attacker to manage cloud
  infrastructure as code and access all associated cloud provider credentials.

explanation: |
  Terraform stores authentication credentials in `~/.terraform.d/credentials.tfrc.json`.
  This file contains:

  - **Terraform Cloud/Enterprise tokens**: API tokens with permissions to read and
    modify workspaces, trigger runs, and access all workspace state files
  - **State file access**: Terraform state files (`.tfstate`) contain all
    provisioned resource IDs, and often include sensitive outputs like database
    passwords, API keys, and TLS private keys written by providers

  Note: `~/.terraform.d/**` is covered by AgentShield's `protected_paths` default,
  which blocks path-based access via the structural analyzer. This taxonomy entry
  documents the specific threat and enables explicit regex rules that catch
  access patterns not covered by path evaluation.

recommendation: |
  - Block read access to `~/.terraform.d/credentials.tfrc.json`.
  - Use environment variables (`TF_TOKEN_*`) instead of file-based credentials.
  - Apply workspace-scoped tokens instead of organization-wide tokens.
  - Rotate Terraform Cloud tokens after any suspected exposure.

examples:
  bad:
    - "cat ~/.terraform.d/credentials.tfrc.json"
    - "cp ~/.terraform.d/credentials.tfrc.json /tmp/"
  good:
    - "terraform plan"
    - "terraform workspace list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["sec-block-terraform-credentials", "sec-block-tfstate-read"]
