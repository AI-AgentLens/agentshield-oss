id: "credential-exposure/version-control/git-credential-extract"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Version Control Credential Access"
category_id: "2.5"
name: "Git Credential Store Extraction"
risk_level: "high"

abstract: |
  An AI agent reads the Git credential store or helper output to extract
  stored usernames and passwords/tokens for remote repositories.

explanation: |
  Git stores credentials in plaintext in `~/.git-credentials` when using the
  `store` credential helper, or delegates to OS keychains with other helpers.
  An AI agent can extract these credentials via:
  - Reading `~/.git-credentials` directly
  - Running `git credential fill` with a crafted input to trigger the helper
  - Reading credential helper configurations to identify storage locations

  These credentials typically include GitHub Personal Access Tokens, GitLab
  tokens, or username/password combinations with repository access.

recommendation: |
  - Block direct reads of `~/.git-credentials` from AI agents.
  - Prefer short-lived GitHub tokens scoped to specific repositories.
  - Use SSH keys instead of HTTPS credentials for Git authentication.
  - Monitor git credential helper invocations in audit logs.

examples:
  bad:
    - "cat ~/.git-credentials"
    - "git credential fill <<< 'protocol=https\nhost=github.com'"
    - "git config --global credential.helper store && cat ~/.git-credentials"
  good:
    - "git config --list | grep credential.helper"
    - "ssh -T git@github.com"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.4", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.6"]

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-522", "CWE-312"]
  external:
    - title: "MITRE ATT&CK: Credentials In Files"
      url: "https://attack.mitre.org/techniques/T1552/001/"

analyzers: ["regex", "dataflow"]
related_rules: ["ts-block-git-credentials"]
