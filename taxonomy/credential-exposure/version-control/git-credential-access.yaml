id: "credential-exposure/version-control/git-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Version Control"
category_id: "2.5"
name: "Git Credential Access"
risk_level: "high"

abstract: |
  Accessing git credentials can expose authentication tokens stored in the git
  credential helper, providing access to all repositories the user is authorized
  to access on platforms like GitHub, GitLab, and Bitbucket.

explanation: |
  Git credential helpers store authentication tokens persistently so users don't
  need to re-enter them. Common storage locations include:
  - `~/.git-credentials` — plaintext HTTPS credentials file
  - macOS Keychain (`git credential-osxkeychain get`)
  - GNOME Keyring (`git credential-gnome-keyring`)
  - Windows Credential Manager

  An agent that reads `~/.git-credentials` or invokes `git credential fill` can
  extract GitHub/GitLab personal access tokens that typically have broad repository
  access. These tokens can then be used to clone private repositories, push malicious
  code, or access organization resources.

recommendation: |
  - Block read access to `~/.git-credentials` in agent tool execution.
  - Block invocation of `git credential fill` and `git credential get`.
  - Use fine-grained personal access tokens with minimal scopes for agent git operations.
  - Monitor for unexpected git credential helper invocations.

examples:
  bad:
    - "cat ~/.git-credentials"
    - "git credential fill <<< 'protocol=https\nhost=github.com'"
    - "git config --global credential.helper store && git credential approve"
  good:
    - "git config --list --show-origin"
    - "git remote -v"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312"]

analyzers: ["regex", "structural"]
related_rules: ["sec-audit-git-credential", "mcp-sec-block-git-credentials"]
