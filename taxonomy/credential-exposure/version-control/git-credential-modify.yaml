id: "credential-exposure/version-control/git-credential-modify"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Version Control Credential Access"
category_id: "2.5"
name: "Git Credential Configuration Modification"
risk_level: "high"

abstract: |
  An AI agent modifies Git credential configuration to redirect authentication
  to an attacker-controlled helper or store credentials in a more accessible
  location, enabling future credential theft.

explanation: |
  Git's credential system can be configured to use arbitrary helpers via
  `git config credential.helper`. An AI agent that modifies this config can:
  - Replace a secure keychain helper with plaintext file storage
  - Set a malicious credential helper script that logs credentials
  - Change the credential store path to a world-readable location

  This is a persistence technique — the modification persists beyond the
  current session and will capture credentials for all future git operations.

recommendation: |
  - Block all writes to Git credential configuration from AI agents.
  - Monitor changes to `~/.gitconfig` and `.git/config` for credential sections.
  - Use repository-scoped tokens instead of global credential helpers.
  - Audit `git config --global credential.helper` periodically.

examples:
  bad:
    - "git config --global credential.helper store"
    - "git config --global credential.helper '/tmp/log-creds.sh'"
    - "echo '[credential]\n\thelper = store' >> ~/.gitconfig"
  good:
    - "git config --list | grep credential"
    - "git config --global credential.helper osxkeychain"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.4", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-2"]
  soc2-type2: ["CC6.1", "CC6.6"]
  iso-42001-2023: ["A.9.4"]

references:
  mitre_attack: ["T1556"]
  cwe: ["CWE-522", "CWE-306"]
  external:
    - title: "MITRE ATT&CK: Modify Authentication Process"
      url: "https://attack.mitre.org/techniques/T1556/"

analyzers: ["regex", "structural"]
related_rules: ["ts-block-git-credential-modify"]
