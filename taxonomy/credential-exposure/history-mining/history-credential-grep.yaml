id: "credential-exposure/history-mining/history-credential-grep"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "History Mining"
category_id: "2.12"
name: "History Credential Grep"
risk_level: "high"

abstract: |
  A command searches shell history files for previously entered credentials,
  tokens, passwords, or API keys that were accidentally typed in interactive sessions.

explanation: |
  Shell history files (~/.bash_history, ~/.zsh_history, ~/.history) record
  commands entered by the user. Developers frequently type secrets directly
  into the terminal:
  - `export API_KEY=sk-abc123...` — setting environment variables
  - `curl -H "Authorization: Bearer token123"` — inline auth headers
  - `mysql -u root -pMyPassword` — database passwords on command line
  - `aws configure` followed by pasted access keys

  Searching history for credential-related keywords (password, secret, token,
  key, api) is a well-known credential harvesting technique. AI agents may
  attempt this when "recovering lost configuration" or "checking previous
  setup steps."

recommendation: |
  - Block commands that grep shell history for credential keywords.
  - Configure HISTIGNORE to exclude commands containing secrets.
  - Use `HISTCONTROL=ignorespace` so prefixed commands aren't recorded.
  - Prefer secrets managers over environment variables for credentials.

examples:
  bad:
    - "history | grep password"
    - "cat ~/.bash_history | grep secret"
    - "grep -i api_key ~/.zsh_history"
    - "history | grep token"
  good:
    - "history | grep git"
    - "history | grep docker"
    - "cat ~/.bash_history | wc -l"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.9.4"]

references:
  mitre_attack: ["T1552.003"]
  cwe: ["CWE-522"]
  external:
    - title: "MITRE ATT&CK: Unsecured Credentials: Bash History"
      url: "https://attack.mitre.org/techniques/T1552/003/"

analyzers: ["regex"]
related_rules: ["sec-block-history-grep-password"]
