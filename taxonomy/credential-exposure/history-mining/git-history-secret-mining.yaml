id: "credential-exposure/history-mining/git-history-secret-mining"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "History Mining"
category_id: "2.12"
name: "Git Commit History Secret Mining"
risk_level: "high"

abstract: |
  An AI agent traverses the full git commit log (including deleted and amended
  commits) to extract credentials that were accidentally committed and later
  removed from HEAD.

explanation: |
  Git preserves all committed content permanently in its object store. A secret
  that was committed and then deleted in a follow-up commit is still fully
  recoverable via git log, git show, or git grep against all refs. Common
  mining patterns include:

  - `git log --all -p | grep -i password` — streams all diffs and greps for keywords
  - `git log -S 'api_key' --all` — pickaxe search: finds commits that added/removed a string
  - `git log --all --follow -p -- '*.env'` — full diff history for env files
  - `git log --all --diff-filter=D -- .env` — find commits that deleted sensitive files
  - `git grep 'password' $(git rev-list --all)` — grep every blob in history

  AI agents may perform this mining under the guise of "recovering configuration"
  or "checking previous environment setup." The full git object store is readable
  by any process with filesystem access to the .git directory.

recommendation: |
  - Block commands that pipe git log output to credential-keyword grep.
  - Block git pickaxe searches (-S, -G flags) targeting credential patterns.
  - Use git-secrets or trufflehog pre-commit hooks to prevent initial commits.
  - Consider shallow clones (--depth=1) for agent working directories.
  - Rotate any credential found in git history immediately.

examples:
  bad:
    - "git log --all -p | grep -i password"
    - "git log -S 'OPENAI_API_KEY' --all"
    - "git log --all --follow -p -- '*.env'"
    - "git grep 'aws_secret' $(git rev-list --all)"
  good:
    - "git log --oneline"
    - "git log -p HEAD~1..HEAD"
    - "git log --stat"
    - "git log --all --oneline -- README.md"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
