id: "credential-exposure/package-registry/package-manager-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Package Registry Credentials"
category_id: "2.19"
name: "Package Manager Credential Access"
risk_level: "high"

abstract: |
  Access to package manager authentication files exposes registry tokens and
  credentials used for publishing packages, enabling supply chain attacks via
  unauthorized package publication or private package exfiltration.

explanation: |
  Package managers store registry authentication in well-known local files:
  - npm: `~/.npmrc` — auth tokens for npmjs.com and private registries
  - pip/PyPI: `~/.pypirc` — upload credentials for PyPI and private indexes
  - Cargo: `~/.cargo/credentials.toml` — crates.io publish tokens
  - RubyGems: `~/.gem/credentials` — gem push API keys
  - Maven: `~/.m2/settings.xml` — Nexus/Artifactory credentials
  - Gradle: `~/.gradle/gradle.properties` — registry credentials

  A compromised publish token enables:
  - Publishing malicious package versions to hijack existing packages
  - Accessing private package contents and source code
  - Lateral movement to CI/CD pipelines that use the same credentials

  Many organizations use these credentials in automated pipelines, making them
  high-value targets for supply chain compromise via AI agent access.

recommendation: |
  - Block read access to all package manager credential files in agent execution.
  - Use short-lived OIDC publish tokens (npm provenance, PyPI trusted publishers).
  - Rotate all publish tokens after any potential exposure.
  - Use per-package or per-pipeline scoped tokens instead of global credentials.

examples:
  bad:
    - "cat ~/.npmrc"
    - "cat ~/.pypirc"
    - "cat ~/.cargo/credentials.toml"
    - "cat ~/.gem/credentials"
  good:
    - "npm config get registry"
    - "pip config list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552.001", "T1195.001"]
  cwe: ["CWE-312", "CWE-200", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-npmrc-read", "mcp-sec-block-pypirc-read", "mcp-sec-block-cargo-credentials-read"]
