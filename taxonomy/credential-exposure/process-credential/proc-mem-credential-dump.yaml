id: "credential-exposure/process-credential/proc-mem-credential-dump"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Process Credential Access"
category_id: "2.17"
name: "Process Memory Credential Dump via /proc"
risk_level: "critical"

abstract: |
  Reading raw process memory through /proc/PID/mem or /proc/PID/maps extracts
  in-heap secrets — API keys, tokens, system prompts, and passphrases — that
  the target process holds in memory but never writes to disk.

explanation: |
  The Linux /proc pseudo-filesystem exposes raw process memory at
  `/proc/<PID>/mem` and the virtual memory map at `/proc/<PID>/maps`.
  By reading /proc/PID/maps to discover heap and stack regions, then
  seeking into /proc/PID/mem at those offsets, an attacker can extract:

  - **LLM system prompts and operator secrets** — AI agents hold their full
    context window in heap memory, including injected credentials, tool
    configurations, and proprietary instructions.
  - **In-flight API keys and tokens** — OPENAI_API_KEY, ANTHROPIC_API_KEY,
    AWS credentials, and OAuth tokens loaded into agent process memory.
  - **Database passwords and connection strings** — any secret passed at
    process start that is retained in heap.
  - **Passphrases and decryption keys** — cryptographic material held in
    memory during active operations.

  Unlike `/proc/PID/fd/` hijacking (which reads open file descriptors),
  `/proc/PID/mem` provides a raw window into the process address space —
  including strings that were never written to any file. Standard credential
  file protections (permissions on ~/.aws/credentials, ~/.ssh) provide
  no defence against this attack.

  Attack workflow:
  1. `cat /proc/1234/maps | grep heap` — locate heap region boundaries
  2. `dd if=/proc/1234/mem bs=1 skip=<heap_start> count=<heap_size>` — dump heap
  3. `strings <dump>` — extract printable strings including API keys and prompts

  This technique is particularly dangerous in container environments where an
  agent process shares a PID namespace with the host or other services, making
  cross-process memory reads feasible without privilege escalation.

recommendation: |
  - Block all read access to /proc/PID/mem and /proc/PID/maps from agent
    processes (AgentShield rule ts-block-proc-mem-read).
  - Use kernel namespaces to isolate agent PID spaces (ptrace_scope=1 minimum,
    ptrace_scope=3 for maximum isolation).
  - Prevent ptrace attach: set /proc/sys/kernel/yama/ptrace_scope to 2 or 3.
  - Zero-out secrets in memory immediately after use (avoid long-lived heap secrets).
  - In containerized deployments, avoid --pid=host and use separate PID namespaces
    for LLM agent processes.
  - Monitor for unusual reads of /proc/*/mem or /proc/*/maps via auditd rules.

examples:
  bad:
    - "strings /proc/self/mem"
    - "cat /proc/1234/maps"
    - "dd if=/proc/1234/mem bs=1 skip=0 count=1048576"
    - "xxd /proc/self/mem | grep -i 'api_key'"
    - "hexdump /proc/1234/mem | head -100"
    - "od -c /proc/self/mem | grep -i 'anthropic'"
  good:
    - "cat /proc/cpuinfo"
    - "cat /proc/meminfo"
    - "cat /proc/1234/status"

