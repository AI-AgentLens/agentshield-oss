id: "credential-exposure/container-config/container-secret-mount-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Container Configuration"
category_id: "2.8"
name: "Container Secret Mount Access"
risk_level: "critical"

abstract: |
  Access to /run/secrets/* exposes secrets injected by Docker Swarm and Kubernetes
  orchestrators. These mounts contain plaintext API keys, database passwords, and
  tokens placed there for legitimate container workloads but fully readable by any
  process — including AI agents — operating inside the container.

explanation: |
  Docker Swarm and Kubernetes mount orchestrator-managed secrets under /run/secrets/
  as plaintext files at container startup. The pattern is widely used in production:

  - Docker Swarm secrets: mounted under /run/secrets/<secret_name>
  - Kubernetes Secrets (non-env projection): mounted as files in /run/secrets/ paths
    when configured with subPath or volume mounts targeting that directory

  Contents typically include:
  - Database passwords and connection strings
  - Third-party API keys and tokens
  - TLS private keys and certificates
  - Service account credentials

  An AI agent operating inside a container can trivially read any secret in this
  directory. Unlike ~/.aws or ~/.ssh which are user-facing paths, /run/secrets/ is
  specifically designed to hold production service credentials — making exposure
  especially severe.

recommendation: |
  - Block all agent read access to /run/secrets/* via MCP policy rules.
  - Prefer environment variable injection over file mounts for AI agent contexts,
    and ensure AGENTSHIELD scopes exclude /run/secrets/ from accessible paths.
  - Audit container deployments that co-locate AI agents with production secrets.
  - Use Kubernetes projected service account tokens with short TTLs rather than
    long-lived secrets when agents need API access.

examples:
  bad:
    - "cat /run/secrets/db_password"
    - "ls /run/secrets/"
    - "read_file /run/secrets/api_key"
  good:
    - "cat /run/app/config.yaml"
    - "kubectl get secret my-secret -o yaml"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["8.4"]

references:
  mitre_attack: ["T1552.001", "T1613"]
  cwe: ["CWE-312", "CWE-732"]

analyzers: ["mcp"]
related_rules: ["mcp-sec-block-container-secrets-mount"]
