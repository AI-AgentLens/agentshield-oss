id: "credential-exposure/container-config/docker-build-credential-injection"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Container Configuration"
category_id: "2.8"
name: "Docker Build Credential Injection"
risk_level: "high"

abstract: |
  Docker build-time credential injection via --build-arg, --secret src=, or --ssh
  exposes secrets to the Docker build context, image layers, or all RUN instructions
  in the Dockerfile (including those in untrusted base images).

explanation: |
  Docker BuildKit provides three mechanisms that can unintentionally or maliciously
  expose credentials during image builds:

  1. **--build-arg credential baking**: Build arguments passed via `--build-arg` are
     stored in image metadata and visible via `docker history --no-trunc`. Even if
     the ARG is consumed only during build, it persists in the image manifest. Anyone
     with access to the image repository can extract API keys, tokens, and passwords.

     ```bash
     docker build --build-arg API_KEY=$OPENAI_API_KEY .
     docker build --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY .
     ```

  2. **--secret src= with credential files**: BuildKit's `--secret` flag mounts
     a credential file into the build context at `/run/secrets/<id>`. While this is
     safer than build args for controlled Dockerfiles, it exposes the credential to
     ALL `RUN --mount=type=secret` instructions in every layer of the build,
     including those in transitive base images. A malicious upstream base image
     can read and exfiltrate any mounted secret.

     ```bash
     docker build --secret id=aws,src=~/.aws/credentials .
     docker build --secret id=key,src=~/.ssh/id_rsa .
     ```

  3. **--ssh socket forwarding**: The `--ssh default` flag forwards the SSH agent
     socket into the build container, allowing all `RUN --mount=type=ssh` instructions
     to authenticate as the build user. Malicious RUN instructions in base images
     can use the forwarded agent to access private repositories, production servers,
     or cloud resources, or to load and use any key from the SSH agent.

     ```bash
     docker build --ssh default .
     docker build --ssh default=$SSH_AUTH_SOCK .
     ```

  For AI coding agents, these patterns are particularly dangerous because:
  - Agents may build Docker images containing injected malicious Dockerfiles
  - Indirect prompt injection payloads can instruct agents to pass credentials as build args
  - Agent automation of CI/CD pipelines can accidentally bake production secrets into
    development images

recommendation: |
  - Never pass credentials as `--build-arg`; use `--secret` with properly scoped
    access controls in a controlled Dockerfile environment instead.
  - Limit `--secret` usage to Dockerfiles you control and have reviewed.
  - Avoid `--ssh default` with Dockerfiles from external or untrusted sources.
  - Use Docker credential helpers and BuildKit cache mounts for build-time
    dependency downloads instead of passing tokens as build arguments.
  - Scan built images with `docker history --no-trunc` to verify no secrets persist.

examples:
  bad:
    - "docker build --build-arg API_KEY=$OPENAI_API_KEY ."
    - "docker build --build-arg AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY ."
    - "docker build --secret id=aws,src=~/.aws/credentials ."
    - "docker build --secret id=key,src=~/.ssh/id_rsa ."
    - "docker build --ssh default ."
    - "docker build --ssh default=$SSH_AUTH_SOCK ."
  good:
    - "docker build -t myapp ."
    - "docker build --build-arg NODE_ENV=production ."
    - "docker build --build-arg APP_VERSION=1.0.0 ."
    - "docker build --target builder ."

compliance:
  owasp-llm-2025: ["LLM06", "LLM02"]
  iso-27001-2022: ["A.8.12", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.7"]

references:
  mitre_attack: ["T1552.001", "T1552.004"]
  cwe: ["CWE-522", "CWE-319"]
  external:
    - title: "Docker BuildKit Secrets"
      url: "https://docs.docker.com/build/building/secrets/"
    - title: "MITRE T1552.001 — Credentials in Files"
      url: "https://attack.mitre.org/techniques/T1552/001/"

analyzers: ["regex"]
related_rules:
  - "sec-block-cloud-cred-regex"
  - "sec-block-ssh-private"
