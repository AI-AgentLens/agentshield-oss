      url: "https://attack.mitre.org/techniques/T1552/003/"
    - title: "Shell History as an Attack Surface"
      url: "https://attack.mitre.org/techniques/T1552/"

analyzers: ["mcp"]
related_rules: ["mcp-sec-block-shell-history", "mcp-sec-block-fish-history"]
