id: "credential-exposure/command-history/shell-history-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Command History Access"
category_id: "2.31"
name: "Shell Command History File Read"
risk_level: "high"

abstract: |
  An AI agent directly reads shell command history files (e.g., ~/.bash_history,
  ~/.zsh_history, ~/.local/share/fish/fish_history) which routinely contain
  credentials, API keys, and passwords entered in interactive terminal sessions.

explanation: |
  Shell history files record every command typed in interactive sessions. Developers
  frequently enter credentials directly on the command line:

  - `export API_KEY=sk-abc123...` — environment variable assignments
  - `curl -H "Authorization: Bearer token123"` — inline auth headers
  - `mysql -u root -pMyPassword` — database passwords as CLI arguments
  - `git clone https://user:ghp_token@github.com/org/repo` — embedded tokens
  - `ssh-add ~/.ssh/id_rsa` — passphrase entry context
  - `docker login -u user -p secret registry.example.com` — registry passwords

  An AI agent using MCP file-access tools to read these history files gains
  wholesale access to command-line credentials without needing to execute
  grep or search commands — the entire history is returned in one operation.

  Affected history files:
  - bash: ~/.bash_history (also HISTFILE env override)
  - zsh: ~/.zsh_history, ~/.zhistory
  - fish: ~/.local/share/fish/fish_history (non-dotfile path)
  - Python REPL: ~/.python_history
  - Node REPL: ~/.node_repl_history
  - MySQL: ~/.mysql_history
  - PostgreSQL: ~/.psql_history
  - SQLite: ~/.sqlite_history

recommendation: |
  - Block MCP file-access tool calls targeting shell history file paths.
  - Configure HISTIGNORE/HISTCONTROL to suppress sensitive commands.
  - Use secrets managers instead of environment variables for credentials.
  - Rotate any credential found in shell history files immediately.

examples:
  bad:
    - "read_file(path='/home/user/.bash_history')"
    - "cat_file(path='/root/.zsh_history')"
    - "get_file_contents(path='/home/developer/.python_history')"
    - "read_file(path='/home/user/.local/share/fish/fish_history')"
  good:
    - "read_file(path='/workspace/project/scripts/deploy.sh')"
    - "read_file(path='/workspace/project/docs/commands.md')"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.9.4"]

references:
  mitre_attack: ["T1552.003"]
  cwe: ["CWE-522", "CWE-312"]
  external:
