id: "credential-exposure/build-tool-secrets/maven-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Build Tool Secrets"
category_id: "2.33"
name: "Maven Build Tool Credential Access"
risk_level: "critical"

abstract: |
  Access to Maven credential files — primarily `~/.m2/settings-security.xml`
  (the encrypted master password file) and `~/.m2/settings.xml` (which stores
  repository credentials encrypted with that master password) — enables an
  attacker to decrypt all Maven repository credentials, gaining access to
  internal artifact servers, private package registries, and code signing
  infrastructure.

explanation: |
  Maven uses a two-file credential chain for repository authentication:

  1. **`~/.m2/settings-security.xml`** stores a master password encrypted
     with a hardcoded AES key and a user-supplied passphrase. It looks like:
     ```xml
     <settingsSecurity>
       <master>{jSMOWnoPFgsHVpMvz5VrIt5kRbzGpI8u+9EF1iFQyJQ=}</master>
     </settingsSecurity>
     ```
     The "encryption" here is symmetric — anyone who obtains this file and
     knows the Maven master password encryption algorithm (which is documented)
     can recover the master password.

  2. **`~/.m2/settings.xml`** contains repository credentials (username/password
     for Nexus, Artifactory, GitHub Packages, AWS CodeArtifact, etc.) encrypted
     with the master password from settings-security.xml:
     ```xml
     <server>
       <id>internal-nexus</id>
       <username>deploy-user</username>
       <password>{COQLCE6DU6GtcS5P=}</password>
     </server>
     ```

  **Attack chain:**
  - Step 1: Read `settings-security.xml` → recover master password (trivial
    with mvn `--encrypt-master-password` reverse operation or known AES key).
  - Step 2: Use master password to decrypt `settings.xml` server passwords.
  - Step 3: Use recovered credentials to authenticate to internal artifact
    repositories — enabling supply chain attacks (publish malicious artifacts),
    data exfiltration (download all private packages), or lateral movement
    (pivot using the deploy-user identity).

  **Why AI coding agents are at risk:**
  AI coding agents routinely access Maven projects. When an agent encounters
  build errors, it may read `~/.m2/settings.xml` to "understand the repository
  configuration," inadvertently exposing the credential structure. A malicious
  prompt injection attack can specifically direct the agent to read
  `settings-security.xml`, extracting the master password key.

  **Scope of exposure:**
  Maven credentials in enterprise environments often include:
  - Internal Nexus/Artifactory repositories for all Java/Kotlin/Scala projects
  - GitHub Packages authentication tokens
  - AWS CodeArtifact tokens and role credentials
  - JFrog Artifactory API keys
  - Sonatype OSSRH deploy credentials (for open source releases)
  - Code signing server credentials (GPG key passphrases)

recommendation: |
  - Block MCP tool access to `~/.m2/settings-security.xml` (contains master
    password — this is the highest-priority block).
  - Block MCP tool access to `~/.m2/settings.xml` (contains encrypted
    repository credentials).
  - Use CI/CD secrets management (GitHub Actions secrets, HashiCorp Vault,
    AWS Secrets Manager) instead of plaintext Maven settings files.
  - Consider using Maven's Encrypted Passwords in conjunction with a secrets
    manager to avoid storing master passwords on disk at all.
  - In enterprise environments, audit which developers have `settings-security.xml`
    files present and consider rotating all associated repository credentials.

examples:
  bad:
    - "cat ~/.m2/settings-security.xml"
    - "cat ~/.m2/settings.xml"
    - "find ~/.m2 -name '*.xml' | xargs grep -l password"
    - "python3 -c \"import xml.etree.ElementTree as ET; t=ET.parse('/home/user/.m2/settings-security.xml'); print(t.find('.//master').text)\""
  good:
    - "mvn dependency:tree"
    - "cat ~/.m2/repository/com/example/app/1.0/app-1.0.pom"
    - "mvn --version"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312", "CWE-256"]
  external:
    - title: "Maven Password Encryption Guide"
      url: "https://maven.apache.org/guides/mini/guide-encryption.html"
    - title: "CVE details: Maven credential exposure via settings files"
      url: "https://cwe.mitre.org/data/definitions/522.html"

analyzers: ["regex", "structural"]
related_rules:
  - "credential-exposure/build-tool-secrets/gradle-credential-access"
