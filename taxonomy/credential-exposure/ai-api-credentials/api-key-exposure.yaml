id: "credential-exposure/ai-api-credentials/api-key-exposure"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "AI API Credentials"
category_id: "2.10"
name: "AI API Key Exposure"
risk_level: "high"

abstract: |
  AI API key references in code or environment variables can lead to credential theft
  and unauthorized model access, resulting in financial losses, data leakage, and
  exhaustion of rate limits.

explanation: |
  AI service API keys (OpenAI, Anthropic, Google Gemini, etc.) are high-value
  credentials because they:
  - Incur direct financial costs when used
  - Grant access to models that may process sensitive data
  - Are often scoped to an organization account (not individual user)

  Common exposure patterns include:
  - Hardcoded strings: `openai.api_key = "sk-proj-..."` in source code
  - Environment variable reads logged to output: `echo $OPENAI_API_KEY`
  - Credential files: `~/.config/openai/api_key`
  - Committed to version control via `.env` files

  An agent that reads these keys can exfiltrate them via HTTP requests or logs,
  enabling subsequent unauthorized model invocations.

recommendation: |
  - Never hardcode API keys in source files; use environment variables or secrets management.
  - Rotate API keys immediately upon any potential exposure.
  - Use organization-level API key policies with spend limits and IP allowlists.
  - Block agent access to files containing `sk-`, `ANTHROPIC_API_KEY`, and similar patterns.

examples:
  bad:
    - "openai.api_key = 'sk-proj-abcdefgh12345678'"
    - "ANTHROPIC_API_KEY=sk-ant-api03-secret python script.py"
    - "cat ~/.config/openai/credentials"
  good:
    - "openai.api_key = os.environ['OPENAI_API_KEY']"
    - "client = anthropic.Anthropic()  # reads ANTHROPIC_API_KEY from env"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312", "CWE-798"]

analyzers: ["regex", "structural"]
related_rules: ["ai-api-key-env-openai", "ai-api-key-env-anthropic", "ai-api-key-hardcoded-sk"]
