      url: "https://attack.mitre.org/techniques/T1552/005/"
    - title: "GCP Compute Engine Metadata Server"
      url: "https://cloud.google.com/compute/docs/metadata/overview"

analyzers: ["regex"]
related_rules: ["sec-block-gcp-imds"]
