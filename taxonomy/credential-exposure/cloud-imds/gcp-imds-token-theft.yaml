id: "credential-exposure/cloud-imds/gcp-imds-token-theft"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Instance Metadata Service (IMDS)"
category_id: "2.13"
name: "GCP IMDS Service Account Token Theft"
risk_level: "critical"

abstract: |
  An AI agent queries the GCP Instance Metadata Service (IMDS) at
  `metadata.google.internal` to retrieve OAuth2 access tokens for the
  GCE instance's attached service account, enabling full GCP API access
  with the instance's permissions.

explanation: |
  Every GCP Compute Engine (GCE) instance with a service account attached
  exposes OAuth2 access tokens via the IMDS at `http://metadata.google.internal`.
  These tokens:
  - Are valid for up to 1 hour and auto-rotate
  - Grant the full permissions of the attached service account
  - Can be used from any network if exfiltrated

  Common access patterns:
  ```
  curl "http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token" \
    -H "Metadata-Flavor: Google"
  curl "http://metadata.google.internal/computeMetadata/v1/project/project-id" \
    -H "Metadata-Flavor: Google"
  ```

  Unlike AWS IMDSv2, GCP IMDS uses a request header (`Metadata-Flavor: Google`)
  as its sole SSRF mitigation. An AI agent running on a GCE instance can silently
  steal the service account's OAuth token to escalate privileges or access other
  GCP services (Storage, BigQuery, Secret Manager, etc.).

recommendation: |
  - Block all requests to `metadata.google.internal` from AI agent shell commands.
  - Use Workload Identity Federation where possible to avoid IMDS-backed tokens.
  - Apply least-privilege service account roles on GCE instances hosting AI agents.
  - Monitor metadata server access via Cloud Audit Logs.

examples:
  bad:
    - "curl \"http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token\" -H \"Metadata-Flavor: Google\""
    - "wget -q --header=\"Metadata-Flavor: Google\" http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token"
    - "curl metadata.google.internal/computeMetadata/v1/instance/service-accounts/"
  good:
    - "gcloud auth list"
    - "gcloud config get-value account"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.4", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-2"]
  soc2-type2: ["CC6.1", "CC6.6", "CC8.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552.005"]
  cwe: ["CWE-522", "CWE-200"]
  external:
