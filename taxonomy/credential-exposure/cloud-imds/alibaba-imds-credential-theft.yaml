id: "credential-exposure/cloud-imds/alibaba-imds-credential-theft"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Instance Metadata Service (IMDS)"
category_id: "2.13"
name: "Alibaba Cloud / Tencent Cloud IMDS Credential Theft"
risk_level: "critical"

abstract: |
  An AI agent queries the Alibaba Cloud ECS or Tencent Cloud CVM Instance Metadata
  Service (IMDS) to retrieve temporary STS credentials attached to the instance role,
  enabling cloud API access with the instance's full permissions.

explanation: |
  Alibaba Cloud and Tencent Cloud expose instance credentials via link-local IMDS
  endpoints, similar to AWS and GCP:

  **Alibaba Cloud ECS IMDS** — `http://100.100.100.200/latest/meta-data/`
  - RAM role credentials at: `/latest/meta-data/ram/security-credentials/<role>`
  - Returns: `AccessKeyId`, `AccessKeySecret`, `SecurityToken` (short-lived STS)
  - No authentication required from within the instance

  **Tencent Cloud CVM IMDS** — `http://metadata.tencentyun.com/latest/meta-data/`
  - CAM credentials at: `/latest/meta-data/cam/security-credentials/<role>`
  - Returns temporary credentials for the attached CAM role

  Both services are accessible from any process running inside the VM, including
  AI agents. Unlike AWS IMDSv2, these endpoints may not require a session token
  pre-flight, making them trivially accessible. Stolen STS credentials can be used
  from any network if exfiltrated before expiry.

recommendation: |
  - Block all requests to 100.100.100.200 (Alibaba IMDS) from AI agent workflows.
  - Block all requests to metadata.tencentyun.com (Tencent IMDS) from AI agent workflows.
  - Use RAM/CAM roles with minimal permissions for ECS/CVM instances hosting AI agents.
  - Monitor IMDS access logs for unexpected credential retrievals.
  - Enforce short STS token TTLs and audit token usage in cloud access logs.

examples:
  bad:
    - "curl http://100.100.100.200/latest/meta-data/ram/security-credentials/"
    - "curl http://100.100.100.200/latest/meta-data/ram/security-credentials/MyRole"
    - "curl http://metadata.tencentyun.com/latest/meta-data/cam/security-credentials/MyRole"
    - "wget -q http://100.100.100.200/latest/meta-data/ram/security-credentials/"
  good:
    - "aliyun sts GetCallerIdentity"
    - "tccli sts GetCallerIdentity"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.4", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.6"]

references:
  mitre_attack: ["T1552.005"]
  cwe: ["CWE-522", "CWE-200"]
  external:
    - title: "Alibaba Cloud ECS Instance Metadata"
      url: "https://www.alibabacloud.com/help/en/ecs/user-guide/instance-metadata"
    - title: "Tencent Cloud CVM Instance Metadata"
      url: "https://cloud.tencent.com/document/product/213/4934"

analyzers: ["regex", "mcp"]
related_rules: ["mcp-sec-block-alibaba-tencent-imds"]
