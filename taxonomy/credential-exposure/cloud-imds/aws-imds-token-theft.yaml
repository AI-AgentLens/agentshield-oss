id: "credential-exposure/cloud-imds/aws-imds-token-theft"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Cloud Instance Metadata Service (IMDS)"
category_id: "2.13"
name: "AWS IMDS IAM Credential Theft"
risk_level: "critical"

abstract: |
  An AI agent queries the AWS Instance Metadata Service (IMDS) to retrieve
  temporary IAM credentials attached to the EC2 instance role, enabling
  AWS API access with the instance's full permissions.

explanation: |
  Every AWS EC2 instance with an IAM role attached exposes temporary credentials
  via the IMDS at `http://169.254.169.254`. These credentials:
  - Are valid for up to 6 hours and auto-rotate
  - Grant the full permissions of the attached IAM role
  - Can be used from any network if exfiltrated

  Common access patterns:
  ```
  curl http://169.254.169.254/latest/meta-data/iam/security-credentials/
  curl http://169.254.169.254/latest/meta-data/iam/security-credentials/MyRole
  ```

  IMDSv2 requires a session token (PUT request first) but IMDSv1 is still
  widely enabled. An AI agent running on an EC2 instance can silently steal
  the instance's IAM credentials to escalate privileges or access other AWS services.

recommendation: |
  - Block all requests to 169.254.169.254 from AI agent shell commands.
  - Enforce IMDSv2 (hop limit 1) on all EC2 instances.
  - Use least-privilege IAM roles for EC2 instances hosting AI agents.
  - Monitor IMDS access via CloudTrail and IMDSv2 hop limit metrics.

examples:
  bad:
    - "curl http://169.254.169.254/latest/meta-data/iam/security-credentials/"
    - "wget -q http://169.254.169.254/latest/meta-data/iam/security-credentials/MyRole"
    - "curl -H 'X-aws-ec2-metadata-token: TOKEN' http://169.254.169.254/latest/meta-data/iam/security-credentials/"
  good:
    - "aws sts get-caller-identity"
    - "aws configure list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.4", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-2"]
  soc2-type2: ["CC6.1", "CC6.6", "CC8.1"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1552.005"]
  cwe: ["CWE-522", "CWE-200"]
  external:
    - title: "MITRE ATT&CK: Cloud Instance Metadata API"
      url: "https://attack.mitre.org/techniques/T1552/005/"
    - title: "AWS IMDS Security"
      url: "https://docs.aws.amazon.com/AWSEC2/latest/UserGuide/configuring-instance-metadata-service.html"

analyzers: ["regex"]
related_rules: ["ts-block-imds-access"]
