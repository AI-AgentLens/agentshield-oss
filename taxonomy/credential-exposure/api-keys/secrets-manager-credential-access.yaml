id: "credential-exposure/api-keys/secrets-manager-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Keys"
category_id: "2.24"
name: "Secrets Manager Credential Access"
risk_level: "critical"

abstract: |
  Access to cloud-based secrets manager CLI configuration files (Doppler, HashiCorp Vault,
  AWS Secrets Manager CLI, etc.) stored on the local filesystem. These config files
  contain personal access tokens and service tokens that grant broad read access to
  all managed secrets across every project and environment configured in the secrets
  manager, acting as a master key to the entire secrets vault.

explanation: |
  Secrets managers like Doppler, HashiCorp Vault, and similar tools store their
  authentication tokens in local CLI configuration files:

  - **Doppler**: `~/.config/doppler/` — contains personal access tokens (PATs) and
    optionally scoped service tokens. A Doppler PAT grants read/write access to all
    secrets in every project the user can access. Service tokens scoped to an
    environment still expose all secrets in that scope.
  - **Vault CLI**: `~/.vault-token` — stores the active Vault client token. Depending
    on the token's policy, this can grant access to any number of secret engines.
  - **1Password CLI**: `~/.config/op/` — session tokens that allow decryption of
    vault items.
  - **General pattern**: Any tool that manages secrets necessarily stores its own
    authentication state locally; that state is the most valuable credential an
    agent can exfiltrate.

  The attack model:
  1. AI coding agent (or prompt injection) reads the CLI config file.
  2. Extracts the token (plaintext or base64 in YAML/JSON).
  3. Uses the token to enumerate and exfiltrate all secrets accessible to
     the authenticated identity — potentially hundreds of API keys, database
     passwords, and certificates.
  4. Optionally injects malicious secret values to poison downstream consumers.

  Unlike individual service credentials, secrets manager tokens are multipliers:
  a single exfiltrated token grants access to all credentials the manager holds,
  making this one of the highest-impact credential exposures possible.

  This entry covers cloud-hosted secrets managers with local CLI auth state.
  Password manager local vaults (1Password, Bitwarden) are covered by
  `credential-exposure/password-manager/*`.

recommendation: |
  - Block all MCP and agent read access to secrets manager CLI config directories
    (`~/.config/doppler/`, `~/.vault-token`, `~/.config/op/`, etc.).
  - Use short-lived, scoped service tokens rather than personal access tokens for
    CI/CD and agent contexts; rotate them regularly.
  - Store secrets manager tokens using OS-level credential stores (macOS Keychain,
    Windows Credential Manager) rather than plaintext config files where possible.
  - Audit access logs in your secrets manager for unexpected reads from non-standard
    client IPs or user agents.
  - Apply least privilege: create dedicated service accounts for AI agent contexts
    with read-only access to only the secrets required.

examples:
  bad:
    - "cat ~/.config/doppler/config.yaml"
    - "cat ~/.config/doppler/default.yaml"
    - "find ~/.config/doppler -name '*.yaml' -exec cat {} \\;"
    - "python -c \"import yaml; print(yaml.safe_load(open('/home/user/.config/doppler/config.yaml')))\""
  good:
    - "doppler secrets get MY_SECRET --plain"
    - "doppler run -- node app.js"
    - "cat ~/.config/doppler/.doppler-version"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.11"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312"]
  external:
