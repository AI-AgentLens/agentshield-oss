id: "credential-exposure/api-keys/data-platform-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Keys"
category_id: "2.24"
name: "Data Platform Credential Access"
risk_level: "high"

abstract: |
  Access to data platform credentials stored in tool-specific configuration files
  (~/.databrickscfg, ~/.snowsql/, ~/.confluent/) exposes access to large-scale
  data warehouses, streaming pipelines, and analytics platforms, enabling bulk
  data exfiltration and unauthorized compute consumption.

explanation: |
  Modern data platforms use local credential files for CLI authentication:
  - `~/.databrickscfg` — Databricks personal access tokens and workspace URLs
  - `~/.snowsql/config` — Snowflake connection parameters including passwords
  - `~/.confluent/` — Confluent Cloud API keys and cluster credentials

  These credentials typically grant read/write access to petabyte-scale datasets,
  ML training pipelines, and real-time event streams. An attacker with data platform
  credentials can exfiltrate sensitive business data, corrupt datasets, run expensive
  compute jobs at the victim's cost, or establish persistent access by creating
  additional API keys within the platform.

recommendation: |
  - Block read access to `~/.databrickscfg`, `~/.snowsql/`, and `~/.confluent/` directories.
  - Use environment-scoped service principals rather than personal access tokens for agent environments.
  - Enforce least-privilege roles on data platform credentials.
  - Audit data platform access logs for unusual query patterns following agent sessions.

examples:
  bad:
    - "cat ~/.databrickscfg"
    - "cat ~/.snowsql/config"
    - "find ~/.confluent -type f | xargs cat"
  good:
    - "databricks workspace list /"
    - "snowsql --version"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "structural"]
related_rules: []
