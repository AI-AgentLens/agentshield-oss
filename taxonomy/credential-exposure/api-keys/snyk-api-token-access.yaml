id: "credential-exposure/api-keys/snyk-api-token-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Keys"
category_id: "2.24"
name: "Snyk API Token Access"
risk_level: "high"

abstract: |
  Access to the Snyk security scanning API token stored in ~/.config/snyk/snyk.json
  or the SNYK_TOKEN environment variable enables attackers to impersonate the
  organization's security scanner, suppress vulnerability reports, and access
  dependency and code scan results for all monitored projects.

explanation: |
  Snyk CLI stores its authentication token in `~/.config/snyk/snyk.json` after
  running `snyk auth`. This token grants access to:
  - The organization's Snyk dashboard and all project vulnerability data
  - The ability to run scans and potentially suppress or ignore findings
  - Integration settings including CI/CD webhooks and source code repository connections

  In organizations where Snyk is the primary software composition analysis (SCA) tool,
  token theft could allow an attacker to understand which known-vulnerable dependencies
  are in use across all projects, identify unpatched targets, or manipulate scan results
  to create a false sense of security. Since Snyk tokens are often organization-scoped,
  a single stolen token may expose the entire organization's security posture.

recommendation: |
  - Block read access to `~/.config/snyk/snyk.json`.
  - Use CI/CD environment secrets rather than developer local tokens in agent environments.
  - Scope Snyk tokens to the minimum required organization and project permissions.
  - Rotate Snyk tokens immediately if agent read access is detected.

examples:
  bad:
    - "cat ~/.config/snyk/snyk.json"
    - "find ~/.config/snyk -type f -exec cat {} \\;"
  good:
    - "snyk test --all-projects"
    - "snyk --version"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
