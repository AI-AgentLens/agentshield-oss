id: "credential-exposure/api-keys/ai-tool-api-key-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Keys"
category_id: "2.24"
name: "AI Tool API Key Access"
risk_level: "critical"

abstract: |
  Access to AI service API keys stored in developer tool configuration directories
  (~/.claude/, ~/.anthropic/, ~/.config/claude/, ~/.openai/) enables attackers to
  impersonate the user against AI APIs, consume quota at the user's expense, and
  exfiltrate data through AI service backends.

explanation: |
  AI coding assistants and developer tools store their API keys in predictable
  locations on the local filesystem:
  - `~/.claude/` — Claude Code configuration and credentials
  - `~/.anthropic/` — Anthropic CLI configuration
  - `~/.config/claude/` — XDG-compliant Claude config directory
  - `~/.openai/` — OpenAI CLI credentials
  - `~/.config/openai/` — OpenAI XDG config path

  An agent with access to these files can extract API keys to make unauthorized
  API calls, exfiltrate data through AI model context windows, or accumulate
  large API bills. Since AI API keys often carry high rate limits and prepaid
  credits, their theft has immediate financial impact in addition to security risk.
  In agentic environments, a compromised AI key can also be used to instantiate
  new agent sessions under the victim's identity.

recommendation: |
  - Block read access to `~/.claude/`, `~/.anthropic/`, `~/.openai/`, and related AI config directories.
  - Store AI API keys in a secrets manager rather than plaintext config files.
  - Use scoped API keys with minimal permissions and usage limits.
  - Rotate AI API keys immediately if agent access is suspected.
  - Add MCP block rules for AI credential file paths.

examples:
  bad:
    - "cat ~/.claude/credentials"
    - "cat ~/.anthropic/api_key"
    - "cat ~/.config/claude/config.json"
    - "find ~/.openai -name '*.json' | xargs cat"
  good:
    - "claude --version"
    - "cat ~/.claude/CLAUDE.md"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "structural"]
related_rules: []
