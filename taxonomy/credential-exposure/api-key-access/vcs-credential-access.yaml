id: "credential-exposure/api-key-access/vcs-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Key Access"
category_id: "2.25"
name: "Version Control System CLI Credential Access"
risk_level: "critical"

abstract: |
  Access to authentication tokens stored by VCS CLI tools (glab, gh, hub) in local
  config files grants full API access to hosted VCS platforms (GitLab, GitHub, Bitbucket),
  enabling repository exfiltration, secrets enumeration, CI/CD pipeline manipulation,
  and supply chain compromise.

explanation: |
  Version control hosting platforms authenticate their CLI tools via long-lived tokens
  stored in predictable local config paths:

  - `~/.config/glab-cli/config.yml` — GitLab CLI (glab) personal access tokens and
    OAuth tokens. Grants full GitLab API access: repos, CI/CD, webhooks, settings.
  - `~/.config/gh/hosts.yml` — GitHub CLI (gh) OAuth tokens. Grants scoped GitHub API
    access: repos, issues, pull requests, Actions secrets.
  - `~/.config/hub` — hub CLI OAuth token for GitHub API operations.
  - `~/.config/bitbucket-cli/` — Bitbucket CLI credentials.

  These tokens are often scoped with broad permissions by default (e.g., GitLab PATs
  with `api` scope grant read/write access to all projects the user has access to).

  In agentic environments, the impact is compounded because:
  1. AI agents routinely read config files as part of environment discovery.
  2. A compromised token enables the agent to clone private repositories, extract
     embedded secrets from CI/CD configs (`.github/workflows`, `.gitlab-ci.yml`),
     create webhooks, or modify pipeline triggers — all without additional authentication.
  3. The exfiltrated token can be used from attacker infrastructure after the session.

  **Common attack chain**: Agent reads `~/.config/glab-cli/config.yml` →
  extracts PAT → uses token to clone all private repos via `glab repo clone` or
  direct GitLab API calls → finds `.env` files, private keys, or CI/CD secrets
  in cloned repos → escalates to full infrastructure compromise.

recommendation: |
  - Block MCP tool access to VCS CLI config paths via path pattern rules.
  - Use short-lived tokens or token rotation for CI/CD integrations.
  - Scope VCS platform tokens to the minimum required permissions; avoid `api` scope
    on GitLab PATs unless necessary.
  - Audit VCS platform audit logs for unexpected API activity from CLI tokens.
  - Prefer SSH keys over stored OAuth tokens for automated VCS operations.
  - Rotate all VCS CLI tokens immediately if agent file access is detected.

examples:
  bad:
    - "read_file path=~/.config/glab-cli/config.yml"
    - "cat ~/.config/gh/hosts.yml"
    - "read_file path=/home/user/.config/glab-cli/config.yml"
  good:
    - "git status"
    - "gh repo list --limit=10"
    - "glab project list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.8.4"]

references:
  mitre_attack: ["T1552.001", "T1552.004"]
  cwe: ["CWE-312", "CWE-200"]
  external:
    - title: "GitLab CLI (glab) — Authentication configuration"
      url: "https://gitlab.com/gitlab-org/cli/-/blob/main/docs/source/auth/login.md"
    - title: "GitHub CLI (gh) — Authentication tokens"
      url: "https://cli.github.com/manual/gh_auth_login"
    - title: "MITRE T1552.001 — Credentials in Files"
