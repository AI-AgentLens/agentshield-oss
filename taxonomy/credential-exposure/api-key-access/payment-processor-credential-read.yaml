id: "credential-exposure/api-key-access/payment-processor-credential-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Key Access"
category_id: "2.25"
name: "Payment Processor Credential Read"
risk_level: "critical"

abstract: |
  Access to payment processor API keys (Stripe, PayPal, Square, Braintree) via
  MCP tool calls or shell commands enables unauthorized financial transactions,
  customer payment data exfiltration, and financial fraud at scale.

explanation: |
  Payment processing APIs (Stripe, PayPal, Square, Braintree, Adyen) use API keys
  stored in:
  - Environment variables: `STRIPE_SECRET_KEY`, `PAYPAL_CLIENT_SECRET`
  - Config files: `.env`, `config/payment.yml`, `settings/stripe.json`
  - CI/CD secret stores and deployment configs

  Payment processor secret keys grant full access to:
  - List and refund customer charges
  - Create fraudulent charges against stored payment methods
  - Access customer PII (name, address, partial card data)
  - Issue payouts to attacker-controlled accounts
  - Cancel subscriptions or modify billing plans

  This is a particularly high-impact credential type due to direct financial risk.

recommendation: |
  - Block MCP and shell access to files containing `STRIPE_SECRET_KEY`,
    `PAYPAL_CLIENT_SECRET`, or similar payment API key patterns.
  - Use restricted API keys with IP allowlists and minimal permissions.
  - Rotate payment processor credentials immediately if agent access is detected.
  - Monitor payment provider dashboards for unusual API activity.

examples:
  bad:
    - "cat config/stripe.json"
    - "read_file path=.env  # file contains STRIPE_SECRET_KEY"
    - "echo $STRIPE_SECRET_KEY"
  good:
    - "stripe customers list --limit=5"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.8.4", "A.7.4"]

references:
  mitre_attack: ["T1552.001", "T1657"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "guardian"]
related_rules: ["mcp-fin-block-stripe-key-read", "mcp-fin-block-paypal-key-read"]
