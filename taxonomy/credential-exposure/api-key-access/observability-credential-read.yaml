id: "credential-exposure/api-key-access/observability-credential-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Key Access"
category_id: "2.25"
name: "Observability & Incident Response Credential Read"
risk_level: "high"

abstract: |
  Access to observability and incident response platform credentials (Datadog,
  New Relic, PagerDuty) stored in local config files enables metric injection,
  alert silencing, incident manipulation, and exfiltration of infrastructure
  topology and performance data.

explanation: |
  Observability and incident response tools store their API credentials in
  predictable local paths:
  - `~/.config/datadog/` — Datadog API key and App key
  - `~/.config/newrelic/` — New Relic account credentials and license key
  - `~/.config/pagerduty/` — PagerDuty API token

  These credentials grant access to:
  - Silently suppress or delete monitoring alerts during an active attack
  - Inject false metrics to mask malicious activity from defenders
  - Enumerate full infrastructure topology (hostnames, IPs, services)
  - Access application performance data revealing internal service names and errors
  - Impersonate on-call responders or reassign incidents in PagerDuty
  - Create or delete monitors, dashboards, and service-level objectives

  Compromise of observability credentials is especially dangerous during an incident:
  an attacker who can silence alerts and manipulate dashboards can conduct a prolonged
  intrusion while the security team sees normal operational data.

recommendation: |
  - Block MCP and shell read access to Datadog, New Relic, and PagerDuty config files.
  - Store observability platform credentials in a secrets manager.
  - Use scoped API keys (read-only where possible) with short expiration.
  - Rotate credentials immediately if agent access is suspected.
  - Enable audit logging on observability platforms to detect unauthorized API use.

examples:
  bad:
    - "cat ~/.config/datadog/credentials"
    - "read_file path=~/.config/newrelic/credentials.json"
    - "cat ~/.config/pagerduty/config"
  good:
    - "datadog-agent status"
    - "newrelic --version"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9", "A.8.12"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2", "GOVERN-1"]
  soc2-type2: ["CC6.1", "CC6.2", "CC7.2"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
  mitre_attack: ["T1552.001", "T1562.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules:
