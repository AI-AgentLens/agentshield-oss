id: "credential-exposure/api-key-access/messaging-api-credential-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "API Key Access"
category_id: "2.25"
name: "Messaging & Email API Credential Read"
risk_level: "critical"

abstract: |
  Access to messaging and email service API credentials (Twilio, SendGrid, Mailgun,
  Mailchimp) stored in local config files enables unauthorized mass messaging, phishing
  campaigns, account enumeration, and exfiltration of customer contact data at scale.

explanation: |
  Messaging and email service platforms store their API credentials in predictable
  local paths:
  - `~/.config/twilio/` — Twilio Account SID and Auth Token (SMS/voice/WhatsApp)
  - `~/.sendgrid*` — SendGrid API key (transactional email)
  - `~/.config/mailgun/` — Mailgun API key (email delivery and domain management)
  - `~/.config/mailchimp/` — Mailchimp API key (marketing email and audience data)

  These credentials grant access to:
  - Send unlimited SMS, voice calls, or emails at the account owner's expense
  - Access contact lists, subscriber audiences, and marketing segments
  - Send phishing or malware-laden messages to trusted recipient lists
  - Delete or modify mailing lists, causing business disruption
  - Exfiltrate customer PII (email addresses, phone numbers, names)

  In agentic environments, messaging API keys are especially dangerous because an
  AI agent can silently send thousands of messages without interactive confirmation.
  Twilio credentials additionally enable phone number control and call recording.

recommendation: |
  - Block MCP and shell read access to Twilio, SendGrid, Mailgun, and Mailchimp
    credential files.
  - Store messaging API keys in a secrets manager or CI/CD secret store rather
    than local config files.
  - Use IP allowlists and webhook signature verification on messaging webhooks.
  - Rotate messaging API keys immediately if agent access is suspected.
  - Monitor messaging provider dashboards for anomalous sending activity.

examples:
  bad:
    - "cat ~/.config/twilio/credentials"
    - "read_file path=~/.sendgrid.yaml"
    - "cat ~/.config/mailgun/config.json"
  good:
    - "twilio phone-numbers list"
    - "sendgrid --version"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552.001", "T1657"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules:
  - "mcp-sec-block-twilio-creds"
  - "mcp-sec-block-sendgrid-creds"
  - "mcp-sec-block-mailgun-creds"
  - "mcp-sec-block-mailchimp-creds"
