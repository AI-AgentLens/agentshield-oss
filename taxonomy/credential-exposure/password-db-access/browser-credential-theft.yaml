id: "credential-exposure/password-db-access/browser-credential-theft"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Database Access"
category_id: "2.11"
name: "Browser Credential Database Theft"
risk_level: "critical"

abstract: |
  An AI agent directly accesses browser credential databases (Chrome `Login Data`,
  Firefox `key4.db` / `logins.json`, or Safari cookie stores) to extract saved
  passwords and session cookies stored on the developer workstation.

explanation: |
  Modern browsers store credentials in SQLite databases on disk, protected only
  by OS-level file permissions:

  - **Chrome / Chromium**: `~/Library/Application Support/Google/Chrome/Default/Login Data`
    (macOS), `~/.config/google-chrome/Default/Login Data` (Linux). Contains
    `origin_url`, `username_value`, and `password_value` (AES-GCM encrypted with
    the system keychain). Copying the database and the encryption key allows
    offline decryption.
  - **Firefox**: `~/.mozilla/firefox/<profile>/key4.db` (master password DB) and
    `logins.json` (encrypted credential entries). Tools like `firepwd` can decrypt
    these without the master password when it is absent or guessed.
  - **Session cookies**: Chrome `Cookies` and Firefox `cookies.sqlite` contain
    session tokens that allow account takeover without knowing the password.

  Developer workstations store credentials for cloud consoles (AWS, GCP, Azure),
  GitHub, internal tooling, and SaaS applications in the browser. An agent that
  reads these databases can exfiltrate massive credential sets in a single command.
  This is a well-known info-stealer technique (T1555.003) now adapted to the AI
  agent threat model.

recommendation: |
  - Block all read/copy operations targeting browser credential database paths.
  - Treat `sqlite3` invocations against browser profile directories as credential
    exfiltration attempts.
  - Use secrets managers (1Password CLI, `aws secretsmanager`, Vault) in agent
    environments instead of relying on browser-stored credentials.
  - Consider separating browser profiles: one for personal use, one for AI-assisted
    development work.

examples:
  bad:
    - "sqlite3 ~/Library/Application\\ Support/Google/Chrome/Default/Login\\ Data 'SELECT * FROM logins'"
    - "cp ~/Library/Application\\ Support/Google/Chrome/Default/Login\\ Data /tmp/ld.db"
    - "cat ~/.mozilla/firefox/*.default-release/logins.json"
    - "sqlite3 ~/.config/google-chrome/Default/Login\\ Data 'SELECT origin_url,username_value FROM logins'"
    - "sqlite3 ~/Library/Application\\ Support/Google/Chrome/Default/Cookies 'SELECT host_key,name,encrypted_value FROM cookies'"
  good:
    - "sqlite3 ~/dev/myapp/app.db 'SELECT * FROM users'"
    - "cat ~/Library/Application\\ Support/Google/Chrome/Default/Preferences"

