id: "credential-exposure/password-db-access/linux-credential-store-extraction"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Database Access"
category_id: "2.11"
name: "Linux Credential Store Extraction"
risk_level: "critical"

abstract: |
  A command extracts credentials from Linux desktop password managers
  and secret stores (secret-tool, pass, gopass, keepassxc-cli), exposing
  stored passwords, tokens, and authentication material.

explanation: |
  Linux desktop environments use D-Bus-backed secret services (GNOME Keyring,
  KDE Wallet) and CLI password managers to store credentials. Several tools
  provide command-line access:

  - `secret-tool lookup` — queries GNOME Keyring / KDE Wallet via the
    freedesktop.org Secret Service API. Returns plaintext secrets.
  - `secret-tool search` — searches stored secrets by attribute.
  - `pass show` / `pass -c` — retrieves GPG-encrypted passwords from the
    standard Unix password store (~/.password-store/).
  - `gopass show` — retrieves secrets from gopass (pass-compatible store).
  - `keepassxc-cli show` / `keepassxc-cli clip` — extracts entries from
    KeePassXC databases, including TOTP codes.

  Unlike macOS Keychain (already covered by sec-block-keychain), these Linux
  credential stores have no equivalent coverage. AI agents may invoke these
  tools during "authentication debugging" or "credential verification,"
  silently extracting passwords for cloud services, databases, API keys,
  and SSH passphrases.

recommendation: |
  - Block all credential-extracting subcommands of secret-tool, pass, gopass,
    and keepassxc-cli.
  - Allow read-only operations (list, ls, find) at AUDIT level.
  - Prefer ephemeral tokens or environment-injected secrets over stored credentials.

examples:
  bad:
    - "secret-tool lookup service github.com"
    - "pass show cloud/aws-access-key"
    - "gopass show -o work/database-password"
    - "keepassxc-cli show ~/Passwords.kdbx github -s"
  good:
    - "pass ls"
    - "pass git log"
    - "keepassxc-cli ls ~/Passwords.kdbx"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1555.004", "T1555"]
  cwe: ["CWE-522"]
  external:
    - title: "MITRE ATT&CK: Credentials from Password Stores: Linux Credential Managers"
      url: "https://attack.mitre.org/techniques/T1555/004/"

analyzers: ["regex"]
related_rules: ["sec-block-linux-secret-tool", "sec-block-linux-pass-show", "sec-block-linux-gopass-show", "sec-block-linux-keepassxc-cli"]
