id: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Database Access"
category_id: "2.11"
name: "Enterprise Secrets Manager CLI Extraction"
risk_level: "critical"

abstract: |
  An AI agent uses enterprise secrets manager CLIs (1Password op, Bitwarden bw,
  Infisical, Doppler, Mozilla SOPS) to extract passwords, API keys, or encrypted
  secrets directly from centralized vaults — bypassing file-based credential monitoring.

explanation: |
  Modern enterprises use dedicated secrets management platforms to centralize credential
  storage. Each provides a CLI tool that reads secrets directly from the vault API and
  prints plaintext to stdout, making them invisible to file-access monitoring:

  - **1Password CLI (`op`)**: `op item get <item> --fields password` extracts credentials
    from 1Password vaults. `op run` injects all vault secrets as environment variables —
    a single command exposes the entire secret inventory.
  - **Bitwarden CLI (`bw`)**: `bw get password <id>` / `bw get item <id>` retrieves vault
    items. `bw export --format json` dumps the full vault. Requires `bw unlock` first but
    once unlocked, `BW_SESSION` in env enables silent extraction.
  - **Infisical CLI**: `infisical secrets get <key>` reads individual secrets. `infisical
    run -- env` injects all project secrets as environment variables.
  - **Doppler CLI**: `doppler secrets download --no-file` dumps all secrets as JSON.
    `doppler run -- printenv` injects all secrets into a subprocess's environment.
  - **Mozilla SOPS** (`sops`): `sops --decrypt secrets.enc.yaml` / `sops -d` decrypts
    encrypted YAML/JSON/ENV files using KMS, PGP, or age keys. `sops --extract`
    retrieves individual fields. `sops exec-env` injects decrypted values as env vars.

  These attacks are particularly dangerous because:
  1. Secrets never reside in files that file-access monitoring can detect.
  2. The CLI tools are legitimate DevOps tools, making commands appear benign.
  3. Bulk extraction commands (`bw export`, `doppler secrets download`, `op run`) can
     exfiltrate hundreds of credentials in one invocation.
  4. Session tokens (`BW_SESSION`, `DOPPLER_TOKEN`) may already be present in the
     agent's environment, enabling silent extraction without interactive authentication.

recommendation: |
  - Block credential-extracting subcommands: `op item get`, `bw get`, `infisical secrets get`,
    `doppler secrets download`, and all `sops --decrypt`/`-d`/`--extract`/`exec-env` invocations.
  - Audit bulk/injection commands: `op run`, `infisical run`, `doppler run`, `bw export`
    at AUDIT level (legitimate use cases exist in CI/CD with human oversight).
  - Revoke unused CLI session tokens from agent environments before execution.
  - Use machine identity tokens with narrow secret-path access policies for AI agents.
  - Prefer Vault dynamic credentials over long-lived secrets stored in these managers.

examples:
  bad:
    - "op item get 'database/prod' --fields password"
    - "op run -- env | grep DB_PASSWORD"
    - "bw get password abc123-item-id"
    - "bw export --format json --output ~/vault-dump.json"
    - "infisical secrets get DB_PASSWORD --env prod"
    - "doppler secrets download --no-file --format json"
    - "sops --decrypt secrets/prod.enc.yaml"
    - "sops -d .env.enc | grep API_KEY"
    - "sops exec-env secrets.enc.yaml -- printenv"
  good:
    - "op account list"
    - "op vault list"
    - "bw status"
    - "bw list items --search database"
    - "infisical secrets --env prod"
    - "doppler secrets"
    - "sops --encrypt --age age1... secrets.yaml"

