id: "credential-exposure/password-db-access/windows-credential-theft"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Database Access"
category_id: "2.11"
name: "Windows Credential Manager Access"
risk_level: "critical"

abstract: |
  An AI agent reads Windows Credential Manager credential blobs from
  AppData/Local/Microsoft/Credentials/ or AppData/Roaming/Microsoft/Credentials/,
  enabling offline DPAPI decryption of saved passwords for RDP, Windows login,
  network shares, and applications.

explanation: |
  Windows Credential Manager stores encrypted credential blobs in two locations:
  - `%APPDATA%\Microsoft\Credentials\` — roaming credentials (synced across domain)
  - `%LOCALAPPDATA%\Microsoft\Credentials\` — local-only credentials

  These binary CRED blobs are encrypted using DPAPI (Data Protection API) with
  keys derived from the user's Windows login password and a DPAPI master key file.
  The blobs themselves appear as opaque binary files, but when combined with a
  stolen DPAPI master key, every saved credential decrypts to plaintext.

  Credential Manager stores:
  - **Windows login credentials**: Domain accounts, local accounts
  - **RDP/Remote Desktop passwords**: Automatic login to remote servers
  - **Network share credentials**: SMB/file share access
  - **Application credentials**: Outlook/Exchange, OneDrive, Teams auth tokens
  - **Web credentials**: Internet Explorer and legacy Edge saved passwords

  An AI agent operating on Windows may encounter these files during file-system
  enumeration or when processing broad directory listings in home directories.
  Reading them enables offline DPAPI decryption attacks when combined with
  DPAPI master keys (T1552.004).

recommendation: |
  - Block read/copy access to `%APPDATA%\Microsoft\Credentials\` and
    `%LOCALAPPDATA%\Microsoft\Credentials\`.
  - Block access to the companion DPAPI master key files in
    `%APPDATA%\Microsoft\Protect\<SID>\`.
  - No legitimate AI agent workflow requires reading raw Windows credential blobs.
  - Use Windows Credential Manager APIs (CredRead, CredWrite) through controlled
    service accounts rather than direct file access.

examples:
  bad:
    - "type %APPDATA%\\Microsoft\\Credentials\\*"
    - "copy %LOCALAPPDATA%\\Microsoft\\Credentials\\ C:\\exfil\\"
    - "Get-ChildItem $env:APPDATA\\Microsoft\\Credentials"
    - "cat ~/.local/share/Microsoft/Credentials/ABCDEF1234"
  good:
    - "cmdkey /list"
    - "Get-ChildItem $env:APPDATA\\Microsoft"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.11"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
