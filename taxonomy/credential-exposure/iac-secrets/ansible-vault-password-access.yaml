id: "credential-exposure/iac-secrets/ansible-vault-password-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Infrastructure-as-Code Secrets"
category_id: "2.28"
name: "Ansible Vault Password Access"
risk_level: "critical"

abstract: |
  Access to Ansible vault password files (~/.vault_pass, vault_pass.txt, .vault-password)
  enables decryption of all Ansible Vault encrypted secrets in an infrastructure codebase,
  potentially exposing SSH keys, API tokens, database passwords, and cloud credentials
  used across the entire managed infrastructure.

explanation: |
  Ansible Vault encrypts secrets within playbooks and variable files using a symmetric
  key. The vault password is typically stored in a plaintext file referenced via
  `--vault-password-file` or `ANSIBLE_VAULT_PASSWORD_FILE`:
  - `~/.vault_pass` — common developer convention
  - `vault_pass.txt` or `.vault-password` — project-level vault password files
  - `~/.ansible/vault_password` — Ansible configuration directory

  Once an attacker obtains the vault password, they can decrypt all vault-encrypted
  content in the infrastructure repository using `ansible-vault decrypt`. This typically
  exposes:
  - SSH private keys for managed hosts
  - API tokens for cloud providers and external services
  - Database connection strings and passwords
  - TLS private keys and certificate bundles
  - LDAP bind passwords and service account credentials

  The vault password is a single key protecting all encrypted secrets, making it
  an extremely high-value target in Ansible-managed environments.

recommendation: |
  - Block read access to `~/.vault_pass`, `vault_pass.txt`, and `.vault-password` files.
  - Use `ansible-vault` with `--ask-vault-pass` interactively rather than file-based passwords in agent environments.
  - Prefer HashiCorp Vault or AWS Secrets Manager lookups over Ansible Vault for secrets that agents need to access.
  - Never store vault password files in source control.
  - Rotate the vault password and re-encrypt all vault content immediately if compromise is suspected.

examples:
  bad:
    - "cat ~/.vault_pass"
    - "cat vault_pass.txt"
    - "ansible-vault decrypt --vault-password-file ~/.vault_pass secrets.yml"
  good:
    - "ansible-vault view secrets.yml --ask-vault-pass"
    - "ansible-playbook site.yml --ask-vault-pass"

compliance:
