id: "credential-exposure/iac-secrets/hashicorp-nomad-token-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Infrastructure-as-Code Secrets"
category_id: "2.28"
name: "HashiCorp Nomad Token Access"
risk_level: "critical"

abstract: |
  Direct access to HashiCorp Nomad token files (e.g., `~/.nomad/token`) exposes
  ACL tokens that can deploy, modify, or terminate workloads across the entire
  Nomad cluster — enabling arbitrary code execution on orchestrated infrastructure.

explanation: |
  HashiCorp Nomad stores ACL tokens locally for CLI authentication. A compromised
  Nomad token provides control over the workload orchestrator, which is significantly
  more dangerous than a single-service credential:

  - **Workload execution**: An attacker with a Nomad management token can deploy
    arbitrary jobs (Docker containers, raw exec tasks) on any cluster node.
  - **Environment variable extraction**: Nomad job specifications frequently embed
    secrets as environment variables, exposed via the jobs API to a token with
    `read-job` policy.
  - **Namespace traversal**: A token with cross-namespace access can inspect and
    modify production workloads even from a development context.
  - **Volatile storage access**: Nomad's `template` stanza allows jobs to render
    Vault secrets at runtime — compromising a Nomad token may chain into Vault access.

  Nomad clusters often run privileged container workloads; arbitrary job submission
  is effectively a path to host privilege escalation.

recommendation: |
  - Block all file read operations on `~/.nomad/token` and Nomad credential paths.
  - Use Nomad's ACL bootstrapping via environment variables (`NOMAD_TOKEN`) only in
    CI/CD contexts; avoid persisting tokens to disk.
  - Rotate ACL tokens immediately if unauthorized access is detected.
  - Enforce least-privilege Nomad ACL policies (read vs. write vs. submit-job).

examples:
  bad:
    - "cat ~/.nomad/token"
    - "cat ~/.config/nomad/token"
  good:
    - "nomad job status"
    - "nomad node status"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552", "T1552.001", "T1610"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "mcp"]
related_rules: []
