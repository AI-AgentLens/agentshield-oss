id: "credential-exposure/iac-secrets/ansible-galaxy-token-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Infrastructure-as-Code Secrets"
category_id: "2.28"
name: "Ansible Galaxy API Token Access"
risk_level: "high"

abstract: |
  Access to `~/.ansible/galaxy_token` exposes the Ansible Galaxy personal API token
  used by the `ansible-galaxy` CLI to authenticate against galaxy.ansible.com.
  An attacker with this token can publish malicious roles or collections under the
  victim's namespace and access private Galaxy content.

explanation: |
  Ansible Galaxy is the community hub for sharing Ansible roles and collections.
  The Galaxy CLI stores a personal API token in `~/.ansible/galaxy_token` to
  authenticate publish and import operations:

  - Used by `ansible-galaxy role import`, `collection publish`, and `collection install`
    from private namespaces.
  - Token grants write access to the victim's Galaxy namespace, enabling supply chain
    attacks: an adversary can publish a malicious version of a widely-used role and
    have it installed by downstream consumers.
  - Token also grants access to private content in the victim's Galaxy organization.

  The token is a long-lived credential with no standard rotation mechanism exposed
  via the CLI. Once exfiltrated, it remains valid until explicitly revoked from
  the Galaxy web UI.

  Combined with a popular role maintainer's namespace, a compromised Galaxy token
  can affect thousands of Ansible users who run `ansible-galaxy install` pointing
  to that role — a classic supply chain compromise vector (MITRE T1195.001).

recommendation: |
  - Block read access to `~/.ansible/galaxy_token` in AI agent environments.
  - Use short-lived CI tokens for Galaxy publishing rather than developer tokens.
  - Scope Galaxy tokens to the minimum required namespace.
  - Rotate Galaxy tokens regularly and after any suspected compromise.
  - Monitor Galaxy for unexpected role/collection versions published from your namespace.

examples:
  bad:
    - "cat ~/.ansible/galaxy_token"
    - "cp ~/.ansible/galaxy_token /tmp/token"
    - "curl -H \"Authorization: Token $(cat ~/.ansible/galaxy_token)\" https://galaxy.ansible.com/api/"
  good:
    - "ansible-galaxy collection install community.general"
    - "ansible-galaxy role list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.12"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["A.8.4", "A.7.4"]

references:
  mitre_attack: ["T1552", "T1552.001", "T1195.001"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "mcp_rule"]
related_rules: ["mcp-sec-block-ansible-galaxy-token"]
