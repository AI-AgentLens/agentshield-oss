id: "credential-exposure/iac-secrets/terraform-state-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Infrastructure-as-Code Secrets"
category_id: "2.28"
name: "Terraform State Access"
risk_level: "critical"

abstract: |
  Access to Terraform state files (terraform.tfstate, *.tfstate) exposes the full
  plaintext state of managed infrastructure, including database passwords, API tokens,
  TLS private keys, and cloud resource metadata written directly into the state file
  by Terraform providers.

explanation: |
  Terraform state files record the current state of all managed resources and include
  all attribute values returned by providers, including sensitive outputs:
  - Database passwords from `aws_db_instance`, `google_sql_database_instance`
  - Generated private keys from `tls_private_key` resources
  - Initial root passwords for managed services
  - API tokens and access keys from `aws_iam_access_key` resources
  - Service account keys from `google_service_account_key`
  - Connection strings including embedded credentials

  Terraform explicitly documents that state may contain sensitive values and should
  be treated as sensitive data, but many teams store state files locally or in
  unencrypted S3 buckets. Local state files (`terraform.tfstate`) are commonly
  found in project directories alongside application code.

  Unlike application source code, state files contain the *actual* credential values
  (not placeholder variables), making them more immediately exploitable than reading
  source code or variable definitions.

recommendation: |
  - Block read access to `terraform.tfstate` and `*.tfstate` files in project directories.
  - Use remote state backends (S3 + KMS, Terraform Cloud) with encryption at rest and access controls.
  - Mark sensitive Terraform outputs with `sensitive = true` to suppress state file plaintext logging.
  - Run `terraform state list` and audit state for sensitive resource types regularly.
  - Rotate all credentials referenced in state files if local state access by an agent is detected.

examples:
  bad:
    - "cat terraform.tfstate"
    - "cat terraform.tfstate.backup"
    - "python -c \"import json; d=json.load(open('terraform.tfstate')); print(d)\""
  good:
    - "terraform show"
    - "terraform state list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312", "CWE-538"]

analyzers: ["regex", "structural"]
related_rules: []
