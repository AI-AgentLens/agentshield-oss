id: "credential-exposure/iac-secrets/terraform-vars-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Infrastructure-as-Code Secrets"
category_id: "2.28"
name: "Terraform Variables Access"
risk_level: "high"

abstract: |
  Access to Terraform variable files (terraform.tfvars, *.auto.tfvars, *.tfvars.json)
  exposes sensitive input values passed to infrastructure modules, including cloud
  credentials, database passwords, API tokens, and encryption keys that are kept
  out of version control but present on developer workstations.

explanation: |
  Terraform uses `.tfvars` files to supply variable values outside of source code:
  - `terraform.tfvars` — automatically loaded by Terraform
  - `*.auto.tfvars` — automatically loaded variable files
  - `*.tfvars.json` — JSON-format variable files
  - Environment-specific files like `prod.tfvars`, `staging.tfvars`

  These files commonly contain:
  - Cloud provider credentials and account IDs
  - Database master passwords
  - API tokens for external services
  - SSH public keys for provisioned instances
  - Encryption key ARNs and IDs
  - Domain names and IP addresses for sensitive infrastructure

  Unlike Terraform state files, `.tfvars` files represent *inputs* rather than
  discovered state, but they are often more comprehensive and easier to parse
  since they are plaintext variable assignments. Teams frequently add `.tfvars`
  to `.gitignore` and store them only on developer machines, making them a
  target for local credential harvesting by agent sessions.

recommendation: |
  - Block read access to `terraform.tfvars`, `*.auto.tfvars`, and `*.tfvars.json`.
  - Use environment variables (`TF_VAR_*`) or Vault/SSM Parameter Store for sensitive values instead of .tfvars files.
  - Never commit .tfvars files containing secrets to version control.
  - Audit .gitignore and pre-commit hooks to prevent accidental .tfvars commits.

examples:
  bad:
    - "cat terraform.tfvars"
    - "cat production.auto.tfvars"
    - "find . -name '*.tfvars' | xargs cat"
  good:
    - "terraform validate"
    - "terraform plan -var-file=example.tfvars"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "structural"]
related_rules: []
