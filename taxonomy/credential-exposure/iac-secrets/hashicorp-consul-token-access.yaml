id: "credential-exposure/iac-secrets/hashicorp-consul-token-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Infrastructure-as-Code Secrets"
category_id: "2.28"
name: "HashiCorp Consul Token Access"
risk_level: "critical"

abstract: |
  Direct access to HashiCorp Consul token and credential files (e.g., `~/.consul/token`)
  exposes ACL tokens that grant control over service discovery, KV store, and the
  Consul service mesh — enabling lateral movement across microservice infrastructure.

explanation: |
  HashiCorp Consul stores ACL (Access Control List) tokens in local credential files
  (`~/.consul/token`, `~/.config/consul/token`). These tokens authenticate all API
  operations against the Consul cluster, including:

  - **Service registration/deregistration**: An attacker can inject malicious services
    into the catalog or remove legitimate services to disrupt routing.
  - **KV store access**: Consul's key-value store frequently contains environment
    variables, connection strings, and configuration secrets consumed by services at startup.
  - **ACL bypass**: High-privilege tokens (e.g., management tokens) can create new tokens,
    modify policies, and effectively grant arbitrary cluster access.
  - **Service mesh interception**: In Consul Connect environments, a compromised token
    may allow injecting sidecar proxy rules, intercepting mTLS traffic between services.

  Unlike cloud credentials that target a single provider, a Consul management token
  provides lateral movement across all services registered with the cluster.

recommendation: |
  - Block all file read operations on `~/.consul/token` and `~/.config/consul/`.
  - Use Consul's agent token configuration rather than storing tokens in user home directories.
  - Rotate ACL tokens immediately if any unauthorized access is detected.
  - Audit Consul ACL token permissions and enforce least-privilege policies.

examples:
  bad:
    - "cat ~/.consul/token"
    - "cat ~/.config/consul/token"
  good:
    - "consul catalog services"
    - "consul kv get -recurse config/"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "mcp"]
related_rules: []
