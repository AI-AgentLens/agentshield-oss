id: "credential-exposure/input-capture/userspace-keylogger"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Input Capture & Keylogging"
category_id: "2.15"
name: "Userspace Keylogger Library Installation & Use"
risk_level: "critical"

abstract: |
  AI agents coerced via prompt injection may install or invoke userspace keylogging
  libraries (pynput, keyboard, evdev) that install OS-level input hooks to capture
  every keystroke typed on the system — including passwords, API keys, and MFA codes
  entered in any application.

explanation: |
  High-level Python keylogging libraries provide a minimal API for capturing all
  keyboard input system-wide without requiring kernel modules or root privileges
  (Linux reads /dev/input directly; macOS uses the Accessibility API):

  - **pynput**: `keyboard.Listener(on_press=handler).start()` — hooks every key event
  - **keyboard**: `keyboard.hook(callback)` / `keyboard.on_press(callback)` — global capture
  - **evdev** (Linux): reads raw /dev/input/event* for keystrokes from any application

  Unlike TTY keylogging (which only captures shell session I/O), these libraries
  capture keystrokes from browsers, password managers, IDE editors, and any GUI
  application simultaneously. Captured data is typically written to /tmp or exfiltrated
  via a background HTTP request.

  Attack pattern:
  ```
  pip install pynput
  from pynput import keyboard
  listener = keyboard.Listener(on_press=lambda key: open('/tmp/.kl','a').write(str(key)))
  listener.start()
  listener.join()
  ```

  An AI agent executing this code (e.g., in a Jupyter notebook or via a shell) will
  silently begin capturing all user keystrokes, including master passwords, SSH
  passphrases, and cloud provider credentials.

recommendation: |
  - Block installation of known keylogging libraries (pynput, keyboard, evdev for input capture).
  - Monitor for processes reading /dev/input/* without a known UI framework context.
  - Alert on Accessibility API permission grants from non-standard processes (macOS).
  - Apply least-privilege: AI agent sandboxes should not have input device access.
  - Use static analysis to detect keylogger library imports in generated code.

examples:
  bad:
    - "pip install pynput keyboard"
    - "from pynput import keyboard; keyboard.Listener(on_press=cb).start()"
    - "import keyboard; keyboard.hook(lambda e: exfil(e.name))"
    - "python3 -c \"import keyboard; keyboard.on_press(print)\""
  good:
    - "pip install requests numpy pandas"
    - "from pynput import mouse"
    - "import readline"

