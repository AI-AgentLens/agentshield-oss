id: "credential-exposure/input-capture/tty-keylogging"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Input Capture & Keylogging"
category_id: "2.15"
name: "TTY Session Recording Keylogging"
risk_level: "high"

abstract: |
  Using the `script` command or similar TTY recorders to silently capture all terminal I/O
  including passwords, API keys, and MFA codes entered during interactive sessions. The
  recorded typescript file contains every keystroke, including those hidden by terminal
  echo suppression.

explanation: |
  The `script` utility records a complete transcript of a terminal session to a file.
  When invoked with `-q` (quiet) and an output file, it silently captures all I/O without
  user notification. This includes:

  - Passwords typed at sudo/ssh prompts (visible in the raw typescript despite echo-off)
  - API keys and tokens entered at interactive prompts
  - MFA/TOTP codes typed during authentication
  - SSH private key passphrases

  Attack pattern:
  ```
  script -q /tmp/.sess.log        # silently start recording
  sudo -i                         # victim types root password — captured
  ssh user@prod                   # SSH passphrase captured
  ```

  The typescript file records raw terminal sequences including those sent during
  password entry when the terminal disables echo — the characters are still transmitted
  to the terminal master and are captured by `script`.

  Related tools with similar capability:
  - `ttyrec` / `ttyplay` — record/replay TTY sessions
  - `screen -L` — logging via GNU Screen
  - `tmux pipe-pane` — pipe tmux pane output to file

recommendation: |
  - Block `script` invocations with `-q` flag or output to suspicious paths (/tmp, /dev/shm).
  - Monitor for unexpected `script` processes in audit logs.
  - Alert on `script` combined with credential-accessing commands.
  - Prefer dedicated secrets management (vault, 1password-cli) over interactive credential entry.

examples:
  bad:
    - "script -q /tmp/.log"
    - "script -q -a /dev/shm/capture.log"
    - "script -c 'ssh admin@prod' /tmp/sess"
  good:
    - "script ~/terminal-session.log"
    - "script --help"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.5.34", "A.8.3"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: ["A.9.3", "A.9.4"]

references:
  mitre_attack: ["T1056.001"]
  cwe: ["CWE-200", "CWE-312"]

analyzers: ["regex", "structural"]
related_rules: []
