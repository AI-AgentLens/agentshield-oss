id: "credential-exposure/env-var-exposure/process-environ-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Environment Variable Exposure"
category_id: "2.27"
name: "Process Environment Variable Read"
risk_level: "high"

abstract: |
  Reading /proc/*/environ or using commands that dump another process's environment
  variables can expose secrets that are only present in memory during execution,
  including injected API tokens, database passwords, and dynamically resolved
  credentials never written to disk.

explanation: |
  On Linux systems, `/proc/<PID>/environ` contains the full environment of any
  running process, readable by processes with the same UID or root. Commands that
  exploit this include:
  - `cat /proc/1/environ` — reads the init process environment
  - `strings /proc/<PID>/environ` — extracts readable strings from process env
  - `xargs -0 -a /proc/<PID>/environ` — parses null-delimited env vars
  - `cat /proc/self/environ` — reads the current process's environment

  Processes running database migrations, CI/CD agents, or secret injection workflows
  commonly inject credentials as environment variables at runtime. These credentials
  may never be written to disk, making /proc/environ a privileged source of in-memory
  secrets that bypasses filesystem-based protection rules.

  This technique is distinct from dumping shell environment variables (covered under
  `secret-env-exposure`) because it targets other processes rather than the current
  shell session.

recommendation: |
  - Block read access to `/proc/*/environ` paths for non-diagnostic purposes.
  - Use mount namespaces and procfs restrictions to limit /proc visibility in agent containers.
  - Prefer secrets manager SDK injection over environment variables for sensitive credentials.
  - Audit access to /proc filesystem paths in security monitoring.

examples:
  bad:
    - "cat /proc/1/environ | tr '\\0' '\\n'"
    - "strings /proc/$(pgrep postgres)/environ"
    - "xargs -0 < /proc/self/environ"
  good:
    - "printenv PATH"
    - "env | grep GOPATH"

