id: "credential-exposure/password-manager/macos-keychain-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.18"
name: "macOS Keychain Credential Access"
risk_level: "critical"

abstract: |
  Access to the macOS Keychain database files (~/Library/Keychains/) exposes all
  credentials stored by the system — browser passwords, Wi-Fi passphrases, app
  secrets, and cryptographic certificates.

explanation: |
  macOS stores credentials in the Keychain, backed by encrypted SQLite databases:
  - `~/Library/Keychains/login.keychain-db` — user login keychain (unlocked on login)
  - `~/Library/Keychains/default.keychain` — default keychain
  - `/Library/Keychains/System.keychain` — system-wide keychain

  An agent reading these files can extract password entries when the keychain is
  unlocked, obtaining browser-saved passwords, SSH passphrases, application API
  keys, and TLS certificate private keys stored by the OS.

recommendation: |
  - Block read access to `~/Library/Keychains/` via MCP and shell rules.
  - Monitor `security` command invocations that dump keychain entries.
  - Use dedicated secrets managers (HashiCorp Vault, AWS Secrets Manager) for
    application secrets rather than macOS Keychain in agent environments.

examples:
  bad:
    - "cat ~/Library/Keychains/login.keychain-db"
    - "read_file path=~/Library/Keychains/default.keychain"
  good:
    - "security find-generic-password -s 'MyApp' -w"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1555.001"]
  cwe: ["CWE-312", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-macos-keychain", "mcp-sec-block-darwin-keychain"]
