id: "credential-exposure/password-manager/keepassxc-config-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.7"
name: "KeePassXC Config & Database Access"
risk_level: "high"

abstract: |
  Direct access to KeePassXC database files (.kdbx) or configuration directory
  exposes encrypted password stores and application settings that may reveal
  database paths, keyfile locations, and security settings.

explanation: |
  KeePassXC stores credentials in encrypted database files with the `.kdbx` extension
  and its application configuration under `~/.config/keepassxc/`. Direct file access
  to these resources is suspicious in two ways:

  1. **Database files (.kdbx)**: Even though the contents are encrypted, copying or
     exfiltrating the database file combined with a keyfile or weak master password
     allows offline brute-force attacks against all stored credentials.

  2. **Config directory (~/.config/keepassxc/)**: Contains `keepassxc.ini` with
     settings like recently opened database paths, remembered database file locations,
     security settings (auto-lock timeout, clipboard clear time), and browser
     integration state. This metadata aids targeted attacks.

  AI agents have no legitimate reason to read KeePassXC database files or config
  directory contents. Requests to do so may indicate data exfiltration attempts.

recommendation: |
  - Block read, copy, and move operations on `.kdbx` files outside the user's
    normal KeePassXC workflow.
  - Block read access to `~/.config/keepassxc/` directory contents.
  - Use `keepassxc-cli` with explicit scope rather than raw file access.
  - Audit any command that transfers `.kdbx` files over the network.

examples:
  bad:
    - "cat ~/Passwords.kdbx | base64"
    - "cp ~/Passwords.kdbx /tmp/backup.kdbx"
    - "cat ~/.config/keepassxc/keepassxc.ini"
  good:
    - "keepassxc-cli ls ~/Passwords.kdbx"
    - "ls ~/.config/keepassxc/"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1555.004", "T1552.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["sec-block-keepassxc-db-read", "sec-block-keepassxc-config-read"]
