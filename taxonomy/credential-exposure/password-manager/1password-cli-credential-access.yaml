id: "credential-exposure/password-manager/1password-cli-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.18"
name: "1Password CLI Credential Access"
risk_level: "critical"

abstract: |
  Access to 1Password CLI session tokens or config files enables unauthorized
  retrieval of all secrets stored in connected vaults, representing total credential
  compromise for any organization using 1Password for secrets management.

explanation: |
  The 1Password CLI (`op`) stores session tokens and configuration in:
  - `~/.config/op/` — CLI configuration and session state
  - `OP_SESSION_*` environment variables — active session tokens
  - `~/.op/` (legacy) — older CLI configuration

  An active `op` session token provides the same access as the authenticated user,
  enabling bulk export of all vault items. Attack vectors include:
  - Reading session token files to authenticate as the user
  - Using `op item list` / `op item get` to enumerate and dump vault contents
  - Injecting malicious values into vaults accessed by CI/CD pipelines

  1Password is widely used in enterprise environments to manage SSH keys, API tokens,
  database passwords, and cloud credentials — a single compromised session token
  can expose an entire organization's secrets estate.

recommendation: |
  - Block read access to `~/.config/op/` and `OP_SESSION_*` env variable exposure.
  - Use 1Password Service Accounts with minimal permissions for CI/CD.
  - Enable biometric re-authentication to limit session token lifetime.
  - Monitor for `op item export` or bulk vault enumeration commands.

examples:
  bad:
    - "cat ~/.config/op/config"
    - "op item list --vault Personal"
    - "op item get 'AWS Root' --fields password"
  good:
    - "op --version"
    - "op account list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.5.10"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1555.005", "T1552.001"]
  cwe: ["CWE-312", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-1password-cli-access"]
