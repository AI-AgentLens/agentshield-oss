id: "credential-exposure/password-manager/gopass-store-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.18"
name: "gopass Store Direct Credential Access"
risk_level: "high"

abstract: |
  Direct filesystem access to the gopass password store directory
  (`~/.local/share/gopass/stores/`) bypasses the `gopass` CLI's decryption guard and
  exposes GPG-encrypted credential files and store configuration that can be
  exfiltrated and cracked offline.

explanation: |
  gopass is a team-oriented password manager built on the same GPG-encrypted file
  store model as `pass`, with additional features for multi-user and multi-store
  setups. The default store lives at `~/.local/share/gopass/stores/root/` with
  configuration at `~/.config/gopass/config.yaml`. Direct access is dangerous for
  several reasons:

  - **Exfiltration + offline attack**: The `.gpg`-encrypted credential files can be
    copied and decrypted offline if the user's GPG private key is also obtained
    (e.g., from `~/.gnupg/`). AI agents may access both paths in sequence.
  - **Config reveals store topology**: `~/.config/gopass/config.yaml` exposes all
    configured stores (root + mounts), team signing keys, and sync remote URLs,
    enabling targeted attacks on other store locations.
  - **Multi-store exposure**: gopass supports mounted sub-stores (team vaults);
    accessing the config file reveals the full credential landscape for the user's
    team.
  - **Metadata leakage**: The directory tree structure (even without decryption)
    reveals credential categories and names (e.g., `work/aws/prod`, `team/db/staging`).

  The `gopass show` and `gopass list` CLI commands are separately blocked — this
  entry covers direct file access bypassing the CLI.

recommendation: |
  - Block all read and copy operations on `~/.local/share/gopass/` contents.
  - Block access to `~/.config/gopass/config.yaml` to prevent store topology disclosure.
  - Treat any command listing or transferring gopass `.gpg` files as a critical
    security incident.
  - Use separate GPG key rotation if a gopass store exfiltration is suspected.

examples:
  bad:
    - "cat ~/.config/gopass/config.yaml"
    - "ls ~/.local/share/gopass/stores/"
    - "find ~/.local/share/gopass -name '*.gpg'"
    - "cp -r ~/.local/share/gopass /tmp/backup/"
  good:
    - "gopass ls"
    - "gopass show work/github"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1555.004", "T1552.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "mcp"]
related_rules: []
