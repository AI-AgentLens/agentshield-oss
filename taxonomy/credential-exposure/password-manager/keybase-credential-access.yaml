id: "credential-exposure/password-manager/keybase-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.18"
name: "Keybase Credential Access"
risk_level: "high"

abstract: |
  Access to Keybase credentials and cryptographic key material stored in
  ~/.config/keybase/ exposes PGP private keys, Keybase device keys, encrypted
  filesystem secrets, and team credentials used for end-to-end encrypted
  communications and secure file storage.

explanation: |
  Keybase stores sensitive configuration and key material in `~/.config/keybase/`:
  - Device keys used to authenticate the Keybase device identity
  - Cached PGP key material
  - Keybase FS (KBFS) mount credentials
  - Team membership and shared key material

  Keybase integrates with GitHub, Twitter, and other identity providers, meaning
  that Keybase credential compromise may also facilitate account takeover on linked
  services. The device key stored in `~/.config/keybase/` is the root of trust for
  Keybase's end-to-end encryption; its theft allows impersonation of the user in
  all Keybase communications.

  Keybase teams frequently use KBFS for storing shared secrets, deployment keys,
  and sensitive documentation. Access to device credentials enables reading all
  team-shared files.

recommendation: |
  - Block read access to `~/.config/keybase/` directory.
  - Use hardware security keys (YubiKey) for Keybase device provisioning where possible.
  - Revoke compromised device keys immediately via `keybase device remove`.
  - Rotate any PGP keys or team secrets stored in Keybase KBFS if agent access is suspected.

examples:
  bad:
    - "cat ~/.config/keybase/config.json"
    - "ls ~/.config/keybase/ && find ~/.config/keybase -type f | xargs cat"
    - "find ~/.config/keybase -name '*.bin' | xargs hexdump"
  good:
    - "keybase status"
    - "keybase id myusername"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]
  iso-42001-2023: ["8.4"]

references:
  mitre_attack: ["T1555", "T1552"]
  cwe: ["CWE-522", "CWE-312"]

analyzers: ["regex", "structural"]
related_rules: []
