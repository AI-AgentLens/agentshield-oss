id: "credential-exposure/password-manager/bitwarden-cli-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.18"
name: "Bitwarden CLI Credential Access"
risk_level: "critical"

abstract: |
  Access to Bitwarden CLI session tokens, config files, or SQLite vault databases
  enables unauthorized retrieval of all stored passwords and secrets, representing
  complete credential exposure for users and organizations on Bitwarden.

explanation: |
  The Bitwarden CLI (`bw`) stores session state and vault data in:
  - `BW_SESSION` environment variable — active session token for unlocked vault
  - `~/.config/Bitwarden CLI/` — CLI configuration
  - `~/Library/Application Support/Bitwarden/data.json` (macOS) — encrypted vault
  - `~/.config/Bitwarden/data.json` (Linux) — encrypted vault

  An active `BW_SESSION` token grants the same access as the authenticated user
  against the unlocked vault. Attack patterns include:
  - Reading `BW_SESSION` from environment to authenticate subsequent `bw` commands
  - Using `bw list items` to enumerate all vault items
  - Using `bw get item <id>` to export individual passwords
  - Accessing the SQLite database if the vault is cached locally

  Bitwarden is commonly used in open-source projects and developer teams, making
  it a high-value target for AI agent credential harvesting.

recommendation: |
  - Block exposure of `BW_SESSION` environment variable.
  - Block read access to Bitwarden config and data directories.
  - Lock the vault (`bw lock`) when not in active use.
  - Use Bitwarden Secrets Manager for programmatic access with scoped service accounts.

examples:
  bad:
    - "echo $BW_SESSION"
    - "bw list items --search aws"
    - "cat ~/.config/Bitwarden\\ CLI/config"
  good:
    - "bw status"
    - "bw lock"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.5.10"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MEASURE-2"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1555.005", "T1552.001"]
  cwe: ["CWE-312", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-bitwarden-access"]
