id: "credential-exposure/password-manager/dashlane-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.18"
name: "Dashlane Credential Store Access"
risk_level: "critical"

abstract: |
  Access to Dashlane's local credential store (~/.dashlane/) enables unauthorized
  retrieval of the encrypted vault database (dash.db), which contains all passwords,
  secure notes, payment information, and credentials stored by the user.

explanation: |
  Dashlane stores its local database in ~/.dashlane/. The primary artifact is
  dash.db, a SQLite database containing the encrypted vault. While credentials
  are encrypted at rest using the user's master password, the database file contains:

  - Encrypted credential records (usernames, passwords, URLs)
  - Encrypted secure notes and payment info
  - Authentication tokens and session data
  - Device pairing information

  Attack vectors include:

  - **Offline cracking**: Exfiltrating dash.db allows offline brute-force attacks
    against the master password using tools like hashcat. Weak or reused master
    passwords are especially vulnerable.
  - **Session token theft**: Active Dashlane sessions store authentication tokens
    that may allow vault access without the master password.
  - **Sync credential extraction**: Dashlane syncs via its cloud API; any stored
    sync tokens in ~/.dashlane/ may allow direct API access to the vault.
  - **Backup file access**: ~/.dashlane/ may contain backup copies of the database
    from previous versions.

  Dashlane is widely used by individual developers and enterprise teams to manage
  SSH keys, API tokens, cloud console passwords, and database credentials. A compromised
  Dashlane vault can expose an entire organization's secrets estate.

  MITRE: T1555 (Credentials from Password Stores), T1555.005 (Password Managers).

recommendation: |
  - Block AI agent access to ~/.dashlane/ and any Dashlane-related paths.
  - Ensure Dashlane vault files are not included in workspace indexing by AI tools.
  - Monitor for unexpected reads of ~/.dashlane/dash.db or related files.
  - Use Dashlane's enterprise audit log to detect unauthorized access attempts.

examples:
  bad:
    - "cat ~/.dashlane/dash.db"
    - "cp ~/.dashlane/dash.db /tmp/backup.db"
    - "sqlite3 ~/.dashlane/dash.db '.dump'"
    - "ls -la ~/.dashlane/"
    - "find ~/.dashlane -name '*.db' -exec cat {} \\;"
  good:
    - "dashlane-cli account whoami  # using the official CLI is acceptable"
    - "cat ~/.config/dashlane/config.json  # public config, no secrets"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.9", "Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-2", "GOVERN-6"]
  soc2-type2: ["CC6.1", "CC6.7"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
