id: "credential-exposure/password-manager/pass-store-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Password Manager"
category_id: "2.7"
name: "Pass Store Direct Credential Access"
risk_level: "high"

abstract: |
  Direct filesystem access to the pass password store directory (`~/.password-store/`)
  bypasses the `pass` CLI's decryption guard and exposes GPG-encrypted credential
  files that can be exfiltrated and cracked offline.

explanation: |
  The Unix `pass` password manager stores GPG-encrypted credential files in
  `~/.password-store/`. While the individual `.gpg` files are encrypted, direct
  access to this directory is dangerous because:

  1. **Exfiltration + offline attack**: An attacker who obtains the GPG-encrypted
     files and the user's GPG private key can decrypt all stored passwords offline.
     AI agents may access both `~/.gnupg/` (for the private key) and
     `~/.password-store/` in sequence.

  2. **Metadata leakage**: The directory tree structure of `~/.password-store/`
     reveals credential categories and names (e.g., `work/aws/prod`, `personal/github`)
     even without decryption, enabling targeted social engineering.

  3. **Backup exfiltration**: Compressing or copying the entire store for
     "backup" purposes creates an unmonitored copy suitable for offline cracking.

  The `pass show` CLI is separately blocked — this rule covers direct file access
  that bypasses the CLI entirely.

recommendation: |
  - Block all read and copy operations on `~/.password-store/` contents.
  - Treat any command listing or transferring `.gpg` files from the password store
    as a critical security incident.
  - Use separate GPG key rotation if a pass store exfiltration is suspected.

examples:
  bad:
    - "ls ~/.password-store/"
    - "find ~/.password-store -name '*.gpg'"
    - "cp -r ~/.password-store /tmp/backup/"
  good:
    - "pass ls"
    - "pass show work/github"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34", "A.8.9"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1555.004", "T1552.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["regex", "structural"]
related_rules: ["sec-block-pass-store-direct"]
