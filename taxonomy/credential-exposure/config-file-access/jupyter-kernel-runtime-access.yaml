id: "credential-exposure/config-file-access/jupyter-kernel-runtime-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Config File Access"
category_id: "2.3"
name: "Jupyter Kernel Runtime Access"
risk_level: "high"

abstract: |
  Access to Jupyter kernel runtime connection files (~/.local/share/jupyter/runtime/)
  exposes kernel connection details including ports, authentication keys, and
  transport protocols that allow direct kernel hijacking.

explanation: |
  When a Jupyter kernel starts, it writes a connection file to
  `~/.local/share/jupyter/runtime/kernel-<uuid>.json`. This file contains:
  - `key` — HMAC authentication key for kernel messages
  - `ip`, `shell_port`, `iopub_port`, `stdin_port`, `control_port`, `hb_port` — ZMQ ports
  - `transport` — communication protocol (usually tcp)
  - `signature_scheme` — HMAC algorithm

  With this connection file, an attacker can directly connect to the kernel using
  the Jupyter wire protocol and execute arbitrary Python/R/Julia code in the
  running kernel session, bypassing the notebook web UI entirely.

recommendation: |
  - Block read access to `~/.local/share/jupyter/runtime/` via MCP and shell rules.
  - Use kernel gateway with proper authentication for shared environments.
  - Rotate kernel sessions if runtime files are accessed unexpectedly.

examples:
  bad:
    - "cat ~/.local/share/jupyter/runtime/kernel-abc123.json"
    - "read_file path=~/.local/share/jupyter/runtime/kernel-abc123.json"
  good:
    - "jupyter kernelspec list"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  soc2-type2: ["CC6.1", "CC6.8"]
