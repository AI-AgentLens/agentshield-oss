id: "credential-exposure/config-file-access/shell-init-credential-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Config File Access"
category_id: "2.3"
name: "Shell Init File Credential Access"
risk_level: "high"

abstract: |
  Access to shell initialization and configuration files (fish config.fish,
  nushell env.nu, zsh .zshenv, bash .bashrc, etc.) exposes credentials that
  developers export as environment variables or store directly in shell session
  startup scripts.

explanation: |
  Shell initialization files execute on every new shell session and are a common
  place for developers to export API keys, tokens, and service credentials for
  convenience. Affected files include:
  - Fish shell: `~/.config/fish/config.fish`, `~/.config/fish/conf.d/*.fish`
  - Nushell: `~/.config/nushell/env.nu`, `~/.nushell/env.nu`
  - Zsh: `~/.zshenv`, `~/.zprofile`, `~/.zshrc`
  - Bash: `~/.bashrc`, `~/.bash_profile`, `~/.profile`

  Common credential patterns found in these files:
  - `export API_KEY="sk-..."` (bash/zsh)
  - `set -x API_KEY "sk-..."` (fish)
  - `$env.API_KEY = "sk-..."` (nushell)
  - Database connection strings with embedded passwords
  - Cloud provider tokens (AWS, GCP, Azure CLI secrets)
  - GitHub PATs and other SCM tokens

  An AI agent with MCP read_file access can silently harvest all credentials
  stored in these files. Unlike dotenv files, shell init files execute
  automatically and developers often forget credentials placed there persist
  across all shell sessions.

recommendation: |
  - Block MCP read access to shell initialization files.
  - Use a secrets manager (Vault, 1Password CLI, `op run`) instead of
    exporting credentials in shell init files.
  - Store only non-sensitive shell configuration in init files.
  - Audit existing init files for credential exports using pattern matching.

examples:
  bad:
    - "cat ~/.config/fish/config.fish"
    - "cat ~/.config/nushell/env.nu"
    - "read_file path=/home/user/.config/fish/config.fish"
    - "read_file path=/home/user/.nushell/env.nu"
  good:
    - "cat ~/.config/fish/functions/fish_prompt.fish"
    - "op run -- my-script.sh"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312", "CWE-200"]

analyzers: ["mcp-policy"]
related_rules: ["mcp-sec-block-fish-config-read", "mcp-sec-block-nushell-config-read"]
