id: "credential-exposure/config-file-access/protected-path"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Config File Access"
category_id: "2.3"
name: "Protected Path Access"
risk_level: "high"

abstract: |
  Access to well-known credential and configuration file paths that consistently
  store authentication tokens, secrets, or sensitive access credentials across
  common developer tools and cloud providers.

explanation: |
  Many developer tools and cloud CLIs store credentials in predictable file paths
  that represent high-value targets for credential harvesting. Protected paths include:
  - Container registries: `~/.docker/config.json` — registry auth tokens
  - GitHub CLI: `~/.config/gh/hosts.yml` — GitHub PAT / OAuth tokens
  - npm: `~/.npmrc` — registry auth tokens and private package credentials
  - pip/PyPI: `~/.pypirc` — PyPI upload credentials
  - Kubernetes: `~/.kube/config` — cluster admin certificates and tokens
  - Netrc: `~/.netrc` — multi-service username/password store

  An agent reading these files can harvest credentials across multiple services
  simultaneously, enabling lateral movement from developer workstation to cloud
  infrastructure, container registries, and package repositories.

recommendation: |
  - Block read access to all well-known credential file paths in agent tool execution.
  - Use credential helpers (OS keychain, cloud-native credential managers) instead of
    storing tokens in plain-text config files.
  - Regularly audit which tools store credentials in dotfiles.

examples:
  bad:
    - "cat ~/.docker/config.json"
    - "cat ~/.config/gh/hosts.yml"
    - "cat ~/.npmrc"
    - "cat ~/.netrc"
  good:
    - "docker info"
    - "gh auth status"
    - "npm config get registry"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2"]

references:
  mitre_attack: ["T1552.001", "T1078.003"]
  cwe: ["CWE-312", "CWE-200", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-gen-protected-path-docker-configjson", "mcp-gen-protected-path-netrc", "mcp-gen-protected-path-config-gh"]
