id: "credential-exposure/config-file-access/jupyter-config-access"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Config File Access"
category_id: "2.3"
name: "Jupyter Config Access"
risk_level: "high"

abstract: |
  Access to Jupyter configuration files (~/.jupyter/) exposes notebook server
  tokens, hashed passwords, and extension secrets that grant full access to
  running Jupyter instances and their execution environments.

explanation: |
  Jupyter stores configuration in `~/.jupyter/`:
  - `~/.jupyter/jupyter_server_config.py` — server config with tokens and passwords
  - `~/.jupyter/jupyter_notebook_config.py` — notebook server config (legacy)
  - `~/.jupyter/lab/user-settings/` — JupyterLab user settings

  These files may contain:
  - `c.ServerApp.token` — authentication token granting full server access
  - `c.ServerApp.password` — hashed password for the notebook server
  - API keys embedded in notebook configurations
  - Database connection strings in notebook-level configs

  Access to a Jupyter token grants the ability to execute arbitrary code in the
  server's environment, read all notebooks, and access any credentials available
  to the Jupyter process.

recommendation: |
  - Block read access to `~/.jupyter/` configuration files.
  - Use JupyterHub with proper authentication rather than single-user token auth.
  - Rotate Jupyter tokens if agent access is detected.

examples:
  bad:
    - "cat ~/.jupyter/jupyter_server_config.py"
    - "read_file path=~/.jupyter/jupyter_notebook_config.py"
  good:
    - "jupyter lab --version"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1"]
  soc2-type2: ["CC6.1"]
  iso-42001-2023: []

references:
  mitre_attack: ["T1552.001"]
  cwe: ["CWE-312", "CWE-522"]

analyzers: ["regex", "structural"]
related_rules: ["mcp-sec-block-jupyter-config"]
