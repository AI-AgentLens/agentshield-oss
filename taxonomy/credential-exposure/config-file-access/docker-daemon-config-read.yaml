id: "credential-exposure/config-file-access/docker-daemon-config-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Config File Access"
category_id: "2.4"
name: "Docker Daemon Config Read"
risk_level: "medium"

abstract: |
  Reading the Docker daemon configuration file can expose registry credentials,
  private registry endpoints, TLS certificate paths, and security policy settings
  that weaken container isolation or reveal infrastructure details.

explanation: |
  The Docker daemon configuration file (`~/.docker/daemon.json` or
  `/etc/docker/daemon.json`) controls Docker daemon behavior and may contain:

  - **Registry credentials**: `credHelpers` configuration pointing to credential
    helpers that store registry authentication tokens
  - **Registry mirrors**: Internal registry endpoints that may be on-premises
  - **TLS configuration**: Paths to CA certificates, client certificates, and
    private keys used for authenticated daemon access
  - **Security policies**: `seccomp-profile`, `userns-remap`, `no-new-privileges`
    settings — reading these reveals attack surface
  - **Insecure registries**: List of registries accepting HTTP (unencrypted),
    useful for man-in-the-middle targeting

  Note: `~/.docker/config.json` (user-level auth) is separately protected.
  This entry covers daemon-level configuration which is distinct.

recommendation: |
  - Audit access to Docker daemon configuration files.
  - Use credential helpers (`docker-credential-*`) instead of plaintext auth.
  - Restrict daemon.json to root-readable only (`chmod 600 /etc/docker/daemon.json`).

examples:
  bad:
    - "cat ~/.docker/daemon.json"
    - "cat /etc/docker/daemon.json"
  good:
    - "docker info"
    - "docker system info --format '{{.SecurityOptions}}'"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1"]

references:
  mitre_attack: ["T1552.001", "T1083"]
  cwe: ["CWE-200", "CWE-312"]

analyzers: ["regex"]
related_rules: ["sec-audit-docker-daemon-config"]
