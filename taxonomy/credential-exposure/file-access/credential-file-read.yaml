id: "credential-exposure/file-access/credential-file-read"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Credential File Access via Symlink"
category_id: "2.14"
name: "Credential File Read via Symlink (TOCTOU)"
risk_level: "critical"

abstract: |
  An AI agent creates a symbolic link pointing at a protected credential or
  authentication file (`~/.ssh/id_rsa`, `~/.aws/credentials`, `/etc/shadow`,
  etc.) to bypass path-based access controls through a TOCTOU race condition.

explanation: |
  Path-based access controls (AgentShield protected_paths, AppArmor profiles,
  file ACLs) operate on the path presented at check time. By creating a symlink
  from an innocuous-looking path to a protected file, an agent can satisfy the
  check with the symlink path, then read the sensitive target through it.

  Classic attack pattern:
  ```
  ln -s ~/.ssh/id_rsa /tmp/report.txt          # create symlink
  cat /tmp/report.txt                           # read actual private key
  ```

  The TOCTOU window is the gap between the path check (innocuous) and the
  subsequent read (actual credential). This attack is distinct from direct
  credential reads ŌĆö it uses a two-step indirection to evade detection.

  Affected files:
  - SSH private keys (`~/.ssh/id_rsa`, `id_ed25519`, etc.)
  - AWS credentials (`~/.aws/credentials`, `~/.aws/config`)
  - GCP / GKE configs (`~/.config/gcloud/`, `~/.kube/config`)
  - GPG keyrings (`~/.gnupg/`)
  - System auth files (`/etc/shadow`, `/etc/passwd`)
  - Generic token/secret files (`*token*`, `*secret*`, `*credentials*`)

recommendation: |
  - Block `ln -s` commands targeting protected credential paths.
  - Harden the runtime environment with a read-only bind mount for `~/.ssh`, `~/.aws`, etc.
  - Resolve symlinks before path checks (use `realpath` or `O_NOFOLLOW` in file opens).
  - Monitor symlink creation with inotify or auditd for forensic analysis.

examples:
  bad:
    - "ln -s ~/.ssh/id_rsa /tmp/backup.key"
    - "ln -sf $HOME/.aws/credentials /var/tmp/creds.txt"
    - "ln --symbolic ~/.kube/config /tmp/kubeconf"
  good:
    - "ln -s /usr/share/doc/README /tmp/readme"
    - "ln -s /opt/app/config.yaml /etc/app/config.yaml"

compliance:
  owasp-llm-2025: ["LLM02", "LLM06"]
  iso-27001-2022: ["A.5.34", "A.8.3", "A.8.4"]
  eu-ai-act-2024: ["Art.15", "Art.9"]
  nist-ai-rmf-1.0: ["MANAGE-1", "MANAGE-2"]
  soc2-type2: ["CC6.1", "CC6.6"]
  iso-42001-2023: ["A.3.3", "6.1.2", "9.1"]

references:
