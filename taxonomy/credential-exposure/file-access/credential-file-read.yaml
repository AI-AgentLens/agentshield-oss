  cwe: ["CWE-367", "CWE-200", "CWE-59"]
  external:
    - title: "CWE-367: Time-of-check Time-of-use (TOCTOU) Race Condition"
      url: "https://cwe.mitre.org/data/definitions/367.html"
    - title: "CWE-59: Improper Link Resolution Before File Access"
      url: "https://cwe.mitre.org/data/definitions/59.html"

analyzers: ["regex"]
related_rules: ["ts-block-symlink-credential-files"]
