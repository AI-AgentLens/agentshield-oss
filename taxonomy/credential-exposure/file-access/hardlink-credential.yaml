id: "credential-exposure/file-access/hardlink-credential"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Credential File Access via Symlink"
category_id: "2.14"
name: "Hardlink to Credential File"
risk_level: "high"

abstract: |
  Creating a hardlink to a credential file allows reading that file through an
  innocuous-looking path, bypassing path-based access control rules that block
  direct access to well-known credential locations such as ~/.ssh/id_rsa or
  ~/.aws/credentials.

explanation: |
  Unlike symbolic links, hardlinks create an additional directory entry pointing
  to the same inode as the original file. A hardlink to a credential file:
  - Is indistinguishable from the original file at the filesystem level
  - Can be placed anywhere the attacker has write access (e.g., /tmp/)
  - Remains valid even if the original file is deleted (the inode persists)
  - Bypasses path-based rules that only check for known credential paths

  Example attack chain:
  ```
  ln ~/.ssh/id_rsa /tmp/innocent_file
  cat /tmp/innocent_file   # reads SSH private key without triggering ~/.ssh/ rules
  ```

  Hardlinks cannot cross filesystem boundaries, so this technique is limited to
  files on the same filesystem. However, on typical developer workstations, SSH
  keys, AWS credentials, and other sensitive files share a filesystem with writable
  temporary directories.

  This technique is related to TOCTOU (time-of-check-time-of-use) attacks and can
  also be used to maintain a readable copy of a credential after the original is
  deleted or rotated.

recommendation: |
  - Block `ln` commands that target known credential paths as the source.
  - Monitor inode link counts on credential files; unexpected counts above 1 indicate hardlinks.
  - Use filesystem-level controls (chattr +i) to prevent hardlink creation to credential files.
  - Prefer content-based detection rules over path-only rules to catch credential access via alternate paths.

examples:
  bad:
    - "ln ~/.ssh/id_rsa /tmp/id_rsa_backup"
    - "ln ~/.aws/credentials /tmp/creds"
    - "ln /etc/shadow /tmp/shadow_copy"
  good:
    - "cp ~/.ssh/id_rsa.pub /tmp/pub_key_share"
    - "ln -s /usr/local/bin/node /usr/local/bin/nodejs"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3", "A.8.11", "A.5.34"]
  eu-ai-act-2024: ["Art.15"]
  soc2-type2: ["CC6.1", "CC6.2", "C1.1"]

references:
  mitre_attack: ["T1552", "T1552.001"]
  cwe: ["CWE-59", "CWE-732"]

analyzers: ["regex", "structural"]
related_rules: []
