id: "credential-exposure/clipboard/clipboard-data-exposure"
version: "1.0.0"
kingdom: "Credential & Secret Exposure"
kingdom_id: 2
category: "Clipboard"
category_id: "2.4"
name: "Clipboard Data Exposure"
risk_level: "medium"

abstract: |
  Clipboard operations can expose sensitive data previously copied by the user,
  including passwords, API tokens, credit card numbers, or other secrets that were
  temporarily held in the system clipboard.

explanation: |
  Users routinely copy passwords from password managers, copy API keys from dashboards,
  or copy sensitive text for pasting elsewhere. The clipboard retains this content until
  overwritten. Tools that read the clipboard (pbpaste on macOS, xclip/xsel on Linux,
  clip.exe on Windows) can harvest whatever the user most recently copied.

  An AI agent accessing the clipboard has access to:
  - Passwords copied from a password manager
  - API keys copied from a provider dashboard
  - Two-factor authentication codes
  - Personally identifiable information copied for form filling

  This is a passive credential harvesting technique that requires no file access.

recommendation: |
  - Block clipboard read operations (pbpaste, xclip -o, xsel --output) in agent contexts.
  - Clear clipboard contents before and after agent sessions handling sensitive work.
  - Use clipboard managers with auto-clear timers for sensitive credentials.
  - Alert on clipboard access by non-interactive processes.

examples:
  bad:
    - "pbpaste"
    - "xclip -selection clipboard -o"
    - "xsel --clipboard --output"
  good:
    - "echo 'text' | pbcopy"
    - "echo 'result' | xclip -selection clipboard"

compliance:
  owasp-llm-2025: ["LLM02"]
  iso-27001-2022: ["A.8.3"]
  eu-ai-act-2024: ["Art.15"]
  nist-ai-rmf-1.0: ["MANAGE-1"]
  soc2-type2: ["CC6.1"]

references:
  mitre_attack: ["T1115"]
  cwe: ["CWE-200"]

analyzers: ["regex"]
related_rules: ["sec-audit-clipboard"]
