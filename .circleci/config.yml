version: 2.1

jobs:
  test:
    docker:
      - image: cimg/go:1.23
    steps:
      - checkout
      - restore_cache:
          keys:
            - go-mod-{{ checksum "go.sum" }}
      - run:
          name: Download dependencies
          command: go mod download
      - save_cache:
          key: go-mod-{{ checksum "go.sum" }}
          paths:
            - ~/go/pkg/mod
      - run:
          name: Run tests
          command: go test -v ./...
      - run:
          name: Vet
          command: go vet ./...
      - run:
          name: Build
          command: make build

  release:
    docker:
      - image: cimg/go:1.23
    steps:
      - checkout
      - restore_cache:
          keys:
            - go-mod-{{ checksum "go.sum" }}
      - run:
          name: Download dependencies
          command: go mod download
      - save_cache:
          key: go-mod-{{ checksum "go.sum" }}
          paths:
            - ~/go/pkg/mod
      - run:
          name: Run tests
          command: go test -v ./...
      - run:
          name: Install GoReleaser
          command: |
            curl -sfL https://goreleaser.com/static/run | bash -s -- --version
            curl -sfL https://goreleaser.com/static/run > /tmp/goreleaser
            chmod +x /tmp/goreleaser
      - run:
          name: Bump version tag
          command: |
            git fetch --tags
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            # Extract major.minor.patch
            MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
            echo "Bumping $LATEST → $NEW_TAG"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "export GORELEASER_CURRENT_TAG=$NEW_TAG" >> "$BASH_ENV"
      - run:
          name: Run GoReleaser
          command: |
            curl -sfL https://goreleaser.com/static/run | GITHUB_TOKEN=$GITHUB_TOKEN HOMEBREW_TAP_TOKEN=$HOMEBREW_TAP_TOKEN bash -s -- release --clean

workflows:
  test-and-release:
    jobs:
      - test
      # Uncomment to enable auto-release on push to main:
      # - release:
      #     requires:
      #       - test
      #     filters:
      #       branches:
      #         only: main
