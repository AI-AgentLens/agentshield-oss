version: 2

project_name: agentshield

before:
  hooks:
    - go mod tidy

builds:
  - id: agentshield
    main: ./cmd/agentshield
    binary: agentshield
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.Version={{.Version}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.GitCommit={{.ShortCommit}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.BuildDate={{.Date}}'

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - packs/*.yaml
      - packs/mcp/*.yaml
      - scripts/agentshield-wrapper.sh
      - configs/default_policy.yaml
      - src: compliance-bin/agentcompliance_{{ .Os }}_{{ .Arch }}/agentcompliance
        dst: .
        strip_parent: true

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

# macOS .app bundles and DMGs are built post-GoReleaser by CI:
#   VERSION={{.Version}} ./scripts/build-app.sh arm64
#   VERSION={{.Version}} ./scripts/build-app.sh amd64
#   VERSION={{.Version}} ./scripts/build-dmg.sh arm64
#   VERSION={{.Version}} ./scripts/build-dmg.sh amd64
# DMGs are uploaded alongside tar.gz archives to /releases/v{{.Version}}/
#
# Cask is generated by CI and pushed to homebrew-tap with aiagentlens.com download URLs
# (not using GoReleaser's homebrew_casks since the repo is private)
