version: 2

project_name: agentshield

before:
  hooks:
    - go mod tidy
    # Build agentcompliance from sibling AI_risk_compliance module
    - bash -c 'cd ../AI_risk_compliance && CGO_ENABLED=0 GOOS={{ .Env.GOOS | default "darwin" }} GOARCH={{ .Env.GOARCH | default "arm64" }} go build -ldflags="-s -w -X main.version={{.Version}}" -o ../AI_Agent_Shield/dist/agentcompliance ./cmd/comply'

builds:
  - id: agentshield
    main: ./cmd/agentshield
    binary: agentshield
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.Version={{.Version}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.GitCommit={{.ShortCommit}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.BuildDate={{.Date}}'

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - packs/*.yaml
      - packs/mcp/*.yaml
      - scripts/agentshield-wrapper.sh
      - configs/default_policy.yaml
      - dist/agentcompliance

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - name: agentshield
    repository:
      owner: AI-AgentLens
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/AI-AgentLens/AI_Agent_Shield"
    description: "Runtime security gateway and compliance scanner for LLM agents"
    license: "Apache-2.0"
    caveats: |
      Two tools installed:
        agentshield      — Runtime security gateway for AI agents
        agentcompliance  — Local compliance scanner (semgrep-based)

      Quick start:
        agentshield setup
        agentshield login
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agentshield"]
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agentcompliance"]
          end
