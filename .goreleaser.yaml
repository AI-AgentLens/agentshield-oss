version: 2

project_name: agentshield

before:
  hooks:
    - go mod tidy

builds:
  - id: agentshield
    main: ./cmd/agentshield
    binary: agentshield
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.Version={{.Version}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.GitCommit={{.ShortCommit}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.BuildDate={{.Date}}'

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - packs/*.yaml
      - packs/mcp/*.yaml
      - scripts/agentshield-wrapper.sh
      - configs/default_policy.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

homebrew_casks:
  - name: agentshield
    repository:
      owner: AI-AgentLens
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/security-researcher-ca/AI_Agent_Shield"
    description: "Local-first runtime security gateway for LLM agents"
    license: "Apache-2.0"
    caveats: |
      To set up AgentShield for your IDE agent:
        agentshield setup

      To install default policy packs:
        agentshield setup --install
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agentshield"]
          end
