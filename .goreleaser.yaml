version: 2

project_name: agentshield

before:
  hooks:
    - go mod tidy

builds:
  - id: agentshield
    main: ./cmd/agentshield
    binary: agentshield
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.Version={{.Version}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.GitCommit={{.ShortCommit}}'
      - -X 'github.com/security-researcher-ca/agentshield/internal/cli.BuildDate={{.Date}}'

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - packs/*.yaml
      - packs/mcp/*.yaml
      - scripts/agentshield-wrapper.sh
      - configs/default_policy.yaml

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - name: agentshield
    repository:
      owner: AI-AgentLens
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/AI-AgentLens/AI_Agent_Shield"
    description: "Local-first runtime security gateway for LLM agents"
    license: "Apache-2.0"
    install: |
      bin.install "agentshield"

      # Install wrapper script for IDE agent integration
      (share/"agentshield").install "scripts/agentshield-wrapper.sh"
      chmod 0755, share/"agentshield/agentshield-wrapper.sh"

      # Install default policy packs
      (share/"agentshield/packs").install Dir["packs/*.yaml"]
      (share/"agentshield/packs/mcp").install Dir["packs/mcp/*.yaml"]

      # Install default config
      (share/"agentshield").install "configs/default_policy.yaml"
    caveats: |
      To set up AgentShield for your IDE agent:
        agentshield setup

      To install default policy packs:
        agentshield setup --install

      Wrapper script installed to:
        #{share}/agentshield/agentshield-wrapper.sh
    test: |
      system "#{bin}/agentshield", "version"
