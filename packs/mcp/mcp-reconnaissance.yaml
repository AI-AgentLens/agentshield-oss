  # === AUDIT: Multi-agent orchestration config file access (issue #819) ===
  #
  # Taxonomy: reconnaissance/llm-introspection/multi-agent-topology-enumeration
  # OWASP LLM06 — Excessive Agency, LLM08 — Vector and Embedding Weaknesses
  # MITRE T1592 — Gather Victim Host Information, T1083 — File and Directory Discovery
  #
  # Multi-agent orchestration frameworks store their network topology — active
  # agents, their roles, tool assignments, and trust relationships — in
  # well-known config files:
  #   autogen_config.json / OAI_CONFIG_LIST    AutoGen agent registry
  #   .crew/config.yaml / crew.yaml            CrewAI agent roster
  #   langgraph.json / langgraph.yaml          LangGraph graph node definitions
  #   agent_config.yaml / agent-config.yaml    Generic multi-agent configs
  #   /.well-known/agent.json                  A2A protocol discovery endpoint
  #
  # An agent reading these files is mapping the network — learning which peer
  # agents exist, what tools they can invoke, and which agents are most
  # privileged. This topology map enables targeted follow-on attacks:
  # delegation forgery, cross-agent prompt injection, or privilege escalation
  # via a high-trust agent.
  #
  # AUDIT rather than BLOCK because legitimate orchestrators need to read
  # these configs during initialization. The AUDIT captures the access for
  # review, flagging unexpected reads by non-orchestrator agents.
  - id: mcp-recon-audit-multi-agent-topology-config
    taxonomy: "reconnaissance/llm-introspection/multi-agent-topology-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "read_resource"
      args_match:
        path:
          pattern_any:
            - "(?i)(^|/)autogen[_-]config\\.json$"
            - "(?i)(^|/)OAI_CONFIG_LIST(\\.json)?$"
            - "(?i)(^|/)\\.crew/.*\\.ya?ml$"
            - "(?i)(^|/)crew\\.ya?ml$"
            - "(?i)(^|/)langgraph\\.json$"
            - "(?i)(^|/)langgraph\\.ya?ml$"
            - "(?i)(^|/)agent[_-]config\\.ya?ml$"
            - "(?i)\\.well-known/agent\\.json$"
    decision: "AUDIT"
    confidence: 0.82
    reason: "MCP read of a multi-agent orchestration config file — these files (autogen_config.json, crew.yaml, langgraph.json, .well-known/agent.json) contain the agent network topology: which agents exist, their roles, and tool assignments. An agent reading these is mapping the multi-agent network for reconnaissance. OWASP LLM06/LLM08, MITRE T1592."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/workspace/autogen_config.json"}
        - tool: "cat_file"
          args: {"path": "/home/user/OAI_CONFIG_LIST"}
        - tool: "read_file"
          args: {"path": "/project/.crew/config.yaml"}
        - tool: "open_file"
          args: {"path": "/app/langgraph.json"}
        - tool: "read_file"
          args: {"path": "/server/.well-known/agent.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}
        - tool: "read_file"
          args: {"path": "/project/src/agents/agent_helper.py"}
        - tool: "read_file"
          args: {"path": "/docs/multi-agent-architecture.md"}

  # ------------------------------------------------------------------
  # System Auth & Audit Log Read (#839)
  # ------------------------------------------------------------------
  # Authentication logs contain SSH login attempts, sudo command history,
  # PAM events, and user login/logout records. The Linux Audit Daemon log
  # captures syscalls, file accesses, and user activity. Reading these
  # files provides an attacker with a detailed picture of active users,
  # privileged command history, and what the system is monitoring.
  #
  # wtmp/btmp are binary files recording successful and failed logins
  # respectively — equivalent to `last` and `lastb` output.
  #
  # AUDIT rather than BLOCK: legitimate admins read these for debugging.
  - id: mcp-recon-audit-auth-log-read
    taxonomy: "reconnaissance/system-enumeration/auth-log-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      args_match:
        path:
          pattern_any:
            - "^/var/log/auth\\.log(\\.\\d+|\\.gz)?$"
            - "^/var/log/secure(\\.\\d+|\\.gz)?$"
            - "^/var/log/audit/audit\\.log(\\.\\d+|\\.gz)?$"
            - "^/var/log/wtmp(\\.\\d+|\\.gz)?$"
            - "^/var/log/btmp(\\.\\d+|\\.gz)?$"
            - "^/var/log/faillog$"
            - "^/var/log/lastlog$"
    decision: "AUDIT"
    confidence: 0.88
    reason: "Read access to system authentication or audit logs — these files contain SSH login attempts, sudo command history, PAM events, and user session records. Reading them provides an attacker with a detailed reconnaissance picture of active accounts and privileged activity. MITRE T1552.007, T1087, T1057."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/log/auth.log"}
        - tool: "cat_file"
          args: {"path": "/var/log/secure"}
        - tool: "read_file"
          args: {"path": "/var/log/audit/audit.log"}
        - tool: "open_file"
          args: {"path": "/var/log/wtmp"}
        - tool: "read_file"
          args: {"path": "/var/log/btmp"}
        - tool: "view_file"
          args: {"path": "/var/log/auth.log.1"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/logs/app.log"}
        - tool: "read_file"
          args: {"path": "/var/log/nginx/access.log"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/auth-flow.md"}

  # ------------------------------------------------------------------
  # Cron Configuration File Read (#840)
  # ------------------------------------------------------------------
  # Reading cron configuration files reveals what scheduled tasks run
  # as root or other privileged users. Attackers use this to:
  #   - Identify privileged scripts they can target for tampering
  #   - Understand monitoring/backup schedules for evasion timing
  #   - Map infrastructure automation for lateral movement planning
  #
  # Note: WRITES to cron directories are already BLOCK-ed by
  # mcp-persist-block-user-cron-write and mcp-safety-block-etc-write.
  # This rule audits READ access for reconnaissance detection.
  - id: mcp-recon-audit-cron-config-read
    taxonomy: "reconnaissance/system-enumeration/cron-config-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      args_match:
        path:
          pattern_any:
            - "^/etc/crontab$"
            - "^/etc/cron\\.d/"
            - "^/etc/cron\\.(hourly|daily|weekly|monthly)/"
            - "^/var/spool/cron/"
            - "^/var/spool/cron/crontabs/"
    decision: "AUDIT"
    confidence: 0.85
    reason: "Read access to cron configuration files — these files reveal scheduled tasks, their execution timing, and what scripts run as privileged users. Used by attackers to identify writable privileged scripts (privilege escalation) or understand monitoring schedules (evasion). MITRE T1053.003, T1057, T1087."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/crontab"}
        - tool: "cat_file"
          args: {"path": "/etc/cron.d/logrotate"}
        - tool: "read_file"
          args: {"path": "/var/spool/cron/root"}
        - tool: "open_file"
          args: {"path": "/etc/cron.daily/apt-compat"}
        - tool: "view_file"
          args: {"path": "/var/spool/cron/crontabs/ubuntu"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/cron-setup.md"}
        - tool: "read_file"
          args: {"path": "/workspace/scripts/cron_helper.sh"}
        - tool: "read_file"
          args: {"path": "/home/user/.config/myapp/config.yaml"}

  # ------------------------------------------------------------------
  # Credential File Discovery via find_files/glob (issue #868)
  # ------------------------------------------------------------------
  # MCP file-search tools (find_files, glob, list_files) can enumerate
  # credential files across the filesystem using wildcard patterns —
  # bypassing path-based blocking rules entirely. Unlike a direct read of
  # a known path, this attack DISCOVERS credential locations first.
  #
  # Examples:
  #   find_files pattern="**/id_rsa"     → locates all SSH private keys
  #   find_files pattern="**/.env"       → locates all .env files
  #   glob pattern="**/*.pem"            → locates all certificate/key files
  #
  # This is MITRE T1083 (File and Directory Discovery) used as reconnaissance
  # for credential theft (T1552), particularly T1552.001 (Credentials in Files).
  - id: mcp-recon-block-find-ssh-key-pattern
    taxonomy: "reconnaissance/credential-discovery/find-credential-files"
    match:
      tool_name_any:
        - "find_files"
        - "find"
        - "glob"
        - "list_files"
        - "search_files"
        - "file_search"
        - "search"
      args_match:
        pattern:
          pattern_any:
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\]|^)id_(rsa|ed25519|ecdsa|dsa)(\\.pub)?$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\])?id_(rsa|ed25519|ecdsa|dsa)$"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP file-search with SSH private key name pattern — scanning for id_rsa, id_ed25519, id_ecdsa files is a credential discovery technique that bypasses path-based rules by locating keys before accessing them. MITRE T1083, T1552.004."
    tests:
      tp:
        - tool: "find_files"
          args: {"pattern": "**/id_rsa"}
        - tool: "glob"
          args: {"pattern": "**/id_ed25519"}
        - tool: "find_files"
          args: {"pattern": "*/id_ecdsa"}
      tn:
        - tool: "find_files"
          args: {"pattern": "**/config.yaml"}
        - tool: "glob"
          args: {"pattern": "src/**/*.go"}

  - id: mcp-recon-block-find-credential-files
    taxonomy: "reconnaissance/credential-discovery/find-credential-files"
    match:
      tool_name_any:
        - "find_files"
        - "find"
        - "glob"
        - "list_files"
        - "search_files"
        - "file_search"
        - "search"
      args_match:
        pattern:
          pattern_any:
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\]|^)\\.env$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\]|^)credentials$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\]|^)\\.aws[/\\\\]credentials$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\]|^)\\.ssh[/\\\\]"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\])?\\*\\.pem$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\])?\\*\\.key$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\])?\\*\\.p12$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\])?\\*\\.pfx$"
            - "(?i)(\\*\\*[/\\\\]|\\*[/\\\\])?\\*\\.jks$"
    decision: "BLOCK"
    confidence: 0.93
    reason: "MCP file-search with credential file pattern — scanning for .env files, credential files, or certificate/key files is credential discovery reconnaissance that locates secrets before reading them. MITRE T1083, T1552.001."
    tests:
      tp:
        - tool: "find_files"
          args: {"pattern": "**/.env"}
        - tool: "glob"
          args: {"pattern": "**/*.pem"}
        - tool: "find_files"
          args: {"pattern": "**/*.key"}
        - tool: "search_files"
          args: {"pattern": "**/credentials"}
        - tool: "find_files"
          args: {"pattern": "**/.ssh/"}
      tn:
        - tool: "find_files"
          args: {"pattern": "**/*.go"}
        - tool: "glob"
          args: {"pattern": "src/**/*.ts"}
        - tool: "find_files"
          args: {"pattern": "**/README.md"}

  # ------------------------------------------------------------------
  # Credential-Hunting via grep_files/search_code (issue #869)
  # ------------------------------------------------------------------
  # MCP content-search tools (grep_files, search_code, search_files,
  # find_in_files) can be used to extract credential material from
  # codebases and filesystems without knowing the file path first.
  # This bypasses path-based blocking rules (which are file-location-
  # specific) by searching CONTENT for credential patterns.
  #
  # Two tiers of detection:
  #
  # BLOCK (high-confidence): Patterns that are unambiguously credential-
  # hunting — AWS key prefixes, PEM headers, service-specific token
  # prefixes. No legitimate developer task requires searching code for
  # these literal strings across all files.
  #
  # AUDIT (moderate-confidence): Generic credential assignment patterns
  # (password=, api_key =) that may appear in security-focused code
  # searches but warrant human review.
  #
  # MITRE T1552 (Unsecured Credentials), T1552.001 (Credentials in Files),
  # T1083 (File and Directory Discovery)
  - id: mcp-recon-block-grep-aws-key-pattern
    taxonomy: "reconnaissance/credential-discovery/content-search-credentials"
    match:
      tool_name_any:
        - "grep_files"
        - "grep"
        - "search_files"
        - "search_code"
        - "find_in_files"
        - "semantic_search"
        - "ripgrep"
        - "rg"
      args_match:
        pattern:
          pattern_any:
            - "(?i)\\bAKIA"
            - "(?i)\\bASIA"
            - "(?i)\\bAIDA"
            - "(?i)BEGIN (RSA|EC|DSA|OPENSSH|PRIVATE) (PRIVATE )?KEY"
            - "(?i)ghp_"
            - "(?i)github_pat_"
            - "(?i)glpat-"
            - "(?i)\\bsk-[A-Za-z0-9]"
            - "(?i)xoxb-"
            - "(?i)xoxp-"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP content-search with credential pattern — searching for AWS key prefixes, PEM headers, or service-specific token patterns across the filesystem is credential-hunting reconnaissance. No legitimate development task requires searching for these literal credential patterns. MITRE T1552, T1552.001."
    tests:
      tp:
        - tool: "grep_files"
          args: {"pattern": "AKIA[0-9A-Z]{16}"}
        - tool: "search_code"
          args: {"pattern": "BEGIN RSA PRIVATE KEY"}
        - tool: "find_in_files"
          args: {"pattern": "ghp_[A-Za-z0-9]+"}
        - tool: "grep"
          args: {"pattern": "ASIA[0-9A-Z]"}
      tn:
        - tool: "grep_files"
          args: {"pattern": "func handleLogin"}
        - tool: "search_code"
          args: {"pattern": "validateToken"}
        - tool: "grep_files"
          args: {"pattern": "TODO:"}

  - id: mcp-recon-audit-grep-credential-patterns
    taxonomy: "reconnaissance/credential-discovery/content-search-credentials"
    match:
      tool_name_any:
        - "grep_files"
        - "grep"
        - "search_files"
        - "search_code"
        - "find_in_files"
        - "ripgrep"
        - "rg"
      args_match:
        pattern:
          pattern_any:
            - "(?i)(password|passwd|secret|api.?key|access.?token)\\s*[=:]\\s*['\"]?[^{]"
            - "(?i)(AWS_SECRET|AWS_ACCESS_KEY|DATABASE_URL|DB_PASSWORD|DB_PASS)"
            - "(?i)private.?key"
    decision: "AUDIT"
    confidence: 0.80
    reason: "MCP content-search with generic credential pattern — searching for password assignments, API key patterns, or private key references across files may indicate credential harvesting. MITRE T1552.001."
    tests:
      tp:
        - tool: "grep_files"
          args: {"pattern": "password = "}
        - tool: "search_code"
          args: {"pattern": "AWS_SECRET_ACCESS_KEY"}
        - tool: "grep_files"
          args: {"pattern": "private_key = "}
      tn:
        - tool: "grep_files"
          args: {"pattern": "func validatePassword"}
        - tool: "search_code"
          args: {"pattern": "getConfigValue"}
