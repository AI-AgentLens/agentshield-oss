name: "MCP Reconnaissance & Discovery"
description: "Detect reconnaissance activity via MCP tool calls: filesystem enumeration, database schema discovery, and internal network probing"
version: "1.0.0"
author: "AgentShield Security Research"

rules:
  # === AUDIT: System directory enumeration ===
  - id: mcp-recon-audit-etc-listing
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "list_directory"
        - "list_files"
        - "read_directory"
        - "ls"
        - "dir"
        - "glob"
      argument_patterns:
        path: "/etc/**"
    decision: "AUDIT"
    reason: "Listing /etc/ system directory flagged — may enumerate config files containing credentials or system layout. MITRE T1083."
    tests:
      tp:
        - tool: "list_directory"
          args: {"path": "/etc/"}
        - tool: "glob"
          args: {"path": "/etc/ssh/"}
      tn:
        - tool: "list_directory"
          args: {"path": "/project/src/"}

  # === BLOCK: /proc/PID/environ and /proc/self/environ — process env var exposure (issue #42) ===
  #
  # /proc/<PID>/environ contains a NUL-separated snapshot of all environment
  # variables that a process was started with. These routinely include:
  #   - API keys (OPENAI_API_KEY, ANTHROPIC_API_KEY, STRIPE_SECRET_KEY)
  #   - Cloud credentials (AWS_SECRET_ACCESS_KEY, GOOGLE_APPLICATION_CREDENTIALS)
  #   - Database connection strings (DATABASE_URL, POSTGRES_PASSWORD)
  #   - CI/CD tokens (GITHUB_TOKEN, NPM_TOKEN, DOCKER_HUB_TOKEN)
  #
  # Unlike /proc/PID/status or /proc/net/* (which expose only process metadata),
  # /proc/PID/environ directly leaks plaintext secrets with a single file read.
  # This is MITRE T1552.007 (Unsecured Credentials: Container API) — and applies
  # equally in bare-metal environments, not just containers.
  #
  # /proc/self/environ is particularly dangerous for AI agents — it exposes the
  # secrets of the agent process itself (the very API keys the developer passed
  # to the agent via env vars).
  #
  # This rule must appear BEFORE mcp-recon-audit-proc-read so the more specific
  # BLOCK decision wins via most_restrictive_wins combiner.
  - id: mcp-recon-block-proc-environ
    taxonomy: "credential-exposure/env-var-exposure/process-environ-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "read_resource"
      argument_patterns:
        path: "/proc/**/environ"
    decision: "BLOCK"
    reason: "Access to /proc/PID/environ or /proc/self/environ is blocked — contains all environment variables of the target process in plaintext, including API keys, cloud credentials, and database passwords. MITRE T1552.007."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/proc/self/environ"}
        - tool: "cat_file"
          args: {"path": "/proc/1234/environ"}
      tn:
        - tool: "read_file"
          args: {"path": "/proc/self/status"}

  - id: mcp-recon-audit-proc-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_files"
        - "read_directory"
      argument_patterns:
        path: "/proc/**"
    decision: "AUDIT"
    reason: "Access to /proc filesystem flagged — can enumerate running processes, network connections, and memory maps. MITRE T1057."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/proc/net/tcp"}
        - tool: "list_directory"
          args: {"path": "/proc/1/"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/proc_utils.go"}

  - id: mcp-recon-audit-home-listing
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "list_directory"
        - "list_files"
        - "read_directory"
        - "ls"
        - "dir"
        - "glob"
      argument_patterns:
        path: "/home/*"
    decision: "AUDIT"
    reason: "Listing /home root-level user directory flagged — enumerates local user accounts. Deep project paths under /home are excluded to avoid noise on legitimate project work. MITRE T1083."
    tests:
      tp:
        - tool: "list_directory"
          args: {"path": "/home/user1"}
        - tool: "ls"
          args: {"path": "/home/admin"}
      tn:
        - tool: "list_directory"
          args: {"path": "/project/src/"}

  - id: mcp-recon-audit-os-release-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "/etc/os-release"
    decision: "AUDIT"
    reason: "Reading /etc/os-release to fingerprint OS version and distribution. MITRE T1082."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/os-release"}
        - tool: "cat_file"
          args: {"path": "/etc/os-release"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/VERSION"}

  - id: mcp-recon-audit-passwd-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "/etc/passwd"
    decision: "AUDIT"
    reason: "Reading /etc/passwd enumerates local user accounts — used to identify privilege escalation targets. MITRE T1087."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/passwd"}
        - tool: "cat_file"
          args: {"path": "/etc/passwd"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/data/users.csv"}

  - id: mcp-recon-audit-hosts-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "/etc/hosts"
    decision: "AUDIT"
    reason: "Reading /etc/hosts maps internal hostnames to IPs — used for lateral movement target identification. MITRE T1016."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/hosts"}
        - tool: "cat_file"
          args: {"path": "/etc/hosts"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/config/hosts.yaml"}

  # === BLOCK: MCP read of project .mcp.json — AI IDE MCP server config exfiltration ===
  #
  # Taxonomy: reconnaissance/osint/ai-ide-config-osint
  # OWASP LLM06 — Excessive Agency, LLM09 — Misinformation
  # MITRE T1552 — Unsecured Credentials, T1083 — File Discovery
  #
  # .mcp.json and .cursor/mcp.json define which MCP servers the agent connects to,
  # including server URLs, API key variable names, and tool schemas. Reading this
  # config via an MCP tool allows a compromised/malicious server to enumerate:
  #   - Other MCP server endpoints (lateral movement targets)
  #   - API key variable names (credential targeting)
  #   - Tool schemas (capability reconnaissance)
  #
  # Shell equivalent: sec-df-block-ai-config-exfil (PR #451)
  # NOTE: CLAUDE.md, .cursorrules, .windsurfrules are intentionally not blocked
  # here — they are used as TN examples in other rules (developers read them
  # routinely). Those files contain system prompts but not direct credentials.
  - id: mcp-recon-block-ai-mcp-config-read
    taxonomy: "reconnaissance/osint/ai-ide-config-osint"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/.mcp.json"
    decision: "BLOCK"
    reason: "Read access to .mcp.json is blocked — contains MCP server URLs, API key variable names, and tool schemas. Exfiltration enables lateral movement to other MCP servers and credential targeting. MITRE T1552, T1083."
    confidence: 0.90
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/workspace/.mcp.json"}
        - tool: "cat_file"
          args: {"path": "/home/user/project/.mcp.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}
        - tool: "read_file"
          args: {"path": "/workspace/package.json"}

  # === BLOCK: MCP read of .cursor/mcp.json ===
  - id: mcp-recon-block-cursor-mcp-config-read
    taxonomy: "reconnaissance/osint/ai-ide-config-osint"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/.cursor/mcp.json"
    decision: "BLOCK"
    reason: "Read access to .cursor/mcp.json is blocked — contains Cursor IDE MCP server configuration including URLs and API key names."
    confidence: 0.90
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/workspace/.cursor/mcp.json"}
        - tool: "cat_file"
          args: {"path": "/home/user/project/.cursor/mcp.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/.cursor/rules.json"}
        - tool: "read_file"
          args: {"path": "/workspace/src/mcp.json"}

  # === BLOCK: MCP read of AgentShield policy file ===
  #
  # Reading the deployed security policy exposes which commands are blocked/audited,
  # enabling an attacker to craft bypasses that fall below the detection threshold.
  - id: mcp-recon-block-agentshield-policy-read
    taxonomy: "reconnaissance/osint/ai-ide-config-osint"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/.agentshield/policy.yaml"
    decision: "BLOCK"
    reason: "Read access to ~/.agentshield/policy.yaml is blocked — reveals AgentShield security controls and block/allow decisions, enabling bypass construction. MITRE T1518.001 (Security Software Discovery)."
    confidence: 0.92
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.agentshield/policy.yaml"}
        - tool: "cat_file"
          args: {"path": "/root/.agentshield/policy.yaml"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/agentshield/policy.yaml.example"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/policy.yaml"}

  # === AUDIT: Hardware fingerprinting via /sys/class/dmi ===
  # The Linux /sys/class/dmi/id/ pseudo-filesystem exposes machine-specific
  # hardware identifiers: product_uuid (machine UUID), board_serial (motherboard
  # serial), product_serial, and BIOS metadata. Attackers read these to
  # fingerprint the host, correlate with other intel, or detect sandbox/VM
  # environments before releasing a payload. /sys/class/net/*/address exposes
  # interface MAC addresses — uniquely identifies the machine on the network.
  # MITRE T1082 — System Information Discovery
  - id: mcp-recon-audit-sys-hardware-fingerprint
    taxonomy: "reconnaissance/system-discovery/hardware-fingerprinting"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/sys/class/dmi/id/**"
    decision: "AUDIT"
    reason: "Access to /sys/class/dmi/id/ is flagged — exposes machine UUID, serial numbers, and BIOS metadata used to fingerprint the host or detect sandboxes. MITRE T1082."
    confidence: 0.85
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/sys/class/dmi/id/product_uuid"}
        - tool: "cat_file"
          args: {"path": "/sys/class/dmi/id/board_serial"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/README.md"}
        - tool: "read_file"
          args: {"path": "/sys/bus/usb/devices/1-1/idVendor"}

  # === AUDIT: Network interface MAC address access ===
  # Reading MAC addresses from /sys/class/net/<iface>/address uniquely identifies
  # the machine on the network. Used in fingerprinting and sandbox-detection
  # payloads. AI agents have no legitimate need to read hardware MAC addresses.
  # MITRE T1016 — System Network Configuration Discovery
  - id: mcp-recon-audit-sys-mac-address
    taxonomy: "reconnaissance/network-discovery/network-interface-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/sys/class/net/*/address"
    decision: "AUDIT"
    reason: "Access to /sys/class/net/<iface>/address is flagged — exposes hardware MAC addresses used for host fingerprinting. MITRE T1016."
    confidence: 0.85
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/sys/class/net/eth0/address"}
        - tool: "cat_file"
          args: {"path": "/sys/class/net/wlan0/address"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/README.md"}
        - tool: "read_file"
          args: {"path": "/sys/class/net/eth0/speed"}

# === Structural rules for URL and query-based reconnaissance ===
structural_rules:
  # === AUDIT: Localhost/loopback internal service probing ===
  - id: mcp-recon-audit-localhost-probe
    taxonomy: "reconnaissance/network-discovery/internal-service-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)https?://localhost(:[0-9]+)?"
            - "(?i)https?://127\\.0\\.0\\.1(:[0-9]+)?"
    decision: "AUDIT"
    reason: "HTTP probe to localhost or 127.0.0.1 flagged — may enumerate internal services (admin panels, dev servers, management APIs). LLM02, MITRE T1046."
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "http://localhost:8080/admin"}
        - tool: "http_get"
          args: {"url": "http://127.0.0.1:3000/api/v1/status"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.example.com/data"}

  # === BLOCK: Sensitive Spring Boot Actuator endpoints (credential exposure) ===
  - id: mcp-recon-block-actuator-credentials
    taxonomy: "reconnaissance/web-application/admin-endpoint-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)/actuator/heapdump"
            - "(?i)/actuator/env"
            - "(?i)/actuator/configprops"
            - "(?i)/actuator/mappings"
            - "(?i)/actuator/logfile"
    decision: "BLOCK"
    reason: "Spring Boot Actuator credential-exposing endpoint blocked — /actuator/heapdump and /actuator/env directly leak secrets, passwords, and API keys. LLM02, CWE-200, MITRE T1082."
    confidence: 0.95
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "http://app.internal:8080/actuator/heapdump"}
        - tool: "http_get"
          args: {"url": "https://prod.example.com/actuator/env"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.example.com/actuator/health"}

  # === BLOCK: Kubernetes secrets API access ===
  - id: mcp-recon-block-k8s-secrets
    taxonomy: "reconnaissance/web-application/admin-endpoint-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)/api/v1/secrets"
            - "(?i)/api/v1/namespaces/[^/]+/secrets"
            - "(?i)/api/v1/serviceaccounts"
            - "(?i)/apis/rbac\\.authorization\\.k8s\\.io"
    decision: "BLOCK"
    reason: "Kubernetes secrets API access blocked — exposes cluster secrets, service account tokens, and RBAC configuration. LLM02, CWE-284, MITRE T1213."
    confidence: 0.95
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "https://k8s.internal:6443/api/v1/secrets"}
        - tool: "http_get"
          args: {"url": "https://cluster.local/api/v1/namespaces/default/secrets"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://k8s.internal:6443/api/v1/pods"}

  # === AUDIT: Spring Boot Actuator endpoint probing ===
  - id: mcp-recon-audit-spring-actuator
    taxonomy: "reconnaissance/web-application/admin-endpoint-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)/actuator(/|$)"
    decision: "AUDIT"
    reason: "Spring Boot Actuator endpoint access flagged — exposes application metrics, env vars, heap dumps, and config. LLM02, MITRE T1082."
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "http://app.internal:8080/actuator/"}
        - tool: "http_get"
          args: {"url": "https://prod.example.com/actuator"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.example.com/api/v1/users"}

  # === AUDIT: Generic management and admin paths ===
  - id: mcp-recon-audit-admin-paths
    taxonomy: "reconnaissance/web-application/admin-endpoint-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)/management(/|$)"
            - "(?i)/console(/|$)"
            - "(?i)/_debug(/|$)"
            - "(?i)/_admin(/|$)"
            - "(?i)/admin(/|$)"
            - "(?i)/__admin(/|$)"
    decision: "AUDIT"
    reason: "Generic management or admin path access flagged — control plane endpoints may expose sensitive config, operational data, or debug interfaces. Note: /dashboard excluded due to high FP rate in web applications. LLM02, MITRE T1082."
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "http://app.internal/admin/settings"}
        - tool: "http_get"
          args: {"url": "https://prod.example.com/_debug/vars"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.example.com/api/v1/products"}

  # === AUDIT: Database schema enumeration ===
  # Scoped to tools explicitly named for reconnaissance-style operations.
  # Standard ORM migration tools (execute_query, run_sql) are excluded because
  # information_schema access is routine in database migrations — scoping
  # to tool names that suggest exploratory/enumeration intent reduces FP rate.
  - id: mcp-recon-audit-db-schema-enum
    taxonomy: "reconnaissance/network-discovery/database-schema-enumeration"
    match:
      tool_name_any:
        - "db_query"
        - "sql_query"
        - "database_query"
        - "query_database"
        - "run_database_query"
        - "list_tables"
        - "list_databases"
        - "describe_table"
        - "show_tables"
        - "schema_info"
      args_match:
        query:
          pattern_any:
            - "(?i)information_schema"
            - "(?i)\\bSHOW\\s+TABLES\\b"
            - "(?i)\\bSHOW\\s+DATABASES\\b"
            - "(?i)pg_catalog\\.pg_tables"
            - "(?i)sqlite_master"
    decision: "AUDIT"
    reason: "Database schema enumeration query detected — maps table structure before targeted data extraction. Scoped to exploratory tool names to reduce ORM migration FP rate. LLM06, MITRE T1213."
    tests:
      tp:
        - tool: "db_query"
          args: {"query": "SELECT * FROM information_schema.tables"}
        - tool: "list_tables"
          args: {"query": "SHOW TABLES"}
      tn:
        - tool: "db_query"
          args: {"query": "SELECT id, name FROM users WHERE active = true"}

  # ============================================================
  # LLM Introspection: Model Fingerprinting via Boundary Probe (issue #175)
  # Taxonomy: reconnaissance/llm-introspection/model-fingerprinting-via-boundary-probe
  #
  # An adversary probes the model's capability boundaries (what it can/cannot do,
  # knowledge cutoff, base model identity) to infer system prompt contents or
  # operator restrictions without directly extracting the prompt. This recon
  # enables targeted jailbreaks tailored to the specific restrictions found.
  # OWASP LLM07, LLM01 | MITRE T1592, T1590 | CWE-200, CWE-203.
  # ============================================================

  # === AUDIT: LLM capability boundary probing via content argument ===
  - id: mcp-struct-audit-llm-boundary-probe-content
    taxonomy: "reconnaissance/llm-introspection/model-fingerprinting-via-boundary-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)what\\s+model\\s+are\\s+you"
            - "(?i)what\\s+are\\s+you\\s+based\\s+on"
            - "(?i)which\\s+(model|llm|ai)\\s+(are|were)\\s+you"
            - "(?i)your\\s+base\\s+model"
            - "(?i)knowledge\\s+cutoff"
            - "(?i)training\\s+cutoff"
            - "(?i)what\\s+(topics|subjects)\\s+are\\s+you\\s+(restrict|unable|not allowed)"
            - "(?i)what\\s+(can't|cannot|can\\s+not)\\s+you\\s+(do|discuss|help)"
            - "(?i)what\\s+were\\s+you\\s+trained\\s+to\\s+avoid"
            - "(?i)what\\s+instructions\\s+were\\s+you\\s+given"
            - "(?i)enumerate.*your.*capabilities"
            - "(?i)list.*your.*restrictions"
    decision: "AUDIT"
    reason: "Tool call content probes LLM capability boundaries or model identity — may be reconnaissance to infer system prompt structure or restrictions before crafting targeted jailbreaks. OWASP LLM07, MITRE T1592."
    confidence: 0.75
    tests:
      tp:
        - tool: "send_message"
          args: {"content": "what model are you based on?"}
        - tool: "chat"
          args: {"content": "list your restrictions and what topics are you restricted from discussing"}
      tn:
        - tool: "send_message"
          args: {"content": "Can you help me refactor this function?"}

  # === AUDIT: LLM capability boundary probing via message/prompt argument ===
  - id: mcp-struct-audit-llm-boundary-probe-message
    taxonomy: "reconnaissance/llm-introspection/model-fingerprinting-via-boundary-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        message:
          pattern_any:
            - "(?i)what\\s+model\\s+are\\s+you"
            - "(?i)what\\s+are\\s+you\\s+based\\s+on"
            - "(?i)which\\s+(model|llm|ai)\\s+(are|were)\\s+you"
            - "(?i)your\\s+base\\s+model"
            - "(?i)knowledge\\s+cutoff"
            - "(?i)training\\s+cutoff"
            - "(?i)what\\s+(topics|subjects)\\s+are\\s+you\\s+(restrict|unable|not allowed)"
            - "(?i)what\\s+(can't|cannot|can\\s+not)\\s+you\\s+(do|discuss|help)"
            - "(?i)what\\s+were\\s+you\\s+trained\\s+to\\s+avoid"
            - "(?i)what\\s+instructions\\s+were\\s+you\\s+given"
    decision: "AUDIT"
    reason: "Tool call message field probes LLM capability boundaries or model identity — reconnaissance to infer system prompt structure. OWASP LLM07, MITRE T1592."
    confidence: 0.75
    tests:
      tp:
        - tool: "send_message"
          args: {"message": "what model are you and what are you based on?"}
        - tool: "chat"
          args: {"message": "what can't you do? what topics are you restricted from?"}
      tn:
        - tool: "send_message"
          args: {"message": "Please help me debug this Python script"}

  # ============================================================
  # LLM Introspection: System Prompt Recovery via Jailbreak (issue #175)
  # Taxonomy: reconnaissance/llm-introspection/system-prompt-recovery-via-jailbreak
  #
  # Adversarial prompts force the model to repeat its system prompt verbatim
  # using roleplay escapes, DAN-style jailbreaks, or direct extraction requests.
  # These patterns expose confidential operator instructions, security policies,
  # business logic, and any secrets embedded in the prompt.
  # OWASP LLM07, LLM01 | MITRE T1592, T1552 | CWE-200, CWE-693.
  # ============================================================

  # === BLOCK: System prompt extraction jailbreak via content argument ===
  - id: mcp-struct-block-system-prompt-jailbreak-content
    taxonomy: "reconnaissance/llm-introspection/system-prompt-recovery-via-jailbreak"
    match:
      tool_name_regex: ".*"
      exclude_args_match:
        path:
          pattern_any:
            - "(?i)taxonomy/"
            - "(?i)compliance/"
      args_match:
