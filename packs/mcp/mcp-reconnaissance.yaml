name: "MCP Reconnaissance & Discovery"
description: "Detect reconnaissance activity via MCP tool calls: filesystem enumeration, database schema discovery, and internal network probing"
version: "1.0.0"
author: "AgentShield Security Research"

rules:
  # === AUDIT: System directory enumeration ===
  - id: mcp-recon-audit-etc-listing
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "list_directory"
        - "list_files"
        - "read_directory"
        - "ls"
        - "dir"
        - "glob"
      argument_patterns:
        path: "/etc/**"
    decision: "AUDIT"
    reason: "Listing /etc/ system directory flagged — may enumerate config files containing credentials or system layout. MITRE T1083."
    tests:
      tp:
        - tool: "list_directory"
          args: {"path": "/etc/"}
        - tool: "glob"
          args: {"path": "/etc/ssh/"}
      tn:
        - tool: "list_directory"
          args: {"path": "/project/src/"}

  # === BLOCK: /proc/PID/environ and /proc/self/environ — process env var exposure (issue #42) ===
  #
  # /proc/<PID>/environ contains a NUL-separated snapshot of all environment
  # variables that a process was started with. These routinely include:
  #   - API keys (OPENAI_API_KEY, ANTHROPIC_API_KEY, STRIPE_SECRET_KEY)
  #   - Cloud credentials (AWS_SECRET_ACCESS_KEY, GOOGLE_APPLICATION_CREDENTIALS)
  #   - Database connection strings (DATABASE_URL, POSTGRES_PASSWORD)
  #   - CI/CD tokens (GITHUB_TOKEN, NPM_TOKEN, DOCKER_HUB_TOKEN)
  #
  # Unlike /proc/PID/status or /proc/net/* (which expose only process metadata),
  # /proc/PID/environ directly leaks plaintext secrets with a single file read.
  # This is MITRE T1552.007 (Unsecured Credentials: Container API) — and applies
  # equally in bare-metal environments, not just containers.
  #
  # /proc/self/environ is particularly dangerous for AI agents — it exposes the
  # secrets of the agent process itself (the very API keys the developer passed
  # to the agent via env vars).
  #
  # This rule must appear BEFORE mcp-recon-audit-proc-read so the more specific
  # BLOCK decision wins via most_restrictive_wins combiner.
  - id: mcp-recon-block-proc-environ
    taxonomy: "credential-exposure/env-var-exposure/process-environ-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "read_resource"
      argument_patterns:
        path: "/proc/**/environ"
    decision: "BLOCK"
    reason: "Access to /proc/PID/environ or /proc/self/environ is blocked — contains all environment variables of the target process in plaintext, including API keys, cloud credentials, and database passwords. MITRE T1552.007."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/proc/self/environ"}
        - tool: "cat_file"
          args: {"path": "/proc/1234/environ"}
      tn:
        - tool: "read_file"
          args: {"path": "/proc/self/status"}

  # === BLOCK: /proc/PID/mem — direct process memory access (T1003) ===
  #
  # /proc/PID/mem is the Linux kernel interface for reading and writing process
  # memory directly. Unlike other /proc paths, it exposes raw process RAM —
  # allowing an attacker to dump decrypted credentials, session tokens, private
  # keys, and password hashes that reside in memory. There is no legitimate
  # developer or MCP agent use case for reading raw process memory.
  #
  # This rule must appear BEFORE mcp-recon-audit-proc-read so the BLOCK
  # decision wins via most_restrictive_wins combiner.
  #
  # Examples:
  #   read_file /proc/self/mem      → dump own process memory
  #   read_file /proc/1/mem         → dump init/root process memory
  #   read_file /proc/1234/mem      → dump target process by PID
  - id: mcp-recon-block-proc-mem-access
    taxonomy: "reconnaissance/system-discovery/process-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "edit_file"
      argument_patterns:
        path: "/proc/*/mem"
    decision: "BLOCK"
    confidence: 0.96
    reason: "Access to /proc/PID/mem is blocked — this is the Linux process memory interface used for credential dumping (reading decrypted keys/tokens directly from RAM). No legitimate MCP agent operation requires raw process memory access. MITRE T1003."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/proc/self/mem"}
        - tool: "read_file"
          args: {"path": "/proc/1/mem"}
        - tool: "read_file"
          args: {"path": "/proc/1234/mem"}
      tn:
        - tool: "read_file"
          args: {"path": "/proc/self/status"}
        - tool: "read_file"
          args: {"path": "/proc/net/tcp"}

  # === BLOCK: /proc/keys and /proc/key-users — kernel keyring credential enumeration (issue #957) ===
  #
  # The Linux kernel keyring subsystem stores sensitive cryptographic material:
  #   - LUKS volume encryption keys (unlocked at boot, resident in kernel memory)
  #   - Kerberos/GSSAPI service tickets (domain auth credentials)
  #   - TLS private keys (apps using add_key(KEY_SPEC_PROCESS_KEYRING, ...))
  #   - SSH agent keys (some implementations use kernel keyring for key storage)
  #   - Database credentials (apps using libsecret with kernel keyring backend)
  #
  # /proc/keys lists all keys accessible to the current process — their descriptions,
  # types, permissions, and serial numbers. Key descriptions typically name the
  # service or credential (e.g., "krb5:..." for Kerberos, "lustre:..." for LUKS).
  # While the raw key material requires `keyctl read`, this listing reveals what
  # high-value credentials exist and their serial numbers for targeted extraction.
  #
  # /proc/key-users exposes key quotas per UID — used to enumerate which UIDs have
  # active keyrings worth targeting for credential theft.
  #
  # By contrast, /proc/1/environ is already BLOCKed by mcp-recon-block-proc-environ.
  # Kernel keyring entries deserve the same treatment — they are a privileged credential
  # store used specifically to prevent credentials from being paged to disk.
  #
  # MITRE T1552.004 — Unsecured Credentials: Private Keys (via kernel keyring)
  - id: mcp-recon-block-proc-keys-read
    taxonomy: "reconnaissance/credential-discovery/kernel-keyring-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/proc/keys"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Read access to /proc/keys blocked — lists all kernel keyring entries accessible to the current process, including descriptions and serial numbers of LUKS keys, Kerberos tickets, TLS private keys, and database credentials stored in the kernel keyring. Enables targeted credential enumeration via keyctl. MITRE T1552.004."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/proc/keys"}
        - tool: "cat_file"
          args: {"path": "/proc/keys"}
      tn:
        - tool: "read_file"
          args: {"path": "/proc/cpuinfo"}
        - tool: "read_file"
          args: {"path": "/project/docs/kernel-keys-overview.md"}

  - id: mcp-recon-block-proc-key-users-read
    taxonomy: "reconnaissance/credential-discovery/kernel-keyring-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/proc/key-users"
    decision: "BLOCK"
    confidence: 0.88
    reason: "Read access to /proc/key-users blocked — enumerates key quota and usage per UID, revealing which system accounts have active kernel keyrings worth targeting for credential theft. MITRE T1552.004."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/proc/key-users"}
        - tool: "view_file"
          args: {"path": "/proc/key-users"}
      tn:
        - tool: "read_file"
          args: {"path": "/proc/uptime"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/linux-proc-overview.md"}

  # === BLOCK: Physical memory device access (/dev/mem, /dev/port) ===
  # These character devices expose raw physical memory and hardware I/O ports.
  # Reading /dev/mem can extract encryption keys, credentials, and secrets from RAM.
  # /dev/port provides raw x86 hardware I/O port access used for privilege escalation.
  # No legitimate AI agent task requires direct hardware memory access.
  # MITRE T1003.007, T1068 | OWASP LLM02
  - id: mcp-recon-block-dev-mem-access
    taxonomy: "reconnaissance/system-discovery/memory-credential-dump"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "edit_file"
        - "create_file"
        - "append_file"
      argument_patterns:
        path: "/dev/mem"
    decision: "BLOCK"
    confidence: 0.97
    reason: "Access to /dev/mem is blocked — this character device provides raw read/write access to physical RAM, enabling extraction of encryption keys, in-memory credentials, and kernel secrets. MITRE T1003.007."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/dev/mem"}
        - tool: "write_file"
          args: {"path": "/dev/mem"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/README.md"}
        - tool: "read_file"
          args: {"path": "/dev/null"}

  # === BLOCK: /dev/port hardware I/O port access ===
  - id: mcp-recon-block-dev-port-access
    taxonomy: "privilege-escalation/kernel-exploit/hardware-io-port-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "edit_file"
        - "create_file"
        - "append_file"
      argument_patterns:
        path: "/dev/port"
    decision: "BLOCK"
    confidence: 0.97
    reason: "Access to /dev/port is blocked — this character device provides raw x86 hardware I/O port access, which can be used for privilege escalation and hardware-level attacks. No legitimate AI agent task requires hardware port I/O. MITRE T1068."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/dev/port"}
        - tool: "write_file"
          args: {"path": "/dev/port"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/config.yaml"}
        - tool: "read_file"
          args: {"path": "/dev/null"}

  # === BLOCK: Kernel debug filesystem (debugfs) access ===
  # /sys/kernel/debug/ exposes kernel tracing, eBPF programs, and ftrace.
  # An attacker can use this to intercept all system calls, dump memory maps,
  # read credentials from kernel memory, and monitor all process activity.
  # MITRE T1003.007, T1014 | OWASP LLM02
  - id: mcp-recon-block-debugfs-access
    taxonomy: "reconnaissance/system-discovery/kernel-debug-filesystem"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "edit_file"
        - "create_file"
        - "append_file"
      argument_patterns:
        path: "/sys/kernel/debug/**"
    decision: "BLOCK"
    confidence: 0.96
    reason: "Access to the kernel debug filesystem (/sys/kernel/debug/) is blocked — exposes kernel tracing (ftrace), eBPF maps, and memory subsystem internals that can be used to dump credentials, intercept system calls, and conduct kernel-level surveillance. MITRE T1003.007, T1014."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/sys/kernel/debug/tracing/trace_pipe"}
        - tool: "read_file"
          args: {"path": "/sys/kernel/debug/tracing/events"}
        - tool: "write_file"
          args: {"path": "/sys/kernel/debug/tracing/set_ftrace_filter"}
      tn:
        - tool: "read_file"
          args: {"path": "/sys/class/net/eth0/operstate"}
        - tool: "read_file"
          args: {"path": "/sys/block/sda/queue/scheduler"}

  - id: mcp-recon-audit-proc-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_files"
        - "read_directory"
      argument_patterns:
        path: "/proc/**"
    decision: "AUDIT"
    reason: "Access to /proc filesystem flagged — can enumerate running processes, network connections, and memory maps. MITRE T1057."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/proc/net/tcp"}
        - tool: "list_directory"
          args: {"path": "/proc/1/"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/proc_utils.go"}

  - id: mcp-recon-audit-home-listing
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "list_directory"
        - "list_files"
        - "read_directory"
        - "ls"
        - "dir"
        - "glob"
      argument_patterns:
        path: "/home/*"
    decision: "AUDIT"
    reason: "Listing /home root-level user directory flagged — enumerates local user accounts. Deep project paths under /home are excluded to avoid noise on legitimate project work. MITRE T1083."
    tests:
      tp:
        - tool: "list_directory"
          args: {"path": "/home/user1"}
        - tool: "ls"
          args: {"path": "/home/admin"}
      tn:
        - tool: "list_directory"
          args: {"path": "/project/src/"}

  - id: mcp-recon-audit-os-release-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "/etc/os-release"
    decision: "AUDIT"
    reason: "Reading /etc/os-release to fingerprint OS version and distribution. MITRE T1082."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/os-release"}
        - tool: "cat_file"
          args: {"path": "/etc/os-release"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/VERSION"}

  - id: mcp-recon-audit-passwd-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "/etc/passwd"
    decision: "AUDIT"
    reason: "Reading /etc/passwd enumerates local user accounts — used to identify privilege escalation targets. MITRE T1087."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/passwd"}
        - tool: "cat_file"
          args: {"path": "/etc/passwd"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/data/users.csv"}

  - id: mcp-recon-audit-hosts-read
    taxonomy: "reconnaissance/network-discovery/filesystem-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "/etc/hosts"
    decision: "AUDIT"
    reason: "Reading /etc/hosts maps internal hostnames to IPs — used for lateral movement target identification. MITRE T1016."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/hosts"}
        - tool: "cat_file"
          args: {"path": "/etc/hosts"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/config/hosts.yaml"}

  # === BLOCK: MCP read of project .mcp.json — AI IDE MCP server config exfiltration ===
  #
  # Taxonomy: reconnaissance/osint/ai-ide-config-osint
  # OWASP LLM06 — Excessive Agency, LLM09 — Misinformation
  # MITRE T1552 — Unsecured Credentials, T1083 — File Discovery
  #
  # .mcp.json and .cursor/mcp.json define which MCP servers the agent connects to,
  # including server URLs, API key variable names, and tool schemas. Reading this
  # config via an MCP tool allows a compromised/malicious server to enumerate:
  #   - Other MCP server endpoints (lateral movement targets)
  #   - API key variable names (credential targeting)
  #   - Tool schemas (capability reconnaissance)
  #
  # Shell equivalent: sec-df-block-ai-config-exfil (PR #451)
  # NOTE: CLAUDE.md, .cursorrules, .windsurfrules are intentionally not blocked
  # here — they are used as TN examples in other rules (developers read them
  # routinely). Those files contain system prompts but not direct credentials.
  - id: mcp-recon-block-ai-mcp-config-read
    taxonomy: "reconnaissance/osint/ai-ide-config-osint"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/.mcp.json"
    decision: "BLOCK"
    reason: "Read access to .mcp.json is blocked — contains MCP server URLs, API key variable names, and tool schemas. Exfiltration enables lateral movement to other MCP servers and credential targeting. MITRE T1552, T1083."
    confidence: 0.90
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/workspace/.mcp.json"}
        - tool: "cat_file"
          args: {"path": "/home/user/project/.mcp.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}
        - tool: "read_file"
          args: {"path": "/workspace/package.json"}

  # === BLOCK: MCP read of .cursor/mcp.json ===
  - id: mcp-recon-block-cursor-mcp-config-read
    taxonomy: "reconnaissance/osint/ai-ide-config-osint"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/.cursor/mcp.json"
    decision: "BLOCK"
    reason: "Read access to .cursor/mcp.json is blocked — contains Cursor IDE MCP server configuration including URLs and API key names."
    confidence: 0.90
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/workspace/.cursor/mcp.json"}
        - tool: "cat_file"
          args: {"path": "/home/user/project/.cursor/mcp.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/.cursor/rules.json"}
        - tool: "read_file"
          args: {"path": "/workspace/src/mcp.json"}

  # === BLOCK: MCP read of AgentShield policy file ===
  #
  # Reading the deployed security policy exposes which commands are blocked/audited,
  # enabling an attacker to craft bypasses that fall below the detection threshold.
  - id: mcp-recon-block-agentshield-policy-read
    taxonomy: "reconnaissance/osint/ai-ide-config-osint"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/.agentshield/policy.yaml"
    decision: "BLOCK"
    reason: "Read access to ~/.agentshield/policy.yaml is blocked — reveals AgentShield security controls and block/allow decisions, enabling bypass construction. MITRE T1518.001 (Security Software Discovery)."
    confidence: 0.92
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.agentshield/policy.yaml"}
        - tool: "cat_file"
          args: {"path": "/root/.agentshield/policy.yaml"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/agentshield/policy.yaml.example"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/policy.yaml"}

  # === AUDIT: Hardware fingerprinting via /sys/class/dmi ===
  # The Linux /sys/class/dmi/id/ pseudo-filesystem exposes machine-specific
  # hardware identifiers: product_uuid (machine UUID), board_serial (motherboard
  # serial), product_serial, and BIOS metadata. Attackers read these to
  # fingerprint the host, correlate with other intel, or detect sandbox/VM
  # environments before releasing a payload. /sys/class/net/*/address exposes
  # interface MAC addresses — uniquely identifies the machine on the network.
  # MITRE T1082 — System Information Discovery
  - id: mcp-recon-audit-sys-hardware-fingerprint
    taxonomy: "reconnaissance/system-discovery/hardware-fingerprinting"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/sys/class/dmi/id/**"
    decision: "AUDIT"
    reason: "Access to /sys/class/dmi/id/ is flagged — exposes machine UUID, serial numbers, and BIOS metadata used to fingerprint the host or detect sandboxes. MITRE T1082."
    confidence: 0.85
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/sys/class/dmi/id/product_uuid"}
        - tool: "cat_file"
          args: {"path": "/sys/class/dmi/id/board_serial"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/README.md"}
        - tool: "read_file"
          args: {"path": "/sys/bus/usb/devices/1-1/idVendor"}

  # === AUDIT: Network interface MAC address access ===
  # Reading MAC addresses from /sys/class/net/<iface>/address uniquely identifies
  # the machine on the network. Used in fingerprinting and sandbox-detection
  # payloads. AI agents have no legitimate need to read hardware MAC addresses.
  # MITRE T1016 — System Network Configuration Discovery
  - id: mcp-recon-audit-sys-mac-address
    taxonomy: "reconnaissance/network-discovery/network-interface-enumeration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/sys/class/net/*/address"
    decision: "AUDIT"
    reason: "Access to /sys/class/net/<iface>/address is flagged — exposes hardware MAC addresses used for host fingerprinting. MITRE T1016."
    confidence: 0.85
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/sys/class/net/eth0/address"}
        - tool: "cat_file"
          args: {"path": "/sys/class/net/wlan0/address"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/README.md"}
        - tool: "read_file"
          args: {"path": "/sys/class/net/eth0/speed"}

# === Structural rules for URL and query-based reconnaissance ===
structural_rules:
  # === AUDIT: Localhost/loopback internal service probing ===
  - id: mcp-recon-audit-localhost-probe
    taxonomy: "reconnaissance/network-discovery/internal-service-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)https?://localhost(:[0-9]+)?"
            - "(?i)https?://127\\.0\\.0\\.1(:[0-9]+)?"
    decision: "AUDIT"
    reason: "HTTP probe to localhost or 127.0.0.1 flagged — may enumerate internal services (admin panels, dev servers, management APIs). LLM02, MITRE T1046."
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "http://localhost:8080/admin"}
        - tool: "http_get"
          args: {"url": "http://127.0.0.1:3000/api/v1/status"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.example.com/data"}

  # === BLOCK: Sensitive Spring Boot Actuator endpoints (credential exposure) ===
  - id: mcp-recon-block-actuator-credentials
    taxonomy: "reconnaissance/web-application/admin-endpoint-probe"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)/actuator/heapdump"
            - "(?i)/actuator/env"
            - "(?i)/actuator/configprops"
            - "(?i)/actuator/mappings"
            - "(?i)/actuator/logfile"
    decision: "BLOCK"
    reason: "Spring Boot Actuator credential-exposing endpoint blocked — /actuator/heapdump and /actuator/env directly leak secrets, passwords, and API keys. LLM02, CWE-200, MITRE T1082."
    confidence: 0.95
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "http://app.internal:8080/actuator/heapdump"}
        - tool: "http_get"
          args: {"url": "https://prod.example.com/actuator/env"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.example.com/actuator/health"}

  # === BLOCK: Kubernetes secrets API access ===
  - id: mcp-recon-block-k8s-secrets
