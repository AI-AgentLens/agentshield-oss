            - "(?i)/\\.mcp/session\\.json"
    decision: "AUDIT"
    reason: "Read of MCP session store file — exposes active session IDs that may be used for session enumeration, fixation, or replay attacks. OWASP LLM06, CWE-384, CWE-613."
    confidence: 0.80
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.mcp/sessions/active.json"}
        - tool: "get_file_contents"
          args: {"path": "/project/mcp-session-store/data.db"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/session_handler.go"}

  # === AUDIT: MCP write to voting/consensus artifact files (voting oracle attack, LLM09) ===
  #
  # Multi-agent orchestration systems use shared JSON/YAML files to represent
  # vote tallies, consensus state, and approval records. If an adversary (or
  # compromised MCP tool) can write to these files before a quorum vote, all
  # participating agents read poisoned state simultaneously — a voting oracle
  # attack that biases decisions without touching any individual agent's memory.
  #
  # Unlike shell writes (covered by ts-audit-vote-artifact-write), MCP write_file
  # calls bypass shell evaluation entirely. This rule closes that gap.
  #
  # Covers filenames like: agent-vote-1.json, vote-round-2.json, votes.yaml,
  # consensus-result.json, multi-agent-consensus.yaml, consensus-round-3.json.
  # Does NOT cover: vote_counter.go, consensus_algorithm.py (wrong extension).
  #
  # Decision: AUDIT — orchestration frameworks may legitimately update these
  # files, but agent-initiated writes warrant human review.
  #
  # OWASP LLM09 — Misinformation / Fabricated Consensus Results
  # Taxonomy: unauthorized-execution/agentic-attacks/agent-voting-oracle-attack
  - id: mcp-audit-vote-artifact-write
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "(?i)(?:^|/)[^/]*\\bvote[s]?\\b[^/]*\\.(?:json|ya?ml|md|log)$"
            - "(?i)(?:^|/)[^/]*\\bagent[-_]vote[^/]*\\.(?:json|ya?ml)$"
    decision: "AUDIT"
    confidence: 0.82
    reason: "MCP write to voting artifact file — agent-initiated writes to shared vote files can poison multi-agent consensus decisions without compromising individual agents (voting oracle attack, OWASP LLM09)."

