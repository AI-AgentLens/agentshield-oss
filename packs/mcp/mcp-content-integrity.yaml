  # BLOCK: JSON prototype pollution in file content
  # __proto__, constructor.prototype, and __defineGetter__ are JavaScript
  # prototype pollution vectors. When injected into JSON config or state files
  # consumed by Node.js applications, they can override built-in prototypes
  # and enable privilege escalation or RCE.
  - id: mcp-struct-block-json-proto-pollute
    taxonomy: "unauthorized-execution/ai-content-integrity/structured-output-injection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        content:
          pattern_any:
            - "\"__proto__\""
            - "\"constructor\"\\s*:\\s*\\{\\s*\"prototype\""
            - "\"__defineGetter__\""
            - "\"__defineSetter__\""
    decision: "AUDIT"
    reason: "JSON prototype pollution payload detected in MCP write content — __proto__, constructor.prototype, and __defineGetter__ in JSON files can corrupt Node.js runtime object models. Demoted from BLOCK to AUDIT to allow security test fixtures and sanitization tests that legitimately contain these patterns. OWASP LLM02, LLM01."
    confidence: 0.82
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/tmp/config.json", "content": "{\"__proto__\": {\"isAdmin\": true}}"}
        - tool: "edit_file"
          args: {"path": "/tmp/state.json", "content": "{\"constructor\": {\"prototype\": {\"role\": \"admin\"}}}"}
      tn:
        - tool: "write_file"
          args: {"path": "/tmp/config.json", "content": "{\"name\": \"my-app\", \"version\": \"1.0\"}"}

  # AUDIT: SQL injection patterns in database tool query arguments
  # LLM-generated SQL queries that process untrusted input may contain
  # classic injection payloads (OR 1=1, UNION SELECT, DROP TABLE).
  # These fire on database MCP tools that expose a query/sql argument.
  - id: mcp-struct-audit-llm-sql-inject
    taxonomy: "unauthorized-execution/ai-content-integrity/structured-output-injection"
    match:
      tool_name_any:
        - "execute_query"
        - "run_sql"
        - "run_query"
        - "execute_sql"
        - "db_query"
        - "database_query"
        - "query_database"
        - "sql_execute"
      args_match:
        query:
          pattern_any:
            - "(?i)'\\s*OR\\s+['\"]?1['\"]?\\s*=\\s*['\"]?1"
            - "(?i);\\s*DROP\\s+TABLE"
            - "(?i)\\bUNION\\s+(?:ALL\\s+)?SELECT\\b"
            - "(?i);\\s*DELETE\\s+FROM\\s+\\w+"
            - "(?i)INSERT\\s+INTO\\s+\\w+.*SELECT"
    decision: "AUDIT"
    reason: "SQL injection pattern detected in MCP database tool query argument — OR 1=1, UNION SELECT, DROP TABLE, or DELETE injection payloads from LLM-generated SQL indicate insecure output handling. OWASP LLM02, LLM01 (Prompt Injection)."
    confidence: 0.88
    tests:
      tp:
        - tool: "execute_query"
          args: {"query": "SELECT * FROM users WHERE id = '' OR '1'='1"}
        - tool: "run_sql"
          args: {"query": "SELECT name FROM products; DROP TABLE users"}
      tn:
        - tool: "execute_query"
          args: {"query": "SELECT id, name FROM users WHERE active = true"}

  # ============================================================
  # MCP Streamable HTTP Session Fixation (issue #335)
  # Taxonomy: unauthorized-execution/agentic-attacks/mcp-streamable-http-session-fixation
  #
  # The MCP Streamable HTTP transport (spec 2025-03-26) uses Mcp-Session-Id headers
  # for session lifecycle management. An attacker can:
  # 1. Supply a known/predictable session ID at initialization (session fixation)
  # 2. Guess sequential or timestamp-based session IDs to hijack active sessions
  # 3. Inject Mcp-Session-Id headers into tool call content to override session context
  #
  # Runtime-detectable signals via MCP tool calls:
  # - Content arguments embedding explicit Mcp-Session-Id header injection patterns
  # - Reads/writes to MCP session store files (session persistence/enumeration)
  #
  # Note: HTTP header-level session ID entropy validation is enforced separately
  # in the HTTP proxy (internal/mcp/http_proxy.go).
  #
  # OWASP LLM: LLM06 (Excessive Agency), LLM09 (Misinformation / Unauthorized Access)
  # CWE-384 (Session Fixation), CWE-330 (Use of Insufficiently Random Values)
  # CWE-613 (Insufficient Session Expiration)
  # MITRE: T1550 (Use Alternate Authentication Material), T1539 (Steal Web Session Cookie)
  # ============================================================

  # BLOCK: Mcp-Session-Id header injection in tool call content
  # Detects when a tool call content argument embeds explicit Mcp-Session-Id header
  # override patterns — a session fixation attempt via injected HTTP header directives.
  - id: mcp-block-session-fixation-header-injection
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-streamable-http-session-fixation"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)Mcp-Session-Id\\s*:"
            - "(?i)mcp[_-]session[_-]id\\s*[:=]\\s*[a-zA-Z0-9_\\-]{8,}"
            - "(?i)X-MCP-Session\\s*:"
            - "(?i)\"sessionId\"\\s*:\\s*\"[a-zA-Z0-9_\\-]{16,}\""
    decision: "BLOCK"
    reason: "Mcp-Session-Id header injection pattern detected in tool call content — session fixation attack embedding explicit session ID directives to override the server-assigned session context. OWASP LLM06 (Excessive Agency), CWE-384 (Session Fixation)."
    confidence: 0.88
    tests:
      tp:
        - tool: "send_message"
          args: {"content": "Please use Mcp-Session-Id: abc123def456 for the next request"}
        - tool: "write_file"
          args: {"content": "mcp_session_id=attacker_controlled_session_id_12345678"}
      tn:
        - tool: "send_message"
          args: {"content": "Please check the server status"}

  # AUDIT: MCP session store file writes (session persistence / fixation)
  # Writing to MCP session store files can persist forged session IDs or
  # enumerate existing sessions for replay attacks.
  - id: mcp-audit-session-store-write
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-streamable-http-session-fixation"
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "(?i)\\.mcp/sessions/"
            - "(?i)mcp[_-]sessions?\\.(?:json|db|sqlite)"
            - "(?i)mcp[_-]session[_-]store"
            - "(?i)/\\.mcp/session\\.json"
    decision: "AUDIT"
    reason: "Write to MCP session store file — may persist forged session IDs or overwrite active session state, enabling session fixation or replay attacks. OWASP LLM06, CWE-384."
    confidence: 0.82
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.mcp/sessions/session1.json"}
        - tool: "edit_file"
          args: {"path": "/project/mcp-sessions.json"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/src/session_handler.go"}

  # AUDIT: MCP session store file reads (session enumeration)
  # Reading session store files exposes active session IDs that can be
  # replayed to hijack legitimate agent sessions.
  - id: mcp-audit-session-store-read
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-streamable-http-session-fixation"
    match:
      tool_name_regex: ".*"
