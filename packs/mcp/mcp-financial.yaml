name: "MCP Financial Safety"
description: "Enforce value limits on financial tool calls to prevent uncontrolled resource commitment (Lobstar Wilde scenario)"
version: "1.0.0"
author: "AgentShield Security Research"

# Value limits enforce numeric thresholds on tool call arguments.
# These rules prevent an agent from accidentally transferring large sums,
# minting excessive tokens, or committing unbounded resources.
#
# Real-world precedent: the Lobstar Wilde incident where an AI agent
# sent 52,000,000 SOL (~$250K) instead of 4 SOL.
# See: https://medium.com/@gzxuexi/from-rm-rf-to-250k-why-every-ai-agent-needs-a-policy-gate-550c62459011

value_limits:
  # === Token/crypto transfers ===
  - id: mcp-fin-cap-transfer-amount
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "send_.*|transfer_.*"
    argument: "amount"
    max: 100.0
    decision: "BLOCK"
    reason: "Token/crypto transfer exceeds safety limit of 100 units."
    tests:
      tp:
        - tool: "send_sol"
          args: {"amount": "52000000", "to": "attacker_wallet"}
        - tool: "transfer_eth"
          args: {"amount": "500", "to": "0xdeadbeef"}
      tn:
        - tool: "send_sol"
          args: {"amount": "4", "to": "friend_wallet"}

  - id: mcp-fin-cap-transfer-quantity
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "send_.*|transfer_.*"
    argument: "quantity"
    max: 100.0
    decision: "BLOCK"
    reason: "Token/crypto transfer quantity exceeds safety limit."
    tests:
      tp:
        - tool: "send_tokens"
          args: {"quantity": "10000", "to": "attacker"}
        - tool: "transfer_usdc"
          args: {"quantity": "500", "to": "0xevil"}
      tn:
        - tool: "send_tokens"
          args: {"quantity": "10", "to": "friend"}

  # === Payment processing ===
  - id: mcp-fin-cap-payment-amount
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: ".*pay.*|.*charge.*|.*invoice.*"
    argument: "amount"
    max: 1000.0
    decision: "BLOCK"
    reason: "Payment amount exceeds safety limit of $1,000."
    tests:
      tp:
        - tool: "stripe_pay"
          args: {"amount": "50000", "currency": "usd"}
        - tool: "charge_card"
          args: {"amount": "5000", "card": "tok_visa"}
      tn:
        - tool: "stripe_pay"
          args: {"amount": "25", "currency": "usd"}

  - id: mcp-fin-cap-payment-total
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: ".*pay.*|.*charge.*|.*invoice.*"
    argument: "total"
    max: 1000.0
    decision: "BLOCK"
    reason: "Payment total exceeds safety limit of $1,000."
    tests:
      tp:
        - tool: "process_payment"
          args: {"total": "9999", "currency": "usd"}
        - tool: "create_invoice"
          args: {"total": "5000", "client": "acme"}
      tn:
        - tool: "process_payment"
          args: {"total": "50", "currency": "usd"}

  # === Minting / creation ===
  - id: mcp-fin-cap-mint-amount
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "mint_.*|create_token.*"
    argument: "amount"
    max: 1000.0
    decision: "BLOCK"
    reason: "Minting amount exceeds safety limit."
    tests:
      tp:
        - tool: "mint_token"
          args: {"amount": "1000000", "token": "MY_TOKEN"}
        - tool: "create_token_batch"
          args: {"amount": "5000", "name": "EVIL_NFT"}
      tn:
        - tool: "mint_token"
          args: {"amount": "10", "token": "MY_TOKEN"}

  # === Negative value guard (prevent sign-flip attacks) ===
  - id: mcp-fin-block-negative-transfer
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "send_.*|transfer_.*|.*pay.*"
    argument: "amount"
    min: 0.0
    decision: "BLOCK"
    reason: "Negative transfer amounts are not allowed."
    tests:
      tp:
        - tool: "send_sol"
          args: {"amount": "-100", "to": "attacker"}
        - tool: "transfer_eth"
          args: {"amount": "-50", "to": "0xevil"}
      tn:
        - tool: "send_sol"
          args: {"amount": "5", "to": "friend"}

  # === Withdrawal limits ===
  - id: mcp-fin-cap-withdrawal
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "withdraw.*"
    argument: "amount"
    max: 500.0
    decision: "BLOCK"
    reason: "Withdrawal exceeds safety limit of 500 units."
    tests:
      tp:
        - tool: "withdraw_funds"
          args: {"amount": "10000", "account": "savings"}
        - tool: "withdraw_crypto"
          args: {"amount": "999", "wallet": "external"}
      tn:
        - tool: "withdraw_funds"
          args: {"amount": "50", "account": "savings"}

  - id: mcp-fin-block-negative-withdrawal
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "withdraw.*"
    argument: "amount"
    min: 0.0
    decision: "BLOCK"
    reason: "Negative withdrawal amounts are not allowed."
    tests:
      tp:
        - tool: "withdraw_funds"
          args: {"amount": "-200", "account": "checking"}
        - tool: "withdraw_crypto"
          args: {"amount": "-50", "wallet": "exploit"}
      tn:
        - tool: "withdraw_funds"
          args: {"amount": "25", "account": "checking"}

  # === Cloud / compute resource provisioning ===
  # Prevents runaway infrastructure creation (e.g., provision 1000 GPU instances).
  - id: mcp-fin-cap-provision-count
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "provision_.*|scale_.*|deploy_.*|create_instance.*|launch_.*"
    argument: "count"
    max: 50.0
    decision: "BLOCK"
    reason: "Instance count exceeds safety limit of 50 — large provisioning requires human approval."
    tests:
      tp:
        - tool: "provision_vm"
          args: {"count": "1000", "type": "gpu-large"}
        - tool: "launch_instances"
          args: {"count": "200", "region": "us-east-1"}
      tn:
        - tool: "provision_vm"
          args: {"count": "3", "type": "small"}

  - id: mcp-fin-cap-provision-quantity
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    tool_name_regex: "provision_.*|scale_.*|deploy_.*|create_instance.*|launch_.*"
    argument: "quantity"
    max: 50.0
    decision: "BLOCK"
    reason: "Provisioning quantity exceeds safety limit of 50."
    tests:
      tp:
        - tool: "scale_service"
          args: {"quantity": "500", "service": "web-workers"}
        - tool: "deploy_instances"
          args: {"quantity": "100", "type": "compute"}
      tn:
        - tool: "scale_service"
          args: {"quantity": "5", "service": "web-workers"}

rules:
  # === AUDIT: Any financial tool call ===
  - id: mcp-fin-audit-financial-tools
    taxonomy: "destructive-ops/resource-commitment/unbounded-transfer"
    match:
      tool_name_regex: "(send_|transfer_|withdraw|mint_|.*pay.*|.*charge.*|.*invoice.*)"
    decision: "AUDIT"
    reason: "Financial tool call flagged for review."
    tests:
      tp:
        - tool: "send_payment"
          args: {"amount": "50", "to": "vendor"}
        - tool: "transfer_funds"
          args: {"amount": "10", "to": "account_123"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/financial-report.csv"}

# === Structural rules: catch string-based unbounded transfer patterns ===
structural_rules:
  # Block "ALL_BALANCE" / "all" / "everything" as amount values — these strings
  # bypass numeric value_limits but indicate intent to transfer the full balance.
  # Real-world risk: agent misinterprets "send everything" instruction literally.
  - id: mcp-fin-block-all-balance-amount
    match:
      tool_name_regex: "(send_.*|transfer_.*|withdraw.*|.*pay.*)"
      args_match:
        amount:
          pattern_any:
            - "(?i)^(ALL_BALANCE|all|everything|full_balance|total_balance|max|maximum)$"
    decision: "BLOCK"
    reason: "Unbounded transfer detected — 'ALL_BALANCE' or equivalent string indicates intent to send entire balance"
    confidence: 0.95
    tests:
      tp:
        - tool: "send_sol"
          args: {"amount": "ALL_BALANCE", "to": "attacker_wallet"}
        - tool: "transfer_eth"
          args: {"amount": "everything", "to": "0xdeadbeef"}
      tn:
        - tool: "send_sol"
          args: {"amount": "4", "to": "friend_wallet"}

  - id: mcp-fin-block-all-balance-value
    match:
      tool_name_regex: "(send_.*|transfer_.*|withdraw.*|.*pay.*)"
      args_match:
        value:
          pattern_any:
            - "(?i)^(ALL_BALANCE|all|everything|full_balance|total_balance|max|maximum)$"
    decision: "BLOCK"
    reason: "Unbounded transfer detected — 'ALL_BALANCE' or equivalent string in value argument"
    confidence: 0.95
    tests:
      tp:
        - tool: "send_tokens"
          args: {"value": "full_balance", "to": "attacker"}
        - tool: "transfer_usdc"
          args: {"value": "maximum", "to": "0xevil"}
      tn:
        - tool: "send_tokens"
          args: {"value": "10", "to": "friend"}
