        - tool: "get_file_contents"
          args: {"path": "/home/user/.continue/history.db"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/continue_plugin.ts"}

  - id: mcp-llmdf-audit-agent-session-db-read-copilot
