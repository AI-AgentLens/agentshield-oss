name: "MCP LLM Data Flow"
description: "Detect MCP tool calls that expose system prompts, route to unauthorized AI models, or access training data — LLM-specific data exfiltration threats"
version: "1.0.0"
author: "AgentShield Security Research"

rules:
  # === AUDIT: System prompt file reads ===
  # An agent reading files named like SYSTEM_PROMPT.txt may be extracting operator
  # instructions for exfiltration. OWASP LLM07 (System Prompt Leakage).
  - id: mcp-llmdf-audit-system-prompt-read
    taxonomy: "data-exfiltration/llm-data-flow/system-prompt-exfiltration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "read_resource"
        - "get_file_contents"
        - "open_file"
      argument_patterns:
        path: "**/*system_prompt*"
    decision: "AUDIT"
    reason: "Reading a file matching system_prompt* may expose operator instructions — LLM07 (System Prompt Leakage). Review whether this access is intentional."
    confidence: 0.85

  - id: mcp-llmdf-audit-sysprompt-dotfile-read
    taxonomy: "data-exfiltration/llm-data-flow/system-prompt-exfiltration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "read_resource"
        - "get_file_contents"
        - "open_file"
      argument_patterns:
        path: "**/.sysprompt*"
    decision: "AUDIT"
    reason: "Reading a hidden system prompt dotfile (.sysprompt*) may expose confidential operator instructions — LLM07 (System Prompt Leakage)."
    confidence: 0.85

  # === AUDIT: Training data and model weight directory access ===
  # MCP tools reading model weight directories or training datasets may be performing
  # training data extraction. OWASP LLM02 (Sensitive Information Disclosure).
  - id: mcp-llmdf-audit-training-data-read
    taxonomy: "data-exfiltration/llm-data-flow/training-data-extraction"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_dir"
        - "read_resource"
        - "get_file_contents"
      argument_patterns:
        path: "**/training_data/**"
    decision: "AUDIT"
    reason: "Reading from a training_data/ directory may expose model training datasets — LLM02 (Sensitive Information Disclosure). Verify this access is authorized."
    confidence: 0.80

  - id: mcp-llmdf-audit-model-weights-read
    taxonomy: "data-exfiltration/llm-data-flow/training-data-extraction"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_dir"
        - "read_resource"
        - "get_file_contents"
      argument_patterns:
        path: "**/model_weights/**"
    decision: "AUDIT"
    reason: "Reading from model_weights/ directory may expose proprietary model parameters — LLM02 (Sensitive Information Disclosure)."
    confidence: 0.80

  - id: mcp-llmdf-audit-checkpoints-read
    taxonomy: "data-exfiltration/llm-data-flow/training-data-extraction"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_dir"
        - "read_resource"
        - "get_file_contents"
      argument_patterns:
        path: "**/checkpoints/**"
    decision: "AUDIT"
    reason: "Reading from a checkpoints/ directory may expose model state (weights, optimizer state) — LLM02 (Sensitive Information Disclosure)."
    confidence: 0.75

  # === AUDIT: AI provider config file writes ===
  # Writing to AI SDK config files can reroute LLM traffic to unauthorized endpoints
  # (uncontrolled model selection). OWASP LLM06 (Excessive Agency).
  - id: mcp-llmdf-audit-openai-config-write
    taxonomy: "data-exfiltration/llm-data-flow/uncontrolled-model-selection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.openai*"
    decision: "AUDIT"
    reason: "Writing to an OpenAI config file (.openai*) may reroute AI API calls to an unauthorized endpoint — LLM06 (Excessive Agency). Human review required."
    confidence: 0.85

  - id: mcp-llmdf-audit-anthropic-config-write
    taxonomy: "data-exfiltration/llm-data-flow/uncontrolled-model-selection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.anthropic*"
    decision: "AUDIT"
    reason: "Writing to an Anthropic config file (.anthropic*) may reroute AI API calls to an unauthorized endpoint — LLM06 (Excessive Agency). Human review required."
    confidence: 0.85

  - id: mcp-llmdf-audit-ai-config-write
    taxonomy: "data-exfiltration/llm-data-flow/uncontrolled-model-selection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/ai_config*"
    decision: "AUDIT"
    reason: "Writing to an AI config file (ai_config*) may alter model selection or endpoint routing without authorization — LLM06 (Excessive Agency)."
    confidence: 0.80

  # === AUDIT: Cross-session context leakage via MCP ===
  # An MCP tool reading AI agent session databases or memory files can extract
  # credentials, API keys, and PII persisted from prior agent sessions.
  # Taxonomy: data-exfiltration/llm-data-flow/cross-session-context-leakage
  # OWASP LLM02 — Sensitive Information Disclosure, LLM07 — System Prompt Leakage
  - id: mcp-llmdf-audit-agent-session-db-read
    taxonomy: "data-exfiltration/llm-data-flow/cross-session-context-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "read_resource"
        - "open_file"
      argument_patterns:
        path: "**/.{cursor,windsurf,claude,continue,copilot,codeium}/**"
    decision: "AUDIT"
    reason: "Reading an AI agent session or conversation database via MCP — these files may contain credentials, API keys, and PII from prior sessions, creating a cross-session context leakage vector. OWASP LLM02/LLM07."
    confidence: 0.85

  - id: mcp-llmdf-audit-agent-memory-bulk-read
    taxonomy: "data-exfiltration/llm-data-flow/cross-session-context-leakage"
    match:
      tool_name_any:
        - "list_directory"
        - "list_dir"
        - "read_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.claude/memory/**"
    decision: "AUDIT"
    reason: "Accessing Claude Code memory files via MCP — these files persist sensitive context (credentials, architectural decisions, API keys) across agent sessions and may expose prior session data to unauthorized readers. OWASP LLM02."
    confidence: 0.85

  # === AUDIT: Cross-tenant agent data leakage via MCP ===
  # MCP tools accessing shared workspace paths without tenant-scoped isolation
  # can expose one tenant's data to another in shared agent infrastructure.
  # Taxonomy: data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage
  # OWASP LLM02 — Sensitive Information Disclosure, LLM06 — Excessive Agency
  - id: mcp-llmdf-audit-cross-tenant-tmp-workspace
    taxonomy: "data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "list_directory"
        - "list_dir"
        - "get_file_contents"
        - "cat_file"
      argument_patterns:
        path: "/tmp/mcp-workspace*"
    decision: "AUDIT"
    reason: "Accessing /tmp/mcp-workspace* via MCP — shared MCP workspace directories without tenant-scoped paths expose other tenants' tool call artifacts. Cross-tenant data leakage in shared agent infrastructure. OWASP LLM02/LLM06."
    confidence: 0.82

  - id: mcp-llmdf-audit-cross-tenant-shared-cache
    taxonomy: "data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "list_directory"
        - "list_dir"
        - "get_file_contents"
      argument_patterns:
        path: "/tmp/agent-cache*"
    decision: "AUDIT"
    reason: "Accessing /tmp/agent-cache* via MCP — shared agent cache directories in multi-tenant deployments may expose tool call results, session state, or intermediate data from other tenants. OWASP LLM02/LLM06."
    confidence: 0.80

  # ============================================================
  # MCP Cross-Server Data Leakage (issue #133)
  # Taxonomy: data-exfiltration/llm-data-flow/mcp-cross-server-data-leakage
  #
  # A malicious MCP server harvests sensitive data from other connected servers
  # by embedding instructions in tool descriptions/responses that cause the agent
  # to forward context from one server to another.
  # OWASP LLM01, LLM02, LLM06. MITRE T1041/T1567.
  # ============================================================

  # Detect "include previous context/results" harvest patterns in content args.
  # These patterns appear in tool call bodies when a rogue server instructs the
  # agent to forward data it collected from other servers.

  # === AUDIT: AI tool telemetry config writes via MCP (issue #137) ===
  # Taxonomy: data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure
  #
  # AI coding tools (Cursor, Copilot, Codeium/Windsurf) store telemetry and data-sharing
  # settings in well-known config paths. An agent writing to these files may enable
  # silent code telemetry, bypass data residency controls, or configure exfiltration
  # endpoints. Auditing MCP writes to these paths surfaces unintentional IP disclosure.
  # OWASP LLM02, LLM06 | EU AI Act Art.10, Art.13 | NIST AI RMF: GOVERN-1, MAP-5.
  - id: mcp-llmdf-audit-ai-telemetry-config-write
    taxonomy: "data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure"
    match:
      tool_name_any:
        - write_file
        - create_file
        - edit_file
        - save_file
        - update_file
        - append_file
        - str_replace_editor
        - write_to_file
      argument_patterns:
        path: "**/.cursor/**"
    decision: "AUDIT"
    reason: "MCP write to Cursor config directory — may modify telemetry, AI model routing, or data-sharing settings. OWASP LLM02/LLM06."
    confidence: 0.80

  - id: mcp-llmdf-audit-copilot-config-write
    taxonomy: "data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure"
    match:
      tool_name_any:
        - write_file
        - create_file
        - edit_file
        - save_file
        - update_file
        - append_file
        - str_replace_editor
        - write_to_file
      argument_patterns:
        path: "**/.copilot/**"
    decision: "AUDIT"
    reason: "MCP write to GitHub Copilot config directory — may modify telemetry or data-sharing settings. OWASP LLM02/LLM06."
    confidence: 0.80

  - id: mcp-llmdf-audit-codeium-config-write
    taxonomy: "data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure"
    match:
      tool_name_any:
        - write_file
        - create_file
        - edit_file
        - save_file
        - update_file
        - append_file
        - str_replace_editor
        - write_to_file
      argument_patterns:
        path: "**/codeium/**"
    decision: "AUDIT"
    reason: "MCP write to Codeium/Windsurf config directory — may modify telemetry or AI endpoint settings. OWASP LLM02/LLM06."
    confidence: 0.80

structural_rules:
  # === AUDIT: Cross-server context harvesting instructions in content ===
  # When a tool call argument contains instructions to forward outputs from
  # other tools or servers, this signals a cross-server data harvest attempt.
  - id: mcp-llmdf-audit-cross-server-context-harvest
    taxonomy: "data-exfiltration/llm-data-flow/mcp-cross-server-data-leakage"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)include.*results.*from.*tool"
            - "(?i)include.*output.*of.*previous"
            - "(?i)forward.*context.*from"
            - "(?i)include.*all.*previous.*context"
            - "(?i)send.*results.*from.*other.*tool"
            - "(?i)attach.*output.*from.*(read|list|get)_"
    decision: "AUDIT"
    reason: "Tool call content contains cross-server context harvesting instructions — pattern suggests a server is directing the agent to forward data from other MCP servers. OWASP LLM01/LLM02/LLM06."
    confidence: 0.80

  # === AUDIT: Cross-server request forgery — injected tool invocation instructions ===
  # When a tool response instructs the agent to call a specific named tool on
  # another server, this is a cross-server request forgery attempt.
  # Taxonomy: unauthorized-execution/agentic-attacks/mcp-cross-server-request-forgery
  - id: mcp-llmdf-audit-cross-server-tool-injection
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-cross-server-request-forgery"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)now\\s+(call|execute|invoke|run)\\s+\\w+_\\w+"
            - "(?i)you\\s+must\\s+(call|execute|invoke)\\s+\\w+_\\w+"
            - "(?i)next.*call.*\\w+\\(.*path\\s*="
            - "(?i)call\\s+write_file\\s*\\("
            - "(?i)call\\s+delete_file\\s*\\("
            - "(?i)call\\s+execute_command\\s*\\("
            - "(?i)call\\s+bash\\s*\\("
            - "(?i)invoke\\s+the\\s+\\w+\\s+tool\\s+with"
    decision: "AUDIT"
    reason: "Tool call content contains cross-server request forgery instructions — embedded directives instructing the agent to call specific tools on other MCP servers. OWASP LLM01/LLM06/LLM08."
    confidence: 0.85

  # === AUDIT: Cross-server request forgery — delete audit log instruction ===
  # A rogue server instructing the agent to delete audit/log files is a hallmark
  # of a cross-server CSRF attack covering its tracks.
  - id: mcp-llmdf-audit-cross-server-log-erasure-injection
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-cross-server-request-forgery"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)delete.*audit.*log"
            - "(?i)remove.*\\.(log|audit)\\b"
            - "(?i)call.*delete.*\\.log"
            - "(?i)after.*calling.*delete.*history"
    decision: "AUDIT"
    reason: "Tool call content instructs log or audit file deletion — may be cross-server request forgery attempting to erase evidence. OWASP LLM06."
    confidence: 0.82

  # ============================================================
  # LLM07 Orphaned Taxonomy Entries (issue #183)
  # Three data-exfiltration/llm-data-flow entries with no runtime rules:
  #   - credential-in-prompt
  #   - multi-turn-prompt-erosion
  #   - rag-system-prompt-leakage
  # OWASP LLM07 (System Prompt Leakage / Sensitive Data Exposure).
  # ============================================================

  # === BLOCK: Credential in LLM prompt content ===
  # Detects API keys, bearer tokens, or password assignments embedded in MCP
  # message/content arguments — hardcoded secrets in prompt context create
  # persistent LLM memory leakage and exfiltration risk.
  # Taxonomy: data-exfiltration/llm-data-flow/credential-in-prompt
  - id: mcp-llmdf-block-credential-in-prompt
    taxonomy: "data-exfiltration/llm-data-flow/credential-in-prompt"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)sk-[a-zA-Z0-9]{20,}"
            - "AKIA[0-9A-Z]{16}"
            - "(?i)ghp_[A-Za-z0-9]{36}"
            - "(?i)glpat-[A-Za-z0-9_-]{20}"
            - "(?i)(password|passwd|secret|api[_-]key)\\s*[:=]\\s*[\"'][^\"'();.]{12,}[\"']"
            - "(?i)bearer\\s+[A-Za-z0-9\\-._~+/]{20,}={0,2}"
    decision: "BLOCK"
    reason: "Credential or API key detected in MCP message content — hardcoded secrets in LLM prompt context risk model memorization and exfiltration. OWASP LLM07 (Sensitive Data Exposure)."
    confidence: 0.88

  # === AUDIT: Multi-turn prompt erosion — jailbreak instruction in content ===
  # Detects prompt override/jailbreak patterns in MCP tool call content arguments.
  # These patterns appear when an attacker gradually erodes agent system context
  # through injected user-turn messages, attempting to override agent guidelines.
  # Taxonomy: data-exfiltration/llm-data-flow/multi-turn-prompt-erosion
  - id: mcp-llmdf-audit-prompt-erosion-jailbreak
    taxonomy: "data-exfiltration/llm-data-flow/multi-turn-prompt-erosion"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)ignore\\s+(all\\s+)?(previous|prior|above|earlier)\\s+(instructions?|rules?|guidelines?|prompts?)"
            - "(?i)disregard\\s+(all\\s+)?(previous|prior)\\s+instructions?"
            - "(?i)you\\s+are\\s+now\\s+(in\\s+)?((developer|jailbreak|evil|uncensored|dan)\\s+mode)"
            - "(?i)new\\s+persona.*no\\s+(restrictions?|guidelines?|rules?|safety)"
            - "(?i)(forget|override|bypass)\\s+(your\\s+)?(system\\s+prompt|training|guidelines?)"
    decision: "AUDIT"
    reason: "Prompt override/jailbreak instruction detected in MCP message content — multi-turn prompt erosion attempt to override agent system context. OWASP LLM01/LLM07."
    confidence: 0.85

  # === AUDIT: RAG system prompt leakage — query fishing for initialization instructions ===
  # Detects retrieval/search queries that attempt to extract system prompt or
  # initialization context by querying for agent instructions or hidden context.
  # These queries exploit RAG pipelines to indirectly surface system prompts.
  # Taxonomy: data-exfiltration/llm-data-flow/rag-system-prompt-leakage
  - id: mcp-llmdf-audit-rag-sysprompt-leakage
    taxonomy: "data-exfiltration/llm-data-flow/rag-system-prompt-leakage"
    match:
      tool_name_regex: ".*"
      args_match:
        query:
          pattern_any:
            - "(?i)(repeat|output|print|show|reveal|display)\\s+(your|the)\\s+(system\\s+prompt|initialization|instructions?|rules?)"
            - "(?i)what\\s+(are|is)\\s+(your|the)\\s+(initial|first|system)\\s+(instructions?|prompt|context|message)"
            - "(?i)(summarize|list|dump)\\s+(all\\s+)?(your\\s+)?(system|initialization|internal)\\s+(instructions?|rules?|prompt)"
            - "(?i)(show|print|tell\\s+me)\\s+(all\\s+)?(your\\s+)?(hidden|secret|confidential)\\s+(instructions?|rules?|context)"
    decision: "AUDIT"
    reason: "RAG search query attempting to extract system prompt or initialization instructions — system prompt leakage via retrieval augmentation. OWASP LLM07 (System Prompt Leakage)."
    confidence: 0.83

  # === BLOCK: A2A task description injection — prompt injection in agent delegation payload ===
  # Detects prompt injection patterns in the `description` argument of MCP tool calls
  # that delegate tasks to sub-agents (Google A2A protocol, LangGraph, AutoGen, CrewAI).
  # An attacker who controls the task description can override the receiving agent's
  # system prompt or behavior by embedding SYSTEM:, [INST], or "ignore previous instructions"
  # directives. This is agent-to-agent protocol injection via task delegation.
  # Taxonomy: unauthorized-execution/agentic-attacks/agent-to-agent-protocol-injection
  # OWASP LLM01 (Prompt Injection), LLM05 (Improper Output Handling), LLM06 (Excessive Agency)
  - id: mcp-block-a2a-task-injection
    taxonomy: "unauthorized-execution/agentic-attacks/agent-to-agent-protocol-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        description:
          pattern_any:
            - "(?i)SYSTEM\\s*:"
            - "(?i)\\[INST\\]"
            - "(?i)<\\|im_start\\|>"
            - "(?i)ignore\\s+(all\\s+)?(previous|prior|above)\\s+(instructions?|rules?|guidelines?)"
            - "(?i)you\\s+are\\s+now\\s+(a|an|the)\\s+\\w+\\s+(agent|assistant|model)"
            - "(?i)system_prompt_override"
            - "(?i)new\\s+system\\s+prompt\\s*:"
            - "(?i)BEGIN\\s+HIDDEN\\s+INSTRUCTION"
    decision: "BLOCK"
    reason: "Prompt injection pattern detected in A2A task description — agent-to-agent protocol injection embeds malicious directives in task delegation payloads, overriding the receiving agent's system context. OWASP LLM01 (Prompt Injection)."
    confidence: 0.90

  # === BLOCK: A2A delegation file write — system_prompt_override in task JSON ===
  # Detects MCP write_file calls creating agent task/delegation JSON files that
  # contain explicit system prompt override keys. The `system_prompt_override` field
  # is an A2A protocol mechanism that, when written to a task file consumed by another
  # agent, silently overrides that agent's safety constraints. This is a persistent
  # form of agent-to-agent protocol injection via shared task files.
  # Taxonomy: unauthorized-execution/agentic-attacks/agent-to-agent-protocol-injection
  # OWASP LLM01 (Prompt Injection), LLM08 (Vector and Embedding Weaknesses)
  - id: mcp-block-a2a-delegation-file-write
    taxonomy: "unauthorized-execution/agentic-attacks/agent-to-agent-protocol-injection"
    match:
      tool_name_any:
        - write_file
        - create_file
        - edit_file
        - save_file
        - update_file
        - str_replace_editor
        - write_to_file
      args_match:
        content:
          pattern_any:
            - "(?i)\"system_prompt_override\""
            - "(?i)'system_prompt_override'"
            - "(?i)system_prompt_override\\s*:"
            - "(?i)\"override_system_prompt\""
            - "(?i)\"agent_instructions_override\""
            - "(?i)SYSTEM\\s*:\\s*(ignore|forget|bypass|override)"
    decision: "BLOCK"
    reason: "System prompt override key detected in agent task/delegation file write — writing system_prompt_override to an agent-consumed file silently replaces another agent's safety constraints, a persistent form of A2A protocol injection. OWASP LLM01/LLM08."
    confidence: 0.92
