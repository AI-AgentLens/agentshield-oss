  # === AUDIT: Cross-tenant agent data leakage via MCP ===
  # MCP tools accessing shared workspace paths without tenant-scoped isolation
  # can expose one tenant's data to another in shared agent infrastructure.
  # Taxonomy: data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage
  # OWASP LLM02 — Sensitive Information Disclosure, LLM06 — Excessive Agency
  - id: mcp-llmdf-audit-cross-tenant-tmp-workspace
    taxonomy: "data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "list_directory"
        - "list_dir"
        - "get_file_contents"
        - "cat_file"
      argument_patterns:
        path: "/tmp/mcp-workspace*"
    decision: "AUDIT"
    reason: "Accessing /tmp/mcp-workspace* via MCP — shared MCP workspace directories without tenant-scoped paths expose other tenants' tool call artifacts. Cross-tenant data leakage in shared agent infrastructure. OWASP LLM02/LLM06."
    confidence: 0.82
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/tmp/mcp-workspace-abc123/data.json"}
        - tool: "list_directory"
          args: {"path": "/tmp/mcp-workspace/"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/workspace/config.json"}

  - id: mcp-llmdf-audit-cross-tenant-shared-cache
    taxonomy: "data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "list_directory"
        - "list_dir"
        - "get_file_contents"
      argument_patterns:
        path: "/tmp/agent-cache*"
    decision: "AUDIT"
    reason: "Accessing /tmp/agent-cache* via MCP — shared agent cache directories in multi-tenant deployments may expose tool call results, session state, or intermediate data from other tenants. OWASP LLM02/LLM06."
    confidence: 0.80
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/tmp/agent-cache-tenant1/results.json"}
        - tool: "list_directory"
          args: {"path": "/tmp/agent-cache/"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/cache/local.json"}

  # ============================================================
  # MCP Cross-Server Data Leakage (issue #133)
  # Taxonomy: data-exfiltration/llm-data-flow/mcp-cross-server-data-leakage
  #
  # A malicious MCP server harvests sensitive data from other connected servers
  # by embedding instructions in tool descriptions/responses that cause the agent
  # to forward context from one server to another.
  # OWASP LLM01, LLM02, LLM06. MITRE T1041/T1567.
  # ============================================================

  # Detect "include previous context/results" harvest patterns in content args.
  # These patterns appear in tool call bodies when a rogue server instructs the
  # agent to forward data it collected from other servers.

  # === AUDIT: AI tool telemetry config writes via MCP (issue #137) ===
  # Taxonomy: data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure
  #
  # AI coding tools (Cursor, Copilot, Codeium/Windsurf) store telemetry and data-sharing
  # settings in well-known config paths. An agent writing to these files may enable
  # silent code telemetry, bypass data residency controls, or configure exfiltration
  # endpoints. Auditing MCP writes to these paths surfaces unintentional IP disclosure.
  # OWASP LLM02, LLM06 | EU AI Act Art.10, Art.13 | NIST AI RMF: GOVERN-1, MAP-5.
  - id: mcp-llmdf-audit-ai-telemetry-config-write
    taxonomy: "data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure"
    match:
      tool_name_any:
        - write_file
        - create_file
        - edit_file
        - save_file
        - update_file
        - append_file
        - str_replace_editor
        - write_to_file
      argument_patterns:
        path: "**/.cursor/**"
    decision: "AUDIT"
    reason: "MCP write to Cursor config directory — may modify telemetry, AI model routing, or data-sharing settings. OWASP LLM02/LLM06."
    confidence: 0.80
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.cursor/telemetry.json"}
        - tool: "edit_file"
          args: {"path": "/home/user/.cursor/settings.json"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/src/cursor_adapter.ts"}

  - id: mcp-llmdf-audit-copilot-config-write
    taxonomy: "data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure"
    match:
      tool_name_any:
        - write_file
        - create_file
        - edit_file
        - save_file
        - update_file
        - append_file
        - str_replace_editor
        - write_to_file
      argument_patterns:
        path: "**/.copilot/**"
    decision: "AUDIT"
    reason: "MCP write to GitHub Copilot config directory — may modify telemetry or data-sharing settings. OWASP LLM02/LLM06."
    confidence: 0.80
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.copilot/telemetry.json"}
        - tool: "edit_file"
          args: {"path": "/home/user/.copilot/config.yaml"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/src/copilot_plugin.ts"}

  - id: mcp-llmdf-audit-codeium-config-write
    taxonomy: "data-exfiltration/llm-data-flow/ai-agent-telemetry-data-exposure"
    match:
      tool_name_any:
        - write_file
        - create_file
        - edit_file
        - save_file
        - update_file
        - append_file
        - str_replace_editor
        - write_to_file
      argument_patterns:
        path: "**/codeium/**"
    decision: "AUDIT"
    reason: "MCP write to Codeium/Windsurf config directory — may modify telemetry or AI endpoint settings. OWASP LLM02/LLM06."
    confidence: 0.80
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.config/codeium/settings.json"}
        - tool: "edit_file"
          args: {"path": "/home/user/app/codeium/telemetry.yaml"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/src/codeium_client.py"}

  # ============================================================
  # AI Reasoning Trace Exfiltration (issue #331)
  # Taxonomy: data-exfiltration/llm-data-flow/ai-reasoning-trace-exfiltration
  #
  # Chain-of-thought and reasoning models (Claude extended thinking, OpenAI o1/o3)
  # produce internal reasoning/thinking tokens. These traces may contain sensitive
  # data extracted from context windows — partial secrets, PII, security deliberations
  # — that the model correctly redacted from its final response. An MCP tool reading
  # a reasoning trace file creates a secondary exfiltration vector that bypasses
  # output filtering at the response level.
  #
  # Key risk: a model may redact a secret from its answer while still having
  # processed it in the reasoning trace — making trace files a high-value target.
  #
  # OWASP LLM02 (Sensitive Information Disclosure), LLM06 (Excessive Agency)
  # EU AI Act Art.9/Art.10/Art.15 | ISO 27001 A.8.2 | NIST AI RMF GOVERN-1/MANAGE-4
  # MITRE T1041 (Exfiltration Over C2 Channel), T1005 (Data from Local System)
  # CWE-200 (Exposure of Sensitive Information), CWE-532 (Sensitive Info in Logs)
  # ============================================================

  # === AUDIT: MCP read of a reasoning trace or extended thinking file ===
  - id: mcp-llmdf-audit-reasoning-trace-read
    taxonomy: "data-exfiltration/llm-data-flow/ai-reasoning-trace-exfiltration"
    match:
      tool_name_any:
        - read_file
        - cat_file
        - get_file_contents
        - open_file
        - view_file
        - read_resource
      argument_patterns:
        path: "**/*thinking_trace*"
    decision: "AUDIT"
    reason: "Reading a file matching *thinking_trace* via MCP — AI reasoning/thinking trace files may contain sensitive data from the model's internal processing that bypasses output filtering. OWASP LLM02, MITRE T1005."
    confidence: 0.87
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/tmp/thinking_trace_2024.json"}
        - tool: "cat_file"
          args: {"path": "/project/logs/thinking_trace.txt"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/trace_utils.py"}

  - id: mcp-llmdf-audit-reasoning-output-read
    taxonomy: "data-exfiltration/llm-data-flow/ai-reasoning-trace-exfiltration"
    match:
      tool_name_any:
        - read_file
        - cat_file
        - get_file_contents
        - open_file
        - view_file
        - read_resource
      argument_patterns:
        path: "**/*reasoning_output*"
    decision: "AUDIT"
    reason: "Reading a file matching *reasoning_output* via MCP — AI reasoning output files may expose sensitive data that the model processed internally but redacted from its final response. OWASP LLM02, MITRE T1005."
    confidence: 0.87
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/tmp/reasoning_output_v2.json"}
        - tool: "view_file"
          args: {"path": "/project/logs/reasoning_output.txt"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/reasoning.py"}

  - id: mcp-llmdf-audit-chain-of-thought-read
    taxonomy: "data-exfiltration/llm-data-flow/ai-reasoning-trace-exfiltration"
    match:
      tool_name_any:
        - read_file
        - cat_file
        - get_file_contents
        - open_file
        - view_file
        - read_resource
      argument_patterns:
        path: "**/*chain_of_thought*"
    decision: "AUDIT"
    reason: "Reading a file matching *chain_of_thought* via MCP — chain-of-thought logs capture model reasoning that may include sensitive context not present in the final response. OWASP LLM02, MITRE T1005."
    confidence: 0.87
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/tmp/chain_of_thought_log.json"}
        - tool: "open_file"
          args: {"path": "/project/output/chain_of_thought.txt"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/thought_parser.py"}

  - id: mcp-llmdf-audit-extended-thinking-read
    taxonomy: "data-exfiltration/llm-data-flow/ai-reasoning-trace-exfiltration"
    match:
      tool_name_any:
        - read_file
        - cat_file
        - get_file_contents
        - open_file
        - view_file
        - read_resource
