        - "cat_file"
        - "get_file_contents"
        - "read_resource"
        - "open_file"
      argument_patterns:
        path: "**/.windsurf/**"
    decision: "AUDIT"
    reason: "Reading Windsurf AI agent session data via MCP — may contain credentials and PII from prior sessions. OWASP LLM02/LLM07."
    confidence: 0.85
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.windsurf/session.db"}
        - tool: "cat_file"
          args: {"path": "/home/user/.windsurf/history.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/src/windsurf_client.py"}

  - id: mcp-llmdf-audit-agent-session-db-read-claude
