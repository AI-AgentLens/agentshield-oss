name: "MCP LLM Data Flow"
description: "Detect MCP tool calls that expose system prompts, route to unauthorized AI models, or access training data — LLM-specific data exfiltration threats"
version: "1.0.0"
author: "AgentShield Security Research"

rules:
  # === AUDIT: System prompt file reads ===
  # An agent reading files named like SYSTEM_PROMPT.txt may be extracting operator
  # instructions for exfiltration. OWASP LLM07 (System Prompt Leakage).
  - id: mcp-llmdf-audit-system-prompt-read
    taxonomy: "data-exfiltration/llm-data-flow/system-prompt-exfiltration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "read_resource"
        - "get_file_contents"
        - "open_file"
      argument_patterns:
        path: "**/*system_prompt*"
    decision: "AUDIT"
    reason: "Reading a file matching system_prompt* may expose operator instructions — LLM07 (System Prompt Leakage). Review whether this access is intentional."
    confidence: 0.85

  - id: mcp-llmdf-audit-sysprompt-dotfile-read
    taxonomy: "data-exfiltration/llm-data-flow/system-prompt-exfiltration"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "read_resource"
        - "get_file_contents"
        - "open_file"
      argument_patterns:
        path: "**/.sysprompt*"
    decision: "AUDIT"
    reason: "Reading a hidden system prompt dotfile (.sysprompt*) may expose confidential operator instructions — LLM07 (System Prompt Leakage)."
    confidence: 0.85

  # === AUDIT: Training data and model weight directory access ===
  # MCP tools reading model weight directories or training datasets may be performing
  # training data extraction. OWASP LLM02 (Sensitive Information Disclosure).
  - id: mcp-llmdf-audit-training-data-read
    taxonomy: "data-exfiltration/llm-data-flow/training-data-extraction"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_dir"
        - "read_resource"
        - "get_file_contents"
      argument_patterns:
        path: "**/training_data/**"
    decision: "AUDIT"
    reason: "Reading from a training_data/ directory may expose model training datasets — LLM02 (Sensitive Information Disclosure). Verify this access is authorized."
    confidence: 0.80

  - id: mcp-llmdf-audit-model-weights-read
    taxonomy: "data-exfiltration/llm-data-flow/training-data-extraction"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_dir"
        - "read_resource"
        - "get_file_contents"
      argument_patterns:
        path: "**/model_weights/**"
    decision: "AUDIT"
    reason: "Reading from model_weights/ directory may expose proprietary model parameters — LLM02 (Sensitive Information Disclosure)."
    confidence: 0.80

  - id: mcp-llmdf-audit-checkpoints-read
    taxonomy: "data-exfiltration/llm-data-flow/training-data-extraction"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "list_directory"
        - "list_dir"
        - "read_resource"
        - "get_file_contents"
      argument_patterns:
        path: "**/checkpoints/**"
    decision: "AUDIT"
    reason: "Reading from a checkpoints/ directory may expose model state (weights, optimizer state) — LLM02 (Sensitive Information Disclosure)."
    confidence: 0.75

  # === AUDIT: AI provider config file writes ===
  # Writing to AI SDK config files can reroute LLM traffic to unauthorized endpoints
  # (uncontrolled model selection). OWASP LLM06 (Excessive Agency).
  - id: mcp-llmdf-audit-openai-config-write
    taxonomy: "data-exfiltration/llm-data-flow/uncontrolled-model-selection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.openai*"
    decision: "AUDIT"
    reason: "Writing to an OpenAI config file (.openai*) may reroute AI API calls to an unauthorized endpoint — LLM06 (Excessive Agency). Human review required."
    confidence: 0.85

  - id: mcp-llmdf-audit-anthropic-config-write
    taxonomy: "data-exfiltration/llm-data-flow/uncontrolled-model-selection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.anthropic*"
    decision: "AUDIT"
    reason: "Writing to an Anthropic config file (.anthropic*) may reroute AI API calls to an unauthorized endpoint — LLM06 (Excessive Agency). Human review required."
    confidence: 0.85

  - id: mcp-llmdf-audit-ai-config-write
    taxonomy: "data-exfiltration/llm-data-flow/uncontrolled-model-selection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/ai_config*"
    decision: "AUDIT"
    reason: "Writing to an AI config file (ai_config*) may alter model selection or endpoint routing without authorization — LLM06 (Excessive Agency)."
    confidence: 0.80

  # === AUDIT: Cross-session context leakage via MCP ===
  # An MCP tool reading AI agent session databases or memory files can extract
  # credentials, API keys, and PII persisted from prior agent sessions.
  # Taxonomy: data-exfiltration/llm-data-flow/cross-session-context-leakage
  # OWASP LLM02 — Sensitive Information Disclosure, LLM07 — System Prompt Leakage
  - id: mcp-llmdf-audit-agent-session-db-read
    taxonomy: "data-exfiltration/llm-data-flow/cross-session-context-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "read_resource"
        - "open_file"
      argument_patterns:
        path: "**/.{cursor,windsurf,claude,continue,copilot,codeium}/**"
    decision: "AUDIT"
    reason: "Reading an AI agent session or conversation database via MCP — these files may contain credentials, API keys, and PII from prior sessions, creating a cross-session context leakage vector. OWASP LLM02/LLM07."
    confidence: 0.85

  - id: mcp-llmdf-audit-agent-memory-bulk-read
    taxonomy: "data-exfiltration/llm-data-flow/cross-session-context-leakage"
    match:
      tool_name_any:
        - "list_directory"
        - "list_dir"
        - "read_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.claude/memory/**"
    decision: "AUDIT"
    reason: "Accessing Claude Code memory files via MCP — these files persist sensitive context (credentials, architectural decisions, API keys) across agent sessions and may expose prior session data to unauthorized readers. OWASP LLM02."
    confidence: 0.85

  # === AUDIT: Cross-tenant agent data leakage via MCP ===
  # MCP tools accessing shared workspace paths without tenant-scoped isolation
  # can expose one tenant's data to another in shared agent infrastructure.
  # Taxonomy: data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage
  # OWASP LLM02 — Sensitive Information Disclosure, LLM06 — Excessive Agency
  - id: mcp-llmdf-audit-cross-tenant-tmp-workspace
    taxonomy: "data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "list_directory"
        - "list_dir"
        - "get_file_contents"
        - "cat_file"
      argument_patterns:
        path: "/tmp/mcp-workspace*"
    decision: "AUDIT"
    reason: "Accessing /tmp/mcp-workspace* via MCP — shared MCP workspace directories without tenant-scoped paths expose other tenants' tool call artifacts. Cross-tenant data leakage in shared agent infrastructure. OWASP LLM02/LLM06."
    confidence: 0.82

  - id: mcp-llmdf-audit-cross-tenant-shared-cache
    taxonomy: "data-exfiltration/llm-data-flow/cross-tenant-agent-data-leakage"
    match:
      tool_name_any:
        - "read_file"
        - "list_directory"
        - "list_dir"
        - "get_file_contents"
      argument_patterns:
        path: "/tmp/agent-cache*"
    decision: "AUDIT"
    reason: "Accessing /tmp/agent-cache* via MCP — shared agent cache directories in multi-tenant deployments may expose tool call results, session state, or intermediate data from other tenants. OWASP LLM02/LLM06."
    confidence: 0.80
