name: "MCP Safety"
description: "Block dangerous MCP tool invocations: shell execution, system directory writes, and dangerous tool patterns"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_tools:
  - "execute_command"
  - "run_shell"
  - "run_terminal_command"
  - "shell_exec"
  - "run_bash"
  - "run_code"
  - "eval_code"
  - "exec_code"

rules:
  # === BLOCK: System directory writes ===
  - id: mcp-safety-block-etc-write
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "/etc/**"
    decision: "BLOCK"
    reason: "File write to /etc/ system directory is blocked."

  - id: mcp-safety-block-usr-write
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "/usr/**"
    decision: "BLOCK"
    reason: "File write to /usr/ system directory is blocked."

  - id: mcp-safety-block-var-write
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "/var/**"
    decision: "BLOCK"
    reason: "File write to /var/ system directory is blocked."

  # === BLOCK: Root directory operations ===
  - id: mcp-safety-block-root-write
    taxonomy: "destructive-ops/fs-destruction/recursive-root-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "/"
    decision: "BLOCK"
    reason: "File write to filesystem root is blocked."

  # === AUDIT: File deletion tools ===
  - id: mcp-safety-audit-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_regex: "(delete_file|remove_file|unlink)"
    decision: "AUDIT"
    reason: "File deletion operations flagged for review."

  # === AUDIT: Process/system tools ===
  - id: mcp-safety-audit-process
    taxonomy: "destructive-ops/system-management/system-shutdown"
    match:
      tool_name_regex: "(kill_process|restart_service|stop_service|reboot)"
    decision: "AUDIT"
    reason: "Process/system management operations flagged for review."

  # === GUARDIAN: MCP tool description poisoning ===
  # Detection is implemented at the code level in internal/mcp/description_scanner.go.
  # This rule entry registers the taxonomy reference for coverage metrics.
  # The actual detection runs in the Guardian layer (handler.go) via PoisonSignal;
  # it is NOT evaluated by the YAML rule engine. The empty match means this rule
  # never fires from the YAML evaluator — all description-poisoning blocks come
  # from the code layer, not from policy YAML.
  - id: "mcp-guardian-tool-description-poisoning"
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-description-poisoning"
    match: {}  # empty match — rule never fires from YAML evaluator; detection is in description_scanner.go
    decision: "BLOCK"
    reason: "MCP tool description poisoning detected — hidden instructions or credential-harvesting prompts found in tool metadata"

# === Structural rules ===
# These match against tool name + argument field predicates for precise detection.
structural_rules:
  # Block any file-writing tool that targets sensitive system/credential paths
  - id: mcp-struct-block-sensitive-path-write
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      tool_name_any:
        - "write_file"
        - "save_file"
        - "update_file"
        - "create_file"
        - "filesystem_write"
        - "edit_file"
        - "write_to_file"
      args_match:
        path:
          pattern_any:
            - "\\.ssh/"
            - "\\.aws/"
            - "\\.gnupg/"
            - "\\.kube/"
            - "/etc/passwd"
            - "/etc/shadow"
    decision: "BLOCK"
    reason: "MCP tool writing to sensitive/protected path"
    confidence: 0.95

  # Block shell execution tools — these should go through AgentShield's command pipeline
  - id: mcp-struct-block-shell-execution
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      tool_name_any:
        - "execute_command"
        - "run_command"
        - "run_shell"
        - "shell_exec"
        - "run_bash"
        - "exec"
        - "terminal"
        - "run_terminal"
        - "bash_exec"
        - "command_runner"
    decision: "BLOCK"
    reason: "MCP tool that executes shell commands should go through AgentShield's command pipeline"
    confidence: 0.95

  # Block prompt injection patterns in any text/content argument
  - id: mcp-struct-block-prompt-injection-text
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-hallucination-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        text:
          pattern_any:
            - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
            - "(?i)disregard\\s+(all\\s+)?(your\\s+)?instructions"
            - "(?i)<system>.*</system>"
            - "(?i)<IMPORTANT>.*</IMPORTANT>"
    decision: "BLOCK"
    reason: "Prompt injection detected in text argument — attempt to manipulate LLM behavior"
    confidence: 0.95

  - id: mcp-struct-block-prompt-injection-content
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-hallucination-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
            - "(?i)disregard\\s+(all\\s+)?(your\\s+)?instructions"
            - "(?i)<system>.*</system>"
            - "(?i)<IMPORTANT>.*</IMPORTANT>"
    decision: "BLOCK"
    reason: "Prompt injection detected in content argument — attempt to manipulate LLM behavior"
    confidence: 0.95

  - id: mcp-struct-block-prompt-injection-messages
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-hallucination-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        messages:
          pattern_any:
            - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
            - "(?i)disregard\\s+(all\\s+)?(your\\s+)?instructions"
            - "(?i)<system>.*</system>"
            - "(?i)<IMPORTANT>.*</IMPORTANT>"
    decision: "BLOCK"
    reason: "Prompt injection detected in messages argument — attempt to manipulate LLM behavior"
    confidence: 0.95

  # Block path traversal patterns in path/directory arguments
  - id: mcp-struct-block-path-traversal
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "\\.\\./"
            - "\\.\\.\\\\"
    decision: "BLOCK"
    reason: "Path traversal detected in path argument — attempt to escape intended directory"
    confidence: 0.95

  - id: mcp-struct-block-path-traversal-directory
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      tool_name_regex: ".*"
      args_match:
        directory:
          pattern_any:
            - "\\.\\./"
            - "\\.\\.\\\\"
    decision: "BLOCK"
    reason: "Path traversal detected in directory argument — attempt to escape intended directory"
    confidence: 0.95

  # Block SSRF — requests to cloud metadata endpoints and internal IP ranges
  - id: mcp-struct-block-ssrf-metadata
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
    decision: "BLOCK"
    reason: "SSRF detected — request to cloud metadata endpoint"
    confidence: 0.95

  - id: mcp-struct-block-ssrf-metadata-endpoint
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        endpoint:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://localhost:[0-9]+"
            - "(?i)https?://127\\.0\\.0\\.1"
    decision: "BLOCK"
    reason: "SSRF detected — request to internal service via endpoint argument"
    confidence: 0.95

  - id: mcp-struct-block-ssrf-private-network
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
    decision: "BLOCK"
    reason: "SSRF detected — request to private network IP range"
    confidence: 0.90

  # Block SSRF via alternative argument names (target, server, base_url)
  # Many tools expose network access through non-standard argument names that
  # the url/endpoint rules above do not cover (closes #164).
  - id: mcp-struct-block-ssrf-target
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        target:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
            - "(?i)https?://127\\.0\\.0\\.1"
            - "(?i)https?://localhost"
    decision: "BLOCK"
    reason: "SSRF detected via 'target' argument — request to metadata endpoint or private network"
    confidence: 0.90

  - id: mcp-struct-block-ssrf-server
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        server:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
            - "(?i)https?://127\\.0\\.0\\.1"
            - "(?i)https?://localhost"
    decision: "BLOCK"
    reason: "SSRF detected via 'server' argument — request to metadata endpoint or private network"
    confidence: 0.90

  - id: mcp-struct-block-ssrf-base-url
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        base_url:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
            - "(?i)https?://127\\.0\\.0\\.1"
            - "(?i)https?://localhost"
    decision: "BLOCK"
    reason: "SSRF detected via 'base_url' argument — request to metadata endpoint or private network"
    confidence: 0.90

  # Block SQL injection patterns in query/filter arguments
  - id: mcp-struct-block-sql-injection-query
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        query:
          pattern_any:
            - "(?i)(';|\"\\s*;)\\s*(DROP|DELETE|INSERT|UPDATE|ALTER|CREATE)\\s+"
            - "(?i)UNION\\s+(ALL\\s+)?SELECT\\s+"
            - "(?i)OR\\s+1\\s*=\\s*1"
            - "(?i)--\\s*$"
    decision: "BLOCK"
    reason: "SQL injection detected in query argument"
    confidence: 0.90

  - id: mcp-struct-block-sql-injection-filter
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        filter:
          pattern_any:
            - "(?i)(';|\"\\s*;)\\s*(DROP|DELETE|INSERT|UPDATE|ALTER|CREATE)\\s+"
            - "(?i)UNION\\s+(ALL\\s+)?SELECT\\s+"
            - "(?i)OR\\s+1\\s*=\\s*1"
    decision: "BLOCK"
    reason: "SQL injection detected in filter argument"
    confidence: 0.90

  # Block privilege escalation — permission changes on system paths
  - id: mcp-struct-block-privesc-permissions
    taxonomy: "privilege-escalation/file-permissions/ownership-change"
    match:
      tool_name_regex: "(?i)(set_perm|chmod|change_perm|set_permissions)"
      args_match:
        path:
          pattern_any:
            - "^/etc/"
            - "^/usr/"
            - "^/var/"
            - "/cron"
            - "/sudoers"
    decision: "BLOCK"
    reason: "Privilege escalation — permission change on system-critical path"
    confidence: 0.95

  # Block auth bypass configuration changes
  - id: mcp-struct-block-auth-bypass
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      tool_name_regex: "(?i)(modify_config|set_config|update_config|update_setting)"
      args_match:
        key:
          pattern_any:
            - "(?i)auth\\.bypass"
            - "(?i)security\\.disabled"
            - "(?i)auth\\.disabled"
            - "(?i)authentication\\.enabled.*false"
    decision: "BLOCK"
    reason: "Privilege escalation — attempt to disable authentication via config modification"
    confidence: 0.95

  # Block shell commands in any argument named 'command' or 'exec' (catches renamed tools)
  - id: mcp-struct-block-shell-in-command-arg
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      tool_name_regex: ".*"
      args_match:
        command:
          pattern_any:
            - "(?i)curl\\s+.*\\|\\s*(ba)?sh"
            - "(?i)wget\\s+.*\\|\\s*(ba)?sh"
            - "(?i)nc\\s+(-e|--exec)\\s+"
            - "(?i)/bin/(ba)?sh"
    decision: "BLOCK"
    reason: "Shell command detected in command argument — possible disguised execution tool"
    confidence: 0.90

  - id: mcp-struct-block-shell-in-exec-arg
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      tool_name_regex: ".*"
      args_match:
        exec:
          pattern_any:
            - "(?i)curl\\s+.*\\|\\s*(ba)?sh"
            - "(?i)wget\\s+.*\\|\\s*(ba)?sh"
            - "(?i)nc\\s+(-e|--exec)\\s+"
            - "(?i)/bin/(ba)?sh"
            - "(?i)\\brm\\s+-[rf]"
            - "(?i)\\bmkfifo\\b"
    decision: "BLOCK"
    reason: "Shell command detected in exec argument — hidden command execution"
    confidence: 0.90

  # Audit network requests to non-local destinations
  - id: mcp-struct-audit-network-request
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_any:
        - "http_request"
        - "fetch_url"
        - "api_call"
        - "curl"
        - "wget"
        - "make_request"
      args_match:
        url:
          pattern_not:
            - "^https?://localhost"
            - "^https?://127\\.0\\.0\\.1"
    decision: "AUDIT"
    reason: "MCP tool making external network request"
    confidence: 0.85

# === Semantic rules ===
# These classify tool INTENT using heuristic signals from tool name, description,
# argument names, and argument values. Catches disguised/renamed tools that
# regex and structural matching would miss.
semantic_rules:
  - id: "mcp-sem-block-code-execute"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      intent_any: ["code-execute", "shell-command"]
      confidence_min: 0.7
    decision: "BLOCK"
    reason: "MCP tool classified as code execution — should go through AgentShield command pipeline"

  - id: "mcp-sem-audit-network-request"
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      intent_any: ["network-request"]
      confidence_min: 0.6
    decision: "AUDIT"
    reason: "MCP tool classified as external network request"

  - id: "mcp-sem-block-credential-access"
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      intent_any: ["credential-read"]
      confidence_min: 0.7
    decision: "BLOCK"
    reason: "MCP tool classified as credential access"

  - id: "mcp-sem-audit-file-delete"
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      intent_any: ["file-delete"]
      confidence_min: 0.6
    decision: "AUDIT"
    reason: "MCP tool classified as file deletion"

  - id: "mcp-sem-block-process-manage"
    taxonomy: "destructive-ops/system-management/system-shutdown"
    match:
      intent_any: ["process-manage"]
      confidence_min: 0.7
    decision: "BLOCK"
    reason: "MCP tool classified as process management"
