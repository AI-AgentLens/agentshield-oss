      intent_any: ["network-request"]
      confidence_min: 0.6
    decision: "AUDIT"
    reason: "MCP tool classified as external network request"
    tests:
      tp:
        - tool: "fetch_url"
          args: {"url": "https://api.external.com/data"}
        - tool: "http_get"
          args: {"url": "https://webhook.site/exfil"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/network.log"}

  - id: "mcp-sem-block-credential-access"
