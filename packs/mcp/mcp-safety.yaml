name: "MCP Safety"
description: "Block dangerous MCP tool invocations: shell execution, system directory writes, and dangerous tool patterns"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_tools:
  - "execute_command"
  - "run_shell"
  - "run_terminal_command"
  - "shell_exec"
  - "run_bash"
  - "run_code"
  - "eval_code"
  - "exec_code"

rules:
  # === BLOCK: System directory writes ===
  - id: mcp-safety-block-etc-write
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "append_file"
        - "save_file"
        - "update_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "/etc/**"
    decision: "BLOCK"
    reason: "File write to /etc/ system directory is blocked."

  - id: mcp-safety-block-usr-write
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "append_file"
        - "save_file"
        - "update_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "/usr/**"
    decision: "BLOCK"
    reason: "File write to /usr/ system directory is blocked."

  - id: mcp-safety-block-var-write
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "append_file"
        - "save_file"
        - "update_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "/var/cron/**"
    decision: "BLOCK"
    reason: "File write to /var/cron/ system directory is blocked — cron persistence path."

  - id: mcp-safety-block-var-spool-cron-write
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "append_file"
        - "save_file"
        - "update_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "/var/spool/cron/**"
    decision: "BLOCK"
    reason: "File write to /var/spool/cron/ system directory is blocked — cron spool persistence path. MITRE T1053.003."

  # === BLOCK: Root directory operations ===
  - id: mcp-safety-block-root-write
    taxonomy: "destructive-ops/fs-destruction/recursive-root-delete"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "append_file"
        - "save_file"
        - "update_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "/"
    decision: "BLOCK"
    reason: "File write to filesystem root is blocked."

  # === BLOCK: System directory deletions ===
  # Deleting system files is as dangerous as overwriting them — must be blocked, not just audited.
  - id: mcp-safety-block-system-path-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "delete_file"
        - "remove_file"
        - "unlink"
      argument_patterns:
        path: "/etc/**"
    decision: "BLOCK"
    reason: "File deletion in /etc/ system directory is blocked — deleting system config files (passwd, hosts, resolv.conf) causes irreversible system damage. MITRE T1485."

  - id: mcp-safety-block-usr-path-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "delete_file"
        - "remove_file"
        - "unlink"
      argument_patterns:
        path: "/usr/**"
    decision: "BLOCK"
    reason: "File deletion in /usr/ system directory is blocked — deleting system binaries or libraries causes irreversible damage. MITRE T1485."

  - id: mcp-safety-block-bin-path-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "delete_file"
        - "remove_file"
        - "unlink"
      argument_patterns:
        path: "/bin/**"
    decision: "BLOCK"
    reason: "File deletion in /bin/ system directory is blocked — deleting core system binaries (bash, ls, cp) is irreversibly destructive. MITRE T1485."

  - id: mcp-safety-block-sbin-path-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "delete_file"
        - "remove_file"
        - "unlink"
      argument_patterns:
        path: "/sbin/**"
    decision: "BLOCK"
    reason: "File deletion in /sbin/ system directory is blocked — deleting system administration binaries is irreversibly destructive. MITRE T1485."

  - id: mcp-safety-block-lib-path-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "delete_file"
        - "remove_file"
        - "unlink"
      argument_patterns:
        path: "/lib/**"
    decision: "BLOCK"
    reason: "File deletion in /lib/ system directory is blocked — deleting shared libraries breaks dependent system services. MITRE T1485."

  - id: mcp-safety-block-boot-path-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_any:
        - "delete_file"
        - "remove_file"
        - "unlink"
      argument_patterns:
        path: "/boot/**"
    decision: "BLOCK"
    reason: "File deletion in /boot/ system directory is blocked — deleting kernel or bootloader files bricks the system. MITRE T1485."

  # === AUDIT: File deletion tools ===
  - id: mcp-safety-audit-delete
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      tool_name_regex: "(delete_file|remove_file|unlink)"
    decision: "AUDIT"
    reason: "File deletion operations flagged for review."

  # === AUDIT: Process/system tools ===
  - id: mcp-safety-audit-process
    taxonomy: "destructive-ops/system-management/system-shutdown"
    match:
      tool_name_regex: "(kill_process|restart_service|stop_service|reboot)"
    decision: "AUDIT"
    reason: "Process/system management operations flagged for review."

  # === GUARDIAN: MCP tool description poisoning ===
  # Detection is implemented at the code level in internal/mcp/description_scanner.go.
  # This rule entry registers the taxonomy reference for coverage metrics.
  # The actual detection runs in the Guardian layer (handler.go) via PoisonSignal;
  # it is NOT evaluated by the YAML rule engine. The empty match means this rule
  # never fires from the YAML evaluator — all description-poisoning blocks come
  # from the code layer, not from policy YAML.
  - id: "mcp-guardian-tool-description-poisoning"
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-description-poisoning"
    match: {}  # empty match — rule never fires from YAML evaluator; detection is in description_scanner.go
    decision: "BLOCK"
    reason: "MCP tool description poisoning detected — hidden instructions or credential-harvesting prompts found in tool metadata"

  # === AUDIT: MCP tool description rug-pull (TOCTOU description drift) ===
  # Detection is performed at the proxy layer by SchemaDriftScanner
  # (internal/mcp/schema_drift_scanner.go) and annotation consistency checks
  # in description_scanner.go. When a tool's description changes between sessions
  # (post-approval mutation), the proxy emits an AUDIT event with rule ID
  # "mcp-sec-audit-tool-description-changed". This YAML entry registers the
  # taxonomy reference — the sentinel match never fires from the YAML evaluator.
  # OWASP LLM07 — System Prompt Leakage, LLM09 — Misinformation
  # MITRE T1036 (Masquerading), T1195 (Supply Chain), CWE-367 (TOCTOU)
  - id: "mcp-sec-audit-tool-description-changed"
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-rug-pull"
    match: {}  # empty match — rule never fires from YAML; detection is in schema_drift_scanner.go + description_scanner.go
    decision: "AUDIT"
    reason: "MCP tool description changed since last approval — possible rug-pull attack where server altered tool behavior post-authorization. Re-verify tool intent before use. OWASP LLM07/LLM09, MITRE T1036/T1195."
    confidence: 0.85

  # === AUDIT: MCP tool annotation spoofing (YAML-evaluatable complement to code-level detection) ===
  # MCP 2025 tool annotations (readOnly, destructive, idempotent, openWorld) are
  # informational hints that are NOT security boundaries per the spec. A malicious
  # server can set readOnly:true on a destructive tool to bypass confirmation dialogs,
  # or set openWorld:false to conceal egress behavior from monitors.
  # Detection is in description_scanner.go (SignalAnnotationSpoofing). This YAML entry
  # registers the taxonomy reference for coverage metrics.
  # OWASP LLM07, LLM09 — MITRE T1036, T1562 — CWE-345, CWE-807
  - id: "mcp-guardian-annotation-spoofing"
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-annotation-spoofing"
    match: {}  # empty match — rule never fires from YAML; detection is in description_scanner.go
    decision: "AUDIT"
    reason: "MCP tool annotation inconsistency detected — readOnly:true annotation contradicts destructive verb in tool name, or openWorld:false conceals egress behavior. Possible rug-pull via annotation spoofing. OWASP LLM07/LLM09."
    confidence: 0.82

  # === BLOCK: Tool name injection patterns (YAML-evaluatable complement to code-level detection) ===
  # A poisoned MCP server may install tools with names that themselves contain
  # injected instructions or dual-use keywords. Blocking calls to tools whose
  # names match injection-pattern keywords catches attacks that slip past
  # description scanning (e.g., tool installed before description_scanner runs).
  # Taxonomy: unauthorized-execution/agentic-attacks/mcp-tool-description-poisoning
  # References: OWASP LLM01 (Prompt Injection), MITRE T1566
  - id: "mcp-safety-block-tool-name-injection"
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-description-poisoning"
    match:
      tool_name_regex: "(?i)(ignore[_\\-.]previous|system[_\\-.]prompt|jailbreak|override[_\\-.]instructions|bypass[_\\-.]safety|disable[_\\-.]filter|forget[_\\-.]instructions)"
    decision: "BLOCK"
    reason: "Tool name contains prompt-injection or jailbreak keywords — likely installed by a poisoned MCP server to hijack agent behavior (LLM01: mcp-tool-description-poisoning)"
    confidence: 0.95

# === Structural rules ===
# These match against tool name + argument field predicates for precise detection.
structural_rules:
  # Block any file-writing tool that targets sensitive system/credential paths
  - id: mcp-struct-block-sensitive-path-write
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      tool_name_any:
        - "write_file"
        - "save_file"
        - "update_file"
        - "create_file"
        - "filesystem_write"
        - "edit_file"
        - "write_to_file"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)(?:home/[^/]+|root|Users/[^/]+|~)/?\\.ssh/"
            - "\\.aws/"
            - "\\.gnupg/"
            - "\\.kube/"
            - "/etc/passwd"
            - "/etc/shadow"
    decision: "BLOCK"
    reason: "MCP tool writing to sensitive/protected path"
    confidence: 0.95

  # Block shell execution tools — these should go through AgentShield's command pipeline
  - id: mcp-struct-block-shell-execution
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      tool_name_any:
        - "execute_command"
        - "run_command"
        - "run_shell"
        - "shell_exec"
        - "run_bash"
        - "exec"
        - "terminal"
        - "run_terminal"
        - "bash_exec"
        - "command_runner"
    decision: "BLOCK"
    reason: "MCP tool that executes shell commands should go through AgentShield's command pipeline"
    confidence: 0.95

  # Block prompt injection patterns in any text/content argument
  - id: mcp-struct-block-prompt-injection-text
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-hallucination-injection"
    match:
      tool_name_regex: ".*"
      exclude_args_match:
        path:
          pattern_any:
            - "(?i).*[/\\\\]tests?[/\\\\].*"
            - "(?i)^tests?[/\\\\].*"
            - "(?i).*[/\\\\]docs?[/\\\\].*"
            - "(?i)^docs?[/\\\\].*"
            - "(?i).*[/\\\\]testdata[/\\\\].*"
            - "(?i)^testdata[/\\\\].*"
      args_match:
        text:
          pattern_any:
            - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
            - "(?i)disregard\\s+(all\\s+)?(your\\s+)?instructions"
            - "(?i)<system>.*</system>"
            - "(?i)<IMPORTANT>.*</IMPORTANT>"
    decision: "BLOCK"
    reason: "Prompt injection detected in text argument — attempt to manipulate LLM behavior"
    confidence: 0.95

  - id: mcp-struct-block-prompt-injection-content
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-hallucination-injection"
    match:
      tool_name_regex: ".*"
      exclude_args_match:
        # Exclude writes to taxonomy/documentation YAML files — these legitimately
        # contain documented attack examples in their examples.bad sections and are
        # never sent to an LLM as prompts. Writing YAML docs to disk is not injection.
        # Also exclude test/, docs/, and testdata/ directories which contain examples
        # of injection patterns as test fixtures or documentation, not live payloads.
        path:
          pattern_any:
            - ".*/taxonomy/.*\\.ya?ml$"
            - ".*/.claude/commands/.*\\.(md|yaml|yml)$"
            - "(?i).*[/\\\\]tests?[/\\\\].*"
            - "(?i)^tests?[/\\\\].*"
            - "(?i).*[/\\\\]docs?[/\\\\].*"
            - "(?i)^docs?[/\\\\].*"
            - "(?i).*[/\\\\]testdata[/\\\\].*"
            - "(?i)^testdata[/\\\\].*"
      args_match:
        content:
          pattern_any:
            - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
            - "(?i)disregard\\s+(all\\s+)?(your\\s+)?instructions"
            - "(?i)<system>.*</system>"
            - "(?i)<IMPORTANT>.*</IMPORTANT>"
    decision: "BLOCK"
    reason: "Prompt injection detected in content argument — attempt to manipulate LLM behavior"
    confidence: 0.95

  - id: mcp-struct-block-prompt-injection-messages
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-hallucination-injection"
    match:
      tool_name_regex: ".*"
      exclude_args_match:
        path:
          pattern_any:
            - "(?i).*[/\\\\]tests?[/\\\\].*"
            - "(?i)^tests?[/\\\\].*"
            - "(?i).*[/\\\\]docs?[/\\\\].*"
            - "(?i)^docs?[/\\\\].*"
            - "(?i).*[/\\\\]testdata[/\\\\].*"
            - "(?i)^testdata[/\\\\].*"
      args_match:
        messages:
          pattern_any:
            - "(?i)ignore\\s+(all\\s+)?previous\\s+instructions"
            - "(?i)disregard\\s+(all\\s+)?(your\\s+)?instructions"
            - "(?i)<system>.*</system>"
            - "(?i)<IMPORTANT>.*</IMPORTANT>"
    decision: "BLOCK"
    reason: "Prompt injection detected in messages argument — attempt to manipulate LLM behavior"
    confidence: 0.95

  # Block path traversal patterns in path/directory arguments
  - id: mcp-struct-block-path-traversal
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "\\.\\./"
            - "\\.\\.\\\\"
            - "%2e%2e[%2f/\\\\]"
            - "%2E%2E[%2F/\\\\]"
            - "\\.\\.[%2F%5C]"
            - "\\.\\.%2[fF]"
            - "\\.\\.%5[cC]"
    decision: "BLOCK"
    reason: "Path traversal detected in path argument (including URL-encoded variants) — attempt to escape intended directory"
    confidence: 0.95

  - id: mcp-struct-block-path-traversal-directory
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      tool_name_regex: ".*"
      args_match:
        directory:
          pattern_any:
            - "\\.\\./"
            - "\\.\\.\\\\"
            - "%2e%2e[%2f/\\\\]"
            - "%2E%2E[%2F/\\\\]"
            - "\\.\\.[%2F%5C]"
            - "\\.\\.%2[fF]"
            - "\\.\\.%5[cC]"
    decision: "BLOCK"
    reason: "Path traversal detected in directory argument (including URL-encoded variants) — attempt to escape intended directory"
    confidence: 0.95

  # Block SSRF — requests to cloud metadata endpoints and internal IP ranges
  - id: mcp-struct-block-ssrf-metadata
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
    decision: "BLOCK"
    reason: "SSRF detected — request to cloud metadata endpoint"
    confidence: 0.95

  - id: mcp-struct-block-ssrf-metadata-endpoint
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        endpoint:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://localhost:[0-9]+"
            - "(?i)https?://127\\.0\\.0\\.1"
    decision: "BLOCK"
    reason: "SSRF detected — request to internal service via endpoint argument"
    confidence: 0.95

  - id: mcp-struct-block-ssrf-private-network
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        url:
          pattern_any:
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
    decision: "AUDIT"
    reason: "SSRF suspected — request to private network IP range. Downgraded to AUDIT: private IPs are common in local dev/microservices environments. MITRE T1090."
    confidence: 0.75

  # Block SSRF via alternative argument names (target, server, base_url)
  # Many tools expose network access through non-standard argument names that
  # the url/endpoint rules above do not cover (closes #164).
  - id: mcp-struct-block-ssrf-target
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        target:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
            - "(?i)https?://127\\.0\\.0\\.1"
            - "(?i)https?://localhost"
    decision: "BLOCK"
    reason: "SSRF detected via 'target' argument — request to metadata endpoint or private network"
    confidence: 0.90

  - id: mcp-struct-block-ssrf-server
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        server:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
            - "(?i)https?://127\\.0\\.0\\.1"
            - "(?i)https?://localhost"
    decision: "BLOCK"
    reason: "SSRF detected via 'server' argument — request to metadata endpoint or private network"
    confidence: 0.90

  - id: mcp-struct-block-ssrf-base-url
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_regex: ".*"
      args_match:
        base_url:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.azure\\.com"
            - "(?i)https?://10\\."
            - "(?i)https?://172\\.(1[6-9]|2[0-9]|3[01])\\."
            - "(?i)https?://192\\.168\\."
            - "(?i)https?://127\\.0\\.0\\.1"
            - "(?i)https?://localhost"
    decision: "BLOCK"
    reason: "SSRF detected via 'base_url' argument — request to metadata endpoint or private network"
    confidence: 0.90

  # Block SQL injection patterns in query/filter arguments
  - id: mcp-struct-block-sql-injection-query
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        query:
          pattern_any:
            - "(?i)(';|\"\\s*;)\\s*(DROP|DELETE|INSERT|UPDATE|ALTER|CREATE)\\s+"
            - "(?i)UNION\\s+(ALL\\s+)?SELECT\\s+"
            - "(?i)OR\\s+1\\s*=\\s*1"
    decision: "BLOCK"
    reason: "SQL injection detected in query argument"
    confidence: 0.90

  - id: mcp-struct-block-sql-injection-filter
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      tool_name_regex: ".*"
      args_match:
        filter:
          pattern_any:
            - "(?i)(';|\"\\s*;)\\s*(DROP|DELETE|INSERT|UPDATE|ALTER|CREATE)\\s+"
            - "(?i)UNION\\s+(ALL\\s+)?SELECT\\s+"
            - "(?i)OR\\s+1\\s*=\\s*1"
    decision: "BLOCK"
    reason: "SQL injection detected in filter argument"
    confidence: 0.90

  # Block privilege escalation — permission changes on system paths
  - id: mcp-struct-block-privesc-permissions
    taxonomy: "privilege-escalation/file-permissions/ownership-change"
    match:
      tool_name_regex: "(?i)(set_perm|chmod|change_perm|set_permissions)"
      args_match:
        path:
          pattern_any:
            - "^/etc/"
            - "^/usr/"
            - "^/var/"
            - "/cron"
            - "/sudoers"
    decision: "BLOCK"
    reason: "Privilege escalation — permission change on system-critical path"
    confidence: 0.95

  # Block auth bypass configuration changes
  - id: mcp-struct-block-auth-bypass
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      tool_name_regex: "(?i)(modify_config|set_config|update_config|update_setting)"
      args_match:
        key:
          pattern_any:
            - "(?i)auth\\.bypass"
            - "(?i)security\\.disabled"
            - "(?i)auth\\.disabled"
            - "(?i)authentication\\.enabled.*false"
    decision: "BLOCK"
    reason: "Privilege escalation — attempt to disable authentication via config modification"
    confidence: 0.95

  # Block shell commands in any argument named 'command' or 'exec' (catches renamed tools)
  - id: mcp-struct-block-shell-in-command-arg
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      tool_name_regex: ".*"
      args_match:
        command:
          pattern_any:
            - "(?i)curl\\s+.*\\|\\s*(ba)?sh"
            - "(?i)wget\\s+.*\\|\\s*(ba)?sh"
            - "(?i)nc\\s+(-e|--exec)\\s+"
            - "(?i)/bin/(ba)?sh"
    decision: "BLOCK"
    reason: "Shell command detected in command argument — possible disguised execution tool"
    confidence: 0.90

  - id: mcp-struct-block-shell-in-exec-arg
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      tool_name_regex: ".*"
      args_match:
        exec:
          pattern_any:
            - "(?i)curl\\s+.*\\|\\s*(ba)?sh"
            - "(?i)wget\\s+.*\\|\\s*(ba)?sh"
            - "(?i)nc\\s+(-e|--exec)\\s+"
            - "(?i)/bin/(ba)?sh"
            - "(?i)\\brm\\s+-[rf]"
            - "(?i)\\bmkfifo\\b"
    decision: "BLOCK"
    reason: "Shell command detected in exec argument — hidden command execution"
    confidence: 0.90

  # Audit network requests to non-local destinations
  - id: mcp-struct-audit-network-request
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      tool_name_any:
        - "http_request"
        - "fetch_url"
        - "api_call"
        - "curl"
        - "wget"
        - "make_request"
      args_match:
        url:
          pattern_not:
            - "^https?://localhost"
            - "^https?://127\\.0\\.0\\.1"
    decision: "AUDIT"
    reason: "MCP tool making external network request"
    confidence: 0.85

# === Semantic rules ===
# These classify tool INTENT using heuristic signals from tool name, description,
# argument names, and argument values. Catches disguised/renamed tools that
# regex and structural matching would miss.
semantic_rules:
  - id: "mcp-sem-block-code-execute"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      intent_any: ["code-execute", "shell-command"]
      confidence_min: 0.7
    decision: "BLOCK"
    reason: "MCP tool classified as code execution — should go through AgentShield command pipeline"

  - id: "mcp-sem-audit-network-request"
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      intent_any: ["network-request"]
      confidence_min: 0.6
    decision: "AUDIT"
    reason: "MCP tool classified as external network request"

  - id: "mcp-sem-block-credential-access"
    taxonomy: "credential-exposure/config-file-access/generic-config-access"
    match:
      intent_any: ["credential-read"]
      confidence_min: 0.7
    decision: "BLOCK"
    reason: "MCP tool classified as credential access"

  - id: "mcp-sem-audit-file-delete"
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      intent_any: ["file-delete"]
      confidence_min: 0.6
    decision: "AUDIT"
    reason: "MCP tool classified as file deletion"

  - id: "mcp-sem-block-process-manage"
    taxonomy: "destructive-ops/system-management/system-shutdown"
    match:
      intent_any: ["process-manage"]
      confidence_min: 0.7
    decision: "BLOCK"
    reason: "MCP tool classified as process management"

  # === AUDIT: Adversarial compliance handshake in MCP tool arguments ===
  #
  # Jailbroken LLMs often preface responses with affirmative compliance phrases
  # ("Sure, here is...", "Absolutely, I'll...") before executing attacker-
  # instructed operations. When these signatures appear inside MCP tool content
  # or text arguments, a jailbroken model may be passing attacker-generated
  # content through MCP tooling.
  #
  # This is the MCP companion to the terminal rule ts-block-jailbreak-compliance-prefix.
  # Decision: AUDIT — detection is probabilistic; phrases appear in benign
  # assistant content too. Human review confirms whether the payload is malicious.
  #
  # Reference: Zou et al. 2023 (GCG attack), AutoDAN (2023)
  # OWASP LLM01 (Prompt Injection), LLM05 (Improper Output Handling)
  - id: mcp-safety-audit-jailbreak-compliance-content
    taxonomy: "unauthorized-execution/agentic-attacks/adversarial-suffix-jailbreak"
    match:
      tool_name_regex: "(?i)(create_message|generate_text|complete|llm_generate|chat_completion|send_message|ask_llm|query_model|generate|completion|inference|predict)"
      args_match:
        content:
          pattern_any:
            - "(?i)\\bsure[,!]?\\s+here(?:'s|\\s+is|\\s+are)\\b"
            - "(?i)\\babsolutely[,!]?\\s+(?:i(?:'ll|\\s+will)|here)\\b"
            - "(?i)\\bof\\s+course[,!]?\\s+(?:i(?:'ll|\\s+will)|here)\\b"
            - "(?i)\\bcertainly[,!]?\\s+(?:i(?:'ll|\\s+will)|here|below)\\b"
            - "(?i)\\bhappy\\s+to\\s+help[,!]?\\s+here\\b"
    decision: "AUDIT"
    reason: "Compliance handshake phrase in MCP tool content argument — characteristic output signature of a jailbroken LLM (GCG/AutoDAN adversarial suffix attack). The affirmative preamble indicates the model was manipulated into complying with a harmful instruction. OWASP LLM01, LLM05."
    confidence: 0.75

  - id: mcp-safety-audit-jailbreak-compliance-text
    taxonomy: "unauthorized-execution/agentic-attacks/adversarial-suffix-jailbreak"
    match:
      tool_name_regex: "(?i)(create_message|generate_text|complete|llm_generate|chat_completion|send_message|ask_llm|query_model|generate|completion|inference|predict)"
      args_match:
        text:
          pattern_any:
            - "(?i)\\bsure[,!]?\\s+here(?:'s|\\s+is|\\s+are)\\b"
            - "(?i)\\babsolutely[,!]?\\s+(?:i(?:'ll|\\s+will)|here)\\b"
            - "(?i)\\bof\\s+course[,!]?\\s+(?:i(?:'ll|\\s+will)|here)\\b"
            - "(?i)\\bcertainly[,!]?\\s+(?:i(?:'ll|\\s+will)|here|below)\\b"
            - "(?i)\\bhappy\\s+to\\s+help[,!]?\\s+here\\b"
    decision: "AUDIT"
    reason: "Compliance handshake phrase in MCP tool text argument — characteristic output signature of a jailbroken LLM passing attacker-generated content through MCP tooling. OWASP LLM01, LLM05."
    confidence: 0.75

  # === AUDIT/BLOCK: MCP sampling/createMessage server-initiated prompt injection (issue #202) ===
  #
  # The MCP sampling capability (sampling/createMessage) allows MCP servers to request
  # the LLM host to generate text completions on their behalf. Unlike tool calls
  # (user/agent-initiated), sampling requests are SERVER-INITIATED — creating a novel
  # server-controlled prompt injection surface with no shell equivalent.
  #
  # Attack vectors enabled by unguarded sampling:
  #   - Server injects adversarial instructions into sampling messages → LLM processes
  #     them in a fresh context where session guardrails may not apply
  #   - Consent bypass: MCP spec uses SHOULD (not MUST) for user consent flows —
  #     many host implementations auto-forward sampling requests without user visibility
  #   - Tool gate bypass: sampling can launder unauthorized tool calls by having the
  #     LLM generate completions that include tool invocations
  #   - Context contamination: sampling responses returned to server may be used to
  #     construct more convincing subsequent attack payloads
  #
  # Detection is performed at the MCP proxy layer by HandleSamplingCreateMessage()
  # in internal/mcp/handler.go, which:
  #   - AUDITS all sampling/createMessage requests (rule: "sampling-audit")
  #   - BLOCKS those containing injection, credential-harvesting, or exfiltration
  #     patterns detected by ScanSamplingMessages() (rule: "sampling-content-scan")
  #
  # This YAML entry is a sentinel rule that:
  #   1. Documents the taxonomy linkage for agentshield scan output
  #   2. Surfaces this detection category in rule coverage reports
  #   3. Links to the proxy-layer implementation (not evaluated via YAML rule engine)
  #
  # The sentinel tool_name_regex "^__mcp_sampling_request_abuse__$" never matches a
  # real MCP tool — actual detection fires from the proxy layer before rule evaluation.
  #
  # OWASP LLM 2025: LLM01 (Prompt Injection), LLM06 (Excessive Agency), LLM03
  # MITRE: T1059 (Command Scripting), T1071 (App Layer Protocol), T1106
  # CWE: CWE-94 (Code Injection), CWE-829 (Inclusion of Functionality from Untrusted Source)
  - id: mcp-sampling-request-abuse
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-sampling-request-abuse"
    match:
      tool_name_regex: "^__mcp_sampling_request_abuse__$"
    decision: "BLOCK"
    reason: "MCP sampling/createMessage server-initiated request contains prompt injection, credential-harvesting, or exfiltration patterns. Sampling requests are server-controlled — this is a consent bypass and tool gate bypass vector. Detection via proxy-layer ScanSamplingMessages(). OWASP LLM01/LLM06/LLM03, MITRE T1059."
    confidence: 0.90

  # === BLOCK/AUDIT: MCP elicitation/create credential harvesting and social engineering (issue #303) ===
  #
  # MCP 2025 added the elicitation/create request type, which allows MCP servers to prompt
  # the client for structured user input. This is a novel server-initiated social engineering
  # surface with no shell equivalent:
  #
  #   - Credential harvesting: server requests a schema with field names like "password",
  #     "token", "api_key" — the UI renders an input form that harvests the credential
  #   - Social engineering: urgency/threat framing in the message text coerces the user
  #     into approving dangerous operations ("Your session will expire immediately")
  #   - Approval laundering: framing a destructive action as a confirmation prompt
  #     ("Confirm deletion of all user data to proceed")
  #   - Safety bypass: asking user to "confirm" disabling safety checks
  #
  # Detection is performed at the MCP proxy layer by HandleElicitationCreate() in
  # internal/mcp/handler.go, which dispatches to ScanElicitationCreate() in
  # internal/mcp/elicitation_scanner.go:
  #   - BLOCK: requestedSchema contains credential-like field names (password, token, api_key, etc.)
  #   - AUDIT: message text contains social-engineering patterns (urgency, threat, coercion)
  #   - ALLOW: benign elicitation (project name, port number, output format)
  #
  # These sentinel rules document the taxonomy linkage and surface detection in
  # `agentshield scan` output. The tool_name_regex never matches a real MCP tool —
  # actual detection fires from the proxy layer before YAML rule evaluation.
  #
  # OWASP LLM 2025: LLM01 (Prompt Injection), LLM06 (Excessive Agency)
  # MITRE: T1566 (Phishing — social engineering), T1056.001 (Input Capture: Keylogging)
  # CWE: CWE-1021 (Improper Restriction of Rendered UI Layers), CWE-312 (Cleartext Storage)
  - id: mcp-guardian-elicitation-credential
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-elicitation-abuse"
    match:
      tool_name_regex: "^__mcp_elicitation_credential__$"
    decision: "BLOCK"
    reason: "MCP elicitation/create requests a credential-like schema field (password, token, api_key, secret) — server is harvesting credentials via structured UI prompt. Detection via proxy-layer ScanElicitationCreate(). OWASP LLM01/LLM06, MITRE T1566."
    confidence: 0.95

  - id: mcp-guardian-elicitation-social-engineering
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-elicitation-abuse"
    match:
      tool_name_regex: "^__mcp_elicitation_social_engineering__$"
    decision: "AUDIT"
    reason: "MCP elicitation/create message contains social engineering patterns (urgency framing, threat language, coercive approval prompts) — server may be manipulating the user into approving dangerous operations. Detection via proxy-layer ScanElicitationCreate(). OWASP LLM01, MITRE T1566."
    confidence: 0.82
