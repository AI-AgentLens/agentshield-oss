  # === BLOCK/AUDIT: MCP roots/list response privilege escalation (issue #330) ===
  #
  # The MCP "roots" capability (roots/list) lets MCP servers request that the client
  # declare which filesystem root URIs the server may access. A malicious or
  # compromised server can abuse this to enumerate sensitive directories:
  #
  # Attack vectors:
  #   - Overbroad root requests — server requests "/" or home dir encompassing ~/.ssh, ~/.aws
  #   - Root scope creep — server expands roots after establishing initial trust
  #   - Indirect root enumeration — server requests home dir ancestor then traverses downward
  #   - Relative path traversal via roots — "../.." sequences escape the declared workspace
  #
  # Detection is performed at the MCP proxy layer by HandleRootsListResponse() in
  # internal/mcp/handler.go, which calls EvaluateRootsList() in internal/mcp/policy.go:
  #   - BLOCK: root URI final component is a known credential directory (.ssh, .aws, .gnupg,
  #            .kube, .vault, .docker) or a multi-component credential path
  #            (e.g. .config/gcloud, .config/op, .config/helm), or root is inside a
  #            credential directory (path contains /.ssh/ etc.)
  #   - AUDIT: root URI is a broad parent directory (/, /home, /Users, /root, /etc, or
  #            any individual user home dir /home/<user> or /Users/<user>) that encompasses
  #            credential stores without being one itself
  #   - ALLOW: root URI is a narrow, project-scoped path (e.g. /workspace/myproject)
  #
  # These sentinel rules document the taxonomy linkage and surface detection in
  # `agentshield scan` output. The tool_name_regex never matches a real MCP tool —
  # actual detection fires from the proxy layer before YAML rule evaluation.
  #
  # References:
  #   - MCP 2025 roots specification: https://spec.modelcontextprotocol.io/
  #   - OWASP LLM 2025: LLM08 (Excessive Permissions / Privilege Escalation)
  #   - MITRE: T1078 (Valid Accounts), T1083 (File and Directory Discovery),
  #            T1005 (Data from Local System)
  #   - CWE: CWE-269 (Improper Privilege Management), CWE-22 (Path Traversal),
  #          CWE-284 (Improper Access Control)
  - id: mcp-roots-block-sensitive-cred-dir
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-roots-privilege-escalation"
    match:
      tool_name_regex: "^__mcp_roots_list_response__$"
    decision: "BLOCK"
    reason: "MCP roots/list response declares a credential directory (e.g. ~/.ssh, ~/.aws, ~/.gnupg, ~/.kube, ~/.vault, ~/.docker, .config/gcloud) as a root URI — grants the server direct access to secrets without any per-file tool call. Detection via proxy-layer EvaluateRootsList(). OWASP LLM08, MITRE T1078/T1083."
    confidence: 0.95
    tests:
      tp:
        - tool: "__mcp_roots_list_response__"
          args: {"uri": "file:///home/user/.ssh"}
        - tool: "__mcp_roots_list_response__"
          args: {"uri": "file:///home/user/.aws"}
      tn:
        - tool: "__mcp_roots_list_response__"
          args: {"uri": "file:///workspace/myproject"}

  - id: mcp-roots-audit-broad-dir
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-roots-privilege-escalation"
    match:
      tool_name_regex: "^__mcp_roots_list_response__$"
    decision: "AUDIT"
    reason: "MCP roots/list response declares a broad filesystem root (/, /home, /Users, or a user home dir) that encompasses credential directories — review whether this scope is necessary. Detection via proxy-layer EvaluateRootsList(). OWASP LLM08, MITRE T1083."
    confidence: 0.88
    tests:
      tp:
        - tool: "__mcp_roots_list_response__"
          args: {"uri": "file:///"}
        - tool: "__mcp_roots_list_response__"
          args: {"uri": "file:///home/user"}
      tn:
        - tool: "__mcp_roots_list_response__"
          args: {"uri": "file:///workspace/specific-project"}

  # ===========================================================================
  # MCP Tool Resource Exhaustion — Detectable Single-Call Patterns
  # ===========================================================================
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/mcp-tool-resource-exhaustion
  # OWASP LLM06/LLM04, NIST AI RMF MANAGE-2, CWE-400, CWE-770
  #
  # These rules detect single-call patterns that can exhaust MCP server resources.
  # Full rate-limiting (N calls per session per second) requires stateful session
  # tracking infrastructure and is not expressible as a YAML rule — these rules
  # cover the subset of resource exhaustion attacks detectable from a single call.
  #
  # /dev/zero and /dev/random are infinite-source virtual devices — reading them
  # via a file-reading MCP tool will cause the tool server to hang or OOM because
  # no bounded read will succeed. There is no legitimate AI agent use case for
  # reading these device files.

  - id: mcp-safety-audit-infinite-read-device
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-resource-exhaustion"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "read_resource"
      argument_patterns:
        path: "/dev/zero"
    decision: "AUDIT"
    confidence: 0.92
    reason: "MCP read targeting /dev/zero — an infinite-source virtual device with no bounded EOF. Reading it via a file-reading MCP tool will cause the server to hang or exhaust memory (CWE-400, CWE-770, OWASP LLM04)."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/dev/zero"}
        - tool: "cat_file"
          args: {"path": "/dev/zero"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/data.bin"}

  - id: mcp-safety-audit-random-device-read
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-resource-exhaustion"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "read_resource"
      argument_patterns:
        path: "/dev/random"
    decision: "AUDIT"
    confidence: 0.90
    reason: "MCP read targeting /dev/random — a blocking entropy device that may hang indefinitely when entropy is exhausted. No legitimate agent use case exists for reading this device (CWE-400, OWASP LLM04)."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/dev/random"}
        - tool: "get_file_contents"
          args: {"path": "/dev/random"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/random-seed.txt"}

  # Root filesystem directory listing can exhaust directory handles and I/O
  # bandwidth by scanning the entire filesystem tree. There is no legitimate
  # agent use case for listing the root directory — all project work is scoped
  # to a specific workspace or project directory.

  - id: mcp-safety-audit-root-dir-scan
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-tool-resource-exhaustion"
    match:
      tool_name_any:
        - "list_directory"
        - "list_dir"
        - "list_files"
        - "read_directory"
        - "ls"
        - "dir"
      argument_patterns:
        path: "/"
    decision: "AUDIT"
    confidence: 0.88
    reason: "MCP directory listing of the filesystem root (/) — scanning the entire filesystem tree can exhaust directory handles, I/O bandwidth, and memory. All legitimate agent work should be scoped to a project directory (CWE-400, OWASP LLM04)."
    tests:
      tp:
        - tool: "list_directory"
          args: {"path": "/"}
        - tool: "list_files"
          args: {"path": "/"}
      tn:
