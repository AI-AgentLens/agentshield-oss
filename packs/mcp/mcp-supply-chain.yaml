name: "MCP Supply Chain Protection"
description: "Block MCP write_file/edit_file tool calls that tamper with dependency lock files or CI/CD pipeline configurations — attack vectors that bypass shell-level supply-chain rules entirely"
version: "1.0.0"
author: "AgentShield Security Research"

# Shell-level rules block `echo > package-lock.json`, `sed -i Gemfile.lock`, and
# similar commands. But an AI agent using an MCP write_file tool bypasses shell
# evaluation entirely — there is no shell to intercept.
#
# These rules close the gap for two high-impact supply-chain attack surfaces:
#
# 1. Lock file tampering — Lock files (package-lock.json, yarn.lock, Cargo.lock,
#    poetry.lock, etc.) are machine-generated checksums that pin exact dependency
#    versions and verify integrity. Hand-editing them is never a legitimate agent
#    action; any such write is either a mistake or an attack.
#    MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
#
# 2. CI/CD pipeline poisoning — Workflow files (.github/workflows/, .gitlab-ci.yml,
#    Jenkinsfile, etc.) define the build and deploy process. An AI agent that
#    modifies these without human review can inject malicious build steps, exfiltrate
#    secrets, or tamper with release artifacts.
#    MITRE T1195.002 — Supply Chain Compromise: Compromise Software Supply Chain
#    MITRE T1612    — Build Image on Host

structural_rules:
  # === BLOCK: Lock file writes via MCP ===
  #
  # Dependency lock files are generated by package managers — agents have
  # no legitimate need to hand-edit them. Writing to a lock file can:
  #   - Pin a compromised package version by overriding the checksum
  #   - Inject a malicious transitive dependency
  #   - Strip integrity hashes to allow substitution attacks
  #
  # Covered lock files:
  #   npm: package-lock.json, npm-shrinkwrap.json
  #   yarn: yarn.lock
  #   pnpm: pnpm-lock.yaml
  #   pip/poetry: poetry.lock, Pipfile.lock
  #   Go: go.sum (lock file equivalent — stores expected checksums)
  #   Rust: Cargo.lock
  #   Ruby: Gemfile.lock
  #   PHP: composer.lock
  #   Java/Gradle: gradle.lockfile, *.lockfile
  - id: mcp-sc-block-lockfile-write
    taxonomy: "supply-chain/dependency-confusion/package-manifest-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)package-lock\\.json$"
            - "(?:^|/)npm-shrinkwrap\\.json$"
            - "(?:^|/)yarn\\.lock$"
            - "(?:^|/)pnpm-lock\\.yaml$"
            - "(?:^|/)poetry\\.lock$"
            - "(?:^|/)Pipfile\\.lock$"
            - "(?:^|/)go\\.sum$"
            - "(?:^|/)Cargo\\.lock$"
            - "(?:^|/)Gemfile\\.lock$"
            - "(?:^|/)composer\\.lock$"
            - "(?:^|/)gradle\\.lockfile$"
            - "\\.lockfile$"
    decision: "BLOCK"
    reason: "MCP write to dependency lock file — lock files are machine-generated checksums. Hand-editing can pin a compromised version or strip integrity hashes. MITRE T1195.001."
    confidence: 0.97

  # === BLOCK: CI/CD pipeline configuration writes via MCP ===
  #
  # CI/CD workflow files define the build, test, and deploy pipeline. An agent
  # that modifies these can:
  #   - Inject malicious build steps that exfiltrate secrets (T1552)
  #   - Add a backdoor binary to release artifacts (T1195.002)
  #   - Disable security scanning or code signing checks
  #   - Forward build environment variables to an attacker-controlled endpoint
  #
  # Covered pipeline config formats:
  #   GitHub Actions:      .github/workflows/*.yml, .github/workflows/*.yaml
  #   GitLab CI:           .gitlab-ci.yml
  #   CircleCI:            .circleci/config.yml
  #   Jenkins:             Jenkinsfile, Jenkinsfile.*
  #   Travis CI:           .travis.yml
  #   Bitbucket Pipelines: bitbucket-pipelines.yml
  #   Azure Pipelines:     azure-pipelines.yml, azure-pipelines-*.yml
  #   Drone CI:            .drone.yml
  #   Buildkite:           .buildkite/pipeline.yml, .buildkite/*.yml
  #   Concourse:           ci/*.yml under concourse layouts
  - id: mcp-sc-block-cicd-config-write
    taxonomy: "supply-chain/build-pipeline/cicd-config-injection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "\\.github/workflows/.*\\.ya?ml$"
            - "(?:^|/)\\.gitlab-ci\\.ya?ml$"
            - "(?:^|/)\\.circleci/config\\.ya?ml$"
            - "(?:^|/)Jenkinsfile(?:\\.[a-zA-Z0-9_-]+)?$"
            - "(?:^|/)\\.travis\\.ya?ml$"
            - "(?:^|/)bitbucket-pipelines\\.ya?ml$"
            - "(?:^|/)azure-pipelines(?:-[a-zA-Z0-9_-]+)?\\.ya?ml$"
            - "(?:^|/)\\.drone\\.ya?ml$"
            - "(?:^|/)\\.buildkite/.*\\.ya?ml$"
    decision: "BLOCK"
    reason: "MCP write to CI/CD pipeline config — pipeline modifications can inject malicious build steps, exfiltrate secrets, or backdoor release artifacts. Requires human review. MITRE T1195.002."
    confidence: 0.97

  # === BLOCK: Dockerfile and container image build config writes via MCP (issue #171) ===
  #
  # Dockerfile and docker-compose.yml define the container build environment.
  # An agent writing to these via MCP write_file bypasses all shell-level rules.
  # Malicious Dockerfile edits can inject backdoors into every container built
  # from the image — a build-time supply chain attack without any shell trace.
  #
  # Covered container config files:
  #   Dockerfile, Dockerfile.* (multi-stage, distroless variants)
  #   docker-compose.yml, docker-compose.*.yml (override files)
  #   .dockerignore — controlling what ends up in the build context
  #
  # MITRE T1612   — Build Image on Host
  # MITRE T1195.002 — Supply Chain Compromise: Compromise Software Supply Chain
  - id: mcp-sc-block-dockerfile-write
    taxonomy: "supply-chain/build-pipeline/cicd-config-injection"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)Dockerfile(?:\\.[a-zA-Z0-9_.-]+)?$"
            - "(?:^|/)docker-compose(?:\\.[a-zA-Z0-9_.-]+)?\\.ya?ml$"
            - "(?:^|/)\\.dockerignore$"
    decision: "BLOCK"
    reason: "MCP write to Dockerfile or docker-compose config — injecting malicious RUN/COPY/ENV instructions backdoors every container built from this image. Requires human review. MITRE T1612, T1195.002."
    confidence: 0.95

  # === BLOCK: Package manager config file writes via MCP (issue #448) ===
  #
  # Shell-level rules in supply-chain.yaml block `echo > .npmrc`, `sed -i .pypirc`,
  # and `npm config set registry <malicious>` at the command level. But an AI agent
  # using MCP write_file bypasses shell evaluation entirely — no shell command is issued,
  # no terminal rule fires.
  #
  # Writing to package manager config files redirects ALL future dependency resolution
  # for that tool to an attacker-controlled registry. A single write_file call can:
  #   - Redirect npm/pnpm installs to a malicious registry (DEEPSEEK_API_KEY-style squatting)
  #   - Override pip's index-url, poisoning every subsequent pip install
  #   - Set a custom Maven repository to serve backdoored JARs on next build
  #   - Override Cargo registry to serve tampered crates
  #
  # This is a persistent attack — the config file survives process restarts, reboots,
  # and shell restarts. One MCP call poisons all future package installs.
  #
  # Covered config files (files rarely written by agents in normal workflows):
  #   pip:         pip.conf, ~/.pip/pip.conf, ~/.config/pip/pip.conf
  #   PyPI upload: .pypirc, ~/.pypirc
  #   yarn v1:     .yarnrc, ~/.yarnrc  (NOT .yarnrc.yml — yarn berry uses that for workspace)
  #   conda:       .condarc, ~/.condarc
  #   Maven:       ~/.m2/settings.xml
  #   Gradle:      ~/.gradle/gradle.properties
  #   Cargo:       ~/.cargo/config.toml, ~/.cargo/config
  #   gem:         .gemrc, ~/.gemrc
  #   NuGet:       ~/.nuget/NuGet/NuGet.Config
  #   Bun:         bunfig.toml, ~/.bunfig.toml
  #
  # NOTE: .npmrc is intentionally excluded from this rule. Project-level .npmrc files
  # are legitimately written by agents (e.g., setting save-exact=true, engine-strict=true).
  # npm config writes via the CLI are already caught by the terminal-level
  # sc-block-npmrc-edit rule. This gap is accepted as a trade-off against usability.
  #
  # Decision: BLOCK (not AUDIT) — the listed files are user/system-level config that
  # agents have no legitimate need to directly overwrite. Registry changes must go through
  # the package manager CLI, which is subject to shell-level detection rules.
  #
  # MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
  # MITRE T1072     — Software Deployment Tools
  - id: mcp-sc-block-pkgmgr-config-write
    taxonomy: "supply-chain/config-tampering/package-config-edit"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            # pip configuration files (never legitimately written directly by agents)
            - "(?:^|/)pip\\.conf$"
            # PyPI upload config
            - "(?:^|/)\\.pypirc$"
            # yarn v1 (project and user-level)
            - "(?:^|/)\\.yarnrc$"
            # conda channel/registry config
            - "(?:^|/)\\.condarc$"
            # Maven repository settings (user-level)
            - "(?:^|/)\\.m2/settings\\.xml$"
            # Gradle repository properties (user-level)
            - "(?:^|/)\\.gradle/gradle\\.properties$"
            # Cargo (Rust) registry config (user-level)
            - "(?:^|/)\\.cargo/config(?:\\.toml)?$"
            # RubyGems source config
            - "(?:^|/)\\.gemrc$"
            # NuGet feed config
            - "(?:^|/)NuGet\\.Config$"
            # Bun package manager config
            - "(?:^|/)bunfig\\.toml$"
    decision: "BLOCK"
    reason: "MCP write to package manager config file — directly overwriting registry config redirects all future dependency installs to an attacker-controlled source without any shell command. Persistent supply chain poisoning. MITRE T1195.001."
    confidence: 0.95

  # === BLOCK: ML training dataset and model checkpoint writes via MCP (issue #173) ===
  #
  # Shell-level rules block `echo > training/data.jsonl` and `cp > checkpoints/model.pt`.
  # But an AI agent using MCP write_file bypasses shell evaluation entirely.
  #
  # Writing to training datasets can inject poisoned examples that corrupt a fine-tuned
  # model's behavior (OWASP LLM04, MITRE AML.T0010). Writing to model checkpoint
  # files can substitute a trusted model with a backdoored or pickle-exploit variant
  # that executes arbitrary code on load (MITRE T1195.001).
  #
  # Covered training dataset paths:
  #   Directories: train/, dataset/, finetune/ (NOT generic data/ — too broad)
  #   Extensions: .jsonl, .csv, .parquet, .tsv (standard ML data formats)
  #
  # Covered checkpoint/model paths:
  #   Directories: checkpoints/, models/, weights/
  #   Extensions: .pt, .pth, .pkl, .bin, .safetensors, .gguf, .ckpt (PyTorch, GGUF, etc.)
  #   HuggingFace cache: ~/.cache/huggingface/
  #
  # MITRE AML.T0010 — Poison Training Data
  # MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
  - id: mcp-sc-block-training-data-write
    taxonomy: "supply-chain/model-poisoning/training-data-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)(?:train|dataset|finetune)/.*\\.(?:jsonl|csv|parquet|tsv)$"
            - "(?:^|/)training[_-]data\\.(?:jsonl|csv|parquet|tsv)$"
    decision: "BLOCK"
    reason: "MCP write to ML training dataset — injecting poisoned examples corrupts fine-tuned model behavior. MITRE AML.T0010, OWASP LLM04."
    confidence: 0.92

  - id: mcp-sc-block-model-checkpoint-write
    taxonomy: "supply-chain/model-poisoning/checkpoint-substitution"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)(?:checkpoints?|models?|weights)/.*\\.(?:pt|pth|pkl|bin|safetensors|gguf|ckpt)$"
            - "(?:^|/)\\.cache/huggingface/"
    decision: "BLOCK"
    reason: "MCP write to model checkpoint file — PyTorch .pt/.pkl files can contain pickle exploits that execute on load. Checkpoint substitution backdoors every inference run. MITRE T1195.001."
    confidence: 0.93

  # === AUDIT: Package manifest writes via MCP ===
  #
  # Package manifests (package.json, requirements.txt, go.mod, etc.) are
  # legitimately modified by agents when adding or removing dependencies.
  # However, these writes warrant oversight because:
  #   - An attacker can substitute a legitimate package name with a typosquatted one
  #   - An agent may inadvertently add a malicious package from a compromised registry
  #   - Dependency additions expand the attack surface without the developer noticing
  #
  # Decision: AUDIT (not BLOCK) — legitimate agent operations must remain possible.
  #
  # Covered manifests:
  #   npm/yarn/pnpm:  package.json
  #   pip:            requirements.txt, requirements-*.txt, constraints.txt
  #   poetry/pip:     pyproject.toml, setup.py, setup.cfg
  #   Go:             go.mod
  #   Rust:           Cargo.toml
  #   Ruby:           Gemfile
  #   PHP:            composer.json
  #   Java/Maven:     pom.xml
  #   Java/Gradle:    build.gradle, build.gradle.kts
  #   Nix:            flake.nix, default.nix, shell.nix
  - id: mcp-sc-audit-package-manifest-write
    taxonomy: "supply-chain/dependency-confusion/package-manifest-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)package\\.json$"
            - "(?:^|/)requirements(?:-[a-zA-Z0-9_-]+)?\\.txt$"
            - "(?:^|/)constraints\\.txt$"
            - "(?:^|/)pyproject\\.toml$"
            - "(?:^|/)setup\\.py$"
            - "(?:^|/)setup\\.cfg$"
            - "(?:^|/)go\\.mod$"
            - "(?:^|/)Cargo\\.toml$"
            - "(?:^|/)Gemfile$"
            - "(?:^|/)composer\\.json$"
            - "(?:^|/)pom\\.xml$"
            - "(?:^|/)build\\.gradle(?:\\.kts)?$"
            - "(?:^|/)flake\\.nix$"
            - "(?:^|/)(?:default|shell)\\.nix$"
    decision: "AUDIT"
    reason: "MCP write to package manifest — dependency changes expand the attack surface and may introduce typosquatted or compromised packages. Flagged for human review. MITRE T1195.001."
    confidence: 0.85

  # === AUDIT: RAG knowledge base ingestion via MCP tool calls (issue #205) ===
  #
  # MCP servers may expose vector DB write tools (add_document, ingest_file,
  # upsert_vectors, etc.) as first-class MCP tools. An AI agent calling these
  # tools can inject adversarial documents into the RAG knowledge base without
  # any shell command — bypassing all shell-level detection entirely.
  #
  # This rule audits MCP tool calls whose names suggest knowledge base write
  # operations. The pattern covers common naming conventions across vector DB
  # MCP servers and custom enterprise knowledge base integrations.
  #
  # Decision: AUDIT (not BLOCK) — knowledge base ingestion is a legitimate
  # agent operation. Human review is warranted to detect injected adversarial
  # content in new documents.
  #
  # OWASP LLM08 — Vector and Embedding Weaknesses
  # MITRE AML.T0010 — Poison Training Data
  - id: mcp-sc-audit-rag-write
    taxonomy: "supply-chain/model-poisoning/rag-knowledge-base-poisoning"
    match:
      tool_name_pattern: "(?i)(ingest|add_document|upsert|insert_document|index_document|embed_and_store|store_embedding|knowledge_base_write|kb_write|add_to_kb|update_kb)"
    decision: "AUDIT"
    reason: "MCP tool call matching a RAG knowledge base write operation — injecting adversarial documents into a vector store poisons AI-grounded outputs without modifying the model. OWASP LLM08, MITRE AML.T0010."
    confidence: 0.82

  # === AUDIT: MCP tool schema drift between sessions (issue #398) ===
  #
  # An MCP server that changes its tool schemas between sessions may indicate
  # supply chain compromise or tool poisoning. Legitimate MCP servers rarely
  # change tool input schemas without a version bump — unexpected schema drift
  # is a signal that a malicious actor has tampered with the server.
  #
  # Detection is performed at the MCP proxy layer by SchemaDriftScanner
  # (internal/mcp/schema_drift_scanner.go), which persists a per-server
  # schema fingerprint cache (~/.agentshield/mcp-schema-cache-<server>.json)
  # and compares on each tools/list response. When drift is detected the
  # proxy emits an AUDIT event with rule ID "mcp-supply-chain-schema-drift".
  #
  # This rule documents the taxonomy linkage and surfaces the detection in
  # `agentshield scan`. The sentinel tool_name_regex will never match a real
  # MCP tool — actual detection is hardcoded in the proxy layer.
  #
  # OWASP LLM07 — System Prompt Leakage / Tool Injection
  # MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
  - id: mcp-supply-chain-schema-drift
    taxonomy: "supply-chain/config-tampering/mcp-tool-schema-drift"
    match:
      tool_name_regex: "^__mcp_schema_drift_detected__$"
    decision: "AUDIT"
    reason: "MCP tool schema changed since last session — possible tool poisoning or supply chain compromise. Detected by proxy-layer SchemaDriftScanner. OWASP LLM07, MITRE T1195.001."
    confidence: 0.80
