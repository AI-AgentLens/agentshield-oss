            - "(?i).*[/\\\\]semgrep[/\\\\].*"
            - "(?i)^semgrep[/\\\\].*"
            - "(?i).*[/\\\\]packs[/\\\\].*"
            - "(?i)^packs[/\\\\].*"
            - "(?i).*[/\\\\]internal[/\\\\].*"
            - "(?i)^internal[/\\\\].*"
            - "(?i).*[/\\\\]tests?[/\\\\].*"
