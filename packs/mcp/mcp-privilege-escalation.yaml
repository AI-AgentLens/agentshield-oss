name: "MCP Privilege Escalation"
description: "Block privilege escalation via MCP tool calls: Docker socket access, D-Bus socket access, Kubernetes RBAC escalation, SUID binary planting, and container escape paths"
version: "1.0.0"
author: "AgentShield Security Research"

rules:
  # === BLOCK: Docker socket file access ===
  - id: mcp-privesc-block-docker-socket
    taxonomy: "privilege-escalation/container-escape/docker-privileged"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "/var/run/docker.sock"
    decision: "BLOCK"
    reason: "Access to Docker socket blocked — enables container escape and full host compromise. MITRE T1611."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/run/docker.sock"}
        - tool: "write_file"
          args: {"path": "/var/run/docker.sock"}
      tn:
        - tool: "read_file"
          args: {"path": "/var/run/app.pid"}

  # === BLOCK: D-Bus system socket access ===
  # The D-Bus system bus socket is the IPC channel for privileged system daemons
  # (systemd, NetworkManager, polkit, upower). An agent that reads or writes this
  # socket can invoke methods on privileged services, exploit policy misconfigurations,
  # and escalate privileges via authorized helpers.
  # MITRE T1548 — Abuse Elevation Control Mechanism
  - id: mcp-privesc-block-dbus-socket
    taxonomy: "privilege-escalation/dbus-privilege-escalation/system-bus-generic"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/dbus/**"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Access to D-Bus system socket blocked — the D-Bus socket is the IPC channel for privileged system daemons (systemd, polkit, NetworkManager). Agents can invoke privileged methods or exploit policy misconfigurations to escalate privileges. MITRE T1548."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/run/dbus/system_bus_socket"}
        - tool: "write_file"
          args: {"path": "/run/dbus/system_bus_socket"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/docs/dbus-socket-overview.md"}
        - tool: "read_file"
          args: {"path": "/var/run/app.pid"}

  # === BLOCK: containerd runtime socket access ===
  - id: mcp-privesc-block-containerd-socket
    taxonomy: "privilege-escalation/container-escape/docker-privileged"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/containerd/containerd.sock"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to containerd socket blocked — the containerd runtime socket offers the same container escape and host compromise vector as the Docker socket. MITRE T1611."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/run/containerd/containerd.sock"}
        - tool: "write_file"
          args: {"path": "/var/run/containerd/containerd.sock"}
      tn:
        - tool: "read_file"
          args: {"path": "/var/run/containerd/config.toml"}

  # === BLOCK: CRI-O runtime socket access ===
  - id: mcp-privesc-block-crio-socket
    taxonomy: "privilege-escalation/container-escape/docker-privileged"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/crio/crio.sock"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to CRI-O socket blocked — the CRI-O container runtime socket enables container escape and arbitrary workload injection on the host. MITRE T1611."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/run/crio/crio.sock"}
        - tool: "write_file"
          args: {"path": "/var/run/crio/crio.sock"}
      tn:
        - tool: "read_file"
          args: {"path": "/etc/crio/crio.conf"}

  # === BLOCK: Podman socket access ===
  - id: mcp-privesc-block-podman-socket
    taxonomy: "privilege-escalation/container-escape/docker-privileged"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/podman/podman.sock"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to Podman socket blocked — enables rootless or rootful container creation that can be used as a container escape or privilege escalation path. MITRE T1611."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/run/podman/podman.sock"}
        - tool: "write_file"
          args: {"path": "/var/run/podman/podman.sock"}
      tn:
        - tool: "read_file"
          args: {"path": "/etc/containers/containers.conf"}

  # === BLOCK: /etc/sudoers and sudoers.d read access (priv-esc recon) ===
  - id: mcp-privesc-block-sudoers-read
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/etc/sudoers"
    decision: "BLOCK"
    reason: "Read access to /etc/sudoers is blocked — reveals all sudo-enabled accounts and NOPASSWD entries, enabling targeted privilege escalation. MITRE T1548.003."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/sudoers"}
        - tool: "cat_file"
          args: {"path": "/etc/sudoers"}
      tn:
        - tool: "read_file"
          args: {"path": "/etc/hostname"}

  - id: mcp-privesc-block-sudoersd-read
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/etc/sudoers.d/**"
    decision: "BLOCK"
    reason: "Read access to /etc/sudoers.d/ is blocked — drop-in sudoers files list privileged accounts and NOPASSWD grants. MITRE T1548.003."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/sudoers.d/custom-rules"}
        - tool: "view_file"
          args: {"path": "/etc/sudoers.d/nopasswd"}
      tn:
        - tool: "read_file"
          args: {"path": "/etc/apt/sources.list.d/custom.list"}

  # === BLOCK: PAM configuration read access (auth-stack recon) ===
  # The PAM stack (/etc/pam.d/) controls every authentication event on Linux:
  # SSH login, sudo, su, screen unlock, etc. Reading PAM config reveals:
  # - Modules that can be bypassed (pam_permit, null passwords)
  # - Account lockout bypass opportunities (pam_faillock thresholds)
  # - Session recording modules to disable (pam_tty_audit)
  # Write access is already blocked by mcp-safety-block-etc-write.
  # MITRE T1556.003 — Modify Authentication Process: PAM
  - id: mcp-privesc-block-pam-read
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/etc/pam.d/**"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Read access to /etc/pam.d/ blocked — PAM configuration reveals auth stack modules, bypass opportunities, and lockout settings that enable targeted privilege escalation. MITRE T1556.003."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/pam.d/sudo"}
        - tool: "cat_file"
          args: {"path": "/etc/pam.d/common-auth"}
        - tool: "view_file"
          args: {"path": "/etc/pam.d/sshd"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/docs/pam-guide.md"}
        - tool: "read_file"
          args: {"path": "/etc/ssh/sshd_config"}

  # === BLOCK: Polkit rules read access (privilege authorization recon) ===
  # PolicyKit (/etc/polkit-1/) is the Linux privilege broker between unprivileged
  # applications and privileged system daemons. Reading polkit rules reveals:
  # - Which D-Bus actions unprivileged users are authorized to invoke
  # - Admin group definitions that can be targeted (e.g., "wheel", "sudo")
  # - Whether privilege escalation via pkexec is available without password
  # Write access is already blocked by mcp-safety-block-etc-write.
  # MITRE T1548 — Abuse Elevation Control Mechanism
  - id: mcp-privesc-block-polkit-read
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/etc/polkit-1/**"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Read access to /etc/polkit-1/ blocked — polkit rules reveal which D-Bus actions are authorized for unprivileged users, admin group definitions, and passwordless pkexec paths for privilege escalation. MITRE T1548."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/polkit-1/rules.d/99-custom.rules"}
        - tool: "cat_file"
          args: {"path": "/etc/polkit-1/localauthority/10-vendor.d/custom.pkla"}
        - tool: "view_file"
          args: {"path": "/etc/polkit-1/rules.d/50-default.rules"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/docs/polkit-guide.md"}
        - tool: "read_file"
          args: {"path": "/etc/apt/sources.list"}

  # === BLOCK: Kubernetes privilege-granting manifest writes ===
  - id: mcp-privesc-block-k8s-clusterrolebinding-write
    taxonomy: "privilege-escalation/container-escape/k8s-rbac-escalation"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "apply_manifest"
        - "kubectl_apply"
        - "k8s_apply"
      argument_patterns:
        path: "**ClusterRoleBinding**"
    decision: "BLOCK"
    reason: "Writing Kubernetes ClusterRoleBinding manifest blocked — may grant cluster-admin to arbitrary service accounts. MITRE T1078.001."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/ClusterRoleBinding-admin.yaml"}
        - tool: "kubectl_apply"
          args: {"path": "/ClusterRoleBinding.yaml"}
      tn:
        - tool: "write_file"
          args: {"path": "/k8s/manifests/deployment.yaml"}

  # === BLOCK: Write to /proc/sys/kernel/core_pattern ===
  # core_pattern controls the handler executed when any process produces a core dump.
  # Setting it to `|/tmp/evil_script %p` executes arbitrary code (as root for setuid
  # binaries) when any program crashes — a classic container escape and privilege
  # escalation technique used in multiple CVEs (CVE-2022-0185, etc.).
  # Distinguishing from the sysrq-trigger block: this is write-only (read is benign).
  # MITRE T1068, T1543 | CWE-269 | OWASP LLM08
  - id: mcp-privesc-block-core-pattern-write
    taxonomy: "privilege-escalation/kernel-exploit/core-dump-handler-hijack"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "/proc/sys/kernel/core_pattern"
    decision: "BLOCK"
    confidence: 0.98
    reason: "Write to /proc/sys/kernel/core_pattern is blocked — this file controls the core dump handler executable. Setting it to a pipe command (e.g., |/tmp/evil) executes arbitrary code with root privileges whenever any setuid binary crashes. This is a well-known container escape and privilege escalation vector. MITRE T1068, T1543."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/proc/sys/kernel/core_pattern", "content": "|/tmp/exploit %p"}
        - tool: "edit_file"
          args: {"path": "/proc/sys/kernel/core_pattern", "content": "core"}
        - tool: "create_file"
          args: {"path": "/proc/sys/kernel/core_pattern", "content": "|/bin/sh -i"}
      tn:
        - tool: "read_file"
          args: {"path": "/proc/sys/kernel/core_pattern"}
        - tool: "write_file"
          args: {"path": "/workspace/docs/core-pattern-guide.md", "content": "# Linux Core Patterns\nSee /proc/sys/kernel/core_pattern for config."}

structural_rules:
  # === BLOCK: SUID bit set on executables via chmod ===
  - id: mcp-privesc-block-suid-chmod
    taxonomy: "privilege-escalation/file-permissions/suid-bit-set"
    match:
      tool_name_regex: "(?i)(chmod|set_perm|set_permissions|change_perm|change_permissions)"
      args_match:
        mode:
          pattern_any:
            - "^4[0-9]{3}$"
            - "\\+s\\b"
            - "u\\+s"
            - "a\\+s"
    decision: "BLOCK"
    reason: "SUID bit set on executable blocked — allows local privilege escalation by executing binary as file owner. MITRE T1548.001."
    tests:
      tp:
        - tool: "chmod"
          args: {"mode": "4755", "path": "/tmp/evil"}
        - tool: "set_permissions"
          args: {"mode": "u+s", "path": "/usr/local/bin/helper"}
      tn:
        - tool: "chmod"
          args: {"mode": "0755", "path": "/tmp/script.sh"}

  # === BLOCK: Container runtime socket access via structural match ===
  - id: mcp-privesc-block-docker-sock-structural
    taxonomy: "privilege-escalation/container-escape/docker-privileged"
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "docker\\.sock"
            - "/var/run/docker"
            - "containerd\\.sock"
            - "crio\\.sock"
            - "podman\\.sock"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Container runtime socket path (Docker, containerd, CRI-O, Podman) detected in MCP tool argument — all runtime sockets enable container escape and host compromise. MITRE T1611."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/tmp/docker.sock"}
        - tool: "write_file"
          args: {"path": "/mnt/host/var/run/docker"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/docker-compose.yaml"}

  # === BLOCK: K8s cluster-admin RBAC grants ===
  # FP fix (issue #653): Exclude security rule files under rules/ and semgrep/ —
  # Semgrep YAML rules written by Baby Comply contain K8s API patterns like
  # `create_cluster_role_binding` as detection targets, not as live RBAC grants.
  - id: mcp-privesc-block-k8s-cluster-admin
    taxonomy: "privilege-escalation/container-escape/k8s-rbac-escalation"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)ClusterRoleBinding"
            - "(?i)cluster-admin"
            - "(?i)clusterRole:\\s*cluster-admin"
      exclude_args_match:
        path:
          pattern_any:
            - "(?i).*[/\\\\]taxonomy[/\\\\].*"
            - "(?i)^taxonomy[/\\\\].*"
            - "(?i).*[/\\\\]docs[/\\\\].*"
            - "(?i)^docs[/\\\\].*"
            - "(?i).*\\.md$"
            - "(?i).*[/\\\\]tests?[/\\\\].*"
            - "(?i)^tests?[/\\\\].*"
            - "(?i).*[/\\\\]packs[/\\\\].*"
            - "(?i)^packs[/\\\\].*"
            - "(?i).*[/\\\\]internal[/\\\\].*"
            - "(?i)^internal[/\\\\].*"
            - "(?i).*[/\\\\]charts[/\\\\].*"
            - "(?i)^charts[/\\\\].*"
            - "(?i).*[/\\\\]rules[/\\\\].*"
            - "(?i)^rules[/\\\\].*"
            - "(?i).*[/\\\\]semgrep[/\\\\].*"
            - "(?i)^semgrep[/\\\\].*"
    decision: "BLOCK"
    reason: "Kubernetes ClusterRoleBinding or cluster-admin grant detected in MCP content — grants unrestricted cluster access. MITRE T1078.001."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/deploy/rbac.yaml", "content": "kind: ClusterRoleBinding\nroleRef: cluster-admin"}
        - tool: "edit_file"
          args: {"path": "/k8s/admin.yaml", "content": "clusterRole: cluster-admin"}
      tn:
        - tool: "write_file"
          args: {"path": "taxonomy/k8s-rbac.yaml", "content": "kind: ClusterRoleBinding example"}
        - tool: "write_file"
          args: {"path": "docs/k8s-security.md", "content": "ClusterRoleBinding is dangerous"}
        # TN: Semgrep rule file containing K8s API pattern as detection target (issue #653)
        - tool: "write_file"
          args: {"path": "rules/ai-llm-output-kubernetes.yaml", "content": "rules:\n  - id: llm-k8s-cluster-admin\n    pattern-sinks:\n      - pattern: $API.create_cluster_role_binding(body=$BODY, ...)"}

  # === BLOCK: Privileged container creation ===
  # FP fix (issue #135): Exclude documentation/taxonomy files — descriptive YAML about
  # container security patterns is not an actual K8s manifest or Dockerfile.
  # FP fix (issue #138): Exclude security rule files under rules/ — Semgrep YAML rules
  # contain the pattern being detected (e.g., "privileged: true") as a detection target,
  # not as actual container configuration being applied.
  # FP fix (issue #145): Exclude packs/ and internal/ — AgentShield policy pack YAML and
  # test fixture files legitimately contain "privileged: true" as a detection example or
  # test case, not as live container configuration. Same applies to the taxonomy/ tree.
  # FP fix (issue #782): Add tests/ path exclusions and content-based exclusion for
  # Semgrep test annotations (# ruleid: / // ruleid:) — test files with annotated TP/TN
  # samples demonstrate a vulnerability rather than create live container config.
  # Also handles tools that lack a path argument (edit_file, str_replace_editor).
  - id: mcp-privesc-block-privileged-container
    taxonomy: "privilege-escalation/container-escape/docker-privileged"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)privileged:\\s*true"
            - "(?i)hostPID:\\s*true"
            - "(?i)hostNetwork:\\s*true"
            - "(?i)hostIPC:\\s*true"
            - "(?i)--privileged"
      exclude_args_match:
        path:
          pattern_any:
            - "(?i).*[/\\\\]taxonomy[/\\\\].*"
            - "(?i)^taxonomy[/\\\\].*"
            - "(?i).*[/\\\\]docs[/\\\\].*"
            - "(?i)^docs[/\\\\].*"
            - "(?i).*\\.md$"
            - "(?i).*[/\\\\]rules[/\\\\].*"
            - "(?i)^rules[/\\\\].*"
            - "(?i).*[/\\\\]semgrep[/\\\\].*"
            - "(?i)^semgrep[/\\\\].*"
            - "(?i).*[/\\\\]packs[/\\\\].*"
            - "(?i)^packs[/\\\\].*"
            - "(?i).*[/\\\\]internal[/\\\\].*"
            - "(?i)^internal[/\\\\].*"
            - "(?i).*[/\\\\]tests?[/\\\\].*"
            - "(?i)^tests?[/\\\\].*"
            - "(?i).*[/\\\\]testdata[/\\\\].*"
            - "(?i)^testdata[/\\\\].*"
        content:
          pattern_any:
            - "(?i)#\\s*ruleid:"
            - "(?i)//\\s*ruleid:"
    decision: "BLOCK"
    reason: "Privileged container flag detected in MCP content — breaks container isolation and enables host privilege escalation. MITRE T1611."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/deploy/pod.yaml", "content": "securityContext:\n  privileged: true"}
        - tool: "edit_file"
          args: {"path": "/k8s/daemonset.yaml", "content": "hostNetwork: true\nhostPID: true"}
      tn:
        - tool: "write_file"
          args: {"path": "packs/mcp/example.yaml", "content": "privileged: true"}
        - tool: "write_file"
          args: {"path": "docs/security-guide.md", "content": "Never set privileged: true"}
        - tool: "write_file"
          args: {"path": "rules/tests/container-escape/test_go.go", "content": "// ruleid: ai-container-escape\nclient.CreateContainer(ctx, ContainerConfig{Privileged: true})"}
        - tool: "edit_file"
          args: {"content": "# ruleid: priv-container\nPrivileged: true\n# ok:\nPrivileged: false"}

  # === AUDIT: Sudo configuration modification ===
  # FP fix: exclude documentation, test files, and markdown — these legitimately
  # contain sudoers examples as documentation or test fixtures, not live config.
  - id: mcp-privesc-audit-sudoers-content
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)NOPASSWD"
            - "(?i)ALL=\\(ALL\\)"
      exclude_args_match:
        path:
          pattern_any:
            - "(?i).*\\.md$"
            - "(?i).*[/\\\\]docs?[/\\\\].*"
            - "(?i)^docs?[/\\\\].*"
            - "(?i).*[/\\\\]tests?[/\\\\].*"
            - "(?i)^tests?[/\\\\].*"
            - "(?i).*[/\\\\]testdata[/\\\\].*"
            - "(?i)^testdata[/\\\\].*"
    decision: "AUDIT"
    reason: "Sudo configuration content (NOPASSWD or ALL=(ALL)) detected in MCP tool argument — may grant passwordless root access. MITRE T1548.003."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/etc/sudoers.d/agent", "content": "agent ALL=(ALL) NOPASSWD: ALL"}
        - tool: "edit_file"
          args: {"path": "/tmp/sudoers", "content": "user ALL=(ALL) ALL"}
      tn:
        - tool: "write_file"
          args: {"path": "docs/sudo-guide.md", "content": "NOPASSWD example for documentation"}
      # TN: exclude path matches docs/
        - tool: "write_file"
          args: {"path": "tests/fixtures/sudoers_test", "content": "NOPASSWD for test"}

  # === BLOCK: Linux capabilities manipulation ===
  - id: mcp-privesc-block-linux-capabilities
    taxonomy: "privilege-escalation/file-permissions/linux-capabilities"
    match:
      tool_name_regex: ".*"
      args_match:
        content:
          pattern_any:
            - "(?i)cap_setuid\\+ep"
            - "(?i)cap_net_admin\\+ep"
            - "(?i)SYS_PTRACE"
            - "(?i)SYS_ADMIN"
            - "(?i)ALL_CAPABILITIES"
    decision: "BLOCK"
    reason: "Linux capabilities grant detected in MCP content — may enable privilege escalation via capability abuse. MITRE T1548.001."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/deploy/pod.yaml", "content": "capabilities:\n  add: [SYS_ADMIN]"}
        - tool: "edit_file"
          args: {"path": "/tmp/setcap.sh", "content": "setcap cap_setuid+ep /usr/bin/helper"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/docs/capabilities.md", "content": "Linux capabilities overview"}

  # === BLOCK: D-Bus socket access via structural match (any tool, path arg) ===
  # Catches any tool (not just read/write families) that passes a D-Bus socket path
  # via a `path` argument — e.g., custom MCP tools that wrap dbus-send or socket
  # client libraries. Complements the glob-based rule above which targets known
  # file-access tools.
  - id: mcp-privesc-block-dbus-socket-structural
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "(?i)/var/run/dbus/"
            - "(?i)/run/dbus/"
            - "(?i)dbus.*\\.sock(et)?$"
    decision: "BLOCK"
    confidence: 0.95
    reason: "D-Bus socket path detected in MCP tool argument — all D-Bus sockets expose privileged IPC channels that can be abused for privilege escalation. MITRE T1548."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/run/dbus/system_bus_socket"}
        - tool: "send_dbus_message"
          args: {"path": "/run/dbus/system_bus_socket"}
