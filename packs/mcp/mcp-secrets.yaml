name: "MCP Secrets & Credentials"
description: "Block MCP tool access to credential files, sensitive directories, and database URIs"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_resources:
  - "file:///home/*/.ssh/**"
  - "file:///root/.ssh/**"
  - "file:///home/*/.aws/**"
  - "file:///root/.aws/**"
  - "file:///home/*/.gnupg/**"
  - "file:///root/.gnupg/**"

rules:
  # === BLOCK: SSH key directory access ===
  - id: mcp-sec-block-ssh-access
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Access to SSH key directories is blocked."

  # === BLOCK: AWS credential access ===
  - id: mcp-sec-block-aws-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.aws/**"
    decision: "BLOCK"
    reason: "Access to AWS credential directories is blocked."

  # === BLOCK: GPG key access ===
  - id: mcp-sec-block-gnupg-access
    taxonomy: "credential-exposure/cryptographic-keys/gpg-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.gnupg/**"
    decision: "BLOCK"
    reason: "Access to GPG key directories is blocked."

  # === BLOCK: Kubernetes config access ===
  - id: mcp-sec-block-kube-access
    taxonomy: "credential-exposure/container-config/kubernetes-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.kube/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes config is blocked."

  # === BLOCK: Cloud CLI credentials ===
  - id: mcp-sec-block-gcloud-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.config/gcloud/**"
    decision: "BLOCK"
    reason: "Access to Google Cloud credentials is blocked."

  # === BLOCK: Azure credentials (issue #24) ===
  # ~/.azure/ contains OAuth access tokens, MSAL token cache, and service principal credentials
  # used by Azure CLI, Azure SDK, and Azure PowerShell.
  - id: mcp-sec-block-azure-credentials
    taxonomy: "credential-exposure/cloud-credentials/azure-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.azure/**"
    decision: "BLOCK"
    reason: "Access to Azure credential directory is blocked — contains OAuth tokens, MSAL token cache, service principal credentials, and subscription info. MITRE T1552.005."

  # === BLOCK: .env file reads (issue #28) ===
  # .env files routinely contain API keys, database passwords, and OAuth secrets.
  # Upgraded from AUDIT to BLOCK. Two rules: one for bare .env, one for .env.* variants.
  - id: mcp-sec-block-dotenv-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.env"
    decision: "BLOCK"
    reason: "Access to .env files is blocked — these routinely contain API keys, database passwords, OAuth secrets, and other plaintext credentials. MITRE T1552.001."

  # === BLOCK: .env.* variant file reads (issue #28, fix #53) ===
  # Covers .env.local, .env.production, .env.staging, .env.development, .env.test, etc.
  # Excludes known template/documentation files (.env.example, .env.sample, .env.template, .env.dist)
  # which are intentionally committed to version control and contain only placeholder values.
  - id: mcp-sec-block-dotenv-variants-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.env.*"
      exclude_argument_patterns:
        path:
          - "**/.env.example"
          - "**/.env.sample"
          - "**/.env.template"
          - "**/.env.dist"
    decision: "BLOCK"
    reason: "Access to .env variant files (.env.local, .env.production, etc.) is blocked — these contain environment-specific API keys and plaintext credentials. MITRE T1552.001."

  # === BLOCK: .envrc file reads (issue #28) ===
  # .envrc (direnv) exports environment variables on directory entry, commonly used
  # to set API keys and credentials that should not leave the local environment.
  - id: mcp-sec-block-envrc-read
    taxonomy: "credential-exposure/config-file-access/envrc-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.envrc"
    decision: "BLOCK"
    reason: "Access to .envrc (direnv config) is blocked — commonly exports API keys and sensitive credentials as environment variables. MITRE T1552.001."

  # === BLOCK: Git credentials (issue #5) ===
  # ~/.git-credentials stores plaintext credentials in format https://user:password@host
  # Reading exposes credentials; writing can poison git auth to redirect to attacker hosts.
  - id: mcp-sec-block-git-credentials
    taxonomy: "credential-exposure/version-control/git-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.git-credentials"
    decision: "BLOCK"
    reason: "Git credential file access is blocked — contains plaintext credentials; writes can redirect git auth to attacker-controlled hosts."

  # === BLOCK: XDG git credentials store (issue #87) ===
  # ~/.config/git/credentials is the XDG Base Directory compliant location for git-credential-store.
  # Same plaintext format as ~/.git-credentials: https://user:password@host
  # Blocked separately because ArgumentPatterns only supports a single glob per argument.
  - id: mcp-sec-block-git-credentials-xdg
    taxonomy: "credential-exposure/version-control/git-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/git/credentials"
    decision: "BLOCK"
    reason: "XDG git credential file access is blocked — ~/.config/git/credentials contains the same plaintext HTTP credentials as ~/.git-credentials (XDG Base Directory spec location)."

  # === BLOCK: Database credential files (issue #25) ===
  # ~/.pgpass stores PostgreSQL passwords in plaintext: host:port:db:user:password
  # ~/.my.cnf [client] section commonly has user= and password= entries
  - id: mcp-sec-block-pgpass
    taxonomy: "credential-exposure/database-credentials/postgresql-password-file"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.pgpass"
    decision: "BLOCK"
    reason: "Access to ~/.pgpass is blocked — contains PostgreSQL passwords in plaintext (host:port:db:user:password format). MITRE T1552.001."

  - id: mcp-sec-block-mysql-cnf
    taxonomy: "credential-exposure/database-credentials/mysql-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.my.cnf"
    decision: "BLOCK"
    reason: "Access to ~/.my.cnf is blocked — MySQL client config file commonly contains plaintext password= entries in the [client] section. MITRE T1552.001."

  # === BLOCK: Package manager credential files ===
  # npmrc (user-level) contains //registry.npmjs.org/:_authToken=<secret>
  # pypirc contains plaintext PyPI username/password
  # cargo credentials.toml contains crates.io registry tokens
  # gradle.properties (user-level) can contain Maven/Gradle repository passwords
  # NOTE: .npmrc WRITE is intentionally excluded here. Project-level .npmrc files are legitimately
  # written by agents (e.g., save-exact=true). Shell-level sc-block-npmrc-edit handles malicious
  # registry redirects. Only block READS since any .npmrc (user or project) may hold auth tokens.
  - id: mcp-sec-block-package-manager-creds
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.npmrc"
    decision: "BLOCK"
    reason: "Read access to .npmrc is blocked — contains npm registry auth tokens that could be exfiltrated."

  - id: mcp-sec-block-pypirc
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.pypirc"
    decision: "BLOCK"
    reason: "Access to .pypirc is blocked — contains plaintext PyPI credentials."

  # ~/.cargo/credentials (legacy, pre-Cargo 1.60) and ~/.cargo/credentials.toml (modern)
  # both contain crates.io and private registry authentication tokens.
  - id: mcp-sec-block-cargo-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.cargo/credentials*"
    decision: "BLOCK"
    reason: "Access to Cargo credential files is blocked — contains crates.io and private registry tokens (both legacy ~/.cargo/credentials and modern ~/.cargo/credentials.toml)."

  # === BLOCK: Poetry private registry credentials ===
  # ~/.config/pypoetry/auth.toml — HTTP auth tokens for private PyPI repositories
  # ~/.config/pypoetry/config.toml — may include source URLs with embedded credentials
  # An agent reading auth.toml can exfiltrate tokens used to access or publish to private PyPI repos.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-pypoetry-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/pypoetry/auth.toml"
    decision: "BLOCK"
    reason: "Access to Poetry auth.toml is blocked — contains HTTP auth tokens for private PyPI repositories. MITRE T1552."
    confidence: 0.95

  - id: mcp-sec-block-gradle-properties
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.gradle/gradle.properties"
    decision: "BLOCK"
    reason: "Access to Gradle user properties is blocked — may contain Maven/Gradle repository passwords."

  # === BLOCK: dbt profile credentials (issue #88) ===
  # ~/.dbt/profiles.yml contains database connection credentials (host, user, password/token)
  # for data warehouses: BigQuery, Snowflake, Redshift, Databricks, Postgres, etc.
  # An agent reading profiles.yml can exfiltrate production database credentials.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-dbt-profiles
    taxonomy: "credential-exposure/database-credentials/dbt-profile-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.dbt/profiles.yml"
    decision: "BLOCK"
    reason: "Access to ~/.dbt/profiles.yml is blocked — contains database credentials for data warehouse connections (BigQuery, Snowflake, Redshift, Databricks, etc.). MITRE T1552."
    confidence: 0.95

  # === BLOCK: Snyk CLI config (issue #88) ===
  # ~/.config/snyk/config.json contains the Snyk API authentication token.
  # An agent reading this can impersonate the user to the Snyk platform.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-snyk-config
    taxonomy: "credential-exposure/api-keys/snyk-api-token-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/snyk/config.json"
    decision: "BLOCK"
    reason: "Access to Snyk CLI config is blocked — contains the Snyk API authentication token. MITRE T1552."
    confidence: 0.90

  # === BLOCK: Helm registry credential files ===
  # ~/.config/helm/repositories.yaml contains repo URLs and passwords
  # ~/.config/helm/registry/config.json contains OCI registry login credentials
  - id: mcp-sec-block-helm-credentials
    taxonomy: "credential-exposure/cloud-credentials/helm-registry-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/helm/**"
    decision: "BLOCK"
    reason: "Access to Helm config directory is blocked — contains OCI registry credentials and repository passwords."

  # === BLOCK: RubyGems credential file access (issue #37) ===
  # ~/.gem/credentials contains RubyGems registry API keys used for gem publishing.
  # An agent reading this file can exfiltrate tokens enabling supply chain attacks via
  # malicious gem publishing. MITRE T1195.001 (Supply Chain Compromise), T1552.001.
  - id: mcp-sec-block-gem-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.gem/credentials"
    decision: "BLOCK"
    reason: "Access to ~/.gem/credentials is blocked — contains RubyGems registry API keys enabling gem publish supply chain attacks. MITRE T1195.001, T1552.001."

  # === BLOCK: NuGet credentials (issue #57) ===
  # ~/.nuget/NuGet.Config stores NuGet package source credentials including
  # API keys and encrypted passwords for private NuGet feeds (Azure DevOps,
  # GitHub Packages, Artifactory). Exposure enables malicious package publication.
  - id: mcp-sec-block-nuget-config
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.nuget/NuGet.Config"
    decision: "BLOCK"
    reason: "Access to ~/.nuget/NuGet.Config is blocked — contains NuGet package source API keys and credentials for private feeds enabling supply chain attacks. MITRE T1195.001, T1552.001."

  # === BLOCK: Composer auth credentials (issue #57) ===
  # ~/.composer/auth.json stores Composer (PHP) authentication tokens including
  # GitHub OAuth tokens, HTTP Basic auth, and Bitbucket OAuth for private
  # Packagist repositories and private Composer repositories.
  - id: mcp-sec-block-composer-auth
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.composer/auth.json"
    decision: "BLOCK"
    reason: "Access to ~/.composer/auth.json is blocked — contains Composer OAuth tokens and HTTP credentials for private PHP package repositories. MITRE T1195.001, T1552.001."

  # === BLOCK: Ivy repository credentials (issue #57) ===
  # ~/.ivy2/.credentials stores Apache Ivy (Scala/Java build tool) repository
  # credentials (realm, host, user, password) for Sonatype Nexus, Artifactory,
  # and other private Maven-compatible repositories.
  - id: mcp-sec-block-ivy-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.ivy2/.credentials"
    decision: "BLOCK"
    reason: "Access to ~/.ivy2/.credentials is blocked — contains Ivy/Scala repository credentials (user, password) for private artifact repositories. MITRE T1195.001, T1552.001."

  # === BLOCK: SBT repository credentials (issue #57) ===
  # ~/.sbt/credentials stores SBT (Scala Build Tool) repository credentials
  # for Sonatype Nexus, Artifactory, and other private Maven/Ivy repositories
  # used to publish Scala/Java artifacts.
  - id: mcp-sec-block-sbt-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.sbt/credentials"
    decision: "BLOCK"
    reason: "Access to ~/.sbt/credentials is blocked — contains SBT repository credentials for private Scala/Java artifact repositories. MITRE T1195.001, T1552.001."

  # === BLOCK: Docker daemon config access (issue #4) ===
  # ~/.docker/daemon.json configures the Docker daemon — it can contain:
  #   - insecure-registries: lists private registries without TLS verification
  #   - registry-mirrors: reveals internal mirror infrastructure
  #   - credHelpers mappings: exposes which external credential stores are in use
  #   - HTTP proxy settings with embedded credentials (http-proxy, https-proxy)
  # ~/.docker/buildx/: buildx configuration with remote build context creds
  # Reading this file leaks Docker infrastructure layout even when config.json
  # (blocked separately) holds no explicit credentials.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-docker-daemon-access
    taxonomy: "credential-exposure/config-file-access/docker-daemon-config-read"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.docker/daemon.json"
    decision: "BLOCK"
    reason: "Access to ~/.docker/daemon.json is blocked — exposes Docker registry infrastructure, insecure-registries list, proxy credentials, and credHelpers configuration. MITRE T1552."

  # === BLOCK: 1Password CLI credential access (v2: ~/.config/op/, v1: ~/.op/) ===
  # 1Password CLI v2 stores config in ~/.config/op/; v1 uses ~/.op/
  # Both contain session tokens, account UUIDs, and sign-in credentials.
  - id: mcp-sec-block-1password-cli-access
    taxonomy: "credential-exposure/password-manager/1password-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/op/**"
    decision: "BLOCK"
    reason: "Access to 1Password CLI v2 config directory is blocked — contains session tokens and account credentials. MITRE T1555."

  # === BLOCK: 1Password CLI v1 credential access (issue #29) ===
  # Legacy 1Password CLI v1 stores its config in ~/.op/ (not ~/.config/op/).
  # Still common in enterprise environments with pinned CLI versions.
  - id: mcp-sec-block-1password-cli-v1-access
    taxonomy: "credential-exposure/password-manager/1password-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.op/**"
    decision: "BLOCK"
    reason: "Access to 1Password CLI v1 config directory (~/.op/) is blocked — contains session tokens and account credentials. MITRE T1555."

  # === BLOCK: 1Password desktop app access (issue #61) ===
  # ~/.1password/ — SSH agent socket directory (agent.sock); enumerating it reveals
  #   whether the agent is running and may allow interaction via the socket path.
  # ~/.config/1Password/ — Desktop app config including:
  #   - ssh/agent.toml: lists vault items exposed as SSH keys (reveals key UUIDs)
  #   - config: account URLs, session references
  # MITRE T1555.005 (Credentials from Password Stores: Password Managers)
  - id: mcp-sec-block-1password-desktop-access
    taxonomy: "credential-exposure/password-manager/1password-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
