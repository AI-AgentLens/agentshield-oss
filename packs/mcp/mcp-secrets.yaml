structural_rules:
  # === BLOCK: Altcoin wallet.dat files (issue #667) ===
  # Dogecoin, Litecoin, Namecoin, Peercoin, Zcash — all Bitcoin-derived wallets
  # using the same wallet.dat Berkeley DB format. Path glob brace expansion is not
  # supported in the rules section, so this uses regex via structural_rules.
  - id: mcp-sec-block-altcoin-wallet
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "\\.dogecoin/wallet\\.dat"
            - "\\.litecoin/wallet\\.dat"
            - "\\.namecoin/wallet\\.dat"
            - "\\.peercoin/wallet\\.dat"
            - "\\.zcash/wallet\\.dat"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to altcoin wallet file is blocked — wallet.dat in Dogecoin, Litecoin, Zcash, and similar Bitcoin-derived wallets contains encrypted private keys. MITRE T1552.001."
  # Block any tool accessing credential paths — catches tool names not in the regex lists.
  # Includes bare directory paths (\.ssh/?$) to block list_directory on credential dirs
  # in addition to specific file paths (\.ssh/.*) within credential dirs. (issue #430)
  - id: mcp-struct-block-credential-path-access
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "\\.ssh/.*"
            - "\\.ssh/?$"
            - "\\.aws/credentials"
            - "\\.aws/config"
            - "\\.aws/?$"
            - "\\.gnupg/"
            - "\\.gnupg/?$"
            - "\\.kube/config"
            - "\\.kube/?$"
            - "\\.azure/?$"
            - "\\.docker/?$"
            - "\\.config/gcloud/"
            - "\\.config/gcloud/?$"
            - "\\.config/helm/"
            - "\\.cargo/credentials(\\.toml)?$"
            - "\\.gradle/gradle\\.properties"
            - "\\.pypirc$"
            - "\\.config/pypoetry/auth\\.toml$"
            - "\\.config/op/"
            - "\\.local/share/keyrings/"
            - "\\.config/github-copilot/"
            - "\\.local/share/bitwarden-cli/"
            - "\\.config/bitwarden-cli/"
            - "\\.config/age/"
            - "\\.password-store/"
            - "\\.config/keepassxc/"
            - "Library/Keychains/"
            - "\\.bitwarden/"
            - "\\.config/Bitwarden/"
            - "\\.var/app/com\\.bitwarden\\.desktop/"
            - "\\.config/rclone/rclone\\.conf$"
            - "\\.s3cfg$"
            - "\\.boto$"
            - "\\.config/terraform/credentials\\.tfrc\\.json$"
            - "\\.terraformrc$"
            - "\\.config/claude/"
            - "\\.anthropic/"
            - "\\.databrickscfg$"
            - "\\.databricks/token$"
            - "\\.kaggle/kaggle\\.json$"
            - "\\.snowsql/"
            - "\\.confluent/"
            - "\\.cloudflared/"
            - "\\.local/share/lastpass/"
            - "\\.local/share/bitwarden/"
            - "\\.local/share/1password/"
            - "\\.bitwarden_session$"
            - "\\.config/LastPass/"
            - "\\.dashlane/"
            - "\\.config/keepass/"
            - "\\.mysql_history$"
            - "\\.psql_history$"
            - "\\.rediscli_history$"
            - "\\.config/TablePlus/"
            - "\\.dbeaver/"
            - "Application Support/Sequel Pro/"
            - "Application Support/DataGrip/"
            - "JetBrains/DataGrip"
    decision: "BLOCK"
    reason: "MCP tool accessing credential/sensitive path detected by structural match"
    confidence: 0.95

  # === BLOCK: TLS server private key directories (issue #531) ===
  #
  # /etc/ssl/private/ (Debian/Ubuntu) and /etc/pki/tls/private/ (RHEL/CentOS/Fedora)
  # store TLS server private keys for nginx, Apache, HAProxy, and system services.
  # Exfiltrating these enables decryption of TLS sessions and server impersonation.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-tls-server-private-keys
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "^/etc/ssl/private/"
            - "^/etc/pki/tls/private/"
    decision: "BLOCK"
    reason: "Access to TLS server private key directory is blocked — /etc/ssl/private/ and /etc/pki/tls/private/ contain server TLS private keys. Exfiltrating these enables decryption of TLS traffic and server impersonation. MITRE T1552.004."
    confidence: 0.97

  # ============================================================
  # Cloud IMDS Endpoint Access via MCP HTTP/Fetch Tools (issue #350)
  # Taxonomy: credential-exposure/cloud-imds/*
  # OWASP LLM02 — Sensitive Information Disclosure
  # MITRE T1552.005 — Cloud Instance Metadata API
  # ============================================================
  #
  # Cloud instance metadata services (IMDS) expose IAM/service-account
  # credentials to any process running on the instance. An AI agent using
  # an MCP fetch or HTTP tool can steal these credentials silently.
  #
  # AWS IMDS:   169.254.169.254 (EC2) and 169.254.170.2 (ECS task role)
  #             fd00:ec2::254 (IPv6 link-local IMDS, supported since 2024)
  # GCP IMDS:   metadata.google.internal / metadata.google.com
  # Azure IMDS: 169.254.169.254 (same link-local as AWS, but /metadata/ path)
  #
  # These IP/hostnames have NO legitimate use in AI agent workflows — any
  # HTTP fetch targeting them is almost certainly credential theft.

  # === BLOCK: AWS/Azure IMDS endpoint access (IPv4 and IPv6) ===
  - id: mcp-sec-block-aws-imds
    taxonomy: "credential-exposure/cloud-imds/aws-imds-token-theft"
    match:
      tool_name_any:
        - fetch
        - fetch_url
        - http_request
        - http_get
        - http_post
        - web_request
        - web_fetch
        - browser_fetch
        - curl_request
        - make_request
        - network_request
        - get_url
        - read_url
        - open_url
      args_match:
        url:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)169\\.254\\.170\\.2"
            - "(?i)fd00:ec2::254"
    decision: "BLOCK"
    reason: "MCP HTTP tool accessing AWS IMDS endpoint (169.254.169.254, 169.254.170.2, or fd00:ec2::254 IPv6) — retrieves EC2/ECS IAM role credentials (AccessKeyId, SecretAccessKey, Token) silently. Agents have no legitimate need to query instance metadata. OWASP LLM02, MITRE T1552.005."
    confidence: 0.97

  # === BLOCK: GCP IMDS endpoint access ===
  - id: mcp-sec-block-gcp-imds
    taxonomy: "credential-exposure/cloud-imds/gcp-imds-token-theft"
    match:
      tool_name_any:
        - fetch
        - fetch_url
        - http_request
        - http_get
        - http_post
        - web_request
        - web_fetch
        - browser_fetch
        - curl_request
        - make_request
        - network_request
        - get_url
        - read_url
        - open_url
      args_match:
        url:
          pattern_any:
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.google\\.com/computeMetadata"
    decision: "BLOCK"
    reason: "MCP HTTP tool accessing GCP IMDS endpoint (metadata.google.internal) — retrieves GCP service account OAuth tokens silently. Agents have no legitimate need to query instance metadata. OWASP LLM02, MITRE T1552.005."
    confidence: 0.97

