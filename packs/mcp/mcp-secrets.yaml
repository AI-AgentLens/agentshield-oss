  # === BLOCK: TLS server private keys — /etc/ssl/private/ and /etc/pki/tls/private/ (issue #531) ===
  #
  # /etc/ssl/private/ (Debian/Ubuntu) and /etc/pki/tls/private/ (RHEL/CentOS/Fedora) store
  # TLS server private keys used by nginx, Apache, HAProxy, stunnel, and system services.
  # These are typically readable only by root and the ssl-cert group.
  #
  # An AI agent reading these keys can exfiltrate the material needed to:
  #   - Decrypt all past and future TLS traffic to that server (no forward secrecy if static RSA)
  #   - Impersonate the server to clients (man-in-the-middle all TLS sessions)
  #   - Sign arbitrary certificates if the key belongs to an intermediate CA
  #
  # Covered paths:
  #   /etc/ssl/private/**    — Debian/Ubuntu system TLS key directory
  #   /etc/pki/tls/private/** — RHEL/CentOS/Fedora system TLS key directory
  #
  # MITRE T1552.004 — Credentials in Files: Private Keys
  # Note: mcp-sec-block-tls-server-private-keys requires multi-path matching
  # and is defined in the structural_rules section below.

  # === BLOCK: NSS user certificate database (~/.pki/nssdb/) (issue #531) ===
  #
  # ~/.pki/nssdb/ is the per-user NSS (Network Security Services) certificate database
  # used by Firefox, Chromium, Thunderbird, and system tools on Linux. It contains:
  #   - key4.db / key3.db   — encrypted private keys for TLS client certificates
  #   - cert9.db / cert8.db — trust database; writing here adds malicious root CAs
  #   - secmod.db           — PKCS#11 security module configuration
  #   - pkcs11.txt          — module configuration file
  #
  # Read attack: Extracting key4.db exposes client certificate private keys, enabling
  # impersonation in mutual TLS (mTLS) authenticated systems.
  #
  # Write attack (high severity): Inserting a malicious CA certificate into cert9.db
  # causes Firefox, Chromium, curl (via NSS), and system tools to trust TLS certificates
  # signed by the attacker's key — MITM of all HTTPS traffic without a warning.
  #
  # MITRE T1552.004 — Credentials in Files: Private Keys
  # MITRE T1553.004 — Subvert Trust Controls: Install Root Certificate
  - id: mcp-sec-block-nss-cert-database
    taxonomy: "credential-exposure/private-key-access/nss-certificate-database-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.pki/nssdb/**"
    decision: "BLOCK"
    reason: "Access to ~/.pki/nssdb/ is blocked — contains the NSS user certificate database (key4.db private keys, cert9.db trust store). Reading exposes client TLS private keys; writing can install malicious root CA certificates that silently MITM all HTTPS traffic in Firefox and Chromium. MITRE T1552.004, T1553.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.pki/nssdb/key4.db"}
        - tool: "read_file"
          args: {"path": "/home/user/.pki/nssdb/cert9.db"}
        - tool: "write_file"
          args: {"path": "/home/user/.pki/nssdb/cert9.db", "content": "malicious CA cert"}
        - tool: "read_file"
          args: {"path": "/home/user/.pki/nssdb/secmod.db"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/certs/test.pem"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/pki-setup-guide.md"}

