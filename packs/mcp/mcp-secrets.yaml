name: "MCP Secrets & Credentials"
description: "Block MCP tool access to credential files, sensitive directories, and database URIs"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_resources:
  - "file:///home/*/.ssh/**"
  - "file:///root/.ssh/**"
  - "file:///home/*/.aws/**"
  - "file:///root/.aws/**"
  - "file:///home/*/.gnupg/**"
  - "file:///root/.gnupg/**"

rules:
  # === BLOCK: SSH key directory access ===
  - id: mcp-sec-block-ssh-access
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Access to SSH key directories is blocked."

  # === BLOCK: AWS credential access ===
  - id: mcp-sec-block-aws-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.aws/**"
    decision: "BLOCK"
    reason: "Access to AWS credential directories is blocked."

  # === BLOCK: GPG key access ===
  - id: mcp-sec-block-gnupg-access
    taxonomy: "credential-exposure/cryptographic-keys/gpg-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.gnupg/**"
    decision: "BLOCK"
    reason: "Access to GPG key directories is blocked."

  # === BLOCK: Kubernetes config access ===
  - id: mcp-sec-block-kube-access
    taxonomy: "credential-exposure/container-config/kubernetes-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.kube/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes config is blocked."

  # === BLOCK: Cloud CLI credentials ===
  - id: mcp-sec-block-gcloud-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.config/gcloud/**"
    decision: "BLOCK"
    reason: "Access to Google Cloud credentials is blocked."

  # === BLOCK: .env file reads ===
  - id: mcp-sec-block-dotenv-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "**/.env"
    decision: "AUDIT"
    reason: ".env file access flagged for review — may contain secrets."

  # === BLOCK: Git credentials ===
  - id: mcp-sec-block-git-credentials
    taxonomy: "credential-exposure/version-control/git-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "**/.git-credentials"
    decision: "BLOCK"
    reason: "Git credential file access is blocked."

resource_rules:
  # === BLOCK: Database URI access ===
  - id: mcp-sec-block-mysql-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "mysql"
    decision: "BLOCK"
    reason: "Direct MySQL database access via MCP is blocked."

  - id: mcp-sec-block-postgres-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "postgres"
    decision: "BLOCK"
    reason: "Direct PostgreSQL database access via MCP is blocked."

  - id: mcp-sec-block-redis-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "redis"
    decision: "BLOCK"
    reason: "Direct Redis access via MCP is blocked."

  - id: mcp-sec-block-mongodb-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "mongodb"
    decision: "BLOCK"
    reason: "Direct MongoDB access via MCP is blocked."

  # === BLOCK: Sensitive file URI patterns ===
  - id: mcp-sec-block-ssh-uri
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      uri_pattern: "file:///**/.ssh/**"
    decision: "BLOCK"
    reason: "Resource read of SSH key files is blocked."

  - id: mcp-sec-block-aws-uri
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      uri_pattern: "file:///**/.aws/**"
    decision: "BLOCK"
    reason: "Resource read of AWS credential files is blocked."
