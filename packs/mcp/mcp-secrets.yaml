          args: {"path": "/workspace/docs/litecoin-node-guide.md"}
        - tool: "read_file"
          args: {"path": "/workspace/project/node.conf"}

  # === BLOCK: Code signing certificates and keystores (issue #904) ===
  #
  # PKCS#12 (.p12/.pfx) and Java KeyStore (.jks/.keystore) files contain
  # private keys and their associated certificates. Exfiltrating these files
  # enables an attacker to:
  #   1. Sign malicious binaries as a trusted developer (T1553.002)
  #   2. Sign malicious packages for supply chain attacks (T1195.002)
  #   3. Decrypt TLS traffic if the key is a TLS certificate
