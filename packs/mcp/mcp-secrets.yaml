name: "MCP Secrets & Credentials"
description: "Block MCP tool access to credential files, sensitive directories, and database URIs"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_resources:
  - "file:///home/*/.ssh/**"
  - "file:///root/.ssh/**"
  - "file:///home/*/.aws/**"
  - "file:///root/.aws/**"
  - "file:///home/*/.gnupg/**"
  - "file:///root/.gnupg/**"

rules:
  # === BLOCK: SSH directory — all writes ===
  # Any write to ~/.ssh/ is dangerous: modifying config redirects connections,
  # writing authorized_keys installs a persistent backdoor (MITRE T1098.004).
  # BLOCK all write tools regardless of filename.
  - id: mcp-sec-block-ssh-access
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Write access to SSH directory is blocked — modifications to ~/.ssh/ can install backdoors (authorized_keys) or redirect connections (config). MITRE T1098.004, T1552.004."

  # === BLOCK: SSH private key reads ===
  # Read access to SSH private key files must be blocked — these are the actual
  # credentials. Public key files (*.pub) and known_hosts are intentionally excluded:
  # - id_rsa.pub, id_ed25519.pub etc. are designed to be publicly shared
  # - known_hosts contains server fingerprints, not credentials
  # Pattern matches the standard OpenSSH private key filename conventions.
  - id: mcp-sec-block-ssh-private-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_rsa"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_rsa) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98

  - id: mcp-sec-block-ssh-ed25519-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_ed25519"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_ed25519) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98

  - id: mcp-sec-block-ssh-ecdsa-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_ecdsa"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_ecdsa) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98

  - id: mcp-sec-block-ssh-config-read
    taxonomy: "credential-exposure/private-key-access/ssh-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/config"
    decision: "BLOCK"
    reason: "Read access to SSH config (~/.ssh/config) is blocked — reveals server hostnames, usernames, identity files, and proxy configurations. MITRE T1552, T1087."
    confidence: 0.95

  # Catch-all for read access to any file in ~/.ssh/.
  # Covers non-standard private key names (deploy_key, github_rsa, etc.) that
  # aren't matched by the specific id_* rules above.
  # Note: This also conservatively blocks reads of .pub files and known_hosts.
  # See issue #91 for the partial-FP discussion.
  - id: mcp-sec-block-ssh-dir-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Read access to SSH directory (~/.ssh/) is blocked — may contain SSH private keys, config, and authorization data. MITRE T1552.004."
    confidence: 0.90

  # Reading authorized_keys exposes which public keys have login access to the host —
  # useful for lateral movement planning. MITRE T1087 (account discovery).
  - id: mcp-sec-block-ssh-authorized-keys-read
    taxonomy: "credential-exposure/private-key-access/ssh-authorized-keys-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/authorized_keys"
    decision: "BLOCK"
    reason: "Read access to SSH authorized_keys is blocked — lists all public keys authorized to log in, useful for lateral movement. MITRE T1087, T1552."
    confidence: 0.93

  # === BLOCK: AWS credential access ===
  - id: mcp-sec-block-aws-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.aws/**"
    decision: "BLOCK"
    reason: "Access to AWS credential directories is blocked."

  # === BLOCK: GPG key access ===
  - id: mcp-sec-block-gnupg-access
    taxonomy: "credential-exposure/cryptographic-keys/gpg-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.gnupg/**"
    decision: "BLOCK"
    reason: "Access to GPG key directories is blocked."

  # === BLOCK: Kubernetes config access ===
  - id: mcp-sec-block-kube-access
    taxonomy: "credential-exposure/container-config/kubernetes-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.kube/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes config is blocked."

  # === BLOCK: Kubernetes in-Pod service account token/cert ===
  - id: mcp-sec-block-k8s-service-account-token
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-service-account-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/kubernetes.io/serviceaccount/**"
    decision: "BLOCK"
    reason: "Kubernetes service account token/cert — Bearer token for API server auth. Reading this grants the reader ability to impersonate the Pod's service account, potentially with cluster-admin RBAC."
    confidence: 0.97

  # === BLOCK: Kubernetes PKI private keys (issue #358) ===
  # /etc/kubernetes/pki/ contains cluster CA and component private keys.
  # Reading these enables impersonating the API server, etcd, or any cluster component.
  # MITRE T1552.004 (Credentials in Files), T1552.003 (Bash History).
  - id: mcp-sec-block-k8s-pki-keys
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-pki-private-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "/etc/kubernetes/pki/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes PKI directory is blocked — contains cluster CA and component private keys that enable impersonating the API server, etcd, or any control-plane component. MITRE T1552.004."
    confidence: 0.97

  # === BLOCK: Kubernetes system kubeconfig files (issue #358) ===
  # /etc/kubernetes/*.conf contains embedded cluster-admin tokens for system components.
  # admin.conf, controller-manager.conf, scheduler.conf all grant cluster-admin access.
  - id: mcp-sec-block-k8s-system-kubeconfig
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-system-kubeconfig-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/etc/kubernetes/*.conf"
    decision: "BLOCK"
    reason: "Access to Kubernetes system kubeconfig files is blocked — admin.conf, controller-manager.conf, and scheduler.conf contain embedded cluster-admin tokens. Exfiltrating these grants full cluster access. MITRE T1552.001."
    confidence: 0.97

  # === BLOCK: Cloud CLI credentials ===
  - id: mcp-sec-block-gcloud-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.config/gcloud/**"
    decision: "BLOCK"
    reason: "Access to Google Cloud credentials is blocked."

  # === BLOCK: Azure credentials (issue #24) ===
  # ~/.azure/ contains OAuth access tokens, MSAL token cache, and service principal credentials
  # used by Azure CLI, Azure SDK, and Azure PowerShell.
  - id: mcp-sec-block-azure-credentials
    taxonomy: "credential-exposure/cloud-credentials/azure-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.azure/**"
    decision: "BLOCK"
    reason: "Access to Azure credential directory is blocked — contains OAuth tokens, MSAL token cache, service principal credentials, and subscription info. MITRE T1552.005."

  # === BLOCK: DigitalOcean/doctl config (issue #95) ===
  # doctl (~/.config/doctl/config.yaml) contains DigitalOcean API tokens that
  # grant full control over cloud infrastructure: Droplets, Spaces, DNS, VPCs.
  - id: mcp-sec-block-doctl-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.config/doctl/**"
    decision: "BLOCK"
    reason: "Access to doctl config is blocked — contains DigitalOcean API tokens granting full control over cloud infrastructure (Droplets, DNS, Spaces). MITRE T1552.005."

  - id: mcp-sec-block-digitalocean-config
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.digitalocean/**"
    decision: "BLOCK"
    reason: "Access to ~/.digitalocean/ config is blocked — may contain DigitalOcean API tokens and authentication state. MITRE T1552.005."

  # === BLOCK: Oracle Cloud (OCI) credentials (issue #257) ===
  # ~/.oci/config — OCI API key config with tenancy OCID, user OCID, fingerprint, and private key path
  - id: mcp-sec-block-oci-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.oci/**"
    decision: "BLOCK"
    reason: "Access to Oracle Cloud Infrastructure config (~/.oci/) is blocked — contains API signing keys and tenancy credentials granting full OCI control. MITRE T1552.005."

  # === BLOCK: IBM Cloud CLI credentials (issue #257) ===
  # ~/.config/ibmcloud/config.json — IBM Cloud CLI auth tokens, account IDs, and resource group config
  - id: mcp-sec-block-ibmcloud-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.config/ibmcloud/**"
    decision: "BLOCK"
    reason: "Access to IBM Cloud CLI config is blocked — contains IAM tokens and account credentials granting access to IBM Cloud resources. MITRE T1552.005."

  # === BLOCK: Hetzner Cloud CLI credentials (issue #257) ===
  # ~/.config/hcloud/cli.toml — Hetzner Cloud API token with full server and network management access
  - id: mcp-sec-block-hcloud-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.config/hcloud/**"
    decision: "BLOCK"
    reason: "Access to Hetzner Cloud CLI config is blocked — contains API tokens granting full control over Hetzner Cloud servers, networks, and floating IPs. MITRE T1552.005."

  # === BLOCK: .env file reads (issue #28) ===
  # .env files routinely contain API keys, database passwords, and OAuth secrets.
  # Upgraded from AUDIT to BLOCK. Two rules: one for bare .env, one for .env.* variants.
  - id: mcp-sec-block-dotenv-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.env"
    decision: "BLOCK"
    reason: "Access to .env files is blocked — these routinely contain API keys, database passwords, OAuth secrets, and other plaintext credentials. MITRE T1552.001."

  # === BLOCK: .env.* variant file reads (issue #28, fix #53) ===
  # Covers .env.local, .env.production, .env.staging, .env.development, .env.test, etc.
  # Excludes known template/documentation files (.env.example, .env.sample, .env.template, .env.dist)
  # which are intentionally committed to version control and contain only placeholder values.
  - id: mcp-sec-block-dotenv-variants-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.env.*"
      exclude_argument_patterns:
        path:
          - "**/.env.example"
          - "**/.env.sample"
          - "**/.env.template"
          - "**/.env.dist"
    decision: "BLOCK"
    reason: "Access to .env variant files (.env.local, .env.production, etc.) is blocked — these contain environment-specific API keys and plaintext credentials. MITRE T1552.001."

  # === BLOCK: .envrc file reads (issue #28) ===
  # .envrc (direnv) exports environment variables on directory entry, commonly used
  # to set API keys and credentials that should not leave the local environment.
  - id: mcp-sec-block-envrc-read
    taxonomy: "credential-exposure/config-file-access/envrc-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.envrc"
    decision: "BLOCK"
    reason: "Access to .envrc (direnv config) is blocked — commonly exports API keys and sensitive credentials as environment variables. MITRE T1552.001."

  # === BLOCK: Non-dotfile *.env suffix credential files (issue #383) ===
  # Docker Compose (env_file: directive), Kubernetes envFrom, and CI/CD pipelines
  # commonly use non-hidden files with a .env suffix (e.g., secrets.env, credentials.env)
  # to store plaintext environment variables. These files are structurally identical to
  # .env files but fall outside the existing dotenv rules which only cover ".**" patterns.
  #
  # This rule closes the gap for any basename-visible file whose name ends in .env —
  # a naming convention that universally denotes an env variable file regardless of
  # whether it starts with a dot.
  #
  # Covered examples: secrets.env, credentials.env, app.env, config.env, db.env
  # NOT covered (already handled by existing rules): .env, .env.local, .envrc
  #
  # TN carve-outs: source files that happen to end in .env are effectively non-existent
  # in practice — the .env suffix is reserved for env variable files, not source code.
  #
  # MITRE T1552.001 — Unsecured Credentials: Credentials In Files
  # OWASP LLM02 — Sensitive Information Disclosure
  - id: mcp-sec-block-non-dotfile-env-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "filesystem_write"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/*.env"
    decision: "BLOCK"
    reason: "Access to non-dotfile *.env file is blocked — files with a .env suffix (secrets.env, credentials.env, app.env) are used by Docker Compose, Kubernetes envFrom, and CI/CD pipelines to store plaintext API keys and credentials. MITRE T1552.001."
    confidence: 0.92

  # === BLOCK: Git credentials (issue #5) ===
  # ~/.git-credentials stores plaintext credentials in format https://user:password@host
  # Reading exposes credentials; writing can poison git auth to redirect to attacker hosts.
  - id: mcp-sec-block-git-credentials
    taxonomy: "credential-exposure/version-control/git-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.git-credentials"
    decision: "BLOCK"
    reason: "Git credential file access is blocked — contains plaintext credentials; writes can redirect git auth to attacker-controlled hosts."

  # === BLOCK: XDG git credentials store (issue #87) ===
  # ~/.config/git/credentials is the XDG Base Directory compliant location for git-credential-store.
  # Same plaintext format as ~/.git-credentials: https://user:password@host
  # Blocked separately because ArgumentPatterns only supports a single glob per argument.
  - id: mcp-sec-block-git-credentials-xdg
    taxonomy: "credential-exposure/version-control/git-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/git/credentials"
    decision: "BLOCK"
    reason: "XDG git credential file access is blocked — ~/.config/git/credentials contains the same plaintext HTTP credentials as ~/.git-credentials (XDG Base Directory spec location)."

  # === BLOCK: Database credential files (issue #25) ===
  # ~/.pgpass stores PostgreSQL passwords in plaintext: host:port:db:user:password
  # ~/.my.cnf [client] section commonly has user= and password= entries
  - id: mcp-sec-block-pgpass
    taxonomy: "credential-exposure/database-credentials/postgresql-password-file"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.pgpass"
    decision: "BLOCK"
    reason: "Access to ~/.pgpass is blocked — contains PostgreSQL passwords in plaintext (host:port:db:user:password format). MITRE T1552.001."

  # === BLOCK: Database GUI connection files ===
  # Database GUI tools (TablePlus, DBeaver, Sequel Pro, DataGrip) store connection profiles
  # containing host, port, username, and encrypted/plaintext passwords. An AI agent reading
  # these files can enumerate all databases the developer has access to, including production.
  # Closes issue #195. MITRE T1552.001, T1083.
  - id: mcp-sec-block-tableplus-connections
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/.config/TablePlus/**"
    decision: "BLOCK"
    reason: "Access to TablePlus config is blocked — connection profiles contain database hosts, usernames, and credentials (plaintext or locally-encrypted). MITRE T1552.001."
    confidence: 0.93

  - id: mcp-sec-block-dbeaver-datasources
    taxonomy: "credential-exposure/database-access/database-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
