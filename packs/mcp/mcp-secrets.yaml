  # that grant full JSON-RPC wallet control — listing addresses, sending transactions,
  # and dumping private keys — without needing the encrypted wallet file itself.
  # Writes can redirect walletdir to attacker-controlled paths or disable security checks.
  # MITRE T1552.001 (credentials from files), T1565.001 (stored data manipulation)
  - id: mcp-sec-block-bitcoin-node-config
    taxonomy: "credential-exposure/cryptocurrency/bitcoin-wallet-access"
