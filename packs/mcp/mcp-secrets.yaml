    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to PKCS#12 (.p12) certificate bundle is blocked — contains a private key and certificate chain. Exfiltrating this file enables signing malicious software with a trusted developer's identity. MITRE T1553.002, T1195.002."
    tests:
