name: "MCP Secrets & Credentials"
description: "Block MCP tool access to credential files, sensitive directories, and database URIs"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_resources:
  - "file:///home/*/.ssh/**"
  - "file:///root/.ssh/**"
  - "file:///home/*/.aws/**"
  - "file:///root/.aws/**"
  - "file:///home/*/.gnupg/**"
  - "file:///root/.gnupg/**"

rules:
  # === BLOCK: SSH directory — all writes ===
  # Any write to ~/.ssh/ is dangerous: modifying config redirects connections,
  # writing authorized_keys installs a persistent backdoor (MITRE T1098.004).
  # BLOCK all write tools regardless of filename.
  - id: mcp-sec-block-ssh-access
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Write access to SSH directory is blocked — modifications to ~/.ssh/ can install backdoors (authorized_keys) or redirect connections (config). MITRE T1098.004, T1552.004."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.ssh/authorized_keys"}
        - tool: "create_file"
          args: {"path": "/home/user/.ssh/config"}
      tn:
        - tool: "write_file"
          args: {"path": "/workspace/README.md"}

  # === BLOCK: SSH private key reads ===
  # Read access to SSH private key files must be blocked — these are the actual
  # credentials. Public key files (*.pub) and known_hosts are intentionally excluded:
  # - id_rsa.pub, id_ed25519.pub etc. are designed to be publicly shared
  # - known_hosts contains server fingerprints, not credentials
  # Pattern matches the standard OpenSSH private key filename conventions.
  - id: mcp-sec-block-ssh-private-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_rsa"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_rsa) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/id_rsa"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/id_rsa"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  - id: mcp-sec-block-ssh-ed25519-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_ed25519"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_ed25519) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/id_ed25519"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/id_ed25519"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  - id: mcp-sec-block-ssh-ecdsa-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_ecdsa"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_ecdsa) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/id_ecdsa"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/id_ecdsa"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  - id: mcp-sec-block-ssh-config-read
    taxonomy: "credential-exposure/private-key-access/ssh-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/config"
    decision: "BLOCK"
    reason: "Read access to SSH config (~/.ssh/config) is blocked — reveals server hostnames, usernames, identity files, and proxy configurations. MITRE T1552, T1087."
    confidence: 0.95
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/config"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/config"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  # Catch-all for read access to any file in ~/.ssh/.
  # Covers non-standard private key names (deploy_key, github_rsa, etc.) that
  # aren't matched by the specific id_* rules above.
  # Note: This also conservatively blocks reads of .pub files and known_hosts.
  # See issue #91 for the partial-FP discussion.
  - id: mcp-sec-block-ssh-dir-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Read access to SSH directory (~/.ssh/) is blocked — may contain SSH private keys, config, and authorization data. MITRE T1552.004."
    confidence: 0.90
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/known_hosts"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/deploy_key"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  # Reading authorized_keys exposes which public keys have login access to the host —
  # useful for lateral movement planning. MITRE T1087 (account discovery).
  - id: mcp-sec-block-ssh-authorized-keys-read
    taxonomy: "credential-exposure/private-key-access/ssh-authorized-keys-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/authorized_keys"
    decision: "BLOCK"
    reason: "Read access to SSH authorized_keys is blocked — lists all public keys authorized to log in, useful for lateral movement. MITRE T1087, T1552."
    confidence: 0.93
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/authorized_keys"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/authorized_keys"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  # === BLOCK: AWS credential access ===
  - id: mcp-sec-block-aws-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.aws/**"
    decision: "BLOCK"
    reason: "Access to AWS credential directories is blocked."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.aws/credentials"}
        - tool: "write_file"
          args: {"path": "/home/user/.aws/config"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/src/config.json"}

  # === BLOCK: GPG key access ===
  - id: mcp-sec-block-gnupg-access
    taxonomy: "credential-exposure/cryptographic-keys/gpg-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.gnupg/**"
    decision: "BLOCK"
    reason: "Access to GPG key directories is blocked."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.gnupg/secring.gpg"}
        - tool: "write_file"
          args: {"path": "/home/user/.gnupg/trustdb.gpg"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/keys/public.asc"}

  # === BLOCK: Kubernetes config access ===
  - id: mcp-sec-block-kube-access
    taxonomy: "credential-exposure/container-config/kubernetes-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.kube/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes config is blocked."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.kube/config"}
        - tool: "write_file"
          args: {"path": "/home/user/.kube/cache/token"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}

  # === BLOCK: Kubernetes in-Pod service account token/cert ===
  - id: mcp-sec-block-k8s-service-account-token
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-service-account-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/kubernetes.io/serviceaccount/**"
    decision: "BLOCK"
    reason: "Kubernetes service account token/cert — Bearer token for API server auth. Reading this grants the reader ability to impersonate the Pod's service account, potentially with cluster-admin RBAC."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/run/secrets/kubernetes.io/serviceaccount/token"}
        - tool: "cat_file"
          args: {"path": "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}

  # === BLOCK: Kubernetes PKI private keys (issue #358) ===
  # /etc/kubernetes/pki/ contains cluster CA and component private keys.
  # Reading these enables impersonating the API server, etcd, or any cluster component.
  # MITRE T1552.004 (Credentials in Files), T1552.003 (Bash History).
  - id: mcp-sec-block-k8s-pki-keys
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-pki-private-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "/etc/kubernetes/pki/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes PKI directory is blocked — contains cluster CA and component private keys that enable impersonating the API server, etcd, or any control-plane component. MITRE T1552.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/kubernetes/pki/ca.key"}
        - tool: "write_file"
          args: {"path": "/etc/kubernetes/pki/apiserver.key"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}

  # === BLOCK: TLS server private keys — /etc/ssl/private/ and /etc/pki/tls/private/ (issue #531) ===
  #
  # /etc/ssl/private/ (Debian/Ubuntu) and /etc/pki/tls/private/ (RHEL/CentOS/Fedora) store
  # TLS server private keys used by nginx, Apache, HAProxy, stunnel, and system services.
  # These are typically readable only by root and the ssl-cert group.
  #
  # An AI agent reading these keys can exfiltrate the material needed to:
  #   - Decrypt all past and future TLS traffic to that server (no forward secrecy if static RSA)
  #   - Impersonate the server to clients (man-in-the-middle all TLS sessions)
  #   - Sign arbitrary certificates if the key belongs to an intermediate CA
  #
  # Covered paths:
  #   /etc/ssl/private/**    — Debian/Ubuntu system TLS key directory
  #   /etc/pki/tls/private/** — RHEL/CentOS/Fedora system TLS key directory
  #
  # MITRE T1552.004 — Credentials in Files: Private Keys
  # Note: mcp-sec-block-tls-server-private-keys requires multi-path matching
  # and is defined in the structural_rules section below.

  # === BLOCK: NSS user certificate database (~/.pki/nssdb/) (issue #531) ===
  #
  # ~/.pki/nssdb/ is the per-user NSS (Network Security Services) certificate database
  # used by Firefox, Chromium, Thunderbird, and system tools on Linux. It contains:
  #   - key4.db / key3.db   — encrypted private keys for TLS client certificates
  #   - cert9.db / cert8.db — trust database; writing here adds malicious root CAs
  #   - secmod.db           — PKCS#11 security module configuration
  #   - pkcs11.txt          — module configuration file
  #
  # Read attack: Extracting key4.db exposes client certificate private keys, enabling
  # impersonation in mutual TLS (mTLS) authenticated systems.
  #
  # Write attack (high severity): Inserting a malicious CA certificate into cert9.db
  # causes Firefox, Chromium, curl (via NSS), and system tools to trust TLS certificates
  # signed by the attacker's key — MITM of all HTTPS traffic without a warning.
  #
  # MITRE T1552.004 — Credentials in Files: Private Keys
  # MITRE T1553.004 — Subvert Trust Controls: Install Root Certificate
  - id: mcp-sec-block-nss-cert-database
    taxonomy: "credential-exposure/private-key-access/nss-certificate-database-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.pki/nssdb/**"
    decision: "BLOCK"
    reason: "Access to ~/.pki/nssdb/ is blocked — contains the NSS user certificate database (key4.db private keys, cert9.db trust store). Reading exposes client TLS private keys; writing can install malicious root CA certificates that silently MITM all HTTPS traffic in Firefox and Chromium. MITRE T1552.004, T1553.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.pki/nssdb/key4.db"}
        - tool: "read_file"
          args: {"path": "/home/user/.pki/nssdb/cert9.db"}
        - tool: "write_file"
          args: {"path": "/home/user/.pki/nssdb/cert9.db", "content": "malicious CA cert"}
        - tool: "read_file"
          args: {"path": "/home/user/.pki/nssdb/secmod.db"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/project/certs/test.pem"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/pki-setup-guide.md"}

  # === BLOCK: Kubernetes system kubeconfig files (issue #358) ===
  # /etc/kubernetes/*.conf contains embedded cluster-admin tokens for system components.
  # admin.conf, controller-manager.conf, scheduler.conf all grant cluster-admin access.
  - id: mcp-sec-block-k8s-system-kubeconfig
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-system-kubeconfig-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "/etc/kubernetes/*.conf"
    decision: "BLOCK"
    reason: "Access to Kubernetes system kubeconfig files is blocked — admin.conf, controller-manager.conf, and scheduler.conf contain embedded cluster-admin tokens. Exfiltrating these grants full cluster access. MITRE T1552.001."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/kubernetes/admin.conf"}
        - tool: "cat_file"
          args: {"path": "/etc/kubernetes/scheduler.conf"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}

  # === BLOCK: Cloud CLI credentials ===
  - id: mcp-sec-block-gcloud-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.config/gcloud/**"
    decision: "BLOCK"
    reason: "Access to Google Cloud credentials is blocked."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.config/gcloud/credentials.db"}
        - tool: "write_file"
          args: {"path": "/home/user/.config/gcloud/access_tokens.db"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/gcloud-setup.sh"}

  # === BLOCK: Azure credentials (issue #24) ===
  # ~/.azure/ contains OAuth access tokens, MSAL token cache, and service principal credentials
  # used by Azure CLI, Azure SDK, and Azure PowerShell.
  - id: mcp-sec-block-azure-credentials
    taxonomy: "credential-exposure/cloud-credentials/azure-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.azure/**"
    decision: "BLOCK"
    reason: "Access to Azure credential directory is blocked — contains OAuth tokens, MSAL token cache, service principal credentials, and subscription info. MITRE T1552.005."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.azure/accessTokens.json"}
        - tool: "cat_file"
          args: {"path": "/home/user/.azure/msal_token_cache.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/azure-pipelines.yml"}

  # === BLOCK: DigitalOcean/doctl config (issue #95) ===
  # doctl (~/.config/doctl/config.yaml) contains DigitalOcean API tokens that
  # grant full control over cloud infrastructure: Droplets, Spaces, DNS, VPCs.
  - id: mcp-sec-block-doctl-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.config/doctl/**"
    decision: "BLOCK"
    reason: "Access to doctl config is blocked — contains DigitalOcean API tokens granting full control over cloud infrastructure (Droplets, DNS, Spaces). MITRE T1552.005."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.config/doctl/secret_file"}
        - tool: "cat_file"
          args: {"path": "/root/.config/doctl/data.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/src/doctl_wrapper.sh"}

  - id: mcp-sec-block-digitalocean-config
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.digitalocean/**"
    decision: "BLOCK"
    reason: "Access to ~/.digitalocean/ config is blocked — may contain DigitalOcean API tokens and authentication state. MITRE T1552.005."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.digitalocean/secret_file"}
        - tool: "cat_file"
          args: {"path": "/root/.digitalocean/data.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/src/deploy.sh"}

  # === BLOCK: Oracle Cloud (OCI) credentials (issue #257) ===
  # ~/.oci/config — OCI API key config with tenancy OCID, user OCID, fingerprint, and private key path
  - id: mcp-sec-block-oci-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.oci/**"
    decision: "BLOCK"
    reason: "Access to Oracle Cloud Infrastructure config (~/.oci/) is blocked — contains API signing keys and tenancy credentials granting full OCI control. MITRE T1552.005."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.oci/secret_file"}
        - tool: "cat_file"
          args: {"path": "/root/.oci/data.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/src/oci_client.py"}

  # === BLOCK: IBM Cloud CLI credentials (issue #257) ===
  # ~/.config/ibmcloud/config.json — IBM Cloud CLI auth tokens, account IDs, and resource group config
  - id: mcp-sec-block-ibmcloud-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.config/ibmcloud/**"
    decision: "BLOCK"
    reason: "Access to IBM Cloud CLI config is blocked — contains IAM tokens and account credentials granting access to IBM Cloud resources. MITRE T1552.005."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.config/ibmcloud/secret_file"}
        - tool: "cat_file"
          args: {"path": "/root/.config/ibmcloud/data.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/src/ibm_deploy.sh"}

  # === BLOCK: Hetzner Cloud CLI credentials (issue #257) ===
  # ~/.config/hcloud/cli.toml — Hetzner Cloud API token with full server and network management access
  - id: mcp-sec-block-hcloud-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-provider-token"
