structural_rules:
  # === BLOCK: Altcoin wallet.dat files (issue #667) ===
  # Dogecoin, Litecoin, Namecoin, Peercoin, Zcash — all Bitcoin-derived wallets
  # using the same wallet.dat Berkeley DB format. Path glob brace expansion is not
  # supported in the rules section, so this uses regex via structural_rules.
  - id: mcp-sec-block-altcoin-wallet
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "\\.dogecoin/wallet\\.dat"
            - "\\.litecoin/wallet\\.dat"
            - "\\.namecoin/wallet\\.dat"
            - "\\.peercoin/wallet\\.dat"
            - "\\.zcash/wallet\\.dat"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to altcoin wallet file is blocked — wallet.dat in Dogecoin, Litecoin, Zcash, and similar Bitcoin-derived wallets contains encrypted private keys. MITRE T1552.001."
  # Block any tool accessing credential paths — catches tool names not in the regex lists.
  # Includes bare directory paths (\.ssh/?$) to block list_directory on credential dirs
  # in addition to specific file paths (\.ssh/.*) within credential dirs. (issue #430)
  - id: mcp-struct-block-credential-path-access
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "\\.ssh/.*"
            - "\\.ssh/?$"
            - "\\.aws/credentials"
            - "\\.aws/config"
            - "\\.aws/?$"
            - "\\.gnupg/"
            - "\\.gnupg/?$"
            - "\\.kube/config"
            - "\\.kube/?$"
            - "\\.azure/?$"
            - "\\.docker/?$"
            - "\\.config/gcloud/"
            - "\\.config/gcloud/?$"
            - "\\.config/helm/"
            - "\\.cargo/credentials(\\.toml)?$"
            - "\\.gradle/gradle\\.properties"
            - "\\.pypirc$"
            - "\\.config/pypoetry/auth\\.toml$"
            - "\\.config/op/"
            - "\\.local/share/keyrings/"
            - "\\.config/github-copilot/"
            - "\\.local/share/bitwarden-cli/"
            - "\\.config/bitwarden-cli/"
            - "\\.config/age/"
            - "\\.password-store/"
            - "\\.config/keepassxc/"
            - "Library/Keychains/"
            - "\\.bitwarden/"
            - "\\.config/Bitwarden/"
            - "\\.var/app/com\\.bitwarden\\.desktop/"
            - "\\.config/rclone/rclone\\.conf$"
            - "\\.s3cfg$"
            - "\\.boto$"
            - "\\.config/terraform/credentials\\.tfrc\\.json$"
            - "\\.terraformrc$"
            - "\\.config/claude/"
            - "\\.anthropic/"
            - "\\.databrickscfg$"
            - "\\.databricks/token$"
            - "\\.kaggle/kaggle\\.json$"
            - "\\.snowsql/"
            - "\\.confluent/"
            - "\\.cloudflared/"
            - "\\.local/share/lastpass/"
            - "\\.local/share/bitwarden/"
            - "\\.local/share/1password/"
            - "\\.bitwarden_session$"
            - "\\.config/LastPass/"
            - "\\.dashlane/"
            - "\\.config/keepass/"
            - "\\.mysql_history$"
            - "\\.psql_history$"
            - "\\.rediscli_history$"
            - "\\.config/TablePlus/"
            - "\\.dbeaver/"
            - "Application Support/Sequel Pro/"
            - "Application Support/DataGrip/"
            - "JetBrains/DataGrip"
    decision: "BLOCK"
    reason: "MCP tool accessing credential/sensitive path detected by structural match"
    confidence: 0.95

  # === BLOCK: TLS server private key directories (issue #531) ===
  #
  # /etc/ssl/private/ (Debian/Ubuntu) and /etc/pki/tls/private/ (RHEL/CentOS/Fedora)
  # store TLS server private keys for nginx, Apache, HAProxy, and system services.
  # Exfiltrating these enables decryption of TLS sessions and server impersonation.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-tls-server-private-keys
    match:
      tool_name_regex: ".*"
      args_match:
        path:
          pattern_any:
            - "^/etc/ssl/private/"
            - "^/etc/pki/tls/private/"
    decision: "BLOCK"
    reason: "Access to TLS server private key directory is blocked — /etc/ssl/private/ and /etc/pki/tls/private/ contain server TLS private keys. Exfiltrating these enables decryption of TLS traffic and server impersonation. MITRE T1552.004."
    confidence: 0.97

  # ============================================================
  # Cloud IMDS Endpoint Access via MCP HTTP/Fetch Tools (issue #350)
  # Taxonomy: credential-exposure/cloud-imds/*
  # OWASP LLM02 — Sensitive Information Disclosure
  # MITRE T1552.005 — Cloud Instance Metadata API
  # ============================================================
  #
  # Cloud instance metadata services (IMDS) expose IAM/service-account
  # credentials to any process running on the instance. An AI agent using
  # an MCP fetch or HTTP tool can steal these credentials silently.
  #
  # AWS IMDS:   169.254.169.254 (EC2) and 169.254.170.2 (ECS task role)
  #             fd00:ec2::254 (IPv6 link-local IMDS, supported since 2024)
  # GCP IMDS:   metadata.google.internal / metadata.google.com
  # Azure IMDS: 169.254.169.254 (same link-local as AWS, but /metadata/ path)
  #
  # These IP/hostnames have NO legitimate use in AI agent workflows — any
  # HTTP fetch targeting them is almost certainly credential theft.

  # === BLOCK: AWS/Azure IMDS endpoint access (IPv4 and IPv6) ===
  - id: mcp-sec-block-aws-imds
    taxonomy: "credential-exposure/cloud-imds/aws-imds-token-theft"
    match:
      tool_name_any:
        - fetch
        - fetch_url
        - http_request
        - http_get
        - http_post
        - web_request
        - web_fetch
        - browser_fetch
        - curl_request
        - make_request
        - network_request
        - get_url
        - read_url
        - open_url
      args_match:
        url:
          pattern_any:
            - "(?i)169\\.254\\.169\\.254"
            - "(?i)169\\.254\\.170\\.2"
            - "(?i)fd00:ec2::254"
    decision: "BLOCK"
    reason: "MCP HTTP tool accessing AWS IMDS endpoint (169.254.169.254, 169.254.170.2, or fd00:ec2::254 IPv6) — retrieves EC2/ECS IAM role credentials (AccessKeyId, SecretAccessKey, Token) silently. Agents have no legitimate need to query instance metadata. OWASP LLM02, MITRE T1552.005."
    confidence: 0.97

  # === BLOCK: GCP IMDS endpoint access ===
  - id: mcp-sec-block-gcp-imds
    taxonomy: "credential-exposure/cloud-imds/gcp-imds-token-theft"
    match:
      tool_name_any:
        - fetch
        - fetch_url
        - http_request
        - http_get
        - http_post
        - web_request
        - web_fetch
        - browser_fetch
        - curl_request
        - make_request
        - network_request
        - get_url
        - read_url
        - open_url
      args_match:
        url:
          pattern_any:
            - "(?i)metadata\\.google\\.internal"
            - "(?i)metadata\\.google\\.com/computeMetadata"
    decision: "BLOCK"
    reason: "MCP HTTP tool accessing GCP IMDS endpoint (metadata.google.internal) — retrieves GCP service account OAuth tokens silently. Agents have no legitimate need to query instance metadata. OWASP LLM02, MITRE T1552.005."
    confidence: 0.97

  # === BLOCK: VS Code / Cursor User settings.json read — extension API key exposure (issue #865) ===
  #
  # VS Code and Cursor extensions commonly store API keys directly in the user-level
  # settings.json: "openai.apiKey", "anthropic.apiKey", MCP server tokens. Reading this
  # file exposes all configured extension credentials. Write side is already blocked by
  # mcp-persist-block-ide-settings-write. This closes the read gap.
  #
  # Covered:
  #   Linux:  ~/.config/Code/User/settings.json, ~/.config/cursor/User/settings.json
  #   macOS:  ~/Library/Application Support/Code/User/settings.json, .../Cursor/...
  # NOT covered (remain allowed):
  #   /workspace/project/.vscode/settings.json  — project-level, not user-level
  #
  # MITRE T1552 — Unsecured Credentials; T1539 — Steal Web Session Cookie
  - id: mcp-sec-block-vscode-user-settings-read
    match:
      tool_name_any:
        - read_file
        - cat_file
        - get_file_contents
        - open_file
        - view_file
      args_match:
        path:
          pattern_any:
            - "(?i)(?:^|/)(?:\\.config/(?:Code|cursor)|Library/Application Support/(?:Code|Cursor))/User/settings\\.json$"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Read access to VS Code or Cursor user-level settings.json is blocked — extensions store API keys (OpenAI, Anthropic, GitHub), MCP server tokens, and OAuth credentials directly in this file. MITRE T1552, T1539."

  # === BLOCK: chezmoi dotfile manager secrets (issue #946) ===
  #
  # chezmoi is a cross-platform dotfile manager widely used by developers. It
  # stores two types of sensitive data that MCP agents must not read:
  #
  # 1. chezmoi.yaml / chezmoi.toml — the chezmoi config file. This file
  #    contains the user's chezmoi configuration including:
  #    - age encryption private key path or inline key material
  #    - keepassxc, bitwarden, 1password, gopass integration credentials
  #    - passphrase/GPG key for encrypted chezmoi templates
  #    - Template data (data.* keys) which may contain API tokens and secrets
  #
  # 2. ~/.local/share/chezmoi/ — the chezmoi source directory. chezmoi stores
  #    template versions of ALL the user's dotfiles here, including:
  #    - The actual SSH private keys (dot_ssh/id_rsa, dot_ssh/id_ed25519)
  #    - API token files (.env templates, dot_npmrc, dot_pypirc)
  #    - Git credential helpers (dot_gitconfig)
  #    - Any other dotfile the user tracks — chezmoi is a credential aggregator
  #
  # Attack scenario: A prompt-injected agent reads chezmoi.yaml to extract
  # encryption credentials, then reads the source tree to obtain templated
  # versions of the user's SSH keys and token files — all without touching
  # the live ~/.ssh/ directory that many rules protect.
  #
  # MITRE T1552.001 — Unsecured Credentials: Credentials In Files
  # OWASP LLM02 2025 — Sensitive Information Disclosure
  - id: mcp-sec-block-chezmoi-config-access
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      args_match:
        path:
          pattern_any:
            - "\\.config/chezmoi/chezmoi\\.yaml"
            - "\\.config/chezmoi/chezmoi\\.toml"
            - "\\.config/chezmoi/chezmoi\\.json"
            - "\\.chezmoi\\.yaml"
            - "\\.chezmoi\\.toml"
            - "\\.chezmoi\\.json"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Access to chezmoi config is blocked — chezmoi.yaml/toml contains encryption key references (age, GPG), password manager credentials (Bitwarden, 1Password), and template data with embedded secrets. MITRE T1552.001, OWASP LLM02."

  - id: mcp-sec-block-chezmoi-source-dir-access
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      args_match:
        path:
          pattern_any:
            - "\\.local/share/chezmoi/"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Access to chezmoi source directory is blocked — ~/.local/share/chezmoi/ mirrors the user's entire dotfile tree including SSH keys, API tokens, and credential files as templates. Reading this directory bypasses individual file protections. MITRE T1552.001, OWASP LLM02."

