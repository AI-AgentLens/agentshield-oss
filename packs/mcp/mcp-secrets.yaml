      argument_patterns:
        path: "**/.bitcoin/bitcoin.conf"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to bitcoin.conf is blocked — contains rpcuser/rpcpassword granting full JSON-RPC wallet control (list addresses, send transactions, dump private keys). Writes can redirect walletdir or disable security checks. MITRE T1552.001."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.bitcoin/bitcoin.conf"}
        - tool: "write_file"
          args: {"path": "/root/.bitcoin/bitcoin.conf", "content": "rpcpassword=stolen"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/docs/bitcoin-node-setup.md"}
        - tool: "read_file"
          args: {"path": "/workspace/project/config.conf"}

  - id: mcp-sec-block-altcoin-node-config
    taxonomy: "credential-exposure/cryptocurrency/bitcoin-wallet-access"
