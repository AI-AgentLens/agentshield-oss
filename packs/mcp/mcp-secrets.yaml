    decision: "BLOCK"
    confidence: 0.95
    reason: "Access to PFX certificate bundle is blocked — Microsoft PFX format (identical to PKCS#12) contains a private key and certificate chain. Exfiltrating this file enables signing malicious software. MITRE T1553.002, T1195.002."
    tests:
