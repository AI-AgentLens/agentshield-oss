name: "MCP Secrets & Credentials"
description: "Block MCP tool access to credential files, sensitive directories, and database URIs"
version: "1.0.0"
author: "AgentShield Security Research"

blocked_resources:
  - "file:///home/*/.ssh/**"
  - "file:///root/.ssh/**"
  - "file:///home/*/.aws/**"
  - "file:///root/.aws/**"
  - "file:///home/*/.gnupg/**"
  - "file:///root/.gnupg/**"

rules:
  # === BLOCK: SSH directory — all writes ===
  # Any write to ~/.ssh/ is dangerous: modifying config redirects connections,
  # writing authorized_keys installs a persistent backdoor (MITRE T1098.004).
  # BLOCK all write tools regardless of filename.
  - id: mcp-sec-block-ssh-access
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Write access to SSH directory is blocked — modifications to ~/.ssh/ can install backdoors (authorized_keys) or redirect connections (config). MITRE T1098.004, T1552.004."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.ssh/authorized_keys"}
        - tool: "create_file"
          args: {"path": "/home/user/.ssh/config"}
      tn:
        - tool: "write_file"
          args: {"path": "/workspace/README.md"}

  # === BLOCK: SSH private key reads ===
  # Read access to SSH private key files must be blocked — these are the actual
  # credentials. Public key files (*.pub) and known_hosts are intentionally excluded:
  # - id_rsa.pub, id_ed25519.pub etc. are designed to be publicly shared
  # - known_hosts contains server fingerprints, not credentials
  # Pattern matches the standard OpenSSH private key filename conventions.
  - id: mcp-sec-block-ssh-private-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_rsa"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_rsa) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/id_rsa"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/id_rsa"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  - id: mcp-sec-block-ssh-ed25519-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_ed25519"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_ed25519) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/id_ed25519"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/id_ed25519"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  - id: mcp-sec-block-ssh-ecdsa-key-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/id_ecdsa"
    decision: "BLOCK"
    reason: "Read access to SSH private key (id_ecdsa) is blocked — private keys enable impersonating the user on all servers they have access to. MITRE T1552.004."
    confidence: 0.98
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/id_ecdsa"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/id_ecdsa"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  - id: mcp-sec-block-ssh-config-read
    taxonomy: "credential-exposure/private-key-access/ssh-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/config"
    decision: "BLOCK"
    reason: "Read access to SSH config (~/.ssh/config) is blocked — reveals server hostnames, usernames, identity files, and proxy configurations. MITRE T1552, T1087."
    confidence: 0.95
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/config"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/config"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  # Catch-all for read access to any file in ~/.ssh/.
  # Covers non-standard private key names (deploy_key, github_rsa, etc.) that
  # aren't matched by the specific id_* rules above.
  # Note: This also conservatively blocks reads of .pub files and known_hosts.
  # See issue #91 for the partial-FP discussion.
  - id: mcp-sec-block-ssh-dir-read
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/**"
    decision: "BLOCK"
    reason: "Read access to SSH directory (~/.ssh/) is blocked — may contain SSH private keys, config, and authorization data. MITRE T1552.004."
    confidence: 0.90
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/known_hosts"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/deploy_key"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  # Reading authorized_keys exposes which public keys have login access to the host —
  # useful for lateral movement planning. MITRE T1087 (account discovery).
  - id: mcp-sec-block-ssh-authorized-keys-read
    taxonomy: "credential-exposure/private-key-access/ssh-authorized-keys-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.ssh/authorized_keys"
    decision: "BLOCK"
    reason: "Read access to SSH authorized_keys is blocked — lists all public keys authorized to log in, useful for lateral movement. MITRE T1087, T1552."
    confidence: 0.93
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.ssh/authorized_keys"}
        - tool: "cat_file"
          args: {"path": "/root/.ssh/authorized_keys"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  # === BLOCK: AWS credential access ===
  - id: mcp-sec-block-aws-access
    taxonomy: "credential-exposure/cloud-credentials/cloud-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
      argument_patterns:
        path: "**/.aws/**"
    decision: "BLOCK"
    reason: "Access to AWS credential directories is blocked."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.aws/credentials"}
        - tool: "write_file"
          args: {"path": "/home/user/.aws/config"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/src/config.json"}

  # === BLOCK: GPG key access ===
  - id: mcp-sec-block-gnupg-access
    taxonomy: "credential-exposure/cryptographic-keys/gpg-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.gnupg/**"
    decision: "BLOCK"
    reason: "Access to GPG key directories is blocked."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.gnupg/secring.gpg"}
        - tool: "write_file"
          args: {"path": "/home/user/.gnupg/trustdb.gpg"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/keys/public.asc"}

  # === BLOCK: TOTP/MFA seed file access (issue #816) ===
  # ~/.google_authenticator (libpam-google-authenticator) stores the HMAC seed secret
  # used to generate TOTP/HOTP one-time passwords. An AI agent reading this file can
  # extract the seed and generate valid OTP codes, effectively bypassing MFA for any
  # account configured with this authenticator. MITRE T1552.
  - id: mcp-sec-block-google-authenticator-read
    taxonomy: "credential-exposure/mfa-bypass/totp-seed-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      argument_patterns:
        path: "**/.google_authenticator"
    decision: "BLOCK"
    confidence: 0.97
    reason: "Read access to ~/.google_authenticator is blocked — this file contains the HMAC seed secret for TOTP/HOTP MFA. An attacker who reads this file can generate valid one-time passwords and bypass multi-factor authentication. MITRE T1552."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.google_authenticator"}
        - tool: "cat_file"
          args: {"path": "/root/.google_authenticator"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/docs/google_authenticator_setup.md"}
        - tool: "read_file"
          args: {"path": "/workspace/README.md"}

  # === BLOCK: Kubernetes config access ===
  - id: mcp-sec-block-kube-access
    taxonomy: "credential-exposure/container-config/kubernetes-config-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
      argument_patterns:
        path: "**/.kube/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes config is blocked."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/home/user/.kube/config"}
        - tool: "write_file"
          args: {"path": "/home/user/.kube/cache/token"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}

  # === BLOCK: Kubernetes in-Pod service account token/cert ===
  - id: mcp-sec-block-k8s-service-account-token
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-service-account-token"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/kubernetes.io/serviceaccount/**"
    decision: "BLOCK"
    reason: "Kubernetes service account token/cert — Bearer token for API server auth. Reading this grants the reader ability to impersonate the Pod's service account, potentially with cluster-admin RBAC."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/run/secrets/kubernetes.io/serviceaccount/token"}
        - tool: "cat_file"
          args: {"path": "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}

  # === BLOCK: Kubernetes PKI private keys (issue #358) ===
  # /etc/kubernetes/pki/ contains cluster CA and component private keys.
  # Reading these enables impersonating the API server, etcd, or any cluster component.
  # MITRE T1552.004 (Credentials in Files), T1552.003 (Bash History).
  - id: mcp-sec-block-k8s-pki-keys
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-pki-private-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "write_file"
        - "cat_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "write_to_file"
        - "open_file"
        - "view_file"
        - "get_file_contents"
      argument_patterns:
        path: "/etc/kubernetes/pki/**"
    decision: "BLOCK"
    reason: "Access to Kubernetes PKI directory is blocked — contains cluster CA and component private keys that enable impersonating the API server, etcd, or any control-plane component. MITRE T1552.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/kubernetes/pki/ca.key"}
        - tool: "write_file"
          args: {"path": "/etc/kubernetes/pki/apiserver.key"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}

  # === BLOCK: Kubelet serving certificate PKI (issue #856) ===
  # /var/lib/kubelet/pki/ stores the kubelet's serving certificate and private key.
  # These are used for kubelet API authentication. Reading the private key enables
  # an attacker to impersonate the kubelet, exfiltrate pod secrets, and execute
  # commands in any container on the node without API server authorization.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-kubelet-pki
    taxonomy: "credential-exposure/cloud-credentials/kubernetes-pki-private-key-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
      argument_patterns:
        path: "/var/lib/kubelet/pki/**"
    decision: "BLOCK"
    reason: "Access to /var/lib/kubelet/pki/ is blocked — contains kubelet serving certificate and private key. Reading the private key enables impersonating the kubelet to exfiltrate pod secrets and execute commands in containers without API server authorization. MITRE T1552.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/lib/kubelet/pki/kubelet.key"}
        - tool: "cat_file"
          args: {"path": "/var/lib/kubelet/pki/kubelet-client-current.pem"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/k8s/deployment.yaml"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/kubelet-configuration.md"}

  # === BLOCK: Istio service mesh mTLS certificates (issue #856) ===
  # /etc/istio/proxy/ is the Istio sidecar proxy certificate directory. It contains
  # the workload mTLS private key and certificate chain used for mutual TLS
  # authentication within the service mesh. Exfiltrating the private key enables
  # impersonating any service mesh workload and decrypting inter-service traffic.
  # /etc/certs/ is used by older Istio versions and some Envoy configurations.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-istio-mtls-cert
    taxonomy: "credential-exposure/cloud-credentials/service-mesh-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
      argument_patterns:
        path: "/etc/istio/proxy/**"
    decision: "BLOCK"
    reason: "Access to /etc/istio/proxy/ is blocked — Istio sidecar proxy certificate directory containing workload mTLS private key and cert chain. Exfiltration enables impersonating any service mesh workload and decrypting inter-service traffic. MITRE T1552.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/istio/proxy/key.pem"}
        - tool: "cat_file"
          args: {"path": "/etc/istio/proxy/cert-chain.pem"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/istio/virtualservice.yaml"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/istio-setup.md"}

  # === BLOCK: Linkerd service mesh identity certificates (issue #856) ===
  # /var/run/linkerd/identity/ holds the Linkerd proxy identity credentials —
  # the workload private key and certificate issued by the trust anchor CA.
  # These are used for mTLS in the Linkerd service mesh. Exfiltrating the private
  # key enables impersonating any Linkerd-injected workload in the cluster.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-linkerd-identity
    taxonomy: "credential-exposure/cloud-credentials/service-mesh-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
      argument_patterns:
        path: "/var/run/linkerd/identity/**"
    decision: "BLOCK"
    reason: "Access to /var/run/linkerd/identity/ is blocked — Linkerd proxy identity directory containing workload mTLS private key and trust anchor certificate. Exfiltration enables impersonating any Linkerd-injected service mesh workload. MITRE T1552.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/var/run/linkerd/identity/end-entity/key.p8"}
        - tool: "cat_file"
          args: {"path": "/var/run/linkerd/identity/end-entity/crt.pem"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/linkerd/config.yaml"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/linkerd-setup.md"}

  # === BLOCK: SPIFFE/SPIRE workload identity (issue #856) ===
  # /run/spire/ contains the SPIRE agent workload API socket and internal state.
  # /opt/spire/data/ contains SPIRE agent/server data including SVID private keys.
  # SPIFFE SVIDs (X.509 certificates) are used for workload identity in zero-trust
  # environments. Accessing the private key or socket enables impersonating any
  # SPIFFE-registered workload and bypassing mTLS authentication.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-spire-identity
    taxonomy: "credential-exposure/cloud-credentials/service-mesh-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
      argument_patterns:
        path: "/run/spire/**"
    decision: "BLOCK"
    reason: "Access to /run/spire/ is blocked — SPIRE agent workload API socket and identity state directory. Accessing the socket enables obtaining SPIFFE SVIDs for any registered workload, bypassing mTLS authentication across the trust domain. MITRE T1552.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/run/spire/sockets/agent.sock"}
        - tool: "cat_file"
          args: {"path": "/run/spire/sockets/public/api.sock"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/spire/agent.conf"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/spiffe-setup.md"}

  # === BLOCK: SPIRE agent/server data directory — /opt/spire/data/ (issue #856) ===
  # /opt/spire/data/ contains SPIRE agent and server persistent state, including
  # cached SVIDs (X.509 certificates with private keys) and bundle data. This is
  # the on-disk backing store for the SPIRE agent. Reading this directory gives an
  # attacker SVID private keys for every registered workload cached by this agent.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-spire-data
    taxonomy: "credential-exposure/cloud-credentials/service-mesh-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
      argument_patterns:
        path: "/opt/spire/data/**"
    decision: "BLOCK"
    reason: "Access to /opt/spire/data/ is blocked — SPIRE agent/server persistent data directory containing cached SVID private keys for registered workloads. Reading this enables impersonating any SPIFFE-registered workload in the trust domain. MITRE T1552.004."
    confidence: 0.97
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/opt/spire/data/agent/svids.pb"}
        - tool: "cat_file"
          args: {"path": "/opt/spire/data/server/keys.json"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/spire/server.conf"}
        - tool: "read_file"
          args: {"path": "/workspace/docs/spire-data-format.md"}

  # === BLOCK: Older Istio / Envoy workload certificates — /etc/certs/ (issue #856) ===
  # /etc/certs/ is used by older Istio versions (pre-1.5) and some Envoy configurations
  # as the workload certificate directory. It contains the workload mTLS private key
  # (key.pem) and certificate chain (cert-chain.pem) used for service-to-service mTLS.
  # This path is still found in brownfield enterprise K8s clusters and Envoy sidecars
  # configured manually. Exfiltrating the private key enables decrypting mesh traffic.
  # MITRE T1552.004 — Credentials in Files: Private Keys
  - id: mcp-sec-block-envoy-legacy-certs
    taxonomy: "credential-exposure/cloud-credentials/service-mesh-credential-access"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
      argument_patterns:
        path: "/etc/certs/**"
    decision: "BLOCK"
    reason: "Access to /etc/certs/ is blocked — older Istio/Envoy workload certificate directory containing mTLS private key and certificate chain. Exfiltration enables impersonating any service mesh workload and decrypting inter-service traffic. MITRE T1552.004."
    confidence: 0.95
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/certs/key.pem"}
        - tool: "cat_file"
          args: {"path": "/etc/certs/cert-chain.pem"}
      tn:
