name: "MCP Supply Chain (Premium)"
description: >
  Premium supply chain rules covering package manager global stores and
  CODEOWNERS deletion — threats not included in the community pack.
version: "1.0.0"
author: "AgentShield Security Research"

structural_rules:
  # === BLOCK: MCP write to pnpm / bun global package stores ===
  #
  # pnpm and bun are fast npm alternatives used widely in modern JS projects.
  # Like npm, their global package stores are user-writable — an AI agent using
  # MCP write tools can inject malicious code without any shell command trace.
  #
  # Attack scenarios:
  #   - Overwrite ~/.local/share/pnpm/node_modules/react/index.js → backdoor all
  #     projects using pnpm global react (server-side rendering, CLIs)
  #   - Modify ~/.pnpm-store/v3/files/<hash> → poison pnpm's content-addressable
  #     store; affects ALL projects on the machine using that package+version
  #   - Write to ~/.bun/install/global/node_modules/<pkg> → backdoor bun globals
  #
  # The pnpm content-addressable store (CAS) attack is particularly dangerous:
  # pnpm hard-links from the store to project node_modules, so one store write
  # backdoors every project version that references that hash — past and future.
  #
  # Covered paths:
  #   ~/.local/share/pnpm/node_modules/**  — pnpm global packages (Linux XDG default)
  #   ~/.pnpm-global/**                    — pnpm global prefix (Windows / custom)
  #   ~/.pnpm-store/**                     — pnpm content-addressable store (all OS)
  #   ~/.bun/install/global/**             — bun global packages (all OS)
  #
  # TN: Writing to a project's node_modules is a normal dev workflow and must
  # not trigger this rule. Only user-level global stores are blocked.
  #
  # MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
  # MITRE T1565.001 — Data Manipulation: Stored Data Manipulation
  - id: mcp-sc-block-pnpm-bun-global-write
    taxonomy: "supply-chain/dependency-confusion/package-manifest-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            # pnpm global packages on Linux (XDG base dir default)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.local/share/pnpm/node_modules/.+"
            - "^~/\\.local/share/pnpm/node_modules/.+"
            # pnpm global prefix: ~/.pnpm-global (custom prefix or Windows)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.pnpm-global/.+"
            - "^~/\\.pnpm-global/.+"
            # pnpm content-addressable store: poisoning one hash backdoors ALL projects sharing it
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.pnpm-store/.+"
            - "^~/\\.pnpm-store/.+"
            # bun global packages
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.bun/install/global/.+"
            - "^~/\\.bun/install/global/.+"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP write to pnpm or bun global package store — modifying globally-installed package source code injects malicious code that executes on every import, enabling persistent code execution without any shell trace. The pnpm content-addressable store attack is especially severe: one write backdoors all projects sharing that package hash. MITRE T1195.001, T1565.001."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.local/share/pnpm/node_modules/react/index.js"}
        - tool: "str_replace_editor"
          args: {"path": "/home/user/.pnpm-global/5/node_modules/express/lib/router/index.js"}
        - tool: "write_file"
          args: {"path": "/home/user/.pnpm-store/v3/files/ab/cdef1234567890"}
        - tool: "edit_file"
          args: {"path": "/home/user/.bun/install/global/node_modules/typescript/lib/typescript.js"}
        - tool: "write_file"
          args: {"path": "/root/.local/share/pnpm/node_modules/lodash/lodash.js"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/node_modules/react/index.js"}
        - tool: "write_file"
          args: {"path": "/workspace/docs/pnpm-store-architecture.md"}
        - tool: "write_file"
          args: {"path": "/home/user/projects/myapp/node_modules/express/index.js"}

  # === BLOCK: MCP write to Go binary install directory (issue #1145) ===
  #
  # `~/go/bin/` is the GOPATH bin directory — Go installs executables here via
  # `go install`. After running `go install`, the binary is in PATH and executes
  # on every invocation of that tool name.
  #
  # An AI agent using MCP write tools can place ANY binary here without triggering
  # a shell-level rule (no shell command is issued). Attack scenarios:
  #
  #   - Write malicious `~/go/bin/gopls` → backdoor the Go language server; every
  #     IDE that uses gopls for code completion executes the trojaned binary
  #   - Write to `~/go/bin/golangci-lint` → backdoor the linter used in CI pipelines;
  #     the trojan runs during every `golangci-lint run` with full repo access
  #   - Write to `~/go/bin/air` → backdoor the live-reload server; executes on every
  #     `air` invocation during development, exfiltrating code changes in real time
  #   - Write to `~/go/bin/<any-name>` → place a new executable in PATH without
  #     needing to shadow an existing tool — any tool name is reachable
  #
  # The existing `mcp-sc-block-user-bin-path-shadow` rule only blocks writes to
  # `~/.cargo/bin/<well-known-tool>` for a hardcoded list. It does not cover
  # `~/go/bin/` at all — any tool name (including `gopls`, `golangci-lint`, `air`)
  # passes undetected.
  #
  # Legitimate Go tool installs use `go install pkg@version` at the shell layer;
  # MCP write tools have no legitimate reason to write to this directory.
  #
  # Covered paths (all GOPATH/bin variants):
  #   ~/go/bin/**                    — default GOPATH ($HOME/go) on all OS
  #   /home/<user>/go/bin/**         — absolute form (Linux)
  #   /root/go/bin/**                — root user GOPATH
  #   /Users/<user>/go/bin/**        — absolute form (macOS)
  #
  # TN: project-local bin/ directories (e.g., /workspace/project/bin/tool) must
  # not trigger this rule. Only the user-level GOPATH bin/ is blocked.
  #
  # MITRE T1574.007 — Hijack Execution Flow: Path Interception by PATH Environment Variable
  # MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
  - id: mcp-sc-block-go-bin-write
    taxonomy: "supply-chain/path-hijacking/user-bin-shadow"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            # Default GOPATH bin: ~/go/bin/**
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/go/bin/.+"
            - "^~/go/bin/.+"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP write to Go binary install directory (~/go/bin/) — GOPATH/bin is on PATH after standard Go installation. Writing any binary here enables persistent code execution on every tool invocation, bypassing shell-level rules entirely. MITRE T1574.007, T1195.001."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/go/bin/gopls"}
        - tool: "create_file"
          args: {"path": "/home/user/go/bin/evil-backdoor"}
        - tool: "write_file"
          args: {"path": "/root/go/bin/golangci-lint"}
        - tool: "str_replace_editor"
          args: {"path": "/home/user/go/bin/air"}
        - tool: "write_file"
          args: {"path": "~/go/bin/staticcheck"}
      tn:
        - tool: "write_file"
          args: {"path": "/workspace/myproject/bin/tool"}
        - tool: "read_file"
          args: {"path": "/home/user/go/bin/gopls"}
        - tool: "write_file"
          args: {"path": "/home/user/go/src/myproject/main.go"}

  # === BLOCK: MCP write to Maven local repository and Gradle module cache (issue #1146) ===
  #
  # Maven (~/.m2/repository/) and Gradle (~/.gradle/caches/) maintain local artifact
  # caches that act as dependency stores for all Java/Kotlin/Scala projects on the
  # machine. Both build tools consult the local cache FIRST before fetching from
  # remote registries — a poisoned local cache silently serves malicious JARs to
  # every build.
  #
  # Attack scenarios:
  #
  # Maven (~/.m2/repository/):
  #   - Write malicious `commons-lang3-3.12.0.jar` to
  #     ~/.m2/repository/org/apache/commons/commons-lang3/3.12.0/
  #   - Maven resolves the artifact locally — no network call, no checksum alert
  #   - Every project on the machine depending on commons-lang3:3.12.0 now loads
  #     the trojaned JAR on `mvn compile`, `mvn package`, or in CI
  #   - `.m2/` is not version-controlled and rarely inspected
  #
  # Gradle (~/.gradle/caches/modules-2/files-2.1/):
  #   - Write a malicious JAR to Gradle's content-addressable file store
  #   - Gradle resolves by group:artifact:version → hash directory lookup
  #   - A crafted poisoned JAR evades hash checks if the metadata file is also
  #     overwritten (both live in the same cache directory)
  #   - All Gradle projects on the machine using that artifact version are backdoored
  #
  # Unlike project-local `build/` or `.gradle/` directories (which are per-project),
  # the user-home `~/.m2/` and `~/.gradle/caches/` are shared across ALL projects
  # and ALL future builds — one write affects the entire machine indefinitely.
  #
  # Legitimate artifact management uses `mvn install`, `gradle build`, or dependency
  # declarations — not MCP write tools directly modifying the cache.
  #
  # Covered paths:
  #   ~/.m2/repository/**         — Maven local artifact repository
  #   ~/.gradle/caches/**         — Gradle module + file cache
  #
  # TN: project-local `.gradle/` directories and `build/` output dirs are normal
  # dev workflow and must not trigger this rule. Reading from cache paths is fine.
  #
  # MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
  # MITRE T1565.001 — Data Manipulation: Stored Data Manipulation
  - id: mcp-sc-block-maven-gradle-cache-write
    taxonomy: "supply-chain/dependency-confusion/package-manifest-tampering"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            # Maven local repository (Linux, macOS, Windows WSL)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.m2/repository/.+"
            - "^~/\\.m2/repository/.+"
            # Gradle module cache: caches/modules-2/ stores dependency metadata + jars
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.gradle/caches/.+"
            - "^~/\\.gradle/caches/.+"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP write to Maven local repository or Gradle module cache — both build tools resolve artifacts from local cache first. Injecting a malicious JAR into ~/.m2/ or ~/.gradle/caches/ silently backdoors all Java/Kotlin projects on the machine without any network trace or checksum alert. MITRE T1195.001, T1565.001."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.m2/repository/org/apache/commons/commons-lang3/3.12.0/commons-lang3-3.12.0.jar"}
        - tool: "create_file"
          args: {"path": "/root/.m2/repository/com/example/library/1.0.0/library-1.0.0.jar"}
        - tool: "write_file"
          args: {"path": "/home/user/.gradle/caches/modules-2/files-2.1/org.springframework/spring-core/6.0.0/abc123/spring-core-6.0.0.jar"}
        - tool: "str_replace_editor"
          args: {"path": "/home/user/.gradle/caches/modules-2/metadata-2.99/descriptors/org.example/lib/1.0/descriptor.ivy"}
        - tool: "write_file"
          args: {"path": "~/.m2/repository/com/google/guava/guava/32.1.0-jre/guava-32.1.0-jre.jar"}
      tn:
        - tool: "write_file"
          args: {"path": "/workspace/myproject/.gradle/build-output.txt"}
        - tool: "read_file"
          args: {"path": "/home/user/.m2/repository/org/springframework/spring-core/6.0.0/spring-core-6.0.0.jar"}
        - tool: "write_file"
          args: {"path": "/workspace/myproject/build/libs/myapp-1.0.jar"}
        - tool: "write_file"
          args: {"path": "/workspace/docs/maven-dependency-guide.md"}

  # === BLOCK: MCP delete of CODEOWNERS file (issue #1142) ===
  #
  # The community pack blocks MCP *writes* to CODEOWNERS, but delete operations
  # are equally dangerous. Deleting CODEOWNERS silently removes ALL mandatory
  # reviewer requirements from the repository — no branch protection, no required
  # approvers, no audit trail.
  #
  # An AI agent using delete_file/remove_file via MCP can:
  #   1. Remove the CODEOWNERS file entirely → future PRs bypass human review silently
  #   2. The effect is persistent and invisible — no CI alert, no log, just missing gates
  #   3. This bypasses shell-level rules entirely since no shell command is issued
  #
  # This is distinct from the mcp-sc-block-codeowners-write rule in the community pack,
  # which only covers write-family tool names. Delete operations require a separate rule.
  #
  # Files covered:
  #   .github/CODEOWNERS  (GitHub)
  #   CODEOWNERS          (GitLab, Bitbucket — root)
  #   docs/CODEOWNERS     (GitLab docs convention)
  #
  # MITRE T1195.002 — Supply Chain Compromise: Compromise Software Supply Chain
  - id: mcp-sc-block-codeowners-delete
    taxonomy: "supply-chain/build-pipeline/cicd-config-injection"
    match:
      tool_name_any:
        - "delete_file"
        - "remove_file"
        - "unlink"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)\\.github/CODEOWNERS$"
            - "(?:^|/)CODEOWNERS$"
            - "(?:^|/)docs/CODEOWNERS$"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP delete of CODEOWNERS — removing code ownership gates eliminates mandatory reviewer requirements across the entire repository, enabling subsequent malicious changes to bypass human review silently. Deletion is as dangerous as modification. MITRE T1195.002."
    tests:
      tp:
        - tool: "delete_file"
          args: {"path": "/project/.github/CODEOWNERS"}
        - tool: "remove_file"
          args: {"path": "/workspace/CODEOWNERS"}
        - tool: "delete_file"
          args: {"path": "/project/docs/CODEOWNERS"}
      tn:
        - tool: "delete_file"
          args: {"path": "/project/src/codeowners_validator.go"}
        - tool: "read_file"
          args: {"path": "/project/.github/CODEOWNERS"}
        - tool: "delete_file"
          args: {"path": "/project/docs/codeowners-guide.md"}

  # === AUDIT: Bun shell tagged template literal with variable interpolation (issue #1161) ===
  #
  # Bun's shell API supports two call forms:
  #   Form 1: Bun.$(cmd)                     — caught by Comply static rule ai-llm-output-bun-shell
  #   Form 2: Bun.$`${cmd}`                  — NOT caught by Semgrep (architectural limitation)
  #
  # Form 2 is the idiomatic syntax and is more widely used in real code. Semgrep's taint mode
  # treats the tagged template as a single string literal and cannot track taint into the
  # interpolated ${cmd} segment.
  #
  # This rule provides write-time visibility: when an AI agent writes a .ts/.js/.mjs file
  # containing a Bun tagged template literal with variable interpolation, it creates an AUDIT
  # event. This is defense-in-depth — the existing shell analyzer already catches the actual
  # command when the Bun process spawns a subprocess. (Full analysis in issue #1161.)
  #
  # Decision is AUDIT not BLOCK because:
  #   1. Bun.$`${var}` is idiomatic Bun usage — blocking would break all Bun shell scripts.
  #   2. Runtime protection (shell analyzer layer) already catches the actual dangerous execution.
  #   3. FP rate is non-trivial: any Bun script with dynamic paths/arguments would trigger.
  #
  # FP note: Process-controlled interpolations (Bun.$`echo ${process.env.HOME}`) also trigger.
  # The AUDIT signal is still useful — it surfaces all Bun dynamic shell usage for review.
  - id: mcp-sc-audit-bun-shell-template-write
    taxonomy: "supply-chain/code-injection/bun-shell-tagged-template"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
        - "write_to_file"
      args_match:
        path:
          pattern_any:
            - "\\.(?:ts|tsx|js|jsx|mjs)$"
        content:
          pattern_any:
            - "Bun\\.\\$`[^`]*\\$\\{"
    decision: "AUDIT"
    confidence: 0.70
    reason: "MCP file write contains a Bun shell tagged template literal with variable interpolation (Bun.$`${...}`). Semgrep cannot track taint through this syntax (todoruleid gap in ai-llm-output-bun-shell). When LLM output flows through the interpolated variable, the Bun subprocess executes attacker-controlled shell commands. Runtime shell layer provides primary protection at exec time; this rule provides write-time visibility. MITRE T1059."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/project/scripts/deploy.ts", "content": "import { $ } from 'bun';\nconst cmd = process.argv[2];\nawait Bun.$`${cmd}`;"}
        - tool: "create_file"
          args: {"path": "/workspace/src/runner.ts", "content": "export async function run(command: string) {\n  return await Bun.$`${command}`;\n}"}
        - tool: "str_replace_editor"
          args: {"path": "/workspace/scripts/build.mjs", "content": "const result = await Bun.$`${buildCmd} --output dist`;\nconsole.log(result.stdout);"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/scripts/deploy.ts", "content": "import { $ } from 'bun';\nawait Bun.$`npm install`;\nawait Bun.$`tsc --build`;"}
        - tool: "write_file"
          args: {"path": "/project/docs/bun-shell-guide.md", "content": "## Bun Shell\nBun.$`${cmd}` is the tagged template literal syntax for Bun shell."}
        - tool: "write_file"
          args: {"path": "/project/src/utils.go", "content": "// This Go file mentions Bun.$`${cmd}` in a comment but is not a JS/TS file"}

  # === BLOCK: MCP write to JS/Deno runtime binary directories ===
  #
  # Several modern JS runtimes and version managers place their own executable
  # binaries in user-owned directories that are added to $PATH:
  #
  #   ~/.bun/bin/          — Bun installs its runtime + global CLI symlinks here
  #   ~/.volta/bin/        — Volta shims for node/npm/yarn intercept ALL JS tool calls
  #   ~/.volta/tools/      — Volta stores per-tool binaries and image data here
  #   ~/.deno/bin/         — Deno installs its runtime here
  #   ~/.fnm/node-versions/ — Fast Node Manager manages Node.js versions here
  #
  # Writing to these directories installs executable files that run when the user
  # invokes ANY tool in their PATH. This is a severe, persistent supply chain attack:
  #
  #   - Write ~/.bun/bin/bun → backdoor the Bun runtime → all `bun run` scripts
  #     execute attacker code. Also compromises any project using bun as a shim.
  #   - Write ~/.volta/bin/node → backdoor ALL Node.js invocations on the machine.
  #     Volta intercepts node/npm/yarn globally — one write = machine-wide compromise.
  #   - Write ~/.deno/bin/deno → backdoor all Deno script execution.
  #   - Write ~/.fnm/node-versions/v20.0.0/bin/node → silently backdoor a specific
  #     Node.js version used by projects with .node-version or .nvmrc pinned to it.
  #
  # The community rule mcp-sc-block-user-bin-path-shadow restricts writes to
  # ~/.local/bin/, ~/bin/, and ~/.cargo/bin/ to well-known tool names only.
  # These runtime directories require broader protection: ANY binary write is
  # dangerous because the runtimes themselves are the targets.
  #
  # TN: Writing source files in a project that has "bun" in its path (e.g.,
  # /home/user/projects/bun-app/src/index.ts) must NOT trigger. Only writes
  # directly inside runtime-owned binary/tool directories are blocked.
  #
  # MITRE T1574.007 — Hijack Execution Flow: Path Interception by PATH Environment Variable
  # MITRE T1036.003 — Masquerading: Rename System Utilities
  # MITRE T1554    — Compromise Host Software Binary
  - id: mcp-sc-block-js-runtime-bin-write
    taxonomy: "supply-chain/path-hijacking/runtime-binary-overwrite"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            # Bun runtime binary directory (~/.bun/bin/)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.bun/bin/.+"
            - "^~/\\.bun/bin/.+"
            # Volta shims and tool image storage (~/.volta/bin/, ~/.volta/tools/)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.volta/bin/.+"
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.volta/tools/.+"
            - "^~/\\.volta/bin/.+"
            - "^~/\\.volta/tools/.+"
            # Deno runtime binary directory (~/.deno/bin/)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.deno/bin/.+"
            - "^~/\\.deno/bin/.+"
            # Fast Node Manager version storage (~/.fnm/node-versions/)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.fnm/node-versions/.+"
            - "^~/\\.fnm/node-versions/.+"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP write to JS/Deno runtime binary directory — these directories (~/.bun/bin/, ~/.volta/bin/, ~/.deno/bin/, ~/.fnm/node-versions/) are managed by the runtime and placed in $PATH. Writing here installs a trojaned binary that executes on every runtime invocation, achieving persistent code execution without elevated privileges. MITRE T1554, T1574.007."
    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.bun/bin/bun"}
        - tool: "create_file"
          args: {"path": "/home/user/.bun/bin/node"}
        - tool: "write_file"
          args: {"path": "/home/user/.volta/bin/node"}
        - tool: "str_replace_editor"
          args: {"path": "/home/user/.volta/tools/image/packages/typescript/bin/tsc"}
        - tool: "write_file"
          args: {"path": "/root/.deno/bin/deno"}
        - tool: "create_file"
          args: {"path": "/home/user/.fnm/node-versions/v20.11.0/installation/bin/node"}
      tn:
        - tool: "write_file"
          args: {"path": "/home/user/projects/bun-app/src/index.ts"}
        - tool: "write_file"
          args: {"path": "/home/user/.bun/install/global/node_modules/react/index.js"}
        - tool: "read_file"
          args: {"path": "/home/user/.bun/bin/bun"}
