    taxonomy: "reconnaissance/network-discovery/host-discovery"
    match:
      command_regex: "\\baws\\s+(ec2\\s+(describe-instances|describe-security-groups|describe-vpcs|describe-subnets|describe-network-interfaces)|iam\\s+(list-users|list-roles|list-groups|list-policies|get-account-summary)|s3api\\s+(list-buckets|get-bucket-acl|get-bucket-policy)|s3\\s+ls|rds\\s+describe-db-instances|lambda\\s+list-functions|eks\\s+list-clusters|ecs\\s+list-clusters|cloudformation\\s+list-stacks|organizations\\s+(list-accounts|describe-organization))"
    decision: "AUDIT"
    confidence: 0.85
    reason: "AWS CLI cloud infrastructure enumeration detected — describes or lists EC2 instances, IAM identities, S3 buckets, RDS, Lambda, EKS, ECS, or organization accounts. AI agents must not silently map cloud infrastructure. MITRE T1580, T1087.004, T1069.003."
    tests:
      tp:
        - "aws ec2 describe-instances"
        - "aws iam list-users"
      tn:
        - "aws sts get-caller-identity"

