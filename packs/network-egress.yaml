  # webhook.site, requestbin.com, beeceptor.com, pipedream.net/requestbin,
  # hookbin.com, and similar services exist specifically to capture and
  # inspect HTTP requests. They have NO legitimate use in AI agent workflows.
  # Any POST to these endpoints is almost certainly data exfiltration.

  - id: "ne-block-webhook-capture-services"
    taxonomy: "data-exfiltration/network-egress/webhook-exfiltration"
    match:
      command_regex: "(curl|wget|httpie|http)\\b.*(webhook\\.site|requestbin\\.com|beeceptor\\.com|hookbin\\.com|pipedream\\.net/requestbin|bin\\.beeceptor\\.com|requestcatcher\\.com|postb\\.in|httpbin\\.org/post|canarytokens\\.org)"
    decision: "BLOCK"
    confidence: 0.97
    reason: "HTTP request to a known data-capture / request-inspection service detected. These endpoints (webhook.site, requestbin, beeceptor, etc.) exist to collect and expose HTTP payloads and have no legitimate use in AI agent workflows — this is almost certainly data exfiltration. MITRE T1567."

