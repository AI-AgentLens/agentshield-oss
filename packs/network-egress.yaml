  # ═══════════════════════════════════════════════════════════════════
  # CLOUD INFRASTRUCTURE ENUMERATION VIA CLI (closes #264)
  #
  # AI agents with cloud CLI access (aws, gcloud, az) can silently enumerate
  # the entire cloud infrastructure — EC2 instances, IAM users/roles, S3
  # buckets, GCP compute, Azure VMs — as a pre-exfiltration/lateral-movement
  # reconnaissance step.
  #
  # Threat model:
  #   1. Agent runs `aws ec2 describe-instances` to map all EC2 instances and
  #      their security groups, then plans lateral movement or data extraction.
  #   2. `aws iam list-users` / `list-roles` enumerates the IAM attack surface
  #      for privilege escalation or credential targeting.
  #   3. `aws s3 ls` enumerates all S3 buckets to identify data stores.
  #   4. `gcloud compute instances list` / `gcloud iam service-accounts list`
  #      provides equivalent GCP infrastructure mapping.
  #   5. `az vm list` / `az ad user list` maps the Azure tenant.
  #
  # Design: AUDIT (not BLOCK) because ops/devs legitimately run these commands.
  # Flagging for review catches agent-driven infrastructure mapping without
  # blocking routine cloud operations workflows.
  #
  # MITRE T1580 (Cloud Infrastructure Discovery), T1069.003 (Cloud Groups),
  # T1087.004 (Cloud Account), T1082 (System Information Discovery).
  # OWASP LLM02, LLM06.

