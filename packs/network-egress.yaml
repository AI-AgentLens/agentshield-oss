  # --- BLOCK: nohup directly wrapping network tools (no sleep, still detached) ---
  - id: "ne-block-nohup-network-exfil"
    taxonomy: "data-exfiltration/network-egress/deferred-time-delayed-exfiltration"
    match:
      command_regex: "nohup\\s+(curl|wget|nc|ncat|netcat|socat)\\b"
