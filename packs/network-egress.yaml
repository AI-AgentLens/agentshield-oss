    decision: "BLOCK"
    confidence: 0.93
    reason: "DNS-over-HTTPS exfiltration via Quad9 DoH endpoint. Tunnels DNS queries through HTTPS to bypass traditional DNS monitoring. MITRE T1071.004, T1048.003."
