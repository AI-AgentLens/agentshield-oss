  # ═══════════════════════════════════════════════════════════════════
  # DATABASE SCHEMA ENUMERATION VIA CLI (closes #260)
  #
  # AI agents with database CLI access (mysql, psql, sqlite3) can enumerate
  # the full schema of connected databases using standard SQL introspection
  # APIs — a classic pre-exfiltration reconnaissance technique.
  #
  # Threat model:
  #   1. Agent queries information_schema/pg_catalog/sqlite_master to discover
  #      all tables and columns, then crafts targeted extraction queries.
  #   2. SHOW TABLES/SHOW DATABASES reveals the full data inventory.
  #   3. Schema dumps (mysqldump --no-data, pg_dump -s) capture the entire
  #      structure without requiring row-level access.
  #
  # Design: AUDIT (not BLOCK) because developers legitimately inspect schemas
  # during development. Flagging for review catches agent-driven enumeration
  # without false-positive-blocking routine dev workflows.
  #
  # MITRE T1213, T1005. OWASP LLM02, LLM06.

  # === AUDIT: Database CLI schema introspection queries ===
  - id: "ne-audit-db-schema-enum"
    taxonomy: "reconnaissance/network-discovery/database-schema-enumeration"
    match:
      command_regex: "(?i)\\b(mysql|mariadb|psql|sqlite3)\\b.*(information_schema|pg_catalog|sqlite_master|SHOW\\s+(TABLES|DATABASES))"
    decision: "AUDIT"
    confidence: 0.88
    reason: "Database CLI invoked with schema introspection query (information_schema / pg_catalog / sqlite_master / SHOW TABLES or DATABASES). This maps the database structure and is a precursor to targeted data extraction. MITRE T1213, T1005."

  # === AUDIT: SQLite dot-command schema enumeration ===
  - id: "ne-audit-sqlite-schema-dotcmd"
    taxonomy: "reconnaissance/network-discovery/database-schema-enumeration"
    match:
      command_regex: "(?i)\\bsqlite3\\b.*[\"']?\\.(tables|schema|indexes|databases)[\"']?"
    decision: "AUDIT"
    confidence: 0.88
    reason: "sqlite3 dot-command schema enumeration (.tables, .schema, .indexes, .databases) lists all tables or the full DDL of a SQLite database. An AI agent running this may be mapping a local database for subsequent extraction. MITRE T1213."

  # === AUDIT: Schema-only database dumps ===
  - id: "ne-audit-db-schema-dump"
    taxonomy: "reconnaissance/network-discovery/database-schema-enumeration"
    match:
      command_regex: "(?i)\\b(mysqldump|pg_dump)\\b.*(--no-data|-s\\b|--schema-only)"
    decision: "AUDIT"
    confidence: 0.87
    reason: "Schema-only database dump (mysqldump --no-data or pg_dump -s/--schema-only) exports the full DDL without row data. This reveals table names, column types, and relationships — reconnaissance intelligence for follow-up extraction. MITRE T1213, T1560."

  # ═══════════════════════════════════════════════════════════════════
  # INTERNAL SERVICE PROBING VIA TERMINAL (closes #261)
  #
  # AI agents with shell access can probe internal services running on
  # localhost or private network ranges using standard HTTP/network tools.
  # This reveals management APIs, admin UIs, and sensitive endpoints that
  # are not exposed to the public internet.
  #
  # Threat model:
  #   1. Docker daemon probe: curl --unix-socket /var/run/docker.sock gives
  #      full container control — container escape and privilege escalation.
  #   2. Infrastructure port probe: Prometheus (9090), ngrok (4040), RabbitMQ
  #      management (15672), Elasticsearch (9200) expose unauthenticated metrics
  #      and admin APIs on localhost.
  #   3. Admin path probe: /actuator, /admin, /env, /metrics on localhost
  #      leak environment variables (including API keys) and internal state.
  #
  # MITRE T1046, T1590. OWASP LLM02, LLM04, LLM06.

  # === BLOCK: Docker daemon API via unix socket or HTTP ===
  - id: "ne-block-docker-daemon-probe"
    taxonomy: "reconnaissance/network-discovery/internal-service-probe"
    match:
      command_regex: "\\b(curl|wget)\\b.*(--unix-socket\\s+['\"]?/var/run/docker\\.sock|http://(localhost|127\\.0\\.0\\.1|::1):23(75|76)\\b)"
    decision: "BLOCK"
    confidence: 0.97
    reason: "Direct access to the Docker daemon API (via unix socket or HTTP port 2375/2376) grants full container control — container escape, volume mount of host filesystem, and privilege escalation. AI agents must not query the Docker daemon API directly. MITRE T1611, T1609."

  # === AUDIT: Known infrastructure management ports on localhost ===
  - id: "ne-audit-internal-infra-probe"
    taxonomy: "reconnaissance/network-discovery/internal-service-probe"
    match:
      command_regex: "\\b(curl|wget)\\b.*http://(localhost|127\\.0\\.0\\.1|::1):(9090|9091|9093|4040|15672|9200|8161|9600|2019)(\\b|/)"
    decision: "AUDIT"
    confidence: 0.88
    reason: "HTTP probe to a localhost infrastructure management port detected (Prometheus :9090, ngrok :4040, RabbitMQ management :15672, Elasticsearch :9200, etc.). These ports expose unauthenticated metrics and admin APIs. AI agents must not probe internal management services. MITRE T1046, T1590."

  # === AUDIT: Admin/management path probe on localhost ===
  - id: "ne-audit-localhost-admin-path"
    taxonomy: "reconnaissance/network-discovery/internal-service-probe"
    match:
      command_regex: "\\b(curl|wget)\\b.*http://(localhost|127\\.0\\.0\\.1|::1)(:\\d+)?/(admin|actuator|metrics|env|health|debug|management|api-docs|swagger|__admin|_cat|_cluster)(\\b|/)"
    decision: "AUDIT"
    confidence: 0.87
    reason: "HTTP request to a localhost admin or management endpoint detected (/admin, /actuator, /metrics, /env, /debug, etc.). Spring Boot /actuator/env leaks all environment variables including API keys. AI agents probing management paths may be performing reconnaissance before exfiltration. MITRE T1082, T1590."

  # ═══════════════════════════════════════════════════════════════════
  # WEBHOOK-BASED DATA EXFILTRATION (closes #211)
