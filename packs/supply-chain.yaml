    confidence: 0.85
    reason: "crane push/cp/tag directly manipulates OCI registry contents, bypassing Docker daemon content trust and image signing policies. An AI agent can replace or push production container images without standard build pipeline controls or signature verification. MITRE T1195.002, T1612."
