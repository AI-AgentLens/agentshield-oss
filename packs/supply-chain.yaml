  # substitution in registries that accept plain-HTTP.
  #
  # TP: oras push --plain-http myregistry.io/myartifact:latest ./payload
  # TP: oras copy --from-plain-http source.registry/image:tag dest.registry/app:prod
  # TN: oras push registry.example.com/artifact:1.0 ./app.wasm   (uses TLS)
  # TN: oras pull registry.example.com/artifact:1.0              (read-only pull)
  - id: "sc-audit-oras-plain-http-push"
    taxonomy: "supply-chain/build-pipeline/cicd-config-injection"
    match:
      command_regex: "\\boras\\b\\s+(push|copy)\\b.*--plain-http\\b"
    decision: "AUDIT"
    confidence: 0.87
    reason: "oras push/copy with --plain-http pushes OCI artifacts to a registry over unencrypted HTTP, bypassing TLS certificate validation. Enables substitution of production artifacts via man-in-the-middle or direct push to insecure registries without integrity guarantees. MITRE T1195.002."
    tests:
      tp:
        - "oras push --plain-http myregistry.io/myartifact:latest ./payload"
        - "oras copy --from-plain-http source.registry/image:tag dest.registry/app:prod"
      tn:
