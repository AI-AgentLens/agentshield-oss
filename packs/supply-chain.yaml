    decision: "BLOCK"
    confidence: 0.91
    reason: "Writing AI API endpoint env var to .env file — persisting endpoint override across sessions redirects all agent AI calls to attacker-controlled infrastructure (OWASP LLM08, MITRE T1565.001)."

