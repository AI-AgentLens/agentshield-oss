name: Secrets & PII Protection
description: Prevent credential exfiltration, accidental secret exposure, and PII leakage
version: 1.0.0
author: AgentShield Security Research
defaults:
  protected_paths:
  - ~/.ssh/**
  - ~/.aws/**
  - ~/.gnupg/**
  - ~/.config/gcloud/**
  - ~/.kube/**
  - ~/.docker/config.json
  - ~/.npmrc
  - ~/.pypirc
  - ~/.netrc
  - ~/.git-credentials
  - ~/.config/gh/**
  - ~/.vault-token
  - ~/.terraform.d/**
  - ~/.config/op/**
  - ~/.local/share/keyrings/**
  - ~/.config/github-copilot/**
  - ~/.config/age/**
  - ~/.age/**
  - ~/.cargo/credentials.toml
  - ~/.gem/credentials
  - ~/.m2/settings.xml
  - ~/.gradle/gradle.properties
rules:
- id: sec-block-ssh-private
  taxonomy: credential-exposure/private-key-access/ssh-private-key-read
  match:
    command_regex: \.(ssh|gnupg)/(id_[^.\s"']+([\s"']|$)|private|secret)
    command_regex_exclude: '{{DOC_CONTEXT}}'
  decision: BLOCK
  reason: Direct access to private key files is blocked. Excludes commands where the SSH path appears as a text payload in a named flag value (e.g. gh --body/--body-file, git commit -m), as a heredoc body
    in a cat file-write operation, as an echo/printf argument, or as a test input to agentshield mcp-eval. The gh/git --body exclusion covers large bodies with pipe characters that would otherwise break
    narrower patterns.
  tests:
    tp:
    - cat ~/.ssh/id_rsa
    - less ~/.ssh/id_ed25519
    tn:
    - git commit -m 'moved files from .ssh/id_rsa path'
- id: sec-block-etc-shadow
  taxonomy: credential-exposure/password-db-access/system-shadow-read
  match:
    command_regex: (/etc/shadow|/etc/master\.passwd)
    command_regex_exclude: '{{DOC_CONTEXT}}|^curl\s.*(?:-d\s+["'']|--data(?:-raw|-binary|-urlencode)?\s+["''])'
  decision: BLOCK
  reason: Access to system password database is blocked. Excludes commands where the path appears as a text payload in a named flag value (--body/--body-file/--message to gh/git, -m for git commit/tag,
    -d/--data to curl), as heredoc content written via cat, or as a test input to agentshield mcp-eval.
  tests:
    tp:
    - cat /etc/shadow
    - less /etc/master.passwd
    tn:
    - git commit -m 'reference /etc/shadow in docs'
    - 'cd ~/dev/project && gh issue create --repo org/repo --title ''rule-request'' --body "$(cat <<''EOF''

      Example: /etc/shadow is a sensitive path

      EOF

      )"'
- id: sec-block-keychain
  taxonomy: credential-exposure/password-db-access/keychain-extraction
  match:
    command_regex: (security\s+find-(generic|internet)-password|security\s+dump-keychain)
    command_regex_exclude: '{{DOC_CONTEXT}}'
  decision: BLOCK
  reason: macOS Keychain extraction is blocked. Excludes commands where the keychain invocation appears as documentation text in a --body/--message/--title flag or -m shortform passed to gh or git.
  tests:
    tp:
    - security find-generic-password -s 'login'
    - security dump-keychain login.keychain
    tn:
    - 'git commit -m ''docs: security find-generic-password usage'''
- id: sec-block-linux-secret-tool
  taxonomy: credential-exposure/password-manager/gnome-keyring-access
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?secret-tool\s+(lookup|search|store)
  decision: BLOCK
  confidence: 0.95
  reason: secret-tool accessing the freedesktop.org Secret Service (GNOME Keyring / KDE Wallet) — returns stored credentials in plaintext. A single lookup can expose cloud keys, database passwords, or API
    tokens without any user prompt. MITRE T1555.004.
  tests:
    tp:
    - secret-tool lookup service github.com
    - secret-tool search --all service github
    tn:
    - apt list --installed | grep secret-tool
- id: sec-block-linux-pass-show
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?pass\s+(show|\-c|\-\-clip|otp)
  decision: BLOCK
  confidence: 0.93
  reason: pass (Unix password store) decrypting and revealing/copying a stored password — GPG-encrypted at rest but decrypted to stdout/clipboard on 'show' or '-c'. 'generate' is excluded (creates new random
    entries, does not reveal existing secrets). MITRE T1555.004.
  tests:
    tp:
    - pass show cloud/aws-access-key
    - pass -c work/database-password
    tn:
    - pass generate work/new-password 32
- id: sec-block-linux-gopass-show
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?gopass\s+(show|otp|cat|\-c|\-\-clip)
  decision: BLOCK
  confidence: 0.93
  reason: gopass decrypting and revealing a stored password — pass-compatible enhanced credential store. 'show', 'cat', and '-c' expose plaintext secrets. MITRE T1555.004.
  tests:
    tp:
    - gopass show -o work/database-password
    - gopass cat work/api-key
    tn:
    - gopass generate work/new-password 32
- id: sec-block-linux-keepassxc-cli
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?keepassxc-cli\s+(show|clip|totp|export|extract|attachment-export)
  decision: BLOCK
  confidence: 0.95
  reason: keepassxc-cli extracting credentials from a KeePassXC database — 'show' reveals passwords, 'clip' copies to clipboard, 'totp' generates 2FA codes, 'export' dumps the entire database. MITRE T1555.004.
  tests:
    tp:
    - keepassxc-cli show ~/Passwords.kdbx github -s
    - keepassxc-cli export ~/Passwords.kdbx
    tn:
    - keepassxc-cli ls ~/Passwords.kdbx
- id: sec-block-keepassxc-db-read
  taxonomy: credential-exposure/password-manager/keepassxc-config-access
  match:
    command_regex: (cat|less|more|head|tail|bat|strings|xxd|hexdump|cp|mv|scp|rsync|base64)\s+.*\.kdbx\b
    command_regex_exclude: --exclude[= ]["']?\*?\.kdbx["']?
  decision: BLOCK
  confidence: 0.95
  reason: Direct access to a KeePassXC database file (.kdbx) — even encrypted, exfiltration enables offline brute-force of all stored passwords. AI agents have no legitimate reason to read or copy password
    database files. Excludes rsync --exclude='*.kdbx' which protects against copying kdbx files. MITRE T1555.004, CWE-312.
  tests:
    tp:
    - cat ~/Passwords.kdbx
    - cp ~/Passwords.kdbx /tmp/steal.kdbx
    tn:
    - rsync --exclude='*.kdbx' ~/docs/ /backup/
- id: sec-block-keepassxc-config-read
  taxonomy: credential-exposure/password-manager/keepassxc-config-access
  match:
    command_regex: (cat|less|more|head|tail|bat|cp|mv)\s+.*\.config/keepassxc/
  decision: BLOCK
  confidence: 0.9
  reason: Reading ~/.config/keepassxc/ reveals database file paths, keyfile locations, and security settings — reconnaissance for a targeted KeePassXC credential theft attack. MITRE T1555.004, T1083.
  tests:
    tp:
    - cat ~/.config/keepassxc/keepassxc.ini
    - less ~/.config/keepassxc/keepassxc.ini
    tn:
    - ls ~/.config/
- id: sec-block-pass-store-direct
  taxonomy: credential-exposure/password-manager/pass-store-credential-access
  match:
    command_regex: (cat|less|more|head|tail|bat|find|ls|cp|mv|rsync|scp|tar|zip|base64)\s+.*\.password-store(/|\s|$)
  decision: BLOCK
  confidence: 0.93
  reason: Direct access to ~/.password-store/ bypasses the pass CLI — exfiltrating GPG-encrypted credential files enables offline decryption. Directory listing also leaks credential names and organizational
    structure. MITRE T1552.001, T1083, CWE-312.
  tests:
    tp:
    - cat ~/.password-store/cloud/aws.gpg
    - tar czf /tmp/store.tar.gz ~/.password-store/
    tn:
    - pass show cloud/aws
- id: sec-block-keyctl-read
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?keyctl\s+(read|print|pipe)\b
  decision: BLOCK
  confidence: 0.95
  reason: keyctl read/print/pipe extracts the raw payload of a kernel keyring key to stdout — can expose cached SSH passphrases, LUKS disk encryption keys, Kerberos TGTs, and PAM authentication tokens without
    touching any file on disk. MITRE T1552.004, T1003, CWE-522.
  tests:
    tp:
    - keyctl read 12345
    - keyctl print 67890
    tn:
    - keyctl request user mykey
- id: sec-block-keyctl-setperm
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?keyctl\s+setperm\s+\S+\s+0x[0-9a-fA-F]
  decision: BLOCK
  confidence: 0.9
  reason: keyctl setperm grants arbitrary permission flags on a kernel keyring key — can make a private key world-readable, enabling any process to extract its payload. Privilege escalation via keyring
    permission weakening. MITRE T1548, CWE-732.
  tests:
    tp:
    - keyctl setperm 12345 0x3f3f3f3f
    - sudo keyctl setperm 99 0x3f3f0000
    tn:
    - keyctl describe 12345
- id: sec-block-keyctl-destroy
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?keyctl\s+(clear|revoke|unlink)\s+
  decision: BLOCK
  confidence: 0.88
  reason: keyctl clear/revoke/unlink deletes keys or clears keyring contents — can destroy session authentication tokens, disk encryption keys, or Kerberos tickets, causing service disruption and locking
    users out. MITRE T1531, CWE-522.
  tests:
    tp:
    - keyctl clear @s
    - keyctl revoke 12345
    tn:
    - keyctl show @s
- id: sec-block-keyctl-session-hijack
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?keyctl\s+session\s+-\s+
  decision: BLOCK
  confidence: 0.95
  reason: keyctl session - <cmd> runs a command joined to a new anonymous session keyring, but can also be used to attach to and enumerate another session's keyring inheritance. Combined with show/read
    subcommands, enables lateral credential access. MITRE T1563, CWE-522.
  tests:
    tp:
    - keyctl session - keyctl show
    - sudo keyctl session - bash
    tn:
    - keyctl session myname
- id: sec-audit-keyctl-show
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?keyctl\s+(show|list|describe|get_keyring_ID)\b
  decision: AUDIT
  confidence: 0.8
  reason: keyctl show/list/describe enumerates keys in the kernel keyring — reveals cached credentials, session tokens, and disk encryption keys held in memory. Reconnaissance step before targeted extraction.
    MITRE T1552.004.
  tests:
    tp:
    - keyctl show @s
    - keyctl list @u
    tn:
    - keyctl request user mykey
- id: sec-audit-linux-pass-list
  taxonomy: credential-exposure/password-db-access/linux-credential-store-extraction
  match:
    command_regex: (^|&&|;|\|\s*)(pass|gopass)\s+(ls|list|find|search|grep)\b
  decision: AUDIT
  confidence: 0.7
  reason: pass/gopass listing or searching entries — reveals credential names/paths (metadata) but does not decrypt. Auditing for visibility. MITRE T1555.004.
  tests:
    tp:
    - pass ls
    - gopass list
    tn:
    - pass init mykey
- id: sec-block-1password-op-get
  taxonomy: credential-exposure/password-manager/1password-cli-credential-access
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?op\s+(item\s+get|read|export|signin|account\s+get)\b
  decision: BLOCK
  confidence: 0.93
  reason: 1Password CLI (op) credential extraction — 'op item get' and 'op read' return plaintext secrets from 1Password vaults; 'op export' dumps all vault data. No AI agent workflow requires direct 1Password
    credential extraction. MITRE T1555.004.
  tests:
    tp:
    - op item get 'GitHub PAT' --fields password
    - op read op://vault/item/password
    tn:
    - op whoami
- id: sec-audit-1password-op-list
  taxonomy: credential-exposure/password-manager/1password-cli-credential-access
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?op\s+(item\s+list|vault\s+list|run\b)
  decision: AUDIT
  confidence: 0.7
  reason: 1Password CLI listing or secret injection (op run) — listing enumerates vault contents (reconnaissance); 'op run' injects secrets into subprocess environment which may be captured. MITRE T1555.004.
  tests:
    tp:
    - op item list
    - op run -- node server.js
    tn:
    - op whoami
- id: sec-block-bitwarden-bw-get
  taxonomy: credential-exposure/password-manager/bitwarden-cli-credential-access
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?bw\s+(get\s+(password|username|item|notes|totp)|export|unlock|login)\b
  decision: BLOCK
  confidence: 0.93
  reason: Bitwarden CLI (bw) credential extraction — 'bw get password/item' decrypts and returns plaintext credentials; 'bw export' dumps the entire vault; 'bw unlock' prints the session key to stdout enabling
    further extraction. MITRE T1555.004.
  tests:
    tp:
    - bw get password 'AWS Root'
    - bw export --format json
    tn:
    - bw status
- id: sec-audit-bitwarden-bw-list
  taxonomy: credential-exposure/password-manager/bitwarden-cli-credential-access
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?bw\s+list\s+(items|collections|folders|organizations)\b
  decision: AUDIT
  confidence: 0.7
  reason: Bitwarden CLI listing vault contents — reveals credential names and metadata without decrypting, enabling targeted extraction in subsequent commands. MITRE T1555.004.
  tests:
    tp:
    - bw list items
    - bw list folders
    tn:
    - bw status
- id: sec-block-infisical-secrets-get
  taxonomy: credential-exposure/password-db-access/enterprise-secrets-manager-cli
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?infisical\s+(secrets\s+(get|download|export)|export|login)\b
  decision: BLOCK
  confidence: 0.92
  reason: Infisical CLI secret extraction — 'infisical secrets get/export' dumps plaintext secrets from Infisical projects; 'infisical export' emits all secrets in dotenv/json format. MITRE T1555.004.
  tests:
    tp:
    - infisical secrets get DATABASE_PASSWORD
    - infisical export --format=json
    tn:
    - infisical init
- id: sec-audit-infisical-run
  taxonomy: credential-exposure/password-db-access/enterprise-secrets-manager-cli
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?infisical\s+run\b
  decision: AUDIT
  confidence: 0.7
  reason: Infisical run injects project secrets into a subprocess environment — legitimate for running apps with secrets, but combined with env/printenv dumps all injected credentials. MITRE T1555.004.
  tests:
    tp:
    - infisical run -- node server.js
    - infisical run -- env
    tn:
    - infisical init
- id: sec-block-doppler-secrets
  taxonomy: credential-exposure/password-db-access/enterprise-secrets-manager-cli
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?doppler\s+(secrets\s+(download|get)|configure)\b
  decision: BLOCK
  confidence: 0.92
  reason: Doppler CLI secret extraction — 'doppler secrets download' dumps all project secrets to stdout or a file; 'doppler secrets get' returns a specific plaintext secret value. MITRE T1555.004.
  tests:
    tp:
    - doppler secrets download --format env
    - doppler secrets get DATABASE_PASSWORD
    tn:
    - doppler setup
- id: sec-audit-doppler-run
  taxonomy: credential-exposure/password-db-access/enterprise-secrets-manager-cli
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?doppler\s+run\b
  decision: AUDIT
  confidence: 0.7
  reason: Doppler run injects project secrets into a subprocess environment — combined with env/printenv exposes all injected secrets. MITRE T1555.004.
  tests:
    tp:
    - doppler run -- node server.js
    - doppler run -- env
    tn:
    - doppler setup
- id: sec-block-sops-decrypt
  taxonomy: credential-exposure/password-db-access/enterprise-secrets-manager-cli
  match:
    command_regex: (^|&&|;|\|\s*)(sudo\s+)?sops\s+(--decrypt|-d|--extract|exec-env|exec-file)\b
  decision: BLOCK
  confidence: 0.93
  reason: Mozilla SOPS decryption — 'sops --decrypt' outputs the full plaintext of an encrypted secrets file (YAML, JSON, .env, INI); 'sops exec-env' injects all decrypted secrets into a subprocess environment.
    MITRE T1555.001, T1552.001.
  tests:
    tp:
    - sops --decrypt secrets.enc.yaml
    - sops exec-env secrets.enc.yaml 'env'
    tn:
    - sops --encrypt secrets.yaml
- id: sec-block-chrome-login-db
  taxonomy: credential-exposure/password-db-access/browser-credential-theft
  match:
    command_regex: (Google/Chrome|google-chrome|chromium|BraveSoftware/Brave-Browser|Microsoft[ .]Edge|Chromium)/(Default|Profile [0-9]+)/(Login|Cookies|Web[ .]Data)
  decision: BLOCK
  reason: Access to Chrome/Chromium browser credential and cookie databases is blocked (MITRE T1555.003).
  tests:
    tp:
    - cat ~/Library/Application Support/Google/Chrome/Default/Login Data
    - cp ~/snap/chromium/common/chromium/Default/Cookies /tmp/
    tn:
    - google-chrome --version
- id: sec-block-firefox-login-db
  taxonomy: credential-exposure/password-db-access/browser-credential-theft
  match:
    command_regex: (\.mozilla/firefox|Firefox/Profiles)/[^/]*/(key4\.db|logins\.json|cookies\.sqlite)
  decision: BLOCK
  reason: Access to Firefox credential database files is blocked (MITRE T1555.003).
  tests:
    tp:
    - cat ~/.mozilla/firefox/abc123.default/key4.db
    - cp ~/.mozilla/firefox/abc123.default/logins.json /tmp/
    tn:
    - firefox --version
- id: sec-block-base64-sensitive
  taxonomy: data-exfiltration/encoded-exfil/base64-credential-encode
  match:
    command_regex: base64.*\.(ssh|aws|gnupg|kube|docker)
    command_regex_exclude: \bbase64\s+(-d|--decode)\b
  decision: BLOCK
  reason: Base64 encoding of credential files is a common exfiltration technique. Excludes base64 -d/--decode (decode operations are not exfiltration — e.g. deploying a public key via 'echo $PUBKEY | base64
    -d > ~/.ssh/authorized_keys').
  tests:
    tp:
    - base64 ~/.ssh/id_rsa.pub
    - base64 ~/.aws/credentials
    tn:
    - base64 -d encoded.txt
- id: sec-block-xxd-sensitive
  taxonomy: data-exfiltration/encoded-exfil/hex-dump-sensitive
  match:
    command_regex: ^(sudo\s+)?(xxd|od|hexdump)\b.*\.(ssh|aws|gnupg)
  decision: BLOCK
  reason: Hex dumping credential files is a potential exfiltration technique.
  tests:
    tp:
    - xxd ~/.ssh/id_rsa.key
    - hexdump ~/.aws/credentials
    tn:
    - xxd firmware.bin
- id: sec-block-scripting-lang-credential-encode
  taxonomy: data-exfiltration/encoded-exfil/base64-credential-encode
  match:
    command_regex: (python[23]?|perl|ruby|node(js)?)\b.*((b64encode|encode_base64|encodebytes|base64)\b.*(\.(ssh|aws|gnupg|kube|docker))|(\.(ssh|aws|gnupg|kube|docker)).*(b64encode|encode_base64|encodebytes|base64)\b)
  decision: BLOCK
  reason: Scripting-language inline base64 encoding of credential files is an evasion technique used when the base64 binary is restricted. MITRE T1027.
  confidence: 0.93
  tests:
    tp:
    - python3 -c 'import base64; base64.b64encode(open(".ssh/id_rsa","rb").read())'
    - ruby -e 'require "base64"; puts Base64.encode_base64(File.read(".aws/credentials"))'
    tn:
    - python3 -c 'import base64; base64.b64encode(b"hello")'
- id: sec-block-openssl-credential-encode
  taxonomy: data-exfiltration/encoded-exfil/base64-credential-encode
  match:
    command_regex: openssl\b.*(-base64|base64\b).*(\.(ssh|aws|gnupg|kube|docker))|openssl\b.*(\.(ssh|aws|gnupg|kube|docker)).*(-base64|base64\b)
  decision: BLOCK
  reason: openssl enc -base64 / openssl base64 on credential files encodes private keys or cloud credentials for exfiltration. MITRE T1027.
  confidence: 0.93
  tests:
    tp:
    - openssl base64 -in ~/.ssh/id_rsa.key
    - openssl enc -base64 -in ~/.aws/credentials
    tn:
    - openssl base64 -in data.bin
- id: sec-block-history-grep-password
  taxonomy: credential-exposure/history-mining/history-credential-grep
  match:
    command_regex: (\bhistory\b\s*\d*\s*\|[^|]*grep|cat\s+\S*_history\S*\s*\|[^|]*grep).*(password|secret|token|key|api)\b
  decision: BLOCK
  reason: Searching shell history for credentials is suspicious.
  tests:
    tp:
    - history | grep password
    - cat ~/.bash_history | grep token
    tn:
    - history 10
- id: sec-block-git-pickaxe-mining
  taxonomy: credential-exposure/history-mining/git-history-secret-mining
  match:
    command_regex: git\s+log\b.*\s-[SG]\s*['"]?(password|secret|token|api[_.]?key|credential|aws_secret|private[_.]?key|OPENAI|ANTHROPIC|STRIPE|GITHUB_TOKEN)['"]?
  decision: BLOCK
  confidence: 0.95
  reason: git pickaxe search (-S/-G) finds every commit that added or removed a string — purpose-built for mining secrets from git history. MITRE T1552.001.
  tests:
    tp:
    - git log -S 'OPENAI_API_KEY' --all
    - git log -G 'password' --all
    tn:
    - git log --oneline -10
- id: sec-audit-git-log-all-env
  taxonomy: credential-exposure/history-mining/git-history-secret-mining
  match:
    command_regex: git\s+log\b.*(--all|--branches|--remotes|--glob).*(-p|--patch|--follow|--diff-filter).*\.(env|pem|key|pfx|p12|pkcs12|crt|credentials|netrc)
  decision: AUDIT
  confidence: 0.88
  reason: git log --all with full diffs on sensitive file extensions traverses history for credential files — audit to detect accidental secret recovery attempts. MITRE T1552.001.
  tests:
    tp:
    - git log --all -p --follow -- secrets.env
    - git log --all --patch --diff-filter=D -- config.pem
    tn:
    - git log --all --oneline -- README.md
- id: sec-audit-env-dump
  taxonomy: credential-exposure/secret-env-exposure/env-dump
  match:
    command_prefix:
    - env
    - printenv
    - set
  decision: AUDIT
  reason: Environment dump may expose secrets (API keys, tokens, passwords).
  tests:
    tp:
    - env
    - printenv
    tn:
    - echo hello
- id: sec-audit-env-grep-secret
  taxonomy: credential-exposure/secret-env-exposure/env-dump
  match:
    command_regex: (env|printenv|echo\s+\$).*(_KEY|_SECRET|_TOKEN|_PASSWORD|_CREDENTIAL|API_KEY)
  decision: AUDIT
  reason: Targeted access to secret environment variables flagged for review.
  tests:
    tp:
    - printenv AWS_SECRET_ACCESS_KEY
    - echo $OPENAI_API_KEY
    tn:
    - echo $HOME
- id: sec-audit-docker-inspect-env
  taxonomy: credential-exposure/secret-env-exposure/env-dump
  match:
    command_regex: \bdocker\b.*\binspect\b
    command_regex_exclude: \bdocker\s+(network|volume|image|config|service|stack|plugin|manifest|buildx|compose|context|trust)\s+inspect\b
  decision: AUDIT
  confidence: 0.8
  reason: docker inspect exposes the full container configuration including environment variables — API keys, database passwords, and cloud credentials stored in container env vars are disclosed. Cross-container
    credential access crosses the isolation boundary. Excludes non-container inspect subcommands (network, volume, image, etc.) which have no env var exposure risk (MITRE T1552.007, OWASP LLM02).
  tests:
    tp:
    - docker inspect myapp
