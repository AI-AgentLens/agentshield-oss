            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.pyenv/versions/[^/]+/lib/python[0-9.]+/site-packages/.+"
            - "^~/\\.pyenv/versions/[^/]+/lib/python[0-9.]+/site-packages/.+"
