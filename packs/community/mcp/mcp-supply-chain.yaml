  # === BLOCK: Terraform state backend write (S3/GCS/Azure) ===
  # Remote Terraform backends store state at well-known paths ending in .tfstate.
  # HTTP PUT to these paths from MCP tools enables state tampering — modifying the
  # state causes Terraform to believe resources are in a different configuration,
  # potentially destroying or recreating infrastructure on the next apply.
  - id: mcp-sc-block-terraform-backend-state-write
    taxonomy: "supply-chain/config-tampering/iac-state-manipulation"
    match:
      tool_name_any:
        - "http_request"
        - "network_request"
        - "make_request"
        - "send_request"
        - "api_request"
        - "post_request"
        - "put_request"
        - "http_get"
        - "http_post"
        - "http_put"
        - "http_delete"
        - "http_patch"
      args_match:
        url:
          pattern_any:
            - "(?i)\\.tfstate(\\?|$)"
            - "(?i)\\.tfstate\\.backup(\\?|$)"
            - "(?i)s3\\.amazonaws\\.com/[^?]*\\.tfstate"
            - "(?i)storage\\.googleapis\\.com/[^?]*\\.tfstate"
            - "(?i)blob\\.core\\.windows\\.net/[^?]*\\.tfstate"
        method:
          pattern_any:
            - "(?i)^(PUT|POST|DELETE)$"
    decision: "BLOCK"
    confidence: 0.93
    reason: "MCP HTTP PUT/POST/DELETE to a Terraform state backend path — writing to .tfstate on S3, GCS, or Azure Blob tampers with infrastructure state, causing Terraform to misidentify existing resources and potentially destroying or recreating them on next apply. MITRE T1578, T1485."
    tests:
      tp:
        - tool: "http_request"
          args: {"url": "https://my-bucket.s3.amazonaws.com/prod/terraform.tfstate", "method": "PUT"}
        - tool: "put_request"
          args: {"url": "https://storage.googleapis.com/my-tf-bucket/env/prod.tfstate", "method": "PUT"}
        - tool: "http_request"
          args: {"url": "https://myaccount.blob.core.windows.net/tfstate/terraform.tfstate", "method": "PUT"}
        # Regression for #1152: typed tools without method arg.
        - tool: "http_put"
          args: {"url": "https://my-bucket.s3.amazonaws.com/prod/terraform.tfstate"}
        - tool: "http_delete"
          args: {"url": "https://storage.googleapis.com/my-tf-bucket/env/prod.tfstate"}
        - tool: "put_request"
          args: {"url": "https://myaccount.blob.core.windows.net/tfstate/terraform.tfstate"}
      tn:
