  #   - Injecting adversarial responses into /tmp/llm_cache/ for transient deployments
  #
  # Protected paths:
  #   ~/.cache/gptcache/**    — GPTCache default data directory
  #   *.langchain.db          — LangChain SQLiteCache database files
  #   /tmp/gptcache/**        — GPTCache temporary deployments
  #   /tmp/llm_cache/**       — Generic LLM cache directories
  #   **/llm_cache/**         — Project-level LLM cache dirs
  #   **/langchain_cache/**   — LangChain cache directories
  #
  # Decision: AUDIT (not BLOCK) — some agent workflows legitimately seed or
  # migrate LLM caches. Human review is warranted to detect poisoning.
  #
  # OWASP LLM04 — Data and Model Poisoning, LLM03
  # MITRE AML.T0010 — Poison Training Data
