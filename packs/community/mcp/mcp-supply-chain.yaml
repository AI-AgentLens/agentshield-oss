  #
  # LLM semantic caches store query→response mappings to reduce API latency.
  # An AI agent using an MCP write_file tool to overwrite these cache files
  # bypasses shell-level detection entirely — no terminal command is issued.
  #
  # Attack patterns enabled by undetected MCP cache writes:
  #   - Overwriting a GPTCache response blob with an attacker-controlled answer
