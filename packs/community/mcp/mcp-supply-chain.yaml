        - tool: "edit_file"
          args: {"path": "/root/.npm/node_modules/.bin/create-react-app"}
        - tool: "write_file"
          args: {"path": "/home/user/.nvm/versions/node/v18.0.0/lib/node_modules/axios/index.js"}
        - tool: "str_replace_editor"
