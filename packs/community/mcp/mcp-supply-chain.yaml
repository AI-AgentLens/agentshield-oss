            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.npm-global/lib/node_modules/.+"
            - "^~/\\.npm-global/lib/node_modules/.+"
            # npm lib/node_modules: when prefix is set to ~/.npm (npm config set prefix ~/.npm)
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.npm/lib/node_modules/.+"
            - "^~/\\.npm/lib/node_modules/.+"
            # npm v9+ XDG global store: ~/.config/npm/node_modules
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.config/npm/node_modules/.+"
            - "^~/\\.config/npm/node_modules/.+"
    decision: "BLOCK"
    confidence: 0.95
    reason: "MCP write to npm/npx global or nvm-managed node_modules — modifying installed package source code injects malicious code that executes on every require/import, enabling persistent code execution without any shell trace. Covers ~/.npm cache, nvm-managed installations, ~/.npm-global prefix, ~/.npm/lib (custom prefix), and ~/.config/npm (npm v9+ XDG store). MITRE T1195.001, T1565.001."
    tests:
