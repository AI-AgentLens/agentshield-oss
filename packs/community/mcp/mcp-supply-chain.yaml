        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            # User-installed packages: ~/.local/lib/python*/site-packages/**
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.local/lib/python[0-9.]+/site-packages/.+"
            - "^~/\\.local/lib/python[0-9.]+/site-packages/.+"
