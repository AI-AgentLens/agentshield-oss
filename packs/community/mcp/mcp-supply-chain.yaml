          pattern_any:
            # npm npx execution cache
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.npm/_npx/.+"
            - "^~/\\.npm/_npx/.+"
            # npm global node_modules cache
            - "(?:/home/[^/]+|/root|/Users/[^/]+)/\\.npm/node_modules/.+"
            - "^~/\\.npm/node_modules/.+"
