    taxonomy: "supply-chain/model-poisoning/semantic-cache-poisoning"
    match:
      tool_name_any:
        - "write_file"
        - "create_file"
        - "edit_file"
        - "write_to_file"
        - "save_file"
        - "update_file"
        - "append_file"
        - "filesystem_write"
        - "str_replace_editor"
        - "str_replace_based_edit_tool"
      args_match:
        path:
          pattern_any:
            - "(?:^|/)(?:\\.cache/)?gptcache/"
            - "\\.langchain\\.db$"
            - "(?:^|/)/tmp/gptcache/"
            - "(?:^|/)/tmp/llm[_-]cache/"
            - "(?:^|/)llm[_-]cache/"
            - "(?:^|/)langchain[_-]cache/"
    decision: "AUDIT"
    reason: "MCP write to an LLM semantic cache path (GPTCache data dir, LangChain SQLite DB, or /tmp/llm_cache/) — overwriting cached response files via MCP bypasses shell-level detection and can poison future LLM query responses. OWASP LLM04, MITRE AML.T0010."
