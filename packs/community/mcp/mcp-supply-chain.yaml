  #   ~/.npm/node_modules/** — npm global node_modules cache
  #
  # Note: Read access to ~/.npmrc (auth tokens) is already blocked by mcp-sec-block-package-manager-creds.
  # This rule specifically targets write access to the npm package cache itself.
  #
  # TN: Writing to a project's node_modules (within a project directory) is a normal
  # development workflow. Only the user-level ~/.npm cache is blocked here.
