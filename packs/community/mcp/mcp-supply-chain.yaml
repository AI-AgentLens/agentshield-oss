    tests:
      tp:
        - tool: "write_file"
          args: {"path": "/home/user/.cache/gptcache/responses.db"}
        - tool: "edit_file"
          args: {"path": "/project/cache.langchain.db"}
      tn:
        - tool: "write_file"
          args: {"path": "/project/src/cache_utils.py"}

