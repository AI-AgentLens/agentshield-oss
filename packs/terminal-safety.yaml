  # ===========================================================================
  # Clipboard Hijack / Pastejacking (BLOCK)
  # ===========================================================================
  # An AI agent can write arbitrary content to the system clipboard using
  # standard OS clipboard utilities. When the user pastes, the malicious
  # payload executes in their shell — completely bypassing AgentShield because
  # the command runs outside the agent context. This is a high-impact privilege
  # escalation: the agent escapes its sandboxed evaluation by weaponizing the
  # user's own paste action.
  #
  # Affected utilities:
  #   pbcopy   — macOS stdin-to-clipboard (write-only binary)
  #   wl-copy  — Wayland clipboard write utility
  #   clip / clip.exe — Windows/WSL clipboard write
  #   xclip    — X11 clipboard: write mode by default (read requires -o/--out)
  #   xsel     — X11 clipboard: write mode when -i/--input or -a/--append used
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/clipboard-hijack-pastejacking
  # OWASP LLM06 — Excessive Agency, LLM01 — Prompt Injection
  # MITRE T1204.002 — Malicious File, T1059 — Command and Scripting Interpreter
