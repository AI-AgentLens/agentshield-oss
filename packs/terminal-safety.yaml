  #
  # An AI agent can mine these logs for credentials, API keys, and
  # operational intelligence:
  #
  #   journalctl -u sshd --no-pager -o json | grep password
  #   journalctl --user -o json-pretty   (user session secrets)
  #   journalctl -b -o export            (full boot log in machine format)
  #
  # coredumpctl is even more dangerous — it retrieves core dumps from
  # crashed processes, which contain the full memory image:
  #
  #   coredumpctl dump sshd -o /tmp/sshd.core
  #   coredumpctl dump -o /tmp/dump && strings /tmp/dump | grep -i key
