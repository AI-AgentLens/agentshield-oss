    reason: "setarch with -Z/--mmap-page-zero allows mapping page zero — enables exploitation of null pointer dereference vulnerabilities by placing controlled data at address 0. CWE-476."
    tests:
      tp:
        - "setarch x86_64 -Z ./exploit"
        - "setarch linux64 --mmap-page-zero ./target"
      tn:
