      command_regex: "(?:^|[\\s|;&])(sudo\\s+)?chattr\\s+(-[a-zA-Z]*i[a-zA-Z]*|-i)\\s+(-[a-zA-Z]+\\s+)*(/etc/|/usr/|/var/|/boot/|/root/|/bin/|/sbin/|/lib)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "chattr -i removes the immutable flag from a system file, enabling modification of critical paths such as /etc/passwd, /etc/sudoers, or /etc/shadow. This is a prerequisite for privilege escalation attacks that need to write to otherwise-hardened system files. (MITRE T1222.002, T1548; CWE-269; OWASP LLM06)"
    tests:
