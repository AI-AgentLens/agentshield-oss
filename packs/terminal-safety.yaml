  - id: "ts-block-fallocate-large"
    taxonomy: "destructive-ops/resource-exhaustion/disk-fill"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?fallocate\\s+.*-l\\s*[0-9]+[GT]"
    decision: "BLOCK"
    confidence: 0.93
    reason: "fallocate creating a file >=1GB — instantly allocates disk space without I/O. Can fill disk in milliseconds, causing database corruption, logging failure, and system instability. MITRE T1499.001."
    tests:
      tp:
        - "fallocate -l 100G /tmp/fill"
        - "sudo fallocate -l 1T /var/bigfile"
      tn:
        - "fallocate -l 100M /tmp/swap"

  # --- BLOCK: truncate creating very large sparse files ---
  - id: "ts-block-truncate-large"
    taxonomy: "destructive-ops/resource-exhaustion/disk-fill"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?truncate\\s+.*-s\\s*[0-9]+[GT]"
    decision: "BLOCK"
    confidence: 0.93
    reason: "truncate creating a sparse file >=1GB — even sparse files consume inode metadata and can cause df to report full disk, breaking applications that check available space. MITRE T1499.001."
