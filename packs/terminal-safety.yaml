  # namespace manipulation, mount operations, or special capabilities.
  # Requires only read access to /proc, which is typically available.
  #
  # Similarly, /proc/<PID>/cwd resolves to the process's working directory,
  # which for host processes reveals host filesystem paths.
  #
  # Taxonomy: privilege-escalation/container-escape/procfs-traversal
  # OWASP LLM06 (Excessive Agency)
