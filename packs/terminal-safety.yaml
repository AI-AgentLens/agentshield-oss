  # PROCESS SUBSTITUTION FOR COVERT DATA ACCESS
  # Taxonomy: credential-exposure/file-access/process-substitution-bypass
  # OWASP LLM06 — Excessive Agency; MITRE T1003, T1005
  # ===================================================================
  #
