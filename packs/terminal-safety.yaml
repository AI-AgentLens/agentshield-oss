    decision: "BLOCK"
    confidence: 0.95
    reason: "echo -e with hex escape sequences piped to a shell — decodes hex bytes and executes the result as a command. MITRE T1027.004."

  # --- BLOCK: eval wrapping printf with hex escapes ---
  - id: "ts-block-printf-hex-eval"
    taxonomy: "unauthorized-execution/remote-code-exec/printf-command-construction"
    match:
