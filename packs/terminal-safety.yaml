  # ── AI-to-AI Privilege Escalation ────────────────────────────────────────────
  #
  # Taxonomy: governance-risk/ai-governance-gap/ai-uncontrolled-invocations
  # OWASP LLM06 — Excessive Agency
  # CWE-269 — Improper Privilege Management, CWE-285 — Improper Authorization
  # EU AI Act Art.14; NIST AI RMF GOVERN-6, MANAGE-4
  #
  # Multi-agent patterns where a sub-agent is granted MORE permissions than
  # the parent agent holds, or where the entire parent permission set is
  # blindly inherited/expanded. These patterns allow privilege escalation
  # through the agent graph — a compromised or prompt-injected orchestrator
  # can spin up a sub-agent with admin rights it should never have.
  #
  # Examples:
  #   python3 -c "sub_agent.run(task, permissions=parent.permissions + ['admin'])"
  #   python3 -c "agent.delegate(subtask, permissions=['*'])"
  #   python3 -c "child.invoke(action, inherit_all=True, extra_perms=['root'])"
  - id: "ts-audit-ai-privilege-escalation"
    taxonomy: "governance-risk/ai-governance-gap/ai-uncontrolled-invocations"
    match:
      command_regex: "(?i)(permissions\\s*=\\s*[a-zA-Z_.]+\\.permissions\\s*\\+|permissions\\s*=\\s*\\[\\s*['\"]\\*['\"]|inherit[_-]?all\\s*=\\s*(true|1|yes)|extra[_-]?perms\\s*=|grant[_-]?all\\s*=\\s*(true|1|yes))"
    decision: "AUDIT"
    confidence: 0.86
    reason: "Sub-agent granted expanded permissions beyond the parent agent's scope (permissions=parent.permissions+['admin'], permissions=['*'], inherit_all=True). Capability amplification through agent delegation enables privilege escalation within multi-agent systems — violates the least-privilege principle and NIST AI RMF GOVERN-6 requirements for bounded agent delegation (OWASP LLM06, CWE-269, EU AI Act Art.14)."
    tests:
      tp:
        - 'python3 -c \"sub_agent.run(task, permissions=parent.permissions + [''admin''])\"'
        - 'python3 -c \"agent.delegate(subtask, permissions=[''*''])\"'
      tn:
        - 'python3 -c \"agent.run(task, permissions=[''read''])\"'

