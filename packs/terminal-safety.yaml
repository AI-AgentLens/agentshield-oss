  # every subsequent git operation — a stealthy, developer-triggered
  # persistence mechanism that survives repository updates.
  #
  # MITRE ATT&CK: T1546 (Event Triggered Execution)
  # Related: T1059.004 (Unix Shell), T1546.004 (Git Hooks)
  # ═══════════════════════════════════════════════════════════════════

