  # ===================================================================
  # Symlink attacks targeting sensitive files (TOCTOU)
  # ===================================================================
  #
  # Creating a symlink from a sensitive file to an innocuous-looking path
  # is a classic TOCTOU (time-of-check-time-of-use) attack. The AI agent
  # first creates the symlink, then reads the target through the link —
  # each operation looks innocent in isolation, but together they bypass
  # path-based access controls.
  #
  # Attack patterns:
  #   ln -s ~/.ssh/id_rsa /tmp/data.txt && cat /tmp/data.txt
  #   ln -sf /etc/shadow ~/project/output.log
  #   ln -s /root/.aws/credentials ./config.bak
  #
  # Also catches symlink attacks that redirect writes:
  #   ln -sf /etc/sudoers /tmp/config && echo "ALL ALL=(ALL) NOPASSWD:ALL" > /tmp/config
  #
  # Taxonomy: persistence-evasion/anti-forensics/symlink-attack
  # OWASP LLM06 (Excessive Agency)
  # MITRE T1547.009 — Boot or Logon Autostart Execution: Shortcut Modification
  # CWE-367 — Time-of-check Time-of-use (TOCTOU) Race Condition

  # --- BLOCK: Symlink creation targeting credential files ---
  - id: "ts-block-symlink-credential-files"
    taxonomy: "credential-exposure/file-access/credential-file-read"
    match:
      command_regex: "ln\\s+(-[a-zA-Z]*s[a-zA-Z]*\\s+|--symbolic\\s+)(~|\\$HOME|/home/|/root/|/etc/)\\S*(\\.ssh|\\.aws|\\.gnupg|\\.kube|shadow|passwd|credentials|id_rsa|id_ed25519|known_hosts|authorized_keys|token|secret)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Creating a symlink to a credential or sensitive authentication file — classic TOCTOU attack that bypasses path-based access controls by reading the file through an innocuous-looking link. CWE-367, MITRE T1547.009."
    tests:
      tp:
        - "ln -s ~/.ssh/id_rsa /tmp/data.txt"
        - "ln -sf /etc/shadow ~/project/output.log"
      tn:
        - "ln -s /usr/local/bin/python3 /usr/bin/python"

  # --- AUDIT: Symlink creation targeting config/system files ---
  - id: "ts-audit-symlink-system-files"
    taxonomy: "persistence-evasion/anti-forensics/history-clearing"
    match:
      command_regex: "ln\\s+(-[a-zA-Z]*s[a-zA-Z]*\\s+|--symbolic\\s+)(/etc/|/usr/|/var/|/sys/|/proc/)\\S+"
    decision: "AUDIT"
    confidence: 0.80
    reason: "Creating a symlink to a system file — may be part of a TOCTOU race condition or filesystem redirect attack. CWE-367."
    tests:
      tp:
        - "ln -s /etc/nginx/nginx.conf /tmp/nginx.conf"
        - "ln -sf /usr/bin/python3 /tmp/py3"
      tn:
        - "ln -s ./lib/utils.js ./utils.js"

  # ===================================================================
  # Process tracing / credential sniffing (strace, ltrace, gcore)
  # ===================================================================
  #
  # While gdb --pid is already blocked, there are several other powerful
  # process introspection tools that can extract credentials, API keys,
  # and system prompts from running processes:
  #
  #   strace -e read -p PID   → intercepts all read() syscalls, capturing
  #                              passwords, API keys, and tokens as they're
  #                              read from files/sockets
  #   strace -e write -p PID  → intercepts write() syscalls, sniffing
  #                              outbound data including credentials in HTTP
  #                              headers
  #   ltrace -p PID           → intercepts library calls, can capture
  #                              arguments to SSL_write, EVP_Encrypt, etc.
  #   gcore PID               → dumps entire process memory to a file,
  #                              including heap-allocated secrets and keys
  #
  # These are more stealthy than gdb because they don't modify the target
  # process — they're "read-only" from the target's perspective, making
  # them harder to detect through process integrity checks.
  #
  # Taxonomy: unauthorized-execution/remote-code-exec/process-injection
  # OWASP LLM07 (System Prompt Leakage)
  # MITRE T1057 — Process Discovery, T1003 — OS Credential Dumping

  # --- BLOCK: strace attaching to a running process ---
  - id: "ts-block-strace-attach"
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      command_regex: "strace\\s+.*-p\\s+[0-9]+"
    decision: "BLOCK"
    confidence: 0.93
    reason: "strace attaching to a running process via -p PID intercepts all syscalls including read/write, exposing passwords, API keys, and tokens flowing through the process. MITRE T1057, T1003."
    tests:
      tp:
        - "strace -p 1234"
        - "strace -e trace=network -p 5678"
      tn:
        - "strace ls /tmp"

  # --- BLOCK: strace with credential-sniffing syscall filters ---
  - id: "ts-block-strace-credential-sniff"
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      command_regex: "strace\\s+.*-e\\s+(read|write|recvmsg|sendmsg|openat|trace=network|trace=file)"
    decision: "AUDIT"
    confidence: 0.85
    reason: "strace filtering for data-carrying syscalls (read/write/network) — commonly used to sniff credentials and API keys from running processes or commands. MITRE T1057."
    tests:
      tp:
        - "strace -e read -p 1234"
        - "strace -e trace=network ls"
      tn:
        - "strace -c ls /tmp"

  # --- BLOCK: ltrace attaching to a running process ---
  - id: "ts-block-ltrace-attach"
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      command_regex: "ltrace\\s+.*-p\\s+[0-9]+"
    decision: "BLOCK"
    confidence: 0.93
    reason: "ltrace attaching to a running process intercepts library calls including crypto and SSL functions, exposing credentials at the API level. MITRE T1057."
    tests:
      tp:
        - "ltrace -p 1234"
        - "ltrace -e malloc -p 5678"
      tn:
        - "ltrace ls /tmp"

  # --- BLOCK: gcore process memory dump ---
  - id: "ts-block-gcore-dump"
    taxonomy: "unauthorized-execution/remote-code-exec/process-injection"
    match:
      command_prefix: ["gcore "]
    decision: "BLOCK"
    confidence: 0.95
    reason: "gcore dumps the entire memory of a running process to a file — exposes all heap-allocated secrets, API keys, system prompts, and in-flight credentials. MITRE T1003."
    tests:
      tp:
        - "gcore 1234"
        - "gcore -o /tmp/dump 5678"
      tn:
        - "echo gcore is dangerous"

  # ===================================================================
  # macOS DYLD injection (DYLD_INSERT_LIBRARIES, DYLD_LIBRARY_PATH)
  # ===================================================================
  #
  # macOS equivalent of Linux's LD_PRELOAD. The existing LD_PRELOAD rules
  # don't cover macOS at all. DYLD_INSERT_LIBRARIES forces the dynamic
  # linker (dyld) to load a specified shared library into every process,
  # enabling the same function hooking, credential interception, and
  # authentication bypass attacks as LD_PRELOAD but on macOS.
  #
  # Additional macOS-specific vectors:
  #   DYLD_LIBRARY_PATH     → overrides library search order
  #   DYLD_FRAMEWORK_PATH   → overrides framework search order
  #   DYLD_FALLBACK_LIBRARY_PATH → fallback library resolution
  #
  # Note: macOS System Integrity Protection (SIP) strips DYLD_ variables
  # for protected binaries, but this protection is absent for:
  #   - User-installed applications
  #   - Development tools (including AI agents)
  #   - Binaries in non-SIP-protected paths
  #
  # Taxonomy: privilege-escalation/command-execution/env-injection
  # OWASP LLM06 (Excessive Agency)
  # MITRE T1574.006 — Hijack Execution Flow: Dynamic Linker Hijacking

  # --- BLOCK: DYLD injection before privileged execution ---
  - id: "ts-block-dyld-inject-privesc"
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      command_regex: "DYLD_(INSERT_LIBRARIES|LIBRARY_PATH|FRAMEWORK_PATH)=[^\\s]+\\s+(sudo|su\\b|doas|osascript|open\\s+-a)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "macOS DYLD_ variable set before a privileged or system command — injects a shared library into the target process, enabling authentication bypass and privilege escalation. MITRE T1574.006."
    tests:
      tp:
        - "DYLD_INSERT_LIBRARIES=/tmp/evil.dylib sudo ls"
        - "DYLD_LIBRARY_PATH=/tmp/lib open -a Calculator"
      tn:
        - "DYLD_INSERT_LIBRARIES=/usr/lib/libgmalloc.dylib ./myapp"

  # --- BLOCK: Persistent DYLD injection via export ---
  - id: "ts-block-dyld-inject-export"
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      command_regex: "export\\s+DYLD_(INSERT_LIBRARIES|LIBRARY_PATH|FRAMEWORK_PATH|FALLBACK_LIBRARY_PATH)=(/tmp|/dev/shm|/var/tmp|/private/tmp|\\./|\\.\\./)\\S*"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Exporting macOS DYLD_ variable pointing to a writable directory persistently poisons the shell session — all child processes will load the attacker's library. MITRE T1574.006."
    tests:
      tp:
        - "export DYLD_INSERT_LIBRARIES=/tmp/evil.dylib"
        - "export DYLD_LIBRARY_PATH=/dev/shm/libs"
      tn:
        - "export DYLD_INSERT_LIBRARIES=/usr/local/lib/libasan.dylib"

  # --- AUDIT: Any DYLD injection (even to system paths) ---
  - id: "ts-audit-dyld-inject"
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      command_regex: "DYLD_(INSERT_LIBRARIES|LIBRARY_PATH|FRAMEWORK_PATH)=\\S+"
    decision: "AUDIT"
    confidence: 0.75
    reason: "macOS DYLD_ environment variable manipulation detected — legitimate for debugging but also used for library injection attacks. MITRE T1574.006."
    tests:
      tp:
        - "DYLD_INSERT_LIBRARIES=/usr/local/lib/debug.dylib ./app"
        - "DYLD_FRAMEWORK_PATH=/opt/frameworks ./test"
      tn:
        - "echo DYLD_INSERT_LIBRARIES is dangerous"

  # =====================================================================
  # debugfs — Raw ext filesystem access (bypasses Unix permissions)
  # =====================================================================
  #
  # debugfs is the ext2/ext3/ext4 filesystem debugger. It operates at the
  # block/inode level, completely bypassing Unix file permissions, SELinux,
  # and AppArmor. With read access to a block device (or via sudo), an
  # attacker can:
  #   - Read /etc/shadow without root: debugfs -R 'cat /etc/shadow' /dev/sda1
  #   - Modify files without timestamps changing
  #   - Recover deleted files (undelete)
  #   - Write arbitrary data to inodes: debugfs -w -R 'write /tmp/payload /usr/bin/cron' /dev/sda1
  #
  # No AI agent has a legitimate reason to invoke debugfs. Even filesystem
  # debugging should use higher-level tools (fsck, tune2fs, dumpe2fs).
  #
  # MITRE T1006 — Direct Volume Access

  # --- BLOCK: debugfs with -R (execute command) or -w (writable) ---
  - id: "ts-block-debugfs-command"
    taxonomy: "privilege-escalation/filesystem-bypass/raw-filesystem-access"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?debugfs\\s+.*(-R\\s|--request\\s|-w\\b|--writeable|-f\\s)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "debugfs with -R (run command), -w (writable mode), or -f (script file) operates at the block/inode level, bypassing all Unix file permissions, SELinux, and AppArmor. Can read /etc/shadow, modify files without timestamps, or inject payloads directly into the filesystem. MITRE T1006."
    tests:
      tp:
        - "sudo debugfs -R 'cat /etc/shadow' /dev/sda1"
        - "debugfs -w /dev/sda1"
      tn:
        - "man debugfs"

  # --- AUDIT: Any debugfs invocation ---
  - id: "ts-audit-debugfs"
    taxonomy: "privilege-escalation/filesystem-bypass/raw-filesystem-access"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?debugfs\\b"
    decision: "AUDIT"
    confidence: 0.80
    reason: "debugfs filesystem debugger detected — operates below Unix permissions at the block/inode level. Even interactive mode can read protected files. MITRE T1006."
    tests:
      tp:
        - "debugfs /dev/sda1"
        - "sudo debugfs /dev/sda2"
      tn:
        - "echo debugfs"

  # =====================================================================
