      command_regex_exclude: "^(echo|printf)\\s|^(gh|git)\\s.*(?:--(?:body|body-file|message|notes|description|title|annotation|comment)\\b|\\s-m\\s)|^\\s*cat\\s+>>?\\s+\\S+\\s+<<"
    decision: "BLOCK"
