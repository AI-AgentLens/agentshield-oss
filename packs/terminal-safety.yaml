    decision: "BLOCK"
    confidence: 0.90
    reason: "Clipboard write operation blocked — AI agents must not write to the system clipboard. Malicious content pasted by the user executes in their shell outside AgentShield's evaluation context (pastejacking/clipboard-hijack, OWASP LLM06, MITRE T1204.002)."
