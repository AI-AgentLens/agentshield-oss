  # It is faster than DELETE FROM and leaves no row-level audit trail.
  - id: "ts-block-mysql-truncate-table"
    taxonomy: "destructive-ops/database-destruction/sql-database-drop"
    match:
      command_regex: "(?i)\\b(mysql|mariadb)\\b.*\\bTRUNCATE\\s+(TABLE\\s+)?\\w"
