  # =========================================================================
  # Language Runtime Code Injection via Environment Variables
  # =========================================================================
  #
  # Unlike search path poisoning (PYTHONPATH, NODE_PATH — already covered),
  # these env vars inject CODE EXECUTION directly into every runtime
  # invocation. They are more dangerous because:
  #
  #   1. No attacker-controlled directory is needed on the filesystem
  #      (for PERL5OPT, code runs inline)
  #   2. They affect ALL invocations of the runtime, not just import resolution
  #   3. They're rarely monitored by security tools
  #
  #   PYTHONSTARTUP   — Python sources this file at interactive startup.
  #                     But also: python -c uses it. Persistent code injection.
  #
  #   PERL5OPT        — Perl treats this as command-line options. Supports
  #                     -e for inline code: PERL5OPT='-e system("id")'
  #                     runs arbitrary code in every perl invocation.
  #
  #   RUBYOPT         — Ruby treats this as command-line options. Supports
  #                     -r to require files: RUBYOPT=-r/tmp/evil
