name: "Terminal Safety"
description: "Block destructive commands, privilege escalation, and resource exhaustion attacks"
version: "1.0.0"
author: "AgentShield Security Research"

defaults:
  protected_paths: []

rules:
  # === BLOCK: Filesystem destruction ===
  - id: "ts-block-rm-root"
    taxonomy: "destructive-ops/fs-destruction/recursive-root-delete"
    match:
      command_regex: "^(sudo\\s+)?rm\\s+.*-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\\s+/($|\\s)"
    decision: "BLOCK"
    reason: "Destructive recursive remove at filesystem root."

  - id: "ts-block-rm-force-recursive"
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      command_regex: "^(sudo\\s+)?rm\\s+.*-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\\s+(/etc|/usr|/var|/boot|/sys|/proc)($|/|\\s)"
    decision: "BLOCK"
    reason: "Recursive force-remove on critical system directory."

  - id: "ts-block-mkfs"
    taxonomy: "destructive-ops/disk-ops/filesystem-format"
    match:
      command_regex: "^(sudo\\s+)?mkfs"
    decision: "BLOCK"
    reason: "Filesystem creation can destroy disk data."

  - id: "ts-block-dd-zero"
    taxonomy: "destructive-ops/disk-ops/disk-overwrite"
    match:
      command_regex: "^(sudo\\s+)?dd\\s+.*if=/dev/(zero|urandom|random)"
    decision: "BLOCK"
    reason: "dd from /dev/zero or /dev/urandom can overwrite disks."

  # === BLOCK: Fork bomb and resource exhaustion ===
  - id: "ts-block-fork-bomb"
    taxonomy: "destructive-ops/resource-exhaustion/fork-bomb"
    match:
      command_regex: ":\\(\\)\\{.*:\\|:.*\\}|\\bfork\\b.*\\bwhile\\b.*(\\btrue\\b|\\b1\\b)"
    decision: "BLOCK"
    reason: "Fork bomb detected — can crash the system."

  - id: "ts-block-while-fork-bomb"
    taxonomy: "destructive-ops/resource-exhaustion/fork-bomb"
    match:
      command_regex: "while\\s+(true|1|:)\\s*;?\\s*do\\s+.*&"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Infinite loop spawning background processes is a fork bomb pattern."

  # === BLOCK: Permission weakening ===
  - id: "ts-block-chmod-777"
    taxonomy: "destructive-ops/permission-weakening/chmod-world-writable"
    match:
      command_regex: "^(sudo\\s+)?chmod\\s+(-R\\s+)?777\\s+/"
    decision: "BLOCK"
    reason: "chmod 777 on root paths removes all file protections."

  - id: "ts-block-chmod-recursive-sensitive"
    taxonomy: "destructive-ops/permission-weakening/chmod-world-writable"
    match:
      command_regex: "^(sudo\\s+)?chmod\\s+-R\\s+.*(/etc|/usr|/var|/home)"
    decision: "BLOCK"
    reason: "Recursive permission change on sensitive system directory."

  # === BLOCK: Pipe-to-shell ===
  - id: "ts-block-pipe-to-shell"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      command_regex: "^(curl|wget).*\\|\\s*(sh|bash|zsh|dash|ksh|fish)"
    decision: "BLOCK"
    reason: "Pipe-to-shell executes unreviewed remote code."

  # === BLOCK: eval-based remote code execution (pipe-to-shell evasion) ===
  - id: "ts-block-eval-subshell-rce"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      command_regex: "\\beval\\s+[\"']?\\$\\((curl|wget|fetch|aria2c)\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "eval with remote command substitution executes unreviewed remote code — evades pipe-to-shell detection."

  # === BLOCK: shell -c with remote subshell (pipe-to-shell evasion) ===
  - id: "ts-block-shell-c-remote-subshell"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      command_regex: "(bash|sh|zsh|dash|ksh|fish)\\s+-c\\s+[\"']?\\$\\((curl|wget|fetch|aria2c)\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "shell -c with remote subshell executes unreviewed remote code — pipe-to-shell evasion via -c flag."

  # === BLOCK: source/dot with process substitution from remote (pipe-to-shell evasion) ===
  - id: "ts-block-source-process-sub-rce"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      command_regex: "(source|\\.)\\s+<\\((curl|wget|fetch|aria2c)\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "source/dot with process substitution from remote downloader executes unreviewed remote code — pipe-to-shell evasion."

  # === BLOCK: Interpreter inline download-execute (pipe-to-shell evasion) ===
  - id: "ts-block-interpreter-inline-rce"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      command_regex: "(python[23]?|ruby|perl)\\s+(-c|-e)\\s+[\"'].*\\b(urllib|requests|httpx|aiohttp|open-uri|open_uri|LWP).*\\b(exec|eval)\\s*\\("
    decision: "BLOCK"
    confidence: 0.92
    reason: "Interpreter inline download-execute: fetches remote code via HTTP module and runs it with exec/eval — pipe-to-shell evasion without a pipe (OWASP LLM02)."

  # === BLOCK: Python inline OS/subprocess command execution (indirect-code-exec) ===
  # Catches AI agents using python -c to bypass shell-level detection by routing
  # OS commands through the Python interpreter (os.system, subprocess, __import__).
  - id: "ts-block-python-inline-os-exec"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "python[23]?\\s+.*-c\\s+.*\\b(os\\.system\\s*\\(|os\\.popen\\s*\\(|os\\.execv|os\\.execl|subprocess\\.(run|call|Popen|check_output|check_call)\\s*\\(|__import__\\s*\\(\\s*['\"]os['\"]\\s*\\))"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Python inline code executing OS commands (os.system/subprocess/__import__('os')) bypasses shell-level inspection — indirect code execution evasion (OWASP LLM02)."

  # === BLOCK: Node.js inline child_process execution (indirect-code-exec) ===
  # Catches AI agents using node -e to execute shell commands via child_process,
  # bypassing shell-level detection.
  - id: "ts-block-node-inline-child-process"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "(node|ts-node|bun)\\s+.*-e\\s+.*require\\s*\\(\\s*['\"]child_process['\"]\\s*\\)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Node.js inline code importing child_process bypasses shell-level inspection — indirect code execution evasion (OWASP LLM02)."

  # === BLOCK: Perl/Ruby inline system/exec command execution (indirect-code-exec) ===
  # Catches AI agents using perl/ruby -e to execute OS commands via system()/exec(),
  # bypassing shell-level detection.
  - id: "ts-block-perl-ruby-inline-system"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "(perl|ruby)\\s+-e\\s+['\"].*\\b(system\\s*\\(|exec\\s*\\()"
    decision: "BLOCK"
    confidence: 0.88
    reason: "Perl/Ruby inline code calling system()/exec() bypasses shell-level inspection — indirect code execution evasion (OWASP LLM02)."

  # === BLOCK: Pipe-to-crontab ===
  - id: "ts-block-pipe-to-crontab"
    taxonomy: "persistence-evasion/scheduled-tasks/crontab-modification"
    match:
      command_regex: "\\|\\s*crontab\\s"
    decision: "BLOCK"
    reason: "Piping to crontab installs persistent scheduled tasks. Use 'crontab -e' interactively."

  # === BLOCK: at/batch job scheduling ===
  - id: "ts-block-at-schedule"
    taxonomy: "persistence-evasion/scheduled-tasks/at-job-scheduling"
    match:
      command_regex: "^(sudo\\s+)?at\\s"
    decision: "BLOCK"
    confidence: 0.90
    reason: "at schedules a persistent one-time job. AI agents must not schedule deferred execution."

  - id: "ts-block-batch-schedule"
    taxonomy: "persistence-evasion/scheduled-tasks/at-job-scheduling"
    match:
      command_prefix: ["batch"]
    decision: "BLOCK"
    confidence: 0.85
    reason: "batch schedules a persistent background job when system load permits."

  # === BLOCK: Reverse shell indicators ===
  - id: "ts-block-netcat"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "^(nc|ncat|netcat|socat)\\s"
    decision: "BLOCK"
    reason: "Netcat/socat can open reverse shells."

  - id: "ts-block-bash-dev-tcp"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "/dev/tcp/"
    decision: "BLOCK"
    reason: "Bash /dev/tcp is commonly used for reverse shells."

  - id: "ts-block-python-reverse-shell"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "python[23]?\\s+-[cC]\\s+['\"].*socket\\.socket\\(.*\\.connect\\("
    decision: "BLOCK"
    confidence: 0.90
    reason: "Python one-liner with socket.connect() is a reverse shell pattern."

  - id: "ts-block-ruby-reverse-shell"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "ruby\\s+.*(-rsocket|-e).*TCPSocket"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Ruby one-liner using TCPSocket is a reverse shell pattern."

  # === BLOCK: System shutdown/reboot ===
  - id: "ts-block-shutdown"
    taxonomy: "destructive-ops/system-management/system-shutdown"
    match:
      command_prefix: ["shutdown", "reboot", "halt", "poweroff", "init 0", "init 6"]
    decision: "BLOCK"
    reason: "System shutdown/reboot must be done manually."

  # === AUDIT: Privilege escalation tracking ===
  - id: "ts-audit-sudo"
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      command_prefix: ["sudo "]
    decision: "AUDIT"
    reason: "Sudo command flagged for privilege escalation review."

  - id: "ts-block-sudo-alternatives-shell"
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      command_regex: "^(pkexec|doas|runuser)\\s+(/usr(/local)?/bin/|/bin/)?(bash|sh|zsh|fish|csh|dash|ksh)(\\s|$)"
    decision: "BLOCK"
    confidence: 0.97
    reason: "pkexec/doas/runuser spawning an interactive shell directly grants a root shell — equivalent to sudo bash but bypasses the sudo audit rule."

  - id: "ts-audit-sudo-alternatives"
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      command_prefix: ["pkexec ", "doas ", "runuser "]
    decision: "AUDIT"
    reason: "pkexec (PolicyKit), doas, and runuser are sudo alternatives that elevate privileges — flagged for review."

  - id: "ts-audit-chown"
    taxonomy: "privilege-escalation/file-permissions/ownership-change"
    match:
      command_prefix: ["chown ", "chgrp "]
    decision: "AUDIT"
    reason: "Ownership change flagged for review."

  - id: "ts-block-suid-bit-set"
    taxonomy: "privilege-escalation/file-permissions/suid-bit-set"
    match:
      command_regex: "chmod\\s+(u\\+s|g\\+s|\\+s|[0-7]*[24][0-7]{3})\\s+"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Setting the SUID/SGID bit on a file grants it root-equivalent execution, enabling persistent privilege escalation."

  - id: "ts-block-setcap"
    taxonomy: "privilege-escalation/file-permissions/linux-capabilities"
    match:
      command_regex: "setcap\\s+.*cap_"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Setting Linux capabilities (e.g. cap_setuid, cap_net_admin) on a binary is a stealthy privilege escalation vector that bypasses sudo audit trails."

  - id: "ts-block-suid-find-exec"
    taxonomy: "privilege-escalation/file-permissions/suid-bit-set"
    match:
      command_regex: "find\\s+.*-perm\\s+(-[0-9]*[24][0-9]*|/[0-9]*[24][0-9]*).*-exec"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Discovering SUID/SGID binaries and executing them is a classic post-exploit privilege escalation chain."

  - id: "ts-block-kernel-module-load"
    taxonomy: "privilege-escalation/command-execution/kernel-module"
    match:
      command_regex: "^(sudo\\s+)?(insmod|modprobe)\\s+"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Loading kernel modules grants ring-0 access and can be used to backdoor the system or bypass all security controls."

  # === BLOCK: eBPF kernel program loading (equivalent to kernel module) ===
  # bpftool prog load installs an eBPF program into the kernel at /sys/fs/bpf/.
  # Unlike kernel modules, eBPF does not require CAP_SYS_MODULE, making it
  # accessible in more environments. A loaded eBPF program can intercept
  # syscalls, trace TLS traffic, harvest credentials, and persist until reboot.
  # MITRE T1215 (Kernel Modules / eBPF)
  - id: "ts-block-bpftool-prog-load"
    taxonomy: "privilege-escalation/command-execution/ebpf-surveillance"
    match:
      command_regex: "(sudo\\s+)?bpftool\\s+prog\\s+load\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "bpftool prog load installs an eBPF program into the kernel — equivalent in risk to loading a kernel module. Can be used to intercept credentials, trace TLS plaintext, or establish a persistent kernel backdoor."

  # === BLOCK: bpftrace inline expressions — real-time kernel/user surveillance ===
  # bpftrace -e '...' with uprobe/kprobe probes attaches to arbitrary kernel or
  # user-space functions. An agent can use this to capture passwords from readline,
  # decrypt TLS traffic by tracing SSL_write, or dump exec arguments containing
  # secrets. Inline expressions are far more dangerous than script files because
  # they execute immediately with no file artifact.
  - id: "ts-block-bpftrace-inline"
    taxonomy: "privilege-escalation/command-execution/ebpf-surveillance"
    match:
      command_regex: "(sudo\\s+)?bpftrace\\s+(-e|--e)\\s+"
    decision: "BLOCK"
    confidence: 0.93
    reason: "bpftrace inline expression (-e) attaches kernel/user-space probes that can intercept credentials from readline, decrypt TLS traffic via SSL_write tracing, or dump exec argv containing secrets. No file artifact — executes immediately."

  # === BLOCK: eBPF network attachment via tc (traffic control) ===
  # 'tc filter add ... bpf obj' attaches an eBPF program to a network interface
  # using Linux traffic control. This gives the program access to all packets on
  # the interface, enabling silent network surveillance or traffic manipulation.
  - id: "ts-block-ebpf-tc-filter"
    taxonomy: "privilege-escalation/command-execution/ebpf-surveillance"
    match:
      command_regex: "tc\\s+filter\\s+add\\s+.*\\bbpf\\b"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Attaching an eBPF program to a network interface via tc (traffic control) gives the program access to all packets — enables silent network surveillance and traffic manipulation."

  # === AUDIT: bpftrace script files and other bpftool subcommands ===
  # bpftrace running a .bt script file is less immediately dangerous than inline
  # expressions, but still warrants review. Similarly, bpftool subcommands other
  # than 'prog load' (e.g., bpftool net, bpftool map) are audit-worthy.
  - id: "ts-audit-bpftrace-script"
    taxonomy: "privilege-escalation/command-execution/ebpf-surveillance"
    match:
      command_regex: "(sudo\\s+)?bpftrace\\s+[^-]"
    decision: "AUDIT"
    confidence: 0.80
    reason: "bpftrace script execution — eBPF tracing program warrants review for unauthorized surveillance or credential harvesting."

  - id: "ts-audit-bpftool"
    taxonomy: "privilege-escalation/command-execution/ebpf-surveillance"
    match:
      command_regex: "(sudo\\s+)?bpftool\\s+"
    decision: "AUDIT"
    confidence: 0.75
    reason: "bpftool usage flagged for review — eBPF inspection and management tools can be used for unauthorized kernel-level operations."

  - id: "ts-block-ld-preload-privesc"
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      command_regex: "LD_(PRELOAD|LIBRARY_PATH)=[^\\s]+\\s+(sudo|su\\b|pkexec|doas|runuser)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "LD_PRELOAD/LD_LIBRARY_PATH combined with a privileged command injects a malicious shared library into the elevated process, enabling authentication bypass and privilege escalation."

  - id: "ts-audit-ld-preload-export"
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      command_regex: "export\\s+LD_(PRELOAD|LIBRARY_PATH)=(/tmp|/dev/shm|/var/tmp|/proc|/run/user)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Exporting LD_PRELOAD/LD_LIBRARY_PATH to a world-writable or volatile path persistently poisons the current shell session and all child processes, enabling stealthy library injection."

  # === BLOCK: PATH hijacking via export ===
  # An AI agent prepending a world-writable or attacker-controlled directory to
  # $PATH causes all subsequent commands to resolve from the malicious path first.
  # This is a stealthy persistence + privilege escalation vector — once PATH is
  # poisoned, every "ls", "git", "make" etc. runs the attacker's binary.
  - id: "ts-block-path-hijack-export"
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      command_regex: "export\\s+PATH=(/tmp|/dev/shm|/var/tmp|/run/user|\\./|\\.\\./).*:\\$PATH"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Exporting PATH with a world-writable or relative directory prepended hijacks command resolution for all subsequent commands in this shell session and child processes."

  - id: "ts-block-path-hijack-eval"
    taxonomy: "privilege-escalation/command-execution/env-injection"
    match:
      command_regex: "eval\\s+.*PATH=(/tmp|/dev/shm|/var/tmp|\\./)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Using eval to set PATH with a writable/relative directory is an obfuscated form of PATH hijacking."

  - id: "ts-audit-crontab"
    taxonomy: "persistence-evasion/scheduled-tasks/crontab-modification"
    match:
      command_prefix: ["crontab "]
    decision: "AUDIT"
    reason: "Crontab modification flagged for persistence review."

  # === BLOCK: Deactivating security daemons ===
  - id: "ts-block-security-daemon-deactivate"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "\\b(systemctl|service)\\b.*(stop|mask|disable)\\b.*(ufw|firewalld|auditd|fail2ban|apparmor|crowdstrike|falcon|ossec|wazuh|clamd|rkhunter)\\b"
    decision: "BLOCK"
    reason: "Deactivating a security daemon (firewall, IDS, AV, audit) removes a defensive control. AI agents have no legitimate reason to stop security services."
    confidence: 0.97

  - id: "ts-block-security-daemon-deactivate-reverse"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "\\b(systemctl|service)\\b.*(ufw|firewalld|auditd|fail2ban|apparmor|crowdstrike|falcon|ossec|wazuh|clamd|rkhunter)\\b.*(stop|mask|disable)\\b"
    decision: "BLOCK"
    reason: "Deactivating a security daemon (reverse argument order). AI agents have no legitimate reason to stop security services."
    confidence: 0.97

  - id: "ts-block-ufw-disable"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "\\bufw\\b\\s+(disable|reset)\\b"
    decision: "BLOCK"
    reason: "Directly deactivating the system firewall via `ufw disable`. No legitimate agent use case."
    confidence: 0.99

  - id: "ts-block-selinux-permissive"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "\\bsetenforce\\b\\s+0\\b"
    decision: "BLOCK"
    reason: "Setting SELinux to permissive mode removes mandatory access control enforcement. Defense evasion technique."
    confidence: 0.99

  - id: "ts-block-apparmor-disable"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "\\baa-(disable|complain)\\b"
    decision: "BLOCK"
    reason: "Deactivating an AppArmor profile removes LSM-based confinement. Defense evasion."
    confidence: 0.97

  # === BLOCK: Systemd user service and launchd plist persistence ===
  # Writing to systemd user service directories or macOS LaunchAgents paths creates
  # persistent background services that auto-start on user login or system boot.
  # These paths are covered in the MCP pack via write_file; these rules close the gap
  # for direct shell command writes (echo >, cat >, tee, etc.).

  - id: "ts-block-systemd-user-persist"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "(echo|printf|cat)\\s+.*>+\\s*(~|\\$HOME|/home/[^/\\s]+|/root)/?\\.config/systemd/user/"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Writing to ~/.config/systemd/user/ via echo/cat creates a user-level systemd service that persists across sessions and auto-starts on login (MITRE T1543.002)."

  - id: "ts-block-systemd-user-persist-tee"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "tee\\s+((-a|--append)\\s+)?(~|\\$HOME|/home/[^/\\s]+|/root)/?\\.config/systemd/user/"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Writing to ~/.config/systemd/user/ via tee creates a user-level systemd service that persists across sessions and auto-starts on login (MITRE T1543.002)."

  - id: "ts-block-systemd-local-persist"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "(echo|printf|cat)\\s+.*>+\\s*(~|\\$HOME|/home/[^/\\s]+|/root)/?\\.local/share/systemd/user/"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Writing to ~/.local/share/systemd/user/ via echo/cat creates a user-level systemd service that persists across sessions (MITRE T1543.002)."

  - id: "ts-block-systemd-local-persist-tee"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "tee\\s+((-a|--append)\\s+)?(~|\\$HOME|/home/[^/\\s]+|/root)/?\\.local/share/systemd/user/"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Writing to ~/.local/share/systemd/user/ via tee creates a user-level systemd service that persists across sessions (MITRE T1543.002)."

  - id: "ts-block-launchd-user-persist"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "(echo|printf|cat)\\s+.*>+\\s*(~|\\$HOME|/Users/[^/\\s]+)/Library/LaunchAgents/"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Writing a plist to ~/Library/LaunchAgents/ via echo/cat registers a persistent macOS LaunchAgent that auto-starts on user login (MITRE T1543.001)."

  - id: "ts-block-launchd-user-persist-tee"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "tee\\s+((-a|--append)\\s+)?(~|\\$HOME|/Users/[^/\\s]+)/Library/LaunchAgents/"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Writing a plist to ~/Library/LaunchAgents/ via tee registers a persistent macOS LaunchAgent that auto-starts on user login (MITRE T1543.001)."

  - id: "ts-block-launchd-system-persist"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_regex: "(echo|printf|cat|tee)\\s+.*>+\\s*/Library/LaunchDaemons/"
    decision: "BLOCK"
    confidence: 0.97
    reason: "Writing a plist to /Library/LaunchDaemons/ creates a system-wide macOS LaunchDaemon that runs as root on every boot (MITRE T1543.004). Critical persistence vector requiring root access."

  # === AUDIT: General service management ===
  - id: "ts-audit-systemctl"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_prefix: ["systemctl ", "launchctl "]
    decision: "AUDIT"
    reason: "Service management flagged for review."

  # === ALLOW: Common safe commands ===
  - id: "ts-allow-readonly"
    match:
      command_prefix:
        - "ls"
        - "pwd"
        - "whoami"
        - "id"
        - "uname"
        - "date"
        - "uptime"
        - "df"
        - "du"
        - "free"
        - "top -l"
        - "ps "
        - "which "
        - "type "
        - "file "
        - "head "
        - "tail "
        - "wc "
        - "sort "
