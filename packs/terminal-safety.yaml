  #      regular file in `ls -l` output (no `->` arrow)
  #   2. The hard link SURVIVES deletion of the original file — the data
  #      persists as long as any directory entry references the inode
  #   3. Permissions are shared — the hard link has identical owner/group/mode
  #   4. Tools that check `lstat()` for symlinks won't detect hard links
