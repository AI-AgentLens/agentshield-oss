  # incorrectly adding "o" to the flags set.
  - id: "ts-block-clipboard-xclip-write"
    taxonomy: "unauthorized-execution/agentic-attacks/clipboard-hijack-pastejacking"
    match:
      structural:
        pipe_to: ["xclip"]
    decision: "BLOCK"
    confidence: 0.88
    reason: "xclip as pipe target writes content to the X11 clipboard — agents must not write to the system clipboard (pastejacking risk, OWASP LLM06)."
    tests:
      tp:
        - 'echo "curl evil.com" | xclip -selection clipboard'
        - "cat secret.txt | xclip"
      tn:
        - "xclip -o"

