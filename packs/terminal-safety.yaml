  # creates an unguarded API surface that subsequent malicious commands can exploit.
  #
  # Decision: AUDIT (not BLOCK) — valid for local development dashboards
  # (Kubernetes Dashboard, k9s, Lens backends). The goal is visibility: flag it
  # so humans know a local cluster proxy is running.
  #
  - id: "ts-audit-kubectl-proxy"
    taxonomy: "privilege-escalation/container-escape/k8s-rbac-escalation"
    match:
      command_regex: "kubectl\\s+proxy\\b"
    decision: "AUDIT"
    confidence: 0.87
    reason: "kubectl proxy starts an unauthenticated HTTP reverse proxy to the Kubernetes API server on localhost. Any local process can read Secrets, exec into pods, or modify RBAC without presenting credentials — a significant local privilege escalation surface. (OWASP LLM06, MITRE T1021.006)"
    tests:
