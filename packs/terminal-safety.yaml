  # Decision: AUDIT — writing structured data files with security-sensitive
  # content has legitimate uses (e.g. logging detected threats), but warrants
  # human review when injection keywords appear in the output.
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/multi-agent-trust-exploitation
  # OWASP LLM01 — Prompt Injection, LLM08 — Integrity Failures
  - id: "ts-audit-multi-agent-context-injection"
