  - id: "ts-block-ifs-positional-evasion"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "\\bIFS=[^$\\s'\"\\\\tn][^;]*;.*(set\\s+--|\"\\$@\"|\\$@|\\$\\*|;\\s*\\$\\{?[a-zA-Z_])"
    decision: "BLOCK"
    confidence: 0.88
    reason: "IFS manipulation with positional parameter expansion (set --, $@, $*) or bare variable execution — splits a string by a custom delimiter and re-assembles it as command arguments. Classic shell obfuscation technique: IFS=.; x='rm.-rf./'; set -- $x; \"$@\" executes 'rm -rf /'. MITRE T1027.004."
    tests:
      tp:
        - 'IFS=.; x=''rm.-rf./''; set -- $x; \"$@\"'
        - "IFS=/; x='usr/bin/curl'; set -- $x; $@"
      tn:
