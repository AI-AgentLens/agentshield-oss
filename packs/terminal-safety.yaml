    decision: "AUDIT"
    confidence: 0.75
    reason: "LLM API call co-occurring with timing measurement — may indicate prompt cache timing oracle probing. Measuring response latency across varying prefixes can reconstruct cached system prompts (OWASP LLM02, LLM06, CWE-208)."
    tests:
      tp:
