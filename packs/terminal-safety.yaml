      command_regex_exclude: "^(echo|printf)\\s|^(gh|git)\\s.*--(?:body|body-file|message|notes|description|title|annotation|comment)\\b|\\bln\\s+.*-[a-zA-Z]*s"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Creating a hard link to a credential or authentication file — more dangerous than symlinks because hard links are invisible to readlink, survive deletion of the original, and share the same inode. The linked copy cannot be revoked by deleting the original file. CWE-62, MITRE T1547.009."
    tests:
      tp:
        - "ln ~/.ssh/id_rsa /tmp/data.txt"
        - "ln /etc/shadow /tmp/shadow-copy"
      tn:
