    confidence: 0.95
    reason: "Exporting a runtime code injection env var (PYTHONSTARTUP, PERL5OPT, RUBYOPT, NODE_OPTIONS, JAVA_TOOL_OPTIONS) silently injects code into every subsequent invocation of that language runtime. Unlike search path vars, these execute code directly. MITRE T1574.007."

