    confidence: 0.97
    reason: "MySQL/MariaDB DROP TABLE permanently removes a table and all its data — irreversible without a backup. AI agents have no legitimate reason to drop tables in production. MITRE T1485."
    tests:
      tp:
        - "mysql -e 'DROP TABLE users'"
        - "mariadb -e 'DROP TABLE orders'"
