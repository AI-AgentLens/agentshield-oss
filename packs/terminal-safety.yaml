  # chattr / setfacl — file attribute and ACL manipulation (issue #614)
  # ---------------------------------------------------------------------------
  #
  # chattr -i removes the Linux immutable flag from system files, enabling
  # subsequent writes to /etc/passwd, /etc/sudoers, /etc/shadow, etc.
  #
  # chattr +i in world-writable directories (e.g. /tmp, /dev/shm) protects
  # malware or persistence artifacts from cleanup (anti-forensics).
  #
  # setfacl with world grants (o::) or on sensitive paths grants stealthy
  # broad access that bypasses standard POSIX permissions.
  #
  # MITRE T1222.002, T1564, T1548 | OWASP LLM05/LLM06 | CWE-269, CWE-732
  #
  # TP examples (should BLOCK):
  #   chattr -i /etc/passwd
  #   sudo chattr -ia /etc/sudoers
  #   chattr -R -i /etc
  #   setfacl -m o::rwx /etc/shadow
  #   setfacl -m u::rwx /etc/passwd
  #   sudo setfacl -Rm o::rx /etc
  #
  # TP examples (should AUDIT):
  #   chattr +i /tmp/backdoor.sh
  #   chattr +i /dev/shm/agent
  #
  # TN examples (should ALLOW):
  #   lsattr /etc/passwd
  #   chattr +i ~/important-config.json
  #   getfacl /etc/passwd
  #   setfacl -m u:webuser:rx /var/www/html

