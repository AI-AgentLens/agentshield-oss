    decision: "AUDIT"
    confidence: 0.87
    reason: "ls/stat with 2+ well-known credential directories in a single command — systematic path enumeration to discover which credential stores exist before targeted access. Legitimate tools access a single specific path; listing multiple credential dirs together is reconnaissance (MITRE T1083, T1552, OWASP LLM02, CWE-200)."
    tests:
