  # This is distinct from the network-egress tunnel rules (which focus on C2/
  # exfiltration risk). These governance-risk rules flag the AI-specific impact:
  # the unregistered public deployment of an AI inference capability.
  #
  # Known AI inference ports targeted:
  #   11434 — Ollama default HTTP API
  #   1234  — LM Studio default HTTP API
  #   7860  — text-generation-webui / ComfyUI / Gradio default
  #   5001  — koboldcpp / OpenAI-compatible API (alt port)
  #   8080  — common fallback for LM Studio, llamafile, localai, openwebui
  #   4000  — LiteLLM proxy default
  #   3000  — Open-WebUI default
  #
  # Note: The network-egress pack already BLOCKS most tunnel tools outright.
  # These AUDIT rules add governance context (EU AI Act compliance citation,
  # model inventory gap reason) for audit logs and compliance dashboards.

  # --- AUDIT: ngrok tunneling a known AI inference port ---
  #
  # ngrok http is already AUDIT in network-egress (ne-audit-ngrok-http).
  # This rule adds governance-risk taxonomy context for AI-specific ports,
  # enabling compliance dashboards to distinguish "webhook dev use" from
  # "shadow AI deployment" in audit logs.
  #
  # TN: `ngrok http 3000` — no AI inference port context (generic web)
  # TN: `ngrok http 8000` — generic port (no known AI inference service)
  # TP: `ngrok http 11434` — expose Ollama to internet
  # TP: `ngrok http 1234 --subdomain ollama-api` — LM Studio public
  - id: "ts-audit-ngrok-ai-inference-port"
    taxonomy: "governance-risk/ai-governance-gap/shadow-ai-deployment"
    match:
      command_regex: "\\bngrok\\s+(?:http|tcp)\\s+(?:.*\\s)?(?:11434|1234|7860|5001|4000)\\b"
    decision: "AUDIT"
    confidence: 0.90
    reason: "ngrok tunneling a known AI inference server port (Ollama :11434, LM Studio :1234, text-generation-webui :7860, koboldcpp :5001, LiteLLM :4000) creates a shadow AI deployment: an unauthenticated public AI inference endpoint not tracked in any organizational model inventory. Violates EU AI Act Art.26 (deployer obligations) and NIST AI RMF GOVERN-1 (governance of AI systems). No legitimate AI agent coding workflow requires tunneling a local model server to the internet."
    tests:
      tp:
        - "ngrok http 11434"
        - "ngrok tcp 1234"
      tn:
        - "ngrok http 3000"

  # --- AUDIT: cloudflared, bore, or localtunnel exposing a known AI inference port ---
  #
  # Complements the BLOCK rules in network-egress for bore/cloudflared by adding
  # governance-risk taxonomy context when AI-specific ports are targeted.
  # (These tools are already BLOCKed by ne-block-bore-local, ne-block-cloudflared-tunnel,
