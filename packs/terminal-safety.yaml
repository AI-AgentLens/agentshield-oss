  #   3. `type sudo` still shows "sudo is a function" but users rarely check
  #   4. Functions persist for the entire shell session
  #   5. If exported (`export -f`), they propagate to ALL child processes
  #
  # This is distinct from PATH hijacking — no filesystem changes needed.
  # The shadow exists purely in shell memory.
  #
  # Taxonomy: persistence-evasion/shell-init/function-shadowing
  # OWASP LLM06 (Excessive Agency)
