  # ── AI-Assisted Social Engineering ────────────────────────────────────────
  #
  # Taxonomy: unauthorized-execution/ai-content-integrity/ai-assisted-social-engineering
  # OWASP LLM09 — Misinformation, LLM06 — Excessive Agency
  # MITRE T1534 — Internal Spearphishing, T1598 — Phishing for Information
  #
  # AI-assisted social engineering combines two capabilities:
  #   1. Harvesting organisational context (git history, personnel, org charts)
  #   2. Sending targeted messages to individuals (email, Slack webhook, mutt)
  #
  # When an AI agent harvests names + org context and immediately sends an
  # unsolicited message, it is likely performing automated spearphishing. The
  # detection approach is to block/audit direct message-sending commands that
  # expose sender control to the agent. Legitimate workflows use email clients
  # interactively and do not pipe git log output directly into sendmail.

  # === BLOCK: sendmail / ssmtp invocation by agent ===
  #
  # sendmail and ssmtp deliver email directly from the command line.
  # An AI agent running sendmail can send arbitrary emails — including
  # phishing messages targeting personnel discovered via git log.
  # Decision: BLOCK — AI agents must not send email unattended.

  - id: "ts-block-sendmail-agent"
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-assisted-social-engineering"
    match:
      structural:
        executable: ["sendmail", "ssmtp", "msmtp"]
    decision: "BLOCK"
    confidence: 0.95
    reason: "sendmail/ssmtp/msmtp called by AI agent — unattended email delivery is an AI-assisted social engineering vector. Agents must not send email without explicit human review and consent (OWASP LLM09, MITRE T1534)."
    tests:
      tp:
        - "sendmail user@example.com"
        - "msmtp user@example.com"
      tn:
        - "echo sendmail"

  # === BLOCK: mutt / mail / mailx unattended email send ===
  #
  # mutt, mail, and mailx can send emails non-interactively with -s / -S flags.
  # Piping content to them (echo "..." | mail -s "subject" victim@example.com)
  # is a classic spearphishing delivery mechanism.

  - id: "ts-block-mail-noninteractive"
    taxonomy: "unauthorized-execution/ai-content-integrity/ai-assisted-social-engineering"
    match:
      command_regex: "\\b(mutt|mail|mailx|alpine)\\b.*(-s|--subject).*@|\\|\\s*(mutt|mail|mailx)\\b"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Non-interactive email send via mutt/mail/mailx with subject flag and recipient — AI agent sending email is an AI-assisted social engineering risk. Humans must compose and send email (OWASP LLM09, MITRE T1534)."
    tests:
      tp:
        - "mail -s 'Urgent' victim@example.com"
        - "echo 'phishing content' | mutt -s 'Important'"
      tn:
        - "man mail"

  # === AUDIT: curl POST to Slack/Teams/Discord webhook ===
  #
  # curl POSTing to Slack/Teams/Discord incoming webhooks delivers messages
