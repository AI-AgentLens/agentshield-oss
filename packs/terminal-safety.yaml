      command_regex: "aws\\s+ec2\\s+run-instances\\b.*--count\\s+([1-9][0-9]{1,})"
    decision: "AUDIT"
    confidence: 0.88
    reason: "AWS EC2 run-instances with explicit --count argument — launching many instances incurs significant cost. High counts (especially with expensive GPU/memory-optimized types) may reflect a scale misinterpretation. (MITRE T1578.002, OWASP LLM10)"
    tests:
      tp:
        - "aws ec2 run-instances --count 100 --instance-type t3.micro"
        - "aws ec2 run-instances --instance-type m5.large --count 50"
      tn:
        - "aws ec2 run-instances --count 1 --instance-type t3.micro"

