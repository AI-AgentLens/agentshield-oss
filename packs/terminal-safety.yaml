  # TN examples:
  #   pbpaste | grep pattern          (clipboard read)
  #   xclip -o                        (X11 clipboard read)
  #   xsel --output                   (xsel read)
  #   wl-paste                        (Wayland clipboard read)
  #   pbcopy --version                (help/version flag, not writing)

