    confidence: 0.90
    reason: "Tunneling a known AI inference server port (Ollama :11434, LM Studio :1234, text-generation-webui :7860, koboldcpp :5001, LiteLLM :4000, Open-WebUI :8080) via bore, cloudflared quick tunnel, or localtunnel creates a shadow AI deployment: a public, unauthenticated AI inference endpoint outside organizational governance. EU AI Act Art.26, NIST AI RMF GOVERN-1, OWASP LLM06/LLM08."
