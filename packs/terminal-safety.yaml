  # =========================================================================
  # SETARCH / PERSONALITY — ASLR BYPASS
  # =========================================================================
  #
  # setarch changes the personality of the current process, which controls
  # various kernel behaviors for that process tree. The key flags:
  #   -R / --addr-no-randomize — Disables ASLR (Address Space Layout Randomization)
  #   -Z / --mmap-page-zero — Allows mapping page zero (null-ptr deref exploitation)
  #   -X / --read-implies-exec — Makes readable pages executable (W^X bypass)
  #   -S / --short-inode — Legacy, minimal risk
  #
  # Disabling ASLR is the most common use: it makes memory addresses
  # predictable, which is the critical first step for any memory corruption
  # exploit (buffer overflow, use-after-free, ROP chains).
  #
  # This is subtle because:
  #   1. setarch looks like a benign compatibility tool
  #   2. It only affects the current process tree (harder to detect post-facto)
  #   3. Commonly chained: setarch -R ./exploit
  #   4. The personality(2) syscall can also be invoked via Python ctypes
  #
  # CWE-119 — Improper Restriction of Operations within Memory Buffer
  # CWE-693 — Protection Mechanism Failure
  # MITRE T1562.001 — Impair Defenses: Disable or Modify Tools

  # --- BLOCK: setarch with ASLR disable ---
  - id: "ts-block-setarch-aslr-disable"
    taxonomy: "privilege-escalation/command-execution/setarch-personality-aslr-bypass"
    match:
      command_regex: "setarch\\s+\\S+\\s+(-[A-Za-z]*R|-[A-Za-z]*-addr-no-randomize|--addr-no-randomize)"
    decision: "BLOCK"
    confidence: 0.96
    reason: "setarch with -R/--addr-no-randomize disables ASLR for the process tree — makes memory addresses predictable, enabling reliable exploitation of memory corruption vulnerabilities. CWE-693, MITRE T1562.001."
    tests:
      tp:
        - "setarch x86_64 -R ./exploit"
        - "setarch linux64 --addr-no-randomize ./target"
      tn:
        - "setarch x86_64 ./program"

  # --- BLOCK: setarch with read-implies-exec (W^X bypass) ---
  - id: "ts-block-setarch-read-implies-exec"
    taxonomy: "privilege-escalation/command-execution/setarch-personality-aslr-bypass"
    match:
      command_regex: "setarch\\s+\\S+\\s+(-[A-Za-z]*X|-[A-Za-z]*-read-implies-exec|--read-implies-exec)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "setarch with -X/--read-implies-exec makes all readable memory pages executable — bypasses W^X (Write XOR Execute) protection, enabling code injection into data regions. CWE-693."
    tests:
      tp:
        - "setarch x86_64 -X ./payload"
        - "setarch linux64 --read-implies-exec ./exploit"
      tn:
