  # ===================================================================
  # BLOCK: D-Bus privilege escalation via dbus-send / gdbus / busctl
  # ===================================================================
  #
  # D-Bus is Linux's inter-process communication system with two buses:
  #   - System bus (--system): connects to privileged services
  #   - Session bus (--session): connects to user desktop services
  #
  # The system bus hosts services that can perform privileged operations
  # WITHOUT requiring sudo:
  #
  #   org.freedesktop.systemd1      → Start/stop/create systemd services
  #   org.freedesktop.PackageKit    → Install/remove packages
  #   org.freedesktop.Accounts      → Create/delete user accounts
  #   org.freedesktop.login1        → Reboot/shutdown/suspend
  #   org.freedesktop.PolicyKit1    → Modify authorization policies
  #   org.freedesktop.NetworkManager → Change network configuration
  #   org.freedesktop.UDisks2       → Mount/unmount/format disks
  #
  # An AI coding agent compromised via prompt injection could invoke
  # these services to install backdoor packages, create attacker
  # accounts, start malicious services, or reboot the system — all
  # without ever touching sudo, su, or pkexec.
  #
  # The three D-Bus CLI tools are:
  #   dbus-send  — send a single message (most common)
  #   gdbus      — GLib-based D-Bus tool (GNOME environments)
  #   busctl     — systemd's D-Bus introspection/call tool
  #
  # Attack examples:
  #   dbus-send --system --type=method_call \
  #     --dest=org.freedesktop.systemd1 \
  #     /org/freedesktop/systemd1 \
  #     org.freedesktop.systemd1.Manager.StartUnit \
  #     string:malware.service string:replace
  #
  #   busctl call org.freedesktop.Accounts \
  #     /org/freedesktop/Accounts \
  #     org.freedesktop.Accounts.CreateUser \
  #     ssi attacker "" 1
  #
  #   gdbus call --system -d org.freedesktop.login1 \
  #     -o /org/freedesktop/login1 \
  #     -m org.freedesktop.login1.Manager.Reboot true

  # --- BLOCK: D-Bus calls to systemd service manager ---
  - id: "ts-block-dbus-systemd-manager"
    taxonomy: "privilege-escalation/dbus-privilege-escalation/systemd-manager"
