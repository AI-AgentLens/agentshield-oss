  - id: "ts-block-trap-debug"
    taxonomy: "persistence-evasion/shell-init/trap-abuse"
    match:
      command_regex: "trap\\s+['\"].*['\"]\\s+(DEBUG|debug)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "trap DEBUG executes attacker code BEFORE every command in the shell — enables transparent credential interception, command rewriting, and keylogging. Fires on every single command without visible side effects. MITRE T1546.004."

  # --- BLOCK: trap EXIT with suspicious commands ---
  - id: "ts-block-trap-exit-exfil"
    taxonomy: "persistence-evasion/shell-init/trap-abuse"
    match:
      command_regex: "trap\\s+['\"].*\\b(curl|wget|nc|ncat|bash|sh|python|perl|ruby|eval|exec|/dev/tcp|base64|xxd)\\b.*['\"]\\s+(EXIT|exit|0)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "trap EXIT with network/execution commands — deferred exfiltration or code execution on shell exit. Data collected during session is exfiltrated when monitoring attention is lowest. MITRE T1546.004, T1041."

  # --- BLOCK: trap ERR with suspicious commands ---
