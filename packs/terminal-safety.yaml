  # =========================================================================
  # Bash Trap Abuse — DEBUG/EXIT/ERR Code Injection & Signal Suppression
  # =========================================================================
  #
  # The `trap` builtin registers handlers for signals and pseudo-signals.
  # Several variants are dangerous in agent contexts:
  #
  #   trap 'malicious_code' DEBUG
  #     — Executes BEFORE every simple command in the shell. A single
  #       trap DEBUG installs a persistent hook that fires on every
  #       command, enabling transparent credential interception,
  #       keylogging, or command rewriting. Extremely stealthy because
  #       the user sees their command execute normally after the trap runs.
  #
  #   trap 'malicious_code' EXIT
  #     — Executes when the shell exits. Perfect for deferred exfiltration:
  #       collect data during session, exfiltrate on exit when attention
  #       is lowest. Also survives Ctrl-C.
  #
  #   trap 'malicious_code' ERR
  #     — Executes when any command returns non-zero. Can be used to
  #       intercept error contexts (failed auth = credentials visible in
  #       error messages) or to silently retry with escalated privileges.
  #
  #   trap '' SIGTERM SIGINT SIGKILL
  #     — Ignoring termination signals makes a process unkillable by
  #       normal means. An agent could make a malicious background process
  #       immune to cleanup signals.
  #
  # Taxonomy: persistence-evasion/shell-init/trap-abuse
  # OWASP LLM06 (Excessive Agency)
  # MITRE T1546.004 — Event Triggered Execution: Unix Shell Configuration
  # CWE-78 — OS Command Injection (via trap handler)
  # =========================================================================

