  - id: "ts-audit-tunnel-ai-inference-port"
    taxonomy: "governance-risk/ai-governance-gap/shadow-ai-deployment"
    match:
      command_regex: "(?:bore\\s+local|cloudflared\\s+(?:tunnel\\s+)?--url\\s+https?://(?:localhost|127\\.0\\.0\\.1):|lt\\b.*--port|npx\\s+localtunnel\\b.*--port)\\s*(?:.*\\s)?(?:11434|1234|7860|5001|4000|8080)\\b"
