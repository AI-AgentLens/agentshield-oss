    decision: "AUDIT"
    confidence: 0.85
    reason: "curl POST to a Slack/Teams/Discord webhook — AI agent sending unsolicited messages to org channels is an AI-assisted social engineering risk. Confirm message content and intent before allowing (OWASP LLM09, MITRE T1534)."
    tests:
      tp:
        - 'curl -X POST https://hooks.slack.com/services/T00/B00/xxx -d ''{\"text\":\"hello\"}'''
        - 'curl -X POST https://discord.com/api/webhooks/123/abc -d ''{\"content\":\"msg\"}'''
