  - id: "ts-block-procsub-credential-read"
    taxonomy: "credential-exposure/file-access/credential-file-read"
    match:
      command_regex: "<\\(\\s*(cat|head|tail|less|more|strings|xxd|base64)\\s+[^)]*(\\.ssh/|id_rsa|id_ed25519|authorized_keys|\\.aws/|credentials|\\.gnupg/|\\.kube/config|shadow|passwd|known_hosts|token|secret|\\.env\\b)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Process substitution reading credential/sensitive files — creates an ephemeral /dev/fd/N handle that bypasses path-based monitoring. The outer command only sees /dev/fd/N, not the sensitive path. MITRE T1003, CWE-200."
    tests:
      tp:
        - 'diff <(cat ~/.ssh/id_rsa) <(echo "")'
        - "base64 <(cat ~/.aws/credentials)"
      tn:
