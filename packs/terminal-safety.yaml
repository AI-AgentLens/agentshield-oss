  # locations (~/.mcp/tokens.json, ~/.config/mcp/oauth*, XDG_CONFIG_HOME).
  # An adversary reading these files can forge requests as the agent's
  # authorized identity without re-authenticating, bypassing OAuth flows.
  #
  # Examples:
  #   cat ~/.mcp/tokens.json
  #   python3 -c "import json; print(json.load(open(os.path.expanduser('~/.mcp/tokens.json'))))"
  #   jq . ~/.config/mcp/oauth_tokens.json
  #
  # Decision: BLOCK — no legitimate agent workflow reads raw MCP token files.
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/mcp-authorization-bypass
  # OWASP LLM09 — Misinformation, CWE-522 — Insufficiently Protected Credentials
  - id: "ts-block-mcp-oauth-token-read"
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-authorization-bypass"
    match:
      command_regex: "(cat|less|more|head|tail|bat|jq|python3?|node|ruby|perl)\\s+.*~/?\\.mcp/(tokens|oauth|auth|credentials|access_token).*\\.json"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Reading MCP OAuth token file — these files contain bearer tokens that authorize MCP server access; exfiltrating them allows forging requests as the agent's authenticated identity (OWASP LLM09, CWE-522)."
    tests:
      tp:
        - "cat ~/.mcp/tokens.json"
        - "jq . ~/.mcp/oauth_tokens.json"
      tn:
        - "cat ~/.config/myapp/config.json"

  # === BLOCK: Intercepting or redirecting MCP socket connections (LLM09) ===
  #
  # MCP servers communicate over Unix domain sockets or named pipes. Binding
  # to a path that shadows an expected MCP socket (e.g., /tmp/mcp-*.sock) or
  # using socat/nc to proxy traffic through a MitM listener enables session
  # token harvesting and redirect_uri tampering for OAuth flows.
  #
  # Examples:
  #   socat UNIX-LISTEN:/tmp/mcp-cursor.sock,fork UNIX:/tmp/mcp-cursor.sock.real
  #   nc -lU /tmp/mcp-agent.sock
  #   python3 -c "...socket.bind('/tmp/mcp-server.sock')..."
  #
  # Decision: BLOCK — binding to or proxying MCP socket paths has no legitimate
  # use outside of adversarial interception.
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/mcp-authorization-bypass
  # OWASP LLM09, CWE-300 — Channel Accessible by Non-Endpoint
  - id: "ts-block-mcp-socket-hijack"
    taxonomy: "unauthorized-execution/agentic-attacks/mcp-authorization-bypass"
    match:
      command_regex: "(socat|nc|ncat|netcat)\\s+.*(/tmp/mcp[-_.]|~/.mcp/.*\\.sock|/var/run/mcp)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Binding or proxying a MCP Unix socket — a man-in-the-middle listener on the MCP socket can harvest OAuth tokens, intercept tool calls, and tamper with redirect URIs (OWASP LLM09, CWE-300)."
    tests:
      tp:
        - "socat UNIX-LISTEN:/tmp/mcp-cursor.sock,fork UNIX:/real.sock"
        - "nc -lU /tmp/mcp-agent.sock"
      tn:
        - "socat TCP-LISTEN:8080,fork TCP:localhost:3000"

