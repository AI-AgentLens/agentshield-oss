  # ── Agent Capability Escalation ─────────────────────────────────────────────
  #
  # Taxonomy: unauthorized-execution/agentic-attacks/agent-capability-escalation
  # OWASP LLM06 — Excessive Agency, LLM07 — System Prompt Leakage
