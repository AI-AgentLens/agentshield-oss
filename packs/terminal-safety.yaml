    confidence: 0.93
    reason: "mkfifo combined with a file transfer tool — data written to the FIFO by one process is streamed to the network by another. Splits the exfiltration chain across processes to evade pipe detection. MITRE T1071.001."

  # --- BLOCK: mkfifo in /tmp or /dev/shm (volatile path = stealth) ---
  - id: "ts-block-mkfifo-volatile"
