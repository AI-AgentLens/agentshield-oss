  # ===========================================================================
  # Shadow AI: Local AI Inference Server Public Exposure via Tunneling
  # ===========================================================================
  #
  # Taxonomy: governance-risk/ai-governance-gap/shadow-ai-deployment
  # OWASP LLM06 — Excessive Agency, LLM08 — Excessive Permissions
  # EU AI Act Art.26 (obligations of deployers), NIST AI RMF GOVERN-1
  # CWE-284 — Improper Access Control
  #
  # When an AI agent tunnels a local AI inference server's port to the public
  # internet (via ngrok, cloudflared, bore, etc.), it creates a shadow AI
  # deployment: a live, unauthenticated AI system accessible to external parties
  # that is not tracked in any model inventory, has no governance review, and
  # has no rate limiting or prompt injection controls.
