  # resources — GPU instances at $30/hr, large RDS clusters, mass VM arrays.
  # Unlike IaC destroy (which deletes), these commands create and run up bills.
  #
  # Real-world precedent: the Lobstar Wilde incident (Feb 2026) where an AI agent
  # sent 52M tokens instead of 4, resulting in $250K loss from a parsing error.
  # The same failure mode applies to cloud provisioning: --count 1000 instead of 10.
  #
  # Decision: AUDIT (not BLOCK) because some provisioning is legitimate. Flag for
  # human review when the count argument or instance type suggests high cost.
  #
  # Taxonomy: destructive-ops/resource-commitment/unbounded-transfer
  # OWASP LLM05 — Improper Output Handling | LLM10 — Unbounded Consumption
  # MITRE T1578.002 — Create Cloud Instance (at excessive scale)

  # --- AUDIT: AWS EC2 run-instances with explicit count >10 ---
  # aws ec2 run-instances --count 100 --instance-type p4d.24xlarge
