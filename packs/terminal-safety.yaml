      command_regex_exclude: "\\b(Get-Process|tasklist|findstr|grep|where|which|ls|dir|type|cat|head|tail|ps)\\b"
    decision: "AUDIT"
    confidence: 0.75
    reason: "Execution of a known Windows UAC auto-elevation binary (fodhelper, eventvwr, sdclt, etc.) — these binaries auto-elevate to high integrity and are commonly abused for UAC bypass. Verify intent before execution. MITRE T1548.002."
    tests:
      tp:
