  #   PYTHONSTARTUP   — Python sources this file at interactive startup.
  #                     But also: python -c uses it. Persistent code injection.
  #
  #   PERL5OPT        — Perl treats this as command-line options. Supports
  #                     -e for inline code: PERL5OPT='-e system("id")'
  #                     runs arbitrary code in every perl invocation.
  #
  #   RUBYOPT         — Ruby treats this as command-line options. Supports
  #                     -r to require files: RUBYOPT=-r/tmp/evil
  #                     loads attacker code in every ruby invocation.
  #
  #   NODE_OPTIONS    — Node.js processes these as CLI flags. Supports
  #                     --require: NODE_OPTIONS='--require /tmp/evil.js'
  #                     loads attacker module in every node invocation.
  #
  #   JAVA_TOOL_OPTIONS — JVM reads this before any Java application starts.
  #                       -javaagent:/tmp/evil.jar injects a Java agent into
  #                       every JVM process. Used in real supply chain attacks.
  #
  # Taxonomy: privilege-escalation/command-execution/env-injection
  # OWASP LLM06 (Excessive Agency)
