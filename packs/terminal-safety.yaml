name: "Terminal Safety"
description: "Block destructive commands, privilege escalation, and resource exhaustion attacks"
version: "1.0.0"
author: "AgentShield Security Research"

defaults:
  protected_paths: []

rules:
  # === BLOCK: Filesystem destruction ===
  - id: "ts-block-rm-root"
    taxonomy: "destructive-ops/fs-destruction/recursive-root-delete"
    match:
      command_regex: "^(sudo\\s+)?rm\\s+.*-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\\s+/($|\\s)"
    decision: "BLOCK"
    reason: "Destructive recursive remove at filesystem root."

  - id: "ts-block-rm-force-recursive"
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      command_regex: "^(sudo\\s+)?rm\\s+.*-[a-zA-Z]*r[a-zA-Z]*f[a-zA-Z]*\\s+(/etc|/usr|/var|/boot|/sys|/proc)($|/|\\s)"
    decision: "BLOCK"
    reason: "Recursive force-remove on critical system directory."

  - id: "ts-block-mkfs"
    taxonomy: "destructive-ops/disk-ops/filesystem-format"
    match:
      command_regex: "^(sudo\\s+)?mkfs"
    decision: "BLOCK"
    reason: "Filesystem creation can destroy disk data."

  - id: "ts-block-dd-zero"
    taxonomy: "destructive-ops/disk-ops/disk-overwrite"
    match:
      command_regex: "^(sudo\\s+)?dd\\s+.*if=/dev/(zero|urandom|random)"
    decision: "BLOCK"
    reason: "dd from /dev/zero or /dev/urandom can overwrite disks."

  # === BLOCK: Fork bomb and resource exhaustion ===
  - id: "ts-block-fork-bomb"
    taxonomy: "destructive-ops/resource-exhaustion/fork-bomb"
    match:
      command_regex: ":\\(\\)\\{.*:\\|:.*\\}|\\bfork\\b.*\\bwhile\\b.*(\\btrue\\b|\\b1\\b)"
    decision: "BLOCK"
    reason: "Fork bomb detected — can crash the system."

  - id: "ts-block-while-fork-bomb"
    taxonomy: "destructive-ops/resource-exhaustion/fork-bomb"
    match:
      command_regex: "while\\s+(true|1|:)\\s*;?\\s*do\\s+.*&"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Infinite loop spawning background processes is a fork bomb pattern."

  # === BLOCK: Permission weakening ===
  - id: "ts-block-chmod-777"
    taxonomy: "destructive-ops/permission-weakening/chmod-world-writable"
    match:
      command_regex: "^(sudo\\s+)?chmod\\s+(-R\\s+)?777\\s+/"
    decision: "BLOCK"
    reason: "chmod 777 on root paths removes all file protections."

  - id: "ts-block-chmod-recursive-sensitive"
    taxonomy: "destructive-ops/permission-weakening/chmod-world-writable"
    match:
      command_regex: "^(sudo\\s+)?chmod\\s+-R\\s+.*(/etc|/usr|/var|/home)"
    decision: "BLOCK"
    reason: "Recursive permission change on sensitive system directory."

  # === BLOCK: Pipe-to-shell ===
  - id: "ts-block-pipe-to-shell"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      command_regex: "^(curl|wget).*\\|\\s*(sh|bash|zsh|dash|ksh|fish)"
    decision: "BLOCK"
    reason: "Pipe-to-shell executes unreviewed remote code."

  # === BLOCK: Pipe-to-crontab ===
  - id: "ts-block-pipe-to-crontab"
    taxonomy: "persistence-evasion/scheduled-tasks/crontab-modification"
    match:
      command_regex: "\\|\\s*crontab\\s"
    decision: "BLOCK"
    reason: "Piping to crontab installs persistent scheduled tasks. Use 'crontab -e' interactively."

  # === BLOCK: at/batch job scheduling ===
  - id: "ts-block-at-schedule"
    taxonomy: "persistence-evasion/scheduled-tasks/at-job-scheduling"
    match:
      command_regex: "^(sudo\\s+)?at\\s"
    decision: "BLOCK"
    confidence: 0.90
    reason: "at schedules a persistent one-time job. AI agents must not schedule deferred execution."

  - id: "ts-block-batch-schedule"
    taxonomy: "persistence-evasion/scheduled-tasks/at-job-scheduling"
    match:
      command_prefix: ["batch"]
    decision: "BLOCK"
    confidence: 0.85
    reason: "batch schedules a persistent background job when system load permits."

  # === BLOCK: Reverse shell indicators ===
  - id: "ts-block-netcat"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "^(nc|ncat|netcat|socat)\\s"
    decision: "BLOCK"
    reason: "Netcat/socat can open reverse shells."

  - id: "ts-block-bash-dev-tcp"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "/dev/tcp/"
    decision: "BLOCK"
    reason: "Bash /dev/tcp is commonly used for reverse shells."

  - id: "ts-block-python-reverse-shell"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "python[23]?\\s+-[cC]\\s+['\"].*socket\\.socket\\(.*\\.connect\\("
    decision: "BLOCK"
    confidence: 0.90
    reason: "Python one-liner with socket.connect() is a reverse shell pattern."

  - id: "ts-block-ruby-reverse-shell"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: "ruby\\s+.*(-rsocket|-e).*TCPSocket"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Ruby one-liner using TCPSocket is a reverse shell pattern."

  # === BLOCK: System shutdown/reboot ===
  - id: "ts-block-shutdown"
    taxonomy: "destructive-ops/system-management/system-shutdown"
    match:
      command_prefix: ["shutdown", "reboot", "halt", "poweroff", "init 0", "init 6"]
    decision: "BLOCK"
    reason: "System shutdown/reboot must be done manually."

  # === AUDIT: Privilege escalation tracking ===
  - id: "ts-audit-sudo"
    taxonomy: "privilege-escalation/command-execution/sudo-invocation"
    match:
      command_prefix: ["sudo "]
    decision: "AUDIT"
    reason: "Sudo command flagged for privilege escalation review."

  - id: "ts-audit-chown"
    taxonomy: "privilege-escalation/file-permissions/ownership-change"
    match:
      command_prefix: ["chown ", "chgrp "]
    decision: "AUDIT"
    reason: "Ownership change flagged for review."

  - id: "ts-audit-crontab"
    taxonomy: "persistence-evasion/scheduled-tasks/crontab-modification"
    match:
      command_prefix: ["crontab "]
    decision: "AUDIT"
    reason: "Crontab modification flagged for persistence review."

  - id: "ts-audit-systemctl"
    taxonomy: "persistence-evasion/service-management/systemctl-manipulation"
    match:
      command_prefix: ["systemctl ", "launchctl "]
    decision: "AUDIT"
    reason: "Service management flagged for review."

  # === ALLOW: Common safe commands ===
  - id: "ts-allow-readonly"
    match:
      command_prefix:
        - "ls"
        - "pwd"
        - "whoami"
        - "id"
        - "uname"
        - "date"
        - "uptime"
        - "df"
        - "du"
        - "free"
        - "top -l"
        - "ps "
        - "which "
        - "type "
        - "file "
        - "head "
        - "tail "
        - "wc "
        - "sort "
        - "uniq "
        - "grep "
        - "find "
        - "echo "
        - "printf "
        - "cat "
        - "man "
        - "git log"
        - "git branch"
        - "git show"
        - "git remote"
        - "git tag"
        - "git stash list"
        - "git add "
        - "git diff"
        - "git status"
    decision: "ALLOW"
    reason: "Read-only or informational command."

  # === STRUCTURAL RULES ===
  # These use the parsed shell AST instead of regex.
  # They handle flag reordering, long-form flags, and sudo automatically.

  - id: "ts-struct-block-crontab-modify"
    taxonomy: "persistence-evasion/scheduled-tasks/crontab-modification"
    match:
      structural:
        executable: "crontab"
        flags_any: ["e", "r"]
    decision: "BLOCK"
    confidence: 0.95
    reason: "crontab -e (edit) or -r (remove/reinstall) modifies cron schedules. AI agents must not manage persistent scheduled tasks."

  - id: "ts-struct-block-ssh-keygen-noninteractive"
    taxonomy: "persistence-evasion/lateral-movement/ssh-key-generation"
    match:
      structural:
        executable: "ssh-keygen"
        flags_any: ["N"]
    decision: "BLOCK"
    confidence: 0.90
    reason: "ssh-keygen with -N flag runs non-interactively. AI agents generating SSH keys is a persistence and lateral movement risk."

  - id: "ts-block-ssh-keygen-piped"
    taxonomy: "persistence-evasion/lateral-movement/ssh-key-generation"
    match:
      command_regex: "(echo|printf|yes)\\s+[\"']?[\"']?\\s*\\|.*ssh-keygen|ssh-keygen.*<\\s*/dev/null"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Piping empty passphrase to ssh-keygen bypasses interactive prompt, generating passwordless SSH keys for lateral movement."

  - id: "ts-struct-block-rm-system"
    taxonomy: "destructive-ops/fs-destruction/system-directory-delete"
    match:
      structural:
        executable: "rm"
        flags_all: ["r", "f"]
        args_any: ["/", "/etc/**", "/usr/**", "/var/**", "/boot/**", "/sys/**"]
    decision: "BLOCK"
    confidence: 0.95
    reason: "Structural: recursive force-delete on system directory (handles flag reordering and sudo)."

  - id: "ts-struct-block-chmod-world-writable"
    taxonomy: "destructive-ops/permission-weakening/chmod-world-writable"
    match:
      structural:
        executable: "chmod"
        args_any: ["/etc/**", "/usr/**", "/var/**"]
    decision: "AUDIT"
    confidence: 0.80
    reason: "Structural: chmod on system directory flagged for review."

  - id: "ts-struct-block-pipe-to-shell"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      structural:
        pipe_from: ["curl", "wget", "fetch", "aria2c"]
        pipe_to: ["sh", "bash", "zsh", "dash", "python", "python3", "node", "ruby", "perl"]
    decision: "BLOCK"
    confidence: 0.95
    reason: "Structural: download piped to interpreter. Download and inspect first."

  - id: "ts-struct-block-npm-registry"
    taxonomy: "supply-chain/dependency-confusion/non-standard-registry"
    match:
      structural:
        executable: ["npm", "yarn", "pnpm"]
        subcommand: "install"
        flags_any: ["registry"]
    decision: "BLOCK"
    confidence: 0.90
    reason: "Structural: package install with custom registry override is a supply chain risk."

  # === SEMANTIC RULES ===
  # These match against intents classified by the built-in semantic analyzer.

  - id: "ts-sem-block-disk-destroy"
    taxonomy: "destructive-ops/disk-ops/disk-overwrite"
    match:
      semantic:
        intent: "disk-destroy"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Semantic: any command classified as disk-destroy intent is blocked."

  - id: "ts-sem-block-high-risk"
    match:
      semantic:
        risk_min: "critical"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Semantic: any command with critical risk intent is blocked."

  - id: "ts-sem-allow-dns-safe"
    taxonomy: "data-exfiltration/network-egress/dns-tunneling"
    match:
      semantic:
        intent: "dns-query-safe"
    decision: "ALLOW"
    confidence: 0.90
    reason: "Semantic: safe DNS queries (DMARC/SPF/DKIM) are allowed."

  # === STATEFUL RULES ===
  # These match multi-step attack chains within compound commands.

  - id: "ts-sf-block-download-execute"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
      stateful:
        chain:
          - executable_any: ["curl", "wget", "aria2c", "fetch"]
            operator: "|"
          - executable_any: ["bash", "sh", "zsh", "python", "python3", "node", "ruby", "perl"]
    decision: "BLOCK"
    confidence: 0.90
    reason: "Stateful: direct pipe from downloader to interpreter detected (download-then-execute via pipe)."

  - id: "ts-sf-block-recon-then-exfil"
    taxonomy: "data-exfiltration/network-egress/network-http-request"
    match:
      stateful:
        chain:
          - executable_any: ["find", "locate", "ls"]
          - executable_any: ["tar", "zip", "gzip"]
          - executable_any: ["curl", "wget", "nc", "scp"]
    decision: "BLOCK"
    confidence: 0.85
    reason: "Stateful: reconnaissance → archive → exfiltrate chain detected."

  # === BLOCK: Cloud CLI destructive operations ===

  - id: "ts-block-aws-terminate"
    taxonomy: "destructive-ops/cloud-infra/aws-instance-terminate"
    match:
      command_regex: "aws\\s+ec2\\s+terminate-instances"
    decision: "BLOCK"
    confidence: 0.95
    reason: "AWS EC2 instance termination is a destructive cloud operation."

  - id: "ts-block-aws-rds-delete"
    taxonomy: "destructive-ops/cloud-infra/aws-rds-delete"
    match:
      command_regex: "aws\\s+rds\\s+delete-db-(instance|cluster)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "AWS RDS database deletion destroys data irreversibly."

  - id: "ts-block-aws-s3-rm"
    taxonomy: "destructive-ops/cloud-infra/aws-s3-delete"
    match:
      command_regex: "aws\\s+s3\\s+(rm\\s+s3://.*--recursive|rb\\s+s3://)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "AWS S3 recursive deletion or bucket removal destroys cloud storage data."

  - id: "ts-block-aws-snapshot-delete"
    taxonomy: "destructive-ops/cloud-infra/aws-snapshot-delete"
    match:
      command_regex: "aws\\s+ec2\\s+delete-snapshot"
    decision: "BLOCK"
    confidence: 0.90
    reason: "AWS snapshot deletion removes backup/recovery points."

  - id: "ts-block-aws-iam-delete"
    taxonomy: "destructive-ops/cloud-infra/aws-iam-delete"
    match:
      command_regex: "aws\\s+iam\\s+delete-(user|role)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "AWS IAM user/role deletion can break authentication and authorization."

  - id: "ts-block-gcloud-instance-delete"
    taxonomy: "destructive-ops/cloud-infra/gcloud-instance-delete"
    match:
      command_regex: "gcloud\\s+compute\\s+instances\\s+delete"
    decision: "BLOCK"
    confidence: 0.95
    reason: "GCloud compute instance deletion is a destructive cloud operation."

  - id: "ts-block-gcloud-sql-delete"
    taxonomy: "destructive-ops/cloud-infra/gcloud-sql-delete"
    match:
      command_regex: "gcloud\\s+sql\\s+instances\\s+delete"
    decision: "BLOCK"
    confidence: 0.95
    reason: "GCloud SQL instance deletion destroys cloud database."

  - id: "ts-block-gcloud-storage-rm"
    taxonomy: "destructive-ops/cloud-infra/gcloud-storage-delete"
    match:
      command_regex: "gcloud\\s+storage\\s+rm"
    decision: "BLOCK"
    confidence: 0.90
    reason: "GCloud storage removal destroys cloud storage data."

  - id: "ts-block-gcloud-project-delete"
    taxonomy: "destructive-ops/cloud-infra/gcloud-project-delete"
    match:
      command_regex: "gcloud\\s+projects\\s+delete"
    decision: "BLOCK"
    confidence: 0.95
    reason: "GCloud project deletion destroys all resources in the project."

  - id: "ts-block-az-vm-delete"
    taxonomy: "destructive-ops/cloud-infra/az-vm-delete"
    match:
      command_regex: "az\\s+vm\\s+delete"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Azure VM deletion is a destructive cloud operation."

  - id: "ts-block-az-sql-delete"
    taxonomy: "destructive-ops/cloud-infra/az-sql-delete"
    match:
      command_regex: "az\\s+sql\\s+db\\s+delete"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Azure SQL database deletion destroys cloud data."

  - id: "ts-block-az-storage-delete"
    taxonomy: "destructive-ops/cloud-infra/az-storage-delete"
    match:
      command_regex: "az\\s+storage\\s+blob\\s+delete-batch"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Azure storage blob batch deletion destroys cloud storage data."

  - id: "ts-block-az-group-delete"
    taxonomy: "destructive-ops/cloud-infra/az-group-delete"
    match:
      command_regex: "az\\s+group\\s+delete"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Azure resource group deletion destroys all resources in the group."

  # === BLOCK: Container escape & Kubernetes attacks ===

  - id: "ts-block-docker-privileged"
    taxonomy: "privilege-escalation/container-escape/docker-privileged"
    match:
      command_regex: "docker\\s+run\\s+.*--privileged"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Running a privileged Docker container disables security boundaries."

  - id: "ts-block-docker-host-mount"
    taxonomy: "privilege-escalation/container-escape/docker-host-mount"
    match:
      command_regex: "docker\\s+run\\s+.*-v\\s+/:/\\w+"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Mounting host root filesystem into a container enables full host access."

  - id: "ts-block-kubectl-delete-namespace"
    taxonomy: "destructive-ops/cloud-infra/k8s-namespace-delete"
    match:
      command_regex: "kubectl\\s+delete\\s+namespace"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Kubernetes namespace deletion destroys all resources in the namespace."

  - id: "ts-block-kubectl-delete-all"
    taxonomy: "destructive-ops/cloud-infra/k8s-bulk-delete"
    match:
      command_regex: "kubectl\\s+delete\\s+(pvc|pod|deployment|service|configmap|secret)\\s+--all"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Kubernetes bulk deletion of resources is destructive."

  - id: "ts-block-docker-exec"
    taxonomy: "privilege-escalation/container-escape/docker-exec"
    match:
      command_regex: "docker\\s+exec\\s+"
    decision: "AUDIT"
    confidence: 0.85
    reason: "docker exec into a container may enable lateral movement or escape."

  # === BLOCK: CI/CD pipeline tampering ===

  - id: "ts-block-cicd-write"
    taxonomy: "persistence-evasion/cicd-tampering/pipeline-config-write"
    match:
      command_regex: "(sed\\s+-i|echo\\s+.*>>|cat\\s+.*>|tee\\s+).*(\\.github/workflows/|\\.gitlab-ci\\.yml|\\.circleci/config\\.yml|Jenkinsfile|\\.travis\\.yml)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Modifying CI/CD pipeline configuration files is a persistence/supply-chain risk."

  - id: "ts-block-cicd-write-reverse"
    taxonomy: "persistence-evasion/cicd-tampering/pipeline-config-write"
    match:
      command_regex: "(sed\\s+-i|echo\\s+.*>>|cat\\s+.*>|tee\\s+).*(workflows/|gitlab-ci|circleci|Jenkinsfile|travis)"
    decision: "BLOCK"
    confidence: 0.85
    reason: "Modifying CI/CD pipeline configuration files is a persistence/supply-chain risk."

  - id: "ts-block-cicd-cp-mv"
    taxonomy: "persistence-evasion/cicd-tampering/pipeline-config-write"
    match:
      command_regex: "(cp|mv)(\\s+-\\S+)*\\s+\\S+\\s+(\\./)?(.*\\.github/workflows/|Jenkinsfile|\\.gitlab-ci\\.yml|\\.circleci/config\\.yml|\\.travis\\.yml)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Copying or moving files to CI/CD configuration paths is a supply-chain tampering risk."

  # === BLOCK: Git credential theft & force push ===

  - id: "ts-block-git-force-push-main"
    taxonomy: "destructive-ops/version-control/git-force-push"
    match:
      command_regex: "git\\s+push\\s+.*(--force|-f)\\s+.*(main|master)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Force pushing to main/master can destroy shared commit history."

  - id: "ts-block-git-force-push-main-alt"
    taxonomy: "destructive-ops/version-control/git-force-push"
    match:
      command_regex: "git\\s+push\\s+.*(main|master)\\s+.*(--force|-f)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Force pushing to main/master can destroy shared commit history."

  - id: "ts-block-git-clone-mirror"
    taxonomy: "data-exfiltration/version-control/git-mirror-clone"
    match:
      command_regex: "git\\s+clone\\s+--mirror"
    decision: "BLOCK"
    confidence: 0.85
    reason: "git clone --mirror copies entire repository including all refs — potential exfiltration."

  - id: "ts-block-git-credential-modify"
    taxonomy: "credential-exposure/version-control/git-credential-modify"
    match:
      command_regex: "git\\s+config\\s+.*credential\\.helper"
    decision: "BLOCK"
    confidence: 0.85
    reason: "Modifying git credential helper can redirect stored credentials."

  - id: "ts-block-git-credential-fill"
    taxonomy: "credential-exposure/version-control/git-credential-extract"
    match:
      command_regex: "git\\s+credential\\s+(fill|approve)"
    decision: "BLOCK"
    confidence: 0.90
    reason: "git credential fill/approve can extract or inject stored credentials."
