  # Decision: AUDIT — legitimate benchmarking and performance testing exist;
  # BLOCK would be too aggressive. The combination of timing + LLM API call
  # in a single command is unusual enough to warrant human review.
  #
  # Taxonomy: reconnaissance/llm-introspection/prompt-cache-timing-oracle
  # OWASP LLM02 — Sensitive Information Disclosure
  # OWASP LLM06 — Excessive Agency
  # CWE-208 — Observable Timing Discrepancy
