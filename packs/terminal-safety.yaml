  # DROP TABLE is just as destructive as DROP DATABASE but targets individual tables.
  # Unlike DROP DATABASE, there is no mysqladmin/dropdb wrapper — it must be passed via -e/-c.
  # These patterns cover the mysql and psql CLI clients (the two most common).
  - id: "ts-block-mysql-drop-table"
    taxonomy: "destructive-ops/database-destruction/sql-database-drop"
