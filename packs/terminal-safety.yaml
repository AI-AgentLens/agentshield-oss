  # === AUDIT: Unpinned AI model alias in shell API calls (LLM05, EU AI Act Art.13) ===
  #
  # AI agents calling LLM APIs with unversioned model aliases enable silent model
  # substitution — the provider can swap to a different model version without the
  # operator's knowledge. This violates EU AI Act Art.13 transparency requirements
  # and OWASP LLM05 (supply chain vulnerabilities).
  #
  # Detection targets:
  #   - --model flag with known unversioned aliases: latest, gpt-4 (no date), claude-3-sonnet
  #   - Environment variables: OPENAI_MODEL=latest, ANTHROPIC_MODEL=...
  #   - Inline JSON API calls: curl -d '{"model":"gpt-4"}' ...
  #
  # Examples that SHOULD fire (AUDIT):
  #   curl -d '{"model":"gpt-4"}' https://api.openai.com/v1/chat/completions
  #   export OPENAI_MODEL=latest
  #   claude --model claude-3-sonnet
  #   openai api --model gpt-4 chat.create
  #
  # Examples that must NOT fire (versioned pins are safe):
  #   curl -d '{"model":"gpt-4-0125-preview"}' https://api.openai.com/v1/chat/completions
  #   export OPENAI_MODEL=gpt-4-0125-preview
  #   claude --model claude-3-5-sonnet-20241022
  #
  # Decision: AUDIT — legitimate CI scripts may use env vars; human review needed.
  # Confidence: 0.75 — regex cannot cover all model naming conventions.
  #
  # OWASP LLM05 — Supply Chain Vulnerabilities
  # EU AI Act Art.13 — Transparency and Provision of Information
  # NIST AI RMF GOVERN-1
  # Taxonomy: governance-risk/ai-governance-gap/ai-model-attestation-gap
  - id: "ts-audit-unpinned-model-alias"
    taxonomy: "governance-risk/ai-governance-gap/ai-model-attestation-gap"
    match:
      command_regex: "(?i)(?:(?:--model|--model-id)\\s+(?:latest|gpt-4(?:[^-]|$)|claude-[0-9]+-(?:opus|sonnet|haiku)(?:[^-]|$))|(?:OPENAI_MODEL|ANTHROPIC_MODEL|GEMINI_MODEL|AI_MODEL)\\s*=\\s*(?:latest|gpt-4(?:[^-]|$)|claude-[0-9]+-(?:opus|sonnet|haiku)(?:[^-]|$))|\"model\"\\s*:\\s*\"(?:latest|gpt-4[^-]|claude-[0-9]+-(?:opus|sonnet|haiku)[^-]))"
    decision: "AUDIT"
    confidence: 0.75
    reason: "Unpinned AI model alias detected — using 'latest', 'gpt-4' (without date pin), or 'claude-3-sonnet' (without version suffix) enables silent model substitution. Pin to an exact version (e.g. gpt-4-0125-preview, claude-3-5-sonnet-20241022) for EU AI Act Art.13 compliance (OWASP LLM05, NIST AI RMF GOVERN-1)."
    tests:
      tp:
        - "curl -d '{\"model\":\"gpt-4\"}' https://api.openai.com/v1/chat/completions"
        - "export OPENAI_MODEL=latest"
        - "claude --model claude-3-sonnet"
        - "openai api --model gpt-4 chat.create"
        - "ANTHROPIC_MODEL=claude-3-opus python3 run_agent.py"
      tn:
        - "curl -d '{\"model\":\"gpt-4-0125-preview\"}' https://api.openai.com/v1/chat/completions"
        - "export OPENAI_MODEL=gpt-4-0125-preview"
        - "claude --model claude-3-5-sonnet-20241022"
        - "grep model config.yaml"
        - "git commit -m 'switch to gpt-4 for inference docs'"

  # ===========================================================================
  # AI Agent Scope Creep — AWS Resource Over-Provisioning
  # Taxonomy: governance-risk/ai-governance-gap/ai-agent-scope-creep
  # OWASP LLM06 — Excessive Agency
  # EU AI Act Art.14 — Human Oversight
  # MITRE T1578 — Modify Cloud Compute Infrastructure
  # ===========================================================================
  #
  # An AI agent asked to deploy a single function should not autonomously
  # create IAM roles, S3 buckets, CloudWatch log groups, VPC rules, and
  # additional cloud resources beyond what was explicitly requested.
  # This pattern of chaining multiple `aws ... create-*` commands represents
  # AI governance scope creep: each action may be individually authorized
  # but the aggregate exceeds the operator's stated intent.
  #
  # Detection: regex matches compound commands with 2+ distinct AWS create-*
  # operations chained via &&, ;, or |. Single `aws create-*` is normal;
  # three or more chained creates in one command is over-provisioning.
  #
  # TP examples (should AUDIT):
  #   aws iam create-role && aws s3api create-bucket && aws logs create-log-group
  #   aws ec2 create-security-group && aws iam create-policy && aws rds create-db-instance
  #
  # TN examples (should ALLOW):
  #   aws iam create-role --role-name myRole --assume-role-policy-document file://trust.json
  #   aws s3api create-bucket --bucket my-project-artifacts --region us-east-1
  #   aws ec2 describe-instances
  #
  # Decision: AUDIT — multi-resource cloud provisioning warrants human review
  # before it incurs cost, expands attack surface, or violates least-privilege.
  # Confidence: 0.85 — false positives possible in legitimate IaC scripts, but
  # an AI agent executing multi-step cloud provisioning inline is unusual.
  - id: "ts-audit-scope-creep-aws-multi-create"
    taxonomy: "governance-risk/ai-governance-gap/ai-agent-scope-creep"
    match:
      command_regex: "aws\\s+\\w+\\s+create-\\w+.*(?:&&|;|\\|).*aws\\s+\\w+\\s+create-\\w+.*(?:&&|;|\\|).*aws\\s+\\w+\\s+create-\\w+"
    decision: "AUDIT"
    confidence: 0.85
    reason: "Three or more chained AWS resource-creation operations detected — an AI agent autonomously provisioning IAM roles, S3 buckets, log groups, and other cloud resources in a single compound command exceeds typical task scope (OWASP LLM06 Excessive Agency, EU AI Act Art.14)."
    tests:
      tp:
        - "aws iam create-role --role-name myRole --assume-role-policy-document file://trust.json && aws s3api create-bucket --bucket mybucket && aws logs create-log-group --log-group-name myLog"
        - "aws ec2 create-security-group --group-name sg && aws iam create-policy --policy-name pol --policy-document file://pol.json && aws rds create-db-instance --db-instance-identifier mydb --db-instance-class db.t3.micro"
        - "aws iam create-role --role-name r && aws lambda create-function --function-name f --runtime python3.9 --handler h && aws logs create-log-group --log-group-name /aws/lambda/f"
      tn:
        - "aws iam create-role --role-name myRole --assume-role-policy-document file://trust.json"
        - "aws s3api create-bucket --bucket my-project-artifacts --region us-east-1"
        - "aws ec2 describe-instances"
        - "aws iam create-role --role-name r && aws iam attach-role-policy --role-name r --policy-arn arn:aws:iam::aws:policy/ReadOnlyAccess"

  # ===========================================================================
  # AI Agent Scope Creep — Broad Home Directory Config File Scan
  # Taxonomy: governance-risk/ai-governance-gap/ai-agent-scope-creep
  # OWASP LLM06 — Excessive Agency, LLM02 — Insecure Output Handling
  # EU AI Act Art.14 — Human Oversight
  # MITRE T1083 — File and Directory Discovery
  # CWE-200 — Exposure of Sensitive Information
  # ===========================================================================
  #
  # An AI agent performing a task should not enumerate all configuration files
  # in the user's home directory. `find ~ -type f -name '*.yaml'` or
  # `find ~ -name '*.json'` scans the entire home directory for configuration
  # files that may contain secrets, tokens, and settings far outside the
  # agent's task scope. This is scope creep via context over-collection.
  #
  # Unlike targeted credential hunts (covered by ts-audit-find-credential-hunt),
  # this rule catches broader "give me all config files" patterns: yaml, json,
  # toml, ini, conf, cfg, properties. The agent is not hunting for a specific
  # credential file — it is collecting environmental context well beyond what
  # any single task requires. The `2>/dev/null` error suppressor is a common
  # indicator of deliberate, sweeping scans.
  #
  # TP examples (should AUDIT):
  #   find ~ -type f -name '*.yaml' 2>/dev/null
  #   find $HOME -name '*.json' | xargs grep -l secret
  #   find ~/. -name '*.toml' -o -name '*.ini' 2>/dev/null
  #
  # TN examples (should ALLOW):
  #   find . -name '*.yaml'          (project-local, not home scan)
  #   find src/ -name '*.json'       (scoped to src/)
  #   find ~ -name '*.go'            (non-config extension)
  #
  # Decision: AUDIT — broad home-dir config enumeration warrants human review.
  # Confidence: 0.80 — some dev tooling scripts may legitimately scan home dir.
  - id: "ts-audit-scope-creep-home-config-scan"
    taxonomy: "governance-risk/ai-governance-gap/ai-agent-scope-creep"
    match:
      command_regex: "find\\s+(~|\\$HOME|/home/[^/\\s]+|/root)(?:/\\.?)?\\s+.*-name\\s+['\"]?\\*\\.(yaml|yml|json|toml|ini|conf|cfg|properties|config)['\"]?"
    decision: "AUDIT"
    confidence: 0.80
    reason: "find scanning the entire home directory for configuration file extensions (yaml, json, toml, ini, conf) is AI agent scope creep — collecting environmental context far beyond any single task's authorized scope. Configuration files in the home directory frequently contain API tokens, database URLs, and service credentials (OWASP LLM06, EU AI Act Art.14)."
    tests:
      tp:
        - "find ~ -type f -name '*.yaml' 2>/dev/null"
        - "find $HOME -name '*.json' | xargs grep -l secret"
        - "find ~ -name '*.toml' 2>/dev/null"
        - "find /home/user -name '*.ini' -o -name '*.conf'"
        - "find ~ -name '*.properties'"
      tn:
        - "find . -name '*.yaml'"
        - "find src/ -name '*.json'"
        - "find ~ -name '*.go'"
        - "find ./config -name '*.toml'"
        - "ls ~/.config/myapp/settings.yaml"

  # ===========================================================================
  # Many-Shot Jailbreaking (MSJ) — Reading Suspicious Demonstration Files
  # Taxonomy: unauthorized-execution/agentic-attacks/many-shot-jailbreak
  # OWASP LLM01 — Prompt Injection, LLM05 — Improper Output Handling
  # CWE-74 — Improper Neutralization of Special Elements in Output
  # ===========================================================================
  #
  # Many-Shot Jailbreaking (MSJ) embeds hundreds of fabricated Q&A demonstration
  # pairs in a document to override an LLM's safety alignment within a single
  # session. An AI coding agent that reads a file containing such a payload
  # effectively loads the attack into its context window.
  #
