    decision: "AUDIT"
    confidence: 0.80
    reason: "Non-interactive AI agent CLI invocation detected — auto-approval flags bypass human oversight and enable recursive agent spawning or authority escalation without confirmation (OWASP LLM06, LLM10). MITRE AML.T0034, AML.T0058."
