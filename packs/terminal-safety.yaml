  # ===================================================================
  # SHARED LIBRARY SEARCH PATH POISONING (RPATH/RUNPATH)
  # Taxonomy: privilege-escalation/library-hijack/rpath-runpath-poisoning
  # OWASP LLM06 — Excessive Agency; MITRE T1574.006, T1574.007
  # ===================================================================
  #
  # ELF binaries contain RPATH and RUNPATH entries that tell the dynamic
  # linker (ld.so) where to search for shared libraries BEFORE the
  # standard paths (/usr/lib, /lib). An attacker can:
  #
  #   1. Use chrpath/patchelf to inject a writable directory into RPATH:
  #        chrpath -r '/tmp/evil:$ORIGIN/../lib' /usr/bin/target
  #      Now any library loaded by 'target' is searched in /tmp/evil first
  #
  #   2. Set LD_LIBRARY_PATH to override library search order:
  #        export LD_LIBRARY_PATH=/tmp/evil
  #      Every subsequent dynamically linked binary loads attacker libs
  #
  #   3. Combine with a trojan library (same soname, malicious code):
  #        gcc -shared -o /tmp/evil/libssl.so.3 trojan.c
  #        chrpath -r /tmp/evil /usr/bin/openssl
  #      Now openssl loads the trojan libssl instead of the real one
  #
  # Unlike LD_PRELOAD (already covered), RPATH/chrpath is persistent
  # — the modified binary always loads from the poisoned path, even
  # when LD_PRELOAD is cleared. And LD_LIBRARY_PATH poisoning via
  # export is a broader form that affects all child processes.
  #
  # Note: patchelf --set-rpath is already partially covered by
  # ts-block-patchelf-hijack, but chrpath and LD_LIBRARY_PATH export
  # are not covered.

  # --- BLOCK: chrpath modifying RPATH/RUNPATH ---
  - id: "ts-block-chrpath-rpath-poison"
    taxonomy: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?chrpath\\s+(-r|--replace|-c|--convert|-d|--delete)"
    decision: "BLOCK"
    confidence: 0.92
    reason: "chrpath modifying RPATH/RUNPATH in an ELF binary — changes shared library search order to load attacker-controlled libraries before system libraries. Persistent: survives reboots and LD_PRELOAD resets. MITRE T1574.006."
    tests:
      tp:
        - "chrpath -r '/tmp/evil:$ORIGIN/../lib' /usr/bin/target"
        - "chrpath --replace /tmp/evil /usr/bin/openssl"
      tn:
        - "chrpath -l /usr/bin/python3"

  # --- BLOCK: export LD_LIBRARY_PATH to writable/temp directories ---
  - id: "ts-block-ld-library-path-poison"
    taxonomy: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
    match:
      command_regex: "export\\s+LD_LIBRARY_PATH=.*(/tmp|/dev/shm|/var/tmp|/run/|\\./|\\.\\./)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Exporting LD_LIBRARY_PATH pointing to a writable/temp directory — every subsequently launched binary searches this path first for shared libraries, enabling trojan library injection. Affects all child processes. MITRE T1574.007."
    tests:
      tp:
        - "export LD_LIBRARY_PATH=/tmp/evil:/usr/lib"
        - "export LD_LIBRARY_PATH=./libs:/dev/shm/lib"
      tn:
        - "export LD_LIBRARY_PATH=/usr/local/lib"

  # --- AUDIT: Any export LD_LIBRARY_PATH ---
  - id: "ts-audit-ld-library-path-export"
    taxonomy: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
    match:
      command_regex: "export\\s+LD_LIBRARY_PATH="
    decision: "AUDIT"
    confidence: 0.72
    reason: "Exporting LD_LIBRARY_PATH — changes shared library search order for all child processes. While sometimes legitimate (custom builds), it can be used for library hijacking. MITRE T1574.007."
    tests:
      tp:
        - "export LD_LIBRARY_PATH=/usr/local/lib"
        - "export LD_LIBRARY_PATH=/opt/myapp/lib"
      tn:
        - "echo $LD_LIBRARY_PATH"

  # --- BLOCK: chrpath any invocation (reconnaissance or modification) ---
  - id: "ts-audit-chrpath"
    taxonomy: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
    match:
      command_regex: "(^|&&|;|\\|\\s*)chrpath\\b"
    decision: "AUDIT"
    confidence: 0.75
    reason: "chrpath detected — tool for viewing and modifying RPATH/RUNPATH in ELF binaries. May indicate shared library hijacking preparation. MITRE T1574.006."
    tests:
      tp:
        - "chrpath -l /usr/bin/python3"
        - "chrpath /usr/bin/ls"
      tn:
        - "ldd /usr/bin/ls"

  # ===================================================================
  # DYNAMIC LINKER CACHE POISONING (ldconfig / ld.so.conf)
  # Taxonomy: privilege-escalation/library-hijack/rpath-runpath-poisoning
  # OWASP LLM06 — Excessive Agency; MITRE T1574.006
  # ===================================================================
  #
  # The Linux dynamic linker (ld.so) maintains a cache of known library
  # paths in /etc/ld.so.cache. This cache is rebuilt from:
  #   /etc/ld.so.conf     — main config listing search directories
  #   /etc/ld.so.conf.d/  — drop-in config snippets (one path per file)
  #
  # An attacker can poison this cache to inject libraries into ALL
  # dynamically linked programs on the system:
  #
  #   1. Write a malicious dir to ld.so.conf.d, then rebuild cache:
  #        echo '/tmp/evil' > /etc/ld.so.conf.d/evil.conf && ldconfig
  #      Now every program searches /tmp/evil before /usr/lib
  #
  #   2. Append directly to ld.so.conf:
  #        echo '/tmp/evil' >> /etc/ld.so.conf && ldconfig
  #
  #   3. Load a custom conf file directly:
  #        ldconfig -f /tmp/evil-ld.so.conf
  #      Rebuilds cache using attacker-controlled config
  #
  #   4. Install a trojan library and refresh cache:
  #        cp /tmp/libssl.so.3 /usr/local/lib/ && ldconfig
  #      Makes the trojan visible to all processes
  #
  # Unlike LD_PRELOAD (session-scoped) or RPATH modification (binary-scoped),
  # ld.so.conf.d writes are SYSTEM-WIDE and PERSISTENT — all users, all
  # processes, all reboots. Requires root on most systems, but an AI agent
  # with sudo access can execute this silently.
  #
  # TP examples:
  #   echo '/tmp/evil' > /etc/ld.so.conf.d/evil.conf && ldconfig
  #   ldconfig -f /tmp/custom.conf
  #   sudo ldconfig
  #   echo /tmp/evil >> /etc/ld.so.conf
  #
  # TN examples:
  #   ldconfig -p                  (print cache — read-only)
  #   cat /etc/ld.so.conf          (read config — no modification)
  #   ldconfig -v -N               (verbose, no-update)

  # --- BLOCK: writes to /etc/ld.so.conf or /etc/ld.so.conf.d/ ---
  - id: "ts-block-ldso-conf-write"
    taxonomy: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
    match:
      command_regex: "((echo|printf|cat)\\b[^|&;\\n]*>>?\\s*/etc/ld\\.so\\.conf(\\.d/\\S*)?\\b|\\btee\\b[^|&;\\n]*\\s/etc/ld\\.so\\.conf(\\.d/\\S*)?\\b|(cp|mv)\\b[^|&;\\n]*\\s/etc/ld\\.so\\.conf(\\.d/\\S*)?\\b)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Writing to /etc/ld.so.conf or /etc/ld.so.conf.d/ injects a new library search path into the system-wide dynamic linker configuration. After ldconfig rebuilds the cache, every dynamically linked program on the system will search the attacker-controlled directory before system libraries. System-wide and persistent across reboots. MITRE T1574.006, CWE-426."
    tests:
      tp:
        - "echo '/tmp/evil' > /etc/ld.so.conf.d/evil.conf"
        - "echo '/tmp/evil' >> /etc/ld.so.conf"
      tn:
        - "cat /etc/ld.so.conf"

  # --- BLOCK: ldconfig loading an attacker-supplied config file ---
  - id: "ts-block-ldconfig-custom-conf"
    taxonomy: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?ldconfig\\s+(-f|--format)\\s+\\S"
    decision: "BLOCK"
    confidence: 0.95
    reason: "ldconfig -f <file> rebuilds the dynamic linker cache from an attacker-supplied config file — bypasses /etc/ld.so.conf.d/ monitoring and loads arbitrary directories into the system-wide library cache. MITRE T1574.006."
    tests:
      tp:
        - "ldconfig -f /tmp/evil-ld.so.conf"
        - "sudo ldconfig --format /tmp/custom.conf"
      tn:
        - "ldconfig -p"

  # --- AUDIT: standalone ldconfig (could activate prior cache poisoning) ---
  - id: "ts-audit-ldconfig-run"
    taxonomy: "privilege-escalation/library-hijack/rpath-runpath-poisoning"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?ldconfig\\b"
      command_regex_exclude: "ldconfig\\s+(-p|--print-cache|-N|--dont-build-cache|-v|--verbose)\\b"
    decision: "AUDIT"
    confidence: 0.80
    reason: "ldconfig invoked without read-only flags — rebuilds the system-wide dynamic linker cache. If /etc/ld.so.conf.d/ was modified prior to this command (within the session), this activates the library path injection. Review for combined ldconfig cache poisoning. MITRE T1574.006."
    tests:
      tp:
        - "sudo ldconfig"
        - "ldconfig /usr/local/lib"
      tn:
        - "ldconfig -p"

  # =========================================================================
  # TOCTOU Check-Then-Execute on World-Writable Paths
  # =========================================================================
  #
  # The pattern `[ -f /tmp/script.sh ] && source /tmp/script.sh` is a
  # classic TOCTOU (time-of-check-time-of-use) race condition (CWE-367).
  #
  # Between the existence check (test -f, [ -f ], [[ -f ]]) and the use
  # (source, ., bash, sh, exec, chmod +x), an attacker with write access
  # to the same directory can:
  #   1. Delete the original file
  #   2. Replace it with a malicious script (or symlink)
  #   3. The agent sources/executes attacker-controlled code
  #
  # World-writable directories (/tmp, /dev/shm, /var/tmp, /run) are
  # especially dangerous because any local process can modify files.
  #
  # This is particularly relevant for AI agents because:
  #   - Agents frequently create temp files for multi-step operations
  #   - The check-then-use pattern feels "safe" to the agent
  #   - The race window is reliably exploitable with inotifywait
  #
  # CWE-367 — Time-of-check Time-of-use (TOCTOU) Race Condition
  # CWE-377 — Insecure Temporary File
  # MITRE T1036.005 — Masquerading: Match Legitimate Name or Location

  # --- BLOCK: check-then-source/dot-source in world-writable dirs ---
  - id: "ts-block-toctou-source-tmp"
    taxonomy: "persistence-evasion/fileless-execution/toctou-temp-file-race"
    match:
      command_regex: "(\\[\\[?\\s+-[fexr]\\s+|test\\s+-[fexr]\\s+)(/tmp/|/dev/shm/|/var/tmp/|/run/)\\S+\\s*\\]?\\]?\\s*(&&|;)\\s*(source|\\.)\\s+(/tmp/|/dev/shm/|/var/tmp/|/run/)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Check-then-source on a world-writable path — classic TOCTOU race condition. Between the existence check and the source command, an attacker can replace the file with malicious code. The agent will execute attacker-controlled content believing it verified the file. CWE-367, MITRE T1036.005."
    tests:
      tp:
        - "[ -f /tmp/script.sh ] && source /tmp/script.sh"
        - "test -f /dev/shm/init.sh ] && . /dev/shm/init.sh"
      tn:
        - "source ./setup.sh"

  # --- BLOCK: check-then-execute (bash/sh/exec) in world-writable dirs ---
  - id: "ts-block-toctou-exec-tmp"
    taxonomy: "persistence-evasion/fileless-execution/toctou-temp-file-race"
    match:
      command_regex: "(\\[\\[?\\s+-[fexr]\\s+|test\\s+-[fexr]\\s+)(/tmp/|/dev/shm/|/var/tmp/|/run/)\\S+\\s*\\]?\\]?\\s*(&&|;)\\s*(bash|sh|zsh|dash|ksh|exec|chmod\\s+\\+x)\\s+(/tmp/|/dev/shm/|/var/tmp/|/run/)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Check-then-execute on a world-writable path — TOCTOU race window allows file substitution between the test and the shell execution. Attacker can replace the checked file with a payload. CWE-367, MITRE T1036.005."
    tests:
      tp:
        - "[ -f /tmp/script.sh ] && bash /tmp/script.sh"
        - "test -x /dev/shm/run.sh ] && sh /dev/shm/run.sh"
      tn:
        - "bash ./test.sh"

  # --- BLOCK: check-then-direct-execute in world-writable dirs ---
  - id: "ts-block-toctou-direct-exec-tmp"
    taxonomy: "persistence-evasion/fileless-execution/toctou-temp-file-race"
    match:
      command_regex: "(\\[\\[?\\s+-x\\s+|test\\s+-x\\s+)(/tmp/|/dev/shm/|/var/tmp/|/run/)\\S+\\s*\\]?\\]?\\s*(&&|;)\\s*(/tmp/|/dev/shm/|/var/tmp/|/run/)\\S+"
    decision: "BLOCK"
    confidence: 0.94
    reason: "Check-then-direct-execute on a world-writable path — tests if file is executable then runs it directly. The same TOCTOU race applies: the file can be replaced between check and execution. CWE-367."
    tests:
      tp:
        - "[[ -x /tmp/run.sh ]] && /tmp/run.sh"
        - "test -x /var/tmp/app ] && /var/tmp/app"
      tn:
        - "./run.sh"

  # --- AUDIT: check-then-read (cat/less/head) in world-writable dirs ---
  - id: "ts-audit-toctou-read-tmp"
    taxonomy: "persistence-evasion/fileless-execution/toctou-temp-file-race"
    match:
      command_regex: "(\\[\\[?\\s+-[fexr]\\s+|test\\s+-[fexr]\\s+)(/tmp/|/dev/shm/|/var/tmp/|/run/)\\S+\\s*\\]?\\]?\\s*(&&|;)\\s*(cat|less|head|tail|more)\\s+(/tmp/|/dev/shm/|/var/tmp/|/run/)"
    decision: "AUDIT"
    confidence: 0.70
    reason: "Check-then-read on a world-writable path — lower risk than execute but still a TOCTOU pattern. The read content may differ from what was checked. CWE-367."
