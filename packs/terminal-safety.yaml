  # =====================================================================
  # xattr / setfattr — Data hiding in extended attributes
  # =====================================================================
  #
  # Extended attributes (xattrs) are file metadata invisible to standard
  # tools (ls, cat, find). Attackers can hide exfiltrated data in xattrs:
  #
  #   xattr -w user.data "$(cat ~/.ssh/id_rsa)" /tmp/innocent.txt
  #   setfattr -n user.hidden -v "$(cat /etc/shadow)" /tmp/notes.txt
  #
  # The file /tmp/innocent.txt appears normal — `cat`, `file`, `ls -la`
  # all show nothing suspicious. But `xattr -p user.data /tmp/innocent.txt`
  # or `getfattr -n user.hidden /tmp/notes.txt` retrieves the hidden data.
  #
  # This is a blind spot in most security tools: file content scanners
  # don't inspect xattrs, and the data persists across cp (with -a) and
  # tar (with --xattrs).
  #
  # macOS: xattr -w <name> <value> <file>
  # Linux: setfattr -n <name> -v <value> <file>
  #
  # MITRE T1564.004 — Hide Artifacts: NTFS File Attributes (xattr analog)

  # --- BLOCK: xattr -w with command substitution (data hiding) ---
  - id: "ts-block-xattr-write-subshell"
    taxonomy: "data-exfiltration/steganography/xattr-data-hiding"
    match:
      command_regex: "(xattr\\s+-w|setfattr\\s+-n)\\s+\\S+\\s+.*\\$\\("
    decision: "BLOCK"
    confidence: 0.93
    reason: "Writing command substitution output to extended attributes — hides exfiltrated data (credentials, keys, secrets) in file metadata invisible to standard tools. MITRE T1564.004."
    tests:
      tp:
        - 'xattr -w user.data "$(cat ~/.ssh/id_rsa)" /tmp/innocent.txt'
        - 'setfattr -n user.hidden -v "$(cat /etc/shadow)" /tmp/notes.txt'
      tn:
        - "xattr -w com.apple.quarantine '' file.zip"

  # --- BLOCK: xattr -w with backtick substitution ---
  - id: "ts-block-xattr-write-backtick"
    taxonomy: "data-exfiltration/steganography/xattr-data-hiding"
    match:
      command_regex: "(xattr\\s+-w|setfattr\\s+-n)\\s+\\S+\\s+.*`"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Writing backtick command output to extended attributes — hides exfiltrated data in file metadata invisible to standard tools. MITRE T1564.004."
    tests:
      tp:
        - "xattr -w user.data `cat ~/.ssh/id_rsa` /tmp/innocent.txt"
        - "setfattr -n user.hidden `cat /etc/passwd` /tmp/notes.txt"
      tn:
        - "xattr -w com.apple.quarantine '' file.zip"

  # --- AUDIT: Any xattr write or setfattr ---
  - id: "ts-audit-xattr-write"
    taxonomy: "data-exfiltration/steganography/xattr-data-hiding"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?((xattr\\s+-w)|(setfattr\\s+(-n|--name)))"
    decision: "AUDIT"
    confidence: 0.70
    reason: "Writing extended attributes to a file — xattrs are invisible to standard tools and can hide arbitrary data. Legitimate for metadata tagging, but AI agents rarely need this. MITRE T1564.004."
    tests:
      tp:
        - "xattr -w com.custom.tag myvalue file.txt"
        - "setfattr -n user.comment -v 'test' file.txt"
