  # =====================================================================
  # fallocate / truncate -s — Disk-filling denial of service
  # =====================================================================
  #
  # fallocate creates files of arbitrary size nearly instantly by
  # allocating disk space without writing data:
  #
  #   fallocate -l 100G /tmp/fill      # instant 100GB allocation
  #   truncate -s 100T /tmp/sparse     # 100TB sparse file (metadata DoS)
  #   head -c 10G /dev/zero > /tmp/f   # slow but effective disk fill
