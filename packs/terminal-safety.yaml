  # ===================================================================
  # GUARDRAIL EVASION VIA ENCODING (issue #321)
  # Taxonomy: unauthorized-execution/agentic-attacks/guardrail-evasion-via-encoding
  # OWASP LLM01 — Prompt Injection; MITRE T1027.013
  # ===================================================================

  # === BLOCK: Base64-encoded payload decoded and piped to shell ===
  #
  # Encoding a command in base64 and decoding it at runtime is a classic
  # technique to bypass string-based guardrails. An AI agent can instruct
  # a user to run: echo "cm0gLXJmIC8=" | base64 -d | bash
  # The instruction looks innocuous when the AI outputs it; the guardrail
  # only sees the base64 string, not the decoded destructive command.
  #
  # Pattern family:
