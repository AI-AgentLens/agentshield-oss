  - id: "ts-audit-cross-context-env-find"
    taxonomy: "data-exfiltration/llm-data-flow/cross-context-data-contamination"
    match:
      command_regex: "find\\s+(~|\\$HOME|~/dev|~/workspace|~/projects)\\b.*-name\\s+['\"]?\\.env['\"]?"
    decision: "AUDIT"
    confidence: 0.85
