  - id: "ts-block-alias-body-exfil"
    taxonomy: "persistence-evasion/shell-init/alias-interception"
    match:
      command_regex: "\\balias\\s+\\w+=['\"][^'\"]*\\b(curl|wget|nc|ncat|/dev/tcp|base64|xxd|eval|exec)\\b[^'\"]*['\"]"
      command_regex_exclude: "^(echo|printf)\\s|^(gh|git)\\s.*(?:--(?:body|body-file|message|notes|description|title|annotation|comment)\\b|\\s-m\\s)|^\\s*cat\\s+>>?\\s+\\S+\\s+<<"
    decision: "BLOCK"
    confidence: 0.90
    reason: "Alias definition containing network exfiltration or code execution commands — regardless of the alias name, embedding curl/wget/nc/eval in an alias value signals credential interception or data exfiltration intent. MITRE T1041, T1546.004."
    tests:
