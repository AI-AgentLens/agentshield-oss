    confidence: 0.93
    reason: "Writing to ~/.bash_aliases establishes persistent shell alias definitions loaded on every interactive session. AI agents writing to .bash_aliases can silently intercept and redirect security-critical commands. MITRE T1546.004."
    tests:
      tp:
