  - id: "ts-block-journalctl-exfil"
    taxonomy: "data-exfiltration/log-extraction/journalctl-network-exfil"
    match:
      command_regex: "journalctl\\s+.*\\|\\s*.*(curl|wget|nc|ncat|socat|ssh|scp|rsync|telnet|ftp)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "journalctl piped to network command — exfiltrating system logs which may contain credentials from failed logins, sudo commands, and service environment variables. MITRE T1005, T1048."
