  #     - pip to read ~/.pip/pip.conf (can set index-url to malicious PyPI)
  #     - gpg to read ~/.gnupg/ from /tmp/evil/.gnupg/ (fake keyring)
  #     - kubectl to read ~/.kube/config (fake cluster endpoint)
  #
  #   XDG_CONFIG_HOME=/tmp/evil causes:
  #     - git to read $XDG_CONFIG_HOME/git/config (alternative to ~/.gitconfig)
  #     - pip to read $XDG_CONFIG_HOME/pip/pip.conf
  #     - Many other XDG-compliant tools
