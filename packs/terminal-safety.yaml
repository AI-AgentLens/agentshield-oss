          - executable_any: ["npm", "npx", "yarn", "pnpm", "cargo", "go", "mvn", "gradle", "gradlew", "pip", "pip3", "pytest", "jest", "mocha", "vitest", "rspec", "bundle"]
            operator: "|"
          - executable_any: ["bash", "sh", "zsh", "dash", "fish", "python", "python3", "node", "ruby", "perl"]
    decision: "BLOCK"
    confidence: 0.90
    reason: "Build tool output piped to shell interpreter — a compromised dependency can embed prompt injection payloads in error messages or test output that execute immediately. No legitimate workflow requires piping build stdout to an interpreter; use grep/tee/redirect instead. OWASP LLM01, CWE-77."
    tests:
      tp:
        - "npm test | bash"
