    decision: "BLOCK"
    confidence: 0.92
    reason: "env -i (empty environment) with shell/interpreter execution — strips ALL environment variables including security controls (PATH restrictions, LD_PRELOAD guards, monitoring hooks) before launching a shell. Creates a clean-slate execution context invisible to environment-based security monitoring. MITRE T1562.001, T1070.004, CWE-250."
