  # === SSH Agent Socket Abuse ===
  #
  # The SSH agent holds decrypted private keys in memory. An AI agent with
  # shell access can enumerate, delete, or add keys — or hijack a different
  # user's agent socket — enabling credential theft and lateral movement.
  #
  # TP examples:
  #   ssh-add -L                               # enumerate loaded public keys
  #   SSH_AUTH_SOCK=/tmp/ssh-abc/agent.123 ssh-add -L   # hijack another user's agent
  #   ssh-add -D                               # delete all keys from agent (sabotage)
  #   ssh-add /tmp/mykey                       # load a key into the agent
  #
  # TN examples:
  #   ssh-add -l                               # list fingerprints (already AUDIT by default)
  #   ssh user@host                            # normal SSH connection

  - id: "sec-audit-ssh-add-list-keys"
    taxonomy: "credential-exposure/private-key-access/ssh-agent-socket-abuse"
    match:
      command_regex: "\\bssh-add\\s+-[a-zA-Z]*L\\b"
    decision: "AUDIT"
    confidence: 0.85
    reason: "ssh-add -L enumerates all public keys loaded in the SSH agent — reconnaissance step before lateral movement. Review before allowing. MITRE T1552.004, T1563.001, OWASP LLM06."

  - id: "sec-block-ssh-add-delete-all"
    taxonomy: "credential-exposure/private-key-access/ssh-agent-socket-abuse"
    match:
      command_regex: "\\bssh-add\\s+-[a-zA-Z]*D\\b"
    decision: "BLOCK"
    confidence: 0.97
    reason: "ssh-add -D deletes all keys from the SSH agent — sabotage that could lock users out of remote systems or disrupt CI/CD pipelines. AI agents must not modify SSH agent state. MITRE T1531, OWASP LLM06."

  - id: "sec-block-ssh-agent-socket-hijack"
    taxonomy: "credential-exposure/private-key-access/ssh-agent-socket-abuse"
    match:
      command_regex: "SSH_AUTH_SOCK=\\S+\\s+ssh(?:-add|\\s)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "SSH_AUTH_SOCK override with ssh or ssh-add — hijacks a different user's SSH agent socket to enumerate or use their loaded keys for lateral movement. MITRE T1563.001, OWASP LLM06."

  - id: "sec-audit-ssh-add-key"
    taxonomy: "credential-exposure/private-key-access/ssh-agent-socket-abuse"
    match:
      command_regex: "\\bssh-add\\s+(?!-)[^-]\\S+"
    decision: "AUDIT"
    confidence: 0.80
    reason: "ssh-add with a keyfile path — loads a private key into the SSH agent. Could be loading a stolen or unauthorized key. Review the key path before allowing. MITRE T1552.004, OWASP LLM06."

