    decision: "AUDIT"
    confidence: 0.70
    reason: "Accessing NetworkManager system-connections directory — lists VPN and network connection profiles. Individual .nmconnection files may contain embedded credentials. Auditing for visibility. MITRE T1552.001."

  # ============================================================
  # Docker Build Credential Injection (issue #622)
  # Taxonomy: credential-exposure/container-config/docker-build-credential-injection
  # OWASP LLM06 — Excessive Agency; MITRE T1552.001, T1552.004
  # ============================================================
  #
  # Docker BuildKit provides three mechanisms that can expose credentials during
  # image builds:
  #
  # 1. --build-arg with credential env vars: baked into image metadata visible
  #    via `docker history --no-trunc` to anyone with image access.
  # 2. --secret src= with credential files: credential mounted into build context
  #    accessible by ALL RUN --mount=type=secret instructions including those in
  #    malicious transitive base images.
  # 3. --ssh default: SSH agent socket forwarded to all RUN --mount=type=ssh
  #    instructions; a malicious base image RUN can use loaded keys for lateral
  #    movement or exfiltration.
  #
  # Detection notes:
  # - --build-arg: match credential-themed ARG names (KEY, TOKEN, SECRET, PASSWORD,
  #   CREDENTIAL) using env var substitution ($VAR) or inline values.
  # - --secret src=: match src= pointing to well-known credential directories.
  # - --ssh: any --ssh flag on docker build is sufficient to audit; the risk
  #   materialises from the Dockerfile content, not the command alone.
  #
  # False-positive avoidance:
  # - Allow --build-arg APP_VERSION=1.0, NODE_ENV=production (no credential terms).
  # - Allow docker build without any of these flags.

  # --- AUDIT: docker build --build-arg with credential-named variable ---
  #
  # Examples (TP):
  #   docker build --build-arg API_KEY=$OPENAI_API_KEY .
  #   docker build --build-arg AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID .
  #   docker build --build-arg DATABASE_PASSWORD=secret123 .
  #
  # Examples (TN):
  #   docker build --build-arg NODE_ENV=production .
  #   docker build --build-arg APP_VERSION=1.2.3 .
  #   docker build -t myapp .
  - id: "sec-audit-docker-build-arg-secret"
    taxonomy: "credential-exposure/container-config/docker-build-credential-injection"
    match:
      command_regex: "\\bdocker\\s+build\\b[^|&;\\n]*--build-arg\\s+['\"]?\\w*(?:API[_-]?KEY|ACCESS[_-]?KEY|SECRET(?:[_-]?KEY|[_-]?ACCESS)?|TOKEN|PASSWORD|PASSWD|CREDENTIAL|AUTH[_-]?KEY|PRIVATE[_-]?KEY|CLIENT[_-]?SECRET|SIGNING[_-]?KEY)\\w*[=\\s]"
    decision: "AUDIT"
    confidence: 0.88
    reason: "docker build --build-arg passing a credential-named variable bakes it into the Docker image manifest, visible via 'docker history --no-trunc' to anyone with image access. Rotate the credential after the build and prefer Docker BuildKit --secret for runtime secrets. MITRE T1552.001, OWASP LLM06."

  # --- BLOCK: docker build --secret src= pointing to credential file ---
  #
  # Examples (TP):
  #   docker build --secret id=aws,src=~/.aws/credentials .
  #   docker build --secret id=key,src=~/.ssh/id_rsa .
  #   docker build --secret id=kubeconf,src=~/.kube/config .
  #
  # Examples (TN):
  #   docker build --secret id=npmrc,src=.npmrc .
  #   docker build --secret id=gitconfig,src=.gitconfig .
  - id: "sec-block-docker-build-secret-cred-file"
    taxonomy: "credential-exposure/container-config/docker-build-credential-injection"
    match:
      command_regex: "\\bdocker\\s+build\\b[^|&;\\n]*--secret\\s+[^|&;\\n]*src=['\"]?(?:~/|\\$HOME/|/root/|/home/[^/]+/)?\\.(?:aws/|ssh/|gnupg/|kube/|config/gcloud/)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "docker build --secret src= passing a production credential file (~/.aws/, ~/.ssh/, ~/.kube/) to the build context exposes it to all RUN --mount=type=secret instructions in the Dockerfile, including those in malicious transitive base images. Use per-build scoped credentials instead. MITRE T1552.001, T1552.004."

  # --- AUDIT: docker build --ssh forwarding SSH agent socket ---
  #
  # Examples (TP):
  #   docker build --ssh default .
  #   docker build --ssh default=$SSH_AUTH_SOCK .
  #   docker buildx build --ssh default .
  #
  # Examples (TN):
  #   docker build -t myapp .
  #   docker build --build-arg NODE_ENV=production .
  - id: "sec-audit-docker-build-ssh-forward"
    taxonomy: "credential-exposure/container-config/docker-build-credential-injection"
    match:
      command_regex: "\\bdocker(?:x)?\\s+build\\b[^|&;\\n]*--ssh\\s+"
    decision: "AUDIT"
    confidence: 0.85
    reason: "docker build --ssh forwards the SSH agent socket into the Docker build environment, allowing all RUN --mount=type=ssh instructions (including those in untrusted base images) to authenticate using any key loaded in the SSH agent. Review the Dockerfile for malicious RUN --mount=type=ssh instructions before proceeding. MITRE T1552.004, OWASP LLM06."
