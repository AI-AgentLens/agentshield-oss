  # --- BLOCK: IPsec secrets file access ---
  # /etc/ipsec.secrets and /etc/swanctl/conf.d/ contain PSKs and RSA keys.
  - id: "sec-block-ipsec-secrets-read"
    taxonomy: "credential-exposure/cryptographic-keys/vpn-credential-theft"
    match:
      command_regex: "(?:^|&&|;|\\|\\s*)(?:sudo\\s+)?(?:cat|less|more|head|tail|base64|strings)\\s+['\"]?(?:/etc/ipsec\\.secrets|/etc/ipsec\\.conf|/etc/swanctl/conf\\.d/[^\\s'\"]+|/etc/strongswan\\.conf)['\"]?"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Reading IPsec/strongSwan secrets or config — /etc/ipsec.secrets contains pre-shared keys and RSA private keys for IKEv1/IKEv2 VPN authentication. Stolen credentials enable unauthorized VPN tunnel establishment. MITRE T1552.004, T1133."

  # --- AUDIT: NetworkManager system-connections listing ---
