  # === BLOCK: Kerberos credential theft ===
  #
  # Kerberos keytab files contain long-term key material for service accounts.
  # Reading them enables offline credential cracking (Kerberoasting) and full
  # service impersonation. AI agents have no legitimate need to access keytab files.
  #
  # TP examples:
  #   cat /etc/krb5.keytab
  #   base64 /etc/krb5.keytab
  #   cp /etc/krb5.keytab /tmp/steal.keytab
  #   kinit -k -t /etc/krb5.keytab host/server@REALM
  #   klist -e -k /etc/krb5.keytab
  #
  # TN examples:
  #   klist              # list current user tickets (read-only, no key material)
  #   kinit user@REALM   # interactive kinit prompt — no keytab involved
  #   ls /etc/           # directory listing, does not expose key material
  - id: "sec-block-keytab-file-read"
    taxonomy: "credential-exposure/cryptographic-keys/kerberos-keytab-theft"
    match:
      command_regex: "(?:cat|base64|xxd|od|strings|hexdump|cp|mv|scp|rsync|curl|wget)\\s+.*\\.keytab\\b"
    decision: "BLOCK"
    confidence: 0.97
    reason: "Keytab file access detected — keytab files contain hashed Kerberos service credentials enabling offline cracking and service account impersonation. AI agents must never read or exfiltrate keytab files. MITRE T1558.003, T1552.004, OWASP LLM06."

  - id: "sec-block-kinit-keytab"
    taxonomy: "credential-exposure/cryptographic-keys/kerberos-keytab-theft"
    match:
      command_regex: "\\bkinit\\b.*\\s+-[a-zA-Z]*k[a-zA-Z]*\\s"
    decision: "BLOCK"
    confidence: 0.95
    reason: "kinit with keytab flag (-k) impersonates a service account using long-term key material — an AI agent using this pattern could silently assume a privileged service identity. MITRE T1558.003, T1550.003, OWASP LLM06."

  - id: "sec-audit-klist-keytab"
    taxonomy: "credential-exposure/cryptographic-keys/kerberos-keytab-theft"
    match:
      command_regex: "\\bklist\\b.*\\s+-[a-zA-Z]*k[a-zA-Z]*"
    decision: "AUDIT"
    confidence: 0.90
    reason: "klist with keytab flag enumerates service principals and encryption types in a keytab file — reconnaissance step for Kerberoasting. Review before allowing. MITRE T1558.003, OWASP LLM06."

  - id: "sec-block-krb5cc-copy"
    taxonomy: "credential-exposure/cryptographic-keys/kerberos-keytab-theft"
    match:
      command_regex: "(?:cp|mv|scp|rsync|cat|base64)\\s+.*\\bkrb5cc_"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Kerberos ticket cache (krb5cc_*) copy or read detected — ticket caches contain active Kerberos TGTs that can be replayed for lateral movement without knowing the password. MITRE T1558, T1550.003, OWASP LLM06."

  # === BLOCK/AUDIT: VPN Credential Theft ===
  #
  # WireGuard configs (/etc/wireguard/*.conf), NetworkManager VPN profiles
  # (/etc/NetworkManager/system-connections/*.nmconnection), and IPsec secrets
  # (/etc/ipsec.secrets) contain private keys, pre-shared keys, and VPN
  # credentials. Reading these files grants unauthorized VPN network access.
  #
  # TP examples:
  #   cat /etc/wireguard/wg0.conf                  # WireGuard PrivateKey + PresharedKey
  #   wg showconf wg0                               # dumps running config with all keys
  #   nmcli --show-secrets connection show Corp-VPN # explicit secret dump
  #   nmcli connection export Corp-VPN /tmp/x.ovpn  # full VPN config with creds
  #   cat /etc/ipsec.secrets                        # IPsec PSK and RSA keys
  #
  # TN examples:
  #   wg show                                       # interface status (no keys)
  #   systemctl status wg-quick@wg0                 # service status
  #   nmcli connection show                         # connection list (no secrets)
  #
  # MITRE T1552.004 — Unsecured Credentials: Private Keys
  # MITRE T1133 — External Remote Services (VPN access via stolen key)
  # Taxonomy: credential-exposure/cryptographic-keys/vpn-credential-theft

  # --- BLOCK: WireGuard config file direct read ---
  # /etc/wireguard/*.conf contains PrivateKey (Curve25519) and PresharedKey.
  - id: "sec-block-wireguard-conf-read"
    taxonomy: "credential-exposure/cryptographic-keys/vpn-credential-theft"
    match:
      command_regex: "(?:^|&&|;|\\|\\s*)(?:sudo\\s+)?(?:cat|less|more|head|tail|base64|xxd|strings)\\s+['\"]?(?:/etc/wireguard/[^\\s'\"]+\\.conf|/usr/local/etc/wireguard/[^\\s'\"]+\\.conf)['\"]?"
    decision: "BLOCK"
    confidence: 0.95
    reason: "Reading a WireGuard configuration file — contains raw Curve25519 PrivateKey and optional PresharedKey. Equivalent to SSH private key theft: grants permanent VPN access to all peers in the AllowedIPs list. MITRE T1552.004, T1133."

  # --- BLOCK: wg showconf — exports running interface config with all keys ---
  - id: "sec-block-wg-showconf"
    taxonomy: "credential-exposure/cryptographic-keys/vpn-credential-theft"
    match:
      command_regex: "(?:^|&&|;|\\|\\s*)(?:sudo\\s+)?wg\\s+showconf\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "wg showconf dumps the complete running WireGuard interface configuration including PrivateKey and all PresharedKeys — equivalent to reading the config file but bypasses file permission checks on the config directory. MITRE T1552.004."

  # --- AUDIT: wg show — interface enumeration (no raw key material) ---
  - id: "sec-audit-wg-show"
    taxonomy: "credential-exposure/cryptographic-keys/vpn-credential-theft"
    match:
      command_regex: "(?:^|&&|;|\\|\\s*)(?:sudo\\s+)?wg\\s+(?:show|genkey|pubkey)\\b"
    decision: "AUDIT"
    confidence: 0.75
    reason: "wg show lists active WireGuard interfaces and peer public keys (no private key material); wg genkey/pubkey generate new key material that may be stored unsafely. Auditing for visibility. MITRE T1133."

  # --- BLOCK: nmcli --show-secrets — explicit credential dump ---
  - id: "sec-block-nmcli-show-secrets"
    taxonomy: "credential-exposure/cryptographic-keys/vpn-credential-theft"
    match:
      command_regex: "(?:^|&&|;|\\|\\s*)(?:sudo\\s+)?nmcli\\s+.*--show-secrets\\b"
    decision: "BLOCK"
