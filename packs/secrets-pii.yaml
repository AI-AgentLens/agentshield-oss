name: "Secrets & PII Protection"
description: "Prevent credential exfiltration, accidental secret exposure, and PII leakage"
version: "1.0.0"
author: "AgentShield Security Research"

defaults:
  protected_paths:
    - "~/.ssh/**"
    - "~/.aws/**"
    - "~/.gnupg/**"
    - "~/.config/gcloud/**"
    - "~/.kube/**"
    - "~/.docker/config.json"
    - "~/.npmrc"
    - "~/.pypirc"
    - "~/.netrc"
    - "~/.git-credentials"
    - "~/.config/gh/**"
    - "~/.vault-token"
    - "~/.terraform.d/**"

rules:
  # === BLOCK: Direct credential file access ===
  - id: "sec-block-ssh-private"
    taxonomy: "credential-exposure/private-key-access/ssh-private-key-read"
    match:
      command_regex: "\\.(ssh|gnupg)/(id_[^.\\s\"']+([\\s\"']|$)|private|secret)"
      command_regex_exclude: "^(echo|printf)\\s|--(?:body|message|notes|description|title|annotation|comment)\\s+[\"']?[^\"';|&]*\\.(?:ssh|gnupg)/|-[mb]\\s+[\"']?[^\"';|&]*\\.(?:ssh|gnupg)/|^\\s*cat\\s+>>?\\s+\\S+\\s+<<|agentshield\\s+mcp-eval\\s"
    decision: "BLOCK"
    reason: "Direct access to private key files is blocked. Excludes commands where the SSH path appears as a text payload in a named flag value (e.g. gh --body, git commit -m), as a heredoc body in a cat file-write operation, as an echo/printf argument, or as a test input to agentshield mcp-eval."

  - id: "sec-block-etc-shadow"
    taxonomy: "credential-exposure/password-db-access/system-shadow-read"
    match:
      command_regex: "(/etc/shadow|/etc/master\\.passwd)"
      command_regex_exclude: "^(echo|printf)\\s|^(gh|git)\\s.*(?:--(?:body|body-file|message|notes|description|title|annotation|comment)\\b|-[mb]\\s+[\"'])|^curl\\s.*(?:-d\\s+[\"']|--data(?:-raw|-binary|-urlencode)?\\s+[\"'])|--(?:body|body-file|message|notes|description|title|annotation|comment)\\s+[\"']?[^\"';|&]*/etc/|^\\s*cat\\s+(?:>|<<)|agentshield\\s+mcp-eval\\s"
    decision: "BLOCK"
    reason: "Access to system password database is blocked. Excludes commands where the path appears as a text payload in a named flag value (--body/--body-file/--message to gh/git, -m for git commit/tag, -d/--data to curl), as heredoc content written via cat, or as a test input to agentshield mcp-eval."

  - id: "sec-block-keychain"
    taxonomy: "credential-exposure/password-db-access/keychain-extraction"
    match:
      command_regex: "(security\\s+find-(generic|internet)-password|security\\s+dump-keychain)"
      command_regex_exclude: "^(echo|printf)\\s|^(gh|git)\\s.*--(?:body|message|notes|description|title|annotation|comment)\\b"
    decision: "BLOCK"
    reason: "macOS Keychain extraction is blocked. Excludes commands where the keychain invocation appears as documentation text in a --body or --message flag passed to gh or git."

  # === BLOCK: Linux credential store extraction ===
  #
  # Linux has several CLI-accessible credential stores that are analogous
  # to macOS Keychain but completely uncovered until now:
  #
  #   secret-tool — CLI for the freedesktop.org Secret Service API
  #                 (GNOME Keyring, KDE Wallet). Queries return plaintext.
  #       secret-tool lookup service github.com
  #       secret-tool search --all service github
  #
  #   pass — the standard Unix password store (~/.password-store/).
  #          GPG-encrypted, but `pass show` decrypts to stdout.
  #       pass show cloud/aws-access-key
  #       pass -c work/database-password  (copies to clipboard)
  #
  #   gopass — pass-compatible enhanced store.
  #       gopass show -o work/database-password
  #
  #   keepassxc-cli — CLI for KeePassXC databases.
  #       keepassxc-cli show ~/Passwords.kdbx github -s
  #       keepassxc-cli clip ~/Passwords.kdbx github
  #       keepassxc-cli totp ~/Passwords.kdbx github  (TOTP codes!)
  #
  # These are high-value targets: a single `pass show` or `secret-tool lookup`
  # can silently extract production database passwords, cloud access keys,
  # or API tokens. AI agents may invoke them during "authentication debugging"
  # or when prompted to "check stored credentials."
  #
  # MITRE T1555.004 — Credentials from Password Stores: Linux Credential Managers
  # CWE-522 — Insufficiently Protected Credentials

  # --- BLOCK: secret-tool credential lookup/search ---
  - id: "sec-block-linux-secret-tool"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?secret-tool\\s+(lookup|search|store)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "secret-tool accessing the freedesktop.org Secret Service (GNOME Keyring / KDE Wallet) — returns stored credentials in plaintext. A single lookup can expose cloud keys, database passwords, or API tokens without any user prompt. MITRE T1555.004."

  # --- BLOCK: pass show / pass -c (decrypt and reveal/copy password) ---
  - id: "sec-block-linux-pass-show"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?pass\\s+(show|\\-c|\\-\\-clip|otp|generate)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "pass (Unix password store) decrypting and revealing/copying a stored password — GPG-encrypted at rest but decrypted to stdout/clipboard on 'show' or '-c'. 'generate' creates new entries that may overwrite existing ones. MITRE T1555.004."

  # --- BLOCK: gopass show (pass-compatible enhanced store) ---
  - id: "sec-block-linux-gopass-show"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?gopass\\s+(show|otp|cat|\\-c|\\-\\-clip)"
    decision: "BLOCK"
    confidence: 0.93
    reason: "gopass decrypting and revealing a stored password — pass-compatible enhanced credential store. 'show', 'cat', and '-c' expose plaintext secrets. MITRE T1555.004."

  # --- BLOCK: keepassxc-cli credential extraction ---
  - id: "sec-block-linux-keepassxc-cli"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?keepassxc-cli\\s+(show|clip|totp|export|extract|attachment-export)"
    decision: "BLOCK"
    confidence: 0.95
    reason: "keepassxc-cli extracting credentials from a KeePassXC database — 'show' reveals passwords, 'clip' copies to clipboard, 'totp' generates 2FA codes, 'export' dumps the entire database. MITRE T1555.004."

  # === BLOCK/AUDIT: Linux kernel keyring (keyctl) credential extraction ===
  #
  # The Linux kernel keyring is a kernel-level credential caching facility used by:
  #   - OpenSSH / PAM: passphrase and session token caching
  #   - LUKS/cryptsetup: disk encryption key caching
  #   - Kerberos (pam_krb5): TGT caching in kernel keyring
  #   - ecryptfs: filesystem passkey caching
  #   - NFS: Kerberos-authenticated mount tokens
  #
  # Unlike file-based credential stores, keyring reads leave no file I/O trace,
  # bypassing file-based monitoring and DLP controls. An AI agent invoking
  # keyctl can silently extract in-memory credentials without touching disk.
  #
  # Kernel keyring key types that hold credentials:
  #   @s  = session keyring  (process-specific, most commonly targeted)
  #   @u  = user keyring     (user-wide, persists across sessions)
  #   @p  = process keyring  (current-process-only)
  #   @g  = group keyring    (rarely used but can hold group secrets)
  #
  # MITRE T1552.004 — Credentials in Files (kernel keyring contains credential material)
  # MITRE T1003    — OS Credential Dumping
  # CWE-522 — Insufficiently Protected Credentials

  # --- BLOCK: keyctl reading key payload (direct credential extraction) ---
  - id: "sec-block-keyctl-read"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?keyctl\\s+(read|print|pipe)\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "keyctl read/print/pipe extracts the raw payload of a kernel keyring key to stdout — can expose cached SSH passphrases, LUKS disk encryption keys, Kerberos TGTs, and PAM authentication tokens without touching any file on disk. MITRE T1552.004, T1003, CWE-522."

  # --- BLOCK: keyctl setperm granting world-readable permissions ---
  - id: "sec-block-keyctl-setperm"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?keyctl\\s+setperm\\s+\\S+\\s+0x[0-9a-fA-F]"
    decision: "BLOCK"
    confidence: 0.90
    reason: "keyctl setperm grants arbitrary permission flags on a kernel keyring key — can make a private key world-readable, enabling any process to extract its payload. Privilege escalation via keyring permission weakening. MITRE T1548, CWE-732."

  # --- BLOCK: keyctl clear/revoke — sabotaging the keyring ---
  - id: "sec-block-keyctl-destroy"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?keyctl\\s+(clear|revoke|unlink)\\s+"
    decision: "BLOCK"
    confidence: 0.88
    reason: "keyctl clear/revoke/unlink deletes keys or clears keyring contents — can destroy session authentication tokens, disk encryption keys, or Kerberos tickets, causing service disruption and locking users out. MITRE T1531, CWE-522."

  # --- BLOCK: keyctl session hijack — attaching to another session's keyring ---
  - id: "sec-block-keyctl-session-hijack"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?keyctl\\s+session\\s+-\\s+"
    decision: "BLOCK"
    confidence: 0.95
    reason: "keyctl session - <cmd> runs a command joined to a new anonymous session keyring, but can also be used to attach to and enumerate another session's keyring inheritance. Combined with show/read subcommands, enables lateral credential access. MITRE T1563, CWE-522."

  # --- AUDIT: keyctl show — keyring enumeration (reconnaissance) ---
  - id: "sec-audit-keyctl-show"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?keyctl\\s+(show|list|describe|get_keyring_ID)\\b"
    decision: "AUDIT"
    confidence: 0.80
    reason: "keyctl show/list/describe enumerates keys in the kernel keyring — reveals cached credentials, session tokens, and disk encryption keys held in memory. Reconnaissance step before targeted extraction. MITRE T1552.004."

  # --- AUDIT: pass/gopass listing (metadata only, no decryption) ---
  - id: "sec-audit-linux-pass-list"
    taxonomy: "credential-exposure/password-db-access/linux-credential-store-extraction"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(pass|gopass)\\s+(ls|list|find|search|grep)\\b"
    decision: "AUDIT"
    confidence: 0.70
    reason: "pass/gopass listing or searching entries — reveals credential names/paths (metadata) but does not decrypt. Auditing for visibility. MITRE T1555.004."

  # === BLOCK/AUDIT: Enterprise secrets manager CLI credential extraction ===
  #
  # Modern developer environments use enterprise secrets managers beyond the
  # traditional Unix tools already covered above. These CLI tools can silently
  # extract all stored credentials when invoked by an AI agent:
  #
  #   op item get "GitHub PAT" --fields password   ← 1Password: credential extraction
  #   bw get password "AWS Root"                   ← Bitwarden: credential extraction
  #   infisical secrets get DATABASE_PASSWORD       ← Infisical: specific secret
  #   doppler secrets download --format env         ← Doppler: all secrets dump
  #   sops --decrypt secrets.enc.yaml               ← SOPS: decrypt secrets file
  #
  # MITRE T1555.004 — Credentials from Password Stores
  # OWASP LLM06 — Excessive Agency

  # --- BLOCK: 1Password CLI (op) credential extraction ---
  # op item get/read extracts plaintext credentials; op export dumps the vault.
  # op run injects secrets into a subprocess — combined with env dump exposes all.
  - id: "sec-block-1password-op-get"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?op\\s+(item\\s+get|read|export|signin|account\\s+get)\\b"
    decision: "BLOCK"
    confidence: 0.93
    reason: "1Password CLI (op) credential extraction — 'op item get' and 'op read' return plaintext secrets from 1Password vaults; 'op export' dumps all vault data. No AI agent workflow requires direct 1Password credential extraction. MITRE T1555.004."

  # --- AUDIT: 1Password CLI list/run (lower risk but worth tracking) ---
  - id: "sec-audit-1password-op-list"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?op\\s+(item\\s+list|vault\\s+list|run\\b)"
    decision: "AUDIT"
    confidence: 0.70
    reason: "1Password CLI listing or secret injection (op run) — listing enumerates vault contents (reconnaissance); 'op run' injects secrets into subprocess environment which may be captured. MITRE T1555.004."

  # --- BLOCK: Bitwarden CLI (bw) credential extraction ---
  # bw get password/item returns plaintext credentials; bw export dumps the vault.
  - id: "sec-block-bitwarden-bw-get"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?bw\\s+(get\\s+(password|username|item|notes|totp)|export|unlock|login)\\b"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Bitwarden CLI (bw) credential extraction — 'bw get password/item' decrypts and returns plaintext credentials; 'bw export' dumps the entire vault; 'bw unlock' prints the session key to stdout enabling further extraction. MITRE T1555.004."

  # --- AUDIT: Bitwarden CLI list (reconnaissance) ---
  - id: "sec-audit-bitwarden-bw-list"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?bw\\s+list\\s+(items|collections|folders|organizations)\\b"
    decision: "AUDIT"
    confidence: 0.70
    reason: "Bitwarden CLI listing vault contents — reveals credential names and metadata without decrypting, enabling targeted extraction in subsequent commands. MITRE T1555.004."

  # --- BLOCK: Infisical CLI secret extraction ---
  # infisical secrets get/export extracts secrets; infisical run injects them.
  - id: "sec-block-infisical-secrets-get"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?infisical\\s+(secrets\\s+(get|download|export)|export|login)\\b"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Infisical CLI secret extraction — 'infisical secrets get/export' dumps plaintext secrets from Infisical projects; 'infisical export' emits all secrets in dotenv/json format. MITRE T1555.004."

  # --- AUDIT: Infisical run (injects secrets into subprocess) ---
  - id: "sec-audit-infisical-run"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?infisical\\s+run\\b"
    decision: "AUDIT"
    confidence: 0.70
    reason: "Infisical run injects project secrets into a subprocess environment — legitimate for running apps with secrets, but combined with env/printenv dumps all injected credentials. MITRE T1555.004."

  # --- BLOCK: Doppler CLI secret download ---
  - id: "sec-block-doppler-secrets"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?doppler\\s+(secrets\\s+(download|get)|configure)\\b"
    decision: "BLOCK"
    confidence: 0.92
    reason: "Doppler CLI secret extraction — 'doppler secrets download' dumps all project secrets to stdout or a file; 'doppler secrets get' returns a specific plaintext secret value. MITRE T1555.004."

  # --- AUDIT: Doppler run (injects secrets into subprocess) ---
  - id: "sec-audit-doppler-run"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?doppler\\s+run\\b"
    decision: "AUDIT"
    confidence: 0.70
    reason: "Doppler run injects project secrets into a subprocess environment — combined with env/printenv exposes all injected secrets. MITRE T1555.004."

  # --- BLOCK: Mozilla SOPS decryption ---
  # sops --decrypt decrypts SOPS-encrypted secrets files to plaintext stdout.
  # sops exec-env/exec-file runs a command with secrets injected into the environment.
  - id: "sec-block-sops-decrypt"
    taxonomy: "credential-exposure/password-db-access/enterprise-secrets-manager-cli"
    match:
      command_regex: "(^|&&|;|\\|\\s*)(sudo\\s+)?sops\\s+(--decrypt|-d|--extract|exec-env|exec-file)\\b"
    decision: "BLOCK"
    confidence: 0.93
    reason: "Mozilla SOPS decryption — 'sops --decrypt' outputs the full plaintext of an encrypted secrets file (YAML, JSON, .env, INI); 'sops exec-env' injects all decrypted secrets into a subprocess environment. MITRE T1555.001, T1552.001."

  # === BLOCK: Browser credential database access ===
  # Chrome/Chromium store saved passwords in a SQLite database. Directly
  # reading, copying, or querying this file exposes encrypted credentials
  # and session cookies. Maps to MITRE T1555.003.
  - id: "sec-block-chrome-login-db"
    taxonomy: "credential-exposure/password-db-access/browser-credential-theft"
    match:
      command_regex: "(Google/Chrome|google-chrome|chromium|BraveSoftware/Brave-Browser|Microsoft.Edge|Chromium)/(Default|Profile [0-9]+)/(Login|Cookies|Web.Data)"
    decision: "BLOCK"
    reason: "Access to Chrome/Chromium browser credential and cookie databases is blocked (MITRE T1555.003)."

  # Firefox stores credentials in key4.db (master password DB) and logins.json.
  # Both files together allow offline decryption of all saved passwords.
  - id: "sec-block-firefox-login-db"
    taxonomy: "credential-exposure/password-db-access/browser-credential-theft"
    match:
      command_regex: "(\\.mozilla/firefox|Firefox/Profiles)/[^/]*/(key4\\.db|logins\\.json|cookies\\.sqlite)"
    decision: "BLOCK"
    reason: "Access to Firefox credential database files is blocked (MITRE T1555.003)."

  # === BLOCK: Encoded exfiltration attempts ===
  - id: "sec-block-base64-sensitive"
    taxonomy: "data-exfiltration/encoded-exfil/base64-credential-encode"
    match:
      command_regex: "base64.*\\.(ssh|aws|gnupg|kube|docker)"
    decision: "BLOCK"
    reason: "Base64 encoding of credential files is a common exfiltration technique."

  - id: "sec-block-xxd-sensitive"
    taxonomy: "data-exfiltration/encoded-exfil/hex-dump-sensitive"
    match:
      command_regex: "^(sudo\\s+)?(xxd|od|hexdump)\\b.*\\.(ssh|aws|gnupg)"
    decision: "BLOCK"
    reason: "Hex dumping credential files is a potential exfiltration technique."

  - id: "sec-block-scripting-lang-credential-encode"
    taxonomy: "data-exfiltration/encoded-exfil/base64-credential-encode"
    match:
      command_regex: "(python[23]?|perl|ruby|node(js)?)\\b.*((b64encode|encode_base64|encodebytes|base64)\\b.*(\\.(ssh|aws|gnupg|kube|docker))|(\\.(ssh|aws|gnupg|kube|docker)).*(b64encode|encode_base64|encodebytes|base64)\\b)"
    decision: "BLOCK"
    reason: "Scripting-language inline base64 encoding of credential files is an evasion technique used when the base64 binary is restricted. MITRE T1027."
    confidence: 0.93

  - id: "sec-block-openssl-credential-encode"
    taxonomy: "data-exfiltration/encoded-exfil/base64-credential-encode"
    match:
      command_regex: "openssl\\b.*(-base64|base64\\b).*(\\.(ssh|aws|gnupg|kube|docker))|openssl\\b.*(\\.(ssh|aws|gnupg|kube|docker)).*(-base64|base64\\b)"
    decision: "BLOCK"
    reason: "openssl enc -base64 / openssl base64 on credential files encodes private keys or cloud credentials for exfiltration. MITRE T1027."
    confidence: 0.93

  # === BLOCK: Credential harvesting ===
  #
  # Fix (closes #459): Original regex `(history|cat.*_history).*grep.*(cred-keywords)` was
  # too broad — "history" appeared anywhere in the command, including inside quoted arguments
  # (e.g. gh issue create --title "...git history...grep...secret..."). Tightened to require
  # `history` as the shell command (immediately followed by optional count and pipe `|`) OR
  # `cat` on a literal `_history` file path. This prevents FPs on argument text while still
  # catching `history | grep token` and `cat ~/.bash_history | grep secret`.
  - id: "sec-block-history-grep-password"
    taxonomy: "credential-exposure/history-mining/history-credential-grep"
    match:
      command_regex: "(\\bhistory\\b\\s*\\d*\\s*\\|[^|]*grep|cat\\s+\\S*_history\\S*\\s*\\|[^|]*grep).*(password|secret|token|key|api)\\b"
    decision: "BLOCK"
    reason: "Searching shell history for credentials is suspicious."

  # === BLOCK: Git commit log secret mining (closes #457) ===
  #
  # Taxonomy: credential-exposure/history-mining/git-history-secret-mining
  # OWASP LLM02 — Sensitive Information Disclosure, LLM06 — Excessive Agency
  # MITRE T1552.001 — Credentials in Files
  #
  # AI agents can mine the full git commit graph to recover secrets that were
  # accidentally committed and later deleted. Git preserves all committed content
  # permanently; a removed .env file or hardcoded API key is fully recoverable
  # via git log --all or git pickaxe (-S flag). Attack patterns:
  #
  #   git log --all -p | grep -i password          → stream all diffs, grep for creds
  #   git log -S 'OPENAI_API_KEY' --all            → pickaxe: find commits adding/removing string
  #   git log --all --follow -p -- '*.env'         → full diff history for env files
  #   git log --all --diff-filter=D -- .env        → find commits that deleted sensitive files
  #   git grep 'aws_secret' $(git rev-list --all)  → grep every blob in history
  #
  # True Negatives (benign):
  #   git log --oneline                            → summary only, no diffs
  #   git log -p HEAD~1..HEAD                      → reviewing recent change
  #   git log --stat                               → file stats only
  #   git log --all --oneline -- README.md         → tracking non-sensitive file

  # BLOCK: git log piped to credential-keyword grep
  - id: "sec-block-git-log-credential-mining"
    taxonomy: "credential-exposure/history-mining/git-history-secret-mining"
    match:
      dataflow:
        source: {type: "git_log"}
        sink: {type: "credential_grep"}
      command_regex: "git\\s+log\\b.*\\|.*(grep|awk|sed).*\\b(password|secret|token|api.?key|credential|passwd|aws_secret|private.?key)\\b"
    decision: "BLOCK"
    confidence: 0.95
    reason: "git log piped to credential-keyword grep mines the full commit graph for accidentally committed secrets. Git history is permanent — deleted files remain recoverable. MITRE T1552.001."

  # BLOCK: git pickaxe search targeting credential patterns
  - id: "sec-block-git-pickaxe-mining"
    taxonomy: "credential-exposure/history-mining/git-history-secret-mining"
    match:
      command_regex: "git\\s+log\\b.*\\s-[SG]\\s*['\"]?(password|secret|token|api[_.]?key|credential|aws_secret|private[_.]?key|OPENAI|ANTHROPIC|STRIPE|GITHUB_TOKEN)['\"]?"
    decision: "BLOCK"
    confidence: 0.95
    reason: "git pickaxe search (-S/-G) finds every commit that added or removed a string — purpose-built for mining secrets from git history. MITRE T1552.001."

  # AUDIT: git log --all on sensitive file paths (env files, config)
  - id: "sec-audit-git-log-all-env"
    taxonomy: "credential-exposure/history-mining/git-history-secret-mining"
    match:
      command_regex: "git\\s+log\\b.*(--all|--branches|--remotes|--glob).*(-p|--patch|--follow|--diff-filter).*\\.(env|pem|key|pfx|p12|pkcs12|crt|credentials|netrc)"
    decision: "AUDIT"
    confidence: 0.88
    reason: "git log --all with full diffs on sensitive file extensions traverses history for credential files — audit to detect accidental secret recovery attempts. MITRE T1552.001."

  # === AUDIT: Environment variable exposure ===
  - id: "sec-audit-env-dump"
    taxonomy: "credential-exposure/secret-env-exposure/env-dump"
    match:
      command_prefix: ["env", "printenv", "set"]
    decision: "AUDIT"
    reason: "Environment dump may expose secrets (API keys, tokens, passwords)."

  - id: "sec-audit-env-grep-secret"
    taxonomy: "credential-exposure/secret-env-exposure/env-dump"
    match:
      command_regex: "(env|printenv|echo\\s+\\$).*(_KEY|_SECRET|_TOKEN|_PASSWORD|_CREDENTIAL|API_KEY)"
