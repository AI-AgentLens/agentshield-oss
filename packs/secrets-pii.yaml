    reason: "nmcli --show-secrets explicitly dumps all stored credentials for a connection including VPN passwords, pre-shared keys, and certificate passphrases. No AI agent workflow requires direct access to stored VPN secrets. MITRE T1552.001."

  # --- BLOCK: nmcli connection export — writes full VPN config with embedded creds ---
  - id: "sec-block-nmcli-vpn-export"
