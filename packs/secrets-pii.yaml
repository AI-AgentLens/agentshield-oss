  # === AUDIT: LLM-Assisted Credential Phishing ===
  #
  # An AI agent may be prompted (via prompt injection, malicious MCP tool output,
  # or a manipulated system prompt) to solicit credentials from the user by
  # displaying fake authentication dialogs or using shell read builtins with
  # credential-themed prompts. This attack exploits the trust relationship
  # between user and agent.
  #
  # Taxonomy: credential-exposure/ai-api-credentials/llm-assisted-credential-phishing
  # OWASP LLM: LLM01/LLM02/LLM05
  # MITRE: T1566 (Phishing), T1598 (Spearphishing), T1056 (Input Capture)
  # CWE: CWE-359, CWE-522, CWE-862

  # --- AUDIT: fake credential dialog via GUI automation tools ---
  #
  # TP examples:
  #   osascript -e 'display dialog "Enter your API key:" default answer "" with hidden answer'
  #   zenity --password --title="Authentication Required"
  #   dialog --passwordbox "Enter token:" 10 50
  #
  # TN examples:
  #   osascript -e 'display notification "Build complete"'
  #   zenity --info --text="Done"
  - id: "sec-audit-fake-credential-dialog"
    taxonomy: "credential-exposure/ai-api-credentials/llm-assisted-credential-phishing"
    match:
      command_regex: '(?i)(osascript\b.*display\s+dialog\b.*(?:password|token|key|secret|api.?key|credential)|zenity\s+[^|&;]*--password\b|dialog\s+[^|&;]*--passwordbox\b)'
    decision: "AUDIT"
    confidence: 0.80
    reason: "GUI credential dialog detected — possible fake authentication prompt injected via prompt injection or malicious MCP tool output (OWASP LLM01/LLM05, MITRE T1056). Verify this dialog is expected before continuing."

  # --- AUDIT: silent shell credential read with credential-themed prompt ---
