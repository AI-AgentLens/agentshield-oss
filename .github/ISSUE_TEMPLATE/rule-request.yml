name: Rule Request
description: Request a new AgentShield runtime policy rule
labels: ["rule-request"]
body:
  - type: input
    id: threat
    attributes:
      label: What should be blocked?
      placeholder: "e.g., kubectl delete namespace in production"
    validations:
      required: true

  - type: dropdown
    id: kingdom
    attributes:
      label: Threat Kingdom
      options:
        - destructive-ops
        - credential-exposure
        - data-exfiltration
        - persistence-evasion
        - privilege-escalation
        - reconnaissance
        - supply-chain
        - unauthorized-execution
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Example commands (dangerous + safe)
      description: At least 1 command to BLOCK and 1 to ALLOW
      placeholder: |
        BLOCK: kubectl delete namespace production
        ALLOW: kubectl get pods -n production
    validations:
      required: true

  - type: dropdown
    id: decision
    attributes:
      label: Decision
      options:
        - BLOCK
        - AUDIT
    validations:
      required: true

  - type: dropdown
    id: match_type
    attributes:
      label: Match type (optional — Claude will choose if omitted)
      options:
        - ""
        - regex
        - structural
        - semantic
        - dataflow
        - stateful

  - type: textarea
    id: context
    attributes:
      label: Additional context
