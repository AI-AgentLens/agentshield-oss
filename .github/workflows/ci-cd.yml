# CI/CD for AgentShield
# Flow: test → release → (package-upload + homebrew) in parallel across 4 runners
#
# Required secrets:
#   RELEASES_S3_ENDPOINT   — S3-compatible endpoint (e.g. https://s3.ca-east-006.backblazeb2.com)
#   RELEASES_S3_BUCKET     — Bucket name (e.g. aiagentlens-releases)
#   RELEASES_S3_ACCESS_KEY — S3 access key
#   RELEASES_S3_SECRET_KEY — S3 secret key
#   HOMEBREW_TAP_TOKEN     — GitHub PAT for pushing to homebrew-tap repo

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ── Runner 1: Test ──────────────────────────────────────────────
  test:
    name: "Test"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - run: go mod download

      - name: Run tests
        run: |
          go test -count=1 \
            ./internal/config/... \
            ./internal/policy/... \
            ./internal/guardian/... \
            ./internal/mcp/... \
            ./internal/normalize/... \
            ./internal/shellparse/... \
            ./internal/unicode/... \
            ./internal/enterprise/... \
            ./internal/logger/... \
            ./internal/redact/... \
            ./internal/taxonomy/...

      - run: go vet ./...
      - run: make build

  # ── Runner 2: Tag + GoReleaser ──────────────────────────────────
  release:
    name: "Release"
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Clean up old artifacts (keep newest 3)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEEP=3
          REPO="${GITHUB_REPOSITORY}"
          API="https://api.github.com/repos/${REPO}/actions/artifacts"
          AUTH="Authorization: Bearer ${GITHUB_TOKEN}"
          # Fetch artifact IDs (newest first, up to 100)
          IDS=$(curl -s -H "$AUTH" "${API}?per_page=100" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for a in data.get('artifacts', []):
              print(a['id'])
          ")
          COUNT=0
          for id in $IDS; do
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -gt "$KEEP" ]; then
              echo "Deleting artifact $id..."
              curl -s -X DELETE -H "$AUTH" "${API}/$id" || true
            fi
          done
          echo "Kept $KEEP newest, deleted $((COUNT > KEEP ? COUNT - KEEP : 0)) old artifacts."

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - run: go mod download

      - name: Clone and build agentcompliance
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          sudo rm -rf /tmp/AI_risk_compliance
          git clone https://x-access-token:${GH_TOKEN}@github.com/AI-AgentLens/AI_risk_compliance.git /tmp/AI_risk_compliance
          cd /tmp/AI_risk_compliance
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive || true
          go mod download
          for GOOS_VAL in darwin linux; do
            for GOARCH_VAL in amd64 arm64; do
              OUTDIR="${GITHUB_WORKSPACE}/compliance-bin/agentcompliance_${GOOS_VAL}_${GOARCH_VAL}"
              mkdir -p "${OUTDIR}"
              CGO_ENABLED=0 GOOS=$GOOS_VAL GOARCH=$GOARCH_VAL \
                go build -ldflags="-s -w" \
                -o "${OUTDIR}/agentcompliance" \
                ./cmd/comply &
            done
          done
          wait
          ls -la ${GITHUB_WORKSPACE}/compliance-bin/

      - name: Bump version tag
        id: tag
        run: |
          git fetch --tags --force
          LATEST=$(git tag -l 'v*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then LATEST="v0.0.0"; fi
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping $LATEST → $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "GORELEASER_CURRENT_TAG=$NEW_TAG" >> "$GITHUB_ENV"
          echo "version=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: goreleaser release --clean

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/agentshield_*.tar.gz
            dist/checksums.txt
          retention-days: 1

  # ── Runner 3: Build DMGs + Upload everything to S3 ─────────────
  package-upload:
    name: "Package & Upload to S3"
    runs-on: self-hosted
    needs: release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Build macOS DMG installers
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          if ! command -v hdiutil &>/dev/null; then
            echo "hdiutil is unavailable on this runner; skipping DMG packaging."
            exit 0
          fi
          for ARCH in arm64 amd64; do
            echo "Building DMG for darwin/${ARCH}..."
            VERSION="${VERSION}" bash scripts/build-app.sh "${ARCH}"
            VERSION="${VERSION}" bash scripts/build-dmg.sh "${ARCH}"
          done
          ls -lh build/*.dmg

      - name: Install AWS CLI
        run: |
          if command -v aws &>/dev/null; then
            aws --version
          elif command -v docker &>/dev/null; then
            docker run --rm amazon/aws-cli:latest --version
          else
            echo "Neither aws nor docker is available on this runner."
            exit 1
          fi

      - name: Clean up old releases (keep last 20)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RELEASES_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RELEASES_S3_SECRET_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          S3_ENDPOINT: ${{ secrets.RELEASES_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.RELEASES_S3_BUCKET }}
        run: |
          KEEP=20

          if command -v aws &>/dev/null; then
            AWS_CMD=(aws)
          elif command -v docker &>/dev/null; then
            AWS_CMD=(
              docker run --rm
              -e AWS_ACCESS_KEY_ID
              -e AWS_SECRET_ACCESS_KEY
              -e AWS_EC2_METADATA_DISABLED
              amazon/aws-cli:latest
            )
          else
            echo "Neither aws nor docker is available; skipping cleanup."
            exit 0
          fi

          # List version prefixes, sort semantically, drop the newest $KEEP
          VERSIONS=$("${AWS_CMD[@]}" s3 ls "s3://${S3_BUCKET}/" \
            --endpoint-url "${S3_ENDPOINT}" \
            | awk '{print $2}' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+/$' \
            | sed 's|/$||' \
            | sort -t. -k1,1V -k2,2n -k3,3n)

          TOTAL=$(echo "$VERSIONS" | wc -l | tr -d ' ')
          if [ "$TOTAL" -le "$KEEP" ]; then
            echo "Only ${TOTAL} versions found, nothing to clean up."
            exit 0
          fi

          DELETE_COUNT=$((TOTAL - KEEP))
          TO_DELETE=$(echo "$VERSIONS" | head -n "$DELETE_COUNT")

          echo "Deleting ${DELETE_COUNT} old versions (keeping newest ${KEEP})..."
          for ver in $TO_DELETE; do
            echo "  Removing ${ver}/..."
            "${AWS_CMD[@]}" s3 rm "s3://${S3_BUCKET}/${ver}/" \
              --recursive \
              --endpoint-url "${S3_ENDPOINT}"
          done
          echo "Cleanup complete."

      - name: Upload all artifacts to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.RELEASES_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.RELEASES_S3_SECRET_KEY }}
          AWS_EC2_METADATA_DISABLED: "true"
          S3_ENDPOINT: ${{ secrets.RELEASES_S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.RELEASES_S3_BUCKET }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          shopt -s nullglob

          if command -v aws &>/dev/null; then
            AWS_CMD=(aws)
          elif command -v docker &>/dev/null; then
            AWS_CMD=(
              docker run --rm
              -e AWS_ACCESS_KEY_ID
              -e AWS_SECRET_ACCESS_KEY
              -e AWS_EC2_METADATA_DISABLED
              -v "$PWD:/work"
              -w /work
              amazon/aws-cli:latest
            )
          else
            echo "Neither aws nor docker is available on this runner."
            exit 1
          fi

          # Upload tar.gz archives
          archives=(dist/agentshield_*.tar.gz)
          for archive in "${archives[@]}"; do
            FILENAME=$(basename "$archive")
            echo "  Uploading ${FILENAME}..."
            "${AWS_CMD[@]}" s3 cp "$archive" "s3://${S3_BUCKET}/${VERSION}/${FILENAME}" \
              --endpoint-url "${S3_ENDPOINT}" \
              --content-type "application/gzip"
          done

          # Upload DMG installers
          dmgs=(build/*.dmg)
          for dmg in "${dmgs[@]}"; do
            FILENAME=$(basename "$dmg")
            echo "  Uploading ${FILENAME}..."
            "${AWS_CMD[@]}" s3 cp "$dmg" "s3://${S3_BUCKET}/${VERSION}/${FILENAME}" \
              --endpoint-url "${S3_ENDPOINT}" \
              --content-type "application/x-apple-diskimage"
          done
          # Upload checksums
          if [ -f dist/checksums.txt ]; then
            echo "  Uploading checksums.txt..."
            "${AWS_CMD[@]}" s3 cp dist/checksums.txt "s3://${S3_BUCKET}/${VERSION}/checksums.txt" \
              --endpoint-url "${S3_ENDPOINT}" \
              --content-type "text/plain"
          fi

  # ── Runner 4: Update Homebrew cask (AFTER S3 upload) ────────────
  homebrew:
    name: "Update Homebrew"
    runs-on: self-hosted
    needs: [release, package-upload]  # Must wait for S3 upload so brew URLs work

    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist/

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ needs.release.outputs.version }}"
          sudo rm -f /tmp/agentshield.rb
          bash scripts/generate-cask.sh "${VERSION}" dist /tmp/agentshield.rb
          sudo rm -rf /tmp/homebrew-tap
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/AI-AgentLens/homebrew-tap.git /tmp/homebrew-tap
          cp /tmp/agentshield.rb /tmp/homebrew-tap/Casks/agentshield.rb
          cd /tmp/homebrew-tap
          git config user.email "ci@aiagentlens.com"
          git config user.name "AI Agent Lens CI"
          git add Casks/agentshield.rb
          git commit -m "chore: update agentshield cask to ${VERSION}" || true
          git push origin main
