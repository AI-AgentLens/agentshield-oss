# CI/CD for AgentShield
# Flow: test → release (main only: tag, goreleaser, upload artifacts, update homebrew cask)
#
# Required secrets:
#   RELEASE_UPLOAD_TOKEN  — Bearer token for aiagentlens.com artifact upload
#   HOMEBREW_TAP_TOKEN    — GitHub PAT for pushing to homebrew-tap repo

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: "Test"
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - run: go mod download

      - name: Run tests
        run: |
          go test -count=1 \
            ./internal/config/... \
            ./internal/policy/... \
            ./internal/guardian/... \
            ./internal/mcp/... \
            ./internal/normalize/... \
            ./internal/shellparse/... \
            ./internal/unicode/... \
            ./internal/enterprise/... \
            ./internal/logger/... \
            ./internal/redact/... \
            ./internal/taxonomy/...

      - run: go vet ./...
      - run: make build

  release:
    name: "Release"
    runs-on: self-hosted
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CROSS_REPO_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - run: go mod download

      - name: Clone and build agentcompliance
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
        run: |
          rm -rf /tmp/AI_risk_compliance
          git clone https://x-access-token:${GH_TOKEN}@github.com/AI-AgentLens/AI_risk_compliance.git /tmp/AI_risk_compliance
          cd /tmp/AI_risk_compliance
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive || true
          go mod download
          for GOOS_VAL in darwin linux; do
            for GOARCH_VAL in amd64 arm64; do
              OUTDIR="${GITHUB_WORKSPACE}/compliance-bin/agentcompliance_${GOOS_VAL}_${GOARCH_VAL}"
              mkdir -p "${OUTDIR}"
              CGO_ENABLED=0 GOOS=$GOOS_VAL GOARCH=$GOARCH_VAL \
                go build -ldflags="-s -w" \
                -o "${OUTDIR}/agentcompliance" \
                ./cmd/comply &
            done
          done
          wait
          ls -la ${GITHUB_WORKSPACE}/compliance-bin/

      - name: Bump version tag
        run: |
          git fetch --tags
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          MAJOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST" | sed 's/v//' | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          echo "Bumping $LATEST → $NEW_TAG"
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
          echo "GORELEASER_CURRENT_TAG=$NEW_TAG" >> "$GITHUB_ENV"

      - name: Install GoReleaser
        run: |
          curl -sfL https://github.com/goreleaser/goreleaser/releases/latest/download/goreleaser_Linux_x86_64.tar.gz | tar xz -C /usr/local/bin goreleaser 2>/dev/null || true

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.CROSS_REPO_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: goreleaser release --clean

      - name: Upload release artifacts to aiagentlens.com
        env:
          RELEASE_UPLOAD_TOKEN: ${{ secrets.RELEASE_UPLOAD_TOKEN }}
        run: |
          VERSION="${GORELEASER_CURRENT_TAG}"
          for archive in dist/agentshield_*.tar.gz; do
            FILENAME=$(basename "$archive")
            echo "  Uploading ${FILENAME}..."
            curl -sf -X POST \
              -H "Authorization: Bearer ${RELEASE_UPLOAD_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${archive}" \
              "https://aiagentlens.com/api/releases/upload?version=${VERSION}&filename=${FILENAME}"
          done
          if [ -f dist/checksums.txt ]; then
            curl -sf -X POST \
              -H "Authorization: Bearer ${RELEASE_UPLOAD_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@dist/checksums.txt" \
              "https://aiagentlens.com/api/releases/upload?version=${VERSION}&filename=checksums.txt"
          fi

      - name: Update Homebrew cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GORELEASER_CURRENT_TAG}"
          bash scripts/generate-cask.sh "${VERSION}" dist /tmp/agentshield.rb
          rm -rf /tmp/homebrew-tap
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/AI-AgentLens/homebrew-tap.git /tmp/homebrew-tap
          cp /tmp/agentshield.rb /tmp/homebrew-tap/Casks/agentshield.rb
          cd /tmp/homebrew-tap
          git config user.email "ci@aiagentlens.com"
          git config user.name "AI Agent Lens CI"
          git add Casks/agentshield.rb
          git commit -m "chore: update agentshield cask to ${VERSION}" || true
          git push origin main
